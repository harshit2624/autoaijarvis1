<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CrosCrow Support</title>
<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
<style>
  * { box-sizing:border-box; margin:0; padding:0; }
  html,body { height:100%; font-family:'Segoe UI',-apple-system,Arial,sans-serif; }
  body { background:#ffffff; color:#0a0a0a; display:flex; flex-direction:column; height:100vh; overflow:hidden; }

  .header { display:flex; align-items:center; gap:10px; padding:14px 18px; background:#fff; border-bottom:1px solid #e5e5e5; flex-shrink:0; position:relative; }
  .header .dot { width:9px; height:9px; border-radius:50%; background:#16a34a; box-shadow:0 0 8px rgba(22,163,74,0.5); }
  .header .title { font-size:14px; font-weight:700; letter-spacing:0.3px; color:#0a0a0a; }
  .header .sub { font-size:11px; color:#6b7280; }
  .header .close { margin-left:auto; cursor:pointer; color:#6b7280; font-size:18px; line-height:1; padding:4px; }
  .header .close:hover { color:#0a0a0a; }

  /* Crow mascot — drop crow.glb in the repo root to bring it to life;
     falls back to an emoji silently if the model is missing/fails to load. */
  .crow-mascot-wrap { width:44px; height:44px; flex-shrink:0; position:relative; }
  .crow-mascot { width:100%; height:100%; --poster-color: transparent; }
  .crow-fallback { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:26px; }
  .crow-bubble {
    position:absolute; top:50%; left:52px; transform:translateY(-50%) scale(0.85); transform-origin:left center;
    background:#0a0a0a; color:#fff; font-size:12px; font-weight:700; padding:7px 12px; border-radius:10px;
    white-space:nowrap; opacity:0; pointer-events:none; transition:opacity 0.25s ease, transform 0.25s ease; z-index:5;
  }
  .crow-bubble::before { content:''; position:absolute; left:-5px; top:50%; transform:translateY(-50%); border:5px solid transparent; border-right-color:#0a0a0a; }
  .crow-bubble.show { opacity:1; transform:translateY(-50%) scale(1); }

  .messages { flex:1; overflow-y:auto; padding:18px; display:flex; flex-direction:column; gap:14px; background:#fff; }
  .messages::-webkit-scrollbar { width:5px; }
  .messages::-webkit-scrollbar-thumb { background:#e5e5e5; border-radius:4px; }

  .row { display:flex; gap:8px; max-width:88%; }
  .row.user { align-self:flex-end; flex-direction:row-reverse; }
  .row.bot, .row.vendor, .row.admin { align-self:flex-start; }
  .bubble { padding:10px 14px; border-radius:14px; font-size:13px; line-height:1.5; white-space:pre-wrap; }
  .row.user .bubble { background:#0a0a0a; color:#fff; border-radius:14px 14px 3px 14px; }
  .row.bot .bubble { background:#f4f4f5; color:#0a0a0a; border:1px solid #e5e5e5; border-radius:14px 14px 14px 3px; }
  .row.vendor .bubble, .row.admin .bubble { background:#fffbeb; color:#0a0a0a; border:1px solid #fde68a; border-radius:14px; }
  .sender-tag { font-size:9px; color:#b45309; font-weight:700; letter-spacing:0.5px; margin-bottom:4px; text-transform:uppercase; }

  .typing { align-self:flex-start; display:flex; gap:4px; padding:12px 14px; background:#f4f4f5; border:1px solid #e5e5e5; border-radius:14px; }
  .typing span { width:6px; height:6px; border-radius:50%; background:#0a0a0a; animation:bounce 1.2s infinite; }
  .typing span:nth-child(2){animation-delay:0.15s} .typing span:nth-child(3){animation-delay:0.3s}
  @keyframes bounce { 0%,80%,100%{transform:translateY(0);opacity:0.3} 40%{transform:translateY(-4px);opacity:1} }

  /* Tracking card */
  .track-card { background:#fafafa; border:1px solid #e5e5e5; border-radius:12px; padding:14px 16px; max-width:88%; align-self:flex-start; }
  .track-card .tc-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
  .track-card .tc-order { font-size:13px; font-weight:800; color:#0a0a0a; }
  .track-card .tc-stage { font-size:10px; font-weight:700; padding:3px 9px; border-radius:99px; text-transform:uppercase; letter-spacing:0.5px; }
  .progress-track { display:flex; gap:3px; margin:10px 0; }
  .progress-track .seg { flex:1; height:5px; border-radius:3px; background:#e5e5e5; }
  .progress-track .seg.done { background:#0a0a0a; }
  .vshipment { background:#fff; border:1px solid #e5e5e5; border-radius:8px; padding:9px 11px; margin-top:7px; font-size:11px; }
  .vshipment .vname { font-weight:700; color:#0a0a0a; margin-bottom:3px; }
  .vshipment .vmeta { color:#6b7280; }
  .tc-link { display:inline-block; margin-top:10px; font-size:11px; color:#0a0a0a; text-decoration:underline; font-weight:700; }
  .tc-confirm-btn { display:block; text-align:center; margin-top:10px; background:#16a34a; color:#fff; text-decoration:none; font-size:12px; font-weight:700; padding:10px; border-radius:8px; }
  .tc-resume-btn { display:block; width:100%; text-align:left; background:#fffbeb; border:1px solid #fde68a; color:#92400e; font-size:11px; font-weight:600; padding:9px 12px; border-radius:8px; margin-bottom:10px; cursor:pointer; font-family:inherit; line-height:1.4; }
  .tc-resume-btn:hover { background:#fef3c7; }

  /* Product cards — swipeable carousel with scroll-snap */
  .product-block { align-self:flex-start; max-width:96%; width:100%; }
  .collection-banner { display:flex; align-items:center; gap:10px; background:#0a0a0a; color:#fff; border-radius:10px; padding:10px 14px; margin-bottom:8px; text-decoration:none; }
  .collection-banner .cb-img { width:32px; height:32px; border-radius:6px; object-fit:cover; background:#333; flex-shrink:0; }
  .collection-banner .cb-text { font-size:12px; font-weight:600; flex:1; }
  .collection-banner .cb-arrow { font-size:14px; }
  .product-row { display:flex; gap:10px; overflow-x:auto; max-width:100%; padding:2px 2px 8px; scroll-snap-type:x mandatory; -webkit-overflow-scrolling:touch; }
  .product-row::-webkit-scrollbar { height:4px; }
  .product-row::-webkit-scrollbar-thumb { background:#e5e5e5; border-radius:4px; }
  .pcard { flex-shrink:0; width:128px; background:#fff; border:1px solid #e5e5e5; border-radius:10px; overflow:hidden; text-decoration:none; color:inherit; scroll-snap-align:start; transition:transform 0.15s ease, box-shadow 0.15s ease; }
  .pcard:hover { transform:translateY(-2px); box-shadow:0 4px 14px rgba(0,0,0,0.1); }
  .pcard .pimg-wrap { width:100%; height:128px; background:#f4f4f5; position:relative; overflow:hidden; }
  .pcard img { width:100%; height:100%; object-fit:cover; display:block; opacity:0; transition:opacity 0.25s ease; position:relative; z-index:1; }
  .pcard img.loaded { opacity:1; }
  .pimg-spinner { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; }
  .pimg-spinner div { width:18px; height:18px; border:2px solid #e5e5e5; border-top-color:#0a0a0a; border-radius:50%; animation:pspin 0.7s linear infinite; }
  @keyframes pspin { to { transform:rotate(360deg); } }
  .pcard .pinfo { padding:8px 9px; }
  .pcard .ptitle { font-size:11px; font-weight:600; color:#0a0a0a; line-height:1.3; max-height:28px; overflow:hidden; }
  .pcard .pprice { font-size:11px; color:#16a34a; font-weight:700; margin-top:4px; }
  .swipe-hint { font-size:10px; color:#9ca3af; text-align:right; margin-top:2px; }

  .action-link { align-self:flex-start; }
  .action-link a { display:inline-block; background:#0a0a0a; color:#fff; text-decoration:none; font-size:12px; font-weight:700; padding:9px 18px; border-radius:9px; }

  .input-bar { display:flex; gap:8px; padding:12px 14px; border-top:1px solid #e5e5e5; background:#fff; flex-shrink:0; }
  .input-bar input { flex:1; background:#f4f4f5; border:1px solid #e5e5e5; border-radius:10px; padding:11px 14px; color:#0a0a0a; font-size:13px; outline:none; font-family:inherit; }
  .input-bar input:focus { border-color:#0a0a0a; }
  .input-bar button { background:#0a0a0a; border:none; border-radius:10px; width:42px; cursor:pointer; color:#fff; font-size:16px; }
  .input-bar button:disabled { opacity:0.4; cursor:default; }

  .vendor-banner { background:#fffbeb; border-bottom:1px solid #fde68a; padding:8px 16px; font-size:11px; color:#b45309; text-align:center; flex-shrink:0; }
</style>
</head>
<body>
  <div class="header">
    <div class="crow-mascot-wrap" id="crow-wrap">
      <model-viewer class="crow-mascot" id="crow-model" src="/crow3.glb" alt="Crow mascot"
        auto-rotate auto-rotate-delay="0" rotation-per-second="20deg" camera-controls="false"
        disable-zoom interaction-prompt="none" loading="eager"></model-viewer>
      <span class="crow-fallback" id="crow-fallback" style="display:none">🐦‍⬛</span>
      <div class="crow-bubble" id="crow-bubble">Hii! 👋</div>
    </div>
    <div>
      <div class="title">CrosCrow Support</div>
      <div class="sub" id="sub-status">Online · usually replies instantly</div>
    </div>
    <div class="close" onclick="parent.postMessage({croscrowSupport:'close'},'*')">✕</div>
  </div>
  <div id="vendor-banner" class="vendor-banner" style="display:none"></div>
  <div class="messages" id="messages"></div>
  <div class="input-bar">
    <input id="input" placeholder="Type your message…" />
    <button id="send-btn">➤</button>
  </div>

<script>
  const API = location.origin.includes('localhost') ? location.origin : 'https://dashboard.croscrow.com';
  const params = new URLSearchParams(location.search);
  const vendorToken = params.get('token'); // present only on vendor magic-link view
  const customerEmail = params.get('email') || '';
  const customerNameParam = params.get('name') || '';
  // This page is usually embedded as a cross-origin (third-party) iframe,
  // where browsers restrict/wipe localStorage written from inside the
  // iframe — so the parent embed script passes the chat ID back in via
  // ?chatId=, persisted in the PARENT page's own storage instead. Direct,
  // same-origin loads (local testing, vendor magic link) still fall back
  // to this page's own localStorage, which works fine in that context.
  let chatId = params.get('chatId') || localStorage.getItem('cc_support_chat_id');
  function reportChatIdToParent(id) {
    try { localStorage.setItem('cc_support_chat_id', id); } catch (e) {}
    try { parent.postMessage({ croscrowSupport: 'chatId', chatId: id }, '*'); } catch (e) {}
  }
  let lastTs = null;
  let pollTimer = null;

  const messagesEl = document.getElementById('messages');
  const inputEl = document.getElementById('input');
  const sendBtn = document.getElementById('send-btn');

  const STAGE_ORDER = ['new','confirmed','partial','ready','pickup','transit','ofd','delivered'];

  function el(html) { const d = document.createElement('div'); d.innerHTML = html.trim(); return d.firstChild; }

  function renderTrackingCard(data) {
    const stageIdx = Math.max(0, STAGE_ORDER.indexOf(data.stage));
    const segs = STAGE_ORDER.map((s,i) => `<div class="seg ${i<=stageIdx?'done':''}"></div>`).join('');
    const stageColors = { delivered:'#10b981', rto:'#ef4444', cancelled:'#6b7280', transit:'#22d3ee', ofd:'#f59e0b' };
    const color = stageColors[data.stage] || '#6366f1';
    const vshipments = (data.vendor_shipments||[]).map(v => `
      <div class="vshipment">
        <div class="vname">${v.vendor_name}</div>
        <div class="vmeta">Stage: ${v.stage}${v.awb ? ' · AWB: '+v.awb : ''}${v.courier ? ' · '+v.courier : ''}</div>
      </div>`).join('');
    return el(`<div class="track-card">
      ${data.existing_chat ? `
      <button class="tc-resume-btn" onclick="switchToChat('${data.existing_chat.chat_id}')">
        💬 You have a previous conversation about this order (${data.existing_chat.message_count} messages) — Resume it →
      </button>` : ''}
      <div class="tc-head">
        <span class="tc-order">${data.order_name}</span>
        <span class="tc-stage" style="background:${color}22;color:${color}">${data.stage.toUpperCase()}</span>
      </div>
      <div class="progress-track">${segs}</div>
      ${vshipments}
      ${data.confirm_url ? `<a class="tc-confirm-btn" href="${data.confirm_url}" target="_blank">✅ Confirm This Order →</a>` : ''}
      <a class="tc-link" href="${data.track_url}" target="_blank">View full tracking page →</a>
    </div>`);
  }

  function renderProductCards(data) {
    const products = data.products || [];
    const collections = data.collections || [];
    const collBanner = collections.slice(0, 1).map(c => `
      <a class="collection-banner" href="${c.url}" target="_blank">
        ${c.image ? `<img class="cb-img" src="${c.image}"/>` : ''}
        <span class="cb-text">Browse the full "${c.title}" collection</span>
        <span class="cb-arrow">→</span>
      </a>`).join('');
    const cards = products.map(p => `
      <a class="pcard" href="${p.url}" target="_blank">
        <div class="pimg-wrap">
          <div class="pimg-spinner"><div></div></div>
          <img src="${p.image||''}" loading="lazy" referrerpolicy="no-referrer"
            onload="this.classList.add('loaded'); this.parentElement.querySelector('.pimg-spinner')?.remove();"
            onerror="this.parentElement.style.background='#e5e5e5'; this.parentElement.querySelector('.pimg-spinner')?.remove();"/>
        </div>
        <div class="pinfo">
          <div class="ptitle">${p.title}</div>
          <div class="pprice">From ₹${Math.round(p.price_from)}</div>
        </div>
      </a>`).join('');
    const swipeHint = products.length > 2 ? `<div class="swipe-hint">swipe for more →</div>` : '';
    return el(`<div class="product-block">${collBanner}${products.length ? `<div class="product-row">${cards}</div>${swipeHint}` : ''}</div>`);
  }

  function renderActionLink(data) {
    return el(`<div class="action-link"><a href="${data.url}" target="_blank">${data.label} →</a></div>`);
  }

  function addMessage(m) {
    if (m.sender === 'customer') {
      const row = el(`<div class="row user"><div class="bubble">${escapeHtml(m.text)}</div></div>`);
      messagesEl.appendChild(row);
    } else if (m.sender === 'vendor' || m.sender === 'admin') {
      const row = el(`<div class="row ${m.sender}"><div class="bubble"><div class="sender-tag">${m.sender_name||m.sender}</div>${formatBotText(m.text)}</div></div>`);
      messagesEl.appendChild(row);
    } else {
      if (m.text) {
        const row = el(`<div class="row bot"><div class="bubble">${formatBotText(m.text)}</div></div>`);
        messagesEl.appendChild(row);
      }
      if (m.meta?.type === 'tracking_card') messagesEl.appendChild(renderTrackingCard(m.meta.data));
      else if (m.meta?.type === 'product_cards') messagesEl.appendChild(renderProductCards(m.meta.data));
      else if (m.meta?.type === 'action_link') messagesEl.appendChild(renderActionLink(m.meta.data));
    }
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function escapeHtml(s='') { return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

  // Bot replies sometimes use lightweight markdown (**bold**, "- " bullets) —
  // escape first, then convert just those two patterns to real HTML.
  function formatBotText(text) {
    let safe = escapeHtml(text);
    safe = safe.replace(/\*\*([^*]+?)\*\*/g, '<strong>$1</strong>');
    safe = safe.replace(/^- (.+)$/gm, '• $1');
    return safe;
  }

  function showTyping() {
    const t = el(`<div class="typing" id="typing-indicator"><span></span><span></span><span></span></div>`);
    messagesEl.appendChild(t); messagesEl.scrollTop = messagesEl.scrollHeight;
  }
  function hideTyping() { document.getElementById('typing-indicator')?.remove(); }

  async function init() {
    if (vendorToken) {
      document.getElementById('vendor-banner').style.display = 'block';
      document.getElementById('vendor-banner').textContent = '👤 Vendor view — replies here are visible to the customer';
      const r = await fetch(`${API}/support/vendor-view/data?token=${vendorToken}`);
      const d = await r.json();
      if (d.error) { document.getElementById('sub-status').textContent = d.error; inputEl.disabled = true; sendBtn.disabled = true; return; }
      document.getElementById('sub-status').textContent = `Order ${d.orderName || ''}`;
      (d.messages||[]).forEach(addMessage);
      return;
    }
    if (!chatId) {
      const r = await fetch(`${API}/support/chat/start`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ shop_domain: location.hostname, customer_email: customerEmail }) });
      const d = await r.json();
      chatId = d.chatId; reportChatIdToParent(chatId);
      (d.messages||[]).forEach(addMessage);
      lastSeenCount = (d.messages||[]).length;
    } else {
      const r = await fetch(`${API}/support/chat/${chatId}/messages`);
      const d = await r.json();
      (d.messages||[]).forEach(addMessage);
      lastSeenCount = (d.messages||[]).length;
    }
    pollTimer = setInterval(pollNewMessages, 4000);
    showCrowGreeting();
  }

  // ── Crow mascot ──────────────────────────────────────────────────────────
  let crowGreetTimer = null;
  function showCrowGreeting() {
    const bubble = document.getElementById('crow-bubble');
    if (!bubble) return;
    bubble.classList.add('show');
    clearTimeout(crowGreetTimer);
    crowGreetTimer = setTimeout(() => bubble.classList.remove('show'), 3500);
  }
  const crowModel = document.getElementById('crow-model');
  if (crowModel) {
    crowModel.addEventListener('error', () => {
      crowModel.style.display = 'none';
      const fb = document.getElementById('crow-fallback');
      if (fb) fb.style.display = 'flex';
    });
  }
  // Re-greet every time the parent page actually opens the widget (not just
  // on the iframe's first load — the iframe stays loaded while hidden).
  window.addEventListener('message', (e) => {
    if (e.data && e.data.croscrowSupport === 'opened' && !vendorToken) showCrowGreeting();
  });

  // Switches the active conversation to a different (pre-existing) chat —
  // used by the "resume previous conversation about this order" card, so a
  // customer asking about the same order from a new device/session lands
  // back in the one continuous thread instead of fragmenting it.
  async function switchToChat(newChatId) {
    if (!newChatId || newChatId === chatId) return;
    chatId = newChatId;
    reportChatIdToParent(chatId);
    messagesEl.innerHTML = '';
    try {
      const r = await fetch(`${API}/support/chat/${chatId}/messages`);
      const d = await r.json();
      (d.messages||[]).forEach(addMessage);
      lastSeenCount = (d.messages||[]).length;
    } catch (e) {}
  }

  let lastSeenCount = 0;
  async function pollNewMessages() {
    if (!chatId) return;
    try {
      const r = await fetch(`${API}/support/chat/${chatId}/messages`);
      const d = await r.json();
      if ((d.messages||[]).length > lastSeenCount) {
        messagesEl.innerHTML = '';
        d.messages.forEach(addMessage);
        lastSeenCount = d.messages.length;
      }
    } catch(e) {}
  }

  async function send() {
    const text = inputEl.value.trim();
    if (!text) return;
    inputEl.value = ''; sendBtn.disabled = true;

    if (vendorToken) {
      addMessage({ sender:'vendor', sender_name:'You', text });
      await fetch(`${API}/support/vendor-view/reply`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ token: vendorToken, text }) });
      sendBtn.disabled = false;
      return;
    }

    addMessage({ sender:'customer', text });
    showTyping();
    try {
      const r = await fetch(`${API}/support/chat/${chatId}/message`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ text }) });
      const d = await r.json();
      hideTyping();
      if (d.messages) { lastSeenCount += d.messages.length; d.messages.filter(m=>m.sender!=='customer').forEach(addMessage); }
    } catch(e) { hideTyping(); }
    sendBtn.disabled = false;
  }

  sendBtn.onclick = send;
  inputEl.addEventListener('keydown', e => { if (e.key === 'Enter') send(); });

  init();
</script>
</body>
</html>
