<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CrosCrow Support</title>
<style>
  * { box-sizing:border-box; margin:0; padding:0; }
  html,body { height:100%; font-family:'Segoe UI',-apple-system,Arial,sans-serif; }
  body { background:#0b0f1a; color:#e2e8f0; display:flex; flex-direction:column; height:100vh; overflow:hidden; }

  .header { display:flex; align-items:center; gap:10px; padding:16px 18px; background:linear-gradient(135deg,#1a1f35,#0f1420); border-bottom:1px solid #1e2a45; flex-shrink:0; }
  .header .dot { width:9px; height:9px; border-radius:50%; background:#22c55e; box-shadow:0 0 8px #22c55e; }
  .header .title { font-size:14px; font-weight:700; letter-spacing:0.3px; }
  .header .sub { font-size:11px; color:#64748b; }
  .header .close { margin-left:auto; cursor:pointer; color:#64748b; font-size:18px; line-height:1; padding:4px; }
  .header .close:hover { color:#fff; }

  .messages { flex:1; overflow-y:auto; padding:18px; display:flex; flex-direction:column; gap:14px; }
  .messages::-webkit-scrollbar { width:5px; }
  .messages::-webkit-scrollbar-thumb { background:#1e293b; border-radius:4px; }

  .row { display:flex; gap:8px; max-width:88%; }
  .row.user { align-self:flex-end; flex-direction:row-reverse; }
  .row.bot, .row.vendor, .row.admin { align-self:flex-start; }
  .bubble { padding:10px 14px; border-radius:14px; font-size:13px; line-height:1.5; white-space:pre-wrap; }
  .row.user .bubble { background:linear-gradient(135deg,#6366f1,#4f46e5); color:#fff; border-radius:14px 14px 3px 14px; }
  .row.bot .bubble { background:#131929; border:1px solid #1e2a45; border-radius:14px 14px 14px 3px; }
  .row.vendor .bubble, .row.admin .bubble { background:#1a1f0a; border:1px solid #3a3a1e; border-radius:14px; }
  .sender-tag { font-size:9px; color:#facc15; font-weight:700; letter-spacing:0.5px; margin-bottom:4px; text-transform:uppercase; }

  .typing { align-self:flex-start; display:flex; gap:4px; padding:12px 14px; background:#131929; border:1px solid #1e2a45; border-radius:14px; }
  .typing span { width:6px; height:6px; border-radius:50%; background:#6366f1; animation:bounce 1.2s infinite; }
  .typing span:nth-child(2){animation-delay:0.15s} .typing span:nth-child(3){animation-delay:0.3s}
  @keyframes bounce { 0%,80%,100%{transform:translateY(0);opacity:0.4} 40%{transform:translateY(-4px);opacity:1} }

  /* Tracking card */
  .track-card { background:#0f172a; border:1px solid #1e2a45; border-radius:12px; padding:14px 16px; max-width:88%; align-self:flex-start; }
  .track-card .tc-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
  .track-card .tc-order { font-size:13px; font-weight:800; color:#a5b4fc; }
  .track-card .tc-stage { font-size:10px; font-weight:700; padding:3px 9px; border-radius:99px; text-transform:uppercase; letter-spacing:0.5px; }
  .progress-track { display:flex; gap:3px; margin:10px 0; }
  .progress-track .seg { flex:1; height:5px; border-radius:3px; background:#1e2a45; }
  .progress-track .seg.done { background:#6366f1; }
  .vshipment { background:#131929; border-radius:8px; padding:9px 11px; margin-top:7px; font-size:11px; }
  .vshipment .vname { font-weight:700; color:#e2e8f0; margin-bottom:3px; }
  .vshipment .vmeta { color:#64748b; }
  .tc-link { display:inline-block; margin-top:10px; font-size:11px; color:#818cf8; text-decoration:none; font-weight:700; }

  /* Product cards */
  .product-row { display:flex; gap:10px; overflow-x:auto; max-width:100%; padding-bottom:4px; align-self:flex-start; }
  .pcard { flex-shrink:0; width:120px; background:#131929; border:1px solid #1e2a45; border-radius:10px; overflow:hidden; text-decoration:none; color:inherit; }
  .pcard img { width:100%; height:90px; object-fit:cover; display:block; background:#1e2a45; }
  .pcard .pinfo { padding:8px; }
  .pcard .ptitle { font-size:11px; font-weight:600; color:#e2e8f0; line-height:1.3; max-height:28px; overflow:hidden; }
  .pcard .pprice { font-size:11px; color:#22c55e; font-weight:700; margin-top:4px; }

  .action-link { align-self:flex-start; }
  .action-link a { display:inline-block; background:#6366f1; color:#fff; text-decoration:none; font-size:12px; font-weight:700; padding:9px 18px; border-radius:9px; }

  .input-bar { display:flex; gap:8px; padding:12px 14px; border-top:1px solid #1e2a45; background:#0f1420; flex-shrink:0; }
  .input-bar input { flex:1; background:#131929; border:1px solid #1e2a45; border-radius:10px; padding:11px 14px; color:#e2e8f0; font-size:13px; outline:none; font-family:inherit; }
  .input-bar input:focus { border-color:#6366f1; }
  .input-bar button { background:#6366f1; border:none; border-radius:10px; width:42px; cursor:pointer; color:#fff; font-size:16px; }
  .input-bar button:disabled { opacity:0.5; cursor:default; }

  .vendor-banner { background:#1a1f0a; border-bottom:1px solid #3a3a1e; padding:8px 16px; font-size:11px; color:#facc15; text-align:center; flex-shrink:0; }
</style>
</head>
<body>
  <div class="header">
    <div class="dot"></div>
    <div>
      <div class="title">CrosCrow Support</div>
      <div class="sub" id="sub-status">Online · usually replies instantly</div>
    </div>
    <div class="close" onclick="parent.postMessage({croscrowSupport:'close'},'*')">✕</div>
  </div>
  <div id="vendor-banner" class="vendor-banner" style="display:none"></div>
  <div class="messages" id="messages"></div>
  <div class="input-bar">
    <input id="input" placeholder="Type your message…" />
    <button id="send-btn">➤</button>
  </div>

<script>
  const API = location.origin.includes('localhost') ? location.origin : 'https://dashboard.croscrow.com';
  const params = new URLSearchParams(location.search);
  const vendorToken = params.get('token'); // present only on vendor magic-link view
  let chatId = localStorage.getItem('cc_support_chat_id');
  let lastTs = null;
  let pollTimer = null;

  const messagesEl = document.getElementById('messages');
  const inputEl = document.getElementById('input');
  const sendBtn = document.getElementById('send-btn');

  const STAGE_ORDER = ['new','confirmed','partial','ready','pickup','transit','ofd','delivered'];

  function el(html) { const d = document.createElement('div'); d.innerHTML = html.trim(); return d.firstChild; }

  function renderTrackingCard(data) {
    const stageIdx = Math.max(0, STAGE_ORDER.indexOf(data.stage));
    const segs = STAGE_ORDER.map((s,i) => `<div class="seg ${i<=stageIdx?'done':''}"></div>`).join('');
    const stageColors = { delivered:'#10b981', rto:'#ef4444', cancelled:'#6b7280', transit:'#22d3ee', ofd:'#f59e0b' };
    const color = stageColors[data.stage] || '#6366f1';
    const vshipments = (data.vendor_shipments||[]).map(v => `
      <div class="vshipment">
        <div class="vname">${v.vendor_name}</div>
        <div class="vmeta">Stage: ${v.stage}${v.awb ? ' · AWB: '+v.awb : ''}${v.courier ? ' · '+v.courier : ''}</div>
      </div>`).join('');
    return el(`<div class="track-card">
      <div class="tc-head">
        <span class="tc-order">${data.order_name}</span>
        <span class="tc-stage" style="background:${color}22;color:${color}">${data.stage.toUpperCase()}</span>
      </div>
      <div class="progress-track">${segs}</div>
      ${vshipments}
      <a class="tc-link" href="${data.track_url}" target="_blank">View full tracking page →</a>
    </div>`);
  }

  function renderProductCards(products) {
    const cards = products.map(p => `
      <a class="pcard" href="${p.url}" target="_blank">
        <img src="${p.image||''}" onerror="this.style.opacity=0"/>
        <div class="pinfo">
          <div class="ptitle">${p.title}</div>
          <div class="pprice">From ₹${Math.round(p.price_from)}</div>
        </div>
      </a>`).join('');
    return el(`<div class="product-row">${cards}</div>`);
  }

  function renderActionLink(data) {
    return el(`<div class="action-link"><a href="${data.url}" target="_blank">${data.label} →</a></div>`);
  }

  function addMessage(m) {
    if (m.sender === 'customer') {
      const row = el(`<div class="row user"><div class="bubble">${escapeHtml(m.text)}</div></div>`);
      messagesEl.appendChild(row);
    } else if (m.sender === 'vendor' || m.sender === 'admin') {
      const row = el(`<div class="row ${m.sender}"><div class="bubble"><div class="sender-tag">${m.sender_name||m.sender}</div>${escapeHtml(m.text)}</div></div>`);
      messagesEl.appendChild(row);
    } else {
      if (m.text) {
        const row = el(`<div class="row bot"><div class="bubble">${escapeHtml(m.text)}</div></div>`);
        messagesEl.appendChild(row);
      }
      if (m.meta?.type === 'tracking_card') messagesEl.appendChild(renderTrackingCard(m.meta.data));
      else if (m.meta?.type === 'product_cards') messagesEl.appendChild(renderProductCards(m.meta.data));
      else if (m.meta?.type === 'action_link') messagesEl.appendChild(renderActionLink(m.meta.data));
    }
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function escapeHtml(s='') { return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

  function showTyping() {
    const t = el(`<div class="typing" id="typing-indicator"><span></span><span></span><span></span></div>`);
    messagesEl.appendChild(t); messagesEl.scrollTop = messagesEl.scrollHeight;
  }
  function hideTyping() { document.getElementById('typing-indicator')?.remove(); }

  async function init() {
    if (vendorToken) {
      document.getElementById('vendor-banner').style.display = 'block';
      document.getElementById('vendor-banner').textContent = '👤 Vendor view — replies here are visible to the customer';
      const r = await fetch(`${API}/support/vendor-view/data?token=${vendorToken}`);
      const d = await r.json();
      if (d.error) { document.getElementById('sub-status').textContent = d.error; inputEl.disabled = true; sendBtn.disabled = true; return; }
      document.getElementById('sub-status').textContent = `Order ${d.orderName || ''}`;
      (d.messages||[]).forEach(addMessage);
      return;
    }
    if (!chatId) {
      const r = await fetch(`${API}/support/chat/start`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ shop_domain: location.hostname }) });
      const d = await r.json();
      chatId = d.chatId; localStorage.setItem('cc_support_chat_id', chatId);
      (d.messages||[]).forEach(addMessage);
      lastSeenCount = (d.messages||[]).length;
    } else {
      const r = await fetch(`${API}/support/chat/${chatId}/messages`);
      const d = await r.json();
      (d.messages||[]).forEach(addMessage);
      lastSeenCount = (d.messages||[]).length;
    }
    pollTimer = setInterval(pollNewMessages, 4000);
  }

  let lastSeenCount = 0;
  async function pollNewMessages() {
    if (!chatId) return;
    try {
      const r = await fetch(`${API}/support/chat/${chatId}/messages`);
      const d = await r.json();
      if ((d.messages||[]).length > lastSeenCount) {
        messagesEl.innerHTML = '';
        d.messages.forEach(addMessage);
        lastSeenCount = d.messages.length;
      }
    } catch(e) {}
  }

  async function send() {
    const text = inputEl.value.trim();
    if (!text) return;
    inputEl.value = ''; sendBtn.disabled = true;

    if (vendorToken) {
      addMessage({ sender:'vendor', sender_name:'You', text });
      await fetch(`${API}/support/vendor-view/reply`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ token: vendorToken, text }) });
      sendBtn.disabled = false;
      return;
    }

    addMessage({ sender:'customer', text });
    showTyping();
    try {
      const r = await fetch(`${API}/support/chat/${chatId}/message`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ text }) });
      const d = await r.json();
      hideTyping();
      if (d.messages) { lastSeenCount += d.messages.length; d.messages.filter(m=>m.sender!=='customer').forEach(addMessage); }
    } catch(e) { hideTyping(); }
    sendBtn.disabled = false;
  }

  sendBtn.onclick = send;
  inputEl.addEventListener('keydown', e => { if (e.key === 'Enter') send(); });

  init();
</script>
</body>
</html>
