# .github/workflows/keep-alive.yml
# Pings your Render server every 10 minutes via GitHub Actions cron.
# This keeps the free tier awake 24/7 — completely free.
#
# SETUP:
#   1. In your GitHub repo → Settings → Secrets → Actions
#   2. Add secret: RENDER_URL = https://YOUR-APP.onrender.com

name: Keep Render Alive

on:
  schedule:
    # Runs every 10 minutes
    - cron: "*/10 * * * *"
  workflow_dispatch: # Allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping JARVIS server
        run: |
          echo "Pinging ${{ secrets.RENDER_URL }}/health"
          curl --fail --silent --show-error "${{ secrets.RENDER_URL }}/health" | python3 -m json.tool
          echo "✅ Server is awake"
