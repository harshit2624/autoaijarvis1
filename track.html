<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Track Your Order — CrosCrow</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #ffffff;
      --bg-card:   #ffffff;
      --bg-card2:  #f7f7f7;
      --bg-hover:  #f2f2f2;
      --border:    #ebebeb;
      --border-hi: #d4d4d4;
      --accent:    #0a0a0a;
      --accent-dim:#f2f2f2;
      --accent-mid:#6b6b6b;
      --red:       #c00000;
      --red-bg:    #fff5f5;
      --red-border:#ffd0d0;
      --text:      #0a0a0a;
      --text-muted:#8c8c8c;
      --text-dim:  #4a4a4a;
      --shadow:    0 1px 4px rgba(0,0,0,0.06);
      --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
      --shadow-lg: 0 8px 32px rgba(0,0,0,0.10);
      --radius:    10px;
      --radius-sm: 7px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #ddd; border-radius: 4px; }

    .page-wrap {
      max-width: 600px;
      margin: 0 auto;
      padding: 20px 16px 48px;
    }

    /* Header */
    .header {
      text-align: center;
      padding: 20px 0 18px;
    }
    .header-logo { margin: 0 auto 8px; display: flex; align-items: center; justify-content: center; }
    .header-sub {
      font-size: 12px; color: var(--text-muted); margin-top: 4px; font-weight: 400; letter-spacing: 0.1px;
    }

    /* Divider */
    .divider { height: 1px; background: var(--border); margin: 0 0 16px; }

    /* Search card */
    .search-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px;
      margin-bottom: 14px;
      box-shadow: var(--shadow);
    }
    .search-row { display: flex; gap: 10px; flex-wrap: wrap; }
    .search-field { flex: 1; min-width: 130px; }
    .field-label {
      font-size: 10px; font-weight: 600; letter-spacing: 0.8px; text-transform: uppercase;
      color: var(--text-muted); margin-bottom: 6px; display: block;
    }
    .field-input {
      width: 100%; background: var(--bg-card2); border: 1.5px solid var(--border);
      border-radius: var(--radius-sm); padding: 10px 13px; color: var(--text);
      font-family: inherit; font-size: 13px; font-weight: 400;
      outline: none; transition: border-color 0.12s, box-shadow 0.12s;
    }
    .field-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(10,10,10,0.07); background: #fff; }
    .field-input::placeholder { color: #b8b8b8; }

    .btn {
      padding: 10px 20px; border-radius: var(--radius-sm); border: none; cursor: pointer;
      font-family: inherit; font-size: 13px; font-weight: 600; letter-spacing: 0.1px;
      transition: all 0.12s; display: inline-flex; align-items: center; gap: 6px;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover:not(:disabled) { background: #222; box-shadow: var(--shadow-md); }
    .btn-primary:active:not(:disabled) { background: #000; transform: translateY(1px); }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-ghost { background: transparent; color: var(--text-dim); border: 1.5px solid var(--border); }
    .btn-ghost:hover { border-color: var(--border-hi); background: var(--bg-card2); }
    .btn-full { width: 100%; justify-content: center; margin-top: 12px; }
    /* keep old class working */
    .btn-green { background: var(--accent); color: #fff; }
    .btn-green:hover:not(:disabled) { background: #222; }
    .btn-green:disabled { opacity: 0.4; cursor: not-allowed; }

    .alert {
      border-radius: var(--radius-sm); padding: 10px 13px; font-size: 12px;
      margin-bottom: 12px; font-weight: 500;
    }
    .alert-error { background: var(--red-bg); border: 1px solid var(--red-border); color: var(--red); }
    .alert-success { background: #f2f2f2; border: 1px solid var(--border); color: var(--accent); }

    /* Order result card */
    .order-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 12px;
      overflow: hidden;
      box-shadow: var(--shadow);
      animation: fadeIn 0.25s ease;
    }
    @keyframes fadeIn { from { opacity:0; transform:translateY(5px); } to { opacity:1; transform:none; } }

    .order-header {
      padding: 16px 18px;
      border-bottom: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: flex-start; gap: 12px;
      flex-wrap: wrap;
    }
    .order-name { font-size: 17px; font-weight: 800; color: var(--accent); letter-spacing: -0.3px; }
    .order-date { font-size: 11px; color: var(--text-muted); margin-top: 3px; }
    .order-customer { font-size: 12px; color: var(--text-dim); margin-top: 2px; font-weight: 500; }

    /* Stage badge */
    .stage-pill {
      padding: 4px 10px; border-radius: 4px; font-size: 10px; font-weight: 700;
      letter-spacing: 0.8px; text-transform: uppercase; white-space: nowrap;
    }
    .stage-new       { background:#f2f2f2; color:#555; border:1px solid #e0e0e0; }
    .stage-confirmed { background:#0a0a0a; color:#fff; border:1px solid #0a0a0a; }
    .stage-partial   { background:#fff8e6; color:#a05800; border:1px solid #fde9a0; }
    .stage-hold      { background:#fff3ed; color:#b84000; border:1px solid #fcd9be; }
    .stage-ready     { background:#f0f0ff; color:#4433cc; border:1px solid #d8d4ff; }
    .stage-pickup    { background:#f0f0ff; color:#4433cc; border:1px solid #d8d4ff; }
    .stage-transit   { background:#e8f4ff; color:#0055cc; border:1px solid #bbd8ff; }
    .stage-ofd       { background:#fff4e6; color:#b45309; border:1px solid #fcd6a0; }
    .stage-delivered { background:#e8fff4; color:#007a3a; border:1px solid #9fedd0; }
    .stage-rto       { background:var(--red-bg); color:var(--red); border:1px solid var(--red-border); }
    .stage-cancelled { background:#f7f7f7; color:#999; border:1px solid #e5e5e5; }

    /* AWB row */
    .awb-row {
      padding: 11px 18px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
      font-size: 12px; background: var(--bg-card2);
    }
    .awb-label { color: var(--text-muted); font-size: 10px; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase; }
    .awb-value { color: var(--accent); font-weight: 600; font-family: 'SF Mono', monospace; font-size: 12px; }
    .awb-link { color: var(--accent); text-decoration: none; font-size: 11px; font-weight: 600; border-bottom: 1px solid var(--border-hi); }
    .awb-link:hover { border-bottom-color: var(--accent); }

    /* Items list */
    .items-section { padding: 14px 18px; border-bottom: 1px solid var(--border); }
    .items-title { font-size: 10px; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 10px; }
    .item-row {
      display: flex; justify-content: space-between; align-items: flex-start;
      padding: 8px 0; border-bottom: 1px solid var(--border); gap: 12px;
    }
    .item-row:last-child { border-bottom: none; }
    .item-title { font-size: 13px; color: var(--text); font-weight: 500; line-height: 1.4; }
    .item-variant { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
    .item-price { font-size: 13px; color: var(--accent); white-space: nowrap; font-weight: 700; }
    .item-qty { font-size: 11px; color: var(--text-muted); margin-top: 2px; text-align: right; }

    /* Action tiles */
    .tiles-row {
      display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
      padding: 14px 18px;
    }
    .tile {
      border-radius: var(--radius); padding: 16px 14px; cursor: pointer;
      border: 1.5px solid var(--border); transition: all 0.15s;
      background: var(--bg-card); position: relative; overflow: hidden;
    }
    .tile:hover:not(.tile-disabled) { border-color: var(--accent); transform: translateY(-1px); box-shadow: var(--shadow-md); }
    .tile:active:not(.tile-disabled) { transform: translateY(0); box-shadow: var(--shadow); }
    .tile-disabled { opacity: 0.45; cursor: not-allowed; }
    .tile-exchange:hover:not(.tile-disabled) { background: #fafafa; }
    .tile-return:hover:not(.tile-disabled) { background: #fafafa; }
    .tile-return-disabled { border-color: var(--red-border) !important; background: var(--red-bg) !important; opacity:1 !important; }

    .tile-icon { font-size: 20px; margin-bottom: 8px; line-height: 1; }
    .tile-label { font-size: 13px; font-weight: 700; color: var(--text); letter-spacing: -0.1px; }
    .tile-desc { font-size: 11px; color: var(--text-muted); margin-top: 3px; line-height: 1.5; font-weight: 400; }

    /* Request form */
    .form-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px;
      margin-bottom: 12px;
      box-shadow: var(--shadow);
      animation: fadeIn 0.25s ease;
    }
    .form-title { font-size: 14px; font-weight: 700; margin-bottom: 14px; color: var(--text); display: flex; align-items: center; gap: 8px; letter-spacing: -0.1px; }
    .form-section-label { font-size: 10px; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px; display: block; }

    .item-check-row {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 10px 12px;
      border-radius: var(--radius-sm); border: 1.5px solid var(--border);
      background: var(--bg-card2); margin-bottom: 7px;
      transition: border-color 0.12s, background 0.12s;
    }
    .item-check-row.selected { border-color: var(--accent); background: #fafafa; }
    .item-check-row input[type=checkbox] {
      accent-color: var(--accent); width: 15px; height: 15px; margin-top: 2px; flex-shrink: 0;
    }
    .item-check-body { flex: 1; }
    .item-check-title { font-size: 13px; color: var(--text); font-weight: 500; }
    .item-check-variant { font-size: 11px; color: var(--text-muted); margin-top: 1px; }

    .qty-row { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
    .qty-label { font-size: 11px; color: var(--text-muted); font-weight: 500; }
    .qty-select {
      background: #fff; border: 1.5px solid var(--border); border-radius: 5px;
      color: var(--text); font-family: inherit; font-size: 12px; padding: 4px 8px; outline: none;
    }

    .variant-select-row { margin-top: 9px; }
    .variant-select {
      width: 100%; background: #fff; border: 1.5px solid var(--border-hi);
      border-radius: var(--radius-sm); color: var(--text); font-family: inherit;
      font-size: 13px; padding: 8px 11px; outline: none; transition: border-color 0.12s;
    }
    .variant-select:focus { border-color: var(--accent); }

    .reason-textarea {
      width: 100%; background: var(--bg-card2); border: 1.5px solid var(--border);
      border-radius: var(--radius-sm); padding: 10px 13px; color: var(--text);
      font-family: inherit; font-size: 13px; line-height: 1.6;
      outline: none; resize: vertical; min-height: 75px; transition: border-color 0.12s;
    }
    .reason-textarea:focus { border-color: var(--accent); background: #fff; }
    .reason-textarea::placeholder { color: #bbb; }

    /* Confirmation */
    .confirm-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px 24px;
      text-align: center;
      box-shadow: var(--shadow-md);
      animation: fadeIn 0.3s ease;
    }
    .confirm-icon { font-size: 40px; margin-bottom: 14px; }
    .confirm-title { font-size: 18px; font-weight: 800; color: var(--accent); margin-bottom: 6px; letter-spacing: -0.3px; }
    .confirm-sub { font-size: 12px; color: var(--text-muted); line-height: 1.8; }
    .confirm-id {
      display: inline-block; background: var(--accent); border-radius: var(--radius-sm);
      padding: 9px 20px; font-size: 13px; font-weight: 700;
      color: #fff; letter-spacing: 2px; margin: 14px 0; font-family: 'SF Mono', monospace;
    }

    .spin { display: inline-block; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Stage progress bar */
    .stage-bar {
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-card2);
    }
    .stage-bar-label { font-size: 10px; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 12px; }
    .stage-steps { display: flex; align-items: center; }
    .stage-step { display: flex; flex-direction: column; align-items: center; flex: 1; }
    .stage-dot {
      width: 9px; height: 9px; border-radius: 50%; background: #ddd;
      position: relative; z-index: 1; transition: background 0.2s;
    }
    .stage-dot.done { background: var(--accent); }
    .stage-dot.active { background: var(--accent); box-shadow: 0 0 0 3px rgba(10,10,10,0.12); animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{box-shadow:0 0 0 3px rgba(10,10,10,0.10)} 50%{box-shadow:0 0 0 5px rgba(10,10,10,0.06)} }
    .stage-line {
      flex: 1; height: 1.5px; background: #e0e0e0; margin: 0 -1px;
      position: relative; top: -12px; transition: background 0.2s;
    }
    .stage-line.done { background: var(--accent); }
    .stage-step-label {
      font-size: 9px; color: var(--text-muted); margin-top: 6px; letter-spacing: 0.2px;
      white-space: nowrap; font-weight: 500;
    }
    .stage-step-label.active { color: var(--accent); font-weight: 700; }
    .stage-step-label.done { color: var(--accent); }

    @media (max-width: 480px) {
      .tiles-row { grid-template-columns: 1fr; }
      .search-row { flex-direction: column; }
      .order-header { flex-direction: column; }
      .page-wrap { padding: 12px 12px 36px; }
    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { useState, useEffect, useCallback } = React;

  const API = window.location.origin;

  const STAGE_STEPS = ['confirmed','ready','pickup','transit','ofd','delivered'];
  const STAGE_LABELS = { new:'New', confirmed:'Confirmed', partial:'Partial', hold:'On Hold', ready:'Packed', pickup:'Picked Up', transit:'In Transit', ofd:'Out for Delivery', delivered:'Delivered', rto:'Returned', cancelled:'Cancelled' };

  function stagePillClass(stage) {
    const map = { new:'stage-new', confirmed:'stage-confirmed', partial:'stage-partial', hold:'stage-hold', ready:'stage-ready', pickup:'stage-pickup', transit:'stage-transit', ofd:'stage-ofd', delivered:'stage-delivered', rto:'stage-rto', cancelled:'stage-cancelled' };
    return 'stage-pill ' + (map[stage] || 'stage-new');
  }

  function VendorShipmentCard({ vs, shopifyOrderId, index, total, singleVendor }) {
    const [shipment, setShipment] = React.useState(vs);
    const [refreshing, setRefreshing] = React.useState(false);
    const [msg, setMsg] = React.useState('');

    const refresh = async () => {
      if (!shipment.awb) return;
      setRefreshing(true); setMsg('');
      try {
        const params = new URLSearchParams({ awb: shipment.awb, shopify_order_id: shopifyOrderId, vendor_name: shipment.vendor_name });
        const r = await fetch(`${API}/track/shipment-status?${params}`);
        const d = await r.json();
        if (d.stage || d.status) {
          setShipment(prev => ({ ...prev, stage: d.stage || prev.stage, awb_status: d.status, history: d.history, tag: d.tag }));
        }
        if (d.message) setMsg(d.message);
      } catch {}
      setRefreshing(false);
    };

    return (
      <div style={{marginBottom: index < total-1 ? 16 : 0, padding: singleVendor ? '0' : '12px 14px', borderRadius: singleVendor ? 0 : 10, background: singleVendor ? 'transparent' : '#f8f9ff', border: singleVendor ? 'none' : '1px solid #e8eaf6'}}>
        <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:8}}>
          {!singleVendor && <div style={{fontSize:12, fontWeight:700, color:'#002eff'}}>📦 Shipment {index+1} — {shipment.vendor_name}</div>}
          <div style={{display:'flex', alignItems:'center', gap:8, marginLeft: singleVendor ? 'auto' : 0}}>
            {singleVendor && <div className={stagePillClass(shipment.stage)} style={{fontSize:10}}>{STAGE_LABELS[shipment.stage] || shipment.stage}</div>}
            {shipment.awb && (
              <button onClick={refresh} disabled={refreshing}
                style={{background:'none',border:'1px solid #d8d4ff',borderRadius:6,color:'#4433cc',cursor:'pointer',fontSize:10,padding:'3px 8px',display:'flex',alignItems:'center',gap:3}}>
                {refreshing ? '…' : '↻ Refresh'}
              </button>
            )}
          </div>
        </div>
        <StageProgress stage={shipment.stage}/>
        {shipment.awb && (
          <div className="awb-row" style={{marginTop:8}}>
            <span className="awb-label">AWB</span>
            <span className="awb-value">{shipment.awb}</span>
            {shipment.courier && <span style={{fontSize:10,color:'var(--text-muted)',marginLeft:6}}>{shipment.courier}</span>}
            {shipment.tracking_url && <a className="awb-link" href={shipment.tracking_url} target="_blank" rel="noopener noreferrer">🔗 Track →</a>}
          </div>
        )}
        {msg && <div style={{fontSize:10,color:'#4433cc',marginTop:6}}>{msg}</div>}
        {shipment.awb_status && (
          <div style={{fontSize:11,color:'#333',marginTop:6,fontWeight:600}}>{shipment.awb_status}
            {shipment.tag && <span style={{marginLeft:8,fontSize:10,background:'#f0f0ff',border:'1px solid #d8d4ff',color:'#4433cc',borderRadius:99,padding:'2px 8px'}}>{shipment.tag}</span>}
          </div>
        )}
        {shipment.history?.length > 0 && (
          <div style={{marginTop:8,borderTop:'1px solid #e8eaf6',paddingTop:8}}>
            {shipment.history.map((h,i)=>(
              <div key={i} style={{display:'flex',gap:8,fontSize:10,color:i===shipment.history.length-1?'#333':'#888',marginBottom:3}}>
                <span style={{whiteSpace:'nowrap',minWidth:90}}>{h.ActionDate} {h.ActionTime}</span>
                <span>{h.ActionDescription}{h.ActionLocation?` · ${h.ActionLocation}`:''}</span>
              </div>
            ))}
          </div>
        )}
        {!singleVendor && shipment.items?.length > 0 && (
          <div style={{marginTop:8, fontSize:11, color:'var(--text-muted)'}}>
            {shipment.items.map(it => (
              <div key={it.line_item_id} style={{padding:'4px 0', borderBottom:'1px solid #eee'}}>
                {it.title}{it.variant_title ? ` · ${it.variant_title}` : ''} × {it.qty}
              </div>
            ))}
          </div>
        )}
      </div>
    );
  }

  function StageProgress({ stage }) {
    const isRto = stage === 'rto';
    const idx = isRto ? STAGE_STEPS.indexOf('transit') : STAGE_STEPS.indexOf(stage);
    return (
      <div className="stage-bar">
        <div className="stage-bar-label">Delivery Progress</div>
        {isRto && (
          <div style={{marginBottom:10,padding:'7px 12px',borderRadius:8,background:'#fff0f0',border:'1px solid #ffb3b3',color:'#cc0000',fontSize:12,fontWeight:600}}>
            🔄 Shipment is being returned to origin
          </div>
        )}
        <div className="stage-steps">
          {STAGE_STEPS.map((s, i) => {
            const done = isRto ? i < idx : (idx > i);
            const active = isRto ? false : (idx === i);
            const isLast = i === STAGE_STEPS.length - 1;
            return (
              <React.Fragment key={s}>
                <div className="stage-step">
                  <div className={`stage-dot ${done?'done':''} ${active?'active':''}`}/>
                  <div className={`stage-step-label ${done?'done':''} ${active?'active':''}`}>{STAGE_LABELS[s]}</div>
                </div>
                {!isLast && <div className={`stage-line ${done?'done':''}`}/>}
              </React.Fragment>
            );
          })}
        </div>
      </div>
    );
  }

  function ItemCheckRow({ item, checked, onCheck, qty, onQtyChange, showVariants, variants, loadingVariants, exchangeVariantId, onVariantChange }) {
    return (
      <div className={`item-check-row ${checked?'selected':''}`}>
        <input type="checkbox" checked={checked} onChange={e=>onCheck(e.target.checked)}/>
        <div className="item-check-body">
          <div className="item-check-title">{item.title}</div>
          {item.variant_title && <div className="item-check-variant">{item.variant_title}</div>}
          {checked && (
            <div className="qty-row">
              <span className="qty-label">Qty:</span>
              <select className="qty-select" value={qty} onChange={e=>onQtyChange(Number(e.target.value))}>
                {Array.from({length:item.qty},(_,i)=><option key={i+1} value={i+1}>{i+1}</option>)}
              </select>
            </div>
          )}
          {checked && showVariants && (
            <div className="variant-select-row">
              <div style={{fontSize:10,color:'var(--text-muted)',marginBottom:5}}>Select exchange size/variant:</div>
              {loadingVariants ? (
                <div style={{fontSize:11,color:'var(--text-muted)'}}><span className="spin">↻</span> Loading variants…</div>
              ) : (
                <select className="variant-select" value={exchangeVariantId||''} onChange={e=>onVariantChange(e.target.value, variants.find(v=>String(v.id)===e.target.value)?.title)}>
                  <option value="">— Select size/variant —</option>
                  {variants.map(v=>(
                    <option key={v.id} value={v.id} disabled={!v.available}>{v.title}{!v.available?' (out of stock)':''}</option>
                  ))}
                </select>
              )}
            </div>
          )}
        </div>
      </div>
    );
  }

  function RequestForm({ order, type, onSuccess, onCancel }) {
    const [selectedItems, setSelectedItems] = useState({}); // line_item_id → {checked,qty,exchangeVariantId,exchangeSizeLabel}
    const [variantCache, setVariantCache] = useState({});
    const [loadingVariants, setLoadingVariants] = useState({});
    const [reason, setReason] = useState('');
    const [submitting, setSubmitting] = useState(false);
    const [error, setError] = useState(null);

    // Fetch variants when item is checked (exchange only)
    const handleCheck = useCallback(async (item, checked) => {
      setSelectedItems(prev => ({
        ...prev,
        [item.line_item_id]: checked
          ? { checked: true, qty: 1, exchangeVariantId: '', exchangeSizeLabel: '' }
          : { checked: false }
      }));
      if (checked && type === 'exchange' && item.product_id && !variantCache[item.product_id]) {
        setLoadingVariants(p => ({ ...p, [item.product_id]: true }));
        try {
          const r = await fetch(`${API}/track/product/${item.product_id}/variants`);
          const d = await r.json();
          setVariantCache(p => ({ ...p, [item.product_id]: d.variants || [] }));
        } catch {}
        setLoadingVariants(p => ({ ...p, [item.product_id]: false }));
      }
    }, [type, variantCache]);

    const handleQtyChange = (id, qty) => setSelectedItems(p => ({ ...p, [id]: { ...p[id], qty } }));
    const handleVariantChange = (productId, lineItemId, variantId, sizeLabel) => {
      setSelectedItems(p => ({ ...p, [lineItemId]: { ...p[lineItemId], exchangeVariantId: variantId, exchangeSizeLabel: sizeLabel } }));
    };

    const checkedItems = (order.items || []).filter(it => selectedItems[it.line_item_id]?.checked);

    const submit = async () => {
      if (!checkedItems.length) { setError('Please select at least one item.'); return; }
      if (!reason.trim()) { setError('Please provide a reason.'); return; }
      if (type === 'exchange') {
        const missing = checkedItems.find(it => !selectedItems[it.line_item_id]?.exchangeVariantId);
        if (missing) { setError('Please select an exchange variant for each selected item.'); return; }
      }

      setSubmitting(true); setError(null);
      const vendorName = checkedItems[0]?.vendor || '';
      const items = checkedItems.map(it => {
        const sel = selectedItems[it.line_item_id];
        return {
          line_item_id: it.line_item_id,
          variant_id: it.variant_id,
          title: it.title,
          variant_title: it.variant_title,
          qty: sel.qty,
          price: it.price,
          exchange_variant_id: sel.exchangeVariantId || null,
          exchange_size_label: sel.exchangeSizeLabel || null,
        };
      });
      try {
        const r = await fetch(`${API}/track/request`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            shopify_order_id: order.shopify_order_id,
            order_name: order.order_name,
            customer_email: order.customer_email,
            customer_name: order.customer_name,
            customer_phone: order.customer_phone,
            type,
            items,
            reason: reason.trim(),
            vendor_name: vendorName,
          }),
        });
        const d = await r.json();
        if (!r.ok) throw new Error(d.error);
        onSuccess(d.request_id);
      } catch(e) { setError(e.message); }
      setSubmitting(false);
    };

    return (
      <div className="form-card">
        <div className="form-title">
          {type === 'exchange' ? '🔄' : '↩'} {type === 'exchange' ? 'Exchange' : 'Return'} Request
          <span style={{fontSize:11,color:'var(--text-muted)',fontWeight:400}}>— {order.order_name}</span>
        </div>

        {error && <div className="alert alert-error">⚠ {error}</div>}

        <span className="form-section-label">Select items</span>
        {(order.items || []).map(item => (
          <ItemCheckRow
            key={item.line_item_id}
            item={item}
            checked={!!selectedItems[item.line_item_id]?.checked}
            onCheck={checked => handleCheck(item, checked)}
            qty={selectedItems[item.line_item_id]?.qty || 1}
            onQtyChange={qty => handleQtyChange(item.line_item_id, qty)}
            showVariants={type === 'exchange'}
            variants={variantCache[item.product_id] || []}
            loadingVariants={!!loadingVariants[item.product_id]}
            exchangeVariantId={selectedItems[item.line_item_id]?.exchangeVariantId}
            onVariantChange={(varId, sizeLabel) => handleVariantChange(item.product_id, item.line_item_id, varId, sizeLabel)}
          />
        ))}

        <div style={{marginTop:16,marginBottom:16}}>
          <span className="form-section-label">Reason <span style={{color:'var(--red)'}}>*</span></span>
          <textarea
            className="reason-textarea"
            placeholder={type === 'exchange' ? 'E.g. Wrong size ordered, would like to exchange for L instead of M.' : 'E.g. Product damaged on arrival / not as described.'}
            value={reason}
            onChange={e => setReason(e.target.value)}
          />
        </div>

        <div style={{display:'flex',gap:10,flexWrap:'wrap'}}>
          <button className="btn btn-green" onClick={submit} disabled={submitting}>
            {submitting ? <><span className="spin">↻</span> Submitting…</> : `Submit ${type === 'exchange' ? 'Exchange' : 'Return'} Request`}
          </button>
          <button className="btn" style={{background:'var(--bg-card2)',border:'1px solid var(--border)',color:'var(--text-muted)'}} onClick={onCancel} disabled={submitting}>
            Cancel
          </button>
        </div>
      </div>
    );
  }


  function App() {
    const [orderNum, setOrderNum]   = useState('');
    const [contact,  setContact]    = useState(''); // email or phone
    const [loading,  setLoading]    = useState(false);
    const [error,    setError]      = useState(null);
    const [order,    setOrder]      = useState(null);
    const [activeForm,  setActiveForm]  = useState(null);
    const [confirmed,   setConfirmed]   = useState(null);

    // "Find my orders" mode
    const [findMode,    setFindMode]    = useState(false);
    const [findContact, setFindContact] = useState('');
    const [findLoading, setFindLoading] = useState(false);
    const [findError,   setFindError]   = useState(null);
    const [orderList,   setOrderList]   = useState(null); // array of orders

    const resetResult = () => { setOrder(null); setActiveForm(null); setConfirmed(null); setOrderList(null); };

    const lookup = async () => {
      const contactVal = contact.trim();
      if (!orderNum.trim()) { setError('Please enter your order number.'); return; }
      if (!contactVal) { setError('Please enter your email or mobile number.'); return; }
      setLoading(true); setError(null); resetResult();
      try {
        const r = await fetch(`${API}/track/order?q=${encodeURIComponent(orderNum.trim())}&contact=${encodeURIComponent(contactVal)}`);
        const d = await r.json();
        if (!r.ok) throw new Error(d.error);
        setOrder(d);
      } catch(e) { setError(e.message); }
      setLoading(false);
    };

    const findMyOrders = async () => {
      if (!findContact.trim()) { setFindError('Enter your email or mobile number.'); return; }
      setFindLoading(true); setFindError(null); setOrderList(null);
      try {
        const r = await fetch(`${API}/track/my-orders?contact=${encodeURIComponent(findContact.trim())}`);
        const d = await r.json();
        if (!r.ok) throw new Error(d.error);
        setOrderList(d.orders);
      } catch(e) { setFindError(e.message); }
      setFindLoading(false);
    };

    const selectOrder = async (shopifyId) => {
      setLoading(true); setError(null); setOrder(null); setActiveForm(null); setConfirmed(null);
      try {
        const r = await fetch(`${API}/track/order-by-id?id=${shopifyId}`);
        const d = await r.json();
        if (!r.ok) throw new Error(d.error);
        setOrder(d); setOrderList(null); setFindMode(false);
      } catch(e) { setError(e.message); }
      setLoading(false);
    };

    const handleSuccess = (requestId) => {
      setActiveForm(null);
      setConfirmed(requestId);
    };

    const returnCfg = order ? (() => {
      // Collect return config across all vendors — if ANY vendor disables returns, show disabled
      const cfgs = Object.values(order.return_configs || {});
      if (!cfgs.length) return { return_enabled: true };
      return { return_enabled: cfgs.every(c => c.return_enabled !== false) };
    })() : null;

    return (
      <div className="page-wrap">
        <div className="header">
          <div className="header-logo">
            <img src="/croscrow-logo.png" alt="CrosCrow" style={{height:48,width:'auto',borderRadius:8}}/>
          </div>
          <div className="header-sub" style={{marginTop:8}}>Track your order · Request returns & exchanges</div>
        </div>

        {/* Search */}
        <div className="search-card">
          {/* Toggle: normal vs find-my-orders */}
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
            <span style={{fontSize:12,fontWeight:600,color:'var(--text)'}}>
              {findMode ? '🔍 Find My Orders' : '📦 Track by Order Number'}
            </span>
            <button onClick={()=>{setFindMode(m=>!m);resetResult();setError(null);setFindError(null);}} style={{
              background: findMode?'var(--green)':'var(--bg-card2)',
              border:`1px solid ${findMode?'var(--green)':'var(--border)'}`,
              borderRadius:20, padding:'3px 10px', cursor:'pointer',
              fontSize:10, fontWeight:600, color: findMode?'#fff':'var(--text-muted)',
              fontFamily:'inherit', transition:'all 0.2s', display:'flex', alignItems:'center', gap:5,
            }}>
              <span style={{
                display:'inline-block', width:28, height:14, borderRadius:7,
                background: findMode?'rgba(255,255,255,0.3)':'var(--border)',
                position:'relative', transition:'all 0.2s',
              }}>
                <span style={{
                  position:'absolute', top:2, left: findMode?14:2, width:10, height:10,
                  borderRadius:'50%', background: findMode?'#fff':'var(--text-muted)',
                  transition:'left 0.2s',
                }}/>
              </span>
              {findMode ? "Don't know order #" : "Don't know order #"}
            </button>
          </div>

          {!findMode ? (
            <>
              <div className="search-row">
                <div className="search-field">
                  <label className="field-label">Order Number</label>
                  <input className="field-input" placeholder="#1905 or 1905"
                    value={orderNum} onChange={e=>setOrderNum(e.target.value)} onKeyDown={e=>e.key==='Enter'&&lookup()}/>
                </div>
                <div className="search-field">
                  <label className="field-label">Email or Mobile</label>
                  <input className="field-input" placeholder="you@example.com or 98765 43210"
                    value={contact} onChange={e=>setContact(e.target.value)} onKeyDown={e=>e.key==='Enter'&&lookup()}/>
                </div>
              </div>
              {error && <div className="alert alert-error" style={{marginTop:10,marginBottom:0}}>⚠ {error}</div>}
              <button className="btn btn-green btn-full" onClick={lookup} disabled={loading}>
                {loading ? <><span className="spin">↻</span> Searching…</> : '🔍 Track Order'}
              </button>
            </>
          ) : (
            <>
              <div style={{marginBottom:10}}>
                <label className="field-label">Email or Mobile Number</label>
                <input className="field-input" placeholder="you@example.com or 98765 43210"
                  value={findContact} onChange={e=>setFindContact(e.target.value)} onKeyDown={e=>e.key==='Enter'&&findMyOrders()}/>
              </div>
              {findError && <div className="alert alert-error" style={{marginBottom:8}}>⚠ {findError}</div>}
              <button className="btn btn-green btn-full" onClick={findMyOrders} disabled={findLoading}>
                {findLoading ? <><span className="spin">↻</span> Searching…</> : '🔍 Find My Orders'}
              </button>

              {/* Order list */}
              {orderList && (
                <div style={{marginTop:14}}>
                  <div style={{fontSize:11,color:'var(--text-muted)',marginBottom:8,fontWeight:500}}>
                    {orderList.length} order{orderList.length!==1?'s':''} found — select one to track
                  </div>
                  {orderList.map(o=>(
                    <div key={o.shopify_order_id} onClick={()=>selectOrder(o.shopify_order_id)}
                      style={{
                        display:'flex', alignItems:'center', justifyContent:'space-between', gap:10,
                        padding:'10px 12px', borderRadius:8, border:'1px solid var(--border)',
                        background:'var(--bg-card2)', marginBottom:6, cursor:'pointer',
                        transition:'all 0.15s',
                      }}
                      onMouseEnter={e=>{ e.currentTarget.style.borderColor='var(--green)'; e.currentTarget.style.background='var(--bg-hover)'; }}
                      onMouseLeave={e=>{ e.currentTarget.style.borderColor='var(--border)'; e.currentTarget.style.background='var(--bg-card2)'; }}
                    >
                      <div>
                        <div style={{fontWeight:700,fontSize:13,color:'var(--green)'}}>{o.order_name}</div>
                        <div style={{fontSize:11,color:'var(--text-muted)',marginTop:2}}>{o.items_preview}{o.item_count>2?` +${o.item_count-2} more`:''}</div>
                        <div style={{fontSize:10,color:'var(--text-muted)',marginTop:1}}>{new Date(o.created_at).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'})}</div>
                      </div>
                      <div style={{textAlign:'right',flexShrink:0}}>
                        <div className={stagePillClass(o.stage)} style={{marginBottom:4}}>{STAGE_LABELS[o.stage]||o.stage}</div>
                        <div style={{fontSize:11,fontWeight:600,color:'var(--text)'}}>₹{parseFloat(o.total).toFixed(0)}</div>
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </>
          )}
        </div>

        {/* Order Result */}
        {order && !confirmed && (
          <>
            <div className="order-card">
              <div className="order-header">
                <div>
                  <div className="order-name">{order.order_name}</div>
                  <div className="order-customer">{order.customer_name}</div>
                  <div className="order-date">{order.created_at ? new Date(order.created_at).toLocaleDateString('en-IN',{day:'numeric',month:'long',year:'numeric'}) : ''}</div>
                </div>
                <div style={{textAlign:'right'}}>
                  <div className={stagePillClass(order.stage)}>{STAGE_LABELS[order.stage] || order.stage}</div>
                  {order.financial_status && <div style={{fontSize:10,color:'var(--text-muted)',marginTop:5}}>{order.financial_status}</div>}
                </div>
              </div>

              {/* Shipment progress — single vendor uses first vendorShipment, multi-vendor shows cards */}
              {(order.vendor_shipments?.length > 1) ? (
                <div style={{marginBottom:12}}>
                  {order.vendor_shipments.map((vs, i) => (
                    <VendorShipmentCard key={vs.vendor_name} vs={vs} shopifyOrderId={String(order.shopify_order_id)} index={i} total={order.vendor_shipments.length}/>
                  ))}
                </div>
              ) : (
                <VendorShipmentCard
                  vs={order.vendor_shipments?.[0] || { vendor_name: '', stage: order.stage, awb: order.awb, courier: order.vendor_shipments?.[0]?.courier || '', tracking_url: order.tracking_url, items: [] }}
                  shopifyOrderId={String(order.shopify_order_id)}
                  index={0}
                  total={1}
                  singleVendor={true}
                />
              )}

              <div className="items-section">
                <div className="items-title">Items in this order ({order.items?.length})</div>
                {(order.items || []).map(item => (
                  <div key={item.line_item_id} className="item-row">
                    <div>
                      <div className="item-title">{item.title}</div>
                      {item.variant_title && <div className="item-variant">{item.variant_title}</div>}
                    </div>
                    <div style={{textAlign:'right'}}>
                      <div className="item-price">₹{parseFloat(item.price).toFixed(2)}</div>
                      <div className="item-qty">Qty: {item.qty}</div>
                    </div>
                  </div>
                ))}
              </div>

              {/* Action tiles */}
              {!activeForm && (
                <div className="tiles-row">
                  <div
                    className="tile tile-exchange"
                    onClick={() => setActiveForm('exchange')}
                    title="Request an exchange"
                  >
                    <div className="tile-icon">🔄</div>
                    <div className="tile-label">Exchange</div>
                    <div className="tile-desc">Swap for a different size or variant</div>
                  </div>

                  {returnCfg?.return_enabled ? (
                    <div
                      className="tile tile-return"
                      onClick={() => setActiveForm('return')}
                      title="Request a return"
                    >
                      <div className="tile-icon">↩</div>
                      <div className="tile-label">Return</div>
                      <div className="tile-desc">Return items for a refund or credit</div>
                    </div>
                  ) : (
                    <div className="tile tile-disabled tile-return-disabled" title="Returns not accepted">
                      <div className="tile-icon">↩</div>
                      <div className="tile-label" style={{color:'var(--red)'}}>Return</div>
                      <div className="tile-desc" style={{color:'var(--red)'}}>Returns not accepted by this vendor</div>
                    </div>
                  )}
                </div>
              )}
            </div>

            {/* Request Form */}
            {activeForm && (
              <RequestForm
                order={order}
                type={activeForm}
                onSuccess={handleSuccess}
                onCancel={() => setActiveForm(null)}
              />
            )}
          </>
        )}

        {/* Confirmation */}
        {confirmed && (
          <div className="confirm-card">
            <div className="confirm-icon">✅</div>
            <div className="confirm-title">Request Submitted!</div>
            <div className="confirm-id">{confirmed}</div>
            <div className="confirm-sub">
              Your request has been received. Our team will review it and get back to you within 1–2 business days.<br/><br/>
              Please save your request ID for reference.
            </div>
            <button className="btn btn-green" style={{marginTop:20}} onClick={()=>{setConfirmed(null);setActiveForm(null);}}>
              Track Another Order
            </button>
          </div>
        )}

      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
