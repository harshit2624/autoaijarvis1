                             edit
                           </span>
                         )}
                       </div>
                     </td>
                     <td>
                       <span style={{background:'var(--bg-hover)',border:'1px solid var(--border-hi)',borderRadius:5,padding:'3px 9px',fontFamily:'monospace',fontSize:12,color:'var(--text)'}}>
                         {m.shopify_tag}
                       </span>
                     </td>
                     <td style={{color:'var(--text-muted)',fontSize:18}}>→</td>
                     <td>
                       <span style={{background:'var(--indigo-dim)',color:'var(--indigo)',borderRadius:5,padding:'3px 9px',fontSize:11,fontWeight:600}}>
                         {stageLabel(m.stage)}
                       </span>
                     </td>
                     <td className="td-mut">{m.created_at?fmtDate(m.created_at):'—'}</td>
                     <td>
                       <button className="btn btn-danger btn-sm" onClick={()=>deleteMapping(m.id)}>✕</button>
                     </td>
                   </tr>
                 ))}
              </tbody>
            </table>
          </div>
        </div>

        {/* Sync */}
        <div className="card">
          <div className="card-header">
            <span className="card-title">Sync Orders from Tags</span>
            <span className="card-sub">Scans all Shopify orders and applies priority mappings</span>
          </div>
          <div style={{padding:16}}>
            {syncResult && (
              <div className="alert alert-success" style={{marginBottom:12}}>
                ✓ Sync complete — scanned <strong>{syncResult.total}</strong> orders, updated <strong>{syncResult.updated}</strong> order stages.
              </div>
            )}
            <div style={{display:'flex',gap:12,alignItems:'center'}}>
              <button className="btn btn-indigo" onClick={syncNow} disabled={syncing||mappings.length===0}>
                {syncing?<><span className="spin">↻</span> Syncing all orders…</>:'⟳ Sync Now'}
              </button>
              <span style={{fontSize:11,color:'var(--text-muted)'}}>
                {mappings.length===0?'Add at least one mapping first.':'Lowest priority number wins — order with multiple tags always moves to the highest-priority stage.'}
              </span>
            </div>
          </div>
        </div>
      </div>
    );
  }

  /* ══════════════════════════════════
     REPORTS
  ══════════════════════════════════ */
  function Reports({ token }) {
    const today = new Date().toISOString().split('T')[0];
    const weekAgo = new Date(Date.now() - 7*24*3600*1000).toISOString().split('T')[0];
    const [from, setFrom] = useState(weekAgo);
    const [to, setTo]     = useState(today);
    const [preview, setPreview]   = useState(null);
    const [loading, setLoading]   = useState(false);
    const [sending, setSending]   = useState(false);
    const [msg, setMsg]           = useState('');
    const [settings, setSettings] = useState({ auto_send: false, staff_emails: '', send_to_vendors: false });
    const [savingSettings, setSavingSettings] = useState(false);

    useEffect(() => {
      fetch(`${API}/admin/reports/settings`, { headers: { Authorization: 'Bearer '+token } })
        .then(r => r.json()).then(d => setSettings(s => ({ ...s, ...d }))).catch(()=>{});
    }, []);

    const loadPreview = async () => {
      setLoading(true); setMsg(''); setPreview(null);
      const r = await fetch(`${API}/admin/reports/preview?from=${from}&to=${to}`, { headers: { Authorization: 'Bearer '+token } });
      const d = await r.json();
      setLoading(false);
      if (d.error) setMsg('❌ ' + d.error);
      else setPreview(d);
    };

    const sendReport = async () => {
      setSending(true); setMsg('');
      const r = await fetch(`${API}/admin/reports/send`, { method: 'POST', headers: { 'Content-Type':'application/json', Authorization: 'Bearer '+token }, body: JSON.stringify({ from, to }) });
      const d = await r.json();
      setSending(false);
      setMsg(d.success ? `✅ Report sent to ${d.sent} recipient${d.sent!==1?'s':''}${d.errors?.length?' | Errors: '+d.errors.join(', '):''}` : '❌ ' + d.error);
    };

    const saveSettings = async () => {
      setSavingSettings(true);
      await fetch(`${API}/admin/reports/settings`, { method: 'PUT', headers: { 'Content-Type':'application/json', Authorization: 'Bearer '+token }, body: JSON.stringify(settings) });
      setSavingSettings(false); setMsg('✅ Settings saved');
    };

    const pct = (a, b) => b > 0 ? Math.round((a/b)*100) : 0;
    const rateColor = r => r >= 80 ? '#10b981' : r >= 50 ? '#f59e0b' : '#ef4444';

    return (
      <div>
        <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:24}}>
          <span style={{fontSize:24}}>📊</span>
          <div>
            <h2 style={{margin:0,color:'var(--text)',fontSize:18}}>Order Reports</h2>
            <div style={{fontSize:12,color:'var(--text-muted)'}}>Generate & send order performance reports to admin, staff and vendors</div>
          </div>
        </div>

        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:20}}>
          {/* Manual report */}
          <div style={{background:'var(--bg-card)',borderRadius:12,padding:20,border:'1px solid var(--border)'}}>
            <div style={{fontWeight:700,color:'var(--text)',marginBottom:14,fontSize:14}}>📅 Generate Report</div>
            <div style={{display:'flex',gap:10,marginBottom:12,flexWrap:'wrap'}}>
              <div style={{flex:1,minWidth:120}}>
                <label style={{fontSize:11,color:'var(--text-muted)',fontWeight:600,display:'block',marginBottom:4}}>FROM</label>
                <input type="date" className="form-input" value={from} onChange={e=>setFrom(e.target.value)} style={{width:'100%',boxSizing:'border-box'}}/>
              </div>
              <div style={{flex:1,minWidth:120}}>
                <label style={{fontSize:11,color:'var(--text-muted)',fontWeight:600,display:'block',marginBottom:4}}>TO</label>
                <input type="date" className="form-input" value={to} onChange={e=>setTo(e.target.value)} style={{width:'100%',boxSizing:'border-box'}}/>
              </div>
            </div>
            <div style={{display:'flex',gap:8}}>
              {['7d','14d','30d'].map(p => {
                const days = parseInt(p); const label = p;
                return <button key={p} className="btn btn-sm btn-ghost" onClick={()=>{ setFrom(new Date(Date.now()-days*24*3600*1000).toISOString().split('T')[0]); setTo(today); }}>{label}</button>;
              })}
            </div>
            <div style={{display:'flex',gap:8,marginTop:14}}>
              <button className="btn btn-primary" onClick={loadPreview} disabled={loading} style={{flex:1}}>{loading?'Loading…':'👁 Preview'}</button>
              <button className="btn btn-indigo" onClick={sendReport} disabled={sending} style={{flex:1}}>{sending?'Sending…':'📤 Send Report'}</button>
            </div>
          </div>

          {/* Auto-send settings */}
          <div style={{background:'var(--bg-card)',borderRadius:12,padding:20,border:'1px solid var(--border)'}}>
            <div style={{fontWeight:700,color:'var(--text)',marginBottom:14,fontSize:14}}>⚙️ Auto-Send Settings</div>
            <label style={{display:'flex',alignItems:'center',gap:10,marginBottom:14,cursor:'pointer'}}>
              <input type="checkbox" checked={settings.auto_send} onChange={e=>setSettings(s=>({...s,auto_send:e.target.checked}))} style={{width:16,height:16,accentColor:'#6366f1'}}/>
              <div>
                <div style={{fontSize:13,color:'var(--text)',fontWeight:600}}>Auto-send every Sunday at 8am IST</div>
                <div style={{fontSize:11,color:'var(--text-muted)'}}>Sends last 7 days report automatically</div>
              </div>
            </label>
            <label style={{display:'flex',alignItems:'center',gap:10,marginBottom:14,cursor:'pointer'}}>
              <input type="checkbox" checked={settings.send_to_vendors} onChange={e=>setSettings(s=>({...s,send_to_vendors:e.target.checked}))} style={{width:16,height:16,accentColor:'#6366f1'}}/>
              <div>
                <div style={{fontSize:13,color:'var(--text)',fontWeight:600}}>Send to vendors</div>
                <div style={{fontSize:11,color:'var(--text-muted)'}}>Each vendor gets their own report</div>
              </div>
            </label>
            <div style={{marginBottom:10}}>
              <label style={{fontSize:11,color:'var(--text-muted)',fontWeight:600,display:'block',marginBottom:4}}>STAFF EMAILS (comma separated)</label>
              <input className="form-input" placeholder="staff@example.com, ops@example.com" value={settings.staff_emails||''} onChange={e=>setSettings(s=>({...s,staff_emails:e.target.value}))} style={{width:'100%',boxSizing:'border-box'}}/>
              <div style={{fontSize:10,color:'var(--text-muted)',marginTop:4}}>Used for: weekly reports · auto-hold alerts (orders stuck in New for 7+ days)</div>
            </div>
            <button className="btn btn-primary" onClick={saveSettings} disabled={savingSettings} style={{width:'100%'}}>{savingSettings?'Saving…':'💾 Save Settings'}</button>
            {settings.last_sent_at && <div style={{fontSize:11,color:'var(--text-muted)',marginTop:8,textAlign:'center'}}>Last sent: {new Date(settings.last_sent_at).toLocaleString('en-IN')}</div>}
          </div>
        </div>

        {msg && <div style={{padding:'10px 14px',borderRadius:8,background:'var(--bg-card)',border:'1px solid var(--border)',color:'var(--text)',fontSize:13,marginBottom:16}}>{msg}</div>}

        {/* Preview */}
        {preview && (
          <div style={{background:'var(--bg-card)',borderRadius:12,padding:20,border:'1px solid var(--border)'}}>
            <div style={{fontWeight:700,color:'var(--text)',marginBottom:16,fontSize:14}}>📋 Report Preview — {preview.from} → {preview.to}</div>

            {/* KPI cards */}
            <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:10,marginBottom:20}}>
              {[
                { label:'Total Orders', value: preview.summary.total, color:'#a5b4fc' },
                { label:'Fulfilled', value: preview.summary.fulfilled, color:'#10b981' },
                { label:'Pending', value: preview.summary.unfulfilled, color:'#ef4444' },
                { label:'Fulfil Rate', value: pct(preview.summary.fulfilled, preview.summary.total)+'%', color: rateColor(pct(preview.summary.fulfilled,preview.summary.total)) },
              ].map(k => (
                <div key={k.label} style={{background:'var(--bg-hover)',borderRadius:10,padding:14,textAlign:'center'}}>
                  <div style={{fontSize:26,fontWeight:800,color:k.color}}>{k.value}</div>
                  <div style={{fontSize:10,color:'var(--text-muted)',fontWeight:600,marginTop:2}}>{k.label}</div>
                </div>
              ))}
            </div>

            {/* Breakdown */}
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
              <div>
                <div style={{fontSize:12,fontWeight:700,color:'var(--text-muted)',marginBottom:10,textTransform:'uppercase',letterSpacing:'0.5px'}}>Order Breakdown</div>
                {[
                  { label:'🚚 In Transit', value: preview.summary.in_transit, color:'#6366f1' },
                  { label:'✅ Delivered', value: preview.summary.delivered, color:'#10b981' },
                  { label:'🔴 Prepaid — Not Shipped', value: preview.breakdown.prepaid_pending, color:'#ef4444' },
                  { label:'🟡 Advance — Not Shipped', value: preview.breakdown.partial_pending, color:'#f59e0b' },
                  { label:'📦 Confirmed Pending', value: preview.breakdown.confirmed_pending, color:'var(--text)' },
                  { label:'🏷️ Ready/Pickup', value: preview.breakdown.ready_pending, color:'var(--text)' },
                  { label:'🆕 New — Not Actioned', value: preview.breakdown.new_pending, color:'var(--text)' },
                  { label:'⏸️ On Hold', value: preview.breakdown.hold_pending, color:'var(--text)' },
                  { label:'❌ Cancelled', value: preview.summary.cancelled, color:'var(--text-muted)' },
                  { label:'↩️ RTO', value: preview.summary.rto, color:'var(--text-muted)' },
                ].filter(r => r.value > 0).map(r => (
                  <div key={r.label} style={{display:'flex',justifyContent:'space-between',padding:'6px 0',borderBottom:'1px solid var(--border)',fontSize:12}}>
                    <span style={{color:'var(--text-muted)'}}>{r.label}</span>
                    <span style={{fontWeight:700,color:r.color}}>{r.value}</span>
                  </div>
                ))}
              </div>

              {/* Vendor table */}
              <div>
                <div style={{fontSize:12,fontWeight:700,color:'var(--text-muted)',marginBottom:10,textTransform:'uppercase',letterSpacing:'0.5px'}}>Vendor Performance</div>
                <table style={{width:'100%',borderCollapse:'collapse',fontSize:11}}>
                  <thead><tr style={{borderBottom:'1px solid var(--border)'}}>
                    {['Vendor','Total','Done','Pend.','Prepaid↑'].map(h => <th key={h} style={{padding:'5px 6px',textAlign:h==='Vendor'?'left':'center',color:'var(--text-muted)',fontWeight:600}}>{h}</th>)}
                  </tr></thead>
                  <tbody>
                    {(preview.vendors||[]).slice(0,8).map(v => (
                      <tr key={v.name} style={{borderBottom:'1px solid var(--border)'}}>
                        <td style={{padding:'6px',color:'var(--text)',fontSize:11,maxWidth:100,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{v.name}</td>
                        <td style={{padding:'6px',textAlign:'center',color:'#a5b4fc',fontWeight:700}}>{v.total}</td>
                        <td style={{padding:'6px',textAlign:'center',color:'#10b981',fontWeight:700}}>{v.fulfilled}</td>
                        <td style={{padding:'6px',textAlign:'center',color:v.unfulfilled>0?'#ef4444':'var(--text-muted)',fontWeight:700}}>{v.unfulfilled}</td>
                        <td style={{padding:'6px',textAlign:'center',color:v.prepaid_pending>0?'#ef4444':'var(--text-muted)',fontWeight:v.prepaid_pending>0?700:400}}>{v.prepaid_pending||'—'}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>

            {/* Urgent list */}
            {preview.urgentOrders?.length > 0 && (
              <div style={{marginTop:20}}>
                <div style={{fontSize:12,fontWeight:700,color:'var(--text-muted)',marginBottom:10,textTransform:'uppercase',letterSpacing:'0.5px'}}>🚨 Action Required</div>
                <table style={{width:'100%',borderCollapse:'collapse',fontSize:11}}>
                  <thead><tr style={{borderBottom:'1px solid var(--border)'}}>
                    {['Order','Payment','Stage','Age','Vendor'].map(h => <th key={h} style={{padding:'5px 6px',textAlign:'left',color:'var(--text-muted)',fontWeight:600}}>{h}</th>)}
                  </tr></thead>
                  <tbody>
                    {preview.urgentOrders.slice(0,10).map(o => (
                      <tr key={o.order_name} style={{borderBottom:'1px solid var(--border)'}}>
                        <td style={{padding:'6px',color:'#a5b4fc',fontWeight:700}}>{o.order_name}</td>
                        <td style={{padding:'6px',color:o.payment_type==='prepaid'?'#ef4444':o.advance_paid>0?'#f59e0b':'var(--text-muted)',fontWeight:700,fontSize:10}}>{o.payment_type==='prepaid'?'🔴 Prepaid':o.advance_paid>0?`🟡 +₹${o.advance_paid}`:'COD'}</td>
                        <td style={{padding:'6px',color:'var(--text-muted)',textTransform:'capitalize'}}>{o.stage}</td>
                        <td style={{padding:'6px',color:o.age_hours>48?'#ef4444':o.age_hours>24?'#f59e0b':'var(--text-muted)',fontWeight:o.age_hours>24?700:400}}>{o.age_label}</td>
                        <td style={{padding:'6px',color:'var(--text-muted)',maxWidth:100,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{o.vendors}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            )}
          </div>
        )}
      </div>
    );
  }

  /* ══════════════════════════════════
     AUDIT LOG VIEW
  ══════════════════════════════════ */
  function AuditLog({ token }) {
    const [logs,    setLogs]    = useState([]);
    const [loading, setLoading] = useState(true);

    useEffect(()=>{
      fetch(`${API}/admin/audit`,{headers:{Authorization:`Bearer ${token}`}})
        .then(r=>r.json()).then(d=>setLogs(d.logs||[])).catch(()=>{}).finally(()=>setLoading(false));
    },[token]);

    return (
      <div className="page">
        <div className="card">
          <div className="card-header"><span className="card-title">Audit Log</span><span className="card-sub">Last 500 actions</span></div>
          <div className="tbl-wrap">
            <table>
              <thead><tr><th>#</th><th>Actor</th><th>Action</th><th>Target</th><th>Details</th><th>Time</th></tr></thead>
              <tbody>
                {loading ? Array.from({length:8}).map((_,i)=><SkelRow key={i} cols={6}/>) :
                 logs.length===0 ? (
                   <tr><td colSpan={6}><div className="empty"><div className="empty-icon">📋</div><div className="empty-title">No logs yet</div></div></td></tr>
                 ) :
                 logs.map((l,i)=>(
                  <tr key={l.id}>
                    <td className="td-mut">{i+1}</td>
                    <td style={{color:'var(--indigo)',fontWeight:600}}>{l.actor}</td>
                    <td><span style={{fontSize:10,padding:'2px 8px',borderRadius:4,background:'var(--bg-card2)',border:'1px solid var(--border)',color:'var(--text-dim)'}}>{l.action}</span></td>
                    <td className="td-mut">{l.target_id}</td>
                    <td style={{fontSize:10,color:'var(--text-muted)',maxWidth:200,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{l.details}</td>
                    <td className="td-mut">{fmtDate(l.created_at)} {new Date(l.created_at).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'})}</td>
                  </tr>
                 ))}
              </tbody>
            </table>
          </div>
        </div>
      </div>
    );
  }

  /* ══════════════════════════════════
     JARVIS CHAT
  ══════════════════════════════════ */
  const JARVIS_PRESETS = [
    { label:"Today's Summary",       query:"today's summary",            icon:"📅" },
    { label:"Pending Orders",         query:"pending orders",             icon:"⏳" },
    { label:"This Week",              query:"week summary",               icon:"📆" },
    { label:"This Month",             query:"month summary",              icon:"🗓" },
    { label:"Revenue Breakdown",      query:"revenue breakdown",          icon:"💰" },
    { label:"COD vs Prepaid",         query:"cod vs prepaid",             icon:"💳" },
    { label:"Top Products",           query:"top products",               icon:"🏆" },
    { label:"Fulfilled Orders",       query:"fulfilled orders",           icon:"✅" },
    { label:"Cancelled / RTO",        query:"cancelled rto return",       icon:"❌" },
    { label:"Vendor Revenue",         query:"vendor revenue",             icon:"🏪" },
    { label:"Settlements",            query:"settlement payout",          icon:"📄" },
    { label:"Store Overview",         query:"store overview summary",     icon:"📊" },
  ];

  function JarvisChat({ token }) {
    const [messages, setMessages] = useState([
      { role:'bot', text:"⚡ JARVIS online — powered by Claude AI with live store data.\n\nAsk me anything: 'Why are my RTOs up?', 'Which vendor has the worst fulfillment?', 'Am I on track for this month?'\n\nOr click a quick report below." }
    ]);
    const [input,   setInput]   = useState('');
    const [loading, setLoading] = useState(false);
    const endRef = useRef(null);
    useEffect(() => { endRef.current?.scrollIntoView({ behavior:'smooth' }); }, [messages, loading]);

    const send = async (query) => {
      const q = (query || input).trim();
      if (!q || loading) return;
      setInput('');
      const nextMessages = [...messages, { role:'user', text: q }];
      setMessages(nextMessages);
      setLoading(true);
      try {
        const r = await fetch(`${API}/jarvis`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
          body: JSON.stringify({ query: q, history: nextMessages.slice(1) }), // skip opening bot message
        });
        const d = await r.json();
        setMessages(m => [...m, { role:'bot', text: d.reply || d.error || 'No data.' }]);
      } catch {
        setMessages(m => [...m, { role:'bot', text: "Couldn't reach JARVIS. Check the server." }]);
      }
      setLoading(false);
    };

    const onKey = e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } };

    return (
      <div className="chat-wrap">
        <div className="chat-panel">
          <div className="chat-header">
            <div className="chat-logo">J</div>
            <div><div className="chat-title">JARVIS</div></div>
            <span className="chat-sub">Powered by Claude AI · Live store data</span>
          </div>

          {/* Quick report buttons */}
          <div style={{padding:'12px 20px 0',display:'flex',flexWrap:'wrap',gap:6,borderBottom:'1px solid var(--border)',paddingBottom:12}}>
            {JARVIS_PRESETS.map(p => (
              <button key={p.query} className="suggestion" style={{fontSize:10}} onClick={() => send(p.query)} disabled={loading}>
                {p.icon} {p.label}
              </button>
            ))}
          </div>

          <div className="chat-messages">
            {messages.map((m, i) => (
              <div key={i} className={`cmsg ${m.role}`}>
                <div className="cmsg-av">{m.role==='bot' ? 'J' : 'A'}</div>
                <div className="cmsg-bubble" style={{whiteSpace:'pre-wrap'}}>{m.text}</div>
              </div>
            ))}
            {loading && (
              <div className="cmsg bot">
                <div className="cmsg-av">J</div>
                <div className="cmsg-bubble"><span className="typing-dot"/><span className="typing-dot"/><span className="typing-dot"/></div>
              </div>
            )}
            <div ref={endRef}/>
          </div>

          <div className="chat-input-row">
            <textarea
              className="chat-textarea" rows={1}
              placeholder="Type a question: 'pending orders this week', 'revenue today', 'top products'…"
              value={input}
              onChange={e => setInput(e.target.value)}
              onKeyDown={onKey}
            />
            <button className="chat-send" onClick={() => send()} disabled={!input.trim() || loading}>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
              </svg>
            </button>
          </div>
        </div>
      </div>
    );
  }

  /* ══════════════════════════════════
     MAIN APP
  ══════════════════════════════════ */
  function App() {
    const [token,      setToken]      = useState(()=>ls.get('admin_token',null));
    const [view,       setView]       = useState('dashboard');
    const [stageFilter,setStageFilter]= useState('all');
    const [pass,       setPass]       = useState('');
    const [loginErr,   setLoginErr]   = useState('');
    const [loginLoad,  setLoginLoad]  = useState(false);

    const login = async () => {
      setLoginLoad(true); setLoginErr('');
      try {
        const r = await fetch(`${API}/admin/login`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:pass})});
        const d = await r.json();
        if (!r.ok) throw new Error(d.error||'Login failed');
        ls.set('admin_token', d.token);
        setToken(d.token);
      } catch(e) { setLoginErr(e.message); }
      setLoginLoad(false);
    };

    const logout = async () => {
      await fetch(`${API}/admin/logout`,{method:'POST',headers:{Authorization:`Bearer ${token}`}}).catch(()=>{});
      ls.del('admin_token'); setToken(null);
    };

    if (!token) return (
      <div className="login-wrap">
        <div className="login-box">
          <div className="login-logo">A</div>
          <div className="login-title">CROSCROW</div>
          <div className="login-sub">Admin Portal</div>
          {loginErr && <div className="login-error">⚠ {loginErr}</div>}
          <label className="field-label">Admin Password</label>
          <input className="field-input" type="password" placeholder="••••••••••" value={pass} onChange={e=>setPass(e.target.value)} onKeyDown={e=>e.key==='Enter'&&login()}/>
          <button className="login-btn" onClick={login} disabled={loginLoad||!pass}>{loginLoad?'Signing in…':'Sign In'}</button>
        </div>
      </div>
    );

    const navItems = [
      { id:'dashboard',   icon:'◈', label:'Dashboard',   section:'main' },
      { id:'orders',      icon:'◎', label:'Orders',       section:'main' },
      { id:'vendors',     icon:'🏪', label:'Vendors',      section:'main' },
      { id:'jarvis',      icon:'⚡', label:'JARVIS AI',    section:'main' },
      { id:'settlements', icon:'₹', label:'Settlements',  section:'finance' },
      { id:'settings',    icon:'⚙', label:'Settings',     section:'finance' },
      { id:'tagmappings', icon:'🏷', label:'Tag Mappings', section:'finance' },
      { id:'shippingcreds', icon:'🚚', label:'Shipping Partners', section:'finance' },
      { id:'emailsettings', icon:'📧', label:'Email Settings', section:'finance' },
      { id:'vendorsync',  icon:'🔄', label:'Vendor Sync',   section:'finance' },
      { id:'penalties',   icon:'⚠️', label:'Penalties',    section:'finance' },
      { id:'reports',     icon:'📊', label:'Reports',       section:'finance' },
      { id:'audit',       icon:'📋', label:'Audit Log',   section:'finance' },
      { id:'webhooks',    icon:'🔗', label:'Webhooks',     section:'finance' },
    ];
    const sections = [...new Set(navItems.map(n=>n.section))];
    const sectionLabels = { main:'Management', finance:'Finance & Logs' };

    const handleStageClick = stage => { setStageFilter(stage); setView('orders'); };

    const titles = { dashboard:'Dashboard', orders:'Orders', vendors:'Vendors', jarvis:'JARVIS AI', settlements:'Settlements', settings:'Settings', audit:'Audit Log' };

    return (
      <div className="app-shell">
        <aside className="sidebar">
          <div className="sidebar-brand">
            <div className="sidebar-logo">A</div>
            <div><div className="sidebar-name">CROSCROW</div><div className="sidebar-role">Admin Portal</div></div>
          </div>
          <nav className="nav">
            {sections.map(sec=>(
              <div key={sec}>
                <div className="nav-section">{sectionLabels[sec]}</div>
                {navItems.filter(n=>n.section===sec).map(n=>(
                  <button key={n.id} className={`nav-item ${view===n.id?'active':''}`} onClick={()=>setView(n.id)}>
                    <span className="nav-icon">{n.icon}</span>{n.label}
                  </button>
                ))}
              </div>
            ))}
          </nav>
          <div className="sidebar-footer">
            <button className="logout-btn" onClick={logout}><span>↩</span> Sign Out</button>
          </div>
        </aside>

        <div className="content">
          <div className="topbar">
            <span className="topbar-title">{titles[view]||view}</span>
            <div className="topbar-right">
              <span style={{fontSize:10,color:'var(--text-muted)',letterSpacing:1,display:'flex',alignItems:'center',gap:6}}>
                <span className="pulse"/>Admin Mode
              </span>
            </div>
          </div>

          {view==='dashboard'   && <Dashboard   token={token} onStageClick={handleStageClick}/>}
          {view==='orders'      && <Orders      token={token} initialStage={stageFilter} key={stageFilter}/>}
          {view==='vendors'     && <Vendors     token={token}/>}
          {view==='jarvis'      && <JarvisChat  token={token}/>}
          {view==='settlements' && <Settlements token={token}/>}
          {view==='settings'    && <Settings    token={token}/>}
          {view==='tagmappings' && <TagMappings token={token}/>}
          {view==='shippingcreds' && <ShippingCreds token={token}/>}
          {view==='emailsettings' && <EmailSettings token={token}/>}
          {view==='vendorsync'  && <VendorSync token={token}/>}
          {view==='penalties'   && <PenaltyManager token={token}/>}
          {view==='reports'     && <Reports token={token}/>}
          {view==='audit'       && <AuditLog    token={token}/>}
          {view==='webhooks'    && <Webhooks    token={token}/>}
        </div>
      </div>
    );
  }

  /* ══════════════════════════════════════════════════════════
     WEBHOOKS PANEL
  ══════════════════════════════════ */
  function Webhooks({ token }) {
    const [webhooks, setWebhooks] = useState([]);
    const [loading,  setLoading]  = useState(false);
    const [setting,  setSetting]  = useState(false);
    const [msg,      setMsg]      = useState(null);

    const DESIRED = [
      { topic:'orders/create',       path:'/webhooks/orders',       desc:'New order → email customer + vendors' },
      { topic:'orders/updated',      path:'/webhooks/orders',       desc:'Tag change → auto-map stage' },
      { topic:'orders/paid',         path:'/webhooks/orders',       desc:'Payment confirmed → mark prepaid' },
      { topic:'orders/cancelled',    path:'/webhooks/orders',       desc:'Cancellation → set stage cancelled' },
      { topic:'fulfillments/create', path:'/webhooks/fulfillments', desc:'Shipment created → set pickup stage + email customer' },
      { topic:'fulfillments/update', path:'/webhooks/fulfillments', desc:'Shipment status update → sync transit/delivered/RTO' },
    ];

    const load = async () => {
      setLoading(true);
      try {
        const r = await fetch(`${API}/admin/webhooks`, { headers:{ Authorization:`Bearer ${token}` } });
        const d = await r.json();
        setWebhooks(d.webhooks || []);
      } catch(e) { setMsg({ type:'error', text:e.message }); }
      setLoading(false);
    };

    useEffect(() => { load(); }, []);

    const setup = async () => {
      setSetting(true); setMsg(null);
      try {
        const r = await fetch(`${API}/admin/setup-webhooks`, { method:'POST', headers:{ Authorization:`Bearer ${token}` } });
        const d = await r.json();
        const errors = (d.results||[]).filter(r=>r.status==='error');
        if (errors.length) setMsg({ type:'error', text:`${errors.length} webhook(s) failed: ${errors.map(e=>e.topic).join(', ')}` });
        else setMsg({ type:'success', text:'All webhooks registered successfully!' });
        await load();
      } catch(e) { setMsg({ type:'error', text:e.message }); }
      setSetting(false);
    };

    const remove = async (id) => {
      if (!confirm('Delete this webhook from Shopify?')) return;
      try {
        await fetch(`${API}/admin/webhooks/${id}`, { method:'DELETE', headers:{ Authorization:`Bearer ${token}` } });
        await load();
      } catch(e) { setMsg({ type:'error', text:e.message }); }
    };

    return (
      <div style={{maxWidth:800,margin:'0 auto'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:20}}>
          <div>
            <div style={{fontWeight:700,fontSize:18,marginBottom:4}}>🔗 Shopify Webhooks</div>
            <div style={{fontSize:12,color:'var(--text-muted)'}}>Webhooks make the system event-driven — orders auto-process without any manual sync.</div>
          </div>
          <button className="btn btn-indigo" onClick={setup} disabled={setting}>
            {setting ? '…' : '⚡ Setup All Webhooks'}
          </button>
        </div>

        {msg && <div className={`alert alert-${msg.type}`} style={{marginBottom:16}}>{msg.type==='success'?'✓':'⚠'} {msg.text}</div>}

        {/* What each webhook does */}
        <div className="card" style={{marginBottom:16}}>
          <div className="card-header"><span className="card-title">Automations</span></div>
          <div style={{padding:16}}>
            {DESIRED.map(w => {
              const registered = webhooks.find(r => r.topic === w.topic);
              return (
                <div key={w.topic} style={{display:'flex',alignItems:'center',gap:12,padding:'10px 0',borderBottom:'1px solid var(--border)'}}>
                  <span style={{width:10,height:10,borderRadius:'50%',background:registered?'#10b981':'#6b7280',flexShrink:0}}/>
                  <div style={{flex:1}}>
                    <div style={{fontSize:12,fontWeight:600,color:'var(--text)',fontFamily:'monospace'}}>{w.topic}</div>
                    <div style={{fontSize:11,color:'var(--text-muted)',marginTop:2}}>{w.desc}</div>
                  </div>
                  <span style={{fontSize:10,padding:'2px 8px',borderRadius:10,background:registered?'#064e3b':'#1f2937',color:registered?'#10b981':'#6b7280',fontWeight:600}}>
                    {registered ? '✓ Active' : 'Not registered'}
                  </span>
                </div>
              );
            })}
          </div>
        </div>

        {/* All registered webhooks on Shopify */}
        <div className="card">
          <div className="card-header" style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
            <span className="card-title">Registered on Shopify ({webhooks.length})</span>
            <button onClick={load} disabled={loading} style={{background:'none',border:'none',color:'var(--indigo)',cursor:'pointer',fontSize:12}}>{loading?'…':'↻ Refresh'}</button>
          </div>
          <div style={{padding:16}}>
            {webhooks.length === 0 && !loading && (
              <div style={{textAlign:'center',padding:'30px 0',color:'var(--text-muted)',fontSize:13}}>
                No webhooks registered yet. Click <strong>Setup All Webhooks</strong> above.
              </div>
            )}
            {webhooks.map(w => (
              <div key={w.id} style={{display:'flex',alignItems:'center',gap:12,padding:'8px 0',borderBottom:'1px solid var(--border)'}}>
                <div style={{flex:1}}>
                  <div style={{fontSize:12,fontWeight:600,fontFamily:'monospace',color:'var(--text)'}}>{w.topic}</div>
                  <div style={{fontSize:10,color:'var(--text-muted)',marginTop:2,wordBreak:'break-all'}}>{w.address}</div>
                </div>
                <span style={{fontSize:10,color:'var(--text-muted)',flexShrink:0}}>ID: {w.id}</span>
                <button onClick={()=>remove(w.id)} style={{background:'none',border:'1px solid #ef4444',color:'#ef4444',borderRadius:4,fontSize:10,padding:'2px 8px',cursor:'pointer'}}>Delete</button>
              </div>
            ))}
          </div>
        </div>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
