  function PickupLocationsManager({ token, partner, apiBase }) {
    const [locs,    setLocs]    = useState([]);
    const [open,    setOpen]    = useState(false);
    const [saving,  setSaving]  = useState(false);
    const [msg,     setMsg]     = useState(null);
    const EMPTY = { name:'', address:'', city:'', state:'', pincode:'' };

    const load = () => {
      fetch(`${apiBase}`, { headers:{ Authorization:`Bearer ${token}` } })
        .then(r=>r.json()).then(d=>setLocs(d.locations||[])).catch(()=>{});
    };
    useEffect(()=>{ if(open) load(); },[open]);

    const upd = (i,k,v) => setLocs(ls=>ls.map((l,j)=>j===i?{...l,[k]:v}:l));
    const add  = () => setLocs(ls=>[...ls, {...EMPTY}]);
    const del  = (i) => setLocs(ls=>ls.filter((_,j)=>j!==i));

    const save = async () => {
      setSaving(true); setMsg(null);
      try {
        const r = await fetch(`${apiBase}`, { method:'PUT', headers:{'Content-Type':'application/json','Authorization':`Bearer ${token}`}, body: JSON.stringify({ locations: locs.filter(l=>l.name.trim()) }) });
        if (!r.ok) throw new Error('Save failed');
        setMsg({type:'success',text:'Locations saved.'});
        load();
      } catch(e) { setMsg({type:'error',text:e.message}); }
      setSaving(false);
    };

    return (
      <div style={{marginTop:10,borderTop:'1px solid var(--border)',paddingTop:10}}>
        <button onClick={()=>setOpen(o=>!o)} style={{background:'none',border:'none',color:'var(--indigo)',cursor:'pointer',fontSize:11,fontFamily:'var(--font-family)',padding:0}}>
          {open?'▼':'▶'} 📍 Pickup / Warehouse Locations ({locs.length})
        </button>
        {open && (
          <div style={{marginTop:10}}>
            {msg && <div className={`alert alert-${msg.type}`} style={{marginBottom:8,fontSize:11}}>{msg.type==='success'?'✓':'⚠'} {msg.text}</div>}
            <div style={{fontSize:10,color:'var(--text-muted)',marginBottom:8,lineHeight:1.6}}>
              {partner==='delhivery'
                ? <>Enter the <strong style={{color:'var(--text)'}}>exact warehouse name</strong> as registered in your Delhivery account. Delhivery looks up your warehouse by name — no address needed.</>
                : 'These locations appear as dropdown options when creating return/exchange shipments.'}
            </div>
            {locs.map((l,i)=>(
              <div key={i} style={{display:'grid',gridTemplateColumns: partner==='delhivery' ? '1fr auto' : '1fr 1fr 1fr 1fr auto',gap:6,marginBottom:6,alignItems:'center'}}>
                <input className="form-input" style={{fontSize:11}} placeholder="Warehouse name (must match exactly)" value={l.name} onChange={e=>upd(i,'name',e.target.value)} />
                {partner!=='delhivery' && <>
                  <input className="form-input" style={{fontSize:11}} placeholder="Address" value={l.address||''} onChange={e=>upd(i,'address',e.target.value)} />
                  <input className="form-input" style={{fontSize:11}} placeholder="City" value={l.city||''} onChange={e=>upd(i,'city',e.target.value)} />
                  <input className="form-input" style={{fontSize:11}} placeholder="Pincode" value={l.pincode||''} onChange={e=>upd(i,'pincode',e.target.value)} />
                </>}
                <button onClick={()=>del(i)} style={{background:'none',border:'none',color:'var(--red)',cursor:'pointer',fontSize:14}}>✕</button>
              </div>
            ))}
            <div style={{display:'flex',gap:8,marginTop:6}}>
              <button className="btn btn-ghost btn-sm" onClick={add} style={{fontSize:11}}>+ Add Location</button>
              <button className="btn btn-green btn-sm" onClick={save} disabled={saving} style={{fontSize:11}}>{saving?'Saving…':'Save Locations'}</button>
            </div>
          </div>
        )}
      </div>
    );
  }

  function ShippingCreds({ token }) {
    const [connected, setConnected] = useState({});
    const [forms,     setForms]     = useState({});
    const [saving,    setSaving]    = useState({});
    const [msg,       setMsg]       = useState(null);
    const [syncing,   setSyncing]   = useState(false);
    const [syncResult,setSyncResult]= useState(null);

    const load = () => {
      fetch(`${API}/admin/shipping-creds`, { headers:{ Authorization:`Bearer ${token}` } })
        .then(r=>r.json()).then(d=>{
          const map = {};
          (d.partners||[]).forEach(p=>{ map[p.partner] = p; });
          setConnected(map);
        }).catch(()=>{});
    };
    useEffect(()=>{ load(); fetchSsLogs(); }, [token]);

    const setField = (partnerId, key, val) =>
      setForms(f=>({ ...f, [partnerId]: { ...(f[partnerId]||{}), [key]: val } }));

    const save = async (partner) => {
      setSaving(s=>({...s,[partner.id]:true})); setMsg(null);
      try {
        const r = await fetch(`${API}/admin/shipping-creds`, {
          method:'POST', headers:{'Content-Type':'application/json','Authorization':`Bearer ${token}`},
          body: JSON.stringify({ partner: partner.id, credentials: forms[partner.id]||{} }),
        });
        if (!r.ok) throw new Error((await r.json()).error);
        setMsg({ type:'success', text:`${partner.name} connected successfully!` });
        setForms(f=>({...f,[partner.id]:{}}));
        load();
      } catch(e) { setMsg({ type:'error', text: e.message }); }
      setSaving(s=>({...s,[partner.id]:false}));
    };

    const disconnect = async (partnerId) => {
      await fetch(`${API}/admin/shipping-creds/${partnerId}`, { method:'DELETE', headers:{ Authorization:`Bearer ${token}` } });
      load();
    };

    const [ssSyncing, setSsSyncing] = useState(false);
    const [ssSyncMsg, setSsSyncMsg] = useState(null);
    const [ssLogs,    setSsLogs]    = useState([]);
    const [ssLogsOpen,setSsLogsOpen]= useState(false);

    const syncAll = async () => {
      setSyncing(true); setSyncResult(null);
      try {
        const r = await fetch(`${API}/admin/shipping/sync-status`, { method:'POST', headers:{ Authorization:`Bearer ${token}` } });
        const d = await r.json();
        setSyncResult(d);
      } catch(e) { setMsg({ type:'error', text: e.message }); }
      setSyncing(false);
    };

    const fetchSsLogs = async () => {
      try {
        const r = await fetch(`${API}/admin/shipsagar/logs`, { headers:{ Authorization:`Bearer ${token}` } });
        const d = await r.json();
        setSsLogs(d.logs || []);
        setSsLogsOpen(true);
      } catch(e) {}
    };

    const syncShipSagar = async () => {
      setSsSyncing(true); setSsSyncMsg('Running…');
      try {
        await fetch(`${API}/admin/shipsagar/sync`, { method:'POST', headers:{ Authorization:`Bearer ${token}` } });
        setTimeout(()=>{ fetchSsLogs(); setSsSyncing(false); setSsSyncMsg('✓ Done — see log below'); }, 4000);
      } catch(e) { setSsSyncMsg('Error: ' + e.message); setSsSyncing(false); }
    };

    const [ssRegistering, setSsRegistering] = useState(false);
    const registerAllAwbs = async () => {
      setSsRegistering(true); setSsSyncMsg('Registering AWBs…');
      try {
        const r = await fetch(`${API}/admin/shipsagar/register-all`, { method:'POST', headers:{ Authorization:`Bearer ${token}` } });
        const d = await r.json();
        setSsSyncMsg(`✓ ${d.message}`);
      } catch(e) { setSsSyncMsg('Error: ' + e.message); }
      setSsRegistering(false);
    };

    return (
      <div className="page">
        <div style={{background:'#0d1f10',border:'1px solid #1a4a2a',borderRadius:10,padding:'12px 16px',marginBottom:20,fontSize:12,color:'var(--text)'}}>
          <div style={{fontWeight:700,color:'#10b981',marginBottom:6}}>🚚 Global Shipping Credentials</div>
          <div style={{lineHeight:1.8,color:'var(--text-muted)'}}>
            Connect your shipping partners here once. JARVIS will use these credentials to track <strong>any order</strong> — whether fulfilled through this panel or directly on Shopify — as long as an AWB number is available.
          </div>
        </div>

        {msg && <div className={`alert alert-${msg.type}`} style={{marginBottom:16}}>{msg.type==='success'?'✓':'⚠'} {msg.text}</div>}

        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:20}}>
          {SHIPPING_PARTNERS.map(partner => {
            const isConnected = !!connected[partner.id];
            return (
              <div key={partner.id} className="card" style={{overflow:'visible',borderColor: isConnected ? '#1a4a2a' : 'var(--border)'}}>
                <div style={{padding:'16px 18px',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                  <div style={{display:'flex',alignItems:'center',gap:10}}>
                    <span style={{fontSize:22}}>{partner.logo}</span>
                    <div>
                      <div style={{fontSize:13,fontWeight:700,color:'var(--text)'}}>{partner.name}</div>
                      {isConnected
                        ? <div style={{fontSize:10,color:'#10b981'}}>● Connected · {connected[partner.id]?.connected_at?.slice(0,10)}</div>
                        : <div style={{fontSize:10,color:'var(--text-muted)'}}>○ Not connected</div>}
                    </div>
                  </div>
                  {isConnected && <button className="btn btn-ghost btn-sm" onClick={()=>disconnect(partner.id)} style={{color:'#f87171',fontSize:10}}>Disconnect</button>}
                </div>
                <div style={{padding:16}}>
                  {isConnected ? (
                    <div>
                      <div style={{fontSize:12,color:'var(--text-muted)',textAlign:'center',padding:'8px 0'}}>
                        ✓ Credentials saved. Tracking is active for all {partner.name} AWBs.
                      </div>
                      <PickupLocationsManager token={token} partner={partner.id}
                        apiBase={`${API}/admin/shipping-creds/${partner.id}/locations`} />
                    </div>
                  ) : (
                    <>
                      <div style={{fontSize:11,color:'var(--text-muted)',marginBottom:12,lineHeight:1.6}}>{partner.help}</div>
                      {partner.fields.map(f=>(
                        <div key={f.key} style={{marginBottom:10}}>
                          <label className="form-label">{f.label}</label>
                          <input className="form-input" type={f.type} placeholder={f.placeholder}

                      <button className="btn btn-green" style={{width:'100%',marginTop:4}} onClick={()=>save(partner)} disabled={saving[partner.id]}>

                      </button>
                    </>
                  )}
                </div>
              </div>
            );
          })}
        </div>

        <div className="card">
          <div style={{padding:16}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
              <div>
                <div style={{fontSize:12,fontWeight:700,color:'var(--text)'}}>Bulk Sync Delivery Status</div>
                <div style={{fontSize:11,color:'var(--text-muted)',marginTop:3}}>Refresh delivery status for all orders with an AWB number using connected partners.</div>
                {syncResult && <div style={{fontSize:11,color:'#10b981',marginTop:6}}>✓ Updated {syncResult.updated} orders{syncResult.message?` · ${syncResult.message}`:''}</div>}
              </div>
              <button className="btn btn-indigo" onClick={syncAll} disabled={syncing}>
                {syncing ? <><span className="spin">↻</span> Syncing…</> : '↻ Sync All Now'}
              </button>
            </div>


            {/* ShipSagar cron */}
            <div style={{borderRadius:8,background:'rgba(99,102,241,0.06)',border:'1px solid rgba(99,102,241,0.25)',marginTop:12}}>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'12px 14px'}}>
                <div>
                  <div style={{fontSize:12,fontWeight:700,color:'#818cf8'}}>🌊 ShipSagar Tracking Cron</div>
                  <div style={{fontSize:11,color:'var(--text-muted)',marginTop:2}}>Auto-runs every 2 hours · tracks all non-Delhivery AWBs across 500+ couriers. AWBs auto-pushed to ShipSagar when created.</div>
                  {ssSyncMsg && <div style={{fontSize:11,color:'#10b981',marginTop:4}}>{ssSyncMsg}</div>}
                </div>
                <div style={{display:'flex',gap:6,flexShrink:0}}>
                  <button className="btn btn-sm btn-ghost" onClick={fetchSsLogs}>📋 View Logs</button>
                  <button className="btn btn-sm btn-ghost" onClick={registerAllAwbs} disabled={ssRegistering} style={{borderColor:'#6366f1',color:'#a5b4fc'}}>
                    {ssRegistering ? <><span className="spin">↻</span> Registering…</> : '📤 Register AWBs (3 May+)'}
                  </button>
                  <button className="btn btn-sm" onClick={syncShipSagar} disabled={ssSyncing}
                    style={{background:'#6366f1',color:'#fff',border:'none',fontWeight:600}}>
                    {ssSyncing ? <><span className="spin">↻</span> Running…</> : '▶ Run Now'}
                  </button>
                </div>
              </div>
              {ssLogsOpen && (
                <div style={{borderTop:'1px solid rgba(99,102,241,0.25)',padding:'10px 14px 14px'}}>
                  <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8}}>
                    <span style={{fontSize:11,fontWeight:700,color:'var(--text-muted)',textTransform:'uppercase',letterSpacing:'0.05em'}}>Last {ssLogs.length} Runs</span>
                    <button onClick={()=>setSsLogsOpen(false)} style={{background:'none',border:'none',color:'var(--text-muted)',cursor:'pointer',fontSize:12}}>✕</button>
                  </div>
                  {ssLogs.length===0 ? (
                    <div style={{fontSize:11,color:'var(--text-muted)'}}>No logs yet — run the cron or wait for the next auto-run.</div>
                  ) : ssLogs.map((log,i)=>(
                    <div key={i} style={{marginBottom:10,padding:'8px 10px',borderRadius:6,background:'var(--bg-card)',border:'1px solid var(--border)'}}>
                      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:4}}>
                        <span style={{fontSize:11,fontWeight:700,color:'var(--text)'}}>{new Date(log.ran_at).toLocaleString('en-IN')}</span>
                        <div style={{display:'flex',gap:8,fontSize:10}}>
                          <span style={{color:'var(--text-muted)'}}>Checked: <strong style={{color:'var(--text)'}}>{log.checked||0}</strong></span>
                          <span style={{color:'#10b981'}}>Updated: <strong>{log.updated||0}</strong></span>

  /* ══════════════════════════════════

  function VendorSync({ token }) {
    const [connections, setConnections] = useState([]);
    const [selected,    setSelected]    = useState(null); // vendor_name
    const [products,    setProducts]    = useState([]);
    const [mappings,    setMappings]    = useState([]);
    const [loading,     setLoading]     = useState(false);
    const [prodLoading, setProdLoading] = useState(false);
    const [tab,         setTab]         = useState('products'); // products | mappings | approvals
    const [approvals,   setApprovals]   = useState([]);
    const [approvLoad,  setApprovLoad]  = useState(false);
    const [approvMsg,   setApprovMsg]   = useState({});
    const [showAllApprovals, setShowAllApprovals] = useState('pending');
    const [importing,   setImporting]   = useState({}); // productId -> bool
    const [selectedProds, setSelectedProds] = useState(new Set()); // multi-select
    const [mapSelState,  setMapSelState]   = useState(new Set()); // mapping multi-select
    const [bulkImporting, setBulkImporting] = useState(false);
    const [syncing,     setSyncing]     = useState(false);
    const [msg,         setMsg]         = useState('');
    // Map modal
    const [mapModal,    setMapModal]    = useState(null); // {vendorProduct, vendorVariant, uploadRequestId?}
    const [ccSearch,    setCcSearch]    = useState('');
    const [ccProducts,  setCcProducts]  = useState([]);
    const [ccSearching, setCcSearching] = useState(false);
    const [mapSaving,   setMapSaving]   = useState(false);
    // Smart map flow state
    const [smartMap, setSmartMap] = useState(null);
    // { step:'loading'|'search_cc'|'review', req, vendorVariants, ccProduct, matches, saving, saveMsg }
    // match: { vendorVariant, ccVariant|null, autoMatched, action:'map'|'create'|'skip', overrideCcVariantId }


    const loadConnections = () => {
      setLoading(true);
      fetch('/admin/vendor-sync/connections', { headers: { Authorization: 'Bearer '+token } })
        .then(r=>r.json()).then(d=>{ setConnections(d.connections||[]); setLoading(false); });
    };

    useEffect(()=>{
      loadConnections();
      loadApprovals();
      fetch('/admin/vendors', { headers: { Authorization: 'Bearer '+token } })
        .then(r=>r.json()).then(d=>{ window._vendorList = (d.vendors||[]).map(v=>typeof v==='string'?v:v.name).filter(Boolean); });
    }, []);

    const loadVendorProducts = (vendor) => {
      setSelected(vendor); setProdLoading(true); setProducts([]); setMappings([]); setMsg(''); setSelectedProds(new Set());
      fetch(`/admin/vendor-sync/${encodeURIComponent(vendor)}/products`, { headers:{ Authorization:'Bearer '+token } })
        .then(r=>r.json()).then(d=>{ setProducts(d.products||[]); setMappings(d.mappings||[]); setProdLoading(false); });
    };

    const loadMappings = () => {
      if (!selected) return;
      setMapSelState(new Set());
      fetch(`/admin/vendor-sync/mappings?vendor_name=${encodeURIComponent(selected)}`, { headers:{ Authorization:'Bearer '+token } })
        .then(r=>r.json()).then(d=>setMappings(d.mappings||[]));
    };

    const importProduct = async (product) => {
      setImporting(p=>({...p,[product.id]:true})); setMsg('');
      const r = await fetch('/admin/vendor-sync/import', { method:'POST', headers:{'Content-Type':'application/json',Authorization:'Bearer '+token},
        body: JSON.stringify({ vendor_name: selected, vendor_product_id: String(product.id), sync_inventory: true }) });
      const d = await r.json();
      setImporting(p=>({...p,[product.id]:false}));
      if (d.success) { setMsg(`✅ "${product.title}" imported as active product #${d.croscrow_product_id} (${d.variants_mapped} variants mapped)`); loadVendorProducts(selected); }
      else setMsg(`❌ ${d.error}`);
    };

    const importBulk = async (ids) => {
      const toImport = (ids || [...selectedProds]).filter(id => {
        const p = products.find(p=>String(p.id)===String(id));
        return p && !p.variants.every(v=>v.mapped);
      });
      if (!toImport.length) return;
      setBulkImporting(true); setMsg('');
      let done=0, failed=0;
      for (const id of toImport) {
        const p = products.find(p=>String(p.id)===String(id));
        if (!p) continue;
        setImporting(prev=>({...prev,[id]:true}));
        try {
          const r = await fetch('/admin/vendor-sync/import', { method:'POST', headers:{'Content-Type':'application/json',Authorization:'Bearer '+token},
            body: JSON.stringify({ vendor_name: selected, vendor_product_id: String(id), sync_inventory: true }) });
          const d = await r.json();
          if (d.success) done++; else failed++;
        } catch { failed++; }
        setImporting(prev=>({...prev,[id]:false}));
      }
      setBulkImporting(false);
      setSelectedProds(new Set());
      setMsg(`✅ Imported ${done} product${done!==1?'s':''}${failed?` · ${failed} failed`:''}`);
      loadVendorProducts(selected);
    };

    const syncInventory = async () => {
      setSyncing(true); setMsg('');
      const r = await fetch('/admin/vendor-sync/sync-inventory', { method:'POST', headers:{'Content-Type':'application/json',Authorization:'Bearer '+token},
        body: JSON.stringify({ vendor_name: selected }) });
      const d = await r.json();
      setSyncing(false);
      setMsg(d.success ? `✅ Synced ${d.synced} variants${d.errors?.length?' | Errors: '+d.errors.join(', '):''}` : `❌ ${d.error}`);
      loadMappings();
    };

    const [syncingProduct, setSyncingProduct] = useState({});
    const syncProduct = async (productId) => {
      setSyncingProduct(p=>({...p,[productId]:true})); setMsg('');
      const r = await fetch('/admin/vendor-sync/sync-inventory', { method:'POST', headers:{'Content-Type':'application/json',Authorization:`Bearer ${token}`},
        body: JSON.stringify({ vendor_name: selected, vendor_product_id: String(productId) }) });
      const d = await r.json();
      setSyncingProduct(p=>({...p,[productId]:false}));
      setMsg(d.success ? `✅ Synced ${d.synced} variant${d.synced!==1?'s':''}` : `❌ ${d.error}`);
      loadVendorProducts(selected);
    };

    const loadApprovals = () => {
      setApprovLoad(true);
      fetch(`/admin/vendor-sync/upload-requests`, { headers:{ Authorization:`Bearer ${token}` } })
        .then(r=>r.json()).then(d=>{ setApprovals(d.requests||[]); setApprovLoad(false); });
    };

    const handleApproval = async (reqId, action, vendorName, productId) => {
      setApprovMsg(m=>({...m,[reqId]:'loading'}));
      try {
        if (action === 'import') {
          const r = await fetch('/admin/vendor-sync/import', { method:'POST', headers:{'Content-Type':'application/json',Authorization:`Bearer ${token}`},
            body: JSON.stringify({ vendor_name: vendorName, vendor_product_id: productId, sync_inventory: true }) });
          const d = await r.json();
          if (!r.ok) throw new Error(d.error);
          await fetch(`/admin/vendor-sync/upload-requests/${reqId}`, { method:'PUT', headers:{'Content-Type':'application/json',Authorization:`Bearer ${token}`}, body: JSON.stringify({ status:'approved', action:'imported' }) });
          setApprovMsg(m=>({...m,[reqId]:'✅ Imported!'}));
        } else if (action === 'approve_removal') {
          if (!window.confirm('Mark this removal request as approved? Make sure you have already deleted the product from the Shopify store.')) return setApprovMsg(m=>({...m,[reqId]:null}));
          await fetch(`/admin/vendor-sync/upload-requests/${reqId}`, { method:'PUT', headers:{'Content-Type':'application/json',Authorization:`Bearer ${token}`}, body: JSON.stringify({ status:'approved', action:'removed' }) });
          setApprovMsg(m=>({...m,[reqId]:'✅ Approved'}));
        } else if (action === 'reject') {
          await fetch(`/admin/vendor-sync/upload-requests/${reqId}`, { method:'PUT', headers:{'Content-Type':'application/json',Authorization:`Bearer ${token}`}, body: JSON.stringify({ status:'rejected' }) });
          setApprovMsg(m=>({...m,[reqId]:'Rejected'}));
        }
        loadApprovals();
      } catch(e) { setApprovMsg(m=>({...m,[reqId]:'❌ '+e.message})); }
    };

    const unmapVariant = async (id) => {
      await fetch(`/admin/vendor-sync/map/${id}`, { method:'DELETE', headers:{ Authorization:'Bearer '+token } });
      loadMappings(); loadVendorProducts(selected);
    };

    // Map modal helpers
    const searchCcProducts = async (q) => {
      setCcSearching(true);
      const qs = q ? `?q=${encodeURIComponent(q)}` : '';
      const r = await fetch(`/admin/vendor-sync/croscrow-products${qs}`, { headers:{ Authorization:'Bearer '+token } });
      const d = await r.json();
      setCcProducts(d.products||[]); setCcSearching(false);
    };

    useEffect(()=>{ if (ccSearch.length > 1) { const t = setTimeout(()=>searchCcProducts(ccSearch), 400); return ()=>clearTimeout(t); } }, [ccSearch]);
    useEffect(()=>{ if (mapModal) { setCcSearch(''); setCcProducts([]); searchCcProducts(''); } }, [mapModal]);
    useEffect(()=>{ if (smartMap?.step==='search_cc') { setCcSearch(''); setCcProducts([]); searchCcProducts(''); } }, [smartMap?.step]);

    const saveMapping = async (ccProduct, ccVariant) => {
      if (!mapModal) return;
      setMapSaving(true);
      const vendorName = mapModal.vendorName || selected;
      await fetch('/admin/vendor-sync/map', { method:'POST', headers:{'Content-Type':'application/json',Authorization:'Bearer '+token},
        body: JSON.stringify({ vendor_name: vendorName, vendor_product_id: String(mapModal.vendorProduct.id), vendor_variant_id: String(mapModal.vendorVariant.id), croscrow_product_id: String(ccProduct.id), croscrow_variant_id: String(ccVariant.id), sync_inventory: true }) });
      // If came from an approval request, mark it as approved
      if (mapModal.uploadRequestId) {
        await fetch(`/admin/vendor-sync/upload-requests/${mapModal.uploadRequestId}`, { method:'PUT', headers:{'Content-Type':'application/json',Authorization:'Bearer '+token}, body: JSON.stringify({ status:'approved', action:'mapped' }) });
        loadApprovals();
      }
      setMapSaving(false); setMapModal(null); setCcSearch(''); setCcProducts([]);
      loadVendorProducts(selected);
    };

    const fmtDate = ts => new Date(ts).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'});

    const [repairing, setRepairing] = useState(false);
    const [repairResult, setRepairResult] = useState(null);

    const repairVendorStages = async () => {
      if (!window.confirm('This will sync vendor stage to match order_meta stage for all single-vendor orders where they differ. Continue?')) return;
      setRepairing(true); setRepairResult(null);
      try {
        const r = await fetch(`${API}/admin/repair-vendor-stages`, { method:'POST', headers:{ Authorization:`Bearer ${token}` } });
        const d = await r.json();
        if (!r.ok) throw new Error(d.error);
        setRepairResult(d);
      } catch(e) { setRepairResult({ error: e.message }); }
      setRepairing(false);
    };

    return (
      <div style={{padding:'24px',maxWidth:1100}}>
        {/* Maintenance tools */}
        <div className="card" style={{marginBottom:20,padding:16}}>
          <div style={{fontSize:12,fontWeight:700,color:'var(--text)',marginBottom:10,letterSpacing:1,textTransform:'uppercase'}}>🔧 Maintenance</div>
          <div style={{display:'flex',alignItems:'center',gap:12,flexWrap:'wrap'}}>
            <div>
              <div style={{fontSize:12,color:'var(--text)',fontWeight:600,marginBottom:2}}>Repair Vendor Stages</div>
              <div style={{fontSize:11,color:'var(--text-muted)',marginBottom:8}}>For single-vendor orders, sync vendor stage to match order stage where they differ.</div>
              <button className="btn btn-indigo" onClick={repairVendorStages} disabled={repairing}>
                {repairing ? <><span className="spin">↻</span> Repairing…</> : '🔧 Run Repair'}
              </button>
            </div>
            {repairResult && (
              <div style={{flex:1}}>
                <div style={{fontSize:12,padding:'8px 14px',borderRadius:7,marginBottom:8,
                  background: repairResult.error ? 'rgba(239,68,68,0.1)' : 'rgba(16,185,129,0.1)',
                  border: `1px solid ${repairResult.error ? 'rgba(239,68,68,0.3)' : 'rgba(16,185,129,0.3)'}`,
                  color: repairResult.error ? '#ef4444' : '#10b981'}}>
                  {repairResult.error ? `❌ ${repairResult.error}` : `✓ Fixed ${repairResult.fixed} orders · Skipped ${repairResult.skipped} · Errors ${repairResult.errors}`}
                </div>
                {repairResult.log?.length > 0 && (
                  <div style={{background:'var(--bg-card2)',border:'1px solid var(--border)',borderRadius:7,maxHeight:240,overflowY:'auto'}}>
                    <table style={{width:'100%',borderCollapse:'collapse',fontSize:11}}>
                      <thead><tr style={{background:'var(--bg-card)'}}>
                        <th style={{padding:'6px 10px',textAlign:'left',color:'var(--text-muted)',fontWeight:600}}>Order ID</th>
                        <th style={{padding:'6px 10px',textAlign:'left',color:'var(--text-muted)',fontWeight:600}}>Vendor</th>
                        <th style={{padding:'6px 10px',textAlign:'left',color:'var(--text-muted)',fontWeight:600}}>From</th>
                        <th style={{padding:'6px 10px',textAlign:'left',color:'var(--text-muted)',fontWeight:600}}>→ To</th>
                      </tr></thead>
                      <tbody>
                        {repairResult.log.map((r,i)=>(
                          <tr key={i} style={{borderTop:'1px solid var(--border)',background:r.error?'rgba(239,68,68,0.05)':''}}>
                            <td style={{padding:'5px 10px',fontFamily:'monospace',color:'var(--cyan)'}}>{r.shopify_id}</td>
                            <td style={{padding:'5px 10px',color:'var(--text)'}}>{r.vendor||'—'}</td>
                            <td style={{padding:'5px 10px',color:'#f59e0b'}}>{r.error?`❌ ${r.error}`:r.from}</td>
                            <td style={{padding:'5px 10px',color:'#10b981',fontWeight:600}}>{r.to||''}</td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                )}
              </div>
            )}
          </div>
        </div>

        {/* Global Approvals — tabbed by status */}
        {(()=>{
          const typeColor = t => t==='removal'?'var(--red)':t==='mapping'?'var(--green)':'var(--indigo)';
          const typeBg    = t => t==='removal'?'var(--red-bg)':t==='mapping'?'var(--green-dim)':'var(--indigo-dim)';
          const typeLabel = t => t==='removal'?'🗑 Removal':t==='mapping'?'🔗 Map Request':'📤 Upload';
          const REQ_TABS = [
            { key:'pending',  label:'Pending',  color:'#f59e0b' },
            { key:'approved', label:'Approved', color:'var(--green)' },
            { key:'rejected', label:'Rejected', color:'var(--red)' },
            { key:'all',      label:'All',      color:'var(--text-muted)' },
          ];
          // Filter by selected vendor if one is active
          const vendorApprovals = selected ? approvals.filter(a => a.vendor_name === selected) : approvals;
          const pendingCount = vendorApprovals.filter(a=>a.status==='pending').length;
          const filteredReqs = vendorApprovals.filter(r => showAllApprovals === 'all' || r.status === showAllApprovals);
          return (
            <div style={{marginBottom:24,background:'var(--bg-card)',border:'1px solid var(--border)',borderRadius:10,overflow:'hidden'}}>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'12px 16px',borderBottom:'1px solid var(--border)'}}>
                <div style={{display:'flex',alignItems:'center',gap:10}}>
                  <span style={{fontSize:14,fontWeight:700,color:'var(--text)'}}>📤 Product Requests{selected ? <span style={{fontSize:11,color:'var(--indigo)',fontWeight:500,marginLeft:6}}>· {selected}</span> : ''}</span>
                  {pendingCount>0 && <span style={{fontSize:11,padding:'2px 8px',borderRadius:99,background:'rgba(245,158,11,0.15)',color:'#f59e0b',fontWeight:700,border:'1px solid rgba(245,158,11,0.3)'}}>{pendingCount} pending</span>}
                </div>
                <button className="btn btn-ghost btn-sm" onClick={loadApprovals} disabled={approvLoad}>{approvLoad?'…':'↻'}</button>
              </div>
              {/* Tabs */}
              <div style={{display:'flex',borderBottom:'1px solid var(--border)',background:'var(--bg-card2)'}}>
                {REQ_TABS.map(t=>{
                  const count = t.key==='all' ? vendorApprovals.length : vendorApprovals.filter(r=>r.status===t.key).length;
                  const active = showAllApprovals===t.key;
                  return (
                    <button key={t.key} onClick={()=>setShowAllApprovals(t.key)}
                      style={{flex:1,padding:'8px 4px',border:'none',borderBottom:`2px solid ${active?t.color:'transparent'}`,
                        background:'transparent',color:active?t.color:'var(--text-muted)',cursor:'pointer',
                        fontSize:11,fontWeight:active?700:500,fontFamily:'var(--font-family)',
                        display:'flex',alignItems:'center',justifyContent:'center',gap:5,transition:'all 0.15s'}}>
                      {t.label}
                      {count>0&&<span style={{fontSize:9,padding:'1px 5px',borderRadius:99,background:active?t.color:'var(--bg-hover)',color:active?'#000':'var(--text-muted)',fontWeight:700}}>{count}</span>}
                    </button>
                  );
                })}
              </div>
              {approvLoad ? <div style={{padding:16,color:'var(--text-muted)',fontSize:12}}>Loading…</div> :
               filteredReqs.length===0 ? <div style={{padding:16,color:'var(--text-muted)',fontSize:12,textAlign:'center'}}>No {showAllApprovals==='all'?'':showAllApprovals} requests.</div> :
               <div style={{display:'flex',flexDirection:'column',gap:0}}>
                {filteredReqs.map(req=>(
                  <div key={req._id} style={{display:'flex',gap:10,alignItems:'center',padding:'10px 16px',borderBottom:'1px solid var(--border)',background:req.status==='pending'?'transparent':'var(--bg-hover)'}}>
                    {req.product_image && <img src={req.product_image} style={{width:36,height:36,objectFit:'cover',borderRadius:5,flexShrink:0,border:'1px solid var(--border)'}} alt=""/>}
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:12,fontWeight:600,color:'var(--text)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{req.product_title||req.cc_product_id||req.product_id}</div>
                      <div style={{fontSize:11,color:'var(--text-muted)',marginTop:1}}>
                        <span style={{color:'var(--indigo)',fontWeight:600}}>{req.vendor_name}</span>
                        {' · '}{new Date(req.created_at).toLocaleDateString('en-IN',{day:'numeric',month:'short'})}
                        {req.action && <span style={{marginLeft:6,color:'var(--text-muted)'}}>· {req.action}</span>}
                      </div>
                      {req.note && <div style={{fontSize:10,color:'#fbbf24',marginTop:2}}>📝 {req.note}</div>}
                    </div>
                    <span style={{fontSize:9,padding:'2px 7px',borderRadius:99,background:typeBg(req.request_type),color:typeColor(req.request_type),border:`1px solid ${typeColor(req.request_type)}`,fontWeight:700,flexShrink:0}}>{typeLabel(req.request_type)}</span>
                    {approvMsg[req._id] && approvMsg[req._id]!=='loading' && (
                      <span style={{fontSize:10,color:'var(--green)',fontWeight:600,flexShrink:0}}>{approvMsg[req._id]}</span>
                    )}
                    {req.status==='pending' && (
                      <div style={{display:'flex',gap:4,flexShrink:0,flexWrap:'wrap',justifyContent:'flex-end'}}>
                        {req.request_type==='removal' ? (<>
                          <button className="btn btn-danger btn-sm" style={{fontSize:10}} disabled={approvMsg[req._id]==='loading'}
                            onClick={()=>handleApproval(req._id,'approve_removal',req.vendor_name,req.product_id)}>
                            ✓ Approve
                          </button>
                        </>) : req.request_type==='mapping' ? (<>
                          <button className="btn btn-sm btn-ghost" style={{fontSize:10,borderColor:'var(--green)',color:'var(--green)'}} disabled={approvMsg[req._id]==='loading'}
                            onClick={async()=>{
                              setSmartMap({ step:'loading', req, vendorVariants:[], ccProduct:null, matches:[], saving:false, saveMsg:'' });
                              try {
                                const r2 = await fetch(`/admin/vendor-sync/vendor-product-variants?vendor_name=${encodeURIComponent(req.vendor_name)}&product_id=${req.product_id}`, { headers:{ Authorization:'Bearer '+token } });
                                const d2 = await r2.json();
                                setSmartMap(s=>({...s, step:'search_cc', vendorVariants: d2.variants||[] }));
                              } catch(e) { setSmartMap(s=>({...s, step:'error', error:e.message})); }
                            }}>
                            🔗 Smart Map
                          </button>
                          <button className="btn btn-sm btn-indigo" style={{fontSize:10}} disabled={approvMsg[req._id]==='loading'}
                            onClick={()=>handleApproval(req._id,'import',req.vendor_name,req.product_id)}>
                            ↑ Upload New
                          </button>
                        </>) : (
                          <button className="btn btn-sm btn-indigo" style={{fontSize:10}} disabled={approvMsg[req._id]==='loading'}
                            onClick={()=>handleApproval(req._id,'import',req.vendor_name,req.product_id)}>
                            ↓ Import
                          </button>
                        )}
                        <button className="btn btn-sm btn-ghost" style={{fontSize:10,borderColor:'var(--red)',color:'var(--red)'}} disabled={approvMsg[req._id]==='loading'}
                          onClick={()=>handleApproval(req._id,'reject',req.vendor_name,req.product_id)}>✕</button>
                      </div>
                    )}
                  </div>
                ))}
               </div>
              }
            </div>
          );
        })()}

        <div style={{display:'flex',gap:24}}>
        {/* Left: connections list */}
        <div style={{width:240,flexShrink:0}}>
          <div style={{fontSize:13,fontWeight:700,color:'var(--text)',marginBottom:12}}>🔄 Connected Stores</div>
          {loading ? <div style={{color:'var(--text-muted)',fontSize:12}}>Loading…</div> : connections.length===0 ? (
            <div style={{background:'var(--bg-card)',borderRadius:8,padding:16,fontSize:12,color:'var(--text-muted)',textAlign:'center'}}>
              No vendor stores connected yet.<br/><br/>Vendors connect from their panel → Settings → Connect Shopify.
            </div>
          ) : connections.map(c=>(
            <div key={c.shop_domain} style={{marginBottom:8}}>
              {!c.vendor_name ? (
                <div style={{background:'var(--bg-card)',border:'1px solid var(--yellow)',borderRadius:8,padding:'10px 12px'}}>
                  <div style={{fontSize:10,color:'var(--yellow)',fontWeight:700,marginBottom:4}}>⚠ Unassigned</div>
                  <div style={{fontSize:10,color:'var(--text-muted)',marginBottom:6}}>{c.shop_domain}</div>
                  <select style={{width:'100%',background:'var(--bg-card2)',border:'1px solid var(--border)',borderRadius:5,padding:'4px 6px',color:'var(--text)',fontSize:11,marginBottom:4}}
                    defaultValue=""
                    onChange={async e=>{
                      const v = e.target.value; if(!v) return;
                      await fetch(`/admin/vendor-sync/assign`, { method:'POST', headers:{'Content-Type':'application/json',Authorization:`Bearer ${token}`}, body:JSON.stringify({ shop_domain: c.shop_domain, vendor_name: v }) });
                      loadConnections();
                    }}>
                    <option value="">— assign vendor —</option>
                    {(window._vendorList||[]).map(v=><option key={v} value={v}>{v}</option>)}
                  </select>
                </div>
              ) : (
                <div style={{background:selected===c.vendor_name?'var(--indigo-dim)':'var(--bg-card)',border:`1px solid ${selected===c.vendor_name?'var(--indigo)':'var(--border)'}`,borderRadius:8,overflow:'hidden'}}>
                  <button onClick={()=>loadVendorProducts(c.vendor_name)}
                    style={{width:'100%',textAlign:'left',padding:'10px 12px',cursor:'pointer',color:'var(--text)',background:'transparent',border:'none'}}>
                    <div style={{fontWeight:600,fontSize:13}}>{c.vendor_name}</div>
                    <div style={{fontSize:10,color:'var(--text-muted)',marginTop:2}}>{c.shop_domain}</div>
                    <div style={{fontSize:9,color:'var(--green)',marginTop:3}}>● Connected {fmtDate(c.installed_at)}</div>
                  </button>
                  <div style={{padding:'0 8px 8px'}}>
                    <button onClick={async()=>{
                      const r = await fetch('/admin/vendor-sync/reregister-webhooks',{method:'POST',headers:{'Content-Type':'application/json',Authorization:`Bearer ${token}`},body:JSON.stringify({shop_domain:c.shop_domain})});
                      const d = await r.json();
                      alert(d.success?'✅ Webhooks re-registered!':('❌ '+d.error));
                    }} style={{width:'100%',fontSize:10,padding:'3px 0',borderRadius:5,border:'1px solid var(--border)',background:'var(--bg-card2)',color:'var(--text-muted)',cursor:'pointer'}}>
                      📡 Re-register Webhooks
                    </button>
                  </div>
                </div>
              )}
            </div>
          ))}
        </div>

        {/* Right: products / mappings */}
        <div style={{flex:1,minWidth:0}}>
          {!selected ? (
            <div style={{background:'var(--bg-card)',borderRadius:10,padding:60,textAlign:'center',color:'var(--text-muted)'}}>
              <div style={{fontSize:32,marginBottom:12}}>🔄</div>
              <div style={{fontSize:14,fontWeight:600,marginBottom:6}}>Vendor Product Sync</div>
              <div style={{fontSize:12}}>Select a connected vendor on the left to browse their products and manage mappings.</div>
            </div>
          ) : (
            <>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}}>
                <div style={{fontSize:16,fontWeight:700,color:'var(--text)'}}>{selected}</div>
                <div style={{display:'flex',gap:8}}>
                  <button className={`btn btn-sm ${tab==='products'?'btn-primary':'btn-ghost'}`} onClick={()=>setTab('products')}>Products</button>
                  <button className={`btn btn-sm ${tab==='mappings'?'btn-primary':'btn-ghost'}`} onClick={()=>{ setTab('mappings'); loadMappings(); }}>Mappings ({mappings.length})</button>
                  <button className={`btn btn-sm ${tab==='approvals'?'btn-primary':'btn-ghost'}`} onClick={()=>{ setTab('approvals'); loadApprovals(); }} style={{borderColor:'var(--yellow)',color:tab==='approvals'?'#fff':'var(--yellow)'}}>📤 Approvals {approvals.filter(a=>a.status==='pending').length>0?`(${approvals.filter(a=>a.status==='pending').length})`:''}</button>
                  <button className="btn btn-sm btn-ghost" onClick={syncInventory} disabled={syncing} title="Sync price & inventory from vendor store to CrosCrow for all mapped variants">
                    {syncing?'Syncing…':'↻ Sync Price & Stock'}
                  </button>
                </div>
              </div>

              {msg && <div style={{marginBottom:12,fontSize:12,padding:'8px 12px',borderRadius:6,background:msg.startsWith('✅')?'var(--green-dim)':'var(--red-bg)',color:msg.startsWith('✅')?'var(--green)':'var(--red)'}}>{msg}</div>}

              {/* PRODUCTS TAB */}
              {tab==='products' && (
                prodLoading ? <div style={{color:'var(--text-muted)',fontSize:12,padding:20}}>Loading products…</div> :
                products.length===0 ? <div style={{color:'var(--text-muted)',fontSize:12,padding:20}}>No products found in vendor store.</div> :
                <>
                  {/* Bulk action toolbar */}
                  {(() => {
                    const importable = products.filter(p=>!p.variants.every(v=>v.mapped));
                    const allSelected = importable.length > 0 && importable.every(p=>selectedProds.has(String(p.id)));
                    return (
                      <div style={{display:'flex',alignItems:'center',gap:10,padding:'10px 14px',background:'var(--bg-card)',border:'1px solid var(--border)',borderRadius:8,marginBottom:4,flexWrap:'wrap'}}>
                        <label style={{display:'flex',alignItems:'center',gap:6,cursor:'pointer',fontSize:12,color:'var(--text-dim)',userSelect:'none'}}>
                          <input type="checkbox" checked={allSelected} onChange={e=>{
                            if(e.target.checked) setSelectedProds(new Set(importable.map(p=>String(p.id))));
                            else setSelectedProds(new Set());
                          }} style={{cursor:'pointer'}}/>
                          Select All Unimported ({importable.length})
                        </label>
                        {selectedProds.size > 0 && (
                          <button className="btn btn-sm btn-indigo" onClick={()=>importBulk()} disabled={bulkImporting}>
                            {bulkImporting ? '↻ Importing…' : `↓ Import Selected (${selectedProds.size})`}
                          </button>
                        )}
                        <button className="btn btn-sm btn-indigo" onClick={()=>importBulk(importable.map(p=>String(p.id)))} disabled={bulkImporting||!importable.length}
                          style={{marginLeft:'auto'}}>
                          {bulkImporting ? '↻ Importing…' : `↓ Import All (${importable.length})`}
                        </button>
                      </div>
                    );
                  })()}
                  <div style={{display:'flex',flexDirection:'column',gap:10}}>
                  {products.map(p=>{
                    const allMapped = p.variants.every(v=>v.mapped);
                    const someMapped = p.variants.some(v=>v.mapped);
                    const img = p.images?.[0]?.src;
                    return (
                      <div key={p.id} style={{background:'var(--bg-card)',border:`1px solid ${selectedProds.has(String(p.id))?'var(--indigo)':'var(--border)'}`,borderRadius:10,padding:14}}>
                        <div style={{display:'flex',gap:12,alignItems:'flex-start'}}>
                          {!allMapped && <input type="checkbox" checked={selectedProds.has(String(p.id))} onChange={e=>{ setSelectedProds(prev=>{ const n=new Set(prev); e.target.checked?n.add(String(p.id)):n.delete(String(p.id)); return n; }); }} style={{marginTop:4,cursor:'pointer',flexShrink:0}}/>}
                          {img && <img src={img} style={{width:56,height:56,objectFit:'cover',borderRadius:6,flexShrink:0}} alt=""/>}
                          <div style={{flex:1,minWidth:0}}>
                            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:4}}>
                              <span style={{fontWeight:700,fontSize:13,color:'var(--text)'}}>{p.title}</span>
                              {allMapped && <span style={{fontSize:10,padding:'2px 7px',borderRadius:10,background:'var(--green-dim)',color:'var(--green)'}}>All Mapped</span>}
                              {someMapped && !allMapped && <span style={{fontSize:10,padding:'2px 7px',borderRadius:10,background:'var(--yellow-bg)',color:'var(--yellow)'}}>Partial</span>}
                            </div>
                            <div style={{fontSize:11,color:'var(--text-muted)',marginBottom:8}}>{p.product_type} · {p.variants.length} variant{p.variants.length!==1?'s':''} · {p.status}</div>
                            {/* Variants */}
                            <div style={{display:'flex',flexWrap:'wrap',gap:6,marginBottom:10}}>
                              {p.variants.map(v=>(
                                <div key={v.id} style={{fontSize:11,padding:'4px 8px',borderRadius:6,background:v.mapped?'var(--green-dim)':'var(--bg-hover)',border:`1px solid ${v.mapped?'#1a4731':'var(--border)'}`,color:v.mapped?'var(--green)':'var(--text-muted)',display:'flex',alignItems:'center',gap:5}}>
                                  {v.title!=='Default Title'&&<span>{v.title}</span>}
                                  <span style={{color:'var(--text)'}}>₹{parseFloat(v.price).toFixed(0)}</span>
                                  <span style={{color:'var(--cyan)',fontWeight:700}}>· {v.inventory_quantity??'—'} in stock</span>
                                  {v.mapped ? <span>✓</span> : (
                                    <button onClick={()=>{ setMapModal({vendorProduct:p,vendorVariant:v}); setCcSearch(''); setCcProducts([]); }}
                                      style={{fontSize:9,padding:'1px 5px',borderRadius:4,border:'1px solid var(--indigo)',background:'transparent',color:'var(--indigo)',cursor:'pointer'}}>Map</button>
                                  )}
                                </div>
                              ))}
                            </div>
                          </div>
                          <div style={{display:'flex',flexDirection:'column',gap:6,flexShrink:0}}>
                            <button className="btn btn-sm btn-indigo" onClick={()=>importProduct(p)} disabled={importing[p.id]||allMapped}>
                              {importing[p.id]?'Importing…':allMapped?'Imported':'↓ Import All'}
                            </button>
                            {allMapped && (
                              <button className="btn btn-sm btn-ghost" onClick={()=>syncProduct(p.id)} disabled={syncingProduct[p.id]}
                                style={{borderColor:'var(--cyan)',color:'var(--cyan)'}}>
                                {syncingProduct[p.id]?'Syncing…':'↻ Sync Stock'}
                              </button>
                            )}
                          </div>
                        </div>
                      </div>
                    );
                  })}
                  </div>
                </>
              )}

              {/* MAPPINGS TAB */}
              {tab==='approvals' && (
                approvLoad ? <div style={{color:'var(--text-muted)',fontSize:12,padding:20}}>Loading…</div> :
                approvals.length===0 ? <div style={{color:'var(--text-muted)',fontSize:12,padding:20}}>No upload requests yet.</div> :
                <div style={{display:'flex',flexDirection:'column',gap:10}}>
                  {approvals.map(req=>(
                    <div key={req._id} style={{background:'var(--bg-card)',border:`1px solid ${req.status==='pending'?'var(--yellow)':req.status==='approved'?'var(--green)':'var(--border)'}`,borderRadius:10,padding:14,display:'flex',gap:12,alignItems:'center'}}>
                      {req.product_image && <img src={req.product_image} style={{width:52,height:52,objectFit:'cover',borderRadius:7,flexShrink:0}} alt=""/>}
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:3,flexWrap:'wrap'}}>
                          <span style={{fontSize:13,fontWeight:700,color:'var(--text)'}}>{req.product_title}</span>
                          {req.request_type==='mapping' && <span style={{fontSize:9,padding:'2px 7px',borderRadius:99,background:'rgba(74,222,128,0.1)',color:'var(--green)',border:'1px solid var(--green)',fontWeight:700}}>🔗 MAP TO EXISTING</span>}
                          {(!req.request_type||req.request_type==='upload') && <span style={{fontSize:9,padding:'2px 7px',borderRadius:99,background:'rgba(99,102,241,0.1)',color:'var(--indigo)',border:'1px solid var(--indigo)',fontWeight:700}}>📤 NEW UPLOAD</span>}
                          {req.request_type==='removal' && <span style={{fontSize:9,padding:'2px 7px',borderRadius:99,background:'rgba(239,68,68,0.1)',color:'var(--red)',border:'1px solid var(--red)',fontWeight:700}}>🗑 REMOVAL REQUEST</span>}
                        </div>
                        <div style={{fontSize:11,color:'var(--text-muted)',marginBottom:4}}>
                          <span style={{color:'var(--indigo)',fontWeight:600}}>{req.vendor_name}</span>
                          {' · '}{req.variants_count} variant{req.variants_count!==1?'s':''}
                          {' · '}{new Date(req.created_at).toLocaleDateString('en-IN')}
                        </div>
                        {req.note && <div style={{fontSize:11,color:'#fbbf24',background:'rgba(251,191,36,0.07)',border:'1px solid rgba(251,191,36,0.2)',borderRadius:5,padding:'4px 8px',marginBottom:4}}>📝 {req.note}</div>}
                        {approvMsg[req._id] && approvMsg[req._id]!=='loading' && (
                          <div style={{fontSize:11,color:approvMsg[req._id].startsWith('✅')?'var(--green)':'var(--red)'}}>{approvMsg[req._id]}</div>
                        )}
                      </div>
                      <div style={{display:'flex',flexDirection:'column',gap:6,flexShrink:0,alignItems:'flex-end'}}>
                        <span style={{fontSize:10,padding:'2px 8px',borderRadius:99,fontWeight:700,
                          background:req.status==='pending'?'var(--yellow-bg)':req.status==='approved'?'var(--green-dim)':'var(--bg-card2)',
                          color:req.status==='pending'?'var(--yellow)':req.status==='approved'?'var(--green)':'var(--text-muted)',
                          border:`1px solid ${req.status==='pending'?'var(--yellow)':req.status==='approved'?'var(--green)':'var(--border)'}`
                        }}>{req.status.toUpperCase()}</span>
                        {req.status==='pending' && (
                          <div style={{display:'flex',gap:6}}>
                            <button className="btn btn-sm btn-indigo" disabled={approvMsg[req._id]==='loading'}
                              onClick={()=>handleApproval(req._id, 'import', req.vendor_name, req.product_id)}>
                              ↓ Import as New
                            </button>
                            <button className="btn btn-sm btn-ghost" disabled={approvMsg[req._id]==='loading'}
                              style={{borderColor:'var(--green)',color:'var(--green)'}}
                              onClick={async ()=>{
                                setSmartMap({ step:'loading', req, vendorVariants:[], ccProduct:null, matches:[], saving:false, saveMsg:'' });
                                try {
                                  const r2 = await fetch(`/admin/vendor-sync/vendor-product-variants?vendor_name=${encodeURIComponent(req.vendor_name)}&product_id=${req.product_id}`, { headers:{ Authorization:'Bearer '+token } });
                                  const d2 = await r2.json();
                                  setSmartMap(s=>({...s, step:'search_cc', vendorVariants: d2.variants||[] }));
                                } catch(e) { setSmartMap(s=>({...s, step:'error', error:e.message})); }
                              }}>
                              🔗 Smart Map
                            </button>
                            <button className="btn btn-sm btn-ghost" disabled={approvMsg[req._id]==='loading'}
                              style={{borderColor:'var(--red)',color:'var(--red)'}}
                              onClick={()=>handleApproval(req._id, 'reject', req.vendor_name, req.product_id)}>
                              ✕
                            </button>
                          </div>
                        )}
                      </div>
                    </div>
                  ))}
                </div>
              )}

              {tab==='mappings' && (
                mappings.length===0 ? <div style={{color:'var(--text-muted)',fontSize:12,padding:20}}>No variant mappings yet. Import or map products from the Products tab.</div> :
                (() => {
                  const [selMaps, setSelMaps] = [mapSelState, setMapSelState];
                  const allIds = mappings.map(m=>m.id);
                  const allSelected = allIds.length > 0 && allIds.every(id=>selMaps.has(id));
                  const seenProducts = new Set();
                  return (
                  <div>
                    {/* Bulk toolbar */}
                    <div style={{display:'flex',alignItems:'center',gap:8,padding:'8px 12px',borderBottom:'1px solid var(--border)',background:'var(--bg-card2)'}}>
                      <input type="checkbox" checked={allSelected} onChange={()=>{
                        if (allSelected) setSelMaps(new Set());
                        else setSelMaps(new Set(allIds));
                      }} style={{cursor:'pointer'}}/>
                      <span style={{fontSize:11,color:'var(--text-muted)'}}>
                        {selMaps.size>0 ? `${selMaps.size} selected` : `${mappings.length} variant${mappings.length!==1?'s':''}`}
                      </span>
                      {selMaps.size>0 && (<>
                        <div style={{marginLeft:'auto',display:'flex',gap:6,flexWrap:'wrap'}}>
                          <button className="btn btn-sm" style={{fontSize:10,border:'1px solid rgba(99,102,241,0.4)',color:'#a5b4fc',background:'rgba(99,102,241,0.1)'}}
                            onClick={async()=>{ await fetch('/admin/vendor-sync/map-bulk/image-sync',{method:'PUT',headers:{'Content-Type':'application/json',Authorization:`Bearer ${token}`},body:JSON.stringify({ids:[...selMaps],sync_images:true})}); loadMappings(); }}>
                            🖼 Img ON</button>
                          <button className="btn btn-sm" style={{fontSize:10,border:'1px solid var(--border)',color:'var(--text-muted)',background:'var(--bg-card2)'}}
                            onClick={async()=>{ await fetch('/admin/vendor-sync/map-bulk/image-sync',{method:'PUT',headers:{'Content-Type':'application/json',Authorization:`Bearer ${token}`},body:JSON.stringify({ids:[...selMaps],sync_images:false})}); loadMappings(); }}>
                            🖼 Img OFF</button>
                          <button className="btn btn-sm" style={{fontSize:10,border:'1px solid rgba(16,185,129,0.4)',color:'var(--green)',background:'var(--green-dim)'}}
                            onClick={async()=>{ await fetch('/admin/vendor-sync/map-bulk/price-sync',{method:'PUT',headers:{'Content-Type':'application/json',Authorization:`Bearer ${token}`},body:JSON.stringify({ids:[...selMaps],sync_price:true})}); loadMappings(); }}>
                            💰 Price ON</button>
                          <button className="btn btn-sm" style={{fontSize:10,border:'1px solid var(--border)',color:'var(--text-muted)',background:'var(--bg-card2)'}}
                            onClick={async()=>{ await fetch('/admin/vendor-sync/map-bulk/price-sync',{method:'PUT',headers:{'Content-Type':'application/json',Authorization:`Bearer ${token}`},body:JSON.stringify({ids:[...selMaps],sync_price:false})}); loadMappings(); }}>
                            💰 Price OFF</button>
                          <button className="btn btn-danger btn-sm" style={{fontSize:10}}
                            onClick={async()=>{
                              if (!window.confirm(`Unmap ${selMaps.size} selected variant${selMaps.size!==1?'s':''}?`)) return;
                              await fetch('/admin/vendor-sync/map-bulk', { method:'DELETE', headers:{'Content-Type':'application/json',Authorization:`Bearer ${token}`}, body:JSON.stringify({ids:[...selMaps]}) });
                              setSelMaps(new Set());
                              loadMappings(); loadVendorProducts(selected);
                            }}>🗑 Unmap ({selMaps.size})</button>
                        </div>
                      </>)}
                    </div>
                    <div style={{display:'flex',flexDirection:'column',gap:8,padding:8}}>
                    {mappings.map(m=>{
                      const isFirstVariant = !seenProducts.has(m.vendor_product_id);
                      if (isFirstVariant) seenProducts.add(m.vendor_product_id);
                      const checked = selMaps.has(m.id);
                      return (
                      <div key={m.id} style={{background:'var(--bg-card)',border:`1px solid ${checked?'var(--indigo)':'var(--border)'}`,borderRadius:10,padding:12,display:'flex',gap:10,alignItems:'center',transition:'border-color 0.15s'}}>
                        {/* Checkbox */}
                        <input type="checkbox" checked={checked} onChange={()=>{
                          setSelMaps(s=>{ const n=new Set(s); n.has(m.id)?n.delete(m.id):n.add(m.id); return n; });
                        }} style={{cursor:'pointer',flexShrink:0}}/>
                        {/* Vendor side */}
                        <div style={{display:'flex',gap:8,alignItems:'center',flex:1,minWidth:0}}>
                          {m.vendor_image
                            ? <img src={m.vendor_image} style={{width:40,height:40,objectFit:'cover',borderRadius:6,flexShrink:0}} alt=""/>
                            : <div style={{width:40,height:40,borderRadius:6,background:'var(--bg-card2)',border:'1px solid var(--border)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:16,flexShrink:0}}>📦</div>}
                          <div style={{minWidth:0}}>
                            <div style={{fontSize:12,fontWeight:600,color:'var(--text)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{m.vendor_product_title||m.vendor_variant_id}</div>
                            <div style={{fontSize:10,color:'var(--text-muted)',marginTop:1}}>{m.vendor_variant_title&&m.vendor_variant_title!=='Default Title'?m.vendor_variant_title:''}</div>
                            <div style={{fontSize:9,fontFamily:'monospace',color:'var(--indigo)',marginTop:1}}>ID: {m.vendor_variant_id}</div>
                          </div>
                        </div>
                        <div style={{fontSize:16,color:'var(--text-muted)',flexShrink:0}}>→</div>
                        {/* CrosCrow side */}
                        <div style={{display:'flex',gap:8,alignItems:'center',flex:1,minWidth:0}}>
                          {m.croscrow_image
                            ? <img src={m.croscrow_image} style={{width:40,height:40,objectFit:'cover',borderRadius:6,flexShrink:0}} alt=""/>
                            : <div style={{width:40,height:40,borderRadius:6,background:'var(--bg-card2)',border:'1px solid var(--border)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:16,flexShrink:0}}>🛍</div>}
                          <div style={{minWidth:0}}>
                            <div style={{fontSize:12,fontWeight:600,color:'var(--text)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{m.croscrow_product_title||m.croscrow_product_id}</div>
                            <div style={{fontSize:10,color:'var(--text-muted)',marginTop:1}}>{m.croscrow_variant_title&&m.croscrow_variant_title!=='Default Title'?m.croscrow_variant_title:''}</div>
                            <div style={{fontSize:9,fontFamily:'monospace',color:'var(--text-muted)',marginTop:1}}>ID: {m.croscrow_variant_id}</div>
                          </div>
                        </div>
                        {/* Sync status + actions */}
                        <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:5,flexShrink:0}}>
                          <span style={{fontSize:10,padding:'2px 8px',borderRadius:10,background:m.sync_inventory?'var(--green-dim)':'var(--bg-card2)',color:m.sync_inventory?'var(--green)':'var(--text-muted)',border:`1px solid ${m.sync_inventory?'var(--green)':'var(--border)'}`}}>
                            {m.sync_inventory?'↻ Inv sync':'No inv sync'}
                          </span>
                          <span style={{fontSize:10,padding:'2px 8px',borderRadius:10,background:m.sync_price===false?'var(--bg-card2)':'rgba(16,185,129,0.1)',color:m.sync_price===false?'var(--text-muted)':'var(--green)',border:`1px solid ${m.sync_price===false?'var(--border)':'rgba(16,185,129,0.4)'}`}}>
                            {m.sync_price===false?'💰 Price off':'💰 Price sync'}
                          </span>
                          {isFirstVariant && (<>
                            <button onClick={async()=>{
                              const newVal = m.sync_images === false ? true : false;
                              await fetch(`/admin/vendor-sync/map/${m.id}/image-sync`, { method:'PUT', headers:{'Content-Type':'application/json',Authorization:'Bearer '+token}, body:JSON.stringify({sync_images:newVal}) });
                              loadMappings();
                            }} style={{fontSize:9,padding:'2px 8px',borderRadius:10,cursor:'pointer',border:`1px solid ${m.sync_images===false?'var(--border)':'rgba(99,102,241,0.4)'}`,background:m.sync_images===false?'var(--bg-card2)':'rgba(99,102,241,0.1)',color:m.sync_images===false?'var(--text-muted)':'#a5b4fc'}}>
                              {m.sync_images===false?'🖼 Img sync off':'🖼 Img sync on'}
                            </button>
                            <button className="btn btn-danger btn-sm" style={{fontSize:9,whiteSpace:'nowrap'}}
                              onClick={async()=>{
                                if (!window.confirm(`Unmap ALL variants of "${m.vendor_product_title||m.vendor_product_id}"?`)) return;
                                await fetch(`/admin/vendor-sync/map-product/${m.id}`, { method:'DELETE', headers:{Authorization:`Bearer ${token}`} });
                                setSelMaps(s=>{ const n=new Set(s); mappings.filter(x=>x.vendor_product_id===m.vendor_product_id).forEach(x=>n.delete(x.id)); return n; });
                                loadMappings(); loadVendorProducts(selected);
                              }}>
                              🗑 Unmap Product
                            </button>
                          </>)}
                          <div style={{fontSize:10,color:'var(--text-muted)'}}>{m.last_synced_at?fmtDate(m.last_synced_at):'Never synced'}</div>
                          <button className="btn btn-danger btn-sm" style={{fontSize:9}} onClick={()=>unmapVariant(m.id)}>Unmap Variant</button>
                        </div>
                      </div>
                      );
                    })}
                    </div>
                  </div>
                  );
                })()
              )}
            </>
          )}
        </div>

        {/* Smart Map Modal */}
        {smartMap && (() => {
          const normVariant = s => (s||'').toLowerCase().trim().replace(/\s+/g,'');
          const SIZE_ALIASES = { xs:['xsmall','extrasmall'],s:['small'],m:['medium'],l:['large'],xl:['xlarge','extralarge'],xxl:['xxlarge','2xl','doublexl'],xxxl:['xxxlarge','3xl','triplexl'] };
          const matchNorm = (a, b) => {
            const na = normVariant(a), nb = normVariant(b);
            if (na === nb) return true;
            for (const [key, aliases] of Object.entries(SIZE_ALIASES)) {
              const setA = new Set([key,...aliases]), setB = new Set([key,...aliases]);
              if ((setA.has(na)||setA.has(nb)) && (setA.has(na)&&setA.has(nb))) return true;
              if (setA.has(na) && setA.has(nb)) return true;
            }
            return false;
          };
          const autoMatch = (vendorVariants, ccVariants) => vendorVariants.map(vv => {
            const cc = ccVariants.find(cv => matchNorm(vv.title, cv.title));
            return { vendorVariant:vv, ccVariant:cc||null, autoMatched:!!cc, action:cc?'map':'create', overrideCcVariantId:cc?String(cc.id):'' };
          });
          const selectCcProduct = async (cp) => {
            const matches = autoMatch(smartMap.vendorVariants, cp.variants||[]);
            setSmartMap(s=>({...s, step:'review', ccProduct:cp, matches }));
          };
          const confirmSave = async () => {
            setSmartMap(s=>({...s, saving:true, saveMsg:''}));
            const mappings = smartMap.matches.map(m => ({
              vendor_variant_id: String(m.vendorVariant.id),
              vendor_variant_title: m.vendorVariant.title,
              action: m.action,
              croscrow_variant_id: m.action==='map' ? (m.overrideCcVariantId || (m.ccVariant ? String(m.ccVariant.id) : '')) : '',
              croscrow_variant_title: m.action==='map' ? (smartMap.ccProduct.variants||[]).find(v=>String(v.id)===(m.overrideCcVariantId||(m.ccVariant?String(m.ccVariant.id):''))  )?.title||'' : m.vendorVariant.title,
              croscrow_product_title: smartMap.ccProduct.title,
              variant_title: m.vendorVariant.title,
              variant_price: m.vendorVariant.price,
            }));
            try {
              const r = await fetch('/admin/vendor-sync/smart-map', { method:'POST', headers:{'Content-Type':'application/json',Authorization:'Bearer '+token},
                body: JSON.stringify({ vendor_name: smartMap.req.vendor_name, vendor_product_id: String(smartMap.req.product_id), croscrow_product_id: String(smartMap.ccProduct.id), mappings, upload_request_id: String(smartMap.req._id) }) });
              const d = await r.json();
              if (!r.ok) throw new Error(d.error);
              setSmartMap(s=>({...s, saving:false, saveMsg:`✅ ${d.mapped} mapped${d.skipped?`, ${d.skipped} skipped`:''}${d.errors?.length?`, ${d.errors.length} errors`:''}`}));
              loadApprovals(); loadVendorProducts(selected);
              setTimeout(()=>setSmartMap(null), 1800);
            } catch(e) { setSmartMap(s=>({...s, saving:false, saveMsg:'❌ '+e.message})); }
          };

          return (
            <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.75)',zIndex:2000,display:'flex',alignItems:'center',justifyContent:'center'}}>
              <div style={{background:'var(--bg-card)',borderRadius:14,padding:28,width:600,maxWidth:'95vw',maxHeight:'85vh',overflowY:'auto'}}>
                <h3 style={{margin:'0 0 4px',color:'var(--text)',fontSize:15}}>🤖 Smart Map — {smartMap.req.product_title}</h3>

                {smartMap.step==='loading' && <div style={{color:'var(--text-muted)',padding:20}}>Loading vendor variants…</div>}
                {smartMap.step==='error' && <div style={{color:'var(--red)',padding:20}}>❌ {smartMap.error}</div>}

                {smartMap.step==='search_cc' && (<>
                  <div style={{fontSize:12,color:'var(--text-muted)',marginBottom:14}}>
                    Found <strong>{smartMap.vendorVariants.length}</strong> vendor variants. Search the CrosCrow product to map to:
                  </div>
                  <div style={{display:'flex',gap:8,marginBottom:10}}>
                    <input className="form-input" placeholder="Search CrosCrow products…" value={ccSearch} onChange={e=>setCcSearch(e.target.value)}
                      onKeyDown={e=>e.key==='Enter'&&ccSearch.trim().length>1&&searchCcProducts(ccSearch.trim())} style={{flex:1}}/>
                    <button className="btn btn-sm btn-primary" onClick={()=>ccSearch.trim().length>1&&searchCcProducts(ccSearch.trim())} disabled={ccSearching}>{ccSearching?'…':'Search'}</button>
                  </div>
                  <div style={{display:'flex',flexDirection:'column',gap:6,maxHeight:380,overflowY:'auto'}}>
                    {ccProducts.map(cp=>{
                      const img=cp.images?.[0]?.src;
                      return (
                        <div key={cp.id} onClick={()=>selectCcProduct(cp)} style={{display:'flex',gap:10,alignItems:'center',padding:'10px 12px',borderRadius:8,border:'1px solid var(--border)',background:'var(--bg-hover)',cursor:'pointer'}}>
                          {img?<img src={img} style={{width:40,height:40,objectFit:'cover',borderRadius:5,border:'1px solid var(--border)',flexShrink:0}} alt=""/>:<div style={{width:40,height:40,borderRadius:5,background:'var(--bg-card2)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:16,flexShrink:0}}>🛍</div>}
                          <div style={{flex:1,minWidth:0}}>
                            <div style={{fontWeight:600,fontSize:12,color:'var(--text)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{cp.title}</div>
                            <div style={{fontSize:11,color:'var(--text-muted)',marginTop:2}}>{cp.variants?.length} variants</div>
                          </div>
                          <span style={{fontSize:11,color:'var(--indigo)',fontWeight:600}}>Select →</span>
                        </div>
                      );
                    })}
                    {ccProducts.length===0&&!ccSearching&&<div style={{fontSize:12,color:'var(--text-muted)',padding:12}}>{ccSearch.length>1?'No products found.':'Type to search CC products.'}</div>}
                  </div>
                </>)}

                {smartMap.step==='review' && (<>
                  <div style={{fontSize:12,color:'var(--text-muted)',marginBottom:14}}>
                    CC Product: <strong style={{color:'var(--text)'}}>{smartMap.ccProduct.title}</strong>
                    <button onClick={()=>setSmartMap(s=>({...s,step:'search_cc'}))} style={{marginLeft:8,fontSize:10,color:'var(--indigo)',background:'none',border:'none',cursor:'pointer',textDecoration:'underline'}}>Change</button>
                  </div>
                  <div style={{display:'flex',flexDirection:'column',gap:6,marginBottom:16}}>
                    {smartMap.matches.map((m,i)=>{
                      const ccVars = smartMap.ccProduct.variants||[];
                      return (
                        <div key={m.vendorVariant.id} style={{background:'var(--bg-hover)',borderRadius:8,padding:'10px 12px',border:`1px solid ${m.autoMatched?'rgba(74,222,128,0.3)':m.action==='create'?'rgba(251,191,36,0.3)':'var(--border)'}`}}>
                          <div style={{display:'flex',alignItems:'center',gap:10,flexWrap:'wrap'}}>
                            {/* Vendor side */}
                            <div style={{minWidth:100}}>
                              <div style={{fontSize:10,color:'var(--text-muted)',marginBottom:2}}>VENDOR</div>
                              <div style={{fontWeight:700,fontSize:13,color:'var(--text)'}}>{m.vendorVariant.title==='Default Title'?'Default':m.vendorVariant.title}</div>
                              <div style={{fontSize:11,color:'var(--text-muted)'}}>₹{parseFloat(m.vendorVariant.price||0).toFixed(0)}</div>
                            </div>
                            <span style={{fontSize:16,color:'var(--text-muted)'}}>→</span>
                            {/* CC side */}
                            <div style={{flex:1,minWidth:140}}>
                              <div style={{fontSize:10,color:'var(--text-muted)',marginBottom:2}}>CROSCROW</div>
                              {m.action==='skip' ? (
                                <span style={{fontSize:11,color:'var(--text-muted)'}}>— Skipped</span>
                              ) : m.action==='create' ? (
                                <span style={{fontSize:11,color:'#fbbf24',fontWeight:600}}>✦ Create new variant "{m.vendorVariant.title==='Default Title'?'Default':m.vendorVariant.title}"</span>
                              ) : (
                                <select value={m.overrideCcVariantId||(m.ccVariant?String(m.ccVariant.id):'')}
                                  onChange={e=>setSmartMap(s=>({...s,matches:s.matches.map((x,j)=>j===i?{...x,overrideCcVariantId:e.target.value,action:'map'}:x)}))}
                                  style={{fontSize:12,background:'var(--bg-card2)',border:'1px solid var(--border)',borderRadius:5,color:'var(--text)',padding:'3px 6px',width:'100%'}}>
                                  {ccVars.map(cv=><option key={cv.id} value={String(cv.id)}>{cv.title==='Default Title'?'Default':cv.title} — ₹{parseFloat(cv.price).toFixed(0)}</option>)}
                                </select>
                              )}
                              {m.autoMatched&&m.action==='map'&&<div style={{fontSize:9,color:'#4ade80',marginTop:2}}>✅ Auto-matched</div>}
                            </div>
                            {/* Action toggle */}
                            <div style={{display:'flex',flexDirection:'column',gap:3,flexShrink:0}}>
                              {['map','create','skip'].map(a=>(
                                <button key={a} onClick={()=>setSmartMap(s=>({...s,matches:s.matches.map((x,j)=>j===i?{...x,action:a,overrideCcVariantId:a==='map'?(x.ccVariant?String(x.ccVariant.id):''):x.overrideCcVariantId}:x)}))}
                                  style={{fontSize:9,padding:'2px 7px',borderRadius:4,border:`1px solid ${m.action===a?'var(--indigo)':'var(--border)'}`,background:m.action===a?'var(--indigo-dim)':'transparent',color:m.action===a?'var(--indigo)':'var(--text-muted)',cursor:'pointer',fontFamily:'inherit'}}>
                                  {a==='map'?'Map':a==='create'?'Create':' Skip'}
                                </button>
                              ))}
                            </div>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                  {smartMap.saveMsg && <div style={{marginBottom:10,fontSize:12,color:smartMap.saveMsg.startsWith('✅')?'var(--green)':'var(--red)'}}>{smartMap.saveMsg}</div>}
                  <div style={{display:'flex',gap:10,justifyContent:'flex-end'}}>
                    <button className="btn btn-ghost" onClick={()=>setSmartMap(null)} disabled={smartMap.saving}>Cancel</button>
                    <button className="btn btn-primary" onClick={confirmSave} disabled={smartMap.saving}>
                      {smartMap.saving?'Saving…':`✓ Confirm & Save ${smartMap.matches.filter(m=>m.action!=='skip').length} Mappings`}
                    </button>
                  </div>
                </>)}

                {!['review'].includes(smartMap.step) && <div style={{marginTop:16,textAlign:'right'}}><button className="btn btn-ghost" onClick={()=>setSmartMap(null)}>Cancel</button></div>}
              </div>
            </div>
          );
        })()}

        {/* Map Modal */}
        {mapModal && (
          <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.7)',zIndex:2000,display:'flex',alignItems:'center',justifyContent:'center'}}>
            <div style={{background:'var(--bg-card)',borderRadius:14,padding:28,width:500,maxWidth:'90vw',maxHeight:'80vh',overflowY:'auto'}}>
              <h3 style={{margin:'0 0 4px',color:'var(--text)',fontSize:15}}>Map Variant to CrosCrow Product</h3>
              <div style={{fontSize:12,color:'var(--text-muted)',marginBottom:16}}>
                Vendor: <strong>{mapModal.vendorProduct.title}</strong> — {mapModal.vendorVariant.title} (₹{mapModal.vendorVariant.price})
              </div>
              <div style={{display:'flex',gap:8,marginBottom:12}}>
                <input className="form-input" placeholder="Search CrosCrow products…" value={ccSearch}
                  onChange={e=>setCcSearch(e.target.value)}
                  onKeyDown={e=>{ if(e.key==='Enter' && ccSearch.trim().length>1) searchCcProducts(ccSearch.trim()); }}
                  style={{flex:1,boxSizing:'border-box'}}/>
                <button className="btn btn-sm btn-primary" onClick={()=>{ if(ccSearch.trim().length>1) searchCcProducts(ccSearch.trim()); }} disabled={ccSearching}>
                  {ccSearching?'…':'Search'}
                </button>
              </div>
              {ccSearching && <div style={{color:'var(--text-muted)',fontSize:12,marginBottom:8}}>Searching…</div>}
              <div style={{display:'flex',flexDirection:'column',gap:8,maxHeight:420,overflowY:'auto'}}>
                {ccProducts.map(cp=>{
                  const img = cp.images?.[0]?.src;
                  return (
                    <div key={cp.id} style={{background:'var(--bg-hover)',borderRadius:8,padding:10,display:'flex',gap:10,alignItems:'flex-start'}}>
                      {img
