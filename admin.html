              </span>
            </div>
          </div>

          {view==='dashboard'   && <Dashboard   token={token} onStageClick={handleStageClick}/>}
          {view==='orders'      && <Orders      token={token} initialStage={stageFilter} key={stageFilter}/>}
          {view==='vendors'     && <Vendors     token={token}/>}
          {view==='returns'     && <ReturnRequests token={token}/>}
          {view==='jarvis'      && <JarvisChat  token={token}/>}
          {view==='settlements' && <Settlements token={token}/>}
          {view==='settings'    && <Settings    token={token}/>}
          {view==='tagmappings' && <TagMappings token={token}/>}
          {view==='shippingcreds' && <ShippingCreds token={token}/>}
          {view==='emailsettings' && <EmailSettings token={token}/>}
          {view==='vendorsync'  && <VendorSync token={token}/>}
          {view==='penalties'   && <PenaltyManager token={token}/>}
          {view==='reports'     && <Reports token={token}/>}
          {view==='audit'       && <AuditLog    token={token}/>}
          {view==='webhooks'    && <Webhooks    token={token}/>}
          {view==='googlecontacts'  && <GoogleContacts   token={token}/>}
          {view==='commissionrules' && <CommissionRules  token={token}/>}
        </div>
      </div>
    );
  }

  /* ══════════════════════════════════════════════════════════
     WEBHOOKS PANEL
  ══════════════════════════════════ */
  function CommissionRules({ token }) {
    const EMPTY = { vendor_name:'', product_id:'', sku:'', title:'', image:'', price:0, mode:'flat', flat_amount:'', flat_gst_inclusive:true, vendor_cost:'', margin_pct:'', margin_gst_inclusive:true };
    const [rules,      setRules]      = useState([]);
    const [vendors,    setVendors]    = useState([]);
    const [products,   setProducts]   = useState([]);
    const [prodLoad,   setProdLoad]   = useState(false);
    const [loading,    setLoading]    = useState(true);
    const [form,       setForm]       = useState(EMPTY);
    const [editing,    setEditing]    = useState(null);
    const [saving,     setSaving]     = useState(false);
    const [msg,        setMsg]        = useState(null);
    const [filterV,    setFilterV]    = useState('all');
    const [selectedProducts, setSelectedProducts] = useState(new Set()); // multi-select

    const load = () => {
      setLoading(true);
      Promise.all([
        fetch(`${API}/admin/commission-rules`, { headers:{ Authorization:`Bearer ${token}` } }).then(r=>r.json()),
        fetch(`${API}/admin/vendors`,          { headers:{ Authorization:`Bearer ${token}` } }).then(r=>r.json()),
      ]).then(([rd, vd])=>{
        setRules(rd.rules||[]);
        setVendors((vd.vendors||[]).map(v=>v.name));
      }).finally(()=>setLoading(false));
    };
    useEffect(load, [token]);

    const loadProducts = (vendorName) => {
      if (!vendorName) { setProducts([]); return; }
      setProdLoad(true);
      fetch(`${API}/admin/products?vendor=${encodeURIComponent(vendorName)}`, { headers:{ Authorization:`Bearer ${token}` } })
        .then(r=>r.json()).then(d=>setProducts(d.products||[])).catch(()=>setProducts([])).finally(()=>setProdLoad(false));
    };

    const selectVendor = (vendorName) => {
      setForm(f=>({...f, vendor_name: vendorName, product_id:'', sku:'', title:'', image:'', price:0}));
      setSelectedProducts(new Set());
      loadProducts(vendorName);
    };

    const toggleProduct = (p) => {
      setSelectedProducts(prev => {
        const next = new Set(prev);
        if (next.has(p.id)) { next.delete(p.id); } else { next.add(p.id); }
        // Update preview price from last toggled product
        const price = p.variants?.[0]?.price || p.price || 0;
        setForm(f=>({...f, price: next.size > 0 ? price : 0}));
        return next;
      });
    };

    const toggleAllProducts = () => {
      if (selectedProducts.size === products.length) {
        setSelectedProducts(new Set());
        setForm(f=>({...f, price:0}));
      } else {
        setSelectedProducts(new Set(products.map(p=>p.id)));
        if (products[0]) setForm(f=>({...f, price: products[0].variants?.[0]?.price || products[0].price || 0}));
      }
    };

    const save = async () => {
      if (!form.vendor_name) { setMsg({type:'error',text:'Select a vendor first.'}); return; }
      setSaving(true); setMsg(null);
      try {
        const basePayload = {
          ...form,
          flat_amount: parseFloat(form.flat_amount)||0,
          vendor_cost: parseFloat(form.vendor_cost)||0,
          margin_pct:  parseFloat(form.margin_pct)||0,
        };

        if (editing) {
          // Single update
          const r = await fetch(`${API}/admin/commission-rules/${editing}`, { method:'PUT', headers:{'Content-Type':'application/json','Authorization':`Bearer ${token}`}, body: JSON.stringify(basePayload) });
          const d = await r.json();
          if (!r.ok) throw new Error(d.error);
          setMsg({type:'success', text:'Rule updated.'});
          setEditing(null);
        } else if (selectedProducts.size > 0) {
          // Batch create — one rule per selected product
          let created = 0, skipped = 0;
          for (const pid of selectedProducts) {
            const p = products.find(x=>x.id===pid);
            if (!p) continue;
            const payload = { ...basePayload, product_id: p.id, title: p.title, sku: p.variants?.[0]?.sku||'', image: p.image||null };
            const r = await fetch(`${API}/admin/commission-rules`, { method:'POST', headers:{'Content-Type':'application/json','Authorization':`Bearer ${token}`}, body: JSON.stringify(payload) });
            const d = await r.json();
            if (r.ok) created++; else skipped++;
          }
          setMsg({type:'success', text:`${created} rule${created!==1?'s':''} created${skipped>0?` (${skipped} skipped — already exist)`:''}.`});
          setSelectedProducts(new Set());
        } else {
          // No product selected — create rule without product (vendor-wide not supported here)
          setMsg({type:'error', text:'Select at least one product.'});
          setSaving(false); return;
        }

        setForm(EMPTY); load();
      } catch(e) { setMsg({type:'error',text:e.message}); }
      setSaving(false);
    };

    const del = async (id) => {
      if (!window.confirm('Delete this commission rule?')) return;
      await fetch(`${API}/admin/commission-rules/${id}`, { method:'DELETE', headers:{ Authorization:`Bearer ${token}` } });
      load();
    };

    const startEdit = (r) => {
      setEditing(r.id);
      setForm({ vendor_name:r.vendor_name, product_id:r.product_id||'', sku:r.sku||'', title:r.title||'', image:r.image||'', price:0, mode:r.mode, flat_amount:r.flat_amount||'', flat_gst_inclusive:r.flat_gst_inclusive, vendor_cost:r.vendor_cost||'', margin_pct:r.margin_pct||'', margin_gst_inclusive:r.margin_gst_inclusive });
      setSelectedProducts(new Set());
      loadProducts(r.vendor_name);
      setMsg(null);
      window.scrollTo({top:0,behavior:'smooth'});
    };

    const modeColor = m => m==='flat'?'var(--indigo)':m==='margin'?'var(--teal)':'var(--purple)';

    // Preview calculation using real product price
    const preview = (() => {
      if (!form.mode) return null;
      const shopifyPrice = parseFloat(form.price) || 0;
      let comm = 0, gst = 0;
      if (form.mode === 'flat' || form.mode === 'mixed') {
        const f = parseFloat(form.flat_amount)||0;
        if (form.flat_gst_inclusive) { gst += f*18/118; comm += f*100/118; }
        else { comm += f; gst += f*0.18; }
      }
      if (form.mode === 'margin' || form.mode === 'mixed') {
        const base = parseFloat(form.vendor_cost)||0;
        const pct  = (parseFloat(form.margin_pct)||0)/100;
        const c = base * pct;
        if (form.margin_gst_inclusive) { gst += c*18/118; comm += c*100/118; }
        else { comm += c; gst += c*0.18; }
      }
      // Vendor gets: for margin/mixed use vendor_cost as base, for flat use shopify price
      const base = (form.mode==='margin'||form.mode==='mixed') ? parseFloat(form.vendor_cost)||0 : shopifyPrice;
      const vendorGets = base - (comm + gst);
      const margin = (form.mode==='margin'||form.mode==='mixed') ? (shopifyPrice - (parseFloat(form.vendor_cost)||0)) : 0;
      return { comm: comm.toFixed(2), gst: gst.toFixed(2), total: (comm+gst).toFixed(2), vendorGets: vendorGets.toFixed(2), shopifyPrice, base, margin: margin.toFixed(2) };
    })();

    const filteredRules = filterV==='all' ? rules : rules.filter(r=>r.vendor_name===filterV);

    return (
      <div className="page">
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:20}}>
          <h2 style={{margin:0,fontSize:18,color:'var(--text)'}}>⚡ Product Commission Rules</h2>
          <div style={{fontSize:11,color:'var(--text-muted)'}}>Overrides vendor-level commission per product</div>
        </div>

        {/* Form */}
        <div className="card" style={{padding:20,marginBottom:20}}>
          <div style={{fontSize:12,fontWeight:700,color:'var(--text)',marginBottom:14,letterSpacing:1}}>{editing ? '✏ Edit Rule' : '+ New Rule'}</div>

          {msg && <div style={{padding:'8px 12px',borderRadius:6,marginBottom:12,fontSize:12,background:msg.type==='success'?'rgba(16,185,129,0.1)':'rgba(239,68,68,0.1)',color:msg.type==='success'?'var(--green)':'var(--red)',border:`1px solid ${msg.type==='success'?'rgba(16,185,129,0.3)':'rgba(239,68,68,0.3)'}`}}>{msg.text}</div>}

          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(200px,1fr))',gap:12,marginBottom:14}}>
            <div>
              <label className="form-label">Vendor</label>
              <select className="form-select" value={form.vendor_name} onChange={e=>selectVendor(e.target.value)}>
                <option value="">Select vendor…</option>
                {vendors.map(v=><option key={v} value={v}>{v}</option>)}
              </select>
            </div>
            <div style={{gridColumn:'1/-1'}}>
              <label className="form-label">Product {prodLoad && <span style={{color:'var(--text-muted)'}}>loading…</span>}</label>
              {!form.vendor_name ? (
                <div className="form-input" style={{color:'var(--text-muted)',fontSize:11}}>Select vendor first</div>
              ) : prodLoad ? (
                <div className="form-input" style={{color:'var(--text-muted)',fontSize:11}}>Loading products…</div>
              ) : (
                <>
                  <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:8}}>
                    <button type="button" onClick={toggleAllProducts} style={{fontSize:11,padding:'3px 10px',borderRadius:4,border:'1px solid var(--border)',background:'var(--bg-card2)',color:'var(--text-muted)',cursor:'pointer'}}>
                      {selectedProducts.size===products.length?'Deselect All':'Select All'}
                    </button>
                    {selectedProducts.size>0 && <span style={{fontSize:11,color:'var(--indigo)',fontWeight:700}}>{selectedProducts.size} selected</span>}
                  </div>
                  <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(130px,1fr))',gap:8,maxHeight:300,overflowY:'auto',padding:4}}>
                    {products.map(p=>{
                      const isSelected = selectedProducts.has(p.id);
                      return (
                        <div key={p.id} onClick={()=>toggleProduct(p)} style={{border:`2px solid ${isSelected?'var(--indigo)':'var(--border)'}`,borderRadius:8,cursor:'pointer',overflow:'hidden',background:isSelected?'var(--indigo-dim)':'var(--bg-card2)',transition:'all 0.15s',position:'relative'}}>
                          {isSelected && <div style={{position:'absolute',top:6,right:6,width:20,height:20,borderRadius:'50%',background:'var(--indigo)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,color:'#fff',fontWeight:700,zIndex:1}}>✓</div>}
                          {p.image
                            ? <img src={p.image} alt={p.title} style={{width:'100%',height:90,objectFit:'cover',display:'block'}}/>
                            : <div style={{width:'100%',height:90,background:'var(--bg)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:24}}>📦</div>}
                          <div style={{padding:'6px 8px',fontSize:10,color:isSelected?'var(--indigo)':'var(--text)',fontWeight:600,lineHeight:1.3,wordBreak:'break-word'}}>{p.title}</div>
                        </div>
                      );
                    })}
                  </div>
                </>
              )}
            </div>
            <div>
              <label className="form-label">Product Name (editable)</label>
              <input className="form-input" placeholder="e.g. Classic T-Shirt" value={form.title} onChange={e=>setForm(f=>({...f,title:e.target.value}))}/>
            </div>
            <div>
              <label className="form-label">SKU (auto-filled / editable)</label>
              <input className="form-input" placeholder="e.g. TSHIRT-BLK-M" value={form.sku} onChange={e=>setForm(f=>({...f,sku:e.target.value}))}/>
            </div>
          </div>

          {/* Mode selector */}
          <div style={{marginBottom:14}}>
            <label className="form-label">Commission Mode</label>
            <div style={{display:'flex',gap:8}}>
              {[{id:'flat',label:'Flat Rate',desc:'Fixed ₹ per unit'},{id:'margin',label:'Margin + %',desc:'Vendor cost + % commission'},{id:'mixed',label:'Mixed',desc:'Both flat + margin %'}].map(m=>(
                <button key={m.id} onClick={()=>setForm(f=>({...f,mode:m.id}))} style={{flex:1,padding:'10px 8px',borderRadius:8,border:`2px solid ${form.mode===m.id?modeColor(m.id):'var(--border)'}`,background:form.mode===m.id?`${modeColor(m.id)}18`:'var(--bg-card2)',cursor:'pointer',textAlign:'center'}}>
                  <div style={{fontSize:12,fontWeight:700,color:form.mode===m.id?modeColor(m.id):'var(--text-muted)'}}>{m.label}</div>
                  <div style={{fontSize:10,color:'var(--text-muted)',marginTop:3}}>{m.desc}</div>
                </button>
              ))}
            </div>
          </div>

          {/* Flat rate fields */}
          {(form.mode==='flat'||form.mode==='mixed') && (
            <div style={{background:'rgba(99,102,241,0.06)',border:'1px solid rgba(99,102,241,0.2)',borderRadius:8,padding:14,marginBottom:12}}>
              <div style={{fontSize:11,fontWeight:700,color:'var(--indigo)',marginBottom:10,letterSpacing:1}}>FLAT RATE COMMISSION</div>
              <div style={{display:'flex',gap:12,flexWrap:'wrap',alignItems:'flex-end'}}>
                <div>
                  <label className="form-label">Flat Commission (₹ per unit)</label>
                  <input className="form-input" type="number" placeholder="500" style={{width:140}} value={form.flat_amount} onChange={e=>setForm(f=>({...f,flat_amount:e.target.value}))}/>
                </div>
                <div>
                  <label className="form-label">GST Treatment</label>
                  <div style={{display:'flex',gap:8,marginTop:4}}>
                    {[{v:true,l:'Inclusive (GST inside ₹'+(form.flat_amount||'?')+')'},{v:false,l:'Exclusive (GST added on top)'}].map(o=>(
                      <label key={String(o.v)} style={{display:'flex',alignItems:'center',gap:6,cursor:'pointer',fontSize:11,color:form.flat_gst_inclusive===o.v?'var(--indigo)':'var(--text-muted)'}}>
                        <input type="radio" checked={form.flat_gst_inclusive===o.v} onChange={()=>setForm(f=>({...f,flat_gst_inclusive:o.v}))} style={{accentColor:'var(--indigo)'}}/>{o.l}
                      </label>
                    ))}
                  </div>
                </div>
              </div>
              <div style={{fontSize:11,color:'var(--text-muted)',marginTop:8}}>
                {form.flat_gst_inclusive
                  ? `Vendor gets: Selling Price − ₹${form.flat_amount||'?'} (GST extracted from the ₹${form.flat_amount||'?'})`
                  : `Vendor gets: Selling Price − ₹${form.flat_amount||'?'} × 1.18 (GST added on top)`}
              </div>
            </div>
          )}

          {/* Margin fields */}
          {(form.mode==='margin'||form.mode==='mixed') && (
            <div style={{background:'rgba(45,212,191,0.06)',border:'1px solid rgba(45,212,191,0.2)',borderRadius:8,padding:14,marginBottom:12}}>
              <div style={{fontSize:11,fontWeight:700,color:'var(--teal)',marginBottom:10,letterSpacing:1}}>MARGIN + % COMMISSION</div>
              <div style={{display:'flex',gap:12,flexWrap:'wrap',alignItems:'flex-end'}}>
                <div>
                  <label className="form-label">Vendor Cost Price (₹)</label>
                  <input className="form-input" type="number" placeholder="1000" style={{width:140}} value={form.vendor_cost} onChange={e=>setForm(f=>({...f,vendor_cost:e.target.value}))}/>
                </div>
                <div>
                  <label className="form-label">Commission % on Vendor Cost</label>
                  <input className="form-input" type="number" placeholder="10" style={{width:120}} value={form.margin_pct} onChange={e=>setForm(f=>({...f,margin_pct:e.target.value}))}/>
                </div>
                <div>
                  <label className="form-label">GST Treatment</label>
                  <div style={{display:'flex',gap:8,marginTop:4}}>
                    {[{v:true,l:'Inclusive'},{v:false,l:'Exclusive'}].map(o=>(
                      <label key={String(o.v)} style={{display:'flex',alignItems:'center',gap:6,cursor:'pointer',fontSize:11,color:form.margin_gst_inclusive===o.v?'var(--teal)':'var(--text-muted)'}}>
                        <input type="radio" checked={form.margin_gst_inclusive===o.v} onChange={()=>setForm(f=>({...f,margin_gst_inclusive:o.v}))} style={{accentColor:'var(--teal)'}}/>{o.l}
                      </label>
                    ))}
                  </div>
                </div>
              </div>
              <div style={{fontSize:11,color:'var(--text-muted)',marginTop:8}}>
                Margin (Shopify price − vendor cost) goes to CrosCrow. Additionally {form.margin_pct||'?'}% commission on vendor cost of ₹{form.vendor_cost||'?'}.
              </div>
            </div>
          )}

          {/* Live preview */}
          {preview && (parseFloat(form.flat_amount)||parseFloat(form.vendor_cost)) ? (
            <div style={{background:'var(--bg-card2)',border:'1px solid var(--border)',borderRadius:8,padding:12,marginBottom:14}}>
              <div style={{fontSize:10,letterSpacing:1,color:'var(--text-muted)',marginBottom:10,fontWeight:700}}>
                LIVE PREVIEW (per unit)
                {preview.shopifyPrice>0 && <span style={{marginLeft:8,color:'var(--indigo)'}}>Shopify price: ₹{preview.shopifyPrice}</span>}
                {!preview.shopifyPrice && <span style={{marginLeft:8,color:'var(--yellow)'}}>⚠ Select a product to see real prices</span>}
              </div>
              <div style={{display:'flex',gap:16,flexWrap:'wrap'}}>
                {preview.shopifyPrice>0 && preview.margin>0 && <div><div style={{fontSize:9,color:'var(--text-muted)'}}>MARGIN TO CROSCROW</div><div style={{fontSize:14,fontWeight:700,color:'var(--teal)'}}>₹{preview.margin}</div></div>}
                <div><div style={{fontSize:9,color:'var(--text-muted)'}}>COMMISSION</div><div style={{fontSize:14,fontWeight:700,color:'var(--indigo)'}}>₹{preview.comm}</div></div>
                <div><div style={{fontSize:9,color:'var(--text-muted)'}}>GST</div><div style={{fontSize:14,fontWeight:700,color:'var(--yellow)'}}>₹{preview.gst}</div></div>
                <div><div style={{fontSize:9,color:'var(--text-muted)'}}>TOTAL DEDUCTION</div><div style={{fontSize:14,fontWeight:700,color:'var(--red)'}}>₹{preview.total}</div></div>
                <div><div style={{fontSize:9,color:'var(--text-muted)'}}>VENDOR GETS</div><div style={{fontSize:16,fontWeight:800,color:'var(--green)'}}>₹{preview.vendorGets}</div></div>
              </div>
            </div>
          ) : null}

          <div style={{display:'flex',gap:10,alignItems:'center'}}>
            <button className="btn btn-indigo" onClick={save} disabled={saving}>
              {saving ? 'Saving…' : editing ? '✓ Update Rule' : selectedProducts.size > 1 ? `+ Create ${selectedProducts.size} Rules` : '+ Create Rule'}
            </button>
            {editing && <button className="btn btn-ghost btn-sm" onClick={()=>{setEditing(null);setForm(EMPTY);setSelectedProducts(new Set());setMsg(null);}}>Cancel</button>}
            {!editing && selectedProducts.size===0 && <span style={{fontSize:11,color:'var(--text-muted)'}}>Select products above</span>}
          </div>
        </div>

        {/* Rules list */}
        <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:12}}>
          <span style={{fontSize:12,color:'var(--text-muted)'}}>Filter by vendor:</span>
          <select className="form-select" style={{width:200}} value={filterV} onChange={e=>setFilterV(e.target.value)}>
            <option value="all">All Vendors</option>
            {vendors.map(v=><option key={v} value={v}>{v}</option>)}
          </select>
          <span style={{fontSize:11,color:'var(--text-muted)',marginLeft:'auto'}}>{filteredRules.length} rule{filteredRules.length!==1?'s':''}</span>
        </div>

        {loading ? <div style={{color:'var(--text-muted)',padding:20}}>Loading…</div>
        : filteredRules.length===0 ? <div style={{background:'var(--bg-card)',borderRadius:10,padding:40,textAlign:'center',color:'var(--text-muted)'}}>No commission rules yet. Create one above.</div>
        : <div style={{display:'flex',flexDirection:'column',gap:10}}>
            {filteredRules.map(r=>(
              <div key={r.id} style={{background:'var(--bg-card)',border:'1px solid var(--border)',borderRadius:10,padding:'14px 18px',display:'flex',alignItems:'center',gap:14,flexWrap:'wrap'}}>
                {r.image
                  ? <img src={r.image} alt={r.title} style={{width:56,height:56,objectFit:'cover',borderRadius:8,flexShrink:0,border:'1px solid var(--border)'}}/>
                  : <div style={{width:56,height:56,borderRadius:8,background:'var(--bg-card2)',border:'1px solid var(--border)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:22,flexShrink:0}}>📦</div>}
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:4}}>
                    <span style={{fontSize:13,fontWeight:700,color:'var(--text)'}}>{r.title||'—'}</span>
                    <span style={{fontSize:10,padding:'2px 8px',borderRadius:20,background:`${modeColor(r.mode)}18`,color:modeColor(r.mode),border:`1px solid ${modeColor(r.mode)}44`,fontWeight:700}}>{r.mode.toUpperCase()}</span>
                  </div>
                  <div style={{fontSize:11,color:'var(--text-muted)',marginBottom:4}}>
                    <strong style={{color:'var(--text)'}}>{r.vendor_name}</strong>
                    {r.product_id && <span style={{marginLeft:10,fontFamily:'monospace',color:'var(--indigo)'}}>ID: {r.product_id}</span>}
                    {r.sku && <span style={{marginLeft:10,color:'var(--text-muted)'}}>SKU: {r.sku}</span>}
                  </div>
                  <div style={{display:'flex',gap:12,fontSize:11,color:'var(--text-muted)',flexWrap:'wrap'}}>
                    {(r.mode==='flat'||r.mode==='mixed') && <span>Flat: <strong style={{color:'var(--indigo)'}}>₹{r.flat_amount}</strong> {r.flat_gst_inclusive?'(GST incl.)':'(GST excl.)'}</span>}
                    {(r.mode==='margin'||r.mode==='mixed') && <span>Cost: <strong style={{color:'var(--teal)'}}>₹{r.vendor_cost}</strong> + <strong style={{color:'var(--teal)'}}>{r.margin_pct}%</strong> {r.margin_gst_inclusive?'(GST incl.)':'(GST excl.)'}</span>}
                  </div>
                </div>
                <div style={{display:'flex',gap:8,flexShrink:0}}>
                  <button className="btn btn-ghost btn-sm" onClick={()=>startEdit(r)}>✏ Edit</button>
                  <button className="btn btn-sm" style={{background:'transparent',color:'var(--red)',border:'1px solid #374151'}} onClick={()=>del(r.id)}>🗑</button>
                </div>
              </div>
            ))}
          </div>}
      </div>
    );
  }

  function GoogleContacts({ token }) {
    const [connected, setConnected] = useState(null);
    const [syncing,   setSyncing]   = useState(false);
    const [msg,       setMsg]       = useState(null);

    useEffect(() => {
      fetch(`${API}/admin/google/status`, { headers: { Authorization: `Bearer ${token}` } })
        .then(r => r.json()).then(d => setConnected(d.connected)).catch(() => setConnected(false));
      // Listen for OAuth popup callback
      const handler = (e) => {
        if (e.data?.type === 'google_auth') {
          if (e.data.success) { setConnected(true); setMsg({ type:'success', text:'Google Contacts connected!' }); }
          else setMsg({ type:'error', text: e.data.error || 'Auth failed' });
        }
      };
      window.addEventListener('message', handler);
      return () => window.removeEventListener('message', handler);
    }, [token]);

    const connect = () => {
      window.open(`${API}/admin/google/auth?token=${token}`, 'google_auth', 'width=500,height=650');
    };

    const disconnect = async () => {
      await fetch(`${API}/admin/google/disconnect`, { method:'DELETE', headers:{ Authorization:`Bearer ${token}` } });
      setConnected(false); setMsg({ type:'success', text:'Disconnected.' });
    };

    const bulkSync = async () => {
      setSyncing(true); setMsg(null);
      try {
        const r = await fetch(`${API}/admin/google/sync`, { method:'POST', headers:{ Authorization:`Bearer ${token}` } });
        const d = await r.json();
        if (!r.ok) throw new Error(d.error);
        setMsg({ type:'success', text:`Synced ${d.synced} customers to Google Contacts. ${d.errors ? d.errors+' errors.' : ''}` });
      } catch(e) { setMsg({ type:'error', text: e.message }); }
      setSyncing(false);
    };

    return (
      <div className="page">
        <div style={{maxWidth:560}}>
          <div className="card" style={{padding:28}}>
            <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:20}}>
              <span style={{fontSize:32}}>📒</span>
              <div>
                <div style={{fontSize:15,fontWeight:700,color:'var(--text)'}}>Google Contacts</div>
                <div style={{fontSize:12,color:'var(--text-muted)'}}>Auto-sync customers on every new order</div>
              </div>
              {connected !== null && (
                <span style={{marginLeft:'auto',padding:'4px 12px',borderRadius:20,fontSize:11,fontWeight:700,
                  background: connected ? 'rgba(16,185,129,0.15)' : 'rgba(239,68,68,0.15)',
                  color: connected ? '#10b981' : '#ef4444',
                  border: `1px solid ${connected ? 'rgba(16,185,129,0.3)' : 'rgba(239,68,68,0.3)'}`}}>
                  {connected ? '● Connected' : '○ Not Connected'}
                </span>
              )}
            </div>

            {msg && <div style={{padding:'10px 14px',borderRadius:6,marginBottom:16,fontSize:12,
              background: msg.type==='success' ? 'rgba(16,185,129,0.1)' : 'rgba(239,68,68,0.1)',
              color: msg.type==='success' ? '#10b981' : '#ef4444',
              border: `1px solid ${msg.type==='success' ? 'rgba(16,185,129,0.3)' : 'rgba(239,68,68,0.3)'}`}}>{msg.text}</div>}

            <div style={{background:'var(--bg-hover)',borderRadius:8,padding:'14px 16px',marginBottom:20,fontSize:12,color:'var(--text-muted)',lineHeight:1.8}}>
              <strong style={{color:'var(--text)'}}>How it works:</strong><br/>
              • Every new order → customer added to Google Contacts automatically<br/>
              • Contact name format: <strong style={{color:'var(--indigo)'}}>John Doe — #1234</strong><br/>
              • If customer already exists (same phone), order number is appended<br/>
              • Use Bulk Sync to import all existing customers at once
            </div>

            <div style={{display:'flex',gap:10,flexWrap:'wrap'}}>
              {!connected
                ? <button className="btn btn-primary" onClick={connect}>🔗 Connect Google Account</button>
                : <>
                    <button className="btn btn-primary" onClick={bulkSync} disabled={syncing}>
                      {syncing ? '⏳ Syncing…' : '🔄 Bulk Sync All Customers'}
                    </button>
                    <button className="btn btn-ghost btn-sm" onClick={disconnect} style={{color:'var(--red)',borderColor:'var(--red)'}}>Disconnect</button>
                  </>
              }
            </div>
          </div>
        </div>
      </div>
    );
  }

  function Webhooks({ token }) {
    const [webhooks, setWebhooks] = useState([]);
    const [loading,  setLoading]  = useState(false);
    const [setting,  setSetting]  = useState(false);
    const [msg,      setMsg]      = useState(null);

    const DESIRED = [
      { topic:'orders/create',       path:'/webhooks/orders',       desc:'New order → email customer + vendors' },
      { topic:'orders/updated',      path:'/webhooks/orders',       desc:'Tag change → auto-map stage' },
      { topic:'orders/paid',         path:'/webhooks/orders',       desc:'Payment confirmed → mark prepaid' },
      { topic:'orders/cancelled',    path:'/webhooks/orders',       desc:'Cancellation → set stage cancelled' },
      { topic:'fulfillments/create', path:'/webhooks/fulfillments', desc:'Shipment created → set pickup stage + email customer' },
      { topic:'fulfillments/update', path:'/webhooks/fulfillments', desc:'Shipment status update → sync transit/delivered/RTO' },
    ];

    const load = async () => {
      setLoading(true);
      try {
        const r = await fetch(`${API}/admin/webhooks`, { headers:{ Authorization:`Bearer ${token}` } });
        const d = await r.json();
        setWebhooks(d.webhooks || []);
      } catch(e) { setMsg({ type:'error', text:e.message }); }
      setLoading(false);
    };

    useEffect(() => { load(); }, []);

    const setup = async () => {
      setSetting(true); setMsg(null);
      try {
        const r = await fetch(`${API}/admin/setup-webhooks`, { method:'POST', headers:{ Authorization:`Bearer ${token}` } });
        const d = await r.json();
        const errors = (d.results||[]).filter(r=>r.status==='error');
        if (errors.length) setMsg({ type:'error', text:`${errors.length} webhook(s) failed: ${errors.map(e=>e.topic).join(', ')}` });
        else setMsg({ type:'success', text:'All webhooks registered successfully!' });
        await load();
      } catch(e) { setMsg({ type:'error', text:e.message }); }
      setSetting(false);
    };

    const remove = async (id) => {
      if (!confirm('Delete this webhook from Shopify?')) return;
      try {
        await fetch(`${API}/admin/webhooks/${id}`, { method:'DELETE', headers:{ Authorization:`Bearer ${token}` } });
        await load();
      } catch(e) { setMsg({ type:'error', text:e.message }); }
    };

    return (
      <div style={{maxWidth:800,margin:'0 auto'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:20}}>
          <div>
            <div style={{fontWeight:700,fontSize:18,marginBottom:4}}>🔗 Shopify Webhooks</div>
            <div style={{fontSize:12,color:'var(--text-muted)'}}>Webhooks make the system event-driven — orders auto-process without any manual sync.</div>
          </div>
          <button className="btn btn-indigo" onClick={setup} disabled={setting}>
            {setting ? '…' : '⚡ Setup All Webhooks'}
          </button>
        </div>

        {msg && <div className={`alert alert-${msg.type}`} style={{marginBottom:16}}>{msg.type==='success'?'✓':'⚠'} {msg.text}</div>}

        {/* What each webhook does */}
        <div className="card" style={{marginBottom:16}}>
          <div className="card-header"><span className="card-title">Automations</span></div>
          <div style={{padding:16}}>
            {DESIRED.map(w => {
              const registered = webhooks.find(r => r.topic === w.topic);
              return (
                <div key={w.topic} style={{display:'flex',alignItems:'center',gap:12,padding:'10px 0',borderBottom:'1px solid var(--border)'}}>
                  <span style={{width:10,height:10,borderRadius:'50%',background:registered?'#10b981':'#6b7280',flexShrink:0}}/>
                  <div style={{flex:1}}>
                    <div style={{fontSize:12,fontWeight:600,color:'var(--text)',fontFamily:'monospace'}}>{w.topic}</div>
                    <div style={{fontSize:11,color:'var(--text-muted)',marginTop:2}}>{w.desc}</div>
                  </div>
                  <span style={{fontSize:10,padding:'2px 8px',borderRadius:10,background:registered?'#064e3b':'#1f2937',color:registered?'#10b981':'#6b7280',fontWeight:600}}>
                    {registered ? '✓ Active' : 'Not registered'}
                  </span>
                </div>
              );
            })}
          </div>
        </div>

        {/* All registered webhooks on Shopify */}
        <div className="card">
          <div className="card-header" style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
            <span className="card-title">Registered on Shopify ({webhooks.length})</span>
            <button onClick={load} disabled={loading} style={{background:'none',border:'none',color:'var(--indigo)',cursor:'pointer',fontSize:12}}>{loading?'…':'↻ Refresh'}</button>
          </div>
          <div style={{padding:16}}>
            {webhooks.length === 0 && !loading && (
              <div style={{textAlign:'center',padding:'30px 0',color:'var(--text-muted)',fontSize:13}}>
                No webhooks registered yet. Click <strong>Setup All Webhooks</strong> above.
              </div>
            )}
            {webhooks.map(w => (
              <div key={w.id} style={{display:'flex',alignItems:'center',gap:12,padding:'8px 0',borderBottom:'1px solid var(--border)'}}>
                <div style={{flex:1}}>
                  <div style={{fontSize:12,fontWeight:600,fontFamily:'monospace',color:'var(--text)'}}>{w.topic}</div>
                  <div style={{fontSize:10,color:'var(--text-muted)',marginTop:2,wordBreak:'break-all'}}>{w.address}</div>
                </div>
                <span style={{fontSize:10,color:'var(--text-muted)',flexShrink:0}}>ID: {w.id}</span>
                <button onClick={()=>remove(w.id)} style={{background:'none',border:'1px solid #ef4444',color:'#ef4444',borderRadius:4,fontSize:10,padding:'2px 8px',cursor:'pointer'}}>Delete</button>
              </div>
            ))}
          </div>
        </div>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
