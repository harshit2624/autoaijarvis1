                        ? <img src={img} alt="" style={{width:48,height:48,objectFit:'cover',borderRadius:6,flexShrink:0,border:'1px solid var(--border)'}}/>
                        : <div style={{width:48,height:48,borderRadius:6,background:'var(--bg-card2)',flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,border:'1px solid var(--border)'}}>🛍</div>
                      }
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontWeight:600,fontSize:12,marginBottom:6,color:'var(--text)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{cp.title}</div>
                        <div style={{display:'flex',flexWrap:'wrap',gap:5}}>
                          {(cp.variants||[]).map(cv=>(
                            <button key={cv.id} onClick={()=>saveMapping(cp,cv)} disabled={mapSaving}
                              style={{fontSize:11,padding:'3px 9px',borderRadius:6,border:'1px solid var(--indigo)',background:'var(--indigo-dim)',color:'var(--indigo)',cursor:'pointer',fontWeight:600}}>
                              {cv.title!=='Default Title'?cv.title:'Default'} — ₹{parseFloat(cv.price).toFixed(0)}
                            </button>
                          ))}
                        </div>
                      </div>
                    </div>
                  );
                })}
                {ccProducts.length===0 && !ccSearching && <div style={{fontSize:12,color:'var(--text-muted)'}}>
                  {ccSearch.length>1 ? 'No products found. Try a different keyword.' : 'Showing top 20 products. Type to search.'}
                </div>}
              </div>
              <div style={{marginTop:16,textAlign:'right'}}><button className="btn btn-ghost" onClick={()=>setMapModal(null)}>Cancel</button></div>
            </div>
          </div>
        )}
        </div>
      </div>
    );
  }

  /* ══════════════════════════════════
     PENALTY MANAGER
  ══════════════════════════════════ */
  function PenaltyManager({ token }) {
    const [penalties, setPenalties] = useState([]);
    const [loading, setLoading]     = useState(true);
    const [filter, setFilter]       = useState('pending');
    const [modal, setModal]         = useState(null); // {penalty, action}
    const [amount, setAmount]       = useState('');
    const [note, setNote]           = useState('');
    const [saving, setSaving]       = useState(false);
    const [testForm, setTestForm]   = useState({ shopify_id:'', vendor_name:'', order_name:'' });
    const [testMsg, setTestMsg]     = useState('');
    const [search, setSearch]       = useState('');
    const [vendorFilter, setVendorFilter] = useState('');
    const [selected, setSelected]   = useState(new Set()); // bulk select
    const [bulkSaving, setBulkSaving] = useState(false);

    const load = () => {
      setLoading(true);
      fetch(`/admin/penalties?status=${filter}`, { headers:{ Authorization:'Bearer '+token } })
        .then(r=>r.json()).then(d=>{ setPenalties(d.penalties||[]); setLoading(false); });
    };
    useEffect(load, [filter]);

    const openModal = (p, action) => {
      setModal({p, action});
      setAmount(action==='confirm'?'100':'');
      setNote(action==='confirm'?'Fulfilment not done within 48 hours. Delay was not reported to CrosCrow team or on panel.':'');
    };

    const deletePenalty = async (p) => {
      if (!window.confirm(`Delete this ${p.status} penalty for ${p.order_name} (${p.vendor_name})? This cannot be undone.`)) return;
      await fetch(`/admin/penalties/${p.id}`, { method:'DELETE', headers:{ Authorization:'Bearer '+token } });
      load();
    };

    const submit = async () => {
      setSaving(true);
      await fetch(`/admin/penalties/${modal.p.id}`, {
        method:'PUT', headers:{'Content-Type':'application/json', Authorization:'Bearer '+token},
        body: JSON.stringify({ action: modal.action, penalty_amount: amount, admin_note: note })
      });
      setSaving(false);
      setModal(null);
      load();
    };

    const triggerTest = async () => {
      if (!testForm.shopify_id || !testForm.vendor_name) { setTestMsg('Fill shopify_id and vendor_name.'); return; }
      const r = await fetch('/admin/penalties/test-trigger', { method:'POST', headers:{'Content-Type':'application/json',Authorization:'Bearer '+token}, body: JSON.stringify(testForm) });
      const d = await r.json();
      setTestMsg(d.message || d.error);
      if (d.success) { setTestForm({ shopify_id:'', vendor_name:'', order_name:'' }); load(); }
    };
    const runCron = async () => {
      const r = await fetch('/admin/penalties/run-cron', { method:'POST', headers:{Authorization:'Bearer '+token} });
      const d = await r.json();
      setTestMsg('Cron ran — check for new penalties.');
      load();
    };

    const bulkAction = async (action) => {
      if (selected.size === 0) return;
      const ids = [...selected];
      const label = action === 'confirm' ? 'confirm' : action === 'cancel' ? 'cancel' : 'delete';
      if (!window.confirm(`${label.charAt(0).toUpperCase()+label.slice(1)} ${ids.length} selected penalt${ids.length!==1?'ies':'y'}?`)) return;
      setBulkSaving(true);
      await fetch('/admin/penalties/bulk', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
        body: JSON.stringify({ ids, action, penalty_amount: action==='confirm'?100:undefined, admin_note: action==='confirm'?'Bulk confirmed by admin':action==='cancel'?'Bulk cancelled by admin':undefined }),
      });
      setBulkSaving(false);
      setSelected(new Set());
      load();
    };

    const statusColor = s => s==='pending'?'#f59e0b':s==='confirmed'?'#ef4444':'#6b7280';
    const ago = ts => { const h=Math.floor((Date.now()-ts)/3600000); return h<24?`${h}h ago`:`${Math.floor(h/24)}d ago`; };

    const vendorList = [...new Set(penalties.map(p=>p.vendor_name).filter(Boolean))].sort();
    const visiblePenalties = penalties.filter(p => {
      const q = search.trim().toLowerCase();
      if (q && !(p.order_name||'').toLowerCase().includes(q) && !(p.shopify_id||'').includes(q)) return false;
      if (vendorFilter && p.vendor_name !== vendorFilter) return false;
      return true;
    });

    return (
      <div style={{padding:'24px',maxWidth:900}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:20}}>
          <h2 style={{margin:0,fontSize:20,color:'var(--text)'}}>⚠️ Vendor Penalties</h2>
          <div style={{display:'flex',gap:8}}>
            {['pending','confirmed','cancelled'].map(s=>(
              <button key={s} onClick={()=>setFilter(s)} className={`btn btn-sm ${filter===s?'btn-primary':'btn-ghost'}`}
                style={{textTransform:'capitalize'}}>{s}</button>
            ))}
            <button className="btn btn-sm btn-ghost" onClick={runCron} title="Force-run the 24hr/48hr check now">↻ Run Cron</button>
          </div>
        </div>

        {/* Test trigger panel */}
        <div style={{background:'var(--bg-card)',border:'1px dashed #334155',borderRadius:10,padding:16,marginBottom:20}}>
          <div style={{fontSize:12,fontWeight:700,color:'var(--text-muted)',marginBottom:10,textTransform:'uppercase',letterSpacing:1}}>🧪 Test — Manually Trigger a Penalty</div>
          <div style={{display:'flex',gap:10,flexWrap:'wrap',alignItems:'flex-end'}}>
            <div>
              <label style={{fontSize:11,color:'var(--text-muted)',display:'block',marginBottom:4}}>Shopify Order ID</label>
              <input className="input" style={{width:140}} placeholder="e.g. 6781234567890" value={testForm.shopify_id} onChange={e=>setTestForm(f=>({...f,shopify_id:e.target.value}))}/>
            </div>
            <div>
              <label style={{fontSize:11,color:'var(--text-muted)',display:'block',marginBottom:4}}>Vendor Name</label>
              <input className="input" style={{width:160}} placeholder="e.g. My Vendor" value={testForm.vendor_name} onChange={e=>setTestForm(f=>({...f,vendor_name:e.target.value}))}/>
            </div>
            <div>
              <label style={{fontSize:11,color:'var(--text-muted)',display:'block',marginBottom:4}}>Order Name (optional)</label>
              <input className="input" style={{width:120}} placeholder="e.g. #1001" value={testForm.order_name} onChange={e=>setTestForm(f=>({...f,order_name:e.target.value}))}/>
            </div>
            <button className="btn" style={{background:'#ef4444',color:'#fff'}} onClick={triggerTest}>Trigger Test Penalty</button>
            <button className="btn btn-ghost" onClick={async()=>{
              if (!testForm.shopify_id || !testForm.vendor_name) { setTestMsg('Fill shopify_id and vendor_name.'); return; }
              const r = await fetch('/admin/penalties/test-warning', { method:'POST', headers:{'Content-Type':'application/json',Authorization:'Bearer '+token}, body:JSON.stringify(testForm) });
              const d = await r.json();
              setTestMsg(d.message || d.error);
            }}>📧 Send Test Warning Email</button>
          </div>
          {testMsg && <div style={{marginTop:10,fontSize:12,color:'#f59e0b'}}>{testMsg}</div>}
        </div>

        {/* Search + vendor filter */}
        {!loading && penalties.length > 0 && (
          <div style={{display:'flex',gap:10,flexWrap:'wrap',marginBottom:16,alignItems:'center'}}>
            <input className="input" placeholder="Search order #…" value={search} onChange={e=>setSearch(e.target.value)}
              style={{flex:1,minWidth:160,maxWidth:260}}/>
            <select className="input" value={vendorFilter} onChange={e=>setVendorFilter(e.target.value)}
              style={{minWidth:160}}>
              <option value="">All vendors</option>
              {vendorList.map(v=><option key={v} value={v}>{v}</option>)}
            </select>
            {(search||vendorFilter) && (
              <button className="btn btn-ghost btn-sm" onClick={()=>{setSearch('');setVendorFilter('');}}>✕ Clear</button>
            )}
            <span style={{fontSize:11,color:'var(--text-muted)'}}>{visiblePenalties.length} / {penalties.length}</span>
          </div>
        )}

        {!loading && visiblePenalties.length > 0 && (
          <div style={{display:'flex',alignItems:'center',gap:8,padding:'8px 12px',background:'var(--bg-card)',borderRadius:8,marginBottom:8,border:'1px solid var(--border)'}}>
            <input type="checkbox"
              checked={visiblePenalties.length>0 && visiblePenalties.every(p=>selected.has(p.id))}
              onChange={()=>{
                const allSel = visiblePenalties.every(p=>selected.has(p.id));
                if (allSel) setSelected(s=>{ const n=new Set(s); visiblePenalties.forEach(p=>n.delete(p.id)); return n; });
                else setSelected(s=>{ const n=new Set(s); visiblePenalties.forEach(p=>n.add(p.id)); return n; });
              }} style={{cursor:'pointer'}}/>
            <span style={{fontSize:11,color:'var(--text-muted)',flex:1}}>
              {selected.size>0 ? `${selected.size} selected` : `Select all`}
            </span>
            {selected.size > 0 && (<>
              {filter==='pending' && <button className="btn btn-sm" style={{fontSize:11,background:'#ef4444',color:'#fff',border:'none'}} disabled={bulkSaving}
                onClick={()=>bulkAction('confirm')}>✓ Confirm ({selected.size})</button>}
              {filter==='pending' && <button className="btn btn-sm btn-ghost" style={{fontSize:11,borderColor:'#6b7280',color:'#6b7280'}} disabled={bulkSaving}
                onClick={()=>bulkAction('cancel')}>✕ Cancel ({selected.size})</button>}
              <button className="btn btn-sm btn-danger" style={{fontSize:11}} disabled={bulkSaving}
                onClick={()=>bulkAction('delete')}>🗑 Delete ({selected.size})</button>
              {bulkSaving && <span style={{fontSize:11,color:'var(--text-muted)'}}>Processing…</span>}
            </>)}
          </div>
        )}

        {loading ? <div style={{color:'var(--text-muted)'}}>Loading...</div> : visiblePenalties.length===0 ? (
          <div style={{background:'var(--bg-card)',borderRadius:10,padding:40,textAlign:'center',color:'var(--text-muted)'}}>
            {penalties.length===0 ? `No ${filter} penalties.` : 'No penalties match your search.'}
          </div>
        ) : (
          <div style={{display:'flex',flexDirection:'column',gap:12}}>
            {visiblePenalties.map(p=>(
              <div key={p.id} style={{background:'var(--bg-card)',border:`1px solid ${selected.has(p.id)?'var(--indigo)':'var(--border)'}`,borderRadius:10,padding:18,transition:'border-color 0.15s'}}>
                <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:12}}>
                  <input type="checkbox" checked={selected.has(p.id)}
                    onChange={()=>setSelected(s=>{ const n=new Set(s); n.has(p.id)?n.delete(p.id):n.add(p.id); return n; })}
                    style={{cursor:'pointer',marginTop:3,flexShrink:0}}/>
                  <div style={{flex:1}}>
                    <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:6}}>
                      <span style={{fontWeight:700,color:'var(--text)',fontSize:15}}>{p.order_name||p.shopify_id}</span>
                      <span style={{fontSize:11,padding:'2px 8px',borderRadius:20,background:statusColor(p.status)+'22',color:statusColor(p.status),fontWeight:600}}>
                        {p.status.toUpperCase()}
                      </span>
                    </div>
                    <div style={{fontSize:13,color:'var(--text-muted)',marginBottom:4,display:'flex',alignItems:'center',gap:10,flexWrap:'wrap'}}>
                      Vendor: <strong style={{color:'var(--text)'}}>{p.vendor_name}</strong>
                      {p.current_stage && <StageBadge stage={p.current_stage} vendorStages={{}}/>}
                    </div>
                    <div style={{fontSize:12,color:'var(--text-muted)'}}>
                      Triggered: {ago(p.triggered_at)} · Reason: <span style={{color:'#f59e0b'}}>{p.trigger_reason==='48hr_breach'?'48hr fulfilment breach':p.trigger_reason==='eta_breach'?'ETA date missed':p.trigger_reason}</span>
                    </div>
                    {p.penalty_amount>0 && <div style={{fontSize:13,color:'#ef4444',fontWeight:700,marginTop:4}}>Penalty: ₹{p.penalty_amount.toFixed(2)}</div>}
                    {p.admin_note && <div style={{fontSize:12,color:'var(--text-muted)',marginTop:4}}>Note: {p.admin_note}</div>}

                    {/* Delay remarks submitted by vendor for this order */}
                    {p.delay_remarks?.length > 0 && (
                      <div style={{marginTop:10,padding:'10px 14px',borderRadius:8,background:'rgba(245,158,11,0.07)',border:'1px solid rgba(245,158,11,0.3)'}}>
                        <div style={{fontSize:10,fontWeight:700,color:'#f59e0b',marginBottom:8,letterSpacing:'0.05em',textTransform:'uppercase'}}>
                          ⏰ Delay Reason{p.delay_remarks.length>1?`s (${p.delay_remarks.length})`:''}  — Submitted by Vendor
                        </div>
                        {p.delay_remarks.map((r,i)=>(
                          <div key={i} style={{marginBottom: i<p.delay_remarks.length-1?10:0, paddingBottom: i<p.delay_remarks.length-1?10:0, borderBottom: i<p.delay_remarks.length-1?'1px solid rgba(245,158,11,0.15)':'none'}}>
                            <div style={{fontSize:12,color:'var(--text)',lineHeight:1.6}}>{r.reason}</div>
                            <div style={{display:'flex',gap:12,marginTop:4,fontSize:10,color:'var(--text-muted)'}}>
                              {r.eta_date && <span>📅 ETA: <strong style={{color:'#fbbf24'}}>{r.eta_date}</strong></span>}
                              <span>🕐 {r.submitted_at ? new Date(r.submitted_at).toLocaleString('en-IN',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'}) : '—'}</span>
                            </div>
                          </div>
                        ))}
                      </div>
                    )}

                    {p.vendor_review_request && (
                      <div style={{marginTop:10,padding:'10px 12px',borderRadius:8,background:'rgba(99,102,241,0.08)',border:'1px solid rgba(99,102,241,0.3)'}}>
                        <div style={{fontSize:10,fontWeight:700,color:'var(--indigo)',marginBottom:4,letterSpacing:'0.05em',textTransform:'uppercase'}}>
                          📨 Vendor Review Request
                        </div>
                        <div style={{fontSize:12,color:'var(--text)',lineHeight:1.5}}>{p.vendor_review_request}</div>
                        <div style={{fontSize:10,color:'var(--text-muted)',marginTop:4}}>{p.vendor_review_at ? new Date(p.vendor_review_at).toLocaleString('en-IN') : ''}</div>
                      </div>
                    )}
                  </div>
                  <div style={{display:'flex',gap:8,flexShrink:0,flexWrap:'wrap',justifyContent:'flex-end'}}>
                    {p.status==='pending' && <>
                      <button className="btn btn-sm" style={{background:'#ef4444',color:'#fff'}} onClick={()=>openModal(p,'confirm')}>Confirm Penalty</button>
                      <button className="btn btn-sm btn-ghost" onClick={()=>openModal(p,'cancel')}>Cancel</button>
                    </>}
                    <button className="btn btn-sm" style={{background:'transparent',color:'#6b7280',border:'1px solid #374151'}} onClick={()=>deletePenalty(p)} title="Permanently delete this penalty">🗑 Delete</button>
                  </div>
                </div>
              </div>
            ))}
          </div>
        )}

        {modal && (
          <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.6)',zIndex:1000,display:'flex',alignItems:'center',justifyContent:'center'}}>
            <div style={{background:'var(--bg-card)',borderRadius:12,padding:28,width:400,maxWidth:'90vw'}}>
              <h3 style={{margin:'0 0 16px',color:'var(--text)',fontSize:16}}>
                {modal.action==='confirm'?'⚠️ Confirm Penalty':'✕ Cancel Penalty'} — {modal.p.order_name}
              </h3>
              {modal.p.delay_remarks?.length > 0 && (
                <div style={{marginBottom:14,padding:'10px 12px',borderRadius:8,background:'rgba(245,158,11,0.07)',border:'1px solid rgba(245,158,11,0.3)'}}>
                  <div style={{fontSize:10,fontWeight:700,color:'#f59e0b',marginBottom:6,textTransform:'uppercase',letterSpacing:'0.05em'}}>⏰ Vendor Delay Reason{modal.p.delay_remarks.length>1?'s':''}</div>
                  {modal.p.delay_remarks.map((r,i)=>(
                    <div key={i} style={{marginBottom:i<modal.p.delay_remarks.length-1?8:0}}>
                      <div style={{fontSize:12,color:'var(--text)',lineHeight:1.6}}>{r.reason}</div>
                      <div style={{fontSize:10,color:'var(--text-muted)',marginTop:2}}>
                        {r.eta_date && <span>ETA: {r.eta_date} · </span>}
                        {r.submitted_at ? new Date(r.submitted_at).toLocaleString('en-IN',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'}) : ''}
                      </div>
                    </div>
                  ))}
                </div>
              )}
              {modal.action==='confirm' && (
                <div style={{marginBottom:14}}>
                  <label style={{fontSize:12,color:'var(--text-muted)',display:'block',marginBottom:6}}>Penalty Amount (₹)</label>
                  <input className="input" type="number" min="0" value={amount} onChange={e=>setAmount(e.target.value)}
                    placeholder="e.g. 500" style={{width:'100%',boxSizing:'border-box'}}/>
                  <div style={{fontSize:11,color:'var(--text-muted)',marginTop:4}}>This will be added to the vendor's next settlement invoice.</div>
                </div>
              )}
              <div style={{marginBottom:18}}>
                <label style={{fontSize:12,color:'var(--text-muted)',display:'block',marginBottom:6}}>Admin Note (optional)</label>
                <textarea className="input" rows={3} value={note} onChange={e=>setNote(e.target.value)}
                  placeholder="Reason for decision..." style={{width:'100%',boxSizing:'border-box',resize:'vertical'}}/>
              </div>
              <div style={{display:'flex',gap:10,justifyContent:'flex-end'}}>
                <button className="btn btn-ghost" onClick={()=>setModal(null)}>Cancel</button>
                <button className="btn" style={{background:modal.action==='confirm'?'#ef4444':'#6b7280',color:'#fff'}}
                  onClick={submit} disabled={saving}>{saving?'Saving...':modal.action==='confirm'?'Confirm & Apply':'Cancel Penalty'}</button>
              </div>
            </div>
          </div>
        )}
      </div>
    );
  }

  /* ══════════════════════════════════
     TAG MAPPINGS VIEW
  ══════════════════════════════════ */
  const ALL_STAGES = [
    { value:'new',       label:'New' },
    { value:'confirmed', label:'Confirmed' },
    { value:'partial',   label:'Partial/Advance' },
    { value:'ready',     label:'Ready to Ship' },
    { value:'pickup',    label:'Pickup Pending' },
    { value:'transit',   label:'In Transit' },
    { value:'ofd',       label:'Out for Delivery' },
    { value:'delivered', label:'Delivered' },
    { value:'rto',       label:'RTO' },
    { value:'penalty',   label:'Penalty' },
    { value:'hold',      label:'On Hold' },
    { value:'cancelled', label:'Cancelled' },
  ];

  function TagMappings({ token }) {
    const [mappings,    setMappings]    = useState([]);
    const [loading,     setLoading]     = useState(true);
    const [shopifyTags, setShopifyTags] = useState([]);
    const [tagsLoading, setTagsLoading] = useState(false);
    const [newTag,      setNewTag]      = useState('');
    const [tagInput,    setTagInput]    = useState('');
    const [showDrop,    setShowDrop]    = useState(false);
    const [newStage,    setNewStage]    = useState('confirmed');
    const [newPriority, setNewPriority] = useState('');
    const [adding,      setAdding]      = useState(false);
    const [syncing,     setSyncing]     = useState(false);
    const [editingPri,  setEditingPri]  = useState({}); // id → value
    const [msg,         setMsg]         = useState(null);
    const [syncResult,  setSyncResult]  = useState(null);

    const load = () => {
      setLoading(true);
      fetch(`${API}/admin/tag-mappings`,{headers:{Authorization:`Bearer ${token}`}})
        .then(r=>r.json()).then(d=>setMappings(d.mappings||[])).catch(()=>{}).finally(()=>setLoading(false));
    };

    const loadTags = () => {
      if (shopifyTags.length) return;
      setTagsLoading(true);
      fetch(`${API}/admin/order-tags`,{headers:{Authorization:`Bearer ${token}`}})
        .then(r=>r.json()).then(d=>setShopifyTags(d.tags||[])).catch(()=>{}).finally(()=>setTagsLoading(false));
    };

    useEffect(()=>{ load(); loadTags(); },[token]);

    const addMapping = async () => {
      if (!newTag.trim()) { setMsg({type:'error',text:'Tag name required.'}); return; }
      setAdding(true); setMsg(null);
      // Auto-assign next priority if not set
      const pri = newPriority !== '' ? parseInt(newPriority) : (mappings.length > 0 ? Math.max(...mappings.map(m=>m.priority||99)) + 1 : 1);
      try {
        const r = await fetch(`${API}/admin/tag-mappings`,{
          method:'POST', headers:{'Content-Type':'application/json','Authorization':`Bearer ${token}`},
          body: JSON.stringify({ shopify_tag: newTag.trim(), stage: newStage, priority: pri }),
        });
        const d = await r.json();
        if (!r.ok) throw new Error(d.error);
        setMsg({type:'success',text:`Added: "${newTag}" → ${newStage} (priority ${pri})`});
        setNewTag(''); setTagInput(''); setNewPriority(''); load();
      } catch(e) { setMsg({type:'error',text:e.message}); }
      setAdding(false);
    };

    const deleteMapping = async id => {
      await fetch(`${API}/admin/tag-mappings/${id}`,{method:'DELETE',headers:{Authorization:`Bearer ${token}`}});
      load();
    };

    const savePriority = async (id, val) => {
      const num = parseInt(val);
      if (isNaN(num)) return;
      await fetch(`${API}/admin/tag-mappings/${id}/priority`,{
        method:'PUT', headers:{'Content-Type':'application/json','Authorization':`Bearer ${token}`},
        body: JSON.stringify({ priority: num }),
      });
      setEditingPri(p=>({...p,[id]:undefined}));
      load();
    };

    const syncNow = async () => {
      setSyncing(true); setSyncResult(null); setMsg(null);
      try {
        const r = await fetch(`${API}/admin/tag-mappings/sync`,{method:'POST',headers:{Authorization:`Bearer ${token}`}});
        const d = await r.json();
        if (!r.ok) throw new Error(d.error);
        setSyncResult(d);
      } catch(e) { setMsg({type:'error',text:e.message}); }
      setSyncing(false);
    };

    const stageLabel = v => ALL_STAGES.find(s=>s.value===v)?.label || v;

    return (
      <div className="page">
        {/* How it works banner */}
        <div style={{background:'var(--indigo-dim)',border:'1px solid var(--indigo)',borderRadius:10,padding:'12px 16px',marginBottom:20,fontSize:12,color:'var(--text)'}}>
          <div style={{fontWeight:700,color:'var(--indigo)',marginBottom:6}}>🏷 Priority-Based Tag Mappings</div>
          <div style={{lineHeight:1.8,color:'var(--text-muted)'}}>
            Each tag has a <strong>priority number</strong> — lower number wins. If an order has multiple mapped tags (e.g. <code style={{background:'var(--bg-card)',padding:'1px 5px',borderRadius:4}}>Confirmed</code> + <code style={{background:'var(--bg-card)',padding:'1px 5px',borderRadius:4}}>Delivered</code>), the tag with the <strong>lowest priority number</strong> sets the stage — no matter the tag order in Shopify.
            <br/>Example: Delivered=1, In Transit=2, Confirmed=3 → an order with all three tags always goes to <strong>Delivered</strong>.
          </div>
        </div>

        {/* Add mapping */}
        <div className="card" style={{marginBottom:16,overflow:'visible'}}>
          <div className="card-header"><span className="card-title">Add Tag Mapping</span></div>
          <div style={{padding:16}}>
            {msg && <div className={`alert alert-${msg.type}`}>{msg.type==='success'?'✓':'⚠'} {msg.text}</div>}
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 80px auto',gap:12,alignItems:'end',overflow:'visible'}}>
              <div style={{position:'relative',overflow:'visible'}}>
                <label className="form-label">
                  Shopify Tag
                  {tagsLoading && <span style={{marginLeft:8,color:'var(--text-muted)',fontWeight:400}}>⟳ loading…</span>}
                  {!tagsLoading && shopifyTags.length>0 && <span style={{marginLeft:8,color:'var(--text-muted)',fontWeight:400}}>({shopifyTags.length} found)</span>}
                </label>
                <input className="form-input" placeholder="Search or type a tag…"
                  value={tagInput}
                  onChange={e=>{ setTagInput(e.target.value); setNewTag(e.target.value); setShowDrop(true); }}
                  onFocus={()=>setShowDrop(true)}
                  onBlur={()=>setTimeout(()=>setShowDrop(false),150)}
                  onKeyDown={e=>e.key==='Enter'&&addMapping()}/>
                {showDrop && shopifyTags.length>0 && (()=>{
                  const filtered = shopifyTags.filter(t=>t.toLowerCase().includes(tagInput.toLowerCase()) && !mappings.find(m=>m.shopify_tag.toLowerCase()===t.toLowerCase()));
                  if (!filtered.length) return null;
                  return (
                    <div style={{position:'absolute',top:'calc(100% + 4px)',left:0,right:0,background:'#0d1f2d',border:'1px solid var(--indigo)',borderRadius:8,zIndex:9999,maxHeight:260,overflowY:'auto',boxShadow:'0 12px 40px #000000aa'}}>
                      {filtered.map(t=>(
                        <div key={t} onMouseDown={()=>{ setNewTag(t); setTagInput(t); setShowDrop(false); }}
                          style={{padding:'10px 14px',cursor:'pointer',fontSize:13,color:'#e2e8f0',borderBottom:'1px solid #1a3040',transition:'background 0.1s'}}
                          onMouseEnter={e=>e.currentTarget.style.background='#1a3a50'}
                          onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                          🏷 {t}
                        </div>
                      ))}
                    </div>
                  );
                })()}
              </div>
              <div>
                <label className="form-label">Maps to Stage</label>
                <select className="form-select" value={newStage} onChange={e=>setNewStage(e.target.value)}>
                  {ALL_STAGES.map(s=><option key={s.value} value={s.value}>{s.label}</option>)}
                </select>
              </div>
              <div>
                <label className="form-label">Priority</label>
                <input className="form-input" type="number" min="1" placeholder="auto"
                  value={newPriority} onChange={e=>setNewPriority(e.target.value)}/>
              </div>
              <button className="btn btn-indigo" onClick={addMapping} disabled={adding||!newTag.trim()}>
                {adding?<><span className="spin">↻</span> Adding…</>:'+ Add'}
              </button>
            </div>
          </div>
        </div>

        {/* Current mappings */}
        <div className="card" style={{marginBottom:16}}>
          <div className="card-header">
            <span className="card-title">Current Mappings</span>
            <span className="card-sub">sorted by priority · lowest wins</span>
          </div>
          <div className="tbl-wrap">
            <table>
              <thead><tr>
                <th style={{width:90}}>Priority</th>
                <th>Shopify Tag</th>
                <th>→</th>
                <th>Stage</th>
                <th>Added</th>
                <th>Action</th>
              </tr></thead>
              <tbody>
                {loading ? Array.from({length:3}).map((_,i)=><SkelRow key={i} cols={6}/>) :
                 mappings.length===0 ? (
                   <tr><td colSpan={6}><div className="empty"><div className="empty-icon">🏷</div><div className="empty-title">No mappings yet</div><div className="empty-sub">Add your first tag mapping above.</div></div></td></tr>
                 ) :
                 mappings.map((m,i)=>(
                   <tr key={m.id} style={{background: i===0 ? '#0d1f10' : 'transparent'}}>
                     <td>
                       <div style={{display:'flex',alignItems:'center',gap:6}}>
                         <div style={{width:24,height:24,borderRadius:'50%',background: i===0?'#10b981':i===1?'#fbbf24':'var(--bg-card2)',
                           display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:700,
                           color: i===0?'#000':i===1?'#000':'var(--text-muted)',flexShrink:0}}>
                           {m.priority??99}
                         </div>
                         {editingPri[m.id] !== undefined ? (
                           <input type="number" min="1" style={{width:46,background:'var(--bg-card)',border:'1px solid var(--indigo)',borderRadius:4,color:'var(--text)',padding:'2px 4px',fontSize:11}}
                             value={editingPri[m.id]}
                             onChange={e=>setEditingPri(p=>({...p,[m.id]:e.target.value}))}
                             onBlur={()=>savePriority(m.id, editingPri[m.id])}
                             onKeyDown={e=>e.key==='Enter'&&savePriority(m.id, editingPri[m.id])}
                             autoFocus/>
                         ) : (
                           <span style={{fontSize:10,color:'var(--text-muted)',cursor:'pointer',textDecoration:'underline dotted'}}
                             onClick={()=>setEditingPri(p=>({...p,[m.id]:String(m.priority??99)}))}>
                             edit
                           </span>
                         )}
                       </div>
                     </td>
                     <td>
                       <span style={{background:'var(--bg-hover)',border:'1px solid var(--border-hi)',borderRadius:5,padding:'3px 9px',fontFamily:'monospace',fontSize:12,color:'var(--text)'}}>
                         {m.shopify_tag}
                       </span>
                     </td>
                     <td style={{color:'var(--text-muted)',fontSize:18}}>→</td>
                     <td>
                       <span style={{background:'var(--indigo-dim)',color:'var(--indigo)',borderRadius:5,padding:'3px 9px',fontSize:11,fontWeight:600}}>
                         {stageLabel(m.stage)}
                       </span>
                     </td>
                     <td className="td-mut">{m.created_at?fmtDate(m.created_at):'—'}</td>
                     <td>
                       <button className="btn btn-danger btn-sm" onClick={()=>deleteMapping(m.id)}>✕</button>
                     </td>
                   </tr>
                 ))}
              </tbody>
            </table>
          </div>
        </div>

        {/* Sync */}
        <div className="card">
          <div className="card-header">
            <span className="card-title">Sync Orders from Tags</span>
            <span className="card-sub">Scans all Shopify orders and applies priority mappings</span>
          </div>
          <div style={{padding:16}}>
            {syncResult && (
              <div className="alert alert-success" style={{marginBottom:12}}>
                ✓ Sync complete — scanned <strong>{syncResult.total}</strong> orders, updated <strong>{syncResult.updated}</strong> order stages.
              </div>
            )}
            <div style={{display:'flex',gap:12,alignItems:'center'}}>
              <button className="btn btn-indigo" onClick={syncNow} disabled={syncing||mappings.length===0}>
                {syncing?<><span className="spin">↻</span> Syncing all orders…</>:'⟳ Sync Now'}
              </button>
              <span style={{fontSize:11,color:'var(--text-muted)'}}>
                {mappings.length===0?'Add at least one mapping first.':'Lowest priority number wins — order with multiple tags always moves to the highest-priority stage.'}
              </span>
            </div>
          </div>
        </div>
      </div>
    );
  }

  /* ══════════════════════════════════
     BRAINS — Pattern Intelligence
  ══════════════════════════════════ */
  function Brains({ token }) {
    const WINDOW_PRESETS = [
      { label:'7d vs 30d',  current:7,  baseline:30 },
      { label:'14d vs 60d', current:14, baseline:60 },
      { label:'30d vs 90d', current:30, baseline:90 },
    ];
    const [findings, setFindings] = useState(null);
    const [period,   setPeriod]   = useState(null);
    const [history,  setHistory]  = useState([]);
    const [loading,  setLoading]  = useState(false);
    const [running,  setRunning]  = useState(false);
    const [msg,       setMsg]     = useState('');
    const [viewingPast, setViewingPast] = useState(null); // index into history, or null = live preview
    const [windowSel, setWindowSel] = useState(WINDOW_PRESETS[0]);
    const [customCurrent,  setCustomCurrent]  = useState('');
    const [customBaseline, setCustomBaseline] = useState('');
    const [sendEmail, setSendEmail] = useState(false); // manual runs default to NOT emailing — explicit opt-in

    const SEV = {
      red:   { color:'#ef4444', bg:'rgba(239,68,68,0.08)',  label:'🔴 RED FLAG' },
      amber: { color:'#f59e0b', bg:'rgba(245,158,11,0.08)', label:'🟡 WATCH'   },
      info:  { color:'#6366f1', bg:'rgba(99,102,241,0.08)', label:'🔵 NOTICED' },
    };

    const activeWindow = () => {
      const c = parseInt(customCurrent), b = parseInt(customBaseline);
      if (c > 0 && b > 0) return { current: c, baseline: b };
      return windowSel;
    };

    const loadPreview = async () => {
      setLoading(true); setMsg(''); setViewingPast(null);
      const { current, baseline } = activeWindow();
      try {
        const r = await fetch(`${API}/admin/pattern-report/preview?currentDays=${current}&baselineDays=${baseline}`, { headers: { Authorization: 'Bearer '+token } });
        const d = await r.json();
        if (d.error) setMsg('❌ ' + d.error);
        else { setFindings(d.findings); setPeriod(d.period); }
      } catch (e) { setMsg('❌ ' + e.message); }
      setLoading(false);
    };

    const loadHistory = async () => {
      try {
        const r = await fetch(`${API}/admin/pattern-report/history`, { headers: { Authorization: 'Bearer '+token } });
        const d = await r.json();
        setHistory(d.reports || []);
      } catch (e) {}
    };

    useEffect(() => { loadPreview(); loadHistory(); }, []);

    const runNow = async () => {
      setRunning(true); setMsg('');
      const { current, baseline } = activeWindow();
      try {
        const r = await fetch(`${API}/admin/pattern-report/run`, {
          method:'POST',
          headers: { 'Content-Type':'application/json', Authorization: 'Bearer '+token },
          body: JSON.stringify({ currentDays: current, baselineDays: baseline, sendEmail }),
        });
        const d = await r.json();
        if (d.error) setMsg('❌ ' + d.error);
        else {
          setFindings(d.findings); setPeriod(d.period);
          setMsg(sendEmail
            ? `✅ Analysis run complete — emailed to ${d.emailed} recipient${d.emailed!==1?'s':''}`
            : `✅ Analysis run complete — not emailed (checkbox off)`);
          loadHistory();
        }
      } catch (e) { setMsg('❌ ' + e.message); }
      setRunning(false);
    };

    const showHistoryItem = (i) => {
      setViewingPast(i);
      setFindings(history[i].findings);
      setPeriod(history[i]);
    };

    const shown = findings || [];
    const counts = { red: shown.filter(f=>f.severity==='red').length, amber: shown.filter(f=>f.severity==='amber').length, info: shown.filter(f=>f.severity==='info').length };

    return (
      <div>
        <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:16,flexWrap:'wrap'}}>
          <span style={{fontSize:24}}>🧠</span>
          <div style={{flex:1}}>
            <h2 style={{margin:0,color:'var(--text)',fontSize:18}}>Brains — Pattern Intelligence</h2>
            <div style={{fontSize:12,color:'var(--text-muted)'}}>Autonomous anomaly detection across regions, vendors, products &amp; RTOs. Full digest every 3 days · urgent red flags alerted within hours.</div>
          </div>
        </div>

        {/* Window selector + send-email toggle */}
        <div style={{background:'var(--bg-card)',border:'1px solid var(--border)',borderRadius:12,padding:14,marginBottom:16,display:'flex',gap:14,alignItems:'center',flexWrap:'wrap'}}>
          <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
            {WINDOW_PRESETS.map(p => (
              <button key={p.label} className="btn btn-sm" onClick={()=>{ setWindowSel(p); setCustomCurrent(''); setCustomBaseline(''); }}
                style={{
                  background: (!customCurrent && !customBaseline && windowSel.label===p.label) ? 'var(--indigo-dim)' : 'transparent',
                  border:'1px solid var(--border)', color: (!customCurrent && !customBaseline && windowSel.label===p.label) ? 'var(--indigo)' : 'var(--text-muted)',
                }}>{p.label}</button>
            ))}
          </div>
          <div style={{display:'flex',gap:6,alignItems:'center'}}>
            <span style={{fontSize:11,color:'var(--text-muted)'}}>Custom:</span>
            <input type="number" min="1" placeholder="current days" value={customCurrent} onChange={e=>setCustomCurrent(e.target.value)} className="form-input" style={{width:100,fontSize:12,padding:'5px 8px'}}/>
            <span style={{fontSize:11,color:'var(--text-muted)'}}>vs</span>
            <input type="number" min="1" placeholder="baseline days" value={customBaseline} onChange={e=>setCustomBaseline(e.target.value)} className="form-input" style={{width:100,fontSize:12,padding:'5px 8px'}}/>
          </div>
          <label style={{display:'flex',alignItems:'center',gap:6,cursor:'pointer',marginLeft:'auto',fontSize:12,color:'var(--text-muted)'}}>
            <input type="checkbox" checked={sendEmail} onChange={e=>setSendEmail(e.target.checked)} style={{width:14,height:14,accentColor:'#6366f1'}}/>
            Email this report to admin/staff
          </label>
          <button className="btn btn-ghost btn-sm" onClick={loadPreview} disabled={loading}>{loading?'Loading…':'↻ Preview'}</button>
          <button className="btn btn-indigo btn-sm" onClick={runNow} disabled={running}>{running?'Running…':(sendEmail?'⚡ Run & Email':'⚡ Run (no email)')}</button>
        </div>

        {msg && <div style={{marginBottom:16,fontSize:13,color: msg.startsWith('✅')?'#10b981':'#ef4444',fontWeight:600}}>{msg}</div>}

        <div style={{display:'grid',gridTemplateColumns:'2fr 1fr',gap:16,alignItems:'start'}}>
          {/* Findings */}
          <div>
            {period && (
              <div style={{display:'flex',gap:10,marginBottom:16,flexWrap:'wrap'}}>
                <div style={{background:'var(--bg-card)',border:'1px solid var(--border)',borderRadius:10,padding:'10px 16px'}}>
                  <div style={{fontSize:20,fontWeight:800,color:'#ef4444'}}>{counts.red}</div>
                  <div style={{fontSize:10,color:'var(--text-muted)',fontWeight:600,letterSpacing:0.5}}>RED FLAGS</div>
                </div>
                <div style={{background:'var(--bg-card)',border:'1px solid var(--border)',borderRadius:10,padding:'10px 16px'}}>
                  <div style={{fontSize:20,fontWeight:800,color:'#f59e0b'}}>{counts.amber}</div>
                  <div style={{fontSize:10,color:'var(--text-muted)',fontWeight:600,letterSpacing:0.5}}>WATCHING</div>
                </div>
                <div style={{background:'var(--bg-card)',border:'1px solid var(--border)',borderRadius:10,padding:'10px 16px'}}>
                  <div style={{fontSize:20,fontWeight:800,color:'#6366f1'}}>{counts.info}</div>
                  <div style={{fontSize:10,color:'var(--text-muted)',fontWeight:600,letterSpacing:0.5}}>NOTICED</div>
                </div>
                {viewingPast===null && period.current_orders!=null && (
                  <div style={{background:'var(--bg-card)',border:'1px solid var(--border)',borderRadius:10,padding:'10px 16px',marginLeft:'auto'}}>
                    <div style={{fontSize:11,color:'var(--text-muted)'}}>Analyzed <strong style={{color:'var(--text)'}}>{period.current_orders}</strong> orders ({period.current_days||7}d) vs <strong style={{color:'var(--text)'}}>{period.baseline_orders}</strong> baseline ({period.baseline_days||30}d)</div>
                  </div>
                )}
                {viewingPast!==null && (
                  <div style={{background:'var(--bg-card)',border:'1px solid var(--border)',borderRadius:10,padding:'10px 16px',marginLeft:'auto',fontSize:11,color:'var(--text-muted)'}}>
                    Viewing past report from {new Date(period.created_at).toLocaleString('en-IN',{dateStyle:'medium',timeStyle:'short'})}
                  </div>
                )}
              </div>
            )}

            {shown.length === 0 && !loading && (
              <div style={{textAlign:'center',padding:'40px 20px',color:'#10b981',fontWeight:700,fontSize:14,background:'var(--bg-card)',borderRadius:12,border:'1px solid var(--border)'}}>
                ✅ No significant anomalies found. Everything's tracking within normal range.
              </div>
            )}

            {shown.map((f, i) => {
              const s = SEV[f.severity] || SEV.info;
              return (
                <div key={i} style={{background:'var(--bg-card)',border:'1px solid var(--border)',borderLeft:`4px solid ${s.color}`,borderRadius:10,padding:'14px 18px',marginBottom:10,display:'flex',gap:12,alignItems:'flex-start'}}>
                  {f.image && <img src={f.image} alt="" style={{width:48,height:48,borderRadius:6,objectFit:'cover',flexShrink:0,border:'1px solid var(--border)'}}/>}
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
                      <span style={{fontSize:10,fontWeight:800,color:s.color,letterSpacing:1}}>{s.label}</span>
                      <span style={{fontSize:10,color:'var(--text-muted)',fontWeight:600}}>{f.category}</span>
                    </div>
                    <div style={{fontSize:14,fontWeight:700,color:'var(--text)',marginBottom:4,lineHeight:1.4}}>{f.title}</div>
                    <div style={{fontSize:12,color:'var(--text-muted)',lineHeight:1.6}} dangerouslySetInnerHTML={{__html:f.detail}}/>
                  </div>
                </div>
              );
            })}
          </div>

          {/* History sidebar */}
          <div style={{background:'var(--bg-card)',border:'1px solid var(--border)',borderRadius:12,padding:16}}>
            <div style={{fontWeight:700,color:'var(--text)',marginBottom:12,fontSize:13}}>📜 Past Reports</div>
            {history.length === 0 && <div style={{fontSize:12,color:'var(--text-muted)'}}>No reports run yet.</div>}
            {history.map((h, i) => {
              const red = (h.findings||[]).filter(f=>f.severity==='red').length;
              return (
                <button key={i} onClick={()=>showHistoryItem(i)} style={{
                  display:'block', width:'100%', textAlign:'left', background: viewingPast===i?'var(--indigo-dim)':'transparent',
                  border:'1px solid var(--border)', borderRadius:8, padding:'8px 10px', marginBottom:6, cursor:'pointer', fontFamily:'var(--font-family)',
                }}>
                  <div style={{fontSize:11,color:'var(--text)',fontWeight:600}}>{new Date(h.created_at).toLocaleDateString('en-IN',{day:'numeric',month:'short'})}</div>
                  <div style={{fontSize:10,color:'var(--text-muted)'}}>{(h.findings||[]).length} findings{red>0?` · ${red} red`:''}</div>
                </button>
              );
            })}
          </div>
        </div>
      </div>
    );
  }

  /* ══════════════════════════════════
     REPORTS
  ══════════════════════════════════ */
  function Reports({ token }) {
    const today = new Date().toISOString().split('T')[0];
    const weekAgo = new Date(Date.now() - 7*24*3600*1000).toISOString().split('T')[0];
    const [from, setFrom] = useState(weekAgo);
    const [to, setTo]     = useState(today);
    const [preview, setPreview]   = useState(null);
    const [loading, setLoading]   = useState(false);
    const [sending, setSending]   = useState(false);
    const [msg, setMsg]           = useState('');
    const [settings, setSettings] = useState({ auto_send: false, staff_emails: '', send_to_vendors: false });
    const [savingSettings, setSavingSettings] = useState(false);

    useEffect(() => {
      fetch(`${API}/admin/reports/settings`, { headers: { Authorization: 'Bearer '+token } })
        .then(r => r.json()).then(d => setSettings(s => ({ ...s, ...d }))).catch(()=>{});
    }, []);

    const loadPreview = async () => {
      setLoading(true); setMsg(''); setPreview(null);
      const r = await fetch(`${API}/admin/reports/preview?from=${from}&to=${to}`, { headers: { Authorization: 'Bearer '+token } });
      const d = await r.json();
      setLoading(false);
      if (d.error) setMsg('❌ ' + d.error);
      else setPreview(d);
    };

    const sendReport = async () => {
      setSending(true); setMsg('');
      const r = await fetch(`${API}/admin/reports/send`, { method: 'POST', headers: { 'Content-Type':'application/json', Authorization: 'Bearer '+token }, body: JSON.stringify({ from, to }) });
      const d = await r.json();
      setSending(false);
      setMsg(d.success ? `✅ Report sent to ${d.sent} recipient${d.sent!==1?'s':''}${d.errors?.length?' | Errors: '+d.errors.join(', '):''}` : '❌ ' + d.error);
    };

  // ── Chart renderer ─────────────────────────────────────────────────────
  function JarvisChart({ data }) {
    const canvasRef = useRef(null);
    const chartRef  = useRef(null);
    useEffect(() => {
      if (!canvasRef.current || !window.Chart) return;
      if (chartRef.current) chartRef.current.destroy();
      const PALETTE = ['#6366f1','#22d3ee','#a78bfa','#34d399','#f59e0b','#f87171','#60a5fa','#fb923c','#e879f9','#4ade80'];
      const isDark = document.body.getAttribute('data-theme') !== 'minimal';
      const gridColor = isDark ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.06)';
      const textColor = isDark ? '#94a3b8' : '#64748b';
      chartRef.current = new Chart(canvasRef.current, {
        type: data.type || 'bar',
        data: {
          labels: data.labels || [],
          datasets: (data.datasets || []).map((ds, i) => ({
            ...ds,
            backgroundColor: data.type === 'doughnut' || data.type === 'pie'
              ? PALETTE.slice(0, (data.labels||[]).length)
              : ds.backgroundColor || PALETTE[i % PALETTE.length] + '99',
            borderColor: data.type === 'doughnut' || data.type === 'pie'
              ? PALETTE.slice(0, (data.labels||[]).length)
              : ds.borderColor || PALETTE[i % PALETTE.length],
            borderWidth: 2,
            borderRadius: data.type === 'bar' ? 4 : 0,
            tension: 0.4,
            fill: data.type === 'line' ? { target:'origin', above: PALETTE[i%PALETTE.length]+'22' } : false,
          })),
        },
        options: {
          responsive: true, maintainAspectRatio: true,
          plugins: {
            legend: { labels: { color: textColor, font: { family:'IBM Plex Mono', size:10 }, boxWidth:12 } },
            tooltip: { backgroundColor: isDark?'#1e293b':'#fff', titleColor: isDark?'#e2e8f0':'#1e293b', bodyColor: textColor, borderColor: gridColor, borderWidth:1 },
          },
          scales: (data.type === 'doughnut' || data.type === 'pie') ? {} : {
            x: { grid:{ color:gridColor }, ticks:{ color:textColor, font:{family:'IBM Plex Mono',size:9} } },
            y: { grid:{ color:gridColor }, ticks:{ color:textColor, font:{family:'IBM Plex Mono',size:9} } },
          },
        },
      });
      return () => chartRef.current?.destroy();
    }, [data]);
    return <canvas ref={canvasRef} style={{maxHeight:240}}/>;
  }

  function JarvisChat({ token }) {
    const [mode,       setMode]       = useState('chat'); // 'chat' | 'voice'
    const [messages,   setMessages]   = useState([
      { role:'bot', text:"⚡ JARVIS online. Ask me anything — sales, RTOs, vendor performance, stuck orders.\n\nSwitch to Voice mode to talk hands-free." }
    ]);
    const [input,      setInput]      = useState('');
    const [loading,    setLoading]    = useState(false);
    const [listening,  setListening]  = useState(false);
    const [speaking,   setSpeaking]   = useState(false);
    const [voiceTranscript, setVoiceTranscript] = useState('');
    const [voiceReply,      setVoiceReply]      = useState('');
    const endRef    = useRef(null);
    const recognRef = useRef(null);
    useEffect(() => { endRef.current?.scrollIntoView({ behavior:'smooth' }); }, [messages, loading]);

    const speak = (text) => {
      if (!window.speechSynthesis) return;
      window.speechSynthesis.cancel();
      const clean = text.replace(/[*_`#►•●]/g,'').replace(/\n+/g,' ').slice(0, 500);
      const utt = new SpeechSynthesisUtterance(clean);
      utt.rate = 1.0; utt.pitch = 1.0; utt.volume = 1;
      const voices = window.speechSynthesis.getVoices();
      const pref = voices.find(v=>/google uk english female/i.test(v.name))
                || voices.find(v=>/samantha|karen|moira/i.test(v.name))
                || voices.find(v=>v.lang==='en-US'||v.lang==='en-GB');
      if (pref) utt.voice = pref;
      utt.onstart = ()=>setSpeaking(true);
      utt.onend   = ()=>setSpeaking(false);
      utt.onerror = ()=>setSpeaking(false);
      window.speechSynthesis.speak(utt);
    };
    const stopSpeaking = () => { window.speechSynthesis?.cancel(); setSpeaking(false); };

    const startListening = () => {
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SR) { alert('Voice input requires Chrome or Edge.'); return; }
      stopSpeaking();
      const rec = new SR();
      rec.lang = 'en-IN'; rec.continuous = false; rec.interimResults = false;
      rec.onstart  = () => { setListening(true); setVoiceTranscript(''); setVoiceReply(''); };
      rec.onresult = e => {
        const t = e.results[0][0].transcript;
        setVoiceTranscript(t);
        setListening(false);
        send(t, true);
      };
      rec.onerror = () => setListening(false);
      rec.onend   = () => setListening(false);
      recognRef.current = rec;
      rec.start();
    };
    const stopListening = () => { recognRef.current?.stop(); setListening(false); };

    const send = async (query, isVoice=false) => {
      const q = (query || input).trim();
      if (!q || loading) return;
      stopSpeaking();
      setInput('');
      const nextMessages = [...messages, { role:'user', text: q }];
      setMessages(nextMessages);
      setLoading(true);
      try {
        const r = await fetch(`${API}/jarvis`, {
          method:'POST', headers:{'Content-Type':'application/json', Authorization:`Bearer ${token}`},
          body: JSON.stringify({ query: q, history: nextMessages.slice(1) }),
        });
        const d = await r.json();
        const reply = d.reply || d.error || 'No data.';
        const botMsg = { role:'bot', text: reply, renderData: d.renderData || null };
        setMessages(m => [...m, botMsg]);
        if (isVoice) setVoiceReply(reply);
        speak(reply);
      } catch {
        const err = "Couldn't reach JARVIS.";
        setMessages(m=>[...m,{role:'bot',text:err}]);
        if (isVoice) setVoiceReply(err);
      }
      setLoading(false);
    };

    const onKey = e => { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();} };
    const hasSR = !!(window.SpeechRecognition||window.webkitSpeechRecognition);
    const orbState = listening ? 'listening' : speaking ? 'speaking' : '';

    return (
      <div className="chat-wrap">
        {/* Mode tabs */}
        <div className="jv-tabs">
          <button className={`jv-tab ${mode==='chat'?'active':''}`} onClick={()=>{setMode('chat');stopSpeaking();}}>💬 Chat</button>
          <button className={`jv-tab ${mode==='voice'?'active':''}`} onClick={()=>{setMode('voice');stopSpeaking();}}>🎙 Voice</button>
        </div>

        {/* ── VOICE MODE ── */}
        {mode==='voice' && (
          <div className="voice-panel">
            {/* Status */}
            <div className={`voice-status ${orbState}`}>
              {listening ? 'JARVIS is listening…' : speaking ? 'JARVIS is speaking…' : loading ? 'Processing…' : 'Tap the mic to speak'}
            </div>

            {/* Orb */}
            <div className={`orb-wrap ${orbState}`}>
              <div className="orb-ring"/>
              <div className="orb-ring"/>
              <div className="orb-ring"/>
              <div className="orb-core"/>
            </div>

            {/* Transcript */}
            <div className="voice-transcript">
              {voiceTranscript && <div className="vt-user">{voiceTranscript}</div>}
              {voiceReply && !speaking && <div className="vt-reply">{voiceReply.slice(0,160)}{voiceReply.length>160?'…':''}</div>}
              {loading && <div className="vt-reply" style={{animation:'pulse 1s infinite'}}>Thinking…</div>}
            </div>

            {/* Controls */}
            <div className="voice-actions">
              <button className="va-btn close" onClick={()=>setMode('chat')} title="Back to chat">←</button>
              <button className={`va-btn mic-main ${listening?'active':''}`}
                onClick={listening ? stopListening : startListening}
                disabled={loading}
                title={listening?'Stop':'Start listening'}>
                {listening ? '■' : '🎙'}
              </button>
              <button className="va-btn close" onClick={stopSpeaking} title="Stop speaking">✕</button>
            </div>
          </div>
        )}

        {/* ── CHAT MODE ── */}
        {mode==='chat' && (
          <div className="chat-panel" style={{borderRadius:'0 0 12px 12px',borderTop:'none'}}>
            <div className="chat-header">
              <div className="chat-logo">J</div>
              <div><div className="chat-title">JARVIS</div></div>
              <div style={{display:'flex',gap:6,marginLeft:'auto',alignItems:'center'}}>
                {hasSR && <button onClick={()=>setMode('voice')} style={{background:'none',border:'1px solid var(--border)',borderRadius:7,padding:'4px 10px',color:'var(--text-muted)',cursor:'pointer',fontSize:11}}>🎙 Voice</button>}
                {speaking && <button onClick={stopSpeaking} style={{background:'var(--red-bg)',border:'1px solid var(--red)',borderRadius:7,padding:'4px 10px',color:'var(--red)',cursor:'pointer',fontSize:11}}>■ Stop</button>}
              </div>
              <span className="chat-sub" style={{marginLeft:8}}>Live store data</span>
            </div>

            {/* Quick report buttons */}
            <div style={{padding:'10px 16px',borderBottom:'1px solid var(--border)',maxHeight:140,overflowY:'auto'}}>
              {JARVIS_PRESETS.map(cat => (
                <div key={cat.category} style={{marginBottom:6}}>
                  <div style={{fontSize:9,fontWeight:700,color:'var(--text-muted)',letterSpacing:'0.08em',textTransform:'uppercase',marginBottom:3}}>{cat.category}</div>
                  <div style={{display:'flex',flexWrap:'wrap',gap:3}}>
                    {cat.items.map(p => (
                      <button key={p.query} className="suggestion" style={{fontSize:10}} onClick={() => send(p.query)} disabled={loading}>
                        {p.icon} {p.label}
                      </button>
                    ))}
                  </div>
                </div>
              ))}
            </div>

            <div className="chat-messages">
              {messages.map((m, i) => (
                <div key={i} className={`cmsg ${m.role}`}>
                  <div className="cmsg-av">{m.role==='bot' ? 'J' : 'A'}</div>
                  <div className="cmsg-bubble">
                    {m.role==='bot' ? <RichMessage msg={m}/> : <span style={{whiteSpace:'pre-wrap'}}>{m.text}</span>}
                  </div>
                </div>
              ))}
              {loading && (
                <div className="cmsg bot">
                  <div className="cmsg-av">J</div>
                  <div className="cmsg-bubble"><span className="typing-dot"/><span className="typing-dot"/><span className="typing-dot"/></div>
                </div>
              )}
              <div ref={endRef}/>
            </div>

            <div className="chat-input-row">
              <textarea className="chat-textarea" rows={1}
                placeholder="Ask JARVIS anything — 'sales chart', 'vendor split', 'top 10 products'…"
                value={input} onChange={e=>setInput(e.target.value)} onKeyDown={onKey}/>
              {hasSR && (
                <button onClick={()=>setMode('voice')} title="Switch to voice mode"
                  style={{background:'var(--bg-card2)',border:'1px solid var(--border)',borderRadius:8,padding:'0 12px',cursor:'pointer',color:'var(--text-muted)',fontSize:18}}>
                  🎙
                </button>
              )}
              <button className="chat-send" onClick={()=>send()} disabled={!input.trim()||loading}>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                  <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
                </svg>
              </button>
            </div>
          </div>
        )}
      </div>
    );
  }

  /* ══════════════════════════════════
     CC INVENTORY
  ══════════════════════════════════ */
  function CCInventory({ token }) {
    const [items,      setItems]      = useState([]);
    const [alerts,     setAlerts]     = useState([]);
    const [loading,    setLoading]    = useState(true);
    const [showAdd,    setShowAdd]    = useState(false);
    const [editItem,   setEditItem]   = useState(null); // {variant_id, quantity, notes}
    const [msg,        setMsg]        = useState(null);
    const [saving,     setSaving]     = useState(false);
    // Add form
    const [search,     setSearch]     = useState('');
    const [searchRes,  setSearchRes]  = useState([]);
    const [searching,  setSearching]  = useState(false);
    const [selVariant, setSelVariant] = useState(null);
    const [addQty,     setAddQty]     = useState('1');
    const [addNotes,   setAddNotes]   = useState('');
    const [addVendor,  setAddVendor]  = useState('');

    const load = useCallback(async () => {
      setLoading(true);
      try {
        const [iRes, aRes] = await Promise.all([
          fetch(`${API}/admin/cc-inventory`, { headers:{ Authorization:`Bearer ${token}` } }),
          fetch(`${API}/admin/cc-inventory/alerts`, { headers:{ Authorization:`Bearer ${token}` } }),
        ]);
        const iData = await iRes.json();
        const aData = aRes.ok ? await aRes.json() : { alerts: [] };
        setItems(iData.items || []);
        setAlerts(aData.alerts || []);
      } catch(e) { setMsg({ type:'error', text: e.message }); }
      setLoading(false);
    }, [token]);

    useEffect(() => { load(); }, [load]);

    const searchVariants = async (q) => {
      if (q.length < 2) { setSearchRes([]); return; }
      setSearching(true);
      try {
        const r = await fetch(`${API}/admin/products/search?q=${encodeURIComponent(q)}`, { headers:{ Authorization:`Bearer ${token}` } });
        const d = await r.json();
        setSearchRes(d.variants || []);
      } catch(e) {}
      setSearching(false);
    };

    useEffect(() => {
      const t = setTimeout(() => searchVariants(search), 350);
      return () => clearTimeout(t);
    }, [search]);

    const addItem = async () => {
      if (!selVariant || !addVendor) return;
      setSaving(true); setMsg(null);
      try {
        const r = await fetch(`${API}/admin/cc-inventory`, {
          method:'POST', headers:{ 'Content-Type':'application/json', Authorization:`Bearer ${token}` },
          body: JSON.stringify({
            variant_id: selVariant.variant_id, product_id: selVariant.product_id,
            product_title: selVariant.product_title, variant_title: selVariant.variant_title,
            sku: selVariant.sku, vendor_name: addVendor,
            quantity: parseInt(addQty)||1, notes: addNotes,
          }),
        });
        const d = await r.json();
        if (!r.ok) throw new Error(d.error);
        setShowAdd(false); setSelVariant(null); setSearch(''); setSearchRes([]); setAddQty('1'); setAddNotes(''); setAddVendor('');
        load();
      } catch(e) { setMsg({ type:'error', text: e.message }); }
      setSaving(false);
    };

    const updateItem = async (variantId, quantity, notes) => {
      setSaving(true);
      try {
        await fetch(`${API}/admin/cc-inventory/${variantId}`, {
          method:'PUT', headers:{ 'Content-Type':'application/json', Authorization:`Bearer ${token}` },
          body: JSON.stringify({ quantity: parseInt(quantity), notes }),
        });
        setEditItem(null); load();
      } catch(e) {}
      setSaving(false);
    };

    const deleteItem = async (variantId) => {
      if (!confirm('Remove this item from CC inventory?')) return;
      await fetch(`${API}/admin/cc-inventory/${variantId}`, { method:'DELETE', headers:{ Authorization:`Bearer ${token}` } });
      load();
    };

    // Group by vendor
    const byVendor = items.reduce((acc, i) => {
      if (!acc[i.vendor_name]) acc[i.vendor_name] = [];
      acc[i.vendor_name].push(i);
      return acc;
    }, {});

    const unseenAlerts = alerts.filter(a => !a.seen);

    return (
      <div className="page">
        {/* Alerts strip */}
        {unseenAlerts.length > 0 && (
          <div style={{background:'rgba(251,191,36,0.1)',border:'1px solid rgba(251,191,36,0.4)',borderRadius:10,padding:'12px 16px',marginBottom:16}}>
            <div style={{fontWeight:700,color:'#fbbf24',marginBottom:8,fontSize:12}}>🏬 CC STOCK MATCH — New Orders</div>
            {unseenAlerts.map(a=>(
              <div key={a._id||a.order_name} style={{fontSize:11,color:'var(--text)',marginBottom:4,display:'flex',gap:8,alignItems:'flex-start'}}>
                <span style={{color:'#fbbf24',fontWeight:700,minWidth:80}}>{a.order_name}</span>
                <span style={{color:'var(--text-muted)'}}>{a.matches.map(m=>`${m.product_title} / ${m.variant_title} (qty: ${m.quantity})`).join(' · ')}</span>
              </div>
            ))}
          </div>
        )}

        {/* Header */}
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
          <div>
            <div style={{fontWeight:700,fontSize:14,color:'var(--text)'}}>🏬 CC Inventory</div>
            <div style={{fontSize:11,color:'var(--text-muted)',marginTop:2}}>Products physically at CrosCrow admin location</div>
          </div>
          <button className="btn btn-indigo" onClick={()=>setShowAdd(v=>!v)}>+ Add Stock</button>
        </div>

        {msg && <div className={`alert alert-${msg.type}`}>{msg.text}</div>}

        {/* Add form */}
        {showAdd && (
          <div className="card" style={{marginBottom:16,overflow:'visible'}}>
            <div className="card-header"><span className="card-title">Add to CC Inventory</span></div>
            <div style={{padding:16,overflow:'visible'}}>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:12}}>
                <div style={{position:'relative',overflow:'visible'}}>
                  <label className="form-label">Search Product / Variant</label>
                  <input className="form-input" placeholder="Type product name or SKU…" value={search} onChange={e=>setSearch(e.target.value)}/>
                  {(searchRes.length>0||searching) && (
                    <div style={{position:'absolute',top:'calc(100% + 2px)',left:0,right:0,background:'#0d1f2d',border:'1px solid var(--indigo)',borderRadius:8,zIndex:9999,maxHeight:220,overflowY:'auto',boxShadow:'0 12px 40px #000a'}}>
                      {searching && <div style={{padding:'10px 14px',fontSize:11,color:'var(--text-muted)'}}>Searching…</div>}
                      {searchRes.map(v=>(
                        <div key={v.variant_id} onMouseDown={()=>{ setSelVariant(v); setSearch(`${v.product_title} / ${v.variant_title}`); setAddVendor(v.vendor||''); setSearchRes([]); }}
                          style={{padding:'9px 14px',cursor:'pointer',fontSize:12,borderBottom:'1px solid #1a3040',color:'var(--text)'}}
                          onMouseEnter={e=>e.currentTarget.style.background='#1a3a50'}
                          onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                          <div style={{fontWeight:600}}>{v.product_title}</div>
                          <div style={{fontSize:10,color:'var(--text-muted)'}}>{v.variant_title} {v.sku?`· SKU: ${v.sku}`:''} · {v.vendor||'no vendor'}</div>
                        </div>
                      ))}
                    </div>
                  )}
                  {selVariant && <div style={{marginTop:6,fontSize:10,color:'#10b981'}}>✓ Selected: {selVariant.product_title} / {selVariant.variant_title}</div>}
                </div>
                <div>
                  <label className="form-label">Vendor Name</label>
                  <input className="form-input" placeholder="Vendor name…" value={addVendor} onChange={e=>setAddVendor(e.target.value)}/>
                </div>
              </div>
              <div style={{display:'grid',gridTemplateColumns:'100px 1fr auto',gap:12,alignItems:'end'}}>
                <div>
                  <label className="form-label">Quantity</label>
                  <input className="form-input" type="number" min="1" value={addQty} onChange={e=>setAddQty(e.target.value)}/>
                </div>
                <div>
                  <label className="form-label">Notes (optional)</label>
                  <input className="form-input" placeholder="e.g. from RR-001, condition: good" value={addNotes} onChange={e=>setAddNotes(e.target.value)}/>
                </div>
                <button className="btn btn-indigo" onClick={addItem} disabled={saving||!selVariant||!addVendor}>
                  {saving?<><span className="spin">↻</span> Saving…</>:'+ Add'}
                </button>
              </div>
            </div>
          </div>
        )}

        {/* Inventory table */}
        {loading ? <div style={{textAlign:'center',padding:40,color:'var(--text-muted)'}}>Loading…</div> :
         items.length === 0 ? (
          <div className="card"><div className="empty"><div className="empty-icon">🏬</div><div className="empty-title">No inventory yet</div><div className="empty-sub">Add products that are physically at CrosCrow location.</div></div></div>
         ) : (
          Object.entries(byVendor).map(([vendor, vendorItems]) => (
            <div key={vendor} className="card" style={{marginBottom:16}}>
              <div className="card-header">
                <span className="card-title">🏪 {vendor}</span>
                <span className="card-sub">{vendorItems.length} SKU{vendorItems.length!==1?'s':''} · {vendorItems.reduce((s,i)=>s+i.quantity,0)} units total</span>
              </div>
              <div className="tbl-wrap">
                <table>
                  <thead><tr>
                    <th>Product</th><th>Variant</th><th>SKU</th><th>Qty</th><th>Notes</th><th>Updated</th><th>Action</th>
                  </tr></thead>
                  <tbody>
                    {vendorItems.map(item=>(
                      <tr key={item.variant_id}>
                        <td style={{fontWeight:600,color:'var(--text)'}}>{item.product_title}</td>
                        <td><span style={{background:'var(--indigo-dim)',color:'var(--indigo)',padding:'2px 8px',borderRadius:4,fontSize:11}}>{item.variant_title||'—'}</span></td>
                        <td style={{fontFamily:'monospace',fontSize:11,color:'var(--text-muted)'}}>{item.sku||'—'}</td>
                        <td>
                          {editItem?.variant_id===item.variant_id ? (
                            <input type="number" min="0" value={editItem.quantity} onChange={e=>setEditItem(v=>({...v,quantity:e.target.value}))}
                              style={{width:60,background:'var(--bg-card)',border:'1px solid var(--indigo)',borderRadius:4,color:'var(--text)',padding:'2px 6px',fontSize:12}}/>
                          ) : (
                            <span style={{fontWeight:700,color:item.quantity===0?'var(--red)':item.quantity<=2?'#f59e0b':'#10b981',fontSize:13}}>{item.quantity}</span>
                          )}
                        </td>
                        <td style={{fontSize:11,color:'var(--text-muted)',maxWidth:180}}>
                          {editItem?.variant_id===item.variant_id ? (
                            <input value={editItem.notes} onChange={e=>setEditItem(v=>({...v,notes:e.target.value}))}
                              style={{width:'100%',background:'var(--bg-card)',border:'1px solid var(--border)',borderRadius:4,color:'var(--text)',padding:'2px 6px',fontSize:11}}/>
                          ) : (item.notes||'—')}
                        </td>
                        <td className="td-mut">{fmtDate(item.updated_at)}</td>
                        <td>
                          <div style={{display:'flex',gap:6}}>
                            {editItem?.variant_id===item.variant_id ? (
                              <>
                                <button className="btn btn-indigo btn-sm" onClick={()=>updateItem(item.variant_id, editItem.quantity, editItem.notes)} disabled={saving}>✓</button>
                                <button className="btn btn-ghost btn-sm" onClick={()=>setEditItem(null)}>✕</button>
                              </>
                            ) : (
                              <>
                                <button className="btn btn-ghost btn-sm" onClick={()=>setEditItem({variant_id:item.variant_id,quantity:item.quantity,notes:item.notes||''})}>✎ Edit</button>
                                <button className="btn btn-danger btn-sm" onClick={()=>deleteItem(item.variant_id)}>✕</button>
                              </>
                            )}
                          </div>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          ))
        )}
      </div>
    );
  }

  /* ══════════════════════════════════
     MAIN APP
  ══════════════════════════════════ */
  function ThemeSettings({ token, theme, setTheme, brand, setBrand, THEME_OPTIONS, ICON_STYLE_OPTIONS, FONT_OPTIONS }) {
    const [accent, setAccent] = useState(brand.accent_color || '');
    const [saving, setSaving] = useState(false);
    const [uploading, setUploading] = useState(false);
    const [msg, setMsg] = useState(null);

    useEffect(()=>{ setAccent(brand.accent_color || ''); }, [brand.accent_color]);

    const THEME_PREVIEWS = {
      midnight: { bg:'#060a14', card:'#0a1020', accent:'#6366f1', text:'#e2e8f0' },
      minimal:  { bg:'#f7f7f8', card:'#ffffff', accent:'#18181b', text:'#18181b' },
      emerald:  { bg:'#061412', card:'#0a1c18', accent:'#10b981', text:'#e3f6ee' },
    };

    const pickTheme = async (id) => {
      setTheme(id);
      setSaving(true); setMsg(null);
      try {
        const r = await fetch(`${API}/admin/branding`,{method:'POST',headers:{'Content-Type':'application/json',Authorization:`Bearer ${token}`},body:JSON.stringify({theme:id})});
        if (!r.ok) throw new Error('Save failed');
        setBrand(b=>({...b, theme:id}));
        setMsg({type:'success',text:'Theme saved.'});
      } catch(e){ setMsg({type:'error',text:e.message}); }
      setSaving(false);
    };

    const pickIconStyle = async (id) => {
      setBrand(b=>({...b, icon_style:id}));
      setSaving(true); setMsg(null);
      try {
        const r = await fetch(`${API}/admin/branding`,{method:'POST',headers:{'Content-Type':'application/json',Authorization:`Bearer ${token}`},body:JSON.stringify({icon_style:id})});
        if (!r.ok) throw new Error('Save failed');
        setMsg({type:'success',text:'Icon style saved.'});
      } catch(e){ setMsg({type:'error',text:e.message}); }
      setSaving(false);
    };

    const pickFont = async (id) => {
      setBrand(b=>({...b, font_style:id}));
      setSaving(true); setMsg(null);
      try {
        const r = await fetch(`${API}/admin/branding`,{method:'POST',headers:{'Content-Type':'application/json',Authorization:`Bearer ${token}`},body:JSON.stringify({font_style:id})});
        if (!r.ok) throw new Error('Save failed');
        setMsg({type:'success',text:'Font style saved.'});
      } catch(e){ setMsg({type:'error',text:e.message}); }
      setSaving(false);
    };

    const saveAccent = async () => {
      setSaving(true); setMsg(null);
      try {
        const r = await fetch(`${API}/admin/branding`,{method:'POST',headers:{'Content-Type':'application/json',Authorization:`Bearer ${token}`},body:JSON.stringify({accent_color:accent})});
        if (!r.ok) throw new Error('Save failed');
        setBrand(b=>({...b, accent_color:accent}));
        setMsg({type:'success',text:'Accent color saved.'});
      } catch(e){ setMsg({type:'error',text:e.message}); }
      setSaving(false);
    };

    const resetAccent = async () => {
      setAccent('');
      setSaving(true); setMsg(null);
      try {
        await fetch(`${API}/admin/branding`,{method:'POST',headers:{'Content-Type':'application/json',Authorization:`Bearer ${token}`},body:JSON.stringify({accent_color:''})});
        setBrand(b=>({...b, accent_color:''}));
        setMsg({type:'success',text:'Accent color reset to theme default.'});
      } catch(e){ setMsg({type:'error',text:e.message}); }
      setSaving(false);
    };

    const uploadLogo = async (file) => {
      if (!file) return;
      setUploading(true); setMsg(null);
      try {
        const fd = new FormData(); fd.append('logo', file);
        const r = await fetch(`${API}/admin/branding/logo`,{method:'POST',headers:{Authorization:`Bearer ${token}`},body:fd});
        const d = await r.json();
        if (!r.ok) throw new Error(d.error||'Upload failed');
        setBrand(b=>({...b, logo_url:d.url}));
        setMsg({type:'success',text:'Logo uploaded.'});
      } catch(e){ setMsg({type:'error',text:e.message}); }
      setUploading(false);
    };

    const removeLogo = async () => {
      setSaving(true); setMsg(null);
      try {
        const r = await fetch(`${API}/admin/branding/logo`,{method:'DELETE',headers:{Authorization:`Bearer ${token}`}});
        if (!r.ok) throw new Error('Remove failed');
        setBrand(b=>({...b, logo_url:''}));
        setMsg({type:'success',text:'Logo removed.'});
      } catch(e){ setMsg({type:'error',text:e.message}); }
      setSaving(false);
    };

    const uploadVendorLogo = async (file) => {
      if (!file) return;
      setUploading(true); setMsg(null);
      try {
        const fd = new FormData(); fd.append('logo', file);
        const r = await fetch(`${API}/admin/branding/vendor-logo`,{method:'POST',headers:{Authorization:`Bearer ${token}`},body:fd});
        const d = await r.json();
        if (!r.ok) throw new Error(d.error||'Upload failed');
        setBrand(b=>({...b, vendor_logo_url:d.url}));
        setMsg({type:'success',text:'Vendor panel logo uploaded.'});
      } catch(e){ setMsg({type:'error',text:e.message}); }
      setUploading(false);
    };

    const removeVendorLogo = async () => {
      setSaving(true); setMsg(null);
      try {
        const r = await fetch(`${API}/admin/branding/vendor-logo`,{method:'DELETE',headers:{Authorization:`Bearer ${token}`}});
        if (!r.ok) throw new Error('Remove failed');
        setBrand(b=>({...b, vendor_logo_url:''}));
        setMsg({type:'success',text:'Vendor panel logo removed.'});
      } catch(e){ setMsg({type:'error',text:e.message}); }
      setSaving(false);
    };

    return (
      <div className="page">
        {msg && <div className={`alert alert-${msg.type}`} style={{marginBottom:12}}>{msg.type==='success'?'✓':'⚠'} {msg.text}</div>}

        <div className="card">
          <div className="card-header">
            <span className="card-title">🎨 Panel Theme</span>
            <span className="card-sub">Pick a look for the entire admin panel</span>
          </div>
