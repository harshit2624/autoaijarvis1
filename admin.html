                {DISPATCHED_STAGES.map(s=><div key={s} style={{color:'#10b981',padding:'1px 0',textTransform:'capitalize'}}>{s==='ready'?'Ready to Ship':s==='pickup'?'Pickup Pending':s==='transit'?'In Transit':s==='delivered'?'Delivered':'RTO'} ✓</div>)}
                <div style={{color:'#10b981',padding:'1px 0'}}>+ Any with AWB ✓</div>
              </div>
              <div>
                <div style={{color:'var(--text-muted)',fontWeight:600,marginBottom:4}}>⏳ PENDING STAGES</div>
                {PENDING_STAGES.map(s=><div key={s} style={{color:'#ef4444',padding:'1px 0',textTransform:'capitalize'}}>{s==='partial'?'Partial / Advance':s} ✗</div>)}
              </div>
            </div>
            <div style={{color:'var(--text-muted)',borderTop:'1px solid rgba(255,255,255,0.08)',paddingTop:6}}>
              <strong style={{color:'var(--text)'}}>Formula:</strong> {v.dispatched} dispatched ÷ {v.confirmed} total active × 100 = <strong style={{color}}>{v.dispatchRate}%</strong>
            </div>
          </div>
        )}
      </div>
    );
  }

  function Dashboard({ token, onStageClick }) {
    const [data,      setData]      = useState(null);
    const [analytics, setAnalytics] = useState(null);
    const [aLoading,  setALoading]  = useState(true);
    const [aTab,      setATab]      = useState('overview');
    const [aPeriod,   setAPeriod]   = useState(PERIOD_PRESETS[3]); // Last 30 Days

    useEffect(()=>{
      setALoading(true);
      const from = aPeriod ? aPeriod.from : '2020-01-01';
      const to   = aPeriod ? aPeriod.to   : isoToday();
      fetch(`${API}/admin/analytics?from=${from}&to=${to}`,{headers:{Authorization:`Bearer ${token}`}})
        .then(r=>r.json()).then(setAnalytics).catch(()=>{}).finally(()=>setALoading(false));
    },[token, aPeriod]);

    const stages = STAGES.filter(s=>s.id!=='all');
    const a = analytics;
    const sc = (a && a.stageCounts) ? a.stageCounts : {};
    const at = (a && a.allTimeTotals) ? a.allTimeTotals : {};
    const ps = (a && a.summary && a.summary.period) ? a.summary.period : {};
    const periodDays = ps.days || 30;
    const fulfillPct = (a && a.fulfillStats) ? (a.fulfillStats.dispatch_rate || 0) : 0;
    const fulfillColor = fulfillPct>=80?'#10b981':fulfillPct>=50?'#f59e0b':'#ef4444';
    const periodLabel = aPeriod ? aPeriod.label : 'All Time';
    const stageColor = id => { const s=STAGES.find(x=>x.id===id); return s?`var(--${s.color})`:'var(--indigo)'; };

    return (
      <div className="page">
        {/* ── Global period picker ── */}
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14,flexWrap:'wrap',gap:8}}>
          <div style={{fontSize:11,color:'var(--text-muted)',letterSpacing:1}}>
            Showing data for: <span style={{color:'var(--indigo)',fontWeight:700}}>{periodLabel}</span>
            {ps.from && <span style={{color:'var(--text-muted)',marginLeft:6,fontSize:10}}>({ps.from} → {ps.to})</span>}
          </div>
          <PeriodPicker period={aPeriod} onChange={p=>{setAPeriod(p);setATab('overview');}} align="right"/>
        </div>

        {/* Summary row — all from analytics, respects period */}
        <div className="stats-grid" style={{gridTemplateColumns:'repeat(auto-fill,minmax(200px,1fr))'}}>
          <StatCard color="indigo" icon="◈" label={'Orders ('+periodLabel+')'}  value={aLoading?'…':(a&&a.summary?a.summary.period.orders.toLocaleString():'0')} sub={aLoading?'':fmtCur(ps.revenue||0)}/>
          <StatCard color="cyan"   icon="₹" label="Total Revenue (All Time)"    value={aLoading?'…':fmtCur(at.revenue||0)} sub={'all '+((at.orders||0).toLocaleString())+' orders'}/>
          <StatCard color="yellow" icon="⬡" label="Pending Commission"          value={aLoading?'…':fmtCur(at.pendingCommission||0)} sub="unsettled"/>
          <StatCard color="green"  icon="✅" label={'Delivered ('+periodLabel+')'} value={aLoading?'…':(sc.delivered||0)} sub="orders"/>
          <StatCard color="red"    icon="↩" label={'RTO ('+periodLabel+')'}     value={aLoading?'…':(sc.rto||0)} sub="returned"/>
          {!aLoading && a && a.fulfillStats && (()=>{
            const fs = a.fulfillStats;

            const MiniCard = ({icon, label, pct, num, den, sub, rev, threshHi=80, threshMid=60}) => {
              const color = pct>=threshHi?'#10b981':pct>=threshMid?'#f59e0b':'#ef4444';
              const bg    = pct>=threshHi?'rgba(16,185,129,0.08)':pct>=threshMid?'rgba(245,158,11,0.08)':'rgba(239,68,68,0.08)';
              const bdr   = pct>=threshHi?'rgba(16,185,129,0.3)':pct>=threshMid?'rgba(245,158,11,0.3)':'rgba(239,68,68,0.3)';
              return (
                <div style={{background:bg,border:`1px solid ${bdr}`,borderRadius:8,padding:'14px 16px',display:'flex',flexDirection:'column',gap:4}}>
                  <div style={{fontSize:9,letterSpacing:2,textTransform:'uppercase',color:'var(--text-muted)',marginBottom:2}}>{icon} {label}</div>
                  <div style={{display:'flex',alignItems:'flex-end',gap:8}}>
                    <span style={{fontSize:28,fontWeight:900,color,lineHeight:1}}>{pct}%</span>
                    <span style={{fontSize:10,color:'var(--text-muted)',marginBottom:3}}>{num}/{den}</span>
                  </div>
                  <div style={{height:4,background:'var(--border)',borderRadius:2,overflow:'hidden',marginTop:2}}>
                    <div style={{height:'100%',width:pct+'%',background:color,borderRadius:2,transition:'width 0.4s'}}/>
                  </div>
                  <div style={{fontSize:10,color:'var(--text-muted)',display:'flex',justifyContent:'space-between'}}>
                    <span>{sub}</span>
                    {rev != null && <span style={{color,fontWeight:700}}>{fmtCur(rev)}</span>}
                  </div>
                  <div style={{fontSize:9,color:'var(--text-muted)',textAlign:'right'}}>{periodLabel}</div>
                </div>
              );
            };

            const confirmedPct = fs.total > 0 ? Math.round(fs.confirmed / fs.total * 100) : 0;

            return (
              <React.Fragment>
                <div style={{background:'rgba(99,102,241,0.08)',border:'1px solid rgba(99,102,241,0.3)',borderRadius:8,padding:'14px 16px',display:'flex',flexDirection:'column',gap:4}}>
                  <div style={{fontSize:9,letterSpacing:2,textTransform:'uppercase',color:'var(--text-muted)',marginBottom:2}}>📋 Confirmed Orders</div>
                  <div style={{display:'flex',alignItems:'flex-end',gap:8}}>
                    <span style={{fontSize:28,fontWeight:900,color:'var(--indigo)',lineHeight:1}}>{confirmedPct}%</span>
                    <span style={{fontSize:10,color:'var(--text-muted)',marginBottom:3}}>{fs.confirmed}/{fs.total+' total'}</span>
                  </div>
                  <div style={{height:4,background:'var(--border)',borderRadius:2,overflow:'hidden',marginTop:2}}>
                    <div style={{height:'100%',width:confirmedPct+'%',background:'var(--indigo)',borderRadius:2,transition:'width 0.4s'}}/>
                  </div>
                  <div style={{fontSize:10,color:'var(--text-muted)',display:'flex',justifyContent:'space-between'}}>
                    <span>{fs.confirmed} confirmed</span>
                    <span style={{color:'var(--indigo)',fontWeight:700}}>{fmtCur(fs.revConfirmed||0)}</span>
                  </div>
                  <div style={{fontSize:9,color:'var(--text-muted)',textAlign:'right'}}>{periodLabel}</div>
                </div>
                {/* ── Dispatch Rate Card with stage breakdown ── */}
                {(()=>{
                  const pct   = fs.dispatch_rate;
                  const color = pct>=80?'#10b981':pct>=50?'#f59e0b':'#ef4444';
                  const bg    = pct>=80?'rgba(16,185,129,0.08)':pct>=50?'rgba(245,158,11,0.08)':'rgba(239,68,68,0.08)';
                  const bdr   = pct>=80?'rgba(16,185,129,0.3)':pct>=50?'rgba(245,158,11,0.3)':'rgba(239,68,68,0.3)';
                  const sb    = fs.stageBreakdown || {};
                  const dispStages = [
                    { key:'delivered', label:'Delivered',    icon:'✅', c:'#10b981' },
                    { key:'transit',   label:'In Transit',   icon:'🚚', c:'#60a5fa' },
                    { key:'pickup',    label:'Pickup',       icon:'⌛', c:'#f59e0b' },
                    { key:'ready',     label:'Ready to Ship',icon:'📦', c:'#a78bfa' },
                    { key:'rto',       label:'RTO',          icon:'↩', c:'#f87171' },
                  ];
                  const pendStages = [
                    { key:'confirmed', label:'Confirmed', icon:'✓', c:'#34d399' },
                    { key:'partial',   label:'Partial',   icon:'₹', c:'#fbbf24' },
                  ];
                  return (
                    <div style={{background:bg,border:`1px solid ${bdr}`,borderRadius:8,padding:'14px 16px',display:'flex',flexDirection:'column',gap:6,gridColumn:'span 2'}}>
                      {/* Header row */}
                      <div style={{display:'flex',alignItems:'flex-end',justifyContent:'space-between',gap:8,flexWrap:'wrap'}}>
                        <div>
                          <div style={{fontSize:9,letterSpacing:2,textTransform:'uppercase',color:'var(--text-muted)',marginBottom:4}}>📦 Dispatch Rate · {periodLabel}</div>
                          <div style={{display:'flex',alignItems:'baseline',gap:8}}>
                            <span style={{fontSize:36,fontWeight:900,color,lineHeight:1}}>{pct}%</span>
                            <span style={{fontSize:11,color:'var(--text-muted)'}}>{fs.dispatched} dispatched / {fs.confirmed} active orders</span>
                          </div>
                        </div>
                        <div style={{textAlign:'right'}}>
                          <div style={{fontSize:10,color:'var(--text-muted)'}}>Pending dispatch</div>
                          <div style={{fontSize:20,fontWeight:800,color:'#f87171'}}>{fs.pending_count}</div>
                          <div style={{fontSize:10,color:'var(--text-muted)',marginTop:1}}>{fmtCur(fs.revDispatched)} dispatched rev</div>
                        </div>
                      </div>
                      {/* Progress bar */}
                      <div style={{height:5,background:'var(--border)',borderRadius:3,overflow:'hidden'}}>
                        <div style={{height:'100%',width:pct+'%',background:color,borderRadius:3,transition:'width 0.4s'}}/>
                      </div>
                      {/* Stage breakdown */}
                      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginTop:4}}>
                        {/* Dispatched breakdown */}
                        <div>
                          <div style={{fontSize:9,fontWeight:700,letterSpacing:1.5,textTransform:'uppercase',color,marginBottom:5}}>✅ {pct}% Dispatched ({fs.dispatched})</div>
                          {dispStages.filter(s=>(sb[s.key]||0)>0).map(s=>(
                            <div key={s.key} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'3px 0',borderBottom:'1px solid var(--border)'}}>
                              <span style={{fontSize:11,color:'var(--text-dim)'}}>{s.icon} {s.label}</span>
                              <div style={{display:'flex',alignItems:'center',gap:6}}>
                                <div style={{width:48,height:3,background:'var(--border)',borderRadius:2,overflow:'hidden'}}>
                                  <div style={{height:'100%',width:`${Math.round((sb[s.key]||0)/Math.max(fs.dispatched,1)*100)}%`,background:s.c,borderRadius:2}}/>
                                </div>
                                <span style={{fontSize:11,fontWeight:700,color:s.c,minWidth:22,textAlign:'right'}}>{sb[s.key]||0}</span>
                              </div>
                            </div>
                          ))}
                          {dispStages.every(s=>(sb[s.key]||0)===0) && <div style={{fontSize:10,color:'var(--text-muted)'}}>No dispatched orders yet</div>}
                        </div>
                        {/* Pending breakdown */}
                        <div>
                          <div style={{fontSize:9,fontWeight:700,letterSpacing:1.5,textTransform:'uppercase',color:'#f87171',marginBottom:5}}>⏳ {100-pct}% Pending ({fs.pending_count})</div>
                          {pendStages.filter(s=>(sb[s.key]||0)>0).map(s=>(
                            <div key={s.key} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'3px 0',borderBottom:'1px solid var(--border)'}}>
                              <span style={{fontSize:11,color:'var(--text-dim)'}}>{s.icon} {s.label}</span>
                              <div style={{display:'flex',alignItems:'center',gap:6}}>
                                <div style={{width:48,height:3,background:'var(--border)',borderRadius:2,overflow:'hidden'}}>
                                  <div style={{height:'100%',width:`${Math.round((sb[s.key]||0)/Math.max(fs.pending_count,1)*100)}%`,background:s.c,borderRadius:2}}/>
                                </div>
                                <span style={{fontSize:11,fontWeight:700,color:s.c,minWidth:22,textAlign:'right'}}>{sb[s.key]||0}</span>
                              </div>
                            </div>
                          ))}
                          {pendStages.every(s=>(sb[s.key]||0)===0) && <div style={{fontSize:10,color:'var(--text-muted)'}}>No pending orders</div>}
                        </div>
                      </div>
                    </div>
                  );
                })()}
                <MiniCard icon="🚀" label="Overall Fulfillment"
                  pct={fs.overall_rate} num={fs.dispatched} den={fs.total+' total orders'}
                  sub={fs.cancelled+' cancelled'}/>
                <MiniCard icon="✅" label="Delivery Rate"
                  pct={fs.delivery_rate} num={fs.delivered} den={fs.dispatched+' dispatched'}
                  sub={fs.rto+' RTO · overall: '+Math.round(fs.delivered/Math.max(fs.total,1)*100)+'% ('+fs.delivered+'/'+fs.total+')'} rev={fs.revDelivered} threshHi={70} threshMid={50}/>
              </React.Fragment>
            );
          })()}

          {/* Prepaid vs COD stat card */}
          {!aLoading && a?.paymentSplit && (() => {
            const { prepaid=0, cod=0, partial=0 } = a.paymentSplit;
            const total = prepaid + cod + partial || 1;
            const prepaidPct = Math.round(prepaid / total * 100);
            const codPct     = Math.round(cod     / total * 100);
            const partialPct = Math.round(partial / total * 100);
            return (
              <div style={{background:'var(--bg-card)',border:'1px solid var(--border)',borderRadius:8,padding:'14px 16px',minWidth:200}}>
                <div style={{fontSize:9,letterSpacing:2,textTransform:'uppercase',color:'var(--text-muted)',marginBottom:10}}>💳 Payment Split · {periodLabel}</div>
                {[
                  {label:'Prepaid', pct:prepaidPct, count:prepaid, color:'#10b981', bg:'rgba(16,185,129,0.12)'},
                  {label:'COD',     pct:codPct,     count:cod,     color:'#f59e0b', bg:'rgba(245,158,11,0.12)'},
                  {label:'Advance', pct:partialPct, count:partial, color:'#a78bfa', bg:'rgba(167,139,250,0.12)'},
                ].map(r=>(
                  <div key={r.label} style={{marginBottom:8}}>
                    <div style={{display:'flex',justifyContent:'space-between',marginBottom:3,alignItems:'center'}}>
                      <span style={{fontSize:11,color:'var(--text-muted)'}}>{r.label}</span>
                      <span style={{display:'flex',alignItems:'center',gap:6}}>
                        <span style={{fontSize:11,color:'var(--text-muted)'}}>{r.count}</span>
                        <span style={{fontSize:13,fontWeight:800,color:r.color,minWidth:34,textAlign:'right'}}>{r.pct}%</span>
                      </span>
                    </div>
                    <div style={{height:5,borderRadius:3,background:'var(--border)',overflow:'hidden'}}>
                      <div style={{height:'100%',width:r.pct+'%',background:r.color,borderRadius:3,transition:'width 0.4s'}}/>
                    </div>
                  </div>
                ))}
              </div>
            );
          })()}
        </div>

        {/* Stage breakdown — respects period */}
        <div className="card">
          <div className="card-header">
            <span className="card-title">Order Pipeline</span>
            <span className="card-sub">{periodLabel} · click to filter orders</span>
          </div>
          <div style={{padding:'16px',display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(140px,1fr))',gap:10}}>
            {aLoading ? Array.from({length:9}).map((_,i)=>(
              <div key={i} style={{background:'var(--bg-card2)',border:'1px solid var(--border)',borderRadius:8,padding:14}}>
                <div className="skel" style={{height:10,width:80,marginBottom:8}}/>
                <div className="skel" style={{height:22,width:40}}/>
              </div>
            )) : stages.map(s=>(
              <div key={s.id}
                onClick={()=>onStageClick(s.id)}
                style={{background:'var(--bg-card2)',border:'1px solid var(--border)',borderRadius:8,padding:14,cursor:'pointer',transition:'border-color 0.15s'}}
                onMouseEnter={e=>e.currentTarget.style.borderColor='var(--border-hi)'}
                onMouseLeave={e=>e.currentTarget.style.borderColor='var(--border)'}
              >
                <div style={{fontSize:9,letterSpacing:2,textTransform:'uppercase',color:'var(--text-muted)',marginBottom:6}}>{s.icon} {s.label}</div>
                <div style={{fontSize:24,fontWeight:700,color:stageColor(s.id)}}>
                  {sc[s.id]||0}
                </div>
              </div>
            ))}
          </div>
        </div>

        {/* ── FOUNDER ANALYTICS ── */}
        <div className="card" style={{marginTop:0}}>
          <div className="card-header" style={{borderBottom:'1px solid var(--border)',paddingBottom:12,flexWrap:'wrap',gap:8}}>
            <span className="card-title">📊 Founder Analytics</span>
            <div style={{display:'flex',gap:6}}>
              {[
                {id:'overview', label:'Overview'},
                {id:'vendors',  label:'🚚 Vendor Fulfillment'},
                {id:'products', label:'Products'},
                {id:'brands',   label:'Brands'},
                {id:'cities',   label:'Cities'},
              ].map(t=>(
                <button key={t.id} onClick={()=>setATab(t.id)}
                  style={{fontSize:11,padding:'4px 10px',borderRadius:6,border:'1px solid '+(aTab===t.id?'var(--indigo)':'var(--border)'),
                    background:aTab===t.id?'var(--indigo)':'transparent',color:aTab===t.id?'#fff':'var(--text-muted)',cursor:'pointer',
                    fontWeight:t.id==='vendors'&&aTab!==t.id?600:400}}>
                  {t.label}
                </button>
              ))}
            </div>
          </div>

          {aLoading ? (
            <div style={{padding:24,textAlign:'center',color:'var(--text-muted)',fontSize:13}}>Loading analytics…</div>
          ) : (!a || !a.summary) ? (
            <div style={{padding:24,textAlign:'center',color:'var(--text-muted)',fontSize:13}}>Analytics unavailable</div>
          ) : aTab==='overview' ? (
            <div style={{padding:16}}>
              {/* KPI row — all respect selected period */}
              <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(160px,1fr))',gap:10,marginBottom:16}}>
                <div style={{background:'var(--bg-card2)',border:'1px solid var(--border)',borderRadius:8,padding:'12px 14px'}}>
                  <div style={{fontSize:9,letterSpacing:1.5,textTransform:'uppercase',color:'var(--text-muted)',marginBottom:4}}>Today Orders</div>
                  <div style={{fontSize:20,fontWeight:800,color:'#6366f1'}}>{a.summary.today.orders}</div>
                  <div style={{fontSize:10,color:'var(--text-muted)',marginTop:2}}>{'₹'+(a.summary.today.revenue||0).toLocaleString()}</div>
                </div>
                <div style={{background:'var(--bg-card2)',border:'1px solid var(--border)',borderRadius:8,padding:'12px 14px'}}>
                  <div style={{fontSize:9,letterSpacing:1.5,textTransform:'uppercase',color:'var(--text-muted)',marginBottom:4}}>Last 7 Days</div>
                  <div style={{fontSize:20,fontWeight:800,color:'#06b6d4'}}>{'₹'+(a.summary.last7d.revenue||0).toLocaleString()}</div>
                  <div style={{fontSize:10,color:'var(--text-muted)',marginTop:2}}>{a.summary.last7d.orders} orders · AOV {'₹'+a.summary.last7d.aov}</div>
                </div>
                <div style={{background:'var(--bg-card2)',border:'1px solid var(--border)',borderRadius:8,padding:'12px 14px'}}>
                  <div style={{fontSize:9,letterSpacing:1.5,textTransform:'uppercase',color:'var(--text-muted)',marginBottom:4}}>{'Revenue ('+periodLabel+')'}</div>
                  <div style={{fontSize:20,fontWeight:800,color:'#10b981'}}>{'₹'+(a.summary.period.revenue||0).toLocaleString()}</div>
                  <div style={{fontSize:10,color:'var(--text-muted)',marginTop:2,display:'flex',alignItems:'center',flexWrap:'wrap',gap:2}}>{'vs prior '+periodDays+'d'}<GrowthBadge val={a.summary.revenueGrowth}/></div>
                </div>
                <div style={{background:'var(--bg-card2)',border:'1px solid var(--border)',borderRadius:8,padding:'12px 14px'}}>
                  <div style={{fontSize:9,letterSpacing:1.5,textTransform:'uppercase',color:'var(--text-muted)',marginBottom:4}}>{'Orders ('+periodLabel+')'}</div>
                  <div style={{fontSize:20,fontWeight:800,color:'#f59e0b'}}>{a.summary.period.orders}</div>
                  <div style={{fontSize:10,color:'var(--text-muted)',marginTop:2,display:'flex',alignItems:'center',flexWrap:'wrap',gap:2}}>{'vs prior '+periodDays+'d'}<GrowthBadge val={a.summary.orderGrowth}/></div>
                </div>
                <div style={{background:'var(--bg-card2)',border:'1px solid var(--border)',borderRadius:8,padding:'12px 14px'}}>
                  <div style={{fontSize:9,letterSpacing:1.5,textTransform:'uppercase',color:'var(--text-muted)',marginBottom:4}}>Dispatch Rate</div>
                  <div style={{fontSize:20,fontWeight:800,color:fulfillColor}}>{fulfillPct}%</div>
                  <div style={{fontSize:10,color:'var(--text-muted)',marginTop:2}}>{(a.fulfillStats?.dispatched||0)+' of '+(a.fulfillStats?.confirmed||0)+' confirmed · '+periodLabel}</div>
                </div>
                <div style={{background:'var(--bg-card2)',border:'1px solid var(--border)',borderRadius:8,padding:'12px 14px'}}>
                  <div style={{fontSize:9,letterSpacing:1.5,textTransform:'uppercase',color:'var(--text-muted)',marginBottom:4}}>RTO Rate</div>
                  <div style={{fontSize:20,fontWeight:800,color:(a.summary.rtoRate30||0)>10?'#ef4444':'#10b981'}}>{a.summary.rtoRate30||0}%</div>
                  <div style={{fontSize:10,color:'var(--text-muted)',marginTop:2}}>{'returns · '+periodLabel}</div>
                </div>
                <div style={{background:'var(--bg-card2)',border:'1px solid var(--border)',borderRadius:8,padding:'12px 14px'}}>
                  <div style={{fontSize:9,letterSpacing:1.5,textTransform:'uppercase',color:'var(--text-muted)',marginBottom:4}}>Repeat Buyers</div>
                  <div style={{fontSize:20,fontWeight:800,color:'#a78bfa'}}>{a.summary.repeatRate||0}%</div>
                  <div style={{fontSize:10,color:'var(--text-muted)',marginTop:2}}>{a.summary.repeatCustomers} of {a.summary.totalCustomers} customers</div>
                </div>
                <div style={{background:'var(--bg-card2)',border:'1px solid var(--border)',borderRadius:8,padding:'12px 14px'}}>
                  <div style={{fontSize:9,letterSpacing:1.5,textTransform:'uppercase',color:'var(--text-muted)',marginBottom:4}}>Avg Order Value</div>
                  <div style={{fontSize:20,fontWeight:800,color:'#06b6d4'}}>{'₹'+(a.summary.period.aov||0)}</div>
                  <div style={{fontSize:10,color:'var(--text-muted)',marginTop:2}}>{periodLabel}</div>
                </div>
              </div>

              {/* Revenue trend bar chart */}
              <div style={{background:'var(--bg-card2)',border:'1px solid var(--border)',borderRadius:8,padding:'14px 16px',gridColumn:'1/-1'}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
                  <div style={{fontSize:11,fontWeight:600,color:'var(--text-muted)',textTransform:'uppercase',letterSpacing:1}}>{'Daily Sales · '+periodLabel}</div>
                  <div style={{fontSize:10,color:'var(--text-muted)'}}>Purple = revenue scale · numbers above = total / confirmed orders</div>
                </div>
                <Sparkline data={a.trend14d} color='#6366f1'/>
              </div>

              {/* Fulfillment + Payment split */}
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginTop:10}}>
                <div style={{background:'var(--bg-card2)',border:'1px solid var(--border)',borderRadius:8,padding:'14px 16px'}}>
                  <div style={{fontSize:11,fontWeight:600,color:'var(--text-muted)',marginBottom:10,textTransform:'uppercase',letterSpacing:1}}>{'Fulfillment · '+periodLabel}</div>
                  {[
                    {label:'Fulfilled',      val:a.fulfillStats.fulfilled,    color:'#10b981'},
                    {label:'Unfulfilled',    val:a.fulfillStats.unfulfilled,  color:'#ef4444'},
                    {label:'Partial Ship',   val:a.fulfillStats.partial_ship, color:'#f59e0b'},
                    {label:'Cancelled',      val:a.fulfillStats.cancelled,    color:'#6b7280'},
                    {label:'RTO',            val:a.fulfillStats.rto,          color:'#a78bfa'},
                  ].map(r=>(
                    <div key={r.label} style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
                      <span style={{fontSize:12,color:'var(--text-muted)'}}>{r.label}</span>
                      <span style={{fontSize:13,fontWeight:700,color:r.color}}>{r.val}</span>
                    </div>
                  ))}
                  <div style={{marginTop:8,height:4,borderRadius:2,background:'var(--border)',overflow:'hidden'}}>
                    <div style={{height:'100%',width:`${fulfillPct}%`,background:fulfillColor,borderRadius:2,transition:'width 0.4s'}}/>
                  </div>
                  <div style={{fontSize:10,color:fulfillColor,marginTop:4,fontWeight:700}}>{fulfillPct}% fulfillment rate</div>
                </div>

                <div style={{background:'var(--bg-card2)',border:'1px solid var(--border)',borderRadius:8,padding:'14px 16px'}}>
                  <div style={{fontSize:11,fontWeight:600,color:'var(--text-muted)',marginBottom:10,textTransform:'uppercase',letterSpacing:1}}>{'Payment Split · '+periodLabel}</div>
                  {[
                    {label:'Prepaid',  val:a.paymentSplit.prepaid, color:'#10b981'},
                    {label:'COD',      val:a.paymentSplit.cod,     color:'#f59e0b'},
                    {label:'Advance',  val:a.paymentSplit.partial, color:'#6366f1'},
                  ].map(r=>{
                    const total = a.paymentSplit.prepaid + a.paymentSplit.cod + a.paymentSplit.partial || 1;
                    const pct   = Math.round(r.val/total*100);
                    return (
                      <div key={r.label} style={{marginBottom:10}}>
                        <div style={{display:'flex',justifyContent:'space-between',marginBottom:3}}>
                          <span style={{fontSize:12,color:'var(--text-muted)'}}>{r.label}</span>
                          <span style={{fontSize:12,fontWeight:700,color:r.color}}>{r.val} <span style={{fontSize:10,fontWeight:400}}>({pct}%)</span></span>
                        </div>
                        <div style={{height:4,borderRadius:2,background:'var(--border)'}}>
                          <div style={{height:'100%',width:`${pct}%`,background:r.color,borderRadius:2}}/>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            </div>

          ) : aTab==='vendors' ? (
            <div style={{padding:16}}>
              <div style={{fontSize:11,color:'var(--text-muted)',marginBottom:16}}>All-time vendor fulfillment · sorted by most pending orders · min 3 orders</div>
              {!(a.vendorLeaderboard||[]).length ? (
                <div style={{color:'var(--text-muted)',fontSize:12}}>No vendor data yet.</div>
              ) : (
                <div style={{display:'flex',flexDirection:'column',gap:12}}>
                  {(a.vendorLeaderboard||[]).map((v,i)=>{
                    const color = v.dispatchRate>=80?'#10b981':v.dispatchRate>=50?'#f59e0b':'#ef4444';
                    return <VendorDispatchCard key={v.vendor} v={v} color={color} rank={i+1}/>;
                  })}
                </div>
              )}
            </div>

          ) : aTab==='products' ? (
            <div style={{padding:16}}>
              <div style={{fontSize:11,color:'var(--text-muted)',marginBottom:10}}>{'Top products by units sold · '+periodLabel}</div>
              <div style={{overflowX:'auto'}}>
                <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
                  <thead><tr style={{borderBottom:'1px solid var(--border)'}}>
                    <th style={{textAlign:'left',padding:'6px 8px',color:'var(--text-muted)',fontWeight:600,fontSize:10,textTransform:'uppercase'}}>#</th>
                    <th style={{textAlign:'left',padding:'6px 8px',color:'var(--text-muted)',fontWeight:600,fontSize:10,textTransform:'uppercase'}}>Product</th>
                    <th style={{textAlign:'left',padding:'6px 8px',color:'var(--text-muted)',fontWeight:600,fontSize:10,textTransform:'uppercase'}}>Brand</th>
                    <th style={{textAlign:'right',padding:'6px 8px',color:'var(--text-muted)',fontWeight:600,fontSize:10,textTransform:'uppercase'}}>Units</th>
                    <th style={{textAlign:'right',padding:'6px 8px',color:'var(--text-muted)',fontWeight:600,fontSize:10,textTransform:'uppercase'}}>Orders</th>
                    <th style={{textAlign:'right',padding:'6px 8px',color:'var(--text-muted)',fontWeight:600,fontSize:10,textTransform:'uppercase'}}>Revenue</th>
                  </tr></thead>
                  <tbody>
                    {(a.topProducts||[]).map((p,i)=>(
                      <tr key={i} style={{borderBottom:'1px solid var(--border)'}}>
                        <td style={{padding:'8px',color:'var(--text-muted)',fontSize:11}}>{i+1}</td>
                        <td style={{padding:'8px',color:'var(--text)',fontWeight:500,maxWidth:200,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{p.title}</td>
                        <td style={{padding:'8px',color:'var(--text-muted)',fontSize:11}}>{p.vendor}</td>
                        <td style={{padding:'8px',textAlign:'right',fontWeight:700,color:'#6366f1'}}>{p.qty}</td>
                        <td style={{padding:'8px',textAlign:'right',color:'var(--text-muted)'}}>{p.orders}</td>
                        <td style={{padding:'8px',textAlign:'right',fontWeight:600,color:'#10b981'}}>₹{p.revenue.toLocaleString()}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>

          ) : aTab==='brands' ? (
            <div style={{padding:16}}>
              <div style={{fontSize:11,color:'var(--text-muted)',marginBottom:10}}>{'Top brands by revenue · '+periodLabel}</div>
              {(a.topBrands||[]).map((b,i)=>{
                const maxRev = a.topBrands[0]?.revenue || 1;
                const pct = Math.round(b.revenue/maxRev*100);
                const colors = ['#6366f1','#06b6d4','#10b981','#f59e0b','#a78bfa','#ec4899','#ef4444','#14b8a6'];
                return (
                  <div key={i} style={{marginBottom:12}}>
                    <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
                      <span style={{fontSize:13,fontWeight:600,color:'var(--text)'}}>{b.name}</span>
                      <span style={{fontSize:12,color:'var(--text-muted)'}}>{b.qty} units · {b.orders} orders · <span style={{color:'#10b981',fontWeight:700}}>₹{b.revenue.toLocaleString()}</span></span>
                    </div>
                    <div style={{height:6,borderRadius:3,background:'var(--border)'}}>
                      <div style={{height:'100%',width:`${pct}%`,background:colors[i%colors.length],borderRadius:3,transition:'width 0.4s'}}/>
                    </div>
                  </div>
                );
              })}
            </div>

          ) : aTab==='cities' ? (
            <div style={{padding:16}}>
              <div style={{fontSize:11,color:'var(--text-muted)',marginBottom:10}}>{'Top delivery cities · '+periodLabel}</div>
              {(a.topCities||[]).map((c,i)=>{
                const maxC = a.topCities[0]?.count || 1;
                const pct = Math.round(c.count/maxC*100);
                return (
                  <div key={i} style={{marginBottom:10}}>
                    <div style={{display:'flex',justifyContent:'space-between',marginBottom:3}}>
                      <span style={{fontSize:13,fontWeight:500,color:'var(--text)'}}>{c.city}</span>
                      <span style={{fontSize:12,fontWeight:700,color:'#6366f1'}}>{c.count} orders</span>
                    </div>
                    <div style={{height:5,borderRadius:2,background:'var(--border)'}}>
                      <div style={{height:'100%',width:`${pct}%`,background:'#6366f1',borderRadius:2,opacity:0.5+0.5*(pct/100)}}/>
                    </div>
                  </div>
                );
              })}
            </div>
          ) : null}
        </div>
      </div>
    );
  }

  /* ══════════════════════════════════
     ORDERS VIEW
  ══════════════════════════════════ */
  function Orders({ token, initialStage }) {
    const [orders,    setOrders]   = useState([]);
    const [loading,   setLoading]  = useState(true);
    const [stage,     setStage]    = useState(initialStage || 'all');
    const [search,    setSearch]   = useState('');
    const [page,      setPage]     = useState(1);
    const [modal,     setModal]    = useState(null);
    const [showTags,  setShowTags] = useState(false);
    const [period,    setPeriod]   = useState(null);
    // Bulk select
    const [selected,  setSelected]  = useState(new Set());
    const [bulkStage, setBulkStage] = useState('');
    const [bulkAddTag,setBulkAddTag]= useState('');
    const [bulkRmTag, setBulkRmTag] = useState('');
    const [bulkMsg,   setBulkMsg]   = useState(null);
    const [bulkBusy,  setBulkBusy]  = useState(false);
    const [syncing,   setSyncing]   = useState(false);
    const [syncMsg,   setSyncMsg]   = useState(null);
    // Extra filters
    const [filterVendor,  setFilterVendor]  = useState('all');
    const [filterPayment, setFilterPayment] = useState('all'); // all | prepaid | cod | advance
    const [showFilters,   setShowFilters]   = useState(false);

    const load = useCallback(()=>{
      setLoading(true);
      fetch(`${API}/admin/orders?created_at_min=2000-01-01`,{headers:{Authorization:`Bearer ${token}`}})
        .then(r=>r.json()).then(d=>setOrders(d.orders||[])).catch(()=>{}).finally(()=>setLoading(false));
    },[token]);

    useEffect(()=>{ load(); },[load]);

    const toggleSelect = id => setSelected(s => { const n=new Set(s); n.has(id)?n.delete(id):n.add(id); return n; });
    const toggleAll    = () => setSelected(s => s.size===rows.length ? new Set() : new Set(rows.map(o=>o.shopifyId)));
    const clearSelect  = () => { setSelected(new Set()); setBulkMsg(null); };

    const applyBulk = async () => {
      if (!bulkStage && !bulkAddTag.trim() && !bulkRmTag.trim()) { setBulkMsg({type:'error',text:'Select a stage or enter tags to add/remove.'}); return; }
      setBulkBusy(true); setBulkMsg(null);
      const addTags = bulkAddTag.split(',').map(t=>t.trim()).filter(Boolean);
      const rmTags  = bulkRmTag.split(',').map(t=>t.trim()).filter(Boolean);
      try {
        const r = await fetch(`${API}/admin/orders/bulk-update`, {
          method:'POST', headers:{'Content-Type':'application/json','Authorization':`Bearer ${token}`},
          body: JSON.stringify({ order_ids:[...selected], stage:bulkStage||undefined, add_tags:addTags, remove_tags:rmTags }),
        });
        const d = await r.json();
        if (!r.ok) throw new Error(d.error);
        const tagNote = d.stageTag ? ` · tag "${d.stageTag}" added` : '';
        setBulkMsg({type:'success',text:`Updated ${d.updated.length} order${d.updated.length!==1?'s':''}${tagNote}${d.failed.length?' · '+d.failed.length+' failed':''}`});
        clearSelect(); setBulkStage(''); setBulkAddTag(''); setBulkRmTag('');
        load();
      } catch(e) { setBulkMsg({type:'error',text:e.message}); }
      setBulkBusy(false);
    };

    const syncFulfillment = async () => {
      setSyncing(true); setSyncMsg(null);
      try {
        const r = await fetch(`${API}/admin/orders/sync-fulfillment`,{method:'POST',headers:{Authorization:`Bearer ${token}`}});
        const d = await r.json();
        if (!r.ok) throw new Error(d.error);
        setSyncMsg(`✓ Synced — ${d.updated} vendor stage${d.updated!==1?'s':''} updated from Shopify`);
        load();
      } catch(e) { setSyncMsg('⚠ ' + e.message); }
      setSyncing(false);
    };

    const orderMatchesStage = (o, s) =>
      s === 'all' || o.stage === s || Object.values(o.vendorStages||{}).includes(s);

    // Period-filtered base (used for tab counts too)
    const periodOrders = useMemo(()=>{
      if(!period || !period.from) return orders;
      const from = new Date(period.from+'T00:00:00');
      const to   = new Date(period.to+'T23:59:59');
      return orders.filter(o => { const d=new Date(o.date); return d>=from && d<=to; });
    },[orders,period]);

    const allVendorNames = useMemo(()=>{
      const s = new Set();
      orders.forEach(o=>(o.vendors||[]).forEach(v=>s.add(v)));
      return [...s].sort();
    },[orders]);

    const filtered = useMemo(()=>{
      let l=[...periodOrders];
      if(stage && stage!=='all') l=l.filter(o=>orderMatchesStage(o,stage));
      if(search.trim()){const q=search.toLowerCase(); l=l.filter(o=>o.id.toLowerCase().includes(q)||o.customer.toLowerCase().includes(q)||(o.vendors||[]).some(v=>v.toLowerCase().includes(q)));}
      if(filterVendor!=='all') l=l.filter(o=>(o.vendors||[]).includes(filterVendor));
      if(filterPayment==='prepaid') l=l.filter(o=>o.paymentType==='prepaid');
      if(filterPayment==='cod')     l=l.filter(o=>o.paymentType!=='prepaid' && !(o.advancePaid>0));
      if(filterPayment==='advance') l=l.filter(o=>o.advancePaid>0);
      return l;
    },[periodOrders,stage,search,filterVendor,filterPayment]);

    const pages = Math.max(1,Math.ceil(filtered.length/PER));
    const cur   = Math.min(page,pages);
    const rows  = filtered.slice((cur-1)*PER, cur*PER);

    const isMobile = window.innerWidth <= 768;

    const groupByDate = (list) => {
      const groups = []; let lastLabel = null;
      list.forEach(o => {
        const d = new Date(o.date);
        const today = new Date(); today.setHours(0,0,0,0);
        const yesterday = new Date(today); yesterday.setDate(today.getDate()-1);
        const label = d >= today ? 'Today' : d >= yesterday ? 'Yesterday' : d.toLocaleDateString('en-IN',{day:'numeric',month:'short'});
        if (label !== lastLabel) { groups.push({ label, orders:[] }); lastLabel = label; }
        groups[groups.length-1].orders.push(o);
      });
      return groups;
    };

    const stageColors = { new:'#6366f1',confirmed:'#3b82f6',ready:'#f59e0b',pickup:'#8b5cf6',transit:'#06b6d4',delivered:'#10b981',hold:'#f59e0b',rto:'#ef4444',cancelled:'#6b7280',partial:'#a78bfa' };

    const MobileOrderRow = ({ o }) => {
      const timeStr = new Date(o.date).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
      const stageColor = stageColors[o.stage||'new'] || '#6366f1';
      const isSelected = selected.has(o.shopifyId);
      const ds = o.deliveryStatus;
      const dsColor = ds==='Delivered'?'#10b981':ds&&/transit|shipped/i.test(ds)?'#06b6d4':ds&&/rto|return/i.test(ds)?'#ef4444':ds?'#f59e0b':'var(--text-muted)';
      return (
        <div style={{padding:'13px 14px',borderBottom:'1px solid var(--border)',display:'flex',gap:10,cursor:'pointer',background:isSelected?'rgba(99,102,241,0.08)':undefined}}
          onClick={e=>{ if(e.target.type==='checkbox') return; setModal(o); }}>
          <div style={{paddingTop:2}} onClick={e=>{ e.stopPropagation(); toggleSelect(o.shopifyId); }}>
            <input type="checkbox" style={{accentColor:'var(--indigo)',width:14,height:14,cursor:'pointer'}} checked={isSelected} onChange={()=>toggleSelect(o.shopifyId)}/>
          </div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:3}}>
              <span style={{fontSize:16,fontWeight:800,color:'var(--text)',letterSpacing:0.5}}>{o.id}</span>
              <span style={{fontSize:15,fontWeight:700,color:'var(--text)',flexShrink:0,marginLeft:8}}>{fmtCur(o.orderValue)}</span>
            </div>
            <div style={{fontSize:12,color:'var(--text-muted)',marginBottom:6}}>
              {o.customer||'Guest'} &bull; {timeStr}
              {(o.vendors||[]).length>0 && <span style={{marginLeft:6,color:'var(--indigo)',fontSize:11}}>{(o.vendors||[]).join(', ')}</span>}
            </div>
            <div style={{display:'flex',alignItems:'center',gap:5,flexWrap:'wrap'}}>
              <span style={{fontSize:11,fontWeight:700,padding:'2px 8px',borderRadius:20,background:`${stageColor}22`,color:stageColor,border:`1px solid ${stageColor}44`}}>
                {(o.stage||'new').charAt(0).toUpperCase()+(o.stage||'new').slice(1)}
              </span>
              <span style={{fontSize:11,padding:'2px 8px',borderRadius:20,
                background:o.paymentType==='prepaid'?'rgba(16,185,129,0.15)':'rgba(245,158,11,0.15)',
                color:o.paymentType==='prepaid'?'#10b981':'#f59e0b',
                border:`1px solid ${o.paymentType==='prepaid'?'rgba(16,185,129,0.3)':'rgba(245,158,11,0.3)'}`}}>
                {o.paymentType==='prepaid'?'Prepaid':'COD'}{o.advancePaid>0?` +₹${o.advancePaid} adv`:''}
              </span>
              {o.superHold && <SuperHoldBadge/>}
              <PenaltyTimer vendorPenalty={o.vendorPenalty||{}} vendorStages={o.vendorStages||{}}/>
              <PenaltyBadge triggered={Object.values(o.vendorPenalty||{}).some(p=>p.penaltyTriggered>0)} confirmedAmount={Object.values(o.confirmedPenalties||{}).reduce((s,v)=>s+v,0)}/>
            </div>
            {o.awb && <div style={{fontSize:10,color:dsColor,marginTop:4,fontWeight:600}}>{ds||'Dispatched'} · {o.awb}</div>}
            {Object.keys(o.vendorStages||{}).length>1 && (
              <div style={{display:'flex',gap:4,marginTop:5,flexWrap:'wrap'}}>
                {Object.entries(o.vendorStages).map(([v,s])=>(
                  <span key={v} style={{fontSize:10,padding:'1px 6px',borderRadius:10,background:`${stageColors[s]||'#888'}22`,color:stageColors[s]||'#888',border:`1px solid ${stageColors[s]||'#888'}44`}}>
                    {v.split(' ')[0]}: {s}
                  </span>
                ))}
              </div>
            )}
          </div>
        </div>
      );
    };

    return (
      <div className="page" style={{padding: isMobile?'0':undefined}}>

        {/* Sticky header: search + stage tabs */}
        <div style={{position: isMobile?'sticky':'static', top: isMobile?54:undefined, zIndex:50,
          background:'var(--bg-card)', borderBottom:'1px solid var(--border)',
          padding: isMobile?'10px 12px 8px':'0 0 12px'}}>
          <div style={{display:'flex',gap:8,marginBottom:8,alignItems:'center'}}>
            <div className="search-wrap" style={{flex:1}}>
              <span className="search-ico">⌕</span>
              <input className="search-input" placeholder="Search order, customer, vendor…" value={search} onChange={e=>{setSearch(e.target.value);setPage(1);}}/>
            </div>
            {!isMobile && <><PeriodPicker period={period} onChange={p=>{setPeriod(p);setPage(1);}}/>
              {period && <button className="btn btn-ghost btn-sm" onClick={()=>{setPeriod(null);setPage(1);}} style={{fontSize:10,padding:'4px 8px'}}>✕</button>}
              <button className="btn btn-ghost btn-sm" onClick={load} disabled={loading}>{loading?<span className="spin">↻</span>:'↻'} Refresh</button>
              <button className="btn btn-ghost btn-sm" onClick={syncFulfillment} disabled={syncing} style={{color:'var(--cyan)',borderColor:'var(--cyan)'}}>
                {syncing?<><span className="spin">↻</span> Syncing…</>:'⟳ Sync'}
              </button></>}
            {isMobile && <button className="btn btn-ghost btn-sm" onClick={load} disabled={loading} style={{flexShrink:0}}>{loading?<span className="spin">↻</span>:'↻'}</button>}
          </div>
          {/* Stage pills — horizontal scroll */}
          <div style={{display:'flex',gap:5,overflowX:'auto',WebkitOverflowScrolling:'touch',scrollbarWidth:'none',paddingBottom:2}}>
            {STAGES.map(s=>{
              const count = s.id==='all'?periodOrders.length:periodOrders.filter(o=>orderMatchesStage(o,s.id)).length;
              return (
                <button key={s.id} onClick={()=>{setStage(s.id);setPage(1);}} style={{
                  flexShrink:0,padding:'5px 11px',borderRadius:20,border:'none',cursor:'pointer',
                  fontSize:12,fontWeight:600,whiteSpace:'nowrap',fontFamily:'IBM Plex Mono,monospace',
                  background:stage===s.id?'var(--indigo)':'var(--bg-card2)',
                  color:stage===s.id?'#fff':'var(--text-muted)',transition:'all 0.15s',
                }}>
                  {s.label}{count>0?` (${count})`:''}
                </button>
              );
            })}
          </div>
          {/* Extra filters row */}
          <div style={{display:'flex',alignItems:'center',gap:8,marginTop:8,flexWrap:'wrap'}}>
            {/* Vendor filter */}
            <select style={{fontSize:11,padding:'4px 8px',background:'var(--bg-card2)',border:'1px solid var(--border)',borderRadius:6,color:filterVendor!=='all'?'var(--indigo)':'var(--text-muted)',fontFamily:'IBM Plex Mono,monospace',cursor:'pointer'}}
              value={filterVendor} onChange={e=>{setFilterVendor(e.target.value);setPage(1);}}>
              <option value="all">All Vendors</option>
              {allVendorNames.map(v=><option key={v} value={v}>{v}</option>)}
            </select>
            {/* Payment filter */}
            {['all','prepaid','cod','advance'].map(p=>(
              <button key={p} onClick={()=>{setFilterPayment(p);setPage(1);}} style={{
                padding:'4px 10px',borderRadius:20,border:'none',cursor:'pointer',
                fontSize:11,fontWeight:600,fontFamily:'IBM Plex Mono,monospace',
                background: filterPayment===p ? (p==='prepaid'?'#10b981':p==='cod'?'#f59e0b':p==='advance'?'#a78bfa':'var(--indigo)') : 'var(--bg-card2)',
                color: filterPayment===p ? (p==='all'?'#fff':'#000') : 'var(--text-muted)',
                transition:'all 0.15s',
              }}>
                {p==='all'?'All Payments':p==='prepaid'?'Prepaid':p==='cod'?'COD':'Advance'}
              </button>
            ))}
            {(filterVendor!=='all'||filterPayment!=='all') && (
              <button onClick={()=>{setFilterVendor('all');setFilterPayment('all');setPage(1);}} style={{fontSize:10,padding:'3px 8px',borderRadius:4,border:'1px solid var(--border)',background:'transparent',color:'var(--red)',cursor:'pointer'}}>✕ Clear</button>
            )}
            {!isMobile && <><span className="fcount" style={{marginLeft:'auto'}}>{filtered.length} order{filtered.length!==1?'s':''}</span>
            {syncMsg && <span style={{fontSize:10,color:syncMsg.startsWith('✓')?'var(--green)':'var(--red)',fontWeight:600}}>{syncMsg}</span>}
            <label style={{display:'flex',alignItems:'center',gap:6,cursor:'pointer',fontSize:11,color:'var(--text-muted)',userSelect:'none'}}>
              <input type="checkbox" checked={showTags} onChange={e=>setShowTags(e.target.checked)} style={{accentColor:'var(--indigo)',width:13,height:13}}/>Show Tags
            </label></>}
          </div>
        </div>

        {/* Bulk action bar */}
        {selected.size > 0 && (
          <div style={{position:'sticky',top: isMobile?108:54,zIndex:19,background:'#1a1a2e',border:'1px solid var(--indigo)',borderRadius: isMobile?0:8,padding:'10px 14px',marginBottom: isMobile?0:10,display:'flex',alignItems:'center',gap:8,flexWrap:'wrap',boxShadow:'0 4px 20px rgba(99,102,241,0.2)'}}>
            <span style={{fontSize:12,fontWeight:700,color:'var(--indigo)',whiteSpace:'nowrap'}}>{selected.size} selected</span>
            <select className="form-select" style={{fontSize:11,padding:'5px 8px',flex:'0 0 140px'}} value={bulkStage} onChange={e=>setBulkStage(e.target.value)}>
              <option value="">Set stage…</option>
              {['new','confirmed','partial','ready','pickup','transit','delivered','rto','hold','cancelled'].map(s=><option key={s} value={s}>{s}</option>)}
            </select>
            {!isMobile && <>
              <input className="form-input" style={{fontSize:11,padding:'5px 8px',flex:'1 1 130px',minWidth:100}} placeholder="Add tags" value={bulkAddTag} onChange={e=>setBulkAddTag(e.target.value)}/>
              <input className="form-input" style={{fontSize:11,padding:'5px 8px',flex:'1 1 130px',minWidth:100}} placeholder="Remove tags" value={bulkRmTag} onChange={e=>setBulkRmTag(e.target.value)}/>
            </>}
            <button className="btn btn-indigo btn-sm" onClick={applyBulk} disabled={bulkBusy}>{bulkBusy?<><span className="spin">↻</span> …</>:'✓ Apply'}</button>
            <button className="btn btn-ghost btn-sm" onClick={clearSelect}>✕</button>
            {bulkMsg && <span style={{fontSize:11,color:bulkMsg.type==='success'?'var(--green)':'var(--red)',fontWeight:600}}>{bulkMsg.type==='success'?'✓':'⚠'} {bulkMsg.text}</span>}
          </div>
        )}

        {/* Mobile list */}
        {isMobile ? (
          <div style={{background:'var(--bg-card)'}}>
            {loading ? Array.from({length:7}).map((_,i)=>(
              <div key={i} style={{padding:'14px',borderBottom:'1px solid var(--border)'}}>
                <div className="skel" style={{height:14,width:'35%',marginBottom:8}}/>
                <div className="skel" style={{height:11,width:'55%',marginBottom:8}}/>
                <div style={{display:'flex',gap:6}}><div className="skel" style={{height:20,width:70,borderRadius:20}}/><div className="skel" style={{height:20,width:50,borderRadius:20}}/></div>
              </div>
            )) : rows.length===0 ? (
              <div className="empty" style={{padding:40}}><div className="empty-icon">📦</div><div className="empty-title">No orders found</div></div>
            ) : groupByDate(rows).map(group=>(
              <div key={group.label}>
                <div style={{padding:'7px 14px',fontSize:11,fontWeight:700,color:'var(--text-muted)',letterSpacing:1,background:'var(--bg)',borderBottom:'1px solid var(--border)',textTransform:'uppercase'}}>{group.label}</div>
                {group.orders.map(o=><MobileOrderRow key={o.id} o={o}/>)}
              </div>
            ))}
            {!loading && filtered.length>PER && (
              <div style={{display:'flex',justifyContent:'space-between',padding:'14px',borderTop:'1px solid var(--border)'}}>
                <button className="btn btn-ghost btn-sm" onClick={()=>setPage(p=>Math.max(1,p-1))} disabled={cur===1}>‹ Prev</button>
                <span style={{fontSize:11,color:'var(--text-muted)',alignSelf:'center'}}>{cur} / {pages}</span>
                <button className="btn btn-ghost btn-sm" onClick={()=>setPage(p=>Math.min(pages,p+1))} disabled={cur===pages}>Next ›</button>
              </div>
            )}
          </div>
        ) : (
          /* Desktop table */
          <div className="card">
            <div className="tbl-wrap">
              <table>
                <thead><tr>
                  <th style={{width:32,paddingLeft:8}}>
                    <input type="checkbox" style={{accentColor:'var(--indigo)',width:13,height:13,cursor:'pointer'}}
                      checked={rows.length>0&&selected.size===rows.length}
                      ref={el=>{ if(el) el.indeterminate=selected.size>0&&selected.size<rows.length; }}
                      onChange={toggleAll}/>
                  </th>
                  <th>#</th><th>Order</th><th>Customer</th><th>Vendors</th>
                  <th>Value</th><th>Type</th><th>Advance</th><th>Stage</th><th>Delivery</th><th>Date</th><th/>
                </tr></thead>
                <tbody>
                  {loading ? Array.from({length:10}).map((_,i)=><SkelRow key={i} cols={12}/>) :
                   rows.length===0 ? <tr><td colSpan={12}><div className="empty"><div className="empty-icon">📦</div><div className="empty-title">No orders found</div></div></td></tr> :
                   rows.map((o,i)=>{
                     const ds=o.deliveryStatus; const isSelected=selected.has(o.shopifyId);
                     const dsColor=ds==='Delivered'?'#10b981':ds&&ds.toLowerCase().includes('transit')?'#06b6d4':ds&&(ds.toLowerCase().includes('rto')||ds.toLowerCase().includes('return'))?'#f87171':ds?'#fbbf24':'var(--text-muted)';
                     const anyPenaltyTriggered = Object.values(o.vendorPenalty||{}).some(p=>p.penaltyTriggered>0);
                     const totalConfirmedPenalty = Object.values(o.confirmedPenalties||{}).reduce((s,v)=>s+v,0);
                     return (
                       <tr key={o.id} style={{cursor:'pointer',background:isSelected?'rgba(99,102,241,0.07)':'',outline:isSelected?'1px solid rgba(99,102,241,0.3)':''}}
                         onClick={e=>{ if(e.target.type==='checkbox') return; setModal(o); }}>
                         <td style={{paddingLeft:8}} onClick={e=>{ e.stopPropagation(); toggleSelect(o.shopifyId); }}>
                           <input type="checkbox" style={{accentColor:'var(--indigo)',width:13,height:13,cursor:'pointer'}} checked={isSelected} onChange={()=>toggleSelect(o.shopifyId)}/>
                         </td>
                         <td className="td-mut">{(cur-1)*PER+i+1}</td>
                         <td><div className="td-id">{o.id}</div>{showTags && o.tags && o.tags.split(',').map(t=>t.trim()).filter(Boolean).map(t=>(<span key={t} style={{display:'inline-block',fontSize:9,padding:'1px 5px',borderRadius:3,background:'#1a2a3a',border:'1px solid #2a4a6a',color:'#6fa8d0',marginTop:2,marginRight:2}}>{t}</span>))}</td>
                         <td><div style={{display:'flex',alignItems:'center',gap:7}}><div style={{width:22,height:22,borderRadius:'50%',background:'var(--bg-card2)',border:'1px solid var(--border)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:8,fontWeight:700,color:'var(--indigo)',flexShrink:0}}>{(o.customer||'G').split(' ').map(x=>x[0]).join('').toUpperCase().slice(0,2)}</div><div><div style={{fontSize:12}}>{o.customer}</div>{o.email&&<div style={{fontSize:10,color:'var(--text-muted)'}}>{o.email}</div>}</div></div></td>
                         <td style={{color:'var(--text-dim)',fontSize:11,maxWidth:120,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{(o.vendors||[]).join(', ')||'—'}</td>
                         <td className="td-amt">{fmtCur(o.orderValue)}</td>
                         <td><span style={{fontSize:9,letterSpacing:1,textTransform:'uppercase',padding:'2px 7px',borderRadius:4,background:'var(--bg-card2)',border:'1px solid var(--border)',color:'var(--text-dim)'}}>{o.paymentType}</span></td>
                         <td style={{color:'var(--text-dim)'}}>{o.advancePaid>0?`₹${o.advancePaid}`:'—'}</td>
                         <td>
                           <div style={{display:'flex',alignItems:'center',gap:2,flexWrap:'wrap'}}><StageBadge stage={o.stage} vendorStages={o.vendorStages||{}}/>{o.superHold&&<SuperHoldBadge/>}<PenaltyTimer vendorPenalty={o.vendorPenalty||{}} vendorStages={o.vendorStages||{}}/><PenaltyBadge triggered={anyPenaltyTriggered} confirmedAmount={totalConfirmedPenalty}/></div>
                           {Object.keys(o.vendorStages||{}).length>1&&<div style={{marginTop:3,display:'flex',flexDirection:'column',gap:2}}>{Object.entries(o.vendorStages).map(([v,s])=>(<div key={v} style={{fontSize:9,color:'var(--text-muted)',display:'flex',alignItems:'center',gap:3}}><span style={{maxWidth:60,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{v.split(' ')[0]}</span><span className={`badge b-${s}`} style={{fontSize:8,padding:'1px 5px'}}>{s.toUpperCase()}</span>{(o.vendorPenalty||{})[v]&&['confirmed','partial'].includes(s)&&<PenaltyTimer vendorPenalty={{[v]:(o.vendorPenalty||{})[v]}} vendorStages={{[v]:s}}/>}</div>))}</div>}
                         </td>
                         <td>{o.awb?<div><div style={{fontSize:10,color:dsColor,fontWeight:600}}>{ds||'Dispatched'}</div><div style={{fontSize:9,color:'var(--text-muted)',fontFamily:'monospace'}}>{o.awb}</div></div>:<span style={{color:'var(--text-muted)',fontSize:11}}>—</span>}</td>
                         <td className="td-mut">{fmtDate(o.date)}</td>
                         <td style={{textAlign:'center',color:'var(--text-muted)',fontSize:11}}>✏</td>
                       </tr>
                     );
                   })}
                </tbody>
              </table>
            </div>
            {!loading && filtered.length>PER && (
              <div className="pager">
                <span className="pager-info">Showing {(cur-1)*PER+1}–{Math.min(cur*PER,filtered.length)} of {filtered.length}</span>
                <div className="pbtns">
                  <button className="pbtn" onClick={()=>setPage(p=>Math.max(1,p-1))} disabled={cur===1}>‹</button>
                  {Array.from({length:pages},(_,i)=>i+1).filter(p=>p===1||p===pages||Math.abs(p-cur)<=1).reduce((acc,p,i,arr)=>{ if(i>0&&arr[i-1]!==p-1)acc.push('…');acc.push(p);return acc; },[]).map((p,i)=>
                    p==='…'?<span key={`d${i}`} style={{color:'var(--text-muted)',padding:'0 4px',fontSize:12}}>…</span>:<button key={p} className={`pbtn ${cur===p?'cur':''}`} onClick={()=>setPage(p)}>{p}</button>
                  )}
                  <button className="pbtn" onClick={()=>setPage(p=>Math.min(pages,p+1))} disabled={cur===pages}>›</button>
                </div>
              </div>
            )}
          </div>
        )}

        {modal && <OrderModal order={modal} token={token} onClose={()=>setModal(null)} onUpdated={()=>{load();setModal(null);}}/>}
      </div>
    );
  }

  /* ══════════════════════════════════
     RETURN REQUESTS VIEW
  ══════════════════════════════════ */
  function ReturnRequests({ token }) {
    const [requests, setRequests] = useState([]);
    const [loading,  setLoading]  = useState(true);
    const [tab,      setTab]      = useState('all');
    const [expanded, setExpanded] = useState(null);
    const [noteVal,  setNoteVal]  = useState('');
    const [saving,   setSaving]   = useState(false);
    const [msg,      setMsg]      = useState(null);
    const [retCfgVendor, setRetCfgVendor] = useState(null);
    const [vendors,  setVendors]  = useState([]);

    const load = () => {
      setLoading(true);
      const q = tab !== 'all' ? `?status=${tab}` : '';
      fetch(`${API}/admin/return-requests${q}`, { headers:{ Authorization:`Bearer ${token}` } })
        .then(r=>r.json()).then(d=>setRequests(d.requests||[])).catch(()=>{}).finally(()=>setLoading(false));
    };
    useEffect(load, [tab]);
    useEffect(()=>{
      fetch(`${API}/admin/vendors`,{headers:{Authorization:`Bearer ${token}`}}).then(r=>r.json()).then(d=>setVendors(d.vendors||[])).catch(()=>{});
    },[]);

    const updateRequest = async (id, fields) => {
      setSaving(true); setMsg(null);
      try {
        const r = await fetch(`${API}/admin/return-requests/${id}`, {
          method:'PUT', headers:{'Content-Type':'application/json','Authorization':`Bearer ${token}`},
          body: JSON.stringify(fields),
        });
        if (!r.ok) throw new Error('Save failed');
        setMsg({type:'success',text:'Updated.'});
        load();
      } catch(e) { setMsg({type:'error',text:e.message}); }
      setSaving(false);
    };

    const TYPE_COLOR = { return:'var(--cyan)', exchange:'var(--green)' };
    const STATUS_COLOR = { pending:'var(--yellow)', approved:'var(--green)', rejected:'var(--red)', completed:'var(--teal)' };
    const TABS = ['all','pending','approved','rejected','completed'];

    return (
      <div className="page">
        {/* Tab bar */}
        <div style={{display:'flex',gap:6,marginBottom:14,flexWrap:'wrap'}}>
          {TABS.map(t=>(
            <button key={t} onClick={()=>setTab(t)} style={{
              padding:'5px 14px',borderRadius:99,border:'1px solid var(--border)',cursor:'pointer',
              background:tab===t?'var(--indigo-dim)':'var(--bg-card2)',
              color:tab===t?'var(--indigo)':'var(--text-muted)',
              fontFamily:'IBM Plex Mono,monospace',fontSize:11,fontWeight:tab===t?700:400,
              textTransform:'capitalize',
            }}>{t}</button>
          ))}
          <button onClick={()=>setRetCfgVendor(retCfgVendor?null:'__open')} style={{padding:'5px 14px',borderRadius:99,border:'1px solid var(--border)',cursor:'pointer',background:retCfgVendor?'var(--yellow-bg)':'var(--bg-card2)',color:retCfgVendor?'var(--yellow)':'var(--text-muted)',fontFamily:'IBM Plex Mono,monospace',fontSize:11,marginLeft:'auto'}}>
            ⚙ Vendor Return Config
          </button>
        </div>

        {/* Vendor return config panel */}
        {retCfgVendor && <VendorReturnConfigPanel token={token} vendors={vendors} onClose={()=>setRetCfgVendor(null)}/>}

        {msg && <div className={`alert alert-${msg.type}`}>{msg.type==='success'?'✓':'⚠'} {msg.text}</div>}

        <div className="card">
          <div className="card-header"><span className="card-title">Return & Exchange Requests</span></div>
          {loading ? <div style={{padding:24,textAlign:'center',color:'var(--text-muted)'}}><span className="spin">↻</span> Loading…</div> : (
            <div style={{overflowX:'auto'}}>
              {requests.length === 0 ? (
                <div style={{padding:32,textAlign:'center',color:'var(--text-muted)',fontSize:13}}>No requests found.</div>
              ) : (
                <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
                  <thead>
                    <tr style={{borderBottom:'1px solid var(--border)'}}>
                      {['Request ID','Order','Customer','Type','Items','Vendor','Status','Date','Actions'].map(h=>(
                        <th key={h} style={{padding:'8px 10px',textAlign:'left',fontSize:10,letterSpacing:1,color:'var(--text-muted)',textTransform:'uppercase',whiteSpace:'nowrap'}}>{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {requests.map(rq=>{
                      const isExp = expanded===rq.request_id;
                      return (
                        <React.Fragment key={rq.request_id}>
                          <tr style={{borderBottom:'1px solid var(--border)',background:isExp?'var(--bg-hover)':'',cursor:'pointer'}} onClick={()=>{ setExpanded(isExp?null:rq.request_id); setNoteVal(rq.admin_note||''); setMsg(null); }}>
                            <td style={{padding:'8px 10px',color:'var(--cyan)',fontWeight:700,whiteSpace:'nowrap'}}>{rq.request_id}</td>
                            <td style={{padding:'8px 10px',color:'var(--text)',whiteSpace:'nowrap'}}>{rq.order_name}</td>
                            <td style={{padding:'8px 10px',color:'var(--text-dim)',maxWidth:140,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{rq.customer_name||rq.customer_email}</td>
                            <td style={{padding:'8px 10px'}}><span style={{background:'var(--bg-card2)',border:`1px solid ${TYPE_COLOR[rq.type]||'var(--border)'}`,color:TYPE_COLOR[rq.type]||'var(--text)',borderRadius:99,padding:'2px 9px',fontSize:10,textTransform:'capitalize',fontWeight:700}}>{rq.type}</span></td>
                            <td style={{padding:'8px 10px',color:'var(--text-dim)'}}>{(rq.items||[]).length} item{rq.items?.length!==1?'s':''}</td>
                            <td style={{padding:'8px 10px',color:'var(--text-dim)',whiteSpace:'nowrap'}}>{rq.vendor_name||'—'}</td>
                            <td style={{padding:'8px 10px'}}><span style={{background:'var(--bg-card2)',border:`1px solid ${STATUS_COLOR[rq.status]||'var(--border)'}`,color:STATUS_COLOR[rq.status]||'var(--text)',borderRadius:99,padding:'2px 9px',fontSize:10,textTransform:'capitalize',fontWeight:700}}>{rq.status}</span></td>
                            <td style={{padding:'8px 10px',color:'var(--text-muted)',whiteSpace:'nowrap'}}>{rq.created_at?.split('T')[0]}</td>
                            <td style={{padding:'8px 10px'}} onClick={e=>e.stopPropagation()}>
                              <div style={{display:'flex',gap:4}}>
                                {rq.status==='pending'&&<><button onClick={()=>updateRequest(rq.request_id,{status:'approved'})} style={{padding:'3px 8px',borderRadius:6,border:'1px solid var(--green)',background:'var(--green-dim)',color:'var(--green)',cursor:'pointer',fontFamily:'IBM Plex Mono,monospace',fontSize:10}} disabled={saving}>✓</button><button onClick={()=>updateRequest(rq.request_id,{status:'rejected'})} style={{padding:'3px 8px',borderRadius:6,border:'1px solid var(--red)',background:'var(--red-bg)',color:'var(--red)',cursor:'pointer',fontFamily:'IBM Plex Mono,monospace',fontSize:10}} disabled={saving}>✗</button></>}
                                {rq.status==='approved'&&<button onClick={()=>updateRequest(rq.request_id,{status:'completed'})} style={{padding:'3px 8px',borderRadius:6,border:'1px solid var(--teal)',background:'#042f2e',color:'var(--teal)',cursor:'pointer',fontFamily:'IBM Plex Mono,monospace',fontSize:10}} disabled={saving}>Done</button>}
                              </div>
                            </td>
                          </tr>
                          {isExp && (
                            <tr><td colSpan={9} style={{background:'var(--bg-hover)',padding:0}}>
                              <div style={{padding:'14px 16px'}}>
                                <div style={{display:'flex',gap:24,flexWrap:'wrap',marginBottom:12}}>
                                  <div><span style={{fontSize:10,color:'var(--text-muted)',letterSpacing:1}}>CUSTOMER</span><div style={{fontSize:12,color:'var(--text)',marginTop:3}}>{rq.customer_name} · {rq.customer_email} {rq.customer_phone?`· ${rq.customer_phone}`:''}</div></div>
                                  <div><span style={{fontSize:10,color:'var(--text-muted)',letterSpacing:1}}>REASON</span><div style={{fontSize:12,color:'var(--text)',marginTop:3}}>{rq.reason}</div></div>
                                </div>
                                <div style={{display:'flex',flexDirection:'column',gap:6,marginBottom:12}}>
                                  {(rq.items||[]).map((it,i)=>(
                                    <div key={i} style={{background:'var(--bg-card2)',border:'1px solid var(--border)',borderRadius:6,padding:'8px 12px',fontSize:12,display:'flex',justifyContent:'space-between',gap:12,flexWrap:'wrap'}}>
                                      <span style={{color:'var(--text)'}}>{it.title}{it.variant_title?` · ${it.variant_title}`:''} × {it.qty}</span>
                                      {it.exchange_size_label&&<span style={{color:'var(--green)'}}>→ {it.exchange_size_label}</span>}
                                      <span style={{color:'var(--text-muted)'}}>₹{it.price}</span>
                                    </div>
                                  ))}
                                </div>
                                {rq.vendor_note&&<div style={{fontSize:11,color:'var(--text-muted)',marginBottom:10}}>Vendor note: <span style={{color:'var(--yellow)'}}>{rq.vendor_note}</span></div>}
                                <div style={{marginBottom:6,fontSize:10,color:'var(--text-muted)',letterSpacing:1,textTransform:'uppercase'}}>Admin Note</div>
                                <textarea
                                  style={{width:'100%',maxWidth:480,background:'var(--bg-card2)',border:'1px solid var(--border)',borderRadius:6,padding:'8px 10px',color:'var(--text)',fontFamily:'IBM Plex Mono,monospace',fontSize:12,minHeight:60,outline:'none',resize:'vertical'}}
                                  placeholder="Internal note…"
                                  value={noteVal}
                                  onChange={e=>setNoteVal(e.target.value)}
                                />
                                <button className="btn btn-primary" style={{marginTop:8,fontSize:11,padding:'7px 16px',background:'var(--indigo)',color:'#fff',border:'none',borderRadius:7,cursor:'pointer',fontFamily:'IBM Plex Mono,monospace',fontWeight:700}} onClick={()=>updateRequest(rq.request_id,{admin_note:noteVal})} disabled={saving}>
                                  {saving?<><span className="spin">↻</span> Saving…</>:'Save Note'}
                                </button>
                              </div>
                            </td></tr>
                          )}
                        </React.Fragment>
                      );
                    })}
                  </tbody>
                </table>
              )}
            </div>
          )}
        </div>
      </div>
    );
  }

  function VendorReturnConfigPanel({ token, vendors, onClose }) {
    const [selectedVendor, setSelectedVendor] = useState(vendors[0]||'');
    const EMPTY = { exchange_enabled:true, return_enabled:true, return_window_days:7, return_address:{name:'',address1:'',city:'',state:'',pincode:'',phone:''} };
    const [cfg,     setCfg]    = useState(EMPTY);
    const [loading, setLoading]= useState(false);
    const [saving,  setSaving] = useState(false);
    const [msg,     setMsg]    = useState(null);

    const loadCfg = async (v) => {
      if (!v) return;
      setLoading(true); setMsg(null);
      try {
        const r = await fetch(`${API}/admin/vendors/${encodeURIComponent(v)}/return-config`,{headers:{Authorization:`Bearer ${token}`}});
        const d = await r.json();
        if (d.config) setCfg({...EMPTY,...d.config,return_address:{...EMPTY.return_address,...(d.config.return_address||{})}});
      } catch {}
      setLoading(false);
    };
    useEffect(()=>{ if(selectedVendor) loadCfg(selectedVendor); },[selectedVendor]);

    const updAddr = (k,v) => setCfg(p=>({...p,return_address:{...p.return_address,[k]:v}}));

    const save = async () => {
      setSaving(true); setMsg(null);
      try {
        const r = await fetch(`${API}/admin/vendors/${encodeURIComponent(selectedVendor)}/return-config`,{
          method:'PUT', headers:{'Content-Type':'application/json','Authorization':`Bearer ${token}`},
          body: JSON.stringify(cfg),
        });
        if(!r.ok) throw new Error('Save failed');
        setMsg({type:'success',text:'Saved.'});
      } catch(e){ setMsg({type:'error',text:e.message}); }
      setSaving(false);
    };

    return (
      <div className="card" style={{marginBottom:16}}>
        <div className="card-header" style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <span className="card-title">Vendor Return Config</span>
          <button onClick={onClose} style={{background:'none',border:'none',cursor:'pointer',color:'var(--text-muted)',fontSize:16}}>✕</button>
        </div>
        <div style={{padding:16}}>
          <div style={{marginBottom:14}}>
            <label className="field-label">Select Vendor</label>
            <select style={{width:'100%',maxWidth:260,background:'var(--bg-card2)',border:'1px solid var(--border)',borderRadius:7,padding:'8px 12px',color:'var(--text)',fontFamily:'IBM Plex Mono,monospace',fontSize:12,outline:'none'}} value={selectedVendor} onChange={e=>setSelectedVendor(e.target.value)}>
              {vendors.map(v=><option key={v} value={v}>{v}</option>)}
            </select>
          </div>
          {loading ? <div style={{color:'var(--text-muted)',fontSize:12}}><span className="spin">↻</span> Loading…</div> : (
            <>
              {msg && <div className={`alert alert-${msg.type}`} style={{marginBottom:12}}>{msg.type==='success'?'✓':'⚠'} {msg.text}</div>}
              <div style={{display:'flex',gap:24,flexWrap:'wrap',marginBottom:14}}>
                <div style={{display:'flex',alignItems:'center',gap:10}}>
                  <span style={{fontSize:12,color:'var(--text)'}}>Exchange</span>
                  <div style={{width:42,height:24,borderRadius:12,background:'var(--green)',border:'1px solid var(--green)',display:'flex',alignItems:'center',padding:'0 3px',cursor:'not-allowed',opacity:0.7}}>
                    <div style={{width:18,height:18,borderRadius:50,background:'#000',marginLeft:'auto'}}/>
                  </div>
                  <span style={{fontSize:10,color:'var(--text-muted)'}}>Always on</span>
                </div>
                <div style={{display:'flex',alignItems:'center',gap:10}}>
                  <span style={{fontSize:12,color:'var(--text)'}}>Returns</span>
                  <div onClick={()=>setCfg(p=>({...p,return_enabled:!p.return_enabled}))} style={{width:42,height:24,borderRadius:12,background:cfg.return_enabled?'var(--green)':'var(--border)',border:'1px solid '+(cfg.return_enabled?'var(--green)':'var(--border)'),display:'flex',alignItems:'center',padding:'0 3px',cursor:'pointer',transition:'all 0.2s'}}>
                    <div style={{width:18,height:18,borderRadius:50,background:'#000',marginLeft:cfg.return_enabled?'auto':'0',transition:'margin 0.2s'}}/>
                  </div>
                  <span style={{fontSize:10,color:'var(--text-muted)'}}>{cfg.return_enabled?'Enabled':'Disabled'}</span>
                </div>
                <div style={{display:'flex',alignItems:'center',gap:8}}>
                  <span style={{fontSize:12,color:'var(--text)'}}>Window</span>
                  <input type="number" min={1} max={90} style={{width:60,background:'var(--bg-card2)',border:'1px solid var(--border)',borderRadius:6,padding:'5px 8px',color:'var(--text)',fontFamily:'IBM Plex Mono,monospace',fontSize:12,outline:'none',textAlign:'center'}} value={cfg.return_window_days} onChange={e=>setCfg(p=>({...p,return_window_days:parseInt(e.target.value)||7}))}/>
                  <span style={{fontSize:11,color:'var(--text-muted)'}}>days</span>
                </div>
              </div>
              <div style={{fontSize:10,letterSpacing:1,textTransform:'uppercase',color:'var(--text-muted)',marginBottom:8}}>Return Address</div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,maxWidth:480}}>
                {[{k:'name',l:'Contact Name'},{k:'address1',l:'Address Line 1',full:true},{k:'city',l:'City'},{k:'state',l:'State'},{k:'pincode',l:'Pincode'},{k:'phone',l:'Phone'}].map(f=>(
                  <div key={f.k} style={f.full?{gridColumn:'1/-1'}:{}}>
                    <label className="field-label">{f.l}</label>
                    <input className="field-input" type="text" value={cfg.return_address?.[f.k]||''} onChange={e=>updAddr(f.k,e.target.value)}/>
                  </div>
                ))}
              </div>
              <button onClick={save} disabled={saving} style={{marginTop:14,padding:'8px 20px',borderRadius:7,border:'none',background:'var(--indigo)',color:'#fff',fontFamily:'IBM Plex Mono,monospace',fontSize:12,fontWeight:700,cursor:'pointer',display:'flex',alignItems:'center',gap:6}}>
                {saving?<><span className="spin">↻</span> Saving…</>:'✓ Save Config'}
              </button>
            </>
          )}
        </div>
      </div>
    );
  }

  /* ══════════════════════════════════
     VENDORS VIEW
  ══════════════════════════════════ */
  function Vendors({ token }) {
    const [vendors,  setVendors]  = useState([]);
    const [loading,  setLoading]  = useState(true);
    const [editing,  setEditing]  = useState(null);
    const [commVal,  setCommVal]  = useState('');
    const [saving,   setSaving]   = useState(false);
    const [search,   setSearch]   = useState('');
    const [creds,    setCreds]    = useState([]);
    const [generating, setGenerating] = useState(false);
    const [sending,    setSending]    = useState(false);
    const [genResult,  setGenResult]  = useState(null);
    const [resetting,     setResetting]     = useState({});
    const [impersonating, setImpersonating] = useState({});
    const [credMsg,       setCredMsg]       = useState(null);
    const [showPass,      setShowPass]      = useState({});

    const load = ()=>{
      setLoading(true);
      fetch(`${API}/admin/vendors`,{headers:{Authorization:`Bearer ${token}`}})
        .then(r=>r.json()).then(d=>setVendors(d.vendors||[])).catch(()=>{}).finally(()=>setLoading(false));
    };

    const loadCreds = ()=>{
      fetch(`${API}/admin/vendors/credentials`,{headers:{Authorization:`Bearer ${token}`}})
        .then(r=>r.json()).then(d=>setCreds(d.credentials||[])).catch(()=>{});
    };

    useEffect(()=>{ load(); loadCreds(); },[token]);

    const generateCreds = async () => {
      setGenerating(true); setGenResult(null); setCredMsg(null);
      const r = await fetch(`${API}/admin/vendors/generate-credentials`,{method:'POST',headers:{Authorization:`Bearer ${token}`}});
      const d = await r.json();
      setGenerating(false);
      if (d.success) { setGenResult(d.generated); loadCreds(); setCredMsg({type:'success',text:`Generated credentials for ${d.total} vendor${d.total!==1?'s':''}.`}); }
      else setCredMsg({type:'error',text:d.error});
    };

    const sendCredentials = async () => {
      setSending(true); setCredMsg(null);
      const r = await fetch(`${API}/admin/vendors/send-credentials`,{method:'POST',headers:{Authorization:`Bearer ${token}`}});
      const d = await r.json();
      setSending(false);
      if (d.success) setCredMsg({type:'success', text:`Sent to ${d.sent.length} vendor${d.sent.length!==1?'s':''}${d.failed.length?' · '+d.failed.length+' failed':''}`});
      else setCredMsg({type:'error', text: d.error});
    };

    const resetPassword = async name => {
      setResetting(p=>({...p,[name]:true}));
      const r = await fetch(`${API}/admin/vendors/${encodeURIComponent(name)}/reset-password`,{method:'POST',headers:{Authorization:`Bearer ${token}`}});
      const d = await r.json();
      setResetting(p=>({...p,[name]:false}));
      setCredMsg({type: d.success?'success':'error', text: d.success?`Password reset for ${name}`:(d.error||'Error')});
      loadCreds();
    };

    const openAsVendor = async name => {
