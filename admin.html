      setImpersonating(p=>({...p,[name]:true}));
      try {
        const r = await fetch(`${API}/admin/vendors/${encodeURIComponent(name)}/impersonate`,{method:'POST',headers:{Authorization:`Bearer ${token}`}});
        const d = await r.json();
        if (!r.ok) throw new Error(d.error);
        window.open(`/vendor.html?token=${d.token}`, '_blank');
      } catch(e) { setCredMsg({type:'error',text:e.message}); }
      setImpersonating(p=>({...p,[name]:false}));
    };

    const visible = search ? vendors.filter(v=>v.name.toLowerCase().includes(search.toLowerCase())) : vendors;

    const startEdit = v => { setEditing(v.name); setCommVal(String(v.commission_pct)); };

    const saveComm = async name => {
      setSaving(true);
      await fetch(`${API}/admin/vendors/${encodeURIComponent(name)}/config`,{
        method:'PUT', headers:{'Content-Type':'application/json','Authorization':`Bearer ${token}`},
        body: JSON.stringify({ commission_pct: parseFloat(commVal)||20 }),
      }).catch(()=>{});
      setSaving(false); setEditing(null); load();
    };

    return (
      <div className="page">
        <div className="filters">
          <div className="search-wrap">
            <span className="search-ico">⌕</span>
            <input className="search-input" placeholder="Search vendor…" value={search} onChange={e=>setSearch(e.target.value)}/>
          </div>
          <button className="btn btn-ghost btn-sm" onClick={load} disabled={loading}>{loading?<span className="spin">↻</span>:'↻'} Refresh</button>
          <span className="fcount">{visible.length} vendor{visible.length!==1?'s':''}</span>
        </div>

        <div className="card">
          <div className="card-header"><span className="card-title">Vendors & Commission</span></div>
          <div className="tbl-wrap">
            <table>
              <thead><tr><th>#</th><th>Vendor / Brand</th><th>Commission %</th><th>GST on Commission</th><th>Actions</th></tr></thead>
              <tbody>
                {loading ? Array.from({length:8}).map((_,i)=><SkelRow key={i} cols={5}/>) :
                 visible.length===0 ? (
                   <tr><td colSpan={5}><div className="empty"><div className="empty-icon">🏪</div><div className="empty-title">No vendors found</div></div></td></tr>
                 ) :
                 visible.map((v,i)=>(
                  <tr key={v.name}>
                    <td className="td-mut">{i+1}</td>
                    <td style={{fontWeight:600,color:'var(--text)'}}>{v.name}</td>
                    <td>
                      {editing===v.name ? (
                        <div style={{display:'flex',gap:6,alignItems:'center'}}>
                          <input className="form-input" style={{width:70,padding:'5px 8px'}} type="number" min="0" max="50" step="0.5"
                            value={commVal} onChange={e=>setCommVal(e.target.value)}
                            onKeyDown={e=>e.key==='Enter'&&saveComm(v.name)}
                            autoFocus/>
                          <button className="btn btn-green btn-sm" disabled={saving} onClick={()=>saveComm(v.name)}>Save</button>
                          <button className="btn btn-ghost btn-sm" onClick={()=>setEditing(null)}>✕</button>
                        </div>
                      ) : (
                        <span style={{color:'var(--indigo)',fontWeight:700}}>{v.commission_pct}%</span>
                      )}
                    </td>
                    <td style={{color:'var(--orange)'}}>{(v.commission_pct * 0.18).toFixed(2)}% effective</td>
                    <td>
                      {editing!==v.name && (
                        <button className="btn btn-ghost btn-sm" onClick={()=>startEdit(v)}>✏ Edit Commission</button>
                      )}
                    </td>
                  </tr>
                 ))}
              </tbody>
            </table>
          </div>
        </div>

        <div className="card" style={{background:'var(--indigo-dim)',borderColor:'#3730a3'}}>
          <div style={{padding:16}}>
            <div style={{fontSize:11,color:'var(--indigo)',fontWeight:700,marginBottom:8}}>Commission Logic</div>
            <div style={{fontSize:11,color:'var(--text-dim)',lineHeight:1.7}}>
              <div><strong>COD:</strong> Commission% × Order Value + 18% GST = Vendor Invoice (vendor pays CrosCrow)</div>
              <div><strong>Prepaid:</strong> 10% vendor discount → commission on discounted price. CrosCrow collected full → pays vendor (value − commission − GST)</div>
              <div><strong>Partial:</strong> COD logic, but advance collected is deducted from final payable</div>
              <div><strong>Shipping:</strong> Retained 100% by CrosCrow, commission applies only on product value</div>
            </div>
          </div>
        </div>

        {/* ── Vendor Credentials ── */}
        <div className="card" style={{marginTop:0}}>
          <div className="card-header">
            <div><span className="card-title">🔑 Vendor Login Credentials</span><span className="card-sub" style={{marginLeft:8}}>Username + password per vendor · default: Croscrow@00</span></div>
            <div style={{display:'flex',gap:8}}>
              <button className="btn btn-indigo btn-sm" onClick={generateCreds} disabled={generating}>
                {generating?<><span className="spin">↻</span> Generating…</>:'⚡ Generate for All Vendors'}
              </button>
              <button className="btn btn-green btn-sm" onClick={sendCredentials} disabled={sending||creds.length===0}
                style={{background:'var(--green)',color:'#fff',border:'none'}} title="Send welcome email with credentials to all vendors who have email set">
                {sending?<><span className="spin">↻</span> Sending…</>:'📧 Send Welcome Email'}
              </button>
            </div>
          </div>
          {credMsg && <div style={{margin:'0 16px 12px'}} className={`alert alert-${credMsg.type}`}>{credMsg.type==='success'?'✓':'⚠'} {credMsg.text}</div>}
          {genResult && genResult.length > 0 && (
            <div style={{margin:'0 16px 12px',background:'#052e16',border:'1px solid #10b981',borderRadius:8,padding:14}}>
              <div style={{fontSize:12,fontWeight:700,color:'#10b981',marginBottom:10}}>✓ New credentials generated — share with vendors:</div>
              {genResult.map(g=>(
                <div key={g.vendor_name} style={{display:'flex',gap:12,alignItems:'center',fontSize:12,marginBottom:6,padding:'6px 10px',background:'#0a1a0a',borderRadius:6}}>
                  <span style={{color:'var(--text-muted)',minWidth:140,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{g.vendor_name}</span>
                  <span style={{color:'#a5b4fc',fontFamily:'monospace',fontWeight:700}}>{g.username}</span>
                  <span style={{color:'var(--text-muted)'}}>/</span>
                  <span style={{color:'#fbbf24',fontFamily:'monospace'}}>{g.password}</span>
                </div>
              ))}
            </div>
          )}
          <div className="tbl-wrap">
            <table>
              <thead><tr><th>#</th><th>Vendor</th><th>Username</th><th>Status</th><th>Actions</th></tr></thead>
              <tbody>
                {creds.length===0 ? (
                  <tr><td colSpan={5}><div className="empty"><div className="empty-icon">🔑</div>
                    <div className="empty-title">No credentials yet</div>
                    <div style={{fontSize:11,color:'var(--text-muted)'}}>Click "Generate for All Vendors" to create usernames for every vendor.</div>
                  </div></td></tr>
                ) : creds.map((c,i)=>(
                  <tr key={c.vendor_name}>
                    <td className="td-mut">{i+1}</td>
                    <td style={{fontWeight:600}}>{c.vendor_name}</td>
                    <td>
                      <div style={{display:'flex',alignItems:'center',gap:6}}>
                        <span style={{fontFamily:'monospace',color:'#a5b4fc',fontSize:12}}>{c.username}</span>
                        <button onClick={()=>navigator.clipboard?.writeText(c.username)} title="Copy username"
                          style={{background:'none',border:'none',cursor:'pointer',fontSize:11,color:'var(--text-muted)',padding:'1px 4px'}}>⎘</button>
                      </div>
                    </td>
                    <td>
                      {c.must_change_password
                        ? <span style={{fontSize:10,padding:'2px 8px',borderRadius:10,background:'#1c1208',color:'#f59e0b',border:'1px solid #92400e',fontWeight:700}}>⚠ Default password</span>
                        : <span style={{fontSize:10,padding:'2px 8px',borderRadius:10,background:'#052e16',color:'#10b981',border:'1px solid #065f46',fontWeight:700}}>✓ Password set</span>}
                    </td>
                    <td>
                      <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
                        <button className="btn btn-ghost btn-sm" disabled={!!resetting[c.vendor_name]} onClick={()=>resetPassword(c.vendor_name)}>
                          {resetting[c.vendor_name]?'…':'↺ Reset Password'}
                        </button>
                        <button className="btn btn-sm" disabled={!!impersonating[c.vendor_name]}
                          onClick={()=>openAsVendor(c.vendor_name)}
                          style={{background:'var(--indigo)',color:'#fff',border:'none'}}>
                          {impersonating[c.vendor_name]?'…':'↗ Open as Vendor'}
                        </button>
                      </div>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      </div>
    );
  }

  /* ══════════════════════════════════

  /* ── Edit Settlement Modal ── */
  function EditSettlementModal({ settlement: init, token, onClose, onSaved }) {
    const [commPct,      setCommPct]      = useState(String(init.custom_commission_pct || ''));
    const [discount,     setDiscount]     = useState(String(init.extra_discount     || ''));
    const [shipping,     setShipping]     = useState(String(init.shipping_adjustment || ''));
    const [extraAdv,     setExtraAdv]     = useState(String(init.extra_advance       || ''));
    const [notes,        setNotes]        = useState(init.invoice_notes || '');
    const [saving,       setSaving]       = useState(false);
    const [msg,          setMsg]          = useState(null);
    const [preview,      setPreview]      = useState(null); // { netPayable, commission, gst }

    // Live preview
    useEffect(()=>{
      const disc  = parseFloat(discount)||0;
      const ship  = parseFloat(shipping)||0;
      const adv   = parseFloat(extraAdv)||0;
      const baseNet = init.net_payable
        + (init.extra_discount||0)
        + (init.extra_advance||0)
        - (init.shipping_adjustment||0);
      const adjusted = parseFloat((baseNet - disc - adv + ship).toFixed(2));
      setPreview({ netPayable: adjusted });
    },[discount, shipping, extraAdv]);

    const save = async () => {
      setSaving(true); setMsg(null);
      try {
        const body = {
          extra_discount:      parseFloat(discount)||0,
          shipping_adjustment: parseFloat(shipping)||0,
          extra_advance:       parseFloat(extraAdv)||0,
          invoice_notes:       notes,
        };
        if (commPct.trim()) body.custom_commission_pct = parseFloat(commPct);
        const r = await fetch(`${API}/admin/settlements/${init.id}/edit`,{
          method:'PUT', headers:{'Content-Type':'application/json','Authorization':`Bearer ${token}`},
          body: JSON.stringify(body),
        });
        const d = await r.json();
        if (!r.ok) throw new Error(d.error);
        setMsg({ type:'success', text:`Saved — New net: ${d.netPayable<0?'CrosCrow pays':'Vendor pays'} ₹${Math.abs(d.netPayable).toFixed(2)}` });
        onSaved();
      } catch(e) { setMsg({ type:'error', text: e.message }); }
      setSaving(false);
    };

    const isCredit = (preview?.netPayable ?? init.net_payable) < 0;

    return (
      <div className="overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
        <div className="modal">
          <div className="modal-header">
            <div>
              <div className="modal-title">Edit Invoice — {init.invoice_no}</div>
              <div style={{fontSize:10,color:'var(--text-muted)',marginTop:3}}>{init.vendor_name} · {fmtDate(init.period_start)} – {fmtDate(init.period_end)}</div>
            </div>
            <button className="modal-close" onClick={onClose}>✕</button>
          </div>

          <div className="modal-body">
            {msg && <div className={`alert alert-${msg.type}`}>{msg.type==='success'?'✓':'⚠'} {msg.text}</div>}

            <div style={{background:'var(--bg-card2)',border:'1px solid var(--border)',borderRadius:8,padding:14,marginBottom:16}}>
              <div className="detail-box-title" style={{marginBottom:12}}>Current Figures</div>
              <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:10,textAlign:'center',fontSize:11}}>
                <div><div style={{color:'var(--text-muted)',fontSize:9,marginBottom:3}}>Orders</div><div style={{fontWeight:700}}>{init.total_orders}</div></div>
                <div><div style={{color:'var(--text-muted)',fontSize:9,marginBottom:3}}>Gross Revenue</div><div style={{color:'var(--cyan)',fontWeight:700}}>{fmtCur(init.gross_revenue)}</div></div>
                <div><div style={{color:'var(--text-muted)',fontSize:9,marginBottom:3}}>Commission</div><div style={{color:'var(--yellow)',fontWeight:700}}>{fmtCur(init.commission)}</div></div>
                <div><div style={{color:'var(--text-muted)',fontSize:9,marginBottom:3}}>GST (18%)</div><div style={{color:'var(--orange)',fontWeight:700}}>{fmtCur(init.gst_amount)}</div></div>
              </div>
            </div>

            <div className="form-grid">
              <div>
                <label className="form-label">Commission % Override</label>
                <input className="form-input" type="number" min="0" max="50" step="0.5" placeholder={`Current: ${init.custom_commission_pct||20}% — blank = no change`} value={commPct} onChange={e=>setCommPct(e.target.value)}/>
                <div style={{fontSize:10,color:'var(--text-muted)',marginTop:4}}>Recalculates all order commissions</div>
              </div>
              <div>
                <label className="form-label">Extra Discount (₹)</label>
                <input className="form-input" type="number" min="0" placeholder="0" value={discount} onChange={e=>setDiscount(e.target.value)}/>
                <div style={{fontSize:10,color:'var(--text-muted)',marginTop:4}}>Reduces vendor's payable / increases CrosCrow's payout</div>
              </div>
              <div>
                <label className="form-label">Shipping Charge Adjustment (₹)</label>
                <input className="form-input" type="number" placeholder="0 (positive adds, negative deducts)" value={shipping} onChange={e=>setShipping(e.target.value)}/>
                <div style={{fontSize:10,color:'var(--text-muted)',marginTop:4}}>Shipping is CrosCrow's — positive = vendor owes more</div>
              </div>
              <div>
                <label className="form-label">Additional Advance / Partial (₹)</label>
                <input className="form-input" type="number" min="0" placeholder="0" value={extraAdv} onChange={e=>setExtraAdv(e.target.value)}/>
                <div style={{fontSize:10,color:'var(--text-muted)',marginTop:4}}>Deducted from net payable (already collected)</div>
              </div>
              <div className="form-full">
                <label className="form-label">Invoice Notes (printed on invoice)</label>
                <input className="form-input" placeholder="e.g. Includes return deduction, special discount applied…" value={notes} onChange={e=>setNotes(e.target.value)}/>
              </div>
            </div>

            {/* Live preview */}
            {preview && (
              <div style={{background: isCredit?'var(--green-dim)':'var(--red-bg)', border:`1px solid ${isCredit?'#1a4731':'#5a1a1a'}`, borderRadius:8, padding:14, marginTop:16, textAlign:'center'}}>
                <div style={{fontSize:9,letterSpacing:2,textTransform:'uppercase',color:'var(--text-muted)',marginBottom:6}}>Adjusted Net Payable</div>
                <div style={{fontSize:24,fontWeight:800,color:isCredit?'var(--green)':'var(--red)'}}>
                  {isCredit?'↑':'↓'} ₹{Math.abs(preview.netPayable).toFixed(2)}
                </div>
                <div style={{fontSize:11,color:'var(--text-muted)',marginTop:4}}>{isCredit?'CrosCrow pays vendor':'Vendor pays CrosCrow'}</div>
              </div>
            )}
          </div>

          <div className="modal-footer">
            <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
            <button className="btn btn-indigo" onClick={save} disabled={saving}>
              {saving ? <><span className="spin">↻</span> Saving…</> : '✓ Save Changes'}
            </button>
          </div>
        </div>
      </div>
    );
  }

  function Settlements({ token }) {
    const [activeTab,   setActiveTab]   = useState('delivered'); // 'delivered' | 'invoices'
    // ── Tab 1: Delivered Orders (real-time) ───────────────────────────────
    const [summary,     setSummary]     = useState(null);
    const [sumLoading,  setSumLoading]  = useState(true);
    const [expandedV,   setExpandedV]   = useState(null);
    const [expandedVFilter, setExpandedVFilter] = useState({}); // { vendorName: 'all'|'unsettled'|'invoiced'|'paid' }
    const [sumPeriod,   setSumPeriod]   = useState(null); // null = all time
    // ── Tab 2: Settlement Invoices ─────────────────────────────────────────
    const [settlements, setSettlements] = useState([]);
    const [invLoading,  setInvLoading]  = useState(true);
    const [vendors,     setVendors]     = useState([]);
    const [generating,  setGenerating]  = useState(false);
    const [genVendor,   setGenVendor]   = useState('');
    const [genStart,    setGenStart]    = useState('');
    const [genEnd,      setGenEnd]      = useState('');
    const [calOpen,     setCalOpen]     = useState(false);
    const [calMonth,    setCalMonth]    = useState(()=>{ const d=new Date(); return {y:d.getFullYear(),m:d.getMonth()}; });
    const [calSel,      setCalSel]      = useState(null); // 'start'|'end'
    const [genMsg,      setGenMsg]      = useState(null);
    const [invoice,     setInvoice]     = useState(null);
    const [editing,     setEditing]     = useState(null);
    const [confirmDel,  setConfirmDel]  = useState(null);
    const [gstFrom,     setGstFrom]     = useState('');
    const [gstTo,       setGstTo]       = useState('');
    const [gstLoading,  setGstLoading]  = useState(false);
    const [gstMsg,      setGstMsg]      = useState(null);

    const loadSummary = (period) => {
      setSumLoading(true);
      const p = period !== undefined ? period : sumPeriod;
      const qs = p ? `?from=${p.from}&to=${p.to}` : '';
      fetch(`${API}/admin/delivered-summary${qs}`,{headers:{Authorization:`Bearer ${token}`}})
        .then(r=>r.json()).then(d=>setSummary(d)).catch(()=>{}).finally(()=>setSumLoading(false));
    };

    const loadInvoices = () => {
      setInvLoading(true);
      Promise.all([
        fetch(`${API}/admin/settlements`,{headers:{Authorization:`Bearer ${token}`}}).then(r=>r.json()),
        fetch(`${API}/admin/vendors`,    {headers:{Authorization:`Bearer ${token}`}}).then(r=>r.json()),
      ]).then(([sd, vd])=>{ setSettlements(sd.settlements||[]); setVendors(vd.vendors||[]); }).catch(()=>{}).finally(()=>setInvLoading(false));
    };

    useEffect(()=>{ loadSummary(); loadInvoices(); },[token]);

    const generate = async () => {
      if(!genVendor||!genStart||!genEnd) { setGenMsg({type:'error',text:'All fields required.'}); return; }
      setGenerating(true); setGenMsg(null);
      try {
        const r = await fetch(`${API}/admin/settlements/generate`,{
          method:'POST', headers:{'Content-Type':'application/json','Authorization':`Bearer ${token}`},
          body: JSON.stringify({ vendor_name: genVendor, period_start: genStart, period_end: genEnd }),
        });
        const d = await r.json();
        if (!r.ok) throw new Error(d.error);
        setGenMsg({ type:'success', text:`Invoice generated! ${d.totalOrders} orders — Net: ₹${Math.abs(d.netPayable).toFixed(2)}` });
        loadInvoices();
      } catch(e) { setGenMsg({ type:'error', text: e.message }); }
      setGenerating(false);
    };

    const markPaid = async id => {
      await fetch(`${API}/admin/settlements/${id}/mark-paid`,{method:'PUT',headers:{Authorization:`Bearer ${token}`}});
      loadInvoices(); loadSummary();
    };

    const deleteSett = async id => {
      await fetch(`${API}/admin/settlements/${id}`,{method:'DELETE',headers:{Authorization:`Bearer ${token}`}});
      setConfirmDel(null); loadInvoices(); loadSummary();
    };

    const viewInvoice = async id => {
      const r = await fetch(`${API}/admin/settlements/${id}`,{headers:{Authorization:`Bearer ${token}`}});
      const d = await r.json();
      setInvoice(d);
    };

    const exportGst = async () => {
      if (!gstFrom || !gstTo) { setGstMsg({ type:'error', text:'Select both From and To dates.' }); return; }
      setGstLoading(true); setGstMsg(null);
      try {
        const url = `${API}/admin/settlements/gst-export?from=${gstFrom}&to=${gstTo}`;
        const r = await fetch(url, { headers:{ Authorization:`Bearer ${token}` } });
        if (!r.ok) { const d = await r.json(); throw new Error(d.error); }
        const blob = await r.blob();
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `CrosCrow_GST_${gstFrom}_to_${gstTo}.csv`;
        a.click();
        URL.revokeObjectURL(a.href);
        setGstMsg({ type:'success', text:'GST sheet downloaded!' });
      } catch(e) { setGstMsg({ type:'error', text: e.message }); }
      setGstLoading(false);
    };

    const t = summary?.totals || {};
    const fmt = n => `₹${Math.abs(n||0).toFixed(2)}`;

    return (
      <div className="page">
        {/* Tab switcher */}
        <div style={{display:'flex',gap:0,marginBottom:20,borderBottom:'2px solid var(--border)'}}>
          {[['delivered','📦 Delivered Orders'],['invoices','🧾 Settlement Invoices']].map(([id,label])=>(
            <button key={id} onClick={()=>setActiveTab(id)}
              style={{padding:'9px 22px',fontSize:12,fontWeight:600,border:'none',background:'transparent',cursor:'pointer',
                color:activeTab===id?'var(--indigo)':'var(--text-muted)',
                borderBottom:activeTab===id?'2px solid var(--indigo)':'2px solid transparent',
                marginBottom:'-2px',transition:'all 0.15s'}}>
              {label}
            </button>
          ))}
        </div>

        {/* ── TAB 1: Delivered Orders ────────────────────────────────────────── */}
        {activeTab==='delivered' && (
          <div>
            {/* Period filter bar */}
            {(()=>{
              const isoToday = () => new Date().toISOString().split('T')[0];
              const daysAgo  = n => new Date(Date.now()-n*86400000).toISOString().split('T')[0];
              const monthStart = (offset=0) => { const d=new Date(); d.setMonth(d.getMonth()-offset,1); return d.toISOString().split('T')[0]; };
              const monthEnd   = (offset=0) => { const d=new Date(); d.setMonth(d.getMonth()-offset+1,0); return d.toISOString().split('T')[0]; };
              const PRESETS = [
                { label:'All Time',    period: null },
                { label:'Last 7 Days', period: { from: daysAgo(6),      to: isoToday() } },
                { label:'Last 30 Days',period: { from: daysAgo(29),     to: isoToday() } },
                { label:'This Month',  period: { from: monthStart(0),   to: isoToday() } },
                { label:'Last Month',  period: { from: monthStart(1),   to: monthEnd(1) } },
              ];
              const activeLbl = sumPeriod
                ? (PRESETS.find(p=>p.period&&p.period.from===sumPeriod.from&&p.period.to===sumPeriod.to)?.label || 'Custom')
                : 'All Time';
              const applyPeriod = p => { setSumPeriod(p); loadSummary(p); };
              return (
                <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:16,flexWrap:'wrap'}}>
                  <span style={{fontSize:11,color:'var(--text-muted)',fontWeight:600,letterSpacing:1}}>PERIOD:</span>
                  {PRESETS.map(ps=>(
                    <button key={ps.label} onClick={()=>applyPeriod(ps.period)}
                      className={`btn btn-sm ${activeLbl===ps.label?'btn-indigo':'btn-ghost'}`}
                      style={{fontSize:11,padding:'4px 10px'}}>
                      {ps.label}
                    </button>
                  ))}
                  {/* Custom date range */}
                  <input className="form-input" type="date" style={{fontSize:11,padding:'4px 8px',width:130}}
                    value={sumPeriod?.from||''} onChange={e=>{ const p={from:e.target.value,to:sumPeriod?.to||isoToday()}; setSumPeriod(p); loadSummary(p); }}
                    placeholder="From"/>
                  <input className="form-input" type="date" style={{fontSize:11,padding:'4px 8px',width:130}}
                    value={sumPeriod?.to||''} onChange={e=>{ const p={from:sumPeriod?.from||daysAgo(29),to:e.target.value}; setSumPeriod(p); loadSummary(p); }}
                    placeholder="To"/>
                  <button className="btn btn-ghost btn-sm" onClick={()=>loadSummary(sumPeriod)} style={{fontSize:11}} disabled={sumLoading}>
                    {sumLoading?<span className="spin">↻</span>:'↻'}
                  </button>
                  {sumPeriod && <span style={{fontSize:10,color:'var(--text-muted)'}}>{sumPeriod.from} → {sumPeriod.to}</span>}
                </div>
              );
            })()}

            {/* Summary stat cards */}
            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(160px,1fr))',gap:12,marginBottom:20}}>
              {[
                {label:'Gross Sales',              value:fmt(t.gross),              color:'indigo'},
                {label:'Prepaid Discount',         value:fmt(t.prepaidDiscount),    color:'yellow'},
                {label:'Commissionable',           value:fmt(t.commissionableSale), color:'text'},
                {label:'Commission',               value:fmt(t.commission),         color:'orange'},
                {label:'GST (18%)',                value:fmt(t.gst),                color:'orange'},
                {label:'Advance Adjusted',         value:fmt(t.advance),            color:'green'},
                {label:'Prepaid Collected by CC',  value:fmt(t.prepaidCollected),   color:'cyan'},
                {label:'COD Commission Due to CC', value:fmt(t.codCommission),      color:'yellow'},
                {label:'Total Settled',            value:fmt(t.totalSettled),       color:'green'},
                {label:'Pending Settlement',       value:fmt(t.pendingSettlement),  color: (t.pendingSettlement||0)<0?'green':'red'},
              ].map(c=>(
                <div key={c.label} className="card" style={{padding:'12px 14px'}}>
                  <div style={{fontSize:9,color:'var(--text-muted)',textTransform:'uppercase',letterSpacing:1,marginBottom:4}}>{c.label}</div>
                  <div style={{fontSize:17,fontWeight:700,color:`var(--${c.color})`}}>{sumLoading?'…':c.value}</div>
                </div>
              ))}
            </div>

            {/* Per-vendor table */}
            <div className="card">
              <div className="card-header">
                <span className="card-title">Per-Vendor Breakdown</span>
                <button className="btn btn-ghost btn-sm" onClick={loadSummary}>↻ Refresh</button>
              </div>
              <div className="tbl-wrap">
                <table>
                  <thead><tr>
                    <th>Vendor</th><th>Orders</th><th>Gross Sales</th><th>Prepaid Disc</th>
                    <th>Commissionable</th><th>Comm%</th><th>Commission</th><th>GST</th>
                    <th>Advance</th><th>Prepaid (CC)</th><th>COD Comm (CC)</th>
                    <th style={{color:'#ef4444'}}>Penalties</th>
                    <th>Net Payable</th><th>Settled</th><th>Pending</th>
                  </tr></thead>
                  <tbody>
                    {sumLoading ? Array.from({length:5}).map((_,i)=><SkelRow key={i} cols={12}/>) :
                     !summary?.vendors?.length ? (
                       <tr><td colSpan={15}><div className="empty"><div className="empty-icon">📦</div><div className="empty-title">No delivered orders found</div><div className="empty-sub">Orders marked as Delivered will appear here automatically.</div></div></td></tr>
                     ) :
                     summary.vendors.map(v=>{
                       const isPayout = v.netPayable < 0;
                       const isPend   = v.pendingSettlement < 0;
                       const isExp    = expandedV === v.vendor;
                       return (
                         <React.Fragment key={v.vendor}>
                           <tr style={{cursor:'pointer'}} onClick={()=>setExpandedV(isExp?null:v.vendor)}>
                             <td style={{fontWeight:600}}>
                               <span style={{marginRight:6,fontSize:10,color:'var(--text-muted)'}}>{isExp?'▼':'▶'}</span>
                               {v.vendor}
                             </td>
                             <td>{v.totalOrders}</td>
                             <td>₹{v.gross.toFixed(2)}</td>
                             <td style={{color:'var(--yellow)'}}>{v.prepaidDiscount>0?`₹${v.prepaidDiscount.toFixed(2)}`:'—'}</td>
                             <td>₹{v.commissionableSale.toFixed(2)}</td>
                             <td style={{color:'var(--indigo)'}}>{v.commissionPct}%</td>
                             <td style={{color:'var(--orange)'}}>₹{v.commission.toFixed(2)}</td>
                             <td style={{color:'var(--orange)'}}>₹{v.gst.toFixed(2)}</td>
                             <td style={{color:'var(--green)'}}>{v.advance>0?`₹${v.advance.toFixed(2)}`:'—'}</td>
                             <td style={{color:'var(--cyan)',fontSize:11}}>{v.prepaidCollected>0?`₹${v.prepaidCollected.toFixed(2)}`:'—'}</td>
                             <td style={{color:'var(--yellow)',fontSize:11}}>{v.codCommission>0?`₹${v.codCommission.toFixed(2)}`:'—'}</td>
                             <td style={{color:'#ef4444',fontWeight:600}}>{v.pendingPenalty>0?`₹${v.pendingPenalty.toFixed(2)}`:'—'}</td>
                             <td>
                               <span style={{color:isPayout?'var(--green)':'var(--red)',fontWeight:700}}>
                                 {isPayout?'↑ ':'↓ '}₹{Math.abs(v.netPayable).toFixed(2)}
                               </span>
                               <div style={{fontSize:9,color:'var(--text-muted)',marginTop:1}}>{isPayout?'CC pays':'Vendor pays'}</div>
                             </td>
                             <td style={{color:'var(--green)'}}>₹{v.totalSettled.toFixed(2)}</td>
                             <td>
                               <span style={{color:isPend?'var(--green)':'var(--red)',fontWeight:600}}>
                                 {isPend?'↑ ':'↓ '}₹{Math.abs(v.pendingSettlement).toFixed(2)}
                               </span>
                             </td>
                           </tr>
                           {isExp && (()=>{
                             const vf = expandedVFilter[v.vendor] || 'all';
                             const setVf = f => setExpandedVFilter(prev=>({...prev,[v.vendor]:f}));
                             const allOrds = v.ordersList || [];
                             const filtered = vf==='all' ? allOrds
                               : vf==='unsettled' ? allOrds.filter(o=>!o.invoiceNo)
                               : vf==='invoiced'  ? allOrds.filter(o=>o.invoiceNo && o.invoiceStatus!=='paid')
                               : allOrds.filter(o=>o.invoiceStatus==='paid');
                             const unsettledCount = allOrds.filter(o=>!o.invoiceNo).length;
                             const invoicedCount  = allOrds.filter(o=>o.invoiceNo && o.invoiceStatus!=='paid').length;
                             const paidCount      = allOrds.filter(o=>o.invoiceStatus==='paid').length;
                             return (
                             <tr>
                               <td colSpan={15} style={{padding:0,background:'var(--bg)'}}>
                                 <div style={{padding:'10px 16px 14px'}}>
                                   {/* Header + filter tabs */}
                                   <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10,flexWrap:'wrap',gap:8}}>
                                     <div style={{fontSize:11,fontWeight:600,color:'var(--text-muted)',letterSpacing:'0.05em',textTransform:'uppercase'}}>
                                       Delivered Orders — {v.vendor}
                                     </div>
                                     <div style={{display:'flex',gap:4}}>
                                       {[
                                         {key:'all',      label:`All (${allOrds.length})`},
                                         {key:'unsettled',label:`⚪ Unsettled (${unsettledCount})`},
                                         {key:'invoiced', label:`🟡 Invoiced (${invoicedCount})`},
                                         {key:'paid',     label:`🟢 Settled (${paidCount})`},
                                       ].map(tab=>(
                                         <button key={tab.key} onClick={e=>{e.stopPropagation();setVf(tab.key);}}
                                           style={{fontSize:10,padding:'3px 9px',borderRadius:4,border:'1px solid var(--border)',cursor:'pointer',
                                             background:vf===tab.key?'var(--indigo)':'transparent',
                                             color:vf===tab.key?'#fff':'var(--text-muted)',fontWeight:vf===tab.key?600:400}}>
                                           {tab.label}
                                         </button>
                                       ))}
                                     </div>
                                   </div>
                                   <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
                                     <thead>
                                       <tr style={{color:'var(--text-muted)',fontSize:10,borderBottom:'1px solid var(--border)'}}>
                                         <th style={{textAlign:'left',padding:'4px 8px',fontWeight:500}}>Order</th>
                                         <th style={{textAlign:'left',padding:'4px 8px',fontWeight:500}}>Customer</th>
                                         <th style={{textAlign:'left',padding:'4px 8px',fontWeight:500}}>Date</th>
                                         <th style={{textAlign:'left',padding:'4px 8px',fontWeight:500}}>Payment</th>
                                         <th style={{textAlign:'left',padding:'4px 8px',fontWeight:500}}>Status</th>
                                         <th style={{textAlign:'left',padding:'4px 8px',fontWeight:500}}>Items</th>
                                         <th style={{textAlign:'right',padding:'4px 8px',fontWeight:500}}>Revenue</th>
                                       </tr>
                                     </thead>
                                     <tbody>
                                       {filtered.length===0 ? (
                                         <tr><td colSpan={7} style={{padding:'12px 8px',textAlign:'center',color:'var(--text-muted)',fontSize:11}}>No orders in this filter</td></tr>
                                       ) : filtered.map(ord=>(
                                         <tr key={ord.orderId} style={{borderBottom:'1px solid var(--border)'}}>
                                           <td style={{padding:'6px 8px',fontWeight:600,color:'var(--indigo)'}}>{ord.orderName}</td>
                                           <td style={{padding:'6px 8px',color:'var(--text)'}}>{ord.customer||'—'}</td>
                                           <td style={{padding:'6px 8px',color:'var(--text-muted)',fontSize:11}}>{ord.createdAt?new Date(ord.createdAt).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'}):'—'}</td>
                                           <td style={{padding:'6px 8px'}}>
                                             <span style={{fontSize:10,padding:'2px 6px',borderRadius:4,background:ord.paymentType==='prepaid'?'rgba(99,102,241,0.15)':ord.paymentType==='advance'?'rgba(245,158,11,0.15)':'rgba(16,185,129,0.15)',color:ord.paymentType==='prepaid'?'var(--indigo)':ord.paymentType==='advance'?'var(--yellow)':'var(--green)'}}>
                                               {ord.paymentType==='prepaid'?'Prepaid':ord.paymentType==='advance'?'Advance':'COD'}
                                             </span>
                                           </td>
                                           <td style={{padding:'6px 8px'}}>
                                             {ord.invoiceStatus==='paid' ? (
                                               <span style={{fontSize:10,padding:'2px 7px',borderRadius:4,background:'rgba(16,185,129,0.15)',color:'var(--green)',fontWeight:600}}>✓ Settled · {ord.invoiceNo}</span>
                                             ) : ord.invoiceNo ? (
                                               <span style={{fontSize:10,padding:'2px 7px',borderRadius:4,background:'rgba(245,158,11,0.15)',color:'var(--yellow)',fontWeight:600}}>🧾 {ord.invoiceNo}</span>
                                             ) : (
                                               <span style={{fontSize:10,padding:'2px 7px',borderRadius:4,background:'var(--surface)',color:'var(--text-muted)'}}>Not invoiced</span>
                                             )}
                                           </td>
                                           <td style={{padding:'6px 8px',color:'var(--text-muted)',fontSize:11,maxWidth:200,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{(ord.items||[]).join(', ')}</td>
                                           <td style={{padding:'6px 8px',textAlign:'right',fontWeight:600}}>₹{(ord.revenue||0).toFixed(2)}</td>
                                         </tr>
                                       ))}
                                     </tbody>
                                   </table>
                                 </div>
                               </td>
                             </tr>
                             );
                           })()}
                         </React.Fragment>
                       );
                     })}
                  </tbody>
                </table>
              </div>
            </div>

            <div style={{marginTop:10,fontSize:10,color:'var(--text-muted)',textAlign:'center'}}>
              Live calculation from all delivered orders. Totals update when order stages change.
              To generate an invoice, switch to the Settlement Invoices tab.
            </div>
          </div>
        )}

        {/* ── TAB 2: Settlement Invoices ─────────────────────────────────────── */}
        {activeTab==='invoices' && (
          <div>
            {/* GST Export panel */}
            <div className="card" style={{marginBottom:16,borderLeft:'3px solid var(--green)'}}>
              <div className="card-header">
                <span className="card-title">📊 Generate GST Excel Sheet</span>
                <span className="card-sub">All vendors · CA-ready format · Downloads as CSV (open in Excel)</span>
              </div>
              <div style={{padding:16}}>
                {gstMsg && <div className={`alert alert-${gstMsg.type}`}>{gstMsg.type==='success'?'✓':'⚠'} {gstMsg.text}</div>}
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr auto',gap:12,alignItems:'end'}}>
                  <div>
                    <label className="form-label">Period From</label>
                    <input className="form-input" type="date" value={gstFrom} onChange={e=>setGstFrom(e.target.value)}/>
                  </div>
                  <div>
                    <label className="form-label">Period To</label>
                    <input className="form-input" type="date" value={gstTo} onChange={e=>setGstTo(e.target.value)}/>
                  </div>
                  <button className="btn btn-green" onClick={exportGst} disabled={gstLoading||!gstFrom||!gstTo}
                    style={{background:'var(--green)',color:'#fff',border:'none'}}>
                    {gstLoading ? <><span className="spin">↻</span> Exporting…</> : '⬇ Download GST Sheet'}
                  </button>
                </div>
                <div style={{marginTop:10,fontSize:10,color:'var(--text-muted)',lineHeight:1.6}}>
                  Columns: Date · Invoice No · Vendor · GST No · Location · Total Sales · Vendor Discount · Commissionable Sales · Commission · Shipping · CrosCrow Discount · Subtotal · HSN · IGST/SGST/CGST · Total GST · Total with GST
                </div>
              </div>
            </div>

            {/* Generate panel */}
            <div className="card" style={{marginBottom:16}}>
              <div className="card-header"><span className="card-title">Generate Invoice</span><span className="card-sub">Locks delivered orders into a formal settlement invoice</span></div>
              <div style={{padding:16}}>
                {genMsg && <div className={`alert alert-${genMsg.type}`}>{genMsg.type==='success'?'✓':'⚠'} {genMsg.text}</div>}
                <div style={{display:'grid',gridTemplateColumns:'2fr 1fr auto',gap:12,alignItems:'end',marginBottom:12}}>
                  <div>
                    <label className="form-label">Vendor</label>
                    <select className="form-select" value={genVendor} onChange={e=>setGenVendor(e.target.value)}>
                      <option value="">Select vendor…</option>
                      {vendors.map(v=><option key={v.name} value={v.name}>{v.name}</option>)}
                    </select>
                  </div>
                  {/* Date range display + calendar toggle */}
                  <div style={{position:'relative'}}>
                    <label className="form-label">Period</label>
                    <button type="button" onClick={()=>setCalOpen(o=>!o)}
                      style={{width:'100%',textAlign:'left',padding:'8px 10px',borderRadius:6,border:'1px solid var(--border)',background:'var(--bg-card)',color:genStart&&genEnd?'var(--text)':'var(--text-muted)',fontSize:12,cursor:'pointer',display:'flex',alignItems:'center',gap:6}}>
                      📅 {genStart&&genEnd ? `${genStart} → ${genEnd}` : 'Select date range…'}
                    </button>
                    {calOpen && (()=>{
                      const {y,m} = calMonth;
                      const firstDay = new Date(y,m,1).getDay();
                      const daysInMonth = new Date(y,m+1,0).getDate();
                      const pad = n => String(n).padStart(2,'0');
                      const toStr = d => `${y}-${pad(m+1)}-${pad(d)}`;
                      const isSel = d => { const s=toStr(d); return s===genStart||s===genEnd; };
                      const inRange = d => { const s=toStr(d); return genStart&&genEnd&&s>genStart&&s<genEnd; };
                      const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
                      const prevMonth = () => setCalMonth(({y,m}) => m===0?{y:y-1,m:11}:{y,m:m-1});
                      const nextMonth = () => setCalMonth(({y,m}) => m===11?{y:y+1,m:0}:{y,m:m+1});
                      const clickDay = d => {
                        const s = toStr(d);
                        if (!genStart || (genStart && genEnd) || s < genStart) { setGenStart(s); setGenEnd(''); }
                        else { setGenEnd(s); setCalOpen(false); }
                      };
                      const quickSet = (start,end) => { setGenStart(start); setGenEnd(end); setCalOpen(false); };
                      const lastMonth = () => { const d=new Date(y,m,0); const f=new Date(d.getFullYear(),d.getMonth(),1); quickSet(`${f.getFullYear()}-${pad(f.getMonth()+1)}-01`,`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`); };
                      const thisMonth = () => { const now=new Date(); const last=new Date(now.getFullYear(),now.getMonth()+1,0); quickSet(`${now.getFullYear()}-${pad(now.getMonth()+1)}-01`,`${last.getFullYear()}-${pad(last.getMonth()+1)}-${pad(last.getDate())}`); };
                      const last30 = () => { const e=new Date(); const s=new Date(); s.setDate(s.getDate()-29); quickSet(`${s.getFullYear()}-${pad(s.getMonth()+1)}-${pad(s.getDate())}`,`${e.getFullYear()}-${pad(e.getMonth()+1)}-${pad(e.getDate())}`); };
                      return (
                        <div style={{position:'absolute',top:'calc(100% + 4px)',left:0,zIndex:9999,background:'#0d1f2d',border:'1px solid var(--border)',borderRadius:10,padding:14,boxShadow:'0 12px 40px #000a',minWidth:290}}>
                          {/* Quick presets */}
                          <div style={{display:'flex',gap:5,marginBottom:10,flexWrap:'wrap'}}>
                            {[['This Month',thisMonth],['Last Month',lastMonth],['Last 30 Days',last30]].map(([l,fn])=>(
                              <button key={l} onClick={fn} style={{fontSize:10,padding:'3px 8px',borderRadius:4,border:'1px solid var(--border)',background:'var(--bg-card2)',color:'var(--text-muted)',cursor:'pointer'}}>{l}</button>
                            ))}
                          </div>
                          {/* Month nav */}
                          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8}}>
                            <button onClick={prevMonth} style={{background:'none',border:'none',color:'var(--text-muted)',cursor:'pointer',fontSize:16,padding:'0 4px'}}>‹</button>
                            <span style={{fontSize:13,fontWeight:700,color:'var(--text)'}}>{monthNames[m]} {y}</span>
                            <button onClick={nextMonth} style={{background:'none',border:'none',color:'var(--text-muted)',cursor:'pointer',fontSize:16,padding:'0 4px'}}>›</button>
                          </div>
                          {/* Day headers */}
                          <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:2,marginBottom:4}}>
                            {['Su','Mo','Tu','We','Th','Fr','Sa'].map(d=>(
                              <div key={d} style={{textAlign:'center',fontSize:9,color:'var(--text-muted)',fontWeight:600,padding:'2px 0'}}>{d}</div>
                            ))}
                          </div>
                          {/* Days grid */}
                          <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:2}}>
                            {Array.from({length:firstDay}).map((_,i)=><div key={`e${i}`}/>)}
                            {Array.from({length:daysInMonth},(_,i)=>i+1).map(d=>{
                              const sel=isSel(d), rng=inRange(d);
                              return (
                                <button key={d} onClick={()=>clickDay(d)}
                                  style={{padding:'5px 2px',textAlign:'center',fontSize:11,borderRadius:4,border:'none',cursor:'pointer',fontWeight:sel?700:400,
                                    background:sel?'var(--indigo)':rng?'rgba(99,102,241,0.15)':'transparent',
                                    color:sel?'#fff':rng?'var(--indigo)':'var(--text)'}}>
                                  {d}
                                </button>
                              );
                            })}
                          </div>
                          {/* Manual text entry */}
                          <div style={{marginTop:12,borderTop:'1px solid var(--border)',paddingTop:10}}>
                            <div style={{fontSize:10,color:'var(--text-muted)',marginBottom:6}}>Manual entry (YYYY-MM-DD)</div>
                            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6}}>
                              <div>
                                <label style={{fontSize:9,color:'var(--text-muted)',display:'block',marginBottom:2}}>From</label>
                                <input type="date" value={genStart} onChange={e=>setGenStart(e.target.value)}
                                  style={{width:'100%',background:'var(--bg-card)',border:'1px solid var(--border)',borderRadius:5,color:'var(--text)',padding:'4px 6px',fontSize:11}}/>
                              </div>
                              <div>
                                <label style={{fontSize:9,color:'var(--text-muted)',display:'block',marginBottom:2}}>To</label>
                                <input type="date" value={genEnd} onChange={e=>setGenEnd(e.target.value)}
                                  style={{width:'100%',background:'var(--bg-card)',border:'1px solid var(--border)',borderRadius:5,color:'var(--text)',padding:'4px 6px',fontSize:11}}/>
                              </div>
                            </div>
                            {genStart&&genEnd&&<button onClick={()=>setCalOpen(false)} style={{marginTop:8,width:'100%',padding:'5px',borderRadius:5,border:'none',background:'var(--indigo)',color:'#fff',fontWeight:700,fontSize:11,cursor:'pointer'}}>Apply →</button>}
                          </div>
                        </div>
                      );
                    })()}
                  </div>
                  <button className="btn btn-indigo" onClick={generate} disabled={generating||!genVendor||!genStart||!genEnd} style={{alignSelf:'end'}}>
                    {generating ? <><span className="spin">↻</span> Generating…</> : '⬡ Generate'}
                  </button>
                </div>
              </div>
            </div>

            <div className="card">
              <div className="card-header"><span className="card-title">All Invoices</span><button className="btn btn-ghost btn-sm" onClick={loadInvoices}>↻ Refresh</button></div>
              <div className="tbl-wrap">
                <table>
                  <thead><tr><th>Invoice No</th><th>Vendor</th><th>Period</th><th>Orders</th><th>Commission</th><th>GST</th><th>Adjustments</th><th>Net Payable</th><th>Status</th><th>Actions</th></tr></thead>
                  <tbody>
                    {invLoading ? Array.from({length:6}).map((_,i)=><SkelRow key={i} cols={10}/>) :
                     settlements.length===0 ? (
                       <tr><td colSpan={10}><div className="empty"><div className="empty-icon">🧾</div><div className="empty-title">No invoices yet</div><div style={{fontSize:11,color:'var(--text-muted)'}}>Generate your first invoice above.</div></div></td></tr>
                     ) :
                     settlements.map(s=>{
                       const isCredit = s.net_payable < 0;
                       const hasAdj   = (s.extra_discount||0)+(s.shipping_adjustment||0)+(s.extra_advance||0) !== 0;
                       return (
                        <tr key={s.id}>
                          <td>
                            <div className="td-id" style={{fontFamily:'monospace',fontSize:10}}>{s.invoice_no}</div>
                            {s.custom_commission_pct && <div style={{fontSize:9,color:'var(--indigo)',marginTop:2}}>Comm: {s.custom_commission_pct}%</div>}
                          </td>
                          <td style={{fontWeight:600}}>{s.vendor_name}</td>
                          <td className="td-mut">{fmtDate(s.period_start)} – {fmtDate(s.period_end)}</td>
                          <td>{s.total_orders}</td>
                          <td style={{color:'var(--yellow)'}}>₹{(s.commission||0).toFixed(2)}</td>
                          <td style={{color:'var(--orange)'}}>₹{(s.gst_amount||0).toFixed(2)}</td>
                          <td style={{fontSize:10,color:'var(--text-muted)'}}>
                            {(hasAdj||(s.penalty_deduction||0)>0) ? (
                              <div style={{display:'flex',flexDirection:'column',gap:2}}>
                                {(s.extra_discount||0)>0     && <span style={{color:'var(--green)'}}>− Disc ₹{s.extra_discount.toFixed(2)}</span>}
                                {(s.extra_advance||0)>0      && <span style={{color:'var(--green)'}}>− Adv ₹{s.extra_advance.toFixed(2)}</span>}
                                {(s.shipping_adjustment||0)!==0 && <span style={{color:'var(--orange)'}}>± Ship ₹{s.shipping_adjustment.toFixed(2)}</span>}
                                {(s.penalty_deduction||0)>0  && <span style={{color:'#ef4444',fontWeight:700}}>⚠ Penalty ₹{s.penalty_deduction.toFixed(2)}</span>}
                              </div>
                            ) : <span style={{color:'var(--border-hi)'}}>—</span>}
                          </td>
                          <td>
                            <span style={{color:isCredit?'var(--green)':'var(--red)',fontWeight:700}}>
                              {isCredit?'↑ ':'↓ '}₹{Math.abs(s.net_payable||0).toFixed(2)}
                            </span>
                            <div style={{fontSize:9,color:'var(--text-muted)',marginTop:2}}>{isCredit?'CrosCrow pays':'Vendor pays'}</div>
                          </td>
                          <td><span className={`badge b-${s.status}`}><span className="bdot"/>{s.status.toUpperCase()}</span></td>
                          <td>
                            <div style={{display:'flex',gap:5,flexWrap:'wrap'}}>
                              <button className="btn btn-ghost btn-sm" onClick={()=>viewInvoice(s.id)}>⎙</button>
                              {s.status==='pending' && <>
                                <button className="btn btn-ghost btn-sm" onClick={()=>setEditing(s)}>✏</button>
                                <button className="btn btn-green btn-sm" onClick={()=>markPaid(s.id)}>✓ Paid</button>
                                <button className="btn btn-danger btn-sm" onClick={()=>setConfirmDel(s.id)}>✕</button>
                              </>}
                            </div>
                          </td>
                        </tr>
                       );
                     })}
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        )}

        {/* Delete confirm */}
        {confirmDel && (
          <div className="overlay" onClick={e=>e.target===e.currentTarget&&setConfirmDel(null)}>
            <div className="modal" style={{maxWidth:400,marginTop:120}}>
              <div className="modal-header"><div className="modal-title">Delete Invoice?</div></div>
              <div className="modal-body">
                <p style={{fontSize:12,color:'var(--text-dim)',lineHeight:1.7}}>This will permanently delete the invoice, all its order records, and any wallet transactions linked to it. This cannot be undone.</p>
              </div>
              <div className="modal-footer">
                <button className="btn btn-ghost" onClick={()=>setConfirmDel(null)}>Cancel</button>
                <button className="btn btn-danger" onClick={()=>deleteSett(confirmDel)}>Delete Permanently</button>
              </div>
            </div>
          </div>
        )}

        {editing && <EditSettlementModal settlement={editing} token={token} onClose={()=>setEditing(null)} onSaved={()=>{ setEditing(null); loadInvoices(); loadSummary(); }}/>}
        {invoice  && <InvoiceModal settlement={invoice.settlement} orders={invoice.orders} croscrow={invoice.croscrow||{}} vendorProfile={invoice.vendorProfile||{}} onClose={()=>setInvoice(null)}/>}
      </div>
    );
  }

  /* ══════════════════════════════════
     SETTINGS VIEW
  ══════════════════════════════════ */
  function ProfileForm({ title, color='indigo', fields, values, onChange, onSave, saving, msg, readonlyFields=[] }) {
    return (
      <div className="card" style={{marginBottom:16}}>
        <div className="card-header">
          <span className="card-title" style={{color:`var(--${color})`}}>{title}</span>
        </div>
        <div style={{padding:16}}>
          {msg && <div className={`alert alert-${msg.type}`}>{msg.type==='success'?'✓':'⚠'} {msg.text}</div>}
          <div className="form-grid">
            {fields.map(f=>(
              <div key={f.key} className={f.full?'form-full':''}>
                <label className="form-label">{f.label}{f.required&&<span style={{color:'var(--red)'}}> *</span>}</label>
                <input
                  className="form-input"
                  type={f.type||'text'}
                  placeholder={f.placeholder||''}
                  value={values[f.key]||''}
                  onChange={e=>onChange(f.key, e.target.value)}
                  readOnly={readonlyFields.includes(f.key)}
                  style={readonlyFields.includes(f.key)?{opacity:0.5,cursor:'not-allowed'}:{}}
                />
              </div>
            ))}
          </div>
          <div style={{marginTop:14,display:'flex',justifyContent:'flex-end'}}>
            <button className="btn btn-indigo" onClick={onSave} disabled={saving}>
              {saving?<><span className="spin">↻</span> Saving…</>:'✓ Save'}
            </button>
          </div>
        </div>
      </div>
    );
  }

  const PROFILE_FIELDS = [
    { key:'company_name', label:'Company / Brand Name', full:true },
    { key:'email',        label:'Email Address',        placeholder:'billing@company.com' },
    { key:'phone',        label:'Phone', placeholder:'+91 98765 43210' },
    { key:'address',      label:'Address Line', full:true, placeholder:'Street, Building…' },
    { key:'city',         label:'City' },
    { key:'state',        label:'State' },
    { key:'pincode',      label:'Pincode' },
    { key:'gst_no',       label:'GST Number',  placeholder:'27AAAAA0000A1Z5' },
    { key:'pan_no',       label:'PAN Number',  placeholder:'AAAAA0000A' },
    { key:'bank_name',    label:'Bank Name',   placeholder:'HDFC Bank' },
    { key:'account_no',   label:'Account No',  placeholder:'XXXXXXXXXXXX' },
    { key:'ifsc',         label:'IFSC Code',   placeholder:'HDFC0001234' },
    { key:'website',      label:'Website',     placeholder:'https://croscrow.com' },
  ];

  function Settings({ token }) {
    const [ccProfile,    setCcProfile]    = useState({});
    const [vendors,      setVendors]      = useState([]);
    const [vendorProfiles, setVProfiles]  = useState({});
    const [activeVendor, setActiveVendor] = useState(null);
    const [ccSaving,     setCcSaving]     = useState(false);
    const [vSaving,      setVSaving]      = useState(false);
    const [ccMsg,        setCcMsg]        = useState(null);
    const [vMsg,         setVMsg]         = useState(null);
    const [search,       setSearch]       = useState('');

    useEffect(()=>{
      fetch(`${API}/admin/croscrow-profile`,{headers:{Authorization:`Bearer ${token}`}}).then(r=>r.json()).then(setCcProfile).catch(()=>{});
      fetch(`${API}/admin/vendors`,{headers:{Authorization:`Bearer ${token}`}}).then(r=>r.json()).then(d=>setVendors(d.vendors||[])).catch(()=>{});
    },[token]);

    const loadVendorProfile = async name => {
      if (vendorProfiles[name]) { setActiveVendor(name); return; }
      const r = await fetch(`${API}/admin/vendors/${encodeURIComponent(name)}/profile`,{headers:{Authorization:`Bearer ${token}`}});
      const d = await r.json();
      setVProfiles(p=>({...p,[name]:d}));
      setActiveVendor(name);
    };

    const saveCroscrow = async () => {
      setCcSaving(true); setCcMsg(null);
      try {
        const r = await fetch(`${API}/admin/croscrow-profile`,{method:'PUT',headers:{'Content-Type':'application/json','Authorization':`Bearer ${token}`},body:JSON.stringify(ccProfile)});
        if (!r.ok) throw new Error('Save failed');
        setCcMsg({type:'success',text:'CrosCrow profile saved.'});
      } catch(e) { setCcMsg({type:'error',text:e.message}); }
      setCcSaving(false);
    };

    const saveVendor = async () => {
      if (!activeVendor) return;
      setVSaving(true); setVMsg(null);
      try {
        const r = await fetch(`${API}/admin/vendors/${encodeURIComponent(activeVendor)}/profile`,{method:'PUT',headers:{'Content-Type':'application/json','Authorization':`Bearer ${token}`},body:JSON.stringify(vendorProfiles[activeVendor]||{})});
        if (!r.ok) throw new Error('Save failed');
        setVMsg({type:'success',text:`${activeVendor} profile saved.`});
        // Refresh vendors list to show updated commission
        const vr = await fetch(`${API}/admin/vendors`,{headers:{Authorization:`Bearer ${token}`}}).then(r=>r.json());
        setVendors(vr.vendors||[]);
      } catch(e) { setVMsg({type:'error',text:e.message}); }
      setVSaving(false);
    };

    const updateVP = (key, val) => setVProfiles(p=>({...p,[activeVendor]:{...p[activeVendor],[key]:val}}));
    const currentVP = vendorProfiles[activeVendor] || {};
    const visible = search ? vendors.filter(v=>v.name.toLowerCase().includes(search.toLowerCase())) : vendors;

    const VENDOR_FIELDS = [
      ...PROFILE_FIELDS.filter(f=>f.key!=='website'),
      { key:'commission_pct', label:'Commission %', placeholder:'20', type:'number' },
    ];

    return (
      <div className="page">
        {/* CrosCrow Profile */}
        <ProfileForm
          title="⬡ CrosCrow Marketplace — Company Profile"
          color="indigo"
          fields={PROFILE_FIELDS}
          values={ccProfile}
          onChange={(k,v)=>setCcProfile(p=>({...p,[k]:v}))}
          onSave={saveCroscrow}
          saving={ccSaving}
          msg={ccMsg}
        />

        {/* Vendor Profiles */}
        <div className="card">
          <div className="card-header">
            <span className="card-title">Vendor Profiles</span>
            <span className="card-sub">Click a vendor to edit their details and commission %</span>
          </div>
          <div style={{display:'flex',gap:0,minHeight:400}}>
            {/* Vendor list */}
            <div style={{width:220,borderRight:'1px solid var(--border)',flexShrink:0}}>
              <div style={{padding:'10px 12px',borderBottom:'1px solid var(--border)'}}>
                <input className="search-input" style={{paddingLeft:10}} placeholder="Search vendor…" value={search} onChange={e=>setSearch(e.target.value)}/>
              </div>
              <div style={{overflowY:'auto',maxHeight:500}}>
                {visible.map(v=>(
                  <div key={v.name}
                    onClick={()=>loadVendorProfile(v.name)}
                    style={{
                      padding:'10px 14px', cursor:'pointer', borderBottom:'1px solid var(--border)',
                      background: activeVendor===v.name?'var(--indigo-dim)':'transparent',
                      transition:'background 0.1s'
                    }}
                    onMouseEnter={e=>{ if(activeVendor!==v.name) e.currentTarget.style.background='var(--bg-hover)'; }}
                    onMouseLeave={e=>{ if(activeVendor!==v.name) e.currentTarget.style.background='transparent'; }}
                  >
                    <div style={{fontSize:12,fontWeight:600,color:activeVendor===v.name?'var(--indigo)':'var(--text)'}}>{v.name}</div>
                    <div style={{fontSize:10,color:'var(--text-muted)',marginTop:2,display:'flex',gap:8}}>
                      <span>Comm: {v.commission_pct}%</span>
                      {vendorProfiles[v.name]?.gst_no && <span style={{color:'var(--green)'}}>✓ GST</span>}
                      {vendorProfiles[v.name]?.email  && <span style={{color:'var(--green)'}}>✓ Email</span>}
                    </div>
                  </div>
                ))}
              </div>
            </div>

            {/* Vendor edit form */}
            <div style={{flex:1,padding:16}}>
              {!activeVendor ? (
                <div className="empty"><div className="empty-icon">🏪</div><div className="empty-title">Select a vendor</div><div className="empty-sub">Click any vendor on the left to edit their profile.</div></div>
              ) : (
                <>
                  {vMsg && <div className={`alert alert-${vMsg.type}`}>{vMsg.type==='success'?'✓':'⚠'} {vMsg.text}</div>}
                  <div style={{fontSize:13,fontWeight:700,color:'var(--text)',marginBottom:14}}>{activeVendor}</div>
                  <div className="form-grid">
                    {VENDOR_FIELDS.map(f=>(
                      <div key={f.key} className={f.full?'form-full':''}>
                        <label className="form-label">{f.label}{f.key==='commission_pct'&&<span style={{color:'var(--indigo)',marginLeft:6,fontSize:9}}>← auto-used in settlement</span>}</label>
                        <input
                          className="form-input"
                          type={f.type||'text'}
                          placeholder={f.placeholder||''}
                          value={currentVP[f.key]??''}
                          onChange={e=>updateVP(f.key, e.target.value)}
                        />
                      </div>
                    ))}
                  </div>
                  <div style={{marginTop:14,display:'flex',justifyContent:'flex-end'}}>
                    <button className="btn btn-indigo" onClick={saveVendor} disabled={vSaving}>
                      {vSaving?<><span className="spin">↻</span> Saving…</>:`✓ Save ${activeVendor}`}
                    </button>
                  </div>
                </>
              )}
            </div>
          </div>
        </div>
      </div>
    );
  }

  /* ══════════════════════════════════
     EMAIL SETTINGS VIEW
  ══════════════════════════════════ */
  function EmailSettings({ token }) {
    const [smtp,      setSmtp]      = useState({ host:'', port:'587', user:'', pass:'', fromName:'CrosCrow', fromEmail:'', adminEmail:'' });
    const [saving,    setSaving]    = useState(false);
    const [testing,   setTesting]   = useState(false);
    const [testTo,    setTestTo]    = useState('');
    const [logs,      setLogs]      = useState([]);
    const [logsLoad,  setLogsLoad]  = useState(false);
    const [vendors,   setVendors]   = useState([]);
    const [vendEmails,setVendEmails]= useState({});
    const [savingV,   setSavingV]   = useState({});
    const [msg,       setMsg]       = useState(null);
    const [emailEnabled, setEmailEnabled] = useState(true);
    const [togglingEmail, setTogglingEmail] = useState(false);

    useEffect(()=>{
      fetch(`${API}/admin/email-settings`,{headers:{Authorization:`Bearer ${token}`}})
        .then(r=>r.json()).then(d=>{ if(d.smtp) setSmtp(s=>({...s,...d.smtp})); if(d.enabled!==undefined) setEmailEnabled(d.enabled); }).catch(()=>{});
      fetch(`${API}/admin/vendors`,{headers:{Authorization:`Bearer ${token}`}})
        .then(r=>r.json()).then(d=>{
          setVendors(d.vendors||[]);
          const em={};
          (d.vendors||[]).forEach(v=>{ em[v.name]=v.email||''; });
          setVendEmails(em);
        }).catch(()=>{});
      loadLogs();
    },[token]);

    const loadLogs = () => {
      setLogsLoad(true);
      fetch(`${API}/admin/email-log`,{headers:{Authorization:`Bearer ${token}`}})
        .then(r=>r.json()).then(d=>setLogs(d.logs||[])).catch(()=>{}).finally(()=>setLogsLoad(false));
    };

    const save = async () => {
      setSaving(true); setMsg(null);
      try {
        const r = await fetch(`${API}/admin/email-settings`,{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${token}`},body:JSON.stringify({smtp})});
        if(!r.ok) throw new Error((await r.json()).error);
        setMsg({type:'success',text:'SMTP settings saved.'});
      } catch(e){setMsg({type:'error',text:e.message});}
      setSaving(false);
    };

    const test = async () => {
      if(!testTo) return;
      setTesting(true); setMsg(null);
      try {
        const r = await fetch(`${API}/admin/email-settings/test`,{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${token}`},body:JSON.stringify({to:testTo})});
        const d = await r.json();
        if(!r.ok) throw new Error(d.error);
        setMsg({type:'success',text:d.message}); loadLogs();
      } catch(e){setMsg({type:'error',text:e.message});}
      setTesting(false);
    };

    const [testingTpl, setTestingTpl] = useState('');
    const testTemplate = async (template) => {
      if(!testTo){ setMsg({type:'error',text:'Enter a test email address above first.'}); return; }
      setTestingTpl(template); setMsg(null);
      try {
        const r = await fetch(`${API}/admin/email-settings/test-template`,{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${token}`},body:JSON.stringify({to:testTo,template})});
        const d = await r.json();
        if(!r.ok) throw new Error(d.error);
        setMsg({type:'success',text:d.message}); loadLogs();
      } catch(e){setMsg({type:'error',text:e.message});}
      setTestingTpl('');
    };

    const TEMPLATE_LIST = [
      { key:'vendor_welcome',     label:'🚀 Vendor Welcome + Credentials', desc:'Sent once to all vendors with login username/password and panel guide' },
      { key:'new_order',          label:'🟢 New Order (Customer)',        desc:'Sky theme — fires on order creation via webhook' },
      { key:'new_order_vendor',   label:'📬 New Order Heads-Up (Vendor)', desc:'Fires on order creation — heads up, do not dispatch yet' },
      { key:'confirmed_customer', label:'✅ Order Confirmed (Customer)',   desc:'Fires when stage → Confirmed' },
      { key:'confirmed_vendor',   label:'📦 Order Confirmed (Vendor)',     desc:'Fires when stage → Confirmed, sent to each vendor' },
      { key:'partial_vendor',     label:'💛 Partial/Advance (Vendor)',     desc:'Fires when advance amount saved — updated COD breakdown' },
      { key:'transit',            label:'🚚 In Transit (Customer)',        desc:'Fires when stage → In Transit' },
      { key:'delivered_customer', label:'🎉 Delivered (Customer)',         desc:'Fires when stage → Delivered' },
      { key:'delivered_vendor',   label:'✔ Delivered (Vendor)',           desc:'Fires when stage → Delivered, sent to each vendor' },
      { key:'delivered_admin',    label:'🔔 Delivered (Admin)',            desc:'Fires when stage → Delivered, sent to admin email' },
      { key:'order_on_hold',      label:'⚠️ Order On Hold (Customer)',      desc:'Fires when COD order is auto-moved to hold after 4 days — WhatsApp confirm prompt' },
    ];

    const saveVendorEmail = async (name) => {
      setSavingV(v=>({...v,[name]:true}));
      await fetch(`${API}/admin/vendors/${encodeURIComponent(name)}/email`,{method:'PUT',headers:{'Content-Type':'application/json','Authorization':`Bearer ${token}`},body:JSON.stringify({email:vendEmails[name]||''})});
      setSavingV(v=>({...v,[name]:false}));
    };

    const field = (label, key, type='text', placeholder='') => (
      <div>
        <label className="form-label">{label}</label>
        <input className="form-input" type={type} placeholder={placeholder}
          value={smtp[key]||''} onChange={e=>setSmtp(s=>({...s,[key]:e.target.value}))}/>
      </div>
    );

    const statusColor = s => s==='sent'?'#10b981':s==='failed'?'#f87171':'#fbbf24';

    const toggleEmail = async () => {
      setTogglingEmail(true);
      const newVal = !emailEnabled;
      try {
        await fetch(`${API}/admin/email-settings/toggle`,{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${token}`},body:JSON.stringify({enabled:newVal})});
        setEmailEnabled(newVal);
        setMsg({type: newVal ? 'success' : 'error', text: newVal ? 'Emails enabled — notifications will fire on stage changes.' : 'Emails disabled — no notifications will be sent until re-enabled.'});
      } catch(e){ setMsg({type:'error',text:'Toggle failed: '+e.message}); }
      setTogglingEmail(false);
    };

    return (
      <div className="page">
        {/* Global Email Toggle Banner */}
        <div style={{background: emailEnabled ? '#0a2010' : '#200a0a', border:`1px solid ${emailEnabled?'#166534':'#7f1d1d'}`, borderRadius:10, padding:'12px 16px', marginBottom:16, display:'flex', alignItems:'center', justifyContent:'space-between'}}>
          <div>
            <div style={{fontWeight:700, color: emailEnabled ? '#4ade80' : '#f87171', fontSize:14}}>
              {emailEnabled ? '✅ Emails are ON' : '🔕 Emails are OFF'}
            </div>
            <div style={{fontSize:12, color:'var(--text-muted)', marginTop:2}}>
              {emailEnabled ? 'Notifications fire automatically on order stage changes.' : 'No emails will be sent. Safe to bulk-sync tags without spamming customers.'}
            </div>
          </div>
          <button onClick={toggleEmail} disabled={togglingEmail}
            style={{background: emailEnabled ? '#7f1d1d' : '#14532d', color:'#fff', border:'none', borderRadius:8, padding:'8px 18px', fontWeight:700, cursor:'pointer', fontSize:13, whiteSpace:'nowrap'}}>
            {togglingEmail ? '...' : emailEnabled ? '🔕 Turn Off' : '✅ Turn On'}
          </button>
        </div>

        <div style={{background:'#0d1820',border:'1px solid #1a3a5a',borderRadius:10,padding:'12px 16px',marginBottom:20,fontSize:12,color:'var(--text)'}}>
          <div style={{fontWeight:700,color:'#6366f1',marginBottom:6}}>📧 Email Notifications</div>
          <div style={{lineHeight:1.8,color:'var(--text-muted)'}}>
            Configure SMTP once — emails fire automatically on stage changes:
            <strong> Confirmed</strong> → customer + vendor &nbsp;·&nbsp;
            <strong> In Transit</strong> → customer &nbsp;·&nbsp;
            <strong> Delivered</strong> → customer + vendor + admin
          </div>
        </div>

        {msg && <div className={`alert alert-${msg.type}`} style={{marginBottom:16}}>{msg.type==='success'?'✓':'⚠'} {msg.text}</div>}

        {/* SMTP Config */}
        <div className="card" style={{marginBottom:16}}>
          <div className="card-header"><span className="card-title">SMTP Configuration</span></div>
          <div style={{padding:16}}>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:12}}>
              {field('SMTP Host', 'host', 'text', 'smtp.gmail.com')}
              {field('Port', 'port', 'text', '587')}
              {field('Username / Email', 'user', 'text', 'you@gmail.com')}
              {field('Password / App Password', 'pass', 'password', '••••••••')}
              {field('From Name', 'fromName', 'text', 'CrosCrow')}
              {field('From Email', 'fromEmail', 'text', 'orders@croscrow.com')}
              <div style={{gridColumn:'1/-1'}}>
                <label className="form-label">Admin Email (receives Delivered notifications)</label>
                <input className="form-input" type="email" placeholder="admin@croscrow.com"
                  value={smtp.adminEmail||''} onChange={e=>setSmtp(s=>({...s,adminEmail:e.target.value}))}/>
              </div>
            </div>
            <div style={{display:'flex',gap:10,alignItems:'center',flexWrap:'wrap'}}>
              <button className="btn btn-indigo" onClick={save} disabled={saving}>
                {saving?<><span className="spin">↻</span> Saving…</>:'💾 Save Settings'}
              </button>
              <input className="form-input" style={{width:220}} type="email" placeholder="Send test email to…"
                value={testTo} onChange={e=>setTestTo(e.target.value)}/>
              <button className="btn btn-ghost" onClick={test} disabled={testing||!testTo}>
                {testing?<><span className="spin">↻</span> Sending…</>:'📤 Send Test'}
              </button>
            </div>
            <div style={{marginTop:12,fontSize:11,color:'var(--text-muted)',lineHeight:1.8}}>
              <strong style={{color:'var(--text)'}}>Gmail tip:</strong> Use App Password (not your login password). Go to Google Account → Security → 2FA → App Passwords → generate one for "Mail".
            </div>
          </div>
        </div>

        {/* Vendor Emails */}
        <div className="card" style={{marginBottom:16}}>
          <div className="card-header"><span className="card-title">Vendor Email Addresses</span><span className="card-sub">For order & delivery notifications</span></div>
          <div style={{padding:16}}>
            {vendors.length===0 ? <div style={{color:'var(--text-muted)',fontSize:12}}>No vendors found.</div> :
            vendors.map(v=>(
              <div key={v.name} style={{display:'flex',alignItems:'center',gap:10,marginBottom:10}}>
                <div style={{width:120,fontSize:12,color:'var(--text)',flexShrink:0,fontWeight:600}}>{v.name}</div>
                <input className="form-input" style={{flex:1}} type="email" placeholder="vendor@email.com"
                  value={vendEmails[v.name]||''} onChange={e=>setVendEmails(m=>({...m,[v.name]:e.target.value}))}/>
                <button className="btn btn-ghost btn-sm" onClick={()=>saveVendorEmail(v.name)} disabled={savingV[v.name]}>
                  {savingV[v.name]?'…':'Save'}
                </button>
              </div>
            ))}
          </div>
        </div>

        {/* Template Test Buttons */}
        <div className="card" style={{marginBottom:16}}>
          <div className="card-header"><span className="card-title">🧪 Test Email Templates</span></div>
          <div style={{padding:16}}>
            <div style={{fontSize:12,color:'var(--text-muted)',marginBottom:12}}>Enter a test email address in the SMTP section above, then click any template below to send a preview to that address.</div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
              {TEMPLATE_LIST.map(t=>(
                <div key={t.key} style={{background:'var(--bg-card2)',border:'1px solid var(--border)',borderRadius:8,padding:'10px 14px',display:'flex',alignItems:'center',justifyContent:'space-between',gap:8}}>
                  <div>
                    <div style={{fontSize:12,fontWeight:600,color:'var(--text)',marginBottom:2}}>{t.label}</div>
                    <div style={{fontSize:10,color:'var(--text-muted)'}}>{t.desc}</div>
                  </div>
                  <button className="btn btn-ghost btn-sm" style={{whiteSpace:'nowrap',flexShrink:0}}
                    onClick={()=>testTemplate(t.key)} disabled={testingTpl===t.key||!!testingTpl}>
                    {testingTpl===t.key?'Sending…':'Send Test'}
                  </button>
                </div>
              ))}
            </div>
          </div>
        </div>

        {/* Email Log */}
        <div className="card">
          <div className="card-header">
            <span className="card-title">Email Log</span>
            <button className="btn btn-ghost btn-sm" onClick={loadLogs}>↻ Refresh</button>
          </div>
          <div className="tbl-wrap">
            <table>
