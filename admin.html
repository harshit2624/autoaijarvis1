            </div>
          </div>
          <div className="modal-body" style={{padding:0,maxHeight:'80vh',overflowY:'auto'}}>
            <div className="invoice-wrap" id="invoice-print-content">
              {/* Header */}
              <div className="inv-header">
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
                  <div>
                    <div className="inv-title">{croscrow.company_name||'CrosCrow'}</div>
                    <div className="inv-sub">Marketplace · GST Compliant Invoice</div>
                    {croscrow.website && <div style={{fontSize:9,color:'#888'}}>{croscrow.website}</div>}
                  </div>
                  <div style={{textAlign:'right'}}>
                    <div style={{fontWeight:800,fontSize:13,letterSpacing:1}}>{isCredit ? 'CREDIT NOTE' : 'TAX INVOICE'}</div>
                    <div style={{fontSize:10,color:'#666',marginTop:2}}>{s.invoice_no}</div>
                    <div style={{fontSize:10,color:'#666'}}>{fmtDate(s.created_at)}</div>
                  </div>
                </div>
              </div>

              {/* From / To / Period / Status */}
              <div className="inv-grid">
                <div>
                  <span className="inv-label">From (Marketplace)</span>
                  <span className="inv-val">{croscrow.company_name||'CrosCrow Marketplace'}</span>
                  {croscrow.address && <span style={{fontSize:9,color:'#666'}}>{croscrow.address}{croscrow.city?', '+croscrow.city:''}{croscrow.state?', '+croscrow.state:''} {croscrow.pincode||''}</span>}
                  {croscrow.gst_no  && <span style={{fontSize:9,color:'#666'}}>GSTIN: {croscrow.gst_no}</span>}
                  {croscrow.pan_no  && <span style={{fontSize:9,color:'#666'}}>PAN: {croscrow.pan_no}</span>}
                  {croscrow.email   && <span style={{fontSize:9,color:'#666'}}>{croscrow.email}</span>}
                </div>
                <div>
                  <span className="inv-label">To (Vendor)</span>
                  <span className="inv-val">{s.vendor_name}</span>
                  {vendorProfile.address && <span style={{fontSize:9,color:'#666'}}>{vendorProfile.address}{vendorProfile.city?', '+vendorProfile.city:''}{vendorProfile.state?', '+vendorProfile.state:''} {vendorProfile.pincode||''}</span>}
                  {vendorProfile.gst_no  && <span style={{fontSize:9,color:'#666'}}>GSTIN: {vendorProfile.gst_no}</span>}
                  {vendorProfile.pan_no  && <span style={{fontSize:9,color:'#666'}}>PAN: {vendorProfile.pan_no}</span>}
                  {vendorProfile.email   && <span style={{fontSize:9,color:'#666'}}>{vendorProfile.email}</span>}
                </div>
                <div>
                  <span className="inv-label">Settlement Period</span>
                  <span className="inv-val">{fmtDate(s.period_start)} – {fmtDate(s.period_end)}</span>
                  <span style={{fontSize:9,color:'#666'}}>{s.total_orders} orders</span>
                </div>
                <div>
                  <span className="inv-label">Payment Status</span>
                  <span className="inv-val" style={{color:s.status==='paid'?'#10b981':'#f59e0b'}}>{s.status.toUpperCase()}</span>
                  {s.paid_at && <span style={{fontSize:9,color:'#666'}}>Paid: {fmtDate(s.paid_at)}</span>}
                </div>
              </div>

              {/* Order table */}
              <table className="inv-table">
                <colgroup>
                  <col style={{width:'3%'}}/><col style={{width:'10%'}}/><col style={{width:'8%'}}/>
                  <col style={{width:'7%'}}/><col style={{width:'8%'}}/><col style={{width:'8%'}}/>
                  <col style={{width:'5%'}}/><col style={{width:'8%'}}/><col style={{width:'7%'}}/>
                  <col style={{width:'7%'}}/><col style={{width:'8%'}}/><col style={{width:'8%'}}/><col style={{width:'8%'}}/>
                </colgroup>
                <thead>
                  <tr>
                    <th>#</th><th>Order</th><th>MRP</th><th>Type</th>
                    <th>Disc(10%)</th><th>Tax Base</th><th>Comm%</th>
                    <th>Commission</th><th>GST 18%</th><th>Advance</th>
                    <th>Prepaid Collected</th><th>Shipping(COD)</th><th>Net</th>
                  </tr>
                </thead>
                <tbody>
                  {(orders||[]).map((o,i)=>{
                    const isPrepaid = o.payment_type === 'prepaid';
                    const disc  = isPrepaid ? (o.my_revenue||0)*0.1 : 0;
                    const base  = (o.my_revenue||0) - disc;
                    const prepCollected = isPrepaid ? base : 0; // MRP - 10% disc
                    const shipping = (!isPrepaid && (o.shipping_charge||0)>0) ? o.shipping_charge : 0;
                    return (
                      <tr key={i}>
                        <td>{i+1}</td>
                        <td style={{fontWeight:600}}>{o.order_name}</td>
                        <td>₹{(o.my_revenue||0).toFixed(2)}</td>
                        <td style={{textTransform:'uppercase',fontSize:8,color:isPrepaid?'#e67e22':'#666'}}>{o.payment_type}</td>
                        <td style={{color:'#e67e22'}}>{isPrepaid?`−₹${disc.toFixed(2)}`:'—'}</td>
                        <td style={{fontWeight:600}}>₹{base.toFixed(2)}</td>
                        <td style={{color:'#666'}}>{o.commission_pct}%</td>
                        <td>₹{(o.commission||0).toFixed(2)}</td>
                        <td>₹{(o.gst||0).toFixed(2)}</td>
                        <td style={{color:'#555'}}>{(o.advance_paid||0)>0?`₹${(o.advance_paid||0).toFixed(2)}`:'—'}</td>
                        <td style={{color:'#10b981',fontWeight:600}}>{isPrepaid?`₹${prepCollected.toFixed(2)}`:'—'}</td>
                        <td style={{color:'#3b82f6'}}>{shipping>0?`₹${shipping.toFixed(2)}`:'—'}</td>
                        <td style={{fontWeight:700,color:o.net<0?'#10b981':'#ef4444'}}>
                          {o.net<0?'−':''}₹{Math.abs(o.net||0).toFixed(2)}
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>

              {/* Two column layout: summary + payment breakdown */}
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14,alignItems:'start'}}>
                {/* Left: Financial summary */}
                <div className="inv-summary">
                  <div style={{fontSize:8,letterSpacing:1,textTransform:'uppercase',color:'#888',marginBottom:6,fontWeight:700}}>Commission Summary</div>
                  <div className="inv-row"><span>Gross Revenue (MRP)</span><span>₹{(s.gross_revenue||0).toFixed(2)}</span></div>
                  {prepaidDiscount > 0 && <>
                    <div className="inv-row" style={{color:'#e67e22'}}><span>Prepaid Discount (10%)</span><span>−₹{prepaidDiscount.toFixed(2)}</span></div>
                    <div className="inv-row" style={{fontWeight:600,borderTop:'1px solid #ddd',paddingTop:4,marginTop:2}}><span>Taxable Base</span><span>₹{taxableValue.toFixed(2)}</span></div>
                  </>}
                  <div className="inv-row"><span>Commission ({s.custom_commission_pct||20}%)</span><span>₹{(s.commission||0).toFixed(2)}</span></div>
                  <div className="inv-row"><span>GST on Commission (18%)</span><span>₹{(s.gst_amount||0).toFixed(2)}</span></div>
                  {(s.advance_total||0)>0   && <div className="inv-row" style={{color:'#555'}}><span>Advance Collected</span><span>−₹{(s.advance_total||0).toFixed(2)}</span></div>}
                  {(s.extra_discount||0)>0  && <div className="inv-row" style={{color:'#555'}}><span>Extra Discount</span><span>−₹{(s.extra_discount).toFixed(2)}</span></div>}
                  {(s.extra_advance||0)>0   && <div className="inv-row" style={{color:'#555'}}><span>Extra Advance</span><span>−₹{(s.extra_advance).toFixed(2)}</span></div>}
                  {(s.shipping_adjustment||0)!==0 && <div className="inv-row"><span>Shipping Adj.</span><span>{s.shipping_adjustment>0?'+':'−'}₹{Math.abs(s.shipping_adjustment).toFixed(2)}</span></div>}
                  <div className="inv-row inv-total">
                    <span>{isCredit ? '↑ CrosCrow Pays Vendor' : '↓ Vendor Pays CrosCrow'}</span>
                    <span>₹{Math.abs(s.net_payable||0).toFixed(2)}</span>
                  </div>
                </div>

                {/* Right: Payment collection breakdown */}
                <div className="inv-pay-box">
                  <div className="inv-pay-hdr">Payment Collection Breakdown</div>
                  {prepaidCollected > 0 && (
                    <div className="inv-pay-row">
                      <span style={{color:'#888'}}>Prepaid Collected by CrosCrow (MRP − 10%)</span>
                      <span style={{fontWeight:700,color:'#10b981'}}>₹{prepaidCollected.toFixed(2)}</span>
                    </div>
                  )}
                  {(s.advance_total||0)>0 && (
                    <div className="inv-pay-row">
                      <span style={{color:'#888'}}>Advance / Partial COD Collected</span>
                      <span style={{fontWeight:700,color:'#3b82f6'}}>₹{(s.advance_total||0).toFixed(2)}</span>
                    </div>
                  )}
                  {codOrders.length>0 && (
                    <div className="inv-pay-row">
                      <span style={{color:'#888'}}>COD Orders Value (collect from customer)</span>
                      <span style={{fontWeight:700,color:'#f59e0b'}}>
                        ₹{codOrders.reduce((sum,o)=>sum+(o.my_revenue||0),0).toFixed(2)}
                      </span>
                    </div>
                  )}
                  {totalCodShipping > 0 && (
                    <div className="inv-pay-row">
                      <span style={{color:'#888'}}>COD Shipping Collected by Vendor → CrosCrow</span>
                      <span style={{fontWeight:700,color:'#3b82f6'}}>₹{totalCodShipping.toFixed(2)}</span>
                    </div>
                  )}
                  <div className="inv-pay-row" style={{borderTop:'2px solid #ddd',fontWeight:700}}>
                    <span>Net Settlement Amount</span>
                    <span style={{color:isCredit?'#10b981':'#ef4444'}}>
                      {isCredit?'CC pays ':'Vendor pays '}₹{Math.abs(s.net_payable||0).toFixed(2)}
                    </span>
                  </div>
                </div>
              </div>

              {s.invoice_notes && (
                <div style={{marginTop:14,background:'#f9f9f9',border:'1px solid #ddd',borderRadius:5,padding:10,fontSize:10}}>
                  <div style={{fontSize:8,letterSpacing:1,textTransform:'uppercase',color:'#888',marginBottom:3}}>Notes</div>
                  <div>{s.invoice_notes}</div>
                </div>
              )}

              <div className="inv-footer">
                <div style={{display:'flex',justifyContent:'space-between'}}>
                  <span>Computer-generated settlement statement · {s.invoice_no}</span>
                  <span>{croscrow.email||'settlements@croscrow.com'}</span>
                </div>
                <div style={{marginTop:3}}>{croscrow.company_name||'CrosCrow Marketplace'} · All rights reserved · {fmtDate(s.created_at)}</div>
              </div>
            </div>
          </div>
        </div>
      </div>
    );
  }

  /* ══════════════════════════════════
     DASHBOARD VIEW
  ══════════════════════════════════ */
  function Sparkline({ data, color }) {
    if(!data||!data.length) return null;
    const max = Math.max(...data.map(d=>d.revenue), 1);
    return (
      <div style={{display:'flex',alignItems:'flex-end',gap:2,height:36,marginTop:8}}>
        {data.map((d,i)=>(
          <div key={i} title={d.date+': '+d.revenue}
            style={{flex:1,background:color||'#6366f1',borderRadius:'2px 2px 0 0',
              height:Math.max(4,Math.round((d.revenue/max)*36))+'px',cursor:'default'}}/>
        ))}
      </div>
    );
  }

  function GrowthBadge({ val }) {
    if(val===null||val===undefined) return null;
    const pos = val >= 0;
    return (
      <span style={{fontSize:10,fontWeight:700,padding:'2px 6px',borderRadius:4,
        background:pos?'rgba(16,185,129,0.12)':'rgba(239,68,68,0.12)',
        color:pos?'#10b981':'#ef4444',marginLeft:6}}>
        {pos?'↑':'↓'}{Math.abs(val)}%
      </span>
    );
  }

  function Dashboard({ token, onStageClick }) {
    const [data,      setData]      = useState(null);
    const [analytics, setAnalytics] = useState(null);
    const [aLoading,  setALoading]  = useState(true);
    const [aTab,      setATab]      = useState('overview');
    const [aPeriod,   setAPeriod]   = useState(PERIOD_PRESETS[3]); // Last 30 Days

    useEffect(()=>{
      setALoading(true);
      const from = aPeriod ? aPeriod.from : '2020-01-01';
      const to   = aPeriod ? aPeriod.to   : isoToday();
      fetch(`${API}/admin/analytics?from=${from}&to=${to}`,{headers:{Authorization:`Bearer ${token}`}})
        .then(r=>r.json()).then(setAnalytics).catch(()=>{}).finally(()=>setALoading(false));
    },[token, aPeriod]);

    const stages = STAGES.filter(s=>s.id!=='all');
    const a = analytics;
    const sc = (a && a.stageCounts) ? a.stageCounts : {};
    const at = (a && a.allTimeTotals) ? a.allTimeTotals : {};
    const ps = (a && a.summary && a.summary.period) ? a.summary.period : {};
    const periodDays = ps.days || 30;
    const fulfillPct = (a && a.fulfillStats) ? (a.fulfillStats.dispatch_rate || 0) : 0;
    const fulfillColor = fulfillPct>=80?'#10b981':fulfillPct>=50?'#f59e0b':'#ef4444';
    const periodLabel = aPeriod ? aPeriod.label : 'All Time';
    const stageColor = id => { const s=STAGES.find(x=>x.id===id); return s?`var(--${s.color})`:'var(--indigo)'; };

    return (
      <div className="page">
        {/* ── Global period picker ── */}
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14,flexWrap:'wrap',gap:8}}>
          <div style={{fontSize:11,color:'var(--text-muted)',letterSpacing:1}}>
            Showing data for: <span style={{color:'var(--indigo)',fontWeight:700}}>{periodLabel}</span>
            {ps.from && <span style={{color:'var(--text-muted)',marginLeft:6,fontSize:10}}>({ps.from} → {ps.to})</span>}
          </div>
          <PeriodPicker period={aPeriod} onChange={p=>{setAPeriod(p);setATab('overview');}} align="right"/>
        </div>

        {/* Summary row — all from analytics, respects period */}
        <div className="stats-grid" style={{gridTemplateColumns:'repeat(auto-fill,minmax(200px,1fr))'}}>
          <StatCard color="indigo" icon="◈" label={'Orders ('+periodLabel+')'}  value={aLoading?'…':(a&&a.summary?a.summary.period.orders.toLocaleString():'0')} sub={aLoading?'':fmtCur(ps.revenue||0)}/>
          <StatCard color="cyan"   icon="₹" label="Total Revenue (All Time)"    value={aLoading?'…':fmtCur(at.revenue||0)} sub={'all '+((at.orders||0).toLocaleString())+' orders'}/>
          <StatCard color="yellow" icon="⬡" label="Pending Commission"          value={aLoading?'…':fmtCur(at.pendingCommission||0)} sub="unsettled"/>
          <StatCard color="green"  icon="✅" label={'Delivered ('+periodLabel+')'} value={aLoading?'…':(sc.delivered||0)} sub="orders"/>
          <StatCard color="red"    icon="↩" label={'RTO ('+periodLabel+')'}     value={aLoading?'…':(sc.rto||0)} sub="returned"/>
          {!aLoading && a && a.fulfillStats && (()=>{
            const fs = a.fulfillStats;

            const MiniCard = ({icon, label, pct, num, den, sub, threshHi=80, threshMid=60}) => {
              const color = pct>=threshHi?'#10b981':pct>=threshMid?'#f59e0b':'#ef4444';
              const bg    = pct>=threshHi?'rgba(16,185,129,0.08)':pct>=threshMid?'rgba(245,158,11,0.08)':'rgba(239,68,68,0.08)';
              const bdr   = pct>=threshHi?'rgba(16,185,129,0.3)':pct>=threshMid?'rgba(245,158,11,0.3)':'rgba(239,68,68,0.3)';
              return (
                <div style={{background:bg,border:`1px solid ${bdr}`,borderRadius:8,padding:'14px 16px',display:'flex',flexDirection:'column',gap:4}}>
                  <div style={{fontSize:9,letterSpacing:2,textTransform:'uppercase',color:'var(--text-muted)',marginBottom:2}}>{icon} {label}</div>
                  <div style={{display:'flex',alignItems:'flex-end',gap:8}}>
                    <span style={{fontSize:28,fontWeight:900,color,lineHeight:1}}>{pct}%</span>
                    <span style={{fontSize:10,color:'var(--text-muted)',marginBottom:3}}>{num}/{den}</span>
                  </div>
                  <div style={{height:4,background:'var(--border)',borderRadius:2,overflow:'hidden',marginTop:2}}>
                    <div style={{height:'100%',width:pct+'%',background:color,borderRadius:2,transition:'width 0.4s'}}/>
                  </div>
                  <div style={{fontSize:10,color:'var(--text-muted)',display:'flex',justifyContent:'space-between'}}>
                    <span>{sub}</span><span>{periodLabel}</span>
                  </div>
                </div>
              );
            };

            return (
              <React.Fragment>
                <MiniCard icon="📦" label="Dispatch Rate"
                  pct={fs.dispatch_rate} num={fs.dispatched} den={fs.confirmed+' confirmed'}
                  sub={fs.pending_count+' pending dispatch'}/>
                <MiniCard icon="🚀" label="Overall Fulfillment"
                  pct={fs.overall_rate} num={fs.dispatched} den={fs.total+' total orders'}
                  sub={fs.cancelled+' cancelled'}/>
                <MiniCard icon="✅" label="Delivery Rate"
                  pct={fs.delivery_rate} num={fs.delivered} den={fs.dispatched+' dispatched'}
                  sub={fs.rto+' RTO · '+fs.delivered+' delivered'} threshHi={70} threshMid={50}/>
              </React.Fragment>
            );
          })()}
        </div>

        {/* Stage breakdown — respects period */}
        <div className="card">
          <div className="card-header">
            <span className="card-title">Order Pipeline</span>
            <span className="card-sub">{periodLabel} · click to filter orders</span>
          </div>
          <div style={{padding:'16px',display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(140px,1fr))',gap:10}}>
            {aLoading ? Array.from({length:9}).map((_,i)=>(
              <div key={i} style={{background:'var(--bg-card2)',border:'1px solid var(--border)',borderRadius:8,padding:14}}>
                <div className="skel" style={{height:10,width:80,marginBottom:8}}/>
                <div className="skel" style={{height:22,width:40}}/>
              </div>
            )) : stages.map(s=>(
              <div key={s.id}
                onClick={()=>onStageClick(s.id)}
                style={{background:'var(--bg-card2)',border:'1px solid var(--border)',borderRadius:8,padding:14,cursor:'pointer',transition:'border-color 0.15s'}}
                onMouseEnter={e=>e.currentTarget.style.borderColor='var(--border-hi)'}
                onMouseLeave={e=>e.currentTarget.style.borderColor='var(--border)'}
              >
                <div style={{fontSize:9,letterSpacing:2,textTransform:'uppercase',color:'var(--text-muted)',marginBottom:6}}>{s.icon} {s.label}</div>
                <div style={{fontSize:24,fontWeight:700,color:stageColor(s.id)}}>
                  {sc[s.id]||0}
                </div>
              </div>
            ))}
          </div>
        </div>

        {/* ── FOUNDER ANALYTICS ── */}
        <div className="card" style={{marginTop:0}}>
          <div className="card-header" style={{borderBottom:'1px solid var(--border)',paddingBottom:12,flexWrap:'wrap',gap:8}}>
            <span className="card-title">📊 Founder Analytics</span>
            <div style={{display:'flex',gap:6}}>
              {['overview','products','brands','cities'].map(t=>(
                <button key={t} onClick={()=>setATab(t)}
                  style={{fontSize:11,padding:'4px 10px',borderRadius:6,border:'1px solid var(--border)',
                    background:aTab===t?'var(--indigo)':'transparent',color:aTab===t?'#fff':'var(--text-muted)',cursor:'pointer',textTransform:'capitalize'}}>
                  {t}
                </button>
              ))}
            </div>
          </div>

          {aLoading ? (
            <div style={{padding:24,textAlign:'center',color:'var(--text-muted)',fontSize:13}}>Loading analytics…</div>
          ) : (!a || !a.summary) ? (
            <div style={{padding:24,textAlign:'center',color:'var(--text-muted)',fontSize:13}}>Analytics unavailable</div>
          ) : aTab==='overview' ? (
            <div style={{padding:16}}>
              {/* KPI row — all respect selected period */}
              <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(160px,1fr))',gap:10,marginBottom:16}}>
                <div style={{background:'var(--bg-card2)',border:'1px solid var(--border)',borderRadius:8,padding:'12px 14px'}}>
                  <div style={{fontSize:9,letterSpacing:1.5,textTransform:'uppercase',color:'var(--text-muted)',marginBottom:4}}>Today Orders</div>
                  <div style={{fontSize:20,fontWeight:800,color:'#6366f1'}}>{a.summary.today.orders}</div>
                  <div style={{fontSize:10,color:'var(--text-muted)',marginTop:2}}>{'₹'+(a.summary.today.revenue||0).toLocaleString()}</div>
                </div>
                <div style={{background:'var(--bg-card2)',border:'1px solid var(--border)',borderRadius:8,padding:'12px 14px'}}>
                  <div style={{fontSize:9,letterSpacing:1.5,textTransform:'uppercase',color:'var(--text-muted)',marginBottom:4}}>Last 7 Days</div>
                  <div style={{fontSize:20,fontWeight:800,color:'#06b6d4'}}>{'₹'+(a.summary.last7d.revenue||0).toLocaleString()}</div>
                  <div style={{fontSize:10,color:'var(--text-muted)',marginTop:2}}>{a.summary.last7d.orders} orders · AOV {'₹'+a.summary.last7d.aov}</div>
                </div>
                <div style={{background:'var(--bg-card2)',border:'1px solid var(--border)',borderRadius:8,padding:'12px 14px'}}>
                  <div style={{fontSize:9,letterSpacing:1.5,textTransform:'uppercase',color:'var(--text-muted)',marginBottom:4}}>{'Revenue ('+periodLabel+')'}</div>
                  <div style={{fontSize:20,fontWeight:800,color:'#10b981'}}>{'₹'+(a.summary.period.revenue||0).toLocaleString()}</div>
                  <div style={{fontSize:10,color:'var(--text-muted)',marginTop:2,display:'flex',alignItems:'center',flexWrap:'wrap',gap:2}}>{'vs prior '+periodDays+'d'}<GrowthBadge val={a.summary.revenueGrowth}/></div>
                </div>
                <div style={{background:'var(--bg-card2)',border:'1px solid var(--border)',borderRadius:8,padding:'12px 14px'}}>
                  <div style={{fontSize:9,letterSpacing:1.5,textTransform:'uppercase',color:'var(--text-muted)',marginBottom:4}}>{'Orders ('+periodLabel+')'}</div>
                  <div style={{fontSize:20,fontWeight:800,color:'#f59e0b'}}>{a.summary.period.orders}</div>
                  <div style={{fontSize:10,color:'var(--text-muted)',marginTop:2,display:'flex',alignItems:'center',flexWrap:'wrap',gap:2}}>{'vs prior '+periodDays+'d'}<GrowthBadge val={a.summary.orderGrowth}/></div>
                </div>
                <div style={{background:'var(--bg-card2)',border:'1px solid var(--border)',borderRadius:8,padding:'12px 14px'}}>
                  <div style={{fontSize:9,letterSpacing:1.5,textTransform:'uppercase',color:'var(--text-muted)',marginBottom:4}}>Dispatch Rate</div>
                  <div style={{fontSize:20,fontWeight:800,color:fulfillColor}}>{fulfillPct}%</div>
                  <div style={{fontSize:10,color:'var(--text-muted)',marginTop:2}}>{(a.fulfillStats?.dispatched||0)+' of '+(a.fulfillStats?.confirmed||0)+' confirmed · '+periodLabel}</div>
                </div>
                <div style={{background:'var(--bg-card2)',border:'1px solid var(--border)',borderRadius:8,padding:'12px 14px'}}>
                  <div style={{fontSize:9,letterSpacing:1.5,textTransform:'uppercase',color:'var(--text-muted)',marginBottom:4}}>RTO Rate</div>
                  <div style={{fontSize:20,fontWeight:800,color:(a.summary.rtoRate30||0)>10?'#ef4444':'#10b981'}}>{a.summary.rtoRate30||0}%</div>
                  <div style={{fontSize:10,color:'var(--text-muted)',marginTop:2}}>{'returns · '+periodLabel}</div>
                </div>
                <div style={{background:'var(--bg-card2)',border:'1px solid var(--border)',borderRadius:8,padding:'12px 14px'}}>
                  <div style={{fontSize:9,letterSpacing:1.5,textTransform:'uppercase',color:'var(--text-muted)',marginBottom:4}}>Repeat Buyers</div>
                  <div style={{fontSize:20,fontWeight:800,color:'#a78bfa'}}>{a.summary.repeatRate||0}%</div>
                  <div style={{fontSize:10,color:'var(--text-muted)',marginTop:2}}>{a.summary.repeatCustomers} of {a.summary.totalCustomers} customers</div>
                </div>
                <div style={{background:'var(--bg-card2)',border:'1px solid var(--border)',borderRadius:8,padding:'12px 14px'}}>
                  <div style={{fontSize:9,letterSpacing:1.5,textTransform:'uppercase',color:'var(--text-muted)',marginBottom:4}}>Avg Order Value</div>
                  <div style={{fontSize:20,fontWeight:800,color:'#06b6d4'}}>{'₹'+(a.summary.period.aov||0)}</div>
                  <div style={{fontSize:10,color:'var(--text-muted)',marginTop:2}}>{periodLabel}</div>
                </div>
              </div>

              {/* Revenue trend sparkline */}
              <div style={{background:'var(--bg-card2)',border:'1px solid var(--border)',borderRadius:8,padding:'14px 16px'}}>
                <div style={{fontSize:11,fontWeight:600,color:'var(--text-muted)',marginBottom:4,textTransform:'uppercase',letterSpacing:1}}>{'Revenue Trend · '+periodLabel}</div>
                <Sparkline data={a.trend14d} color='#6366f1'/>
                <div style={{display:'flex',justifyContent:'space-between',marginTop:4}}>
                  <span style={{fontSize:9,color:'var(--text-muted)'}}>{a.trend14d.length > 0 ? a.trend14d[0].date : ''}</span>
                  <span style={{fontSize:9,color:'var(--text-muted)'}}>{a.trend14d.length > 0 ? a.trend14d[a.trend14d.length-1].date : ''}</span>
                </div>
              </div>

              {/* Fulfillment + Payment split */}
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginTop:10}}>
                <div style={{background:'var(--bg-card2)',border:'1px solid var(--border)',borderRadius:8,padding:'14px 16px'}}>
                  <div style={{fontSize:11,fontWeight:600,color:'var(--text-muted)',marginBottom:10,textTransform:'uppercase',letterSpacing:1}}>{'Fulfillment · '+periodLabel}</div>
                  {[
                    {label:'Fulfilled',      val:a.fulfillStats.fulfilled,    color:'#10b981'},
                    {label:'Unfulfilled',    val:a.fulfillStats.unfulfilled,  color:'#ef4444'},
                    {label:'Partial Ship',   val:a.fulfillStats.partial_ship, color:'#f59e0b'},
                    {label:'Cancelled',      val:a.fulfillStats.cancelled,    color:'#6b7280'},
                    {label:'RTO',            val:a.fulfillStats.rto,          color:'#a78bfa'},
                  ].map(r=>(
                    <div key={r.label} style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
                      <span style={{fontSize:12,color:'var(--text-muted)'}}>{r.label}</span>
                      <span style={{fontSize:13,fontWeight:700,color:r.color}}>{r.val}</span>
                    </div>
                  ))}
                  <div style={{marginTop:8,height:4,borderRadius:2,background:'var(--border)',overflow:'hidden'}}>
                    <div style={{height:'100%',width:`${fulfillPct}%`,background:fulfillColor,borderRadius:2,transition:'width 0.4s'}}/>
                  </div>
                  <div style={{fontSize:10,color:fulfillColor,marginTop:4,fontWeight:700}}>{fulfillPct}% fulfillment rate</div>
                </div>

                <div style={{background:'var(--bg-card2)',border:'1px solid var(--border)',borderRadius:8,padding:'14px 16px'}}>
                  <div style={{fontSize:11,fontWeight:600,color:'var(--text-muted)',marginBottom:10,textTransform:'uppercase',letterSpacing:1}}>{'Payment Split · '+periodLabel}</div>
                  {[
                    {label:'Prepaid',  val:a.paymentSplit.prepaid, color:'#10b981'},
                    {label:'COD',      val:a.paymentSplit.cod,     color:'#f59e0b'},
                    {label:'Advance',  val:a.paymentSplit.partial, color:'#6366f1'},
                  ].map(r=>{
                    const total = a.paymentSplit.prepaid + a.paymentSplit.cod + a.paymentSplit.partial || 1;
                    const pct   = Math.round(r.val/total*100);
                    return (
                      <div key={r.label} style={{marginBottom:10}}>
                        <div style={{display:'flex',justifyContent:'space-between',marginBottom:3}}>
                          <span style={{fontSize:12,color:'var(--text-muted)'}}>{r.label}</span>
                          <span style={{fontSize:12,fontWeight:700,color:r.color}}>{r.val} <span style={{fontSize:10,fontWeight:400}}>({pct}%)</span></span>
                        </div>
                        <div style={{height:4,borderRadius:2,background:'var(--border)'}}>
                          <div style={{height:'100%',width:`${pct}%`,background:r.color,borderRadius:2}}/>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            </div>

          ) : aTab==='products' ? (
            <div style={{padding:16}}>
              <div style={{fontSize:11,color:'var(--text-muted)',marginBottom:10}}>{'Top products by units sold · '+periodLabel}</div>
              <div style={{overflowX:'auto'}}>
                <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
                  <thead><tr style={{borderBottom:'1px solid var(--border)'}}>
                    <th style={{textAlign:'left',padding:'6px 8px',color:'var(--text-muted)',fontWeight:600,fontSize:10,textTransform:'uppercase'}}>#</th>
                    <th style={{textAlign:'left',padding:'6px 8px',color:'var(--text-muted)',fontWeight:600,fontSize:10,textTransform:'uppercase'}}>Product</th>
                    <th style={{textAlign:'left',padding:'6px 8px',color:'var(--text-muted)',fontWeight:600,fontSize:10,textTransform:'uppercase'}}>Brand</th>
                    <th style={{textAlign:'right',padding:'6px 8px',color:'var(--text-muted)',fontWeight:600,fontSize:10,textTransform:'uppercase'}}>Units</th>
                    <th style={{textAlign:'right',padding:'6px 8px',color:'var(--text-muted)',fontWeight:600,fontSize:10,textTransform:'uppercase'}}>Orders</th>
                    <th style={{textAlign:'right',padding:'6px 8px',color:'var(--text-muted)',fontWeight:600,fontSize:10,textTransform:'uppercase'}}>Revenue</th>
                  </tr></thead>
                  <tbody>
                    {(a.topProducts||[]).map((p,i)=>(
                      <tr key={i} style={{borderBottom:'1px solid var(--border)'}}>
                        <td style={{padding:'8px',color:'var(--text-muted)',fontSize:11}}>{i+1}</td>
                        <td style={{padding:'8px',color:'var(--text)',fontWeight:500,maxWidth:200,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{p.title}</td>
                        <td style={{padding:'8px',color:'var(--text-muted)',fontSize:11}}>{p.vendor}</td>
                        <td style={{padding:'8px',textAlign:'right',fontWeight:700,color:'#6366f1'}}>{p.qty}</td>
                        <td style={{padding:'8px',textAlign:'right',color:'var(--text-muted)'}}>{p.orders}</td>
                        <td style={{padding:'8px',textAlign:'right',fontWeight:600,color:'#10b981'}}>₹{p.revenue.toLocaleString()}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>

          ) : aTab==='brands' ? (
            <div style={{padding:16}}>
              <div style={{fontSize:11,color:'var(--text-muted)',marginBottom:10}}>{'Top brands by revenue · '+periodLabel}</div>
              {(a.topBrands||[]).map((b,i)=>{
                const maxRev = a.topBrands[0]?.revenue || 1;
                const pct = Math.round(b.revenue/maxRev*100);
                const colors = ['#6366f1','#06b6d4','#10b981','#f59e0b','#a78bfa','#ec4899','#ef4444','#14b8a6'];
                return (
                  <div key={i} style={{marginBottom:12}}>
                    <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
                      <span style={{fontSize:13,fontWeight:600,color:'var(--text)'}}>{b.name}</span>
                      <span style={{fontSize:12,color:'var(--text-muted)'}}>{b.qty} units · {b.orders} orders · <span style={{color:'#10b981',fontWeight:700}}>₹{b.revenue.toLocaleString()}</span></span>
                    </div>
                    <div style={{height:6,borderRadius:3,background:'var(--border)'}}>
                      <div style={{height:'100%',width:`${pct}%`,background:colors[i%colors.length],borderRadius:3,transition:'width 0.4s'}}/>
                    </div>
                  </div>
                );
              })}
            </div>

          ) : aTab==='cities' ? (
            <div style={{padding:16}}>
              <div style={{fontSize:11,color:'var(--text-muted)',marginBottom:10}}>{'Top delivery cities · '+periodLabel}</div>
              {(a.topCities||[]).map((c,i)=>{
                const maxC = a.topCities[0]?.count || 1;
                const pct = Math.round(c.count/maxC*100);
                return (
                  <div key={i} style={{marginBottom:10}}>
                    <div style={{display:'flex',justifyContent:'space-between',marginBottom:3}}>
                      <span style={{fontSize:13,fontWeight:500,color:'var(--text)'}}>{c.city}</span>
                      <span style={{fontSize:12,fontWeight:700,color:'#6366f1'}}>{c.count} orders</span>
                    </div>
                    <div style={{height:5,borderRadius:2,background:'var(--border)'}}>
                      <div style={{height:'100%',width:`${pct}%`,background:'#6366f1',borderRadius:2,opacity:0.5+0.5*(pct/100)}}/>
                    </div>
                  </div>
                );
              })}
            </div>
          ) : null}
        </div>
      </div>
    );
  }

  /* ══════════════════════════════════
     ORDERS VIEW
  ══════════════════════════════════ */
  function Orders({ token, initialStage }) {
    const [orders,    setOrders]   = useState([]);
    const [loading,   setLoading]  = useState(true);
    const [stage,     setStage]    = useState(initialStage || 'all');
    const [search,    setSearch]   = useState('');
    const [page,      setPage]     = useState(1);
    const [modal,     setModal]    = useState(null);
    const [showTags,  setShowTags] = useState(false);
    const [period,    setPeriod]   = useState(null);
    // Bulk select
    const [selected,  setSelected]  = useState(new Set());
    const [bulkStage, setBulkStage] = useState('');
    const [bulkAddTag,setBulkAddTag]= useState('');
    const [bulkRmTag, setBulkRmTag] = useState('');
    const [bulkMsg,   setBulkMsg]   = useState(null);
    const [bulkBusy,  setBulkBusy]  = useState(false);

    const load = useCallback(()=>{
      setLoading(true);
      fetch(`${API}/admin/orders?created_at_min=2000-01-01`,{headers:{Authorization:`Bearer ${token}`}})
        .then(r=>r.json()).then(d=>setOrders(d.orders||[])).catch(()=>{}).finally(()=>setLoading(false));
    },[token]);

    useEffect(()=>{ load(); },[load]);

    const toggleSelect = id => setSelected(s => { const n=new Set(s); n.has(id)?n.delete(id):n.add(id); return n; });
    const toggleAll    = () => setSelected(s => s.size===rows.length ? new Set() : new Set(rows.map(o=>o.shopifyId)));
    const clearSelect  = () => { setSelected(new Set()); setBulkMsg(null); };

    const applyBulk = async () => {
      if (!bulkStage && !bulkAddTag.trim() && !bulkRmTag.trim()) { setBulkMsg({type:'error',text:'Select a stage or enter tags to add/remove.'}); return; }
      setBulkBusy(true); setBulkMsg(null);
      const addTags = bulkAddTag.split(',').map(t=>t.trim()).filter(Boolean);
      const rmTags  = bulkRmTag.split(',').map(t=>t.trim()).filter(Boolean);
      try {
        const r = await fetch(`${API}/admin/orders/bulk-update`, {
          method:'POST', headers:{'Content-Type':'application/json','Authorization':`Bearer ${token}`},
          body: JSON.stringify({ order_ids:[...selected], stage:bulkStage||undefined, add_tags:addTags, remove_tags:rmTags }),
        });
        const d = await r.json();
        if (!r.ok) throw new Error(d.error);
        const tagNote = d.stageTag ? ` · tag "${d.stageTag}" added` : '';
        setBulkMsg({type:'success',text:`Updated ${d.updated.length} order${d.updated.length!==1?'s':''}${tagNote}${d.failed.length?' · '+d.failed.length+' failed':''}`});
        clearSelect(); setBulkStage(''); setBulkAddTag(''); setBulkRmTag('');
        load();
      } catch(e) { setBulkMsg({type:'error',text:e.message}); }
      setBulkBusy(false);
    };

    const orderMatchesStage = (o, s) =>
      s === 'all' || o.stage === s || Object.values(o.vendorStages||{}).includes(s);

    // Period-filtered base (used for tab counts too)
    const periodOrders = useMemo(()=>{
      if(!period || !period.from) return orders;
      const from = new Date(period.from+'T00:00:00');
      const to   = new Date(period.to+'T23:59:59');
      return orders.filter(o => { const d=new Date(o.date); return d>=from && d<=to; });
    },[orders,period]);

    const filtered = useMemo(()=>{
      let l=[...periodOrders];
      if(stage && stage!=='all') l=l.filter(o=>orderMatchesStage(o,stage));
      if(search.trim()){const q=search.toLowerCase(); l=l.filter(o=>o.id.toLowerCase().includes(q)||o.customer.toLowerCase().includes(q)||(o.vendors||[]).some(v=>v.toLowerCase().includes(q)));}
      return l;
    },[periodOrders,stage,search]);

    const pages = Math.max(1,Math.ceil(filtered.length/PER));
    const cur   = Math.min(page,pages);
    const rows  = filtered.slice((cur-1)*PER, cur*PER);

    return (
      <div className="page">
        <div className="stage-tabs">
          {STAGES.map(s=>(
            <button key={s.id} className={`stab ${stage===s.id?'active':''}`} onClick={()=>{setStage(s.id);setPage(1);}}>
              {s.icon} {s.label} {s.id==='all'?`(${periodOrders.length})`:periodOrders.filter(o=>orderMatchesStage(o,s.id)).length>0?`(${periodOrders.filter(o=>orderMatchesStage(o,s.id)).length})`:''}
            </button>
          ))}
        </div>
        <div className="filters">
          <div className="search-wrap">
            <span className="search-ico">⌕</span>
            <input className="search-input" placeholder="Search order, customer, vendor…" value={search} onChange={e=>{setSearch(e.target.value);setPage(1);}}/>
          </div>
          <PeriodPicker period={period} onChange={p=>{setPeriod(p);setPage(1);}}/>
          {period && <button className="btn btn-ghost btn-sm" onClick={()=>{setPeriod(null);setPage(1);}} style={{fontSize:10,padding:'4px 8px'}}>✕ Clear</button>}
          <button className="btn btn-ghost btn-sm" onClick={load} disabled={loading}>{loading?<span className="spin">↻</span>:'↻'} Refresh</button>
          <label style={{display:'flex',alignItems:'center',gap:6,cursor:'pointer',fontSize:11,color:'var(--text-muted)',userSelect:'none'}}>
            <input type="checkbox" checked={showTags} onChange={e=>setShowTags(e.target.checked)} style={{accentColor:'var(--indigo)',width:13,height:13}}/>
            Show Tags
          </label>
          <span className="fcount">{filtered.length} order{filtered.length!==1?'s':''}</span>
        </div>

        {/* Bulk action bar */}
        {selected.size > 0 && (
          <div style={{position:'sticky',top:0,zIndex:20,background:'#1a1a2e',border:'1px solid var(--indigo)',borderRadius:8,padding:'10px 16px',marginBottom:10,display:'flex',alignItems:'center',gap:10,flexWrap:'wrap',boxShadow:'0 4px 20px rgba(99,102,241,0.2)'}}>
            <span style={{fontSize:12,fontWeight:700,color:'var(--indigo)',whiteSpace:'nowrap'}}>{selected.size} selected</span>
            <select className="form-select" style={{fontSize:11,padding:'5px 8px',flex:'0 0 160px'}} value={bulkStage} onChange={e=>setBulkStage(e.target.value)}>
              <option value="">Set stage…</option>
              {['new','confirmed','partial','ready','pickup','transit','delivered','rto','hold','cancelled'].map(s=><option key={s} value={s}>{s}</option>)}
            </select>
            <input className="form-input" style={{fontSize:11,padding:'5px 8px',flex:'1 1 140px',minWidth:120}} placeholder="Add tags (comma sep)" value={bulkAddTag} onChange={e=>setBulkAddTag(e.target.value)}/>
            <input className="form-input" style={{fontSize:11,padding:'5px 8px',flex:'1 1 140px',minWidth:120}} placeholder="Remove tags (comma sep)" value={bulkRmTag} onChange={e=>setBulkRmTag(e.target.value)}/>
            <button className="btn btn-indigo btn-sm" onClick={applyBulk} disabled={bulkBusy}>
              {bulkBusy?<><span className="spin">↻</span> Applying…</>:'✓ Apply'}
            </button>
            <button className="btn btn-ghost btn-sm" onClick={clearSelect}>✕ Clear</button>
            {bulkMsg && <span style={{fontSize:11,color:bulkMsg.type==='success'?'var(--green)':'var(--red)',fontWeight:600}}>{bulkMsg.type==='success'?'✓':'⚠'} {bulkMsg.text}</span>}
          </div>
        )}

        <div className="card">
          <div className="tbl-wrap">
            <table>
              <thead><tr>
                <th style={{width:32,paddingLeft:8}}>
                  <input type="checkbox" style={{accentColor:'var(--indigo)',width:13,height:13,cursor:'pointer'}}
                    checked={rows.length>0&&selected.size===rows.length}
                    ref={el=>{ if(el) el.indeterminate=selected.size>0&&selected.size<rows.length; }}
                    onChange={toggleAll}/>
                </th>
                <th>#</th><th>Order</th><th>Customer</th><th>Vendors</th>
                <th>Value</th><th>Type</th><th>Advance</th><th>Stage</th><th>Delivery</th><th>Date</th><th/>
              </tr></thead>
              <tbody>
                {loading ? Array.from({length:10}).map((_,i)=><SkelRow key={i} cols={12}/>) :
                 rows.length===0 ? (
                   <tr><td colSpan={12}><div className="empty"><div className="empty-icon">📦</div><div className="empty-title">No orders found</div></div></td></tr>
                 ) :
                 rows.map((o,i)=>{
                   const ds = o.deliveryStatus;
                   const isSelected = selected.has(o.shopifyId);
                   const dsColor = ds==='Delivered'?'#10b981':ds&&ds.toLowerCase().includes('transit')?'#06b6d4':ds&&(ds.toLowerCase().includes('rto')||ds.toLowerCase().includes('return'))?'#f87171':ds?'#fbbf24':'var(--text-muted)';
                   return (
                   <tr key={o.id} style={{cursor:'pointer',background:isSelected?'rgba(99,102,241,0.07)':'',outline:isSelected?'1px solid rgba(99,102,241,0.3)':''}}
                     onClick={e=>{ if(e.target.type==='checkbox') return; setModal(o); }}>
                     <td style={{paddingLeft:8}} onClick={e=>{ e.stopPropagation(); toggleSelect(o.shopifyId); }}>
                       <input type="checkbox" style={{accentColor:'var(--indigo)',width:13,height:13,cursor:'pointer'}} checked={isSelected} onChange={()=>toggleSelect(o.shopifyId)}/>
                     </td>
                     <td className="td-mut">{(cur-1)*PER+i+1}</td>
                     <td>
                       <div className="td-id">{o.id}</div>
                       {showTags && o.tags && o.tags.split(',').map(t=>t.trim()).filter(Boolean).map(t=>(
                         <span key={t} style={{display:'inline-block',fontSize:9,padding:'1px 5px',borderRadius:3,background:'#1a2a3a',border:'1px solid #2a4a6a',color:'#6fa8d0',marginTop:2,marginRight:2}}>{t}</span>
                       ))}
                     </td>
                     <td>
                       <div style={{display:'flex',alignItems:'center',gap:7}}>
                         <div style={{width:22,height:22,borderRadius:'50%',background:'var(--bg-card2)',border:'1px solid var(--border)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:8,fontWeight:700,color:'var(--indigo)',flexShrink:0}}>
                           {(o.customer||'G').split(' ').map(x=>x[0]).join('').toUpperCase().slice(0,2)}
                         </div>
                         <div>
                           <div style={{fontSize:12}}>{o.customer}</div>
                           {o.email && <div style={{fontSize:10,color:'var(--text-muted)'}}>{o.email}</div>}
                         </div>
                       </div>
                     </td>
                     <td style={{color:'var(--text-dim)',fontSize:11,maxWidth:120,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{(o.vendors||[]).join(', ')||'—'}</td>
                     <td className="td-amt">{fmtCur(o.orderValue)}</td>
                     <td><span style={{fontSize:9,letterSpacing:1,textTransform:'uppercase',padding:'2px 7px',borderRadius:4,background:'var(--bg-card2)',border:'1px solid var(--border)',color:'var(--text-dim)'}}>{o.paymentType}</span></td>
                     <td style={{color:'var(--text-dim)'}}>{o.advancePaid>0?`₹${o.advancePaid}`:'—'}</td>
                     <td>
                       <div style={{display:'flex',alignItems:'center',gap:2,flexWrap:'wrap'}}>
                         <StageBadge stage={o.stage} vendorStages={o.vendorStages||{}}/>
                         <PenaltyTimer vendorPenalty={o.vendorPenalty||{}} vendorStages={o.vendorStages||{}}/>
                       </div>
                       {Object.keys(o.vendorStages||{}).length > 1 && (
                         <div style={{marginTop:3,display:'flex',flexDirection:'column',gap:2}}>
                           {Object.entries(o.vendorStages).map(([v,s])=>(
                             <div key={v} style={{fontSize:9,color:'var(--text-muted)',display:'flex',alignItems:'center',gap:3}}>
                               <span style={{maxWidth:60,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{v.split(' ')[0]}</span>
                               <span className={`badge b-${s}`} style={{fontSize:8,padding:'1px 5px'}}>{s.toUpperCase()}</span>
                               {(o.vendorPenalty||{})[v] && ['confirmed','partial'].includes(s) && (
                                 <PenaltyTimer vendorPenalty={{[v]:(o.vendorPenalty||{})[v]}} vendorStages={{[v]:s}}/>
                               )}
                             </div>
                           ))}
                         </div>
                       )}
                     </td>
                     <td>
                       {o.awb ? (
                         <div>
                           <div style={{fontSize:10,color:dsColor,fontWeight:600}}>{ds||'Dispatched'}</div>
                           <div style={{fontSize:9,color:'var(--text-muted)',fontFamily:'monospace'}}>{o.awb}</div>
                         </div>
                       ) : <span style={{color:'var(--text-muted)',fontSize:11}}>—</span>}
                     </td>
                     <td className="td-mut">{fmtDate(o.date)}</td>
                     <td style={{textAlign:'center',color:'var(--text-muted)',fontSize:11}}>✏</td>
                   </tr>
                   );
                 })}
              </tbody>
            </table>
          </div>
          {!loading && filtered.length > PER && (
            <div className="pager">
              <span className="pager-info">Showing {(cur-1)*PER+1}–{Math.min(cur*PER,filtered.length)} of {filtered.length}</span>
              <div className="pbtns">
                <button className="pbtn" onClick={()=>setPage(p=>Math.max(1,p-1))} disabled={cur===1}>‹</button>
                {Array.from({length:pages},(_,i)=>i+1).filter(p=>p===1||p===pages||Math.abs(p-cur)<=1).reduce((acc,p,i,arr)=>{ if(i>0&&arr[i-1]!==p-1)acc.push('…');acc.push(p);return acc; },[]).map((p,i)=>
                  p==='…'?<span key={`d${i}`} style={{color:'var(--text-muted)',padding:'0 4px',fontSize:12}}>…</span>
                        :<button key={p} className={`pbtn ${cur===p?'cur':''}`} onClick={()=>setPage(p)}>{p}</button>
                )}
                <button className="pbtn" onClick={()=>setPage(p=>Math.min(pages,p+1))} disabled={cur===pages}>›</button>
              </div>
            </div>
          )}
        </div>

        {modal && <OrderModal order={modal} token={token} onClose={()=>setModal(null)} onUpdated={()=>{load();setModal(null);}}/>}
      </div>
    );
  }

  function Vendors({ token }) {
    const [vendors,  setVendors]  = useState([]);
    const [loading,  setLoading]  = useState(true);
    const [editing,  setEditing]  = useState(null);
    const [commVal,  setCommVal]  = useState('');
    const [saving,   setSaving]   = useState(false);
    const [search,   setSearch]   = useState('');
    const [creds,    setCreds]    = useState([]);
    const [generating, setGenerating] = useState(false);
    const [sending,    setSending]    = useState(false);
    const [genResult,  setGenResult]  = useState(null);
    const [resetting,  setResetting]  = useState({});
    const [credMsg,    setCredMsg]    = useState(null);
    const [showPass,   setShowPass]   = useState({});

    const load = ()=>{
      setLoading(true);
      fetch(`${API}/admin/vendors`,{headers:{Authorization:`Bearer ${token}`}})
        .then(r=>r.json()).then(d=>setVendors(d.vendors||[])).catch(()=>{}).finally(()=>setLoading(false));
    };

    const loadCreds = ()=>{
      fetch(`${API}/admin/vendors/credentials`,{headers:{Authorization:`Bearer ${token}`}})
        .then(r=>r.json()).then(d=>setCreds(d.credentials||[])).catch(()=>{});
    };

    useEffect(()=>{ load(); loadCreds(); },[token]);

    const generateCreds = async () => {
      setGenerating(true); setGenResult(null); setCredMsg(null);
      const r = await fetch(`${API}/admin/vendors/generate-credentials`,{method:'POST',headers:{Authorization:`Bearer ${token}`}});
      const d = await r.json();
      setGenerating(false);
      if (d.success) { setGenResult(d.generated); loadCreds(); setCredMsg({type:'success',text:`Generated credentials for ${d.total} vendor${d.total!==1?'s':''}.`}); }
      else setCredMsg({type:'error',text:d.error});
    };

    const sendCredentials = async () => {
      setSending(true); setCredMsg(null);
      const r = await fetch(`${API}/admin/vendors/send-credentials`,{method:'POST',headers:{Authorization:`Bearer ${token}`}});
      const d = await r.json();
      setSending(false);
      if (d.success) setCredMsg({type:'success', text:`Sent to ${d.sent.length} vendor${d.sent.length!==1?'s':''}${d.failed.length?' · '+d.failed.length+' failed':''}`});
      else setCredMsg({type:'error', text: d.error});
    };

    const resetPassword = async name => {
      setResetting(p=>({...p,[name]:true}));
      const r = await fetch(`${API}/admin/vendors/${encodeURIComponent(name)}/reset-password`,{method:'POST',headers:{Authorization:`Bearer ${token}`}});
      const d = await r.json();
      setResetting(p=>({...p,[name]:false}));
      setCredMsg({type: d.success?'success':'error', text: d.success?`Password reset for ${name}`:(d.error||'Error')});
      loadCreds();
    };

    const visible = search ? vendors.filter(v=>v.name.toLowerCase().includes(search.toLowerCase())) : vendors;

    const startEdit = v => { setEditing(v.name); setCommVal(String(v.commission_pct)); };

    const saveComm = async name => {
      setSaving(true);
      await fetch(`${API}/admin/vendors/${encodeURIComponent(name)}/config`,{
        method:'PUT', headers:{'Content-Type':'application/json','Authorization':`Bearer ${token}`},
        body: JSON.stringify({ commission_pct: parseFloat(commVal)||20 }),
      }).catch(()=>{});
      setSaving(false); setEditing(null); load();
    };

    return (
      <div className="page">
        <div className="filters">
          <div className="search-wrap">
            <span className="search-ico">⌕</span>
            <input className="search-input" placeholder="Search vendor…" value={search} onChange={e=>setSearch(e.target.value)}/>
          </div>
          <button className="btn btn-ghost btn-sm" onClick={load} disabled={loading}>{loading?<span className="spin">↻</span>:'↻'} Refresh</button>
          <span className="fcount">{visible.length} vendor{visible.length!==1?'s':''}</span>
        </div>

        <div className="card">
          <div className="card-header"><span className="card-title">Vendors & Commission</span></div>
          <div className="tbl-wrap">
            <table>
              <thead><tr><th>#</th><th>Vendor / Brand</th><th>Commission %</th><th>GST on Commission</th><th>Actions</th></tr></thead>
              <tbody>
                {loading ? Array.from({length:8}).map((_,i)=><SkelRow key={i} cols={5}/>) :
                 visible.length===0 ? (
                   <tr><td colSpan={5}><div className="empty"><div className="empty-icon">🏪</div><div className="empty-title">No vendors found</div></div></td></tr>
                 ) :
                 visible.map((v,i)=>(
                  <tr key={v.name}>
                    <td className="td-mut">{i+1}</td>
                    <td style={{fontWeight:600,color:'var(--text)'}}>{v.name}</td>
                    <td>
                      {editing===v.name ? (
                        <div style={{display:'flex',gap:6,alignItems:'center'}}>
                          <input className="form-input" style={{width:70,padding:'5px 8px'}} type="number" min="0" max="50" step="0.5"
                            value={commVal} onChange={e=>setCommVal(e.target.value)}
                            onKeyDown={e=>e.key==='Enter'&&saveComm(v.name)}
                            autoFocus/>
                          <button className="btn btn-green btn-sm" disabled={saving} onClick={()=>saveComm(v.name)}>Save</button>
                          <button className="btn btn-ghost btn-sm" onClick={()=>setEditing(null)}>✕</button>
                        </div>
                      ) : (
                        <span style={{color:'var(--indigo)',fontWeight:700}}>{v.commission_pct}%</span>
                      )}
                    </td>
                    <td style={{color:'var(--orange)'}}>{(v.commission_pct * 0.18).toFixed(2)}% effective</td>
                    <td>
                      {editing!==v.name && (
                        <button className="btn btn-ghost btn-sm" onClick={()=>startEdit(v)}>✏ Edit Commission</button>
                      )}
                    </td>
                  </tr>
                 ))}
              </tbody>
            </table>
          </div>
        </div>

        <div className="card" style={{background:'var(--indigo-dim)',borderColor:'#3730a3'}}>
          <div style={{padding:16}}>
            <div style={{fontSize:11,color:'var(--indigo)',fontWeight:700,marginBottom:8}}>Commission Logic</div>
            <div style={{fontSize:11,color:'var(--text-dim)',lineHeight:1.7}}>
              <div><strong>COD:</strong> Commission% × Order Value + 18% GST = Vendor Invoice (vendor pays CrosCrow)</div>
              <div><strong>Prepaid:</strong> 10% vendor discount → commission on discounted price. CrosCrow collected full → pays vendor (value − commission − GST)</div>
              <div><strong>Partial:</strong> COD logic, but advance collected is deducted from final payable</div>
              <div><strong>Shipping:</strong> Retained 100% by CrosCrow, commission applies only on product value</div>
            </div>
          </div>
        </div>

        {/* ── Vendor Credentials ── */}
        <div className="card" style={{marginTop:0}}>
          <div className="card-header">
            <div><span className="card-title">🔑 Vendor Login Credentials</span><span className="card-sub" style={{marginLeft:8}}>Username + password per vendor · default: Croscrow@00</span></div>
            <div style={{display:'flex',gap:8}}>
              <button className="btn btn-indigo btn-sm" onClick={generateCreds} disabled={generating}>
                {generating?<><span className="spin">↻</span> Generating…</>:'⚡ Generate for All Vendors'}
              </button>
              <button className="btn btn-green btn-sm" onClick={sendCredentials} disabled={sending||creds.length===0}
                style={{background:'var(--green)',color:'#fff',border:'none'}} title="Send welcome email with credentials to all vendors who have email set">
                {sending?<><span className="spin">↻</span> Sending…</>:'📧 Send Welcome Email'}
              </button>
            </div>
          </div>
          {credMsg && <div style={{margin:'0 16px 12px'}} className={`alert alert-${credMsg.type}`}>{credMsg.type==='success'?'✓':'⚠'} {credMsg.text}</div>}
          {genResult && genResult.length > 0 && (
            <div style={{margin:'0 16px 12px',background:'#052e16',border:'1px solid #10b981',borderRadius:8,padding:14}}>
              <div style={{fontSize:12,fontWeight:700,color:'#10b981',marginBottom:10}}>✓ New credentials generated — share with vendors:</div>
              {genResult.map(g=>(
                <div key={g.vendor_name} style={{display:'flex',gap:12,alignItems:'center',fontSize:12,marginBottom:6,padding:'6px 10px',background:'#0a1a0a',borderRadius:6}}>
                  <span style={{color:'var(--text-muted)',minWidth:140,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{g.vendor_name}</span>
                  <span style={{color:'#a5b4fc',fontFamily:'monospace',fontWeight:700}}>{g.username}</span>
                  <span style={{color:'var(--text-muted)'}}>/</span>
                  <span style={{color:'#fbbf24',fontFamily:'monospace'}}>{g.password}</span>
                </div>
              ))}
            </div>
          )}
          <div className="tbl-wrap">
            <table>
              <thead><tr><th>#</th><th>Vendor</th><th>Username</th><th>Status</th><th>Actions</th></tr></thead>
              <tbody>
                {creds.length===0 ? (
                  <tr><td colSpan={5}><div className="empty"><div className="empty-icon">🔑</div>
                    <div className="empty-title">No credentials yet</div>
                    <div style={{fontSize:11,color:'var(--text-muted)'}}>Click "Generate for All Vendors" to create usernames for every vendor.</div>
                  </div></td></tr>
                ) : creds.map((c,i)=>(
                  <tr key={c.vendor_name}>
                    <td className="td-mut">{i+1}</td>
                    <td style={{fontWeight:600}}>{c.vendor_name}</td>
                    <td>
                      <div style={{display:'flex',alignItems:'center',gap:6}}>
                        <span style={{fontFamily:'monospace',color:'#a5b4fc',fontSize:12}}>{c.username}</span>
                        <button onClick={()=>navigator.clipboard?.writeText(c.username)} title="Copy username"
                          style={{background:'none',border:'none',cursor:'pointer',fontSize:11,color:'var(--text-muted)',padding:'1px 4px'}}>⎘</button>
                      </div>
                    </td>
                    <td>
                      {c.must_change_password
                        ? <span style={{fontSize:10,padding:'2px 8px',borderRadius:10,background:'#1c1208',color:'#f59e0b',border:'1px solid #92400e',fontWeight:700}}>⚠ Default password</span>
                        : <span style={{fontSize:10,padding:'2px 8px',borderRadius:10,background:'#052e16',color:'#10b981',border:'1px solid #065f46',fontWeight:700}}>✓ Password set</span>}
                    </td>
                    <td>
                      <button className="btn btn-ghost btn-sm" disabled={!!resetting[c.vendor_name]} onClick={()=>resetPassword(c.vendor_name)}>
                        {resetting[c.vendor_name]?'…':'↺ Reset Password'}
                      </button>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      </div>
    );
  }

  /* ── Edit Settlement Modal ── */
  function EditSettlementModal({ settlement: init, token, onClose, onSaved }) {
    const [commPct,      setCommPct]      = useState(String(init.custom_commission_pct || ''));
    const [discount,     setDiscount]     = useState(String(init.extra_discount     || ''));
    const [shipping,     setShipping]     = useState(String(init.shipping_adjustment || ''));
    const [extraAdv,     setExtraAdv]     = useState(String(init.extra_advance       || ''));
    const [notes,        setNotes]        = useState(init.invoice_notes || '');
    const [saving,       setSaving]       = useState(false);
    const [msg,          setMsg]          = useState(null);
    const [preview,      setPreview]      = useState(null); // { netPayable, commission, gst }

    // Live preview
    useEffect(()=>{
      const disc  = parseFloat(discount)||0;
      const ship  = parseFloat(shipping)||0;
      const adv   = parseFloat(extraAdv)||0;
      const baseNet = init.net_payable
        + (init.extra_discount||0)
        + (init.extra_advance||0)
        - (init.shipping_adjustment||0);
      const adjusted = parseFloat((baseNet - disc - adv + ship).toFixed(2));
      setPreview({ netPayable: adjusted });
    },[discount, shipping, extraAdv]);

    const save = async () => {
      setSaving(true); setMsg(null);
      try {
        const body = {
          extra_discount:      parseFloat(discount)||0,
          shipping_adjustment: parseFloat(shipping)||0,
          extra_advance:       parseFloat(extraAdv)||0,
          invoice_notes:       notes,
        };
        if (commPct.trim()) body.custom_commission_pct = parseFloat(commPct);
        const r = await fetch(`${API}/admin/settlements/${init.id}/edit`,{
          method:'PUT', headers:{'Content-Type':'application/json','Authorization':`Bearer ${token}`},
          body: JSON.stringify(body),
        });
        const d = await r.json();
        if (!r.ok) throw new Error(d.error);
        setMsg({ type:'success', text:`Saved — New net: ${d.netPayable<0?'CrosCrow pays':'Vendor pays'} ₹${Math.abs(d.netPayable).toFixed(2)}` });
        onSaved();
      } catch(e) { setMsg({ type:'error', text: e.message }); }
      setSaving(false);
    };

    const isCredit = (preview?.netPayable ?? init.net_payable) < 0;

    return (
      <div className="overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
        <div className="modal">
          <div className="modal-header">
            <div>
              <div className="modal-title">Edit Invoice — {init.invoice_no}</div>
              <div style={{fontSize:10,color:'var(--text-muted)',marginTop:3}}>{init.vendor_name} · {fmtDate(init.period_start)} – {fmtDate(init.period_end)}</div>
            </div>
            <button className="modal-close" onClick={onClose}>✕</button>
          </div>

          <div className="modal-body">
            {msg && <div className={`alert alert-${msg.type}`}>{msg.type==='success'?'✓':'⚠'} {msg.text}</div>}

            <div style={{background:'var(--bg-card2)',border:'1px solid var(--border)',borderRadius:8,padding:14,marginBottom:16}}>
              <div className="detail-box-title" style={{marginBottom:12}}>Current Figures</div>
              <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:10,textAlign:'center',fontSize:11}}>
                <div><div style={{color:'var(--text-muted)',fontSize:9,marginBottom:3}}>Orders</div><div style={{fontWeight:700}}>{init.total_orders}</div></div>
                <div><div style={{color:'var(--text-muted)',fontSize:9,marginBottom:3}}>Gross Revenue</div><div style={{color:'var(--cyan)',fontWeight:700}}>{fmtCur(init.gross_revenue)}</div></div>
                <div><div style={{color:'var(--text-muted)',fontSize:9,marginBottom:3}}>Commission</div><div style={{color:'var(--yellow)',fontWeight:700}}>{fmtCur(init.commission)}</div></div>
                <div><div style={{color:'var(--text-muted)',fontSize:9,marginBottom:3}}>GST (18%)</div><div style={{color:'var(--orange)',fontWeight:700}}>{fmtCur(init.gst_amount)}</div></div>
              </div>
            </div>

            <div className="form-grid">
              <div>
                <label className="form-label">Commission % Override</label>
                <input className="form-input" type="number" min="0" max="50" step="0.5" placeholder={`Current: ${init.custom_commission_pct||20}% — blank = no change`} value={commPct} onChange={e=>setCommPct(e.target.value)}/>
                <div style={{fontSize:10,color:'var(--text-muted)',marginTop:4}}>Recalculates all order commissions</div>
              </div>
              <div>
                <label className="form-label">Extra Discount (₹)</label>
                <input className="form-input" type="number" min="0" placeholder="0" value={discount} onChange={e=>setDiscount(e.target.value)}/>
                <div style={{fontSize:10,color:'var(--text-muted)',marginTop:4}}>Reduces vendor's payable / increases CrosCrow's payout</div>
              </div>
              <div>
                <label className="form-label">Shipping Charge Adjustment (₹)</label>
                <input className="form-input" type="number" placeholder="0 (positive adds, negative deducts)" value={shipping} onChange={e=>setShipping(e.target.value)}/>
                <div style={{fontSize:10,color:'var(--text-muted)',marginTop:4}}>Shipping is CrosCrow's — positive = vendor owes more</div>
              </div>
              <div>
                <label className="form-label">Additional Advance / Partial (₹)</label>
                <input className="form-input" type="number" min="0" placeholder="0" value={extraAdv} onChange={e=>setExtraAdv(e.target.value)}/>
                <div style={{fontSize:10,color:'var(--text-muted)',marginTop:4}}>Deducted from net payable (already collected)</div>
              </div>
              <div className="form-full">
                <label className="form-label">Invoice Notes (printed on invoice)</label>
                <input className="form-input" placeholder="e.g. Includes return deduction, special discount applied…" value={notes} onChange={e=>setNotes(e.target.value)}/>
              </div>
            </div>

            {/* Live preview */}
            {preview && (
              <div style={{background: isCredit?'var(--green-dim)':'var(--red-bg)', border:`1px solid ${isCredit?'#1a4731':'#5a1a1a'}`, borderRadius:8, padding:14, marginTop:16, textAlign:'center'}}>
                <div style={{fontSize:9,letterSpacing:2,textTransform:'uppercase',color:'var(--text-muted)',marginBottom:6}}>Adjusted Net Payable</div>
                <div style={{fontSize:24,fontWeight:800,color:isCredit?'var(--green)':'var(--red)'}}>
                  {isCredit?'↑':'↓'} ₹{Math.abs(preview.netPayable).toFixed(2)}
                </div>
                <div style={{fontSize:11,color:'var(--text-muted)',marginTop:4}}>{isCredit?'CrosCrow pays vendor':'Vendor pays CrosCrow'}</div>
              </div>
            )}
          </div>

          <div className="modal-footer">
            <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
            <button className="btn btn-indigo" onClick={save} disabled={saving}>
              {saving ? <><span className="spin">↻</span> Saving…</> : '✓ Save Changes'}
            </button>
          </div>
        </div>
      </div>
    );
  }

  function Settlements({ token }) {
    const [activeTab,   setActiveTab]   = useState('delivered'); // 'delivered' | 'invoices'
    // ── Tab 1: Delivered Orders (real-time) ───────────────────────────────
    const [summary,     setSummary]     = useState(null);
    const [sumLoading,  setSumLoading]  = useState(true);
    const [expandedV,   setExpandedV]   = useState(null);
    // ── Tab 2: Settlement Invoices ─────────────────────────────────────────
    const [settlements, setSettlements] = useState([]);
    const [invLoading,  setInvLoading]  = useState(true);
    const [vendors,     setVendors]     = useState([]);
    const [generating,  setGenerating]  = useState(false);
    const [genVendor,   setGenVendor]   = useState('');
    const [genStart,    setGenStart]    = useState('');
    const [genEnd,      setGenEnd]      = useState('');
    const [genMsg,      setGenMsg]      = useState(null);
    const [invoice,     setInvoice]     = useState(null);
    const [editing,     setEditing]     = useState(null);
    const [confirmDel,  setConfirmDel]  = useState(null);
    const [gstFrom,     setGstFrom]     = useState('');
    const [gstTo,       setGstTo]       = useState('');
    const [gstLoading,  setGstLoading]  = useState(false);
    const [gstMsg,      setGstMsg]      = useState(null);

    const loadSummary = () => {
      setSumLoading(true);
      fetch(`${API}/admin/delivered-summary`,{headers:{Authorization:`Bearer ${token}`}})
        .then(r=>r.json()).then(d=>setSummary(d)).catch(()=>{}).finally(()=>setSumLoading(false));
    };

    const loadInvoices = () => {
      setInvLoading(true);
      Promise.all([
        fetch(`${API}/admin/settlements`,{headers:{Authorization:`Bearer ${token}`}}).then(r=>r.json()),
        fetch(`${API}/admin/vendors`,    {headers:{Authorization:`Bearer ${token}`}}).then(r=>r.json()),
      ]).then(([sd, vd])=>{ setSettlements(sd.settlements||[]); setVendors(vd.vendors||[]); }).catch(()=>{}).finally(()=>setInvLoading(false));
    };

    useEffect(()=>{ loadSummary(); loadInvoices(); },[token]);

    const generate = async () => {
      if(!genVendor||!genStart||!genEnd) { setGenMsg({type:'error',text:'All fields required.'}); return; }
      setGenerating(true); setGenMsg(null);
      try {
        const r = await fetch(`${API}/admin/settlements/generate`,{
          method:'POST', headers:{'Content-Type':'application/json','Authorization':`Bearer ${token}`},
          body: JSON.stringify({ vendor_name: genVendor, period_start: genStart, period_end: genEnd }),
        });
        const d = await r.json();
        if (!r.ok) throw new Error(d.error);
        setGenMsg({ type:'success', text:`Invoice generated! ${d.totalOrders} orders — Net: ₹${Math.abs(d.netPayable).toFixed(2)}` });
        loadInvoices();
      } catch(e) { setGenMsg({ type:'error', text: e.message }); }
      setGenerating(false);
    };

    const markPaid = async id => {
      await fetch(`${API}/admin/settlements/${id}/mark-paid`,{method:'PUT',headers:{Authorization:`Bearer ${token}`}});
      loadInvoices(); loadSummary();
    };

    const deleteSett = async id => {
      await fetch(`${API}/admin/settlements/${id}`,{method:'DELETE',headers:{Authorization:`Bearer ${token}`}});
      setConfirmDel(null); loadInvoices(); loadSummary();
    };

    const viewInvoice = async id => {
      const r = await fetch(`${API}/admin/settlements/${id}`,{headers:{Authorization:`Bearer ${token}`}});
      const d = await r.json();
      setInvoice(d);
    };

    const exportGst = async () => {
      if (!gstFrom || !gstTo) { setGstMsg({ type:'error', text:'Select both From and To dates.' }); return; }
      setGstLoading(true); setGstMsg(null);
      try {
        const url = `${API}/admin/settlements/gst-export?from=${gstFrom}&to=${gstTo}`;
        const r = await fetch(url, { headers:{ Authorization:`Bearer ${token}` } });
        if (!r.ok) { const d = await r.json(); throw new Error(d.error); }
        const blob = await r.blob();
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `CrosCrow_GST_${gstFrom}_to_${gstTo}.csv`;
        a.click();
        URL.revokeObjectURL(a.href);
        setGstMsg({ type:'success', text:'GST sheet downloaded!' });
      } catch(e) { setGstMsg({ type:'error', text: e.message }); }
      setGstLoading(false);
    };

    const t = summary?.totals || {};
    const fmt = n => `₹${Math.abs(n||0).toFixed(2)}`;

    return (
      <div className="page">
        {/* Tab switcher */}
        <div style={{display:'flex',gap:0,marginBottom:20,borderBottom:'2px solid var(--border)'}}>
          {[['delivered','📦 Delivered Orders'],['invoices','🧾 Settlement Invoices']].map(([id,label])=>(
            <button key={id} onClick={()=>setActiveTab(id)}
              style={{padding:'9px 22px',fontSize:12,fontWeight:600,border:'none',background:'transparent',cursor:'pointer',
                color:activeTab===id?'var(--indigo)':'var(--text-muted)',
                borderBottom:activeTab===id?'2px solid var(--indigo)':'2px solid transparent',
                marginBottom:'-2px',transition:'all 0.15s'}}>
              {label}
            </button>
          ))}
        </div>

        {/* ── TAB 1: Delivered Orders ────────────────────────────────────────── */}
        {activeTab==='delivered' && (
          <div>
            {/* Summary stat cards */}
            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(160px,1fr))',gap:12,marginBottom:20}}>
              {[
                {label:'Gross Sales',       value:fmt(t.gross),              color:'indigo'},
                {label:'Prepaid Discount',  value:fmt(t.prepaidDiscount),    color:'yellow'},
                {label:'Commissionable',    value:fmt(t.commissionableSale), color:'text'},
                {label:'Commission',        value:fmt(t.commission),         color:'orange'},
                {label:'GST (18%)',         value:fmt(t.gst),                color:'orange'},
                {label:'Advance Adjusted',  value:fmt(t.advance),            color:'green'},
                {label:'Total Settled',     value:fmt(t.totalSettled),       color:'green'},
                {label:'Pending Settlement',value:fmt(t.pendingSettlement),  color: (t.pendingSettlement||0)<0?'green':'red'},
              ].map(c=>(
                <div key={c.label} className="card" style={{padding:'12px 14px'}}>
                  <div style={{fontSize:9,color:'var(--text-muted)',textTransform:'uppercase',letterSpacing:1,marginBottom:4}}>{c.label}</div>
                  <div style={{fontSize:17,fontWeight:700,color:`var(--${c.color})`}}>{sumLoading?'…':c.value}</div>
                </div>
              ))}
            </div>

            {/* Per-vendor table */}
            <div className="card">
              <div className="card-header">
                <span className="card-title">Per-Vendor Breakdown</span>
                <button className="btn btn-ghost btn-sm" onClick={loadSummary}>↻ Refresh</button>
              </div>
              <div className="tbl-wrap">
                <table>
                  <thead><tr>
                    <th>Vendor</th><th>Orders</th><th>Gross Sales</th><th>Prepaid Disc</th>
                    <th>Commissionable</th><th>Comm%</th><th>Commission</th><th>GST</th>
                    <th>Advance</th><th>Net Payable</th><th>Settled</th><th>Pending</th>
                  </tr></thead>
                  <tbody>
                    {sumLoading ? Array.from({length:5}).map((_,i)=><SkelRow key={i} cols={12}/>) :
                     !summary?.vendors?.length ? (
                       <tr><td colSpan={12}><div className="empty"><div className="empty-icon">📦</div><div className="empty-title">No delivered orders found</div><div className="empty-sub">Orders marked as Delivered will appear here automatically.</div></div></td></tr>
                     ) :
                     summary.vendors.map(v=>{
                       const isPayout = v.netPayable < 0;
                       const isPend   = v.pendingSettlement < 0;
                       return (
                         <tr key={v.vendor} style={{cursor:'pointer'}} onClick={()=>setExpandedV(expandedV===v.vendor?null:v.vendor)}>
                           <td style={{fontWeight:600}}>
                             <span style={{marginRight:6,fontSize:10,color:'var(--text-muted)'}}>{expandedV===v.vendor?'▼':'▶'}</span>
                             {v.vendor}
                           </td>
                           <td>{v.totalOrders}</td>
                           <td>₹{v.gross.toFixed(2)}</td>
                           <td style={{color:'var(--yellow)'}}>{v.prepaidDiscount>0?`₹${v.prepaidDiscount.toFixed(2)}`:'—'}</td>
                           <td>₹{v.commissionableSale.toFixed(2)}</td>
                           <td style={{color:'var(--indigo)'}}>{v.commissionPct}%</td>
                           <td style={{color:'var(--orange)'}}>₹{v.commission.toFixed(2)}</td>
                           <td style={{color:'var(--orange)'}}>₹{v.gst.toFixed(2)}</td>
                           <td style={{color:'var(--green)'}}>{v.advance>0?`₹${v.advance.toFixed(2)}`:'—'}</td>
                           <td>
                             <span style={{color:isPayout?'var(--green)':'var(--red)',fontWeight:700}}>
                               {isPayout?'↑ ':'↓ '}₹{Math.abs(v.netPayable).toFixed(2)}
                             </span>
                             <div style={{fontSize:9,color:'var(--text-muted)',marginTop:1}}>{isPayout?'CC pays':'Vendor pays'}</div>
                           </td>
                           <td style={{color:'var(--green)'}}>₹{v.totalSettled.toFixed(2)}</td>
                           <td>
                             <span style={{color:isPend?'var(--green)':'var(--red)',fontWeight:600}}>
                               {isPend?'↑ ':'↓ '}₹{Math.abs(v.pendingSettlement).toFixed(2)}
                             </span>
                           </td>
                         </tr>
                       );
                     })}

                </table>
              </div>
            </div>

            <div style={{marginTop:10,fontSize:10,color:'var(--text-muted)',textAlign:'center'}}>
