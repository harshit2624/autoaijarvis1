      setLoading(true);
      fetch(`${API}/admin/orders?created_at_min=2000-01-01`,{headers:{Authorization:`Bearer ${token}`}})
        .then(r=>r.json()).then(d=>setOrders(d.orders||[])).catch(()=>{}).finally(()=>setLoading(false));
    },[token]);

    useEffect(()=>{ load(); },[load]);
    useEffect(()=>{
      if(!showTagDrop) return;
      const close = ()=>setShowTagDrop(false);
      document.addEventListener('mousedown', close);
      return ()=>document.removeEventListener('mousedown', close);
    },[showTagDrop]);

    const toggleSelect = id => setSelected(s => { const n=new Set(s); n.has(id)?n.delete(id):n.add(id); return n; });
    const toggleAll    = () => setSelected(s => s.size===rows.length ? new Set() : new Set(rows.map(o=>o.shopifyId)));
    const clearSelect  = () => { setSelected(new Set()); setBulkMsg(null); };

    const applyBulk = async () => {
      if (!bulkStage && !bulkAddTag.trim() && !bulkRmTag.trim()) { setBulkMsg({type:'error',text:'Select a stage or enter tags to add/remove.'}); return; }
      setBulkBusy(true); setBulkMsg(null);
      const addTags = bulkAddTag.split(',').map(t=>t.trim()).filter(Boolean);
      const rmTags  = bulkRmTag.split(',').map(t=>t.trim()).filter(Boolean);
      try {
        const r = await fetch(`${API}/admin/orders/bulk-update`, {
          method:'POST', headers:{'Content-Type':'application/json','Authorization':`Bearer ${token}`},
          body: JSON.stringify({ order_ids:[...selected], stage:bulkStage||undefined, add_tags:addTags, remove_tags:rmTags }),
        });
        const d = await r.json();
        if (!r.ok) throw new Error(d.error);
        const tagNote = d.stageTag ? ` · tag "${d.stageTag}" added` : '';
        setBulkMsg({type:'success',text:`Updated ${d.updated.length} order${d.updated.length!==1?'s':''}${tagNote}${d.failed.length?' · '+d.failed.length+' failed':''}`});
        clearSelect(); setBulkStage(''); setBulkAddTag(''); setBulkRmTag('');
        load();
      } catch(e) { setBulkMsg({type:'error',text:e.message}); }
      setBulkBusy(false);
    };

    const syncFulfillment = async () => {
      setSyncing(true); setSyncMsg(null);
      try {
        const r = await fetch(`${API}/admin/orders/sync-fulfillment`,{method:'POST',headers:{Authorization:`Bearer ${token}`}});
        const d = await r.json();
        if (!r.ok) throw new Error(d.error);
        setSyncMsg(`✓ Synced — ${d.updated} vendor stage${d.updated!==1?'s':''} updated from Shopify`);
        load();
      } catch(e) { setSyncMsg('⚠ ' + e.message); }
      setSyncing(false);
    };

    const orderMatchesStage = (o, s) => {
      if (s === 'all') return true;
      if (o.stage === s) return true;
      const vendorStageValues = Object.values(o.vendorStages||{});
      const isMultiVendor = vendorStageValues.length > 1;
      // For single-vendor orders: don't match 'ready' if overall stage is already past ready
      // (prevents delivered single-vendor orders appearing in Ready to Ship)
      if (!isMultiVendor) {
        const BEYOND_READY = ['transit','ofd','delivered','rto','cancelled','misc'];
        if (s === 'ready' && BEYOND_READY.includes(o.stage)) return false;
      }
      // For multi-vendor orders: always check individual vendor stages
      return vendorStageValues.includes(s);
    };

    // Period-filtered base (used for tab counts too)
    const periodOrders = useMemo(()=>{
      if(!period || !period.from) return orders;
      const from = new Date(period.from+'T00:00:00');
      const to   = new Date(period.to+'T23:59:59');
      return orders.filter(o => { const d=new Date(o.date); return d>=from && d<=to; });
    },[orders,period]);

    const allVendorNames = useMemo(()=>{
      const s = new Set();
      orders.forEach(o=>(o.vendors||[]).forEach(v=>s.add(v)));
      return [...s].sort();
    },[orders]);

    const allOrderTags = useMemo(()=>{
      const s = new Set();
      periodOrders.forEach(o=>(o.tags||'').split(',').map(t=>t.trim()).filter(Boolean).forEach(t=>s.add(t)));
      return [...s].sort();
    },[periodOrders]);

    const filtered = useMemo(()=>{
      let l=[...periodOrders];
      if(stage && stage!=='all') l=l.filter(o=>orderMatchesStage(o,stage));
      if(search.trim()){const q=search.toLowerCase(); l=l.filter(o=>o.id.toLowerCase().includes(q)||o.customer.toLowerCase().includes(q)||(o.vendors||[]).some(v=>v.toLowerCase().includes(q)));}
      if(filterVendor!=='all') l=l.filter(o=>(o.vendors||[]).includes(filterVendor));
      if(filterPayment==='prepaid') l=l.filter(o=>o.paymentType==='prepaid');
      if(filterPayment==='cod')     l=l.filter(o=>o.paymentType!=='prepaid' && !(o.advancePaid>0));
      if(filterPayment==='advance') l=l.filter(o=>o.advancePaid>0);
      if(filterTags.size>0){
        const orderTags = o => new Set((o.tags||'').split(',').map(t=>t.trim()).filter(Boolean));
        l=l.filter(o=>{ const ot=orderTags(o); return [...filterTags].every(t=>ot.has(t)); });
      }
      return l;
    },[periodOrders,stage,search,filterVendor,filterPayment,filterTags]);

    const pages = Math.max(1,Math.ceil(filtered.length/PER));
    const cur   = Math.min(page,pages);
    const rows  = filtered.slice((cur-1)*PER, cur*PER);

    const isMobile = window.innerWidth <= 768;

    const groupByDate = (list) => {
      const groups = []; let lastLabel = null;
      list.forEach(o => {
        const d = new Date(o.date);
        const today = new Date(); today.setHours(0,0,0,0);
        const yesterday = new Date(today); yesterday.setDate(today.getDate()-1);
        const label = d >= today ? 'Today' : d >= yesterday ? 'Yesterday' : d.toLocaleDateString('en-IN',{day:'numeric',month:'short'});
        if (label !== lastLabel) { groups.push({ label, orders:[] }); lastLabel = label; }
        groups[groups.length-1].orders.push(o);
      });
      return groups;
    };

    const stageColors = { new:'var(--indigo)',confirmed:'var(--cyan)',ready:'var(--teal)',pickup:'var(--yellow)',transit:'var(--orange)',ofd:'var(--blue)',delivered:'var(--green)',hold:'var(--purple)',rto:'var(--red)',cancelled:'var(--red)',partial:'var(--yellow)',misc:'var(--gray)'};

    const MobileOrderRow = ({ o }) => {
      const timeStr = new Date(o.date).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
      const stageColor = stageColors[o.stage||'new'] || 'var(--indigo)';
      const isSelected = selected.has(o.shopifyId);
      const ds = o.deliveryStatus;
      const dsColor = ds==='Delivered'?'#10b981':ds&&/transit|shipped/i.test(ds)?'#06b6d4':ds&&/rto|return/i.test(ds)?'#ef4444':ds?'#f59e0b':'var(--text-muted)';
      return (
        <div style={{padding:'13px 14px',borderBottom:'1px solid var(--border)',display:'flex',gap:10,cursor:'pointer',background:isSelected?'rgba(99,102,241,0.08)':undefined}}
          onClick={e=>{ if(e.target.type==='checkbox') return; setModal(o); }}>
          <div style={{paddingTop:2}} onClick={e=>{ e.stopPropagation(); toggleSelect(o.shopifyId); }}>
            <input type="checkbox" style={{accentColor:'var(--indigo)',width:14,height:14,cursor:'pointer'}} checked={isSelected} onChange={()=>toggleSelect(o.shopifyId)}/>
          </div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:3}}>
              <span style={{fontSize:16,fontWeight:800,color:'var(--text)',letterSpacing:0.5}}>{o.id}</span>
              <span style={{fontSize:15,fontWeight:700,color:'var(--text)',flexShrink:0,marginLeft:8}}>{fmtCur(o.orderValue)}</span>
            </div>
            <div style={{fontSize:12,color:'var(--text-muted)',marginBottom:6}}>
              {o.customer||'Guest'} &bull; {timeStr}
              {(o.vendors||[]).length>0 && <span style={{marginLeft:6,color:'var(--indigo)',fontSize:11}}>{(o.vendors||[]).join(', ')}</span>}
            </div>
            <div style={{display:'flex',alignItems:'center',gap:5,flexWrap:'wrap'}}>
              <span style={{fontSize:11,fontWeight:700,padding:'2px 8px',borderRadius:20,background:`color-mix(in srgb, ${stageColor} 18%, transparent)`,color:stageColor,border:`1px solid color-mix(in srgb, ${stageColor} 40%, transparent)`}}>
                {(o.stage||'new').charAt(0).toUpperCase()+(o.stage||'new').slice(1)}
              </span>
              <span style={{fontSize:11,padding:'2px 8px',borderRadius:20,
                background:o.paymentType==='prepaid'?'rgba(16,185,129,0.15)':'rgba(245,158,11,0.15)',
                color:o.paymentType==='prepaid'?'#10b981':'#f59e0b',
                border:`1px solid ${o.paymentType==='prepaid'?'rgba(16,185,129,0.3)':'rgba(245,158,11,0.3)'}`}}>
                {o.paymentType==='prepaid'?'Prepaid':'COD'}{o.advancePaid>0?` +₹${o.advancePaid} adv`:''}
              </span>
              
              <PenaltyTimer vendorPenalty={o.vendorPenalty||{}} vendorStages={o.vendorStages||{}}/>
              <PenaltyBadge triggered={Object.values(o.vendorPenalty||{}).some(p=>p.penaltyTriggered>0)} confirmedAmount={Object.values(o.confirmedPenalties||{}).reduce((s,v)=>s+v,0)}/>
              {o.ccStock&&<span style={{fontSize:9,padding:'2px 6px',borderRadius:4,background:'rgba(251,191,36,0.15)',border:'1px solid rgba(251,191,36,0.5)',color:'#fbbf24',fontWeight:700}}>🏬 CC Stock</span>}
            </div>
            {o.awb && <div style={{fontSize:10,color:dsColor,marginTop:4,fontWeight:600}}>{ds||'Dispatched'} · {o.awb}</div>}
            {Object.keys(o.vendorStages||{}).length>1 && (
              <div style={{display:'flex',gap:4,marginTop:5,flexWrap:'wrap'}}>
                {Object.entries(o.vendorStages).map(([v,s])=>{
                  const c = stageColors[s] || 'var(--text-muted)';
                  return (
                    <span key={v} style={{fontSize:10,padding:'1px 6px',borderRadius:10,background:`color-mix(in srgb, ${c} 18%, transparent)`,color:c,border:`1px solid color-mix(in srgb, ${c} 40%, transparent)`}}>
                      {v.split(' ')[0]}: {s}
                    </span>
                  );
                })}
              </div>
            )}
          </div>
        </div>
      );
    };

    return (
      <div className="page" style={{padding: isMobile?'0':undefined}}>

        {/* Sticky header: search + stage tabs */}
        <div style={{position: isMobile?'sticky':'static', top: isMobile?54:undefined, zIndex:50,
          background:'var(--bg-card)', borderBottom:'1px solid var(--border)',
          padding: isMobile?'10px 12px 8px':'0 0 12px'}}>
          <div style={{display:'flex',gap:8,marginBottom:8,alignItems:'center'}}>
            <div className="search-wrap" style={{flex:1}}>
              <span className="search-ico">⌕</span>
              <input className="search-input" placeholder="Search order, customer, vendor…" value={search} onChange={e=>{setSearch(e.target.value);setPage(1);}}/>
            </div>
            {!isMobile && <><PeriodPicker period={period} onChange={p=>{setPeriod(p);setPage(1);}}/>
              {period && <button className="btn btn-ghost btn-sm" onClick={()=>{setPeriod(null);setPage(1);}} style={{fontSize:10,padding:'4px 8px'}}>✕</button>}
              <button className="btn btn-ghost btn-sm" onClick={load} disabled={loading}>{loading?<span className="spin">↻</span>:'↻'} Refresh</button>
              <button className="btn btn-ghost btn-sm" onClick={syncFulfillment} disabled={syncing} style={{color:'var(--cyan)',borderColor:'var(--cyan)'}}>
                {syncing?<><span className="spin">↻</span> Syncing…</>:'⟳ Sync'}
              </button></>}
            {isMobile && <button className="btn btn-ghost btn-sm" onClick={load} disabled={loading} style={{flexShrink:0}}>{loading?<span className="spin">↻</span>:'↻'}</button>}
          </div>
          {/* Stage pills — horizontal scroll */}
          <div style={{display:'flex',gap:5,overflowX:'auto',WebkitOverflowScrolling:'touch',scrollbarWidth:'none',paddingBottom:2}}>
            {STAGES.map(s=>{
              const baseFiltered = periodOrders.filter(o=>{
                if(filterVendor!=='all' && !(o.vendors||[]).includes(filterVendor)) return false;
                if(filterPayment==='prepaid' && o.paymentType!=='prepaid') return false;
                if(filterPayment==='cod' && (o.paymentType==='prepaid'||o.advancePaid>0)) return false;
                if(filterPayment==='advance' && !(o.advancePaid>0)) return false;
                if(filterTags.size>0){ const ot=new Set((o.tags||'').split(',').map(t=>t.trim()).filter(Boolean)); if(![...filterTags].every(t=>ot.has(t))) return false; }
                return true;
              });
              const count = s.id==='all'?baseFiltered.length:baseFiltered.filter(o=>orderMatchesStage(o,s.id)).length;
              return (
                <button key={s.id} onClick={()=>{setStage(s.id);setPage(1);}} style={{
                  flexShrink:0,padding:'5px 11px',borderRadius:20,border:'none',cursor:'pointer',
                  fontSize:12,fontWeight:600,whiteSpace:'nowrap',fontFamily:'var(--font-family)',
                  background:stage===s.id?'var(--indigo)':'var(--bg-card2)',
                  color:stage===s.id?'#fff':'var(--text-muted)',transition:'all 0.15s',
                }}>
                  {s.label}{count>0?` (${count})`:''}
                </button>
              );
            })}
          </div>
          {/* Extra filters row */}
          <div style={{display:'flex',alignItems:'center',gap:8,marginTop:8,flexWrap:'wrap'}}>
            {/* Vendor filter */}
            <select style={{fontSize:11,padding:'4px 8px',background:'var(--bg-card2)',border:'1px solid var(--border)',borderRadius:6,color:filterVendor!=='all'?'var(--indigo)':'var(--text-muted)',fontFamily:'var(--font-family)',cursor:'pointer'}}
              value={filterVendor} onChange={e=>{setFilterVendor(e.target.value);setPage(1);}}>
              <option value="all">All Vendors</option>
              {allVendorNames.map(v=><option key={v} value={v}>{v}</option>)}
            </select>
            {/* Tag filter */}
            <div style={{position:'relative'}}>
              <button onClick={()=>{ setShowTagDrop(v=>!v); setTagSearch(''); }}
                style={{fontSize:11,padding:'4px 10px',borderRadius:6,border:`1px solid ${filterTags.size>0?'var(--indigo)':'var(--border)'}`,background:'var(--bg-card2)',color:filterTags.size>0?'var(--indigo)':'var(--text-muted)',cursor:'pointer',fontFamily:'var(--font-family)',display:'flex',alignItems:'center',gap:5}}>
                🏷 Tags{filterTags.size>0?` (${filterTags.size})`:''}
                <span style={{fontSize:9}}>{showTagDrop?'▲':'▼'}</span>
              </button>
              {showTagDrop && (
                <div style={{position:'absolute',top:'calc(100% + 4px)',left:0,background:'#0d1f2d',border:'1px solid var(--indigo)',borderRadius:8,zIndex:9999,width:240,boxShadow:'0 12px 40px #000000aa'}}
                  onMouseDown={e=>e.stopPropagation()}>
                  <div style={{padding:'8px 10px',borderBottom:'1px solid var(--border)'}}>
                    <input autoFocus placeholder="Search tags…" value={tagSearch} onChange={e=>setTagSearch(e.target.value)}
                      style={{width:'100%',background:'var(--bg-card)',border:'1px solid var(--border)',borderRadius:5,padding:'4px 8px',fontSize:11,color:'var(--text)',outline:'none',boxSizing:'border-box'}}/>
                  </div>
                  {filterTags.size>0 && (
                    <div style={{padding:'6px 10px',borderBottom:'1px solid var(--border)',display:'flex',gap:4,flexWrap:'wrap'}}>
                      {[...filterTags].map(t=>(
                        <span key={t} style={{fontSize:10,padding:'2px 7px',borderRadius:20,background:'rgba(99,102,241,0.2)',color:'var(--indigo)',border:'1px solid rgba(99,102,241,0.4)',cursor:'pointer'}}
                          onClick={()=>setFilterTags(s=>{const n=new Set(s);n.delete(t);return n;})}>
                          {t} ✕
                        </span>
                      ))}
                    </div>
                  )}
                  <div style={{maxHeight:220,overflowY:'auto'}}>
                    {allOrderTags.filter(t=>t.toLowerCase().includes(tagSearch.toLowerCase())).map(t=>(
                      <div key={t} onClick={()=>{setFilterTags(s=>{const n=new Set(s);n.has(t)?n.delete(t):n.add(t);return n;});setPage(1);}}
                        style={{padding:'8px 12px',cursor:'pointer',fontSize:12,color:filterTags.has(t)?'var(--indigo)':'var(--text)',borderBottom:'1px solid #1a3040',display:'flex',alignItems:'center',gap:8,background:filterTags.has(t)?'rgba(99,102,241,0.08)':'transparent'}}
                        onMouseEnter={e=>e.currentTarget.style.background=filterTags.has(t)?'rgba(99,102,241,0.12)':'#1a3a50'}
                        onMouseLeave={e=>e.currentTarget.style.background=filterTags.has(t)?'rgba(99,102,241,0.08)':'transparent'}>
                        <span style={{width:14,height:14,borderRadius:3,border:`2px solid ${filterTags.has(t)?'var(--indigo)':'var(--border)'}`,background:filterTags.has(t)?'var(--indigo)':'transparent',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,fontSize:9,color:'#fff'}}>
                          {filterTags.has(t)?'✓':''}
                        </span>
                        {t}
                      </div>
                    ))}
                    {allOrderTags.filter(t=>t.toLowerCase().includes(tagSearch.toLowerCase())).length===0 && (
                      <div style={{padding:'12px',fontSize:11,color:'var(--text-muted)',textAlign:'center'}}>No tags found</div>
                    )}
                  </div>
                  {filterTags.size>0 && (
                    <div style={{padding:'6px 10px',borderTop:'1px solid var(--border)'}}>
                      <button onClick={()=>{setFilterTags(new Set());setPage(1);}} style={{fontSize:10,padding:'3px 8px',borderRadius:4,border:'1px solid var(--border)',background:'transparent',color:'var(--red)',cursor:'pointer',width:'100%'}}>Clear tag filters</button>
                    </div>
                  )}
                </div>
              )}
            </div>
            {/* Payment filter */}
            {['all','prepaid','cod','advance'].map(p=>(
              <button key={p} onClick={()=>{setFilterPayment(p);setPage(1);}} style={{
                padding:'4px 10px',borderRadius:20,border:'none',cursor:'pointer',
                fontSize:11,fontWeight:600,fontFamily:'var(--font-family)',
                background: filterPayment===p ? (p==='prepaid'?'#10b981':p==='cod'?'#f59e0b':p==='advance'?'#a78bfa':'var(--indigo)') : 'var(--bg-card2)',
                color: filterPayment===p ? (p==='all'?'#fff':'#000') : 'var(--text-muted)',
                transition:'all 0.15s',
              }}>
                {p==='all'?'All Payments':p==='prepaid'?'Prepaid':p==='cod'?'COD':'Advance'}
              </button>
            ))}
            {(filterVendor!=='all'||filterPayment!=='all'||filterTags.size>0) && (
              <button onClick={()=>{setFilterVendor('all');setFilterPayment('all');setFilterTags(new Set());setShowTagDrop(false);setPage(1);}} style={{fontSize:10,padding:'3px 8px',borderRadius:4,border:'1px solid var(--border)',background:'transparent',color:'var(--red)',cursor:'pointer'}}>✕ Clear</button>
            )}
            {!isMobile && <><span className="fcount" style={{marginLeft:'auto'}}>{filtered.length} order{filtered.length!==1?'s':''}</span>
            {syncMsg && <span style={{fontSize:10,color:syncMsg.startsWith('✓')?'var(--green)':'var(--red)',fontWeight:600}}>{syncMsg}</span>}
            <label style={{display:'flex',alignItems:'center',gap:6,cursor:'pointer',fontSize:11,color:'var(--text-muted)',userSelect:'none'}}>
              <input type="checkbox" checked={showTags} onChange={e=>setShowTags(e.target.checked)} style={{accentColor:'var(--indigo)',width:13,height:13}}/>Show Tags
            </label></>}
          </div>
        </div>

        {/* Bulk action bar */}
        {selected.size > 0 && (
          <div style={{position:'sticky',top: isMobile?108:54,zIndex:19,background:'#1a1a2e',border:'1px solid var(--indigo)',borderRadius: isMobile?0:8,padding:'10px 14px',marginBottom: isMobile?0:10,display:'flex',alignItems:'center',gap:8,flexWrap:'wrap',boxShadow:'0 4px 20px rgba(99,102,241,0.2)'}}>
            <span style={{fontSize:12,fontWeight:700,color:'var(--indigo)',whiteSpace:'nowrap'}}>{selected.size} selected</span>
            <select className="form-select" style={{fontSize:11,padding:'5px 8px',flex:'0 0 140px'}} value={bulkStage} onChange={e=>setBulkStage(e.target.value)}>
              <option value="">Set stage…</option>
              {['new','confirmed','partial','ready','pickup','transit','delivered','rto','hold','cancelled','misc'].map(s=><option key={s} value={s}>{s==='misc'?'Miscellaneous':s}</option>)}
            </select>
            {!isMobile && <>
              <input className="form-input" style={{fontSize:11,padding:'5px 8px',flex:'1 1 130px',minWidth:100}} placeholder="Add tags" value={bulkAddTag} onChange={e=>setBulkAddTag(e.target.value)}/>
              <input className="form-input" style={{fontSize:11,padding:'5px 8px',flex:'1 1 130px',minWidth:100}} placeholder="Remove tags" value={bulkRmTag} onChange={e=>setBulkRmTag(e.target.value)}/>
            </>}
            <button className="btn btn-indigo btn-sm" onClick={applyBulk} disabled={bulkBusy}>{bulkBusy?<><span className="spin">↻</span> …</>:'✓ Apply'}</button>
            <button className="btn btn-ghost btn-sm" onClick={clearSelect}>✕</button>
            {bulkMsg && <span style={{fontSize:11,color:bulkMsg.type==='success'?'var(--green)':'var(--red)',fontWeight:600}}>{bulkMsg.type==='success'?'✓':'⚠'} {bulkMsg.text}</span>}
          </div>
        )}

        {/* Mobile list */}
        {isMobile ? (
          <div style={{background:'var(--bg-card)'}}>
            {loading ? Array.from({length:7}).map((_,i)=>(
              <div key={i} style={{padding:'14px',borderBottom:'1px solid var(--border)'}}>
                <div className="skel" style={{height:14,width:'35%',marginBottom:8}}/>
                <div className="skel" style={{height:11,width:'55%',marginBottom:8}}/>
                <div style={{display:'flex',gap:6}}><div className="skel" style={{height:20,width:70,borderRadius:20}}/><div className="skel" style={{height:20,width:50,borderRadius:20}}/></div>
              </div>
            )) : rows.length===0 ? (
              <div className="empty" style={{padding:40}}><div className="empty-icon">📦</div><div className="empty-title">No orders found</div></div>
            ) : groupByDate(rows).map(group=>(
              <div key={group.label}>
                <div style={{padding:'7px 14px',fontSize:11,fontWeight:700,color:'var(--text-muted)',letterSpacing:1,background:'var(--bg)',borderBottom:'1px solid var(--border)',textTransform:'uppercase'}}>{group.label}</div>
                {group.orders.map(o=><MobileOrderRow key={o.id} o={o}/>)}
              </div>
            ))}
            {!loading && filtered.length>PER && (
              <div style={{display:'flex',justifyContent:'space-between',padding:'14px',borderTop:'1px solid var(--border)'}}>
                <button className="btn btn-ghost btn-sm" onClick={()=>setPage(p=>Math.max(1,p-1))} disabled={cur===1}>‹ Prev</button>
                <span style={{fontSize:11,color:'var(--text-muted)',alignSelf:'center'}}>{cur} / {pages}</span>
                <button className="btn btn-ghost btn-sm" onClick={()=>setPage(p=>Math.min(pages,p+1))} disabled={cur===pages}>Next ›</button>
              </div>
            )}
          </div>
        ) : (
          /* Desktop table */
          <div className="card">
            <div className="tbl-wrap">
              <table>
                <thead><tr>
                  <th style={{width:32,paddingLeft:8}}>
                    <input type="checkbox" style={{accentColor:'var(--indigo)',width:13,height:13,cursor:'pointer'}}
                      checked={rows.length>0&&selected.size===rows.length}
                      ref={el=>{ if(el) el.indeterminate=selected.size>0&&selected.size<rows.length; }}
                      onChange={toggleAll}/>
                  </th>
                  <th>#</th><th>Order</th><th>Customer</th><th>Vendors</th>
                  <th>Value</th><th>Type</th><th>Advance</th><th>Stage</th><th>Delivery</th><th>Date</th><th/>
                </tr></thead>
                <tbody>
                  {loading ? Array.from({length:10}).map((_,i)=><SkelRow key={i} cols={12}/>) :
                   rows.length===0 ? <tr><td colSpan={12}><div className="empty"><div className="empty-icon">📦</div><div className="empty-title">No orders found</div></div></td></tr> :
                   rows.map((o,i)=>{
                     const ds=o.deliveryStatus; const isSelected=selected.has(o.shopifyId);
                     const dsColor=ds==='Delivered'?'#10b981':ds&&ds.toLowerCase().includes('transit')?'#06b6d4':ds&&(ds.toLowerCase().includes('rto')||ds.toLowerCase().includes('return'))?'#f87171':ds?'#fbbf24':'var(--text-muted)';
                     const anyPenaltyTriggered = Object.values(o.vendorPenalty||{}).some(p=>p.penaltyTriggered>0);
                     const totalConfirmedPenalty = Object.values(o.confirmedPenalties||{}).reduce((s,v)=>s+v,0);
                     return (
                       <tr key={o.id} style={{cursor:'pointer',background:isSelected?'rgba(99,102,241,0.07)':'',outline:isSelected?'1px solid rgba(99,102,241,0.3)':''}}
                         onClick={e=>{ if(e.target.type==='checkbox') return; setModal(o); }}>
                         <td style={{paddingLeft:8}} onClick={e=>{ e.stopPropagation(); toggleSelect(o.shopifyId); }}>
                           <input type="checkbox" style={{accentColor:'var(--indigo)',width:13,height:13,cursor:'pointer'}} checked={isSelected} onChange={()=>toggleSelect(o.shopifyId)}/>
                         </td>
                         <td className="td-mut">{(cur-1)*PER+i+1}</td>
                         <td><div className="td-id">{o.id}</div>{showTags && o.tags && o.tags.split(',').map(t=>t.trim()).filter(Boolean).map(t=>(<span key={t} style={{display:'inline-block',fontSize:9,padding:'1px 5px',borderRadius:3,background:'#1a2a3a',border:'1px solid #2a4a6a',color:'#6fa8d0',marginTop:2,marginRight:2}}>{t}</span>))}</td>
                         <td><div style={{display:'flex',alignItems:'center',gap:7}}><div style={{width:22,height:22,borderRadius:'50%',background:'var(--bg-card2)',border:'1px solid var(--border)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:8,fontWeight:700,color:'var(--indigo)',flexShrink:0}}>{(o.customer||'G').split(' ').map(x=>x[0]).join('').toUpperCase().slice(0,2)}</div><div><div style={{fontSize:12}}>{o.customer}</div>{o.email&&<div style={{fontSize:10,color:'var(--text-muted)'}}>{o.email}</div>}</div></div></td>
                         <td style={{color:'var(--text-dim)',fontSize:11,maxWidth:120,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{(o.vendors||[]).join(', ')||'—'}</td>
                         <td className="td-amt">{fmtCur(o.orderValue)}</td>
                         <td><span style={{fontSize:9,letterSpacing:1,textTransform:'uppercase',padding:'2px 7px',borderRadius:4,background:'var(--bg-card2)',border:'1px solid var(--border)',color:'var(--text-dim)'}}>{o.paymentType}</span></td>
                         <td style={{color:'var(--text-dim)'}}>{o.advancePaid>0?`₹${o.advancePaid}`:'—'}</td>
                         <td>
                           <div style={{display:'flex',alignItems:'center',gap:2,flexWrap:'wrap'}}><StageBadge stage={o.stage} vendorStages={o.vendorStages||{}}/><PenaltyTimer vendorPenalty={o.vendorPenalty||{}} vendorStages={o.vendorStages||{}}/><PenaltyBadge triggered={anyPenaltyTriggered} confirmedAmount={totalConfirmedPenalty}/>{o.ccStock&&<span title={o.ccStock.map(s=>`${s.product_title}/${s.variant_title} (${s.quantity})`).join(', ')} style={{fontSize:9,padding:'2px 6px',borderRadius:4,background:'rgba(251,191,36,0.15)',border:'1px solid rgba(251,191,36,0.5)',color:'#fbbf24',fontWeight:700,cursor:'default'}}>🏬 CC Stock</span>}</div>
                           {Object.keys(o.vendorStages||{}).length>1&&<div style={{marginTop:3,display:'flex',flexDirection:'column',gap:2}}>{Object.entries(o.vendorStages).map(([v,s])=>(<div key={v} style={{fontSize:9,color:'var(--text-muted)',display:'flex',alignItems:'center',gap:3}}><span style={{maxWidth:60,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{v.split(' ')[0]}</span><span className={`badge b-${s}`} style={{fontSize:8,padding:'1px 5px'}}>{s.toUpperCase()}</span>{(o.vendorPenalty||{})[v]&&['confirmed','partial'].includes(s)&&<PenaltyTimer vendorPenalty={{[v]:(o.vendorPenalty||{})[v]}} vendorStages={{[v]:s}}/>}</div>))}</div>}
                         </td>
                         <td>{o.awb?<div><div style={{fontSize:10,color:dsColor,fontWeight:600}}>{ds||'Dispatched'}</div><div style={{fontSize:9,color:'var(--text-muted)',fontFamily:'monospace'}}>{o.awb}</div></div>:<span style={{color:'var(--text-muted)',fontSize:11}}>—</span>}</td>
                         <td className="td-mut">
                           <div>{fmtDate(o.date)}</div>
                           {o.settlementStatus==='paid'    && <span style={{fontSize:9,padding:'1px 5px',borderRadius:3,background:'rgba(16,185,129,0.12)',color:'#10b981',fontWeight:700,letterSpacing:0.3}}>✓ SETTLED</span>}
                           {o.settlementStatus==='pending' && <span style={{fontSize:9,padding:'1px 5px',borderRadius:3,background:'rgba(245,158,11,0.12)',color:'#f59e0b',fontWeight:700,letterSpacing:0.3}}>INV · PENDING</span>}
                         </td>
                         <td style={{textAlign:'center',color:'var(--text-muted)',fontSize:11}}>✏</td>
                       </tr>
                     );
                   })}
                </tbody>
              </table>
            </div>
            {!loading && filtered.length>PER && (
              <div className="pager">
                <span className="pager-info">Showing {(cur-1)*PER+1}–{Math.min(cur*PER,filtered.length)} of {filtered.length}</span>
                <div className="pbtns">
                  <button className="pbtn" onClick={()=>setPage(p=>Math.max(1,p-1))} disabled={cur===1}>‹</button>
                  {Array.from({length:pages},(_,i)=>i+1).filter(p=>p===1||p===pages||Math.abs(p-cur)<=1).reduce((acc,p,i,arr)=>{ if(i>0&&arr[i-1]!==p-1)acc.push('…');acc.push(p);return acc; },[]).map((p,i)=>
                    p==='…'?<span key={`d${i}`} style={{color:'var(--text-muted)',padding:'0 4px',fontSize:12}}>…</span>:<button key={p} className={`pbtn ${cur===p?'cur':''}`} onClick={()=>setPage(p)}>{p}</button>
                  )}
                  <button className="pbtn" onClick={()=>setPage(p=>Math.min(pages,p+1))} disabled={cur===pages}>›</button>
                </div>
              </div>
            )}
          </div>
        )}

        {modal && <OrderModal order={modal} token={token} onClose={()=>setModal(null)} onUpdated={()=>{load();setModal(null);}}/>}
      </div>
    );
  }

  /* ══════════════════════════════════
     RETURN REQUESTS VIEW
  ══════════════════════════════════ */
  function RRShipmentStatus({ awb, courier, direction, requestId, trackingStatus }) {
    const [status,     setStatus]     = useState(trackingStatus || '');
    const [history,    setHistory]    = useState([]);
    const [refreshing, setRefreshing] = useState(false);
    const [msg,        setMsg]        = useState('');
    const color = direction === 'reverse' ? 'var(--cyan)' : 'var(--green)';

    const doRefresh = async () => {
      setRefreshing(true); setMsg('');
      try {
        const params = new URLSearchParams({ awb, request_id: requestId||'', direction: direction||'' });
        const r = await fetch(`${API}/track/rr-shipment-status?${params}`);
        const d = await r.json();
        if (d.status) setStatus(d.status);
        if (d.history?.length) setHistory(d.history);
        if (d.message) setMsg(d.message);
      } catch { setMsg('Could not fetch.'); }
      setRefreshing(false);
    };

    useEffect(() => { if (awb) doRefresh(); }, [awb]);

    return (
      <div style={{marginTop:8,background:'var(--bg)',border:`1px solid ${color}44`,borderRadius:7,padding:'8px 12px'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:4}}>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            <span style={{fontSize:10,fontWeight:700,color,textTransform:'uppercase',letterSpacing:1}}>{direction==='reverse'?'↩ Return Tracking':'→ Forward Tracking'}</span>
            <span style={{fontSize:10,color:'var(--text-muted)',fontFamily:'monospace'}}>{awb}</span>
            {courier && <span style={{fontSize:10,color:'var(--text-muted)'}}>{courier}</span>}
          </div>
          <button onClick={doRefresh} disabled={refreshing}
            style={{background:'transparent',border:`1px solid ${color}44`,borderRadius:5,color,cursor:'pointer',fontSize:10,padding:'2px 8px'}}>
            {refreshing?'…':'↻'}
          </button>
        </div>
        {status && <div style={{fontSize:12,color,fontWeight:600,marginBottom:4}}>{status}</div>}
        {msg && <div style={{fontSize:10,color:'var(--text-muted)'}}>{msg}</div>}
        {history.length > 0 && (
          <div style={{marginTop:6,borderTop:`1px solid ${color}22`,paddingTop:6,display:'flex',flexDirection:'column',gap:3}}>
            {history.slice().reverse().slice(0,4).map((h,i)=>(
              <div key={i} style={{fontSize:10,display:'flex',gap:10}}>
                <span style={{color:'var(--text-muted)',flexShrink:0,minWidth:90}}>{h.ActionDate||''}</span>
                <span style={{color:'var(--text)'}}>{h.ActionDescription||''}</span>
              </div>
            ))}
          </div>
        )}
      </div>
    );
  }

  function RRShipmentPanel({ token, rr, onUpdated }) {
    const [partners,   setPartners]   = useState([]);
    const [partner,    setPartner]    = useState('');
    const [warehouses, setWarehouses] = useState([]);
    const [warehouse,  setWarehouse]  = useState(null);
    const [whLoading,  setWhLoading]  = useState(false);
    const [weight,  setWeight]    = useState('0.5');
    const [length,  setLength]    = useState('15');
    const [breadth, setBreadth]   = useState('12');
    const [height,  setHeight]    = useState('8');
    const [shipMode, setShipMode] = useState('Surface');
    const [rateInfo, setRateInfo] = useState(null);
    const [rateLoading, setRateLoading] = useState(false);
    const [creating, setCreating] = useState('');
    const [msg, setMsg]           = useState(null);
    // Manual AWB state
    const [manualDir,     setManualDir]     = useState('reverse');
    const [manualCourier, setManualCourier] = useState('');
    const [manualAwb,     setManualAwb]     = useState('');
    const [savingManual,  setSavingManual]  = useState(false);
    const [ssCouriers,    setSsCouriers]    = useState([]);

    useEffect(()=>{
      fetch(`${API}/admin/shipsagar/couriers`,{headers:{Authorization:`Bearer ${token}`}})
        .then(r=>r.json()).then(d=>setSsCouriers(d.getCourier||[])).catch(()=>{});
    },[]);

    const saveManualAwb = async () => {
      if (!manualAwb.trim()) return;
      setSavingManual(true); setMsg(null);
      try {
        const r = await fetch(`${API}/admin/return-requests/${rr.request_id}/awb`, {
          method: 'PUT', headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
          body: JSON.stringify({ direction: manualDir, awb: manualAwb.trim(), courier: manualCourier }),
        });
        const d = await r.json();
        if (!r.ok) throw new Error(d.error);
        setMsg({ type: 'success', text: `AWB saved${d.ok?' & pushed to ShipSagar for tracking':''}.` });
        setManualAwb(''); setManualCourier('');
        onUpdated && onUpdated();
      } catch(e) { setMsg({ type: 'error', text: e.message }); }
      setSavingManual(false);
    };

    useEffect(()=>{
      fetch(`${API}/admin/shipping-creds`, { headers:{ Authorization:`Bearer ${token}` } })
        .then(r=>r.json()).then(d=>{ const ps=(d.partners||[]).map(p=>p.partner||p); setPartners(ps); if(ps.length) setPartner(ps[0]); }).catch(()=>{});
    },[]);

    useEffect(()=>{
      if (!partner) return;
      setWarehouses([]); setWarehouse(null); setWhLoading(true);
      fetch(`${API}/admin/shipping/warehouses?partner=${partner}`, { headers:{ Authorization:`Bearer ${token}` } })
        .then(r=>r.json()).then(d=>{ const wh=d.warehouses||[]; setWarehouses(wh); setWarehouse(wh[0]||null); }).catch(()=>{}).finally(()=>setWhLoading(false));
    },[partner]);

    const checkRates = async () => {
      if (!partner) return;
      setRateLoading(true); setRateInfo(null);
      try {
        const r = await fetch(`${API}/admin/return-requests/${rr.request_id}/rate-check`, {
          method:'POST', headers:{'Content-Type':'application/json','Authorization':`Bearer ${token}`},
          body: JSON.stringify({ partner, weight:parseFloat(weight)||0.5, length:parseFloat(length)||15, breadth:parseFloat(breadth)||12, height:parseFloat(height)||8 }),
        });
        const d = await r.json();
        setRateInfo(d);
      } catch(e) { setRateInfo({error:e.message}); }
      setRateLoading(false);
    };

    const createShipment = async (direction) => {
      if (!partner) { setMsg({type:'error',text:'Select a shipping partner first.'}); return; }
      setCreating(direction); setMsg(null);
      try {
        const r = await fetch(`${API}/admin/return-requests/${rr.request_id}/create-shipment`, {
          method:'POST', headers:{'Content-Type':'application/json','Authorization':`Bearer ${token}`},
          body: JSON.stringify({ direction, partner, weight:parseFloat(weight)||0.5, length:parseFloat(length)||15, breadth:parseFloat(breadth)||12, height:parseFloat(height)||8, shipMode, warehouseId: warehouse?.id||'', warehouseName: warehouse?.name||'' }),
        });
        const d = await r.json();
        if (!r.ok) throw new Error(d.error);
        setMsg({type:'success',text:`${direction==='reverse'?'Reverse':'Forward'} shipment created! AWB: ${d.awb}`});
        onUpdated && onUpdated();
      } catch(e){ setMsg({type:'error',text:e.message}); }
      setCreating('');
    };

    const isExchange = rr.type === 'exchange';
    const revShip = rr.reverse_shipment;
    const fwdShip = rr.forward_shipment;

    return (
      <div style={{marginTop:14,borderTop:'1px solid var(--border)',paddingTop:14}}>
        <div style={{fontSize:11,fontWeight:700,color:'var(--text-muted)',letterSpacing:1,textTransform:'uppercase',marginBottom:10}}>📦 Shipments</div>
        {msg && <div className={`alert alert-${msg.type}`} style={{marginBottom:10,fontSize:11}}>{msg.type==='success'?'✓':'⚠'} {msg.text}</div>}

        {/* Existing shipments */}
        {(revShip||fwdShip) && (
          <div style={{display:'flex',flexDirection:'column',gap:10,marginBottom:12}}>
            {[revShip && {ship:revShip,dir:'reverse',color:'var(--cyan)',label:'↩ Reverse Pickup'},
              fwdShip && {ship:fwdShip,dir:'forward',color:'var(--green)',label:'→ Forward Dispatch'}
            ].filter(Boolean).map(({ship,dir,color,label})=>(
              <div key={dir} style={{background:'var(--bg-card2)',border:`1px solid ${color}`,borderRadius:8,padding:'10px 14px',fontSize:11,position:'relative'}}>
                <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                  <div>
                    <div style={{color,fontWeight:700,marginBottom:3}}>{label}</div>
                    <div style={{color:'var(--text)',fontFamily:'var(--font-family)'}}>{ship.awb}</div>
                    <div style={{color:'var(--text-muted)',marginTop:2}}>{ship.courier} · {ship.created_at?.split('T')[0]}</div>
                  </div>
                  <div style={{display:'flex',gap:6,alignItems:'center',flexShrink:0}}>
                    {(()=>{ const url = ship.tracking_url || trackingUrlFromCourier(ship.courier||'', ship.awb||''); return url ? <a href={url} target="_blank" rel="noreferrer" style={{fontSize:10,padding:'2px 9px',borderRadius:4,border:`1px solid ${color}`,color,background:'transparent',textDecoration:'none',fontFamily:'var(--font-family)',fontWeight:600,cursor:'pointer'}}>🔗 Track →</a> : null; })()}
                    <button
                      onClick={async()=>{
                        if(!window.confirm(`Remove this ${dir} shipment (AWB: ${ship.awb})? You can then recreate or re-enter a new one.`)) return;
                        setMsg(null);
                        const r = await fetch(`${API}/admin/return-requests/${rr.request_id}/shipment/${dir}`,{method:'DELETE',headers:{Authorization:`Bearer ${token}`}});
                        if(r.ok){ setMsg({type:'success',text:`${dir} shipment removed.`}); onUpdated&&onUpdated(); }
                        else setMsg({type:'error',text:'Remove failed.'});
                      }}
                      style={{background:'var(--red-bg)',border:'1px solid var(--red)',color:'var(--red)',borderRadius:4,padding:'2px 7px',fontSize:10,cursor:'pointer',fontFamily:'var(--font-family)'}}>
                      ✕ Remove
                    </button>
                  </div>
                </div>
                <RRShipmentStatus awb={ship.awb} courier={ship.courier} direction={dir} requestId={rr.request_id} trackingStatus={ship.tracking_status}/>
              </div>
            ))}
          </div>
        )}

        {/* Manual AWB entry — always shown, works for update too */}
        <div style={{background:'var(--bg-hover)',border:'1px solid var(--border)',borderRadius:8,padding:'10px 14px',marginBottom:12}}>
          <div style={{fontSize:10,fontWeight:700,color:'var(--text-muted)',letterSpacing:1,textTransform:'uppercase',marginBottom:8}}>
            ✏️ {(rr.reverse_shipment||rr.forward_shipment) ? 'Update' : 'Enter'} Tracking AWB Manually
          </div>
          <div style={{display:'flex',gap:8,flexWrap:'wrap',alignItems:'flex-end'}}>
            <div>
              <div style={{fontSize:10,color:'var(--text-muted)',marginBottom:3}}>Direction</div>
              <select value={manualDir} onChange={e=>setManualDir(e.target.value)} style={{background:'var(--bg-card2)',border:'1px solid var(--border)',borderRadius:6,padding:'6px 10px',color:'var(--text)',fontFamily:'var(--font-family)',fontSize:11,outline:'none'}}>
                <option value="reverse">↩ Reverse (Return pickup)</option>
                {rr.type==='exchange'&&<option value="forward">→ Forward (Exchange dispatch)</option>}
              </select>
            </div>
            <div>
              <div style={{fontSize:10,color:'var(--text-muted)',marginBottom:3}}>Courier</div>
              <select value={manualCourier} onChange={e=>setManualCourier(e.target.value)} style={{background:'var(--bg-card2)',border:'1px solid var(--border)',borderRadius:6,padding:'6px 10px',color:'var(--text)',fontFamily:'var(--font-family)',fontSize:11,outline:'none',minWidth:130}}>
                <option value="">— Select —</option>
                {ssCouriers.length > 0
                  ? ssCouriers.map(c=><option key={c.CourierCode||c.CourierName} value={c.CourierCode||c.CourierName}>{c.CourierName||c.CourierCode}</option>)
                  : ['DELHIVERY','XPRESSBEES','BLUEDART','DTDC','ECME','FEDEX','DHL','UPS','ARAMEX','INDIAPOST','SHADOWFAX','EKART'].map(c=><option key={c} value={c}>{c}</option>)
                }
              </select>
            </div>
            <div style={{flex:1,minWidth:160}}>
              <div style={{fontSize:10,color:'var(--text-muted)',marginBottom:3}}>AWB / Tracking Number</div>
              <input value={manualAwb} onChange={e=>setManualAwb(e.target.value)} placeholder="Enter AWB…"
                style={{width:'100%',background:'var(--bg-card2)',border:'1px solid var(--border)',borderRadius:6,padding:'6px 10px',color:'var(--text)',fontFamily:'var(--font-family)',fontSize:11,outline:'none',boxSizing:'border-box'}}/>
            </div>
            <button className="btn btn-primary" style={{fontSize:11,padding:'7px 14px',whiteSpace:'nowrap'}} onClick={saveManualAwb} disabled={savingManual||!manualAwb.trim()}>
              {savingManual?<><span className="spin">↻</span> Saving…</>:'💾 Save AWB'}
            </button>
          </div>
        </div>

        {partners.length === 0 ? (
          <div style={{fontSize:11,color:'var(--text-muted)'}}>No shipping partners connected. Go to Shipping Settings.</div>
        ) : (
          <>
            {/* Controls row */}
            <div style={{display:'flex',gap:8,flexWrap:'wrap',alignItems:'flex-end',marginBottom:10}}>
              <div>
                <div style={{fontSize:10,color:'var(--text-muted)',marginBottom:3}}>Partner</div>
                <select value={partner} onChange={e=>setPartner(e.target.value)} style={{background:'var(--bg-card2)',border:'1px solid var(--border)',borderRadius:6,padding:'6px 10px',color:'var(--text)',fontFamily:'var(--font-family)',fontSize:11,outline:'none'}}>
                  {partners.map(p=><option key={p} value={p}>{p.charAt(0).toUpperCase()+p.slice(1)}</option>)}
                </select>
              </div>
              <div style={{minWidth:180}}>
                <div style={{fontSize:10,color:'var(--text-muted)',marginBottom:3}}>Deliver To (Warehouse){whLoading&&<span style={{marginLeft:6,opacity:0.5}}>↻</span>}</div>
                {warehouses.length > 0 ? (
                  <select value={warehouse?.id||''} onChange={e=>setWarehouse(warehouses.find(w=>w.id===e.target.value)||null)}
                    style={{width:'100%',background:'var(--bg-card2)',border:'1px solid var(--border)',borderRadius:6,padding:'6px 10px',color:'var(--text)',fontFamily:'var(--font-family)',fontSize:11,outline:'none'}}>
                    {warehouses.map(w=><option key={w.id} value={w.id}>{w.name}{w.address?` — ${w.address}`:''}</option>)}
                  </select>
                ) : (
                  <div style={{fontSize:10,color:'var(--text-muted)',padding:'6px 0'}}>{whLoading?'Loading…':'No warehouses found'}</div>
                )}
              </div>
              {[['Weight (kg)','weight',weight,setWeight],['L (cm)','length',length,setLength],['B (cm)','breadth',breadth,setBreadth],['H (cm)','height',height,setHeight]].map(([lbl,k,val,set])=>(
                <div key={k}>
                  <div style={{fontSize:10,color:'var(--text-muted)',marginBottom:3}}>{lbl}</div>
                  <input type="number" value={val} onChange={e=>{ set(e.target.value); setRateInfo(null); }} style={{width:68,background:'var(--bg-card2)',border:'1px solid var(--border)',borderRadius:6,padding:'6px 8px',color:'var(--text)',fontFamily:'var(--font-family)',fontSize:11,outline:'none'}} />
                </div>
              ))}
              {partner==='delhivery' && (
                <div>
                  <div style={{fontSize:10,color:'var(--text-muted)',marginBottom:3}}>Mode</div>
                  <select value={shipMode} onChange={e=>{setShipMode(e.target.value);setRateInfo(null);}}
                    style={{background:'var(--bg-card2)',border:'1px solid var(--border)',borderRadius:6,padding:'6px 8px',color:'var(--text)',fontFamily:'var(--font-family)',fontSize:11,outline:'none'}}>
                    <option value="Surface">Surface</option>
                    <option value="Express">Express</option>
                  </select>
                </div>
              )}
              {partner==='delhivery' && (
                <div style={{display:'flex',alignItems:'flex-end'}}>
                  <button className="btn btn-ghost btn-sm" onClick={checkRates} disabled={rateLoading}
                    style={{fontSize:10,borderColor:'var(--yellow)',color:'var(--yellow)'}}>
                    {rateLoading?'Checking…':'₹ Check Rate'}
                  </button>
                </div>
              )}
            </div>
            {rateInfo && (
              <div style={{marginBottom:10,padding:'8px 12px',borderRadius:7,background: rateInfo.error?'var(--red-bg)':'rgba(16,185,129,0.08)',border:`1px solid ${rateInfo.error?'rgba(239,68,68,0.3)':'rgba(16,185,129,0.3)'}`,fontSize:11}}>
                {rateInfo.error ? `❌ ${rateInfo.error}` : (
                  <div style={{display:'flex',gap:16,flexWrap:'wrap'}}>
                    {(rateInfo.rates||[]).map((r,i)=>(
                      <div key={i} style={{color:'var(--text)'}}>
                        <span style={{color:'var(--text-muted)'}}>{r.mode}: </span>
                        <strong style={{color:'var(--green)'}}>₹{r.charge}</strong>
                        {r.estimated_days&&<span style={{color:'var(--text-muted)',fontSize:10}}> · {r.estimated_days}d</span>}
                      </div>
                    ))}
                  </div>
                )}
              </div>
            )}
            {warehouse?.address && <div style={{fontSize:10,color:'var(--text-muted)',marginBottom:10}}>📍 {warehouse.address}</div>}

            {/* Shipment sections */}
            <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
              {/* Reverse — always shown */}
              <div style={{flex:1,minWidth:220,background:'var(--bg-hover)',border:'1px solid var(--border)',borderRadius:8,padding:'10px 14px'}}>
                <div style={{fontSize:11,fontWeight:700,color:'var(--cyan)',marginBottom:4}}>↩ Reverse Pickup</div>
                <div style={{fontSize:10,color:'var(--text-muted)',marginBottom:8}}>Customer → Vendor · Pickup return item from customer</div>
                {revShip
                  ? <div style={{fontSize:10,color:'var(--text-muted)'}}>AWB: <span style={{color:'var(--cyan)',fontFamily:'var(--font-family)'}}>{revShip.awb}</span> — remove above to recreate</div>
                  : <button className="btn btn-ghost btn-sm" style={{fontSize:11}} onClick={()=>createShipment('reverse')} disabled={!!creating}>{creating==='reverse'?<><span className="spin">↻</span> Creating…</>:'Create Reverse Pickup'}</button>
                }
              </div>

              {/* Forward — exchange only */}
              {isExchange && (
                <div style={{flex:1,minWidth:220,background:'var(--bg-hover)',border:'1px solid var(--border)',borderRadius:8,padding:'10px 14px'}}>
                  <div style={{fontSize:11,fontWeight:700,color:'var(--green)',marginBottom:4}}>→ Forward Dispatch</div>
                  <div style={{fontSize:10,color:'var(--text-muted)',marginBottom:8}}>Vendor → Customer · Send exchange item to customer</div>
                  {fwdShip
                    ? <div style={{fontSize:10,color:'var(--text-muted)'}}>AWB: <span style={{color:'var(--green)',fontFamily:'var(--font-family)'}}>{fwdShip.awb}</span> — remove above to recreate</div>
                    : <button className="btn btn-ghost btn-sm" style={{fontSize:11,borderColor:'var(--green)',color:'var(--green)'}} onClick={()=>createShipment('forward')} disabled={!!creating}>{creating==='forward'?<><span className="spin">↻</span> Creating…</>:'Create Forward Shipment'}</button>
                  }
                </div>
              )}
            </div>
          </>
        )}
      </div>
    );
  }

  function ReturnRequests({ token }) {
    const [requests, setRequests] = useState([]);
    const [loading,  setLoading]  = useState(true);
    const [tab,      setTab]      = useState('all');
    const [expanded, setExpanded] = useState(null);
    const [noteVal,  setNoteVal]  = useState('');
    const [saving,   setSaving]   = useState(false);
    const [msg,      setMsg]      = useState(null);
    const [retCfgVendor, setRetCfgVendor] = useState(null);
    const [vendors,  setVendors]  = useState([]);

    const load = () => {
      setLoading(true);
      const q = tab !== 'all' ? `?status=${tab}` : '';
      fetch(`${API}/admin/return-requests${q}`, { headers:{ Authorization:`Bearer ${token}` } })
        .then(r=>r.json()).then(d=>setRequests(d.requests||[])).catch(()=>{}).finally(()=>setLoading(false));
    };
    useEffect(load, [tab]);
    useEffect(()=>{
      fetch(`${API}/admin/vendors`,{headers:{Authorization:`Bearer ${token}`}}).then(r=>r.json()).then(d=>setVendors((d.vendors||[]).map(v=>typeof v==='string'?v:v.name).filter(Boolean))).catch(()=>{});
    },[]);

    const receiveAtCC = async (id) => {
      setSaving(true); setMsg(null);
      try {
        const r = await fetch(`${API}/admin/return-requests/${id}/receive-at-cc`, {
          method:'POST', headers:{ Authorization:`Bearer ${token}` },
        });
        const d = await r.json();
        if (!r.ok) throw new Error(d.error);
        setMsg({ type:'success', text:`✓ Items added to CC Inventory (${d.added.length} variant${d.added.length!==1?'s':''})` });
        load();
      } catch(e) { setMsg({ type:'error', text: e.message }); }
      setSaving(false);
    };

    const updateRequest = async (id, fields) => {
      setSaving(true); setMsg(null);
      try {
        const r = await fetch(`${API}/admin/return-requests/${id}`, {
          method:'PUT', headers:{'Content-Type':'application/json','Authorization':`Bearer ${token}`},
          body: JSON.stringify(fields),
        });
        if (!r.ok) throw new Error('Save failed');
        setMsg({type:'success',text:'Updated.'});
        load();
      } catch(e) { setMsg({type:'error',text:e.message}); }
      setSaving(false);
    };

    const deleteRequest = async (id) => {
      if (!window.confirm(`Delete return/exchange request ${id}? This cannot be undone.`)) return;
      setSaving(true); setMsg(null);
      try {
        const r = await fetch(`${API}/admin/return-requests/${id}`, {
          method:'DELETE', headers:{ Authorization:`Bearer ${token}` },
        });
        const d = await r.json();
        if (!r.ok) throw new Error(d.error || 'Delete failed');
        setMsg({type:'success', text:`Request ${id} deleted.`});
        setExpanded(null);
        load();
      } catch(e) { setMsg({type:'error',text:e.message}); }
      setSaving(false);
    };

    const TYPE_COLOR = { return:'var(--cyan)', exchange:'var(--green)' };
    const STATUS_COLOR = { pending:'var(--yellow)', approved:'var(--green)', rejected:'var(--red)', completed:'var(--teal)' };
    const TABS = ['all','pending','approved','rejected','completed'];

    return (
      <div className="page">
        {/* Tab bar */}
        <div style={{display:'flex',gap:6,marginBottom:14,flexWrap:'wrap'}}>
          {TABS.map(t=>(
            <button key={t} onClick={()=>setTab(t)} style={{
              padding:'5px 14px',borderRadius:99,border:'1px solid var(--border)',cursor:'pointer',
              background:tab===t?'var(--indigo-dim)':'var(--bg-card2)',
              color:tab===t?'var(--indigo)':'var(--text-muted)',
              fontFamily:'var(--font-family)',fontSize:11,fontWeight:tab===t?700:400,
              textTransform:'capitalize',
            }}>{t}</button>
          ))}
          <button onClick={()=>setRetCfgVendor(retCfgVendor?null:'__open')} style={{padding:'5px 14px',borderRadius:99,border:'1px solid var(--border)',cursor:'pointer',background:retCfgVendor?'var(--yellow-bg)':'var(--bg-card2)',color:retCfgVendor?'var(--yellow)':'var(--text-muted)',fontFamily:'var(--font-family)',fontSize:11,marginLeft:'auto'}}>
            ⚙ Vendor Return Config
          </button>
        </div>

        {/* Vendor return config panel */}
        {retCfgVendor && <VendorReturnConfigPanel token={token} vendors={vendors} onClose={()=>setRetCfgVendor(null)}/>}

        {msg && <div className={`alert alert-${msg.type}`}>{msg.type==='success'?'✓':'⚠'} {msg.text}</div>}

        <div className="card">
          <div className="card-header"><span className="card-title">Return & Exchange Requests</span></div>
          {loading ? <div style={{padding:24,textAlign:'center',color:'var(--text-muted)'}}><span className="spin">↻</span> Loading…</div> : (
            <div style={{overflowX:'auto'}}>
              {requests.length === 0 ? (
                <div style={{padding:32,textAlign:'center',color:'var(--text-muted)',fontSize:13}}>No requests found.</div>
              ) : (
                <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
                  <thead>
                    <tr style={{borderBottom:'1px solid var(--border)'}}>
                      {['Request ID','Order','Customer','Type','Items','Vendor','Status','Fee','Date','Actions'].map(h=>(
                        <th key={h} style={{padding:'8px 10px',textAlign:'left',fontSize:10,letterSpacing:1,color:'var(--text-muted)',textTransform:'uppercase',whiteSpace:'nowrap'}}>{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {requests.map(rq=>{
                      const isExp = expanded===rq.request_id;
                      return (
                        <React.Fragment key={rq.request_id}>
                          <tr style={{borderBottom:'1px solid var(--border)',background:isExp?'var(--bg-hover)':'',cursor:'pointer'}} onClick={()=>{ setExpanded(isExp?null:rq.request_id); setNoteVal(rq.admin_note||''); setMsg(null); }}>
                            <td style={{padding:'8px 10px',color:'var(--cyan)',fontWeight:700,whiteSpace:'nowrap'}}>{rq.request_id}</td>
                            <td style={{padding:'8px 10px',color:'var(--text)',whiteSpace:'nowrap'}}>{rq.order_name}</td>
                            <td style={{padding:'8px 10px',color:'var(--text-dim)',maxWidth:140,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{rq.customer_name||rq.customer_email}</td>
                            <td style={{padding:'8px 10px'}}><span style={{background:'var(--bg-card2)',border:`1px solid ${TYPE_COLOR[rq.type]||'var(--border)'}`,color:TYPE_COLOR[rq.type]||'var(--text)',borderRadius:99,padding:'2px 9px',fontSize:10,textTransform:'capitalize',fontWeight:700}}>{rq.type}</span></td>
                            <td style={{padding:'8px 10px',color:'var(--text-dim)'}}>{(rq.items||[]).length} item{rq.items?.length!==1?'s':''}</td>
                            <td style={{padding:'8px 10px',color:'var(--text-dim)',whiteSpace:'nowrap'}}>{rq.vendor_name||'—'}</td>
                            <td style={{padding:'8px 10px'}}><span style={{background:'var(--bg-card2)',border:`1px solid ${STATUS_COLOR[rq.status]||'var(--border)'}`,color:STATUS_COLOR[rq.status]||'var(--text)',borderRadius:99,padding:'2px 9px',fontSize:10,textTransform:'capitalize',fontWeight:700}}>{rq.status}</span></td>
                            <td style={{padding:'8px 10px'}}>
                              {rq.fee_paid === 'waived'
                                ? <span style={{fontSize:10,padding:'2px 7px',borderRadius:4,background:'rgba(245,158,11,0.1)',border:'1px solid rgba(245,158,11,0.3)',color:'#f59e0b',fontWeight:600}}>🔑 Admin Code</span>
                                : rq.fee_paid
                                  ? <span style={{fontSize:10,padding:'2px 7px',borderRadius:4,background:'rgba(16,185,129,0.1)',border:'1px solid rgba(16,185,129,0.3)',color:'#10b981',fontWeight:600}}>💳 Paid</span>
                                  : <span style={{fontSize:10,color:'var(--text-muted)'}}>—</span>}
                            </td>
                            <td style={{padding:'8px 10px',color:'var(--text-muted)',whiteSpace:'nowrap'}}>{rq.created_at?.split('T')[0]}</td>
                            <td style={{padding:'8px 10px'}} onClick={e=>e.stopPropagation()}>
                              <div style={{display:'flex',gap:4}}>
                                {rq.status==='pending'&&<><button onClick={()=>updateRequest(rq.request_id,{status:'approved'})} style={{padding:'3px 8px',borderRadius:6,border:'1px solid var(--green)',background:'var(--green-dim)',color:'var(--green)',cursor:'pointer',fontFamily:'var(--font-family)',fontSize:10}} disabled={saving}>✓</button><button onClick={()=>updateRequest(rq.request_id,{status:'rejected'})} style={{padding:'3px 8px',borderRadius:6,border:'1px solid var(--red)',background:'var(--red-bg)',color:'var(--red)',cursor:'pointer',fontFamily:'var(--font-family)',fontSize:10}} disabled={saving}>✗</button></>}
                                {rq.status==='approved'&&<button onClick={()=>updateRequest(rq.request_id,{status:'completed'})} style={{padding:'3px 8px',borderRadius:6,border:'1px solid var(--teal)',background:'#042f2e',color:'var(--teal)',cursor:'pointer',fontFamily:'var(--font-family)',fontSize:10}} disabled={saving}>Done</button>}
                                <button onClick={()=>deleteRequest(rq.request_id)} title="Delete request" style={{padding:'3px 8px',borderRadius:6,border:'1px solid var(--red)',background:'var(--red-bg)',color:'var(--red)',cursor:'pointer',fontFamily:'var(--font-family)',fontSize:10}} disabled={saving}>🗑</button>
                              </div>
                            </td>
                          </tr>
                          {isExp && (
                            <tr><td colSpan={9} style={{background:'var(--bg-hover)',padding:0}}>
                              <div style={{padding:'14px 16px'}}>
                                <div style={{display:'flex',gap:24,flexWrap:'wrap',marginBottom:12}}>
                                  <div><span style={{fontSize:10,color:'var(--text-muted)',letterSpacing:1}}>CUSTOMER</span><div style={{fontSize:12,color:'var(--text)',marginTop:3}}>{rq.customer_name} · {rq.customer_email} {rq.customer_phone?`· ${rq.customer_phone}`:''}</div></div>
                                  <div><span style={{fontSize:10,color:'var(--text-muted)',letterSpacing:1}}>REASON</span><div style={{fontSize:12,color:'var(--text)',marginTop:3}}>{rq.reason}</div></div>
                                  {(rq.image_urls||[]).length > 0 && (
                                    <div style={{width:'100%'}}>
                                      <span style={{fontSize:10,color:'var(--text-muted)',letterSpacing:1}}>PHOTOS</span>
                                      <div style={{display:'flex',flexWrap:'wrap',gap:6,marginTop:4}}>
                                        {(rq.image_urls||[]).map((u,i)=>(
                                          <a key={i} href={u} target="_blank" rel="noreferrer">
                                            <img src={u} alt={`Photo ${i+1}`} style={{width:72,height:72,objectFit:'cover',borderRadius:6,border:'1px solid var(--border)',cursor:'pointer'}}/>
                                          </a>
                                        ))}
                                      </div>
                                    </div>
                                  )}
                                </div>
                                <div style={{display:'flex',flexDirection:'column',gap:6,marginBottom:12}}>
                                  {(rq.items||[]).map((it,i)=>(
                                    <div key={i} style={{background:'var(--bg-card2)',border:'1px solid var(--border)',borderRadius:6,padding:'8px 12px',fontSize:12,display:'flex',justifyContent:'space-between',gap:12,flexWrap:'wrap'}}>
                                      <span style={{color:'var(--text)'}}>{it.title}{it.variant_title?` · ${it.variant_title}`:''} × {it.qty}</span>
                                      {it.exchange_size_label&&<span style={{color:'var(--green)'}}>→ {it.exchange_size_label}</span>}
                                      <span style={{color:'var(--text-muted)'}}>₹{it.price}</span>
                                    </div>
                                  ))}
                                </div>
                                {rq.vendor_note&&<div style={{fontSize:11,color:'var(--text-muted)',marginBottom:10}}>Vendor note: <span style={{color:'var(--yellow)'}}>{rq.vendor_note}</span></div>}

                                {/* Stage progression buttons */}
                                {['approved','pickup','in_transit'].includes(rq.status) && (
                                  <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:12}}>
                                    {rq.status==='approved'&&<button className="btn btn-ghost btn-sm" style={{borderColor:'var(--yellow)',color:'var(--yellow)',fontSize:11}} onClick={()=>updateRequest(rq.request_id,{status:'pickup'})} disabled={saving}>📍 Mark Pickup Scheduled</button>}
                                    {rq.status==='pickup'&&<button className="btn btn-ghost btn-sm" style={{borderColor:'var(--indigo)',color:'var(--indigo)',fontSize:11}} onClick={()=>updateRequest(rq.request_id,{status:'in_transit'})} disabled={saving}>🚚 Mark In Transit</button>}
                                    {rq.status==='in_transit'&&<button className="btn btn-ghost btn-sm" style={{borderColor:'var(--teal)',color:'var(--teal)',fontSize:11}} onClick={()=>updateRequest(rq.request_id,{status:'completed'})} disabled={saving}>✓ Mark Completed</button>}
                                  </div>
                                )}
                                {['in_transit','completed'].includes(rq.status) && (
                                  <div style={{marginBottom:12}}>
                                    {rq.received_at_cc ? (
                                      <span style={{fontSize:11,color:'#10b981',display:'flex',alignItems:'center',gap:5}}>
                                        ✓ Received at CC — added to inventory
                                        {rq.received_at_cc_at && <span style={{color:'var(--text-muted)',fontSize:10}}>({fmtDate(rq.received_at_cc_at)})</span>}
                                      </span>
                                    ) : (
                                      <button className="btn btn-ghost btn-sm"
                                        style={{borderColor:'#fbbf24',color:'#fbbf24',fontSize:11,fontWeight:700}}
                                        onClick={()=>receiveAtCC(rq.request_id)} disabled={saving}>
                                        🏬 Mark Received at CC — Add to Inventory
                                      </button>
                                    )}
                                  </div>
                                )}

                                {/* Shipment panel */}
                                <RRShipmentPanel token={token} rr={rq} onUpdated={load} />

                                <div style={{marginTop:14,marginBottom:6,fontSize:10,color:'var(--text-muted)',letterSpacing:1,textTransform:'uppercase'}}>Admin Note</div>
                                <textarea
                                  style={{width:'100%',maxWidth:480,background:'var(--bg-card2)',border:'1px solid var(--border)',borderRadius:6,padding:'8px 10px',color:'var(--text)',fontFamily:'var(--font-family)',fontSize:12,minHeight:60,outline:'none',resize:'vertical'}}
                                  placeholder="Internal note…"
                                  value={noteVal}
                                  onChange={e=>setNoteVal(e.target.value)}
                                />
                                <button className="btn btn-primary" style={{marginTop:8,fontSize:11,padding:'7px 16px',background:'var(--indigo)',color:'#fff',border:'none',borderRadius:7,cursor:'pointer',fontFamily:'var(--font-family)',fontWeight:700}} onClick={()=>updateRequest(rq.request_id,{admin_note:noteVal})} disabled={saving}>
                                  {saving?<><span className="spin">↻</span> Saving…</>:'Save Note'}
                                </button>
                              </div>
                            </td></tr>
                          )}
                        </React.Fragment>
                      );
                    })}
                  </tbody>
                </table>
              )}
            </div>
          )}
        </div>
      </div>
    );
  }

  function VendorReturnConfigPanel({ token, vendors, onClose }) {
    const [selectedVendor, setSelectedVendor] = useState(vendors[0]||'');
    const EMPTY = { exchange_enabled:true, return_enabled:true, return_window_days:7, rr_fee:199, return_address:{name:'',address1:'',city:'',state:'',pincode:'',phone:''} };
    const [cfg,     setCfg]    = useState(EMPTY);
    const [loading, setLoading]= useState(false);
    const [saving,  setSaving] = useState(false);
    const [msg,     setMsg]    = useState(null);

    const loadCfg = async (v) => {
      if (!v) return;
      setLoading(true); setMsg(null);
      try {
        const r = await fetch(`${API}/admin/vendors/${encodeURIComponent(v)}/return-config`,{headers:{Authorization:`Bearer ${token}`}});
        const d = await r.json();
        if (d.config) setCfg({...EMPTY,...d.config,return_address:{...EMPTY.return_address,...(d.config.return_address||{})}});
      } catch {}
      setLoading(false);
    };
    useEffect(()=>{ if(selectedVendor) loadCfg(selectedVendor); },[selectedVendor]);

    const updAddr = (k,v) => setCfg(p=>({...p,return_address:{...p.return_address,[k]:v}}));

    const save = async () => {
      setSaving(true); setMsg(null);
      try {
        const r = await fetch(`${API}/admin/vendors/${encodeURIComponent(selectedVendor)}/return-config`,{
          method:'PUT', headers:{'Content-Type':'application/json','Authorization':`Bearer ${token}`},
          body: JSON.stringify(cfg),
        });
        if(!r.ok) throw new Error('Save failed');
        setMsg({type:'success',text:'Saved.'});
      } catch(e){ setMsg({type:'error',text:e.message}); }
      setSaving(false);
    };

    return (
      <div className="card" style={{marginBottom:16}}>
        <div className="card-header" style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <span className="card-title">Vendor Return Config</span>
          <button onClick={onClose} style={{background:'none',border:'none',cursor:'pointer',color:'var(--text-muted)',fontSize:16}}>✕</button>
        </div>
        <div style={{padding:16}}>
          <div style={{marginBottom:14}}>
            <label className="field-label">Select Vendor</label>
            <select style={{width:'100%',maxWidth:260,background:'var(--bg-card2)',border:'1px solid var(--border)',borderRadius:7,padding:'8px 12px',color:'var(--text)',fontFamily:'var(--font-family)',fontSize:12,outline:'none'}} value={selectedVendor} onChange={e=>setSelectedVendor(e.target.value)}>
              {vendors.map(v=><option key={v} value={v}>{v}</option>)}
            </select>
          </div>
          {loading ? <div style={{color:'var(--text-muted)',fontSize:12}}><span className="spin">↻</span> Loading…</div> : (
            <>
              {msg && <div className={`alert alert-${msg.type}`} style={{marginBottom:12}}>{msg.type==='success'?'✓':'⚠'} {msg.text}</div>}
              <div style={{display:'flex',gap:24,flexWrap:'wrap',marginBottom:14}}>
                <div style={{display:'flex',alignItems:'center',gap:10}}>
                  <span style={{fontSize:12,color:'var(--text)'}}>Exchange</span>
                  <div style={{width:42,height:24,borderRadius:12,background:'var(--green)',border:'1px solid var(--green)',display:'flex',alignItems:'center',padding:'0 3px',cursor:'not-allowed',opacity:0.7}}>
                    <div style={{width:18,height:18,borderRadius:50,background:'#000',marginLeft:'auto'}}/>
                  </div>
                  <span style={{fontSize:10,color:'var(--text-muted)'}}>Always on</span>
                </div>
                <div style={{display:'flex',alignItems:'center',gap:10}}>
                  <span style={{fontSize:12,color:'var(--text)'}}>Returns</span>
                  <div onClick={()=>setCfg(p=>({...p,return_enabled:!p.return_enabled}))} style={{width:42,height:24,borderRadius:12,background:cfg.return_enabled?'var(--green)':'var(--border)',border:'1px solid '+(cfg.return_enabled?'var(--green)':'var(--border)'),display:'flex',alignItems:'center',padding:'0 3px',cursor:'pointer',transition:'all 0.2s'}}>
                    <div style={{width:18,height:18,borderRadius:50,background:'#000',marginLeft:cfg.return_enabled?'auto':'0',transition:'margin 0.2s'}}/>
                  </div>
                  <span style={{fontSize:10,color:'var(--text-muted)'}}>{cfg.return_enabled?'Enabled':'Disabled'}</span>
                </div>
                <div style={{display:'flex',alignItems:'center',gap:8}}>
                  <span style={{fontSize:12,color:'var(--text)'}}>Window</span>
                  <input type="number" min={1} max={90} style={{width:60,background:'var(--bg-card2)',border:'1px solid var(--border)',borderRadius:6,padding:'5px 8px',color:'var(--text)',fontFamily:'var(--font-family)',fontSize:12,outline:'none',textAlign:'center'}} value={cfg.return_window_days} onChange={e=>setCfg(p=>({...p,return_window_days:parseInt(e.target.value)||7}))}/>
                  <span style={{fontSize:11,color:'var(--text-muted)'}}>days</span>
                </div>
                <div style={{display:'flex',alignItems:'center',gap:8}}>
                  <span style={{fontSize:12,color:'var(--text)'}}>💳 RR Fee</span>
                  <span style={{fontSize:12,color:'var(--text-muted)'}}>₹</span>
                  <input type="number" min={0} style={{width:70,background:'var(--bg-card2)',border:'1px solid var(--indigo)',borderRadius:6,padding:'5px 8px',color:'var(--text)',fontFamily:'var(--font-family)',fontSize:12,outline:'none',textAlign:'center'}} value={cfg.rr_fee??199} onChange={e=>setCfg(p=>({...p,rr_fee:parseFloat(e.target.value)||0}))}/>
                  <span style={{fontSize:10,color:'var(--text-muted)'}}>upfront (Razorpay)</span>
                </div>
              </div>
              <div style={{fontSize:10,letterSpacing:1,textTransform:'uppercase',color:'var(--text-muted)',marginBottom:8}}>Return Address</div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,maxWidth:480}}>
                {[{k:'name',l:'Contact Name'},{k:'address1',l:'Address Line 1',full:true},{k:'city',l:'City'},{k:'state',l:'State'},{k:'pincode',l:'Pincode'},{k:'phone',l:'Phone'}].map(f=>(
                  <div key={f.k} style={f.full?{gridColumn:'1/-1'}:{}}>
                    <label className="field-label">{f.l}</label>
                    <input className="field-input" type="text" value={cfg.return_address?.[f.k]||''} onChange={e=>updAddr(f.k,e.target.value)}/>
                  </div>
                ))}
              </div>
              <button onClick={save} disabled={saving} style={{marginTop:14,padding:'8px 20px',borderRadius:7,border:'none',background:'var(--indigo)',color:'#fff',fontFamily:'var(--font-family)',fontSize:12,fontWeight:700,cursor:'pointer',display:'flex',alignItems:'center',gap:6}}>
                {saving?<><span className="spin">↻</span> Saving…</>:'✓ Save Config'}
              </button>
            </>
          )}
        </div>
      </div>
    );
