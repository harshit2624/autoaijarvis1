              <thead><tr><th>Time</th><th>Order</th><th>Trigger</th><th>Recipient</th><th>Subject</th><th>Status</th></tr></thead>
              <tbody>
                {logsLoad ? <SkelRow cols={6}/> :
                 logs.length===0 ? <tr><td colSpan={6}><div className="empty"><div className="empty-icon">📭</div><div className="empty-title">No emails sent yet</div></div></td></tr> :
                 logs.map(l=>(
                  <tr key={l.id}>
                    <td className="td-mut">{l.sent_at?.slice(0,16).replace('T',' ')}</td>
                    <td className="td-id">{l.shopify_id}</td>
                    <td style={{fontSize:10,color:'var(--text-muted)'}}>{l.trigger}</td>
                    <td style={{fontSize:11}}>{l.recipient}</td>
                    <td style={{fontSize:11,maxWidth:200,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{l.subject}</td>
                    <td><span style={{fontSize:10,fontWeight:700,color:statusColor(l.status)}}>{l.status?.toUpperCase()}</span>
                      {l.error&&l.status==='failed'&&<div style={{fontSize:9,color:'#f87171',marginTop:2}}>{l.error.slice(0,60)}</div>}
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      </div>
    );
  }

  /* ══════════════════════════════════
     SHIPPING CREDENTIALS VIEW
  ══════════════════════════════════ */
  const SHIPPING_PARTNERS = [
    {
      id: 'delhivery',
      name: 'Delhivery',
      logo: '📦',
      color: '#d4430c',
      fields: [{ key:'api_token', label:'API Token', type:'password', placeholder:'Paste your Delhivery API token here' }],
      help: 'Go to Delhivery dashboard → Settings → API → copy your API token.',
    },
    {
      id: 'shiprocket',
      name: 'Shiprocket',
      logo: '🚀',
      color: '#e8612a',
      fields: [
        { key:'email',    label:'Email',    type:'text',     placeholder:'your@email.com' },
        { key:'password', label:'Password', type:'password', placeholder:'Shiprocket password' },
      ],
      help: 'Use the same email & password you log into Shiprocket with.',
    },
    {
      id: 'shipmozo',
      name: 'ShipMozo',
      logo: '🛳️',
      color: '#0ea5e9',
      fields: [
        { key:'public_key',  label:'Public Key',  type:'text',     placeholder:'ShipMozo Public Key' },
        { key:'private_key', label:'Private Key', type:'password', placeholder:'ShipMozo Private Key' },
      ],
      help: 'Log into ShipMozo → Settings → API Integration to get your public & private keys.',
    },
  ];

  function ShippingCreds({ token }) {
    const [connected, setConnected] = useState({});
    const [forms,     setForms]     = useState({});
    const [saving,    setSaving]    = useState({});
    const [msg,       setMsg]       = useState(null);
    const [syncing,   setSyncing]   = useState(false);
    const [syncResult,setSyncResult]= useState(null);

    const load = () => {
      fetch(`${API}/admin/shipping-creds`, { headers:{ Authorization:`Bearer ${token}` } })
        .then(r=>r.json()).then(d=>{
          const map = {};
          (d.partners||[]).forEach(p=>{ map[p.partner] = p; });
          setConnected(map);
        }).catch(()=>{});
    };
    useEffect(()=>{ load(); fetchDlLogs(); }, [token]);

    const setField = (partnerId, key, val) =>
      setForms(f=>({ ...f, [partnerId]: { ...(f[partnerId]||{}), [key]: val } }));

    const save = async (partner) => {
      setSaving(s=>({...s,[partner.id]:true})); setMsg(null);
      try {
        const r = await fetch(`${API}/admin/shipping-creds`, {
          method:'POST', headers:{'Content-Type':'application/json','Authorization':`Bearer ${token}`},
          body: JSON.stringify({ partner: partner.id, credentials: forms[partner.id]||{} }),
        });
        if (!r.ok) throw new Error((await r.json()).error);
        setMsg({ type:'success', text:`${partner.name} connected successfully!` });
        setForms(f=>({...f,[partner.id]:{}}));
        load();
      } catch(e) { setMsg({ type:'error', text: e.message }); }
      setSaving(s=>({...s,[partner.id]:false}));
    };

    const disconnect = async (partnerId) => {
      await fetch(`${API}/admin/shipping-creds/${partnerId}`, { method:'DELETE', headers:{ Authorization:`Bearer ${token}` } });
      load();
    };

    const [dlSyncing, setDlSyncing] = useState(false);
    const [dlSyncMsg, setDlSyncMsg] = useState(null);
    const [dlLogs,    setDlLogs]    = useState([]);
    const [dlLogsOpen,setDlLogsOpen]= useState(true);

    const syncAll = async () => {
      setSyncing(true); setSyncResult(null);
      try {
        const r = await fetch(`${API}/admin/shipping/sync-status`, { method:'POST', headers:{ Authorization:`Bearer ${token}` } });
        const d = await r.json();
        setSyncResult(d);
      } catch(e) { setMsg({ type:'error', text: e.message }); }
      setSyncing(false);
    };

    const syncDelhivery = async () => {
      setDlSyncing(true); setDlSyncMsg('Running…');
      try {
        await fetch(`${API}/admin/delhivery/sync`, { method:'POST', headers:{ Authorization:`Bearer ${token}` } });
        // Poll logs every 2s until a new run appears
        const before = dlLogs[0]?.ran_at || '';
        let attempts = 0;
        const poll = setInterval(async () => {
          attempts++;
          await fetchDlLogs();
          setDlLogs(prev => {
            if (prev[0]?.ran_at !== before || attempts >= 15) {
              clearInterval(poll);
              setDlSyncing(false);
              setDlSyncMsg('✓ Done — see log below');
            }
            return prev;
          });
        }, 2000);
      } catch(e) { setDlSyncMsg('Error: ' + e.message); setDlSyncing(false); }
    };

    const fetchDlLogs = async () => {
      try {
        const r = await fetch(`${API}/admin/delhivery/logs`, { headers:{ Authorization:`Bearer ${token}` } });
        const d = await r.json();
        setDlLogs(d.logs || []);
        setDlLogsOpen(true);
      } catch(e) {}
    };

    return (
      <div className="page">
        <div style={{background:'#0d1f10',border:'1px solid #1a4a2a',borderRadius:10,padding:'12px 16px',marginBottom:20,fontSize:12,color:'var(--text)'}}>
          <div style={{fontWeight:700,color:'#10b981',marginBottom:6}}>🚚 Global Shipping Credentials</div>
          <div style={{lineHeight:1.8,color:'var(--text-muted)'}}>
            Connect your shipping partners here once. JARVIS will use these credentials to track <strong>any order</strong> — whether fulfilled through this panel or directly on Shopify — as long as an AWB number is available.
          </div>
        </div>

        {msg && <div className={`alert alert-${msg.type}`} style={{marginBottom:16}}>{msg.type==='success'?'✓':'⚠'} {msg.text}</div>}

        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:20}}>
          {SHIPPING_PARTNERS.map(partner => {
            const isConnected = !!connected[partner.id];
            return (
              <div key={partner.id} className="card" style={{overflow:'visible',borderColor: isConnected ? '#1a4a2a' : 'var(--border)'}}>
                <div style={{padding:'16px 18px',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                  <div style={{display:'flex',alignItems:'center',gap:10}}>
                    <span style={{fontSize:22}}>{partner.logo}</span>
                    <div>
                      <div style={{fontSize:13,fontWeight:700,color:'var(--text)'}}>{partner.name}</div>
                      {isConnected
                        ? <div style={{fontSize:10,color:'#10b981'}}>● Connected · {connected[partner.id]?.connected_at?.slice(0,10)}</div>
                        : <div style={{fontSize:10,color:'var(--text-muted)'}}>○ Not connected</div>}
                    </div>
                  </div>
                  {isConnected && <button className="btn btn-ghost btn-sm" onClick={()=>disconnect(partner.id)} style={{color:'#f87171',fontSize:10}}>Disconnect</button>}
                </div>
                <div style={{padding:16}}>
                  {isConnected ? (
                    <div style={{fontSize:12,color:'var(--text-muted)',textAlign:'center',padding:'8px 0'}}>
                      ✓ Credentials saved. Tracking is active for all {partner.name} AWBs.
                    </div>
                  ) : (
                    <>
                      <div style={{fontSize:11,color:'var(--text-muted)',marginBottom:12,lineHeight:1.6}}>{partner.help}</div>
                      {partner.fields.map(f=>(
                        <div key={f.key} style={{marginBottom:10}}>
                          <label className="form-label">{f.label}</label>
                          <input className="form-input" type={f.type} placeholder={f.placeholder}
                            value={(forms[partner.id]||{})[f.key]||''}
                            onChange={e=>setField(partner.id, f.key, e.target.value)}/>
                        </div>
                      ))}
                      <button className="btn btn-green" style={{width:'100%',marginTop:4}} onClick={()=>save(partner)} disabled={saving[partner.id]}>
                        {saving[partner.id] ? <><span className="spin">↻</span> Connecting…</> : `Connect ${partner.name}`}
                      </button>
                    </>
                  )}
                </div>
              </div>
            );
          })}
        </div>

        <div className="card">
          <div style={{padding:16}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
              <div>
                <div style={{fontSize:12,fontWeight:700,color:'var(--text)'}}>Bulk Sync Delivery Status</div>
                <div style={{fontSize:11,color:'var(--text-muted)',marginTop:3}}>Refresh delivery status for all orders with an AWB number using connected partners.</div>
                {syncResult && <div style={{fontSize:11,color:'#10b981',marginTop:6}}>✓ Updated {syncResult.updated} orders{syncResult.message?` · ${syncResult.message}`:''}</div>}
              </div>
              <button className="btn btn-indigo" onClick={syncAll} disabled={syncing}>
                {syncing ? <><span className="spin">↻</span> Syncing…</> : '↻ Sync All Now'}
              </button>
            </div>
            <div style={{borderRadius:8,background:'rgba(6,182,212,0.06)',border:'1px solid rgba(6,182,212,0.2)'}}>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'12px 14px'}}>
                <div>
                  <div style={{fontSize:12,fontWeight:700,color:'#06b6d4'}}>🚚 Delhivery Tracking Cron</div>
                  <div style={{fontSize:11,color:'var(--text-muted)',marginTop:2}}>Auto-runs every 3 hours · checks all in-transit Delhivery AWBs and updates stage to Delivered/RTO automatically.</div>
                  {dlSyncMsg && <div style={{fontSize:11,color:'#10b981',marginTop:4}}>{dlSyncMsg}</div>}
                </div>
                <div style={{display:'flex',gap:6,flexShrink:0}}>
                  <button className="btn btn-sm btn-ghost" onClick={fetchDlLogs}>📋 View Logs</button>
                  <button className="btn btn-sm" onClick={syncDelhivery} disabled={dlSyncing}
                    style={{background:'#06b6d4',color:'#000',border:'none',fontWeight:600}}>
                    {dlSyncing ? <><span className="spin">↻</span> Running…</> : '▶ Run Now'}
                  </button>
                </div>
              </div>
              {dlLogsOpen && (
                <div style={{borderTop:'1px solid rgba(6,182,212,0.2)',padding:'10px 14px 14px'}}>
                  <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8}}>
                    <span style={{fontSize:11,fontWeight:700,color:'var(--text-muted)',textTransform:'uppercase',letterSpacing:'0.05em'}}>Last {dlLogs.length} Runs</span>
                    <button onClick={()=>setDlLogsOpen(false)} style={{background:'none',border:'none',color:'var(--text-muted)',cursor:'pointer',fontSize:12}}>✕</button>
                  </div>
                  {dlLogs.length===0 ? (
                    <div style={{fontSize:11,color:'var(--text-muted)'}}>No logs yet — run the cron first.</div>
                  ) : dlLogs.map((log,i)=>(
                    <div key={i} style={{marginBottom:10,padding:'8px 10px',borderRadius:6,background:'var(--bg-card)',border:'1px solid var(--border)'}}>
                      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:4}}>
                        <span style={{fontSize:11,fontWeight:700,color:'var(--text)'}}>{new Date(log.ran_at).toLocaleString('en-IN')}</span>
                        <div style={{display:'flex',gap:8,fontSize:10}}>
                          <span style={{color:'var(--text-muted)'}}>Checked: <strong style={{color:'var(--text)'}}>{log.checked||0}</strong></span>
                          <span style={{color:'#10b981'}}>Updated: <strong>{log.updated||0}</strong></span>
                          <span style={{color:'var(--text-muted)'}}>Skipped: {log.skipped||0}</span>
                          {(log.errors||[]).length>0 && <span style={{color:'#ef4444'}}>Errors: {log.errors.length}</span>}
                        </div>
                      </div>
                      {(()=>{
                        const details = log.checked_detail || [];
                        const updates = log.updates || [];
                        const allRows = details.length > 0 ? details : updates.map(u=>({...u, action:'updated_to_'+u.to, delhivery_status:u.status, current_stage:u.from}));
                        if (!allRows.length) return <div style={{fontSize:10,color:'var(--text-muted)'}}>{log.message||'No data.'}</div>;
                        const actionColor = a => a?.startsWith('updated')?'#10b981':a==='not_found'?'#ef4444':a==='unmapped'?'#f59e0b':'var(--text-muted)';
                        const actionLabel = a => a?.startsWith('updated_to_')?'→ '+a.replace('updated_to_','').toUpperCase():a==='not_found'?'Not Found':a==='no_change'?'No Change':a==='unmapped'?'Unknown Status':a;
                        return (
                          <div style={{marginTop:6,maxHeight:260,overflowY:'auto'}}>
                            <table style={{width:'100%',borderCollapse:'collapse',fontSize:10}}>
                              <thead><tr style={{color:'var(--text-muted)',borderBottom:'1px solid var(--border)'}}>
                                <th style={{textAlign:'left',padding:'2px 6px',fontWeight:500}}>Order</th>
                                <th style={{textAlign:'left',padding:'2px 6px',fontWeight:500}}>Vendor</th>
                                <th style={{textAlign:'left',padding:'2px 6px',fontWeight:500}}>AWB</th>
                                <th style={{textAlign:'left',padding:'2px 6px',fontWeight:500}}>Delhivery Status</th>
                                <th style={{textAlign:'left',padding:'2px 6px',fontWeight:500}}>Result</th>
                              </tr></thead>
                              <tbody>
                                {allRows.map((r,j)=>(
                                  <tr key={j} style={{borderBottom:'1px solid var(--border)',background:r.action?.startsWith('updated')?'rgba(16,185,129,0.05)':r.action==='not_found'?'rgba(239,68,68,0.05)':'transparent'}}>
                                    <td style={{padding:'3px 6px',color:'var(--indigo)',fontWeight:600}}>{r.shopify_id}</td>
                                    <td style={{padding:'3px 6px',color:'var(--text-muted)',maxWidth:80,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.vendor}</td>
                                    <td style={{padding:'3px 6px',fontFamily:'monospace',color:'var(--text-muted)',fontSize:9}}>{r.awb}</td>
                                    <td style={{padding:'3px 6px',color:'var(--text)'}}>{r.delhivery_status}</td>
                                    <td style={{padding:'3px 6px',fontWeight:700,color:actionColor(r.action)}}>{actionLabel(r.action)}</td>
                                  </tr>
                                ))}
                              </tbody>
                            </table>
                          </div>
                        );
                      })()}
                    </div>
                  ))}
                </div>
              )}
            </div>
          </div>
        </div>
      </div>
    );
  }

  /* ══════════════════════════════════
     VENDOR SYNC
  ══════════════════════════════════ */
  function VendorSync({ token }) {
    const [connections, setConnections] = useState([]);
    const [selected,    setSelected]    = useState(null); // vendor_name
    const [products,    setProducts]    = useState([]);
    const [mappings,    setMappings]    = useState([]);
    const [loading,     setLoading]     = useState(false);
    const [prodLoading, setProdLoading] = useState(false);
    const [tab,         setTab]         = useState('products'); // products | mappings
    const [importing,   setImporting]   = useState({}); // productId -> bool
    const [syncing,     setSyncing]     = useState(false);
    const [msg,         setMsg]         = useState('');
    // Map modal
    const [mapModal,    setMapModal]    = useState(null); // {vendorProduct, vendorVariant}
    const [ccSearch,    setCcSearch]    = useState('');
    const [ccProducts,  setCcProducts]  = useState([]);
    const [ccSearching, setCcSearching] = useState(false);
    const [mapSaving,   setMapSaving]   = useState(false);

    const loadConnections = () => {
      setLoading(true);
      fetch('/admin/vendor-sync/connections', { headers: { Authorization: 'Bearer '+token } })
        .then(r=>r.json()).then(d=>{ setConnections(d.connections||[]); setLoading(false); });
    };

    useEffect(loadConnections, []);

    const loadVendorProducts = (vendor) => {
      setSelected(vendor); setProdLoading(true); setProducts([]); setMappings([]); setMsg('');
      fetch(`/admin/vendor-sync/${encodeURIComponent(vendor)}/products`, { headers:{ Authorization:'Bearer '+token } })
        .then(r=>r.json()).then(d=>{ setProducts(d.products||[]); setMappings(d.mappings||[]); setProdLoading(false); });
    };

    const loadMappings = () => {
      if (!selected) return;
      fetch(`/admin/vendor-sync/mappings?vendor_name=${encodeURIComponent(selected)}`, { headers:{ Authorization:'Bearer '+token } })
        .then(r=>r.json()).then(d=>setMappings(d.mappings||[]));
    };

    const importProduct = async (product) => {
      setImporting(p=>({...p,[product.id]:true})); setMsg('');
      const r = await fetch('/admin/vendor-sync/import', { method:'POST', headers:{'Content-Type':'application/json',Authorization:'Bearer '+token},
        body: JSON.stringify({ vendor_name: selected, vendor_product_id: String(product.id), sync_inventory: true }) });
      const d = await r.json();
      setImporting(p=>({...p,[product.id]:false}));
      if (d.success) { setMsg(`✅ "${product.title}" imported as active product #${d.croscrow_product_id} (${d.variants_mapped} variants mapped)`); loadVendorProducts(selected); }
      else setMsg(`❌ ${d.error}`);
    };

    const syncInventory = async () => {
      setSyncing(true); setMsg('');
      const r = await fetch('/admin/vendor-sync/sync-inventory', { method:'POST', headers:{'Content-Type':'application/json',Authorization:'Bearer '+token},
        body: JSON.stringify({ vendor_name: selected }) });
      const d = await r.json();
      setSyncing(false);
      setMsg(d.success ? `✅ Synced ${d.synced} variants${d.errors?.length?' | Errors: '+d.errors.join(', '):''}` : `❌ ${d.error}`);
      loadMappings();
    };

    const unmapVariant = async (id) => {
      await fetch(`/admin/vendor-sync/map/${id}`, { method:'DELETE', headers:{ Authorization:'Bearer '+token } });
      loadMappings(); loadVendorProducts(selected);
    };

    // Map modal helpers
    const searchCcProducts = async (q) => {
      setCcSearching(true);
      const qs = q ? `?q=${encodeURIComponent(q)}` : '';
      const r = await fetch(`/admin/vendor-sync/croscrow-products${qs}`, { headers:{ Authorization:'Bearer '+token } });
      const d = await r.json();
      setCcProducts(d.products||[]); setCcSearching(false);
    };

    useEffect(()=>{ if (ccSearch.length > 1) { const t = setTimeout(()=>searchCcProducts(ccSearch), 400); return ()=>clearTimeout(t); } }, [ccSearch]);
    useEffect(()=>{ if (mapModal) { setCcSearch(''); setCcProducts([]); searchCcProducts(''); } }, [mapModal]);

    const saveMapping = async (ccProduct, ccVariant) => {
      if (!mapModal) return;
      setMapSaving(true);
      await fetch('/admin/vendor-sync/map', { method:'POST', headers:{'Content-Type':'application/json',Authorization:'Bearer '+token},
        body: JSON.stringify({ vendor_name: selected, vendor_product_id: String(mapModal.vendorProduct.id), vendor_variant_id: String(mapModal.vendorVariant.id), croscrow_product_id: String(ccProduct.id), croscrow_variant_id: String(ccVariant.id), sync_inventory: true }) });
      setMapSaving(false); setMapModal(null); setCcSearch(''); setCcProducts([]);
      loadVendorProducts(selected);
    };

    const fmtDate = ts => new Date(ts).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'});

    return (
      <div style={{padding:'24px',maxWidth:1100,display:'flex',gap:24}}>
        {/* Left: connections list */}
        <div style={{width:240,flexShrink:0}}>
          <div style={{fontSize:13,fontWeight:700,color:'var(--text)',marginBottom:12}}>🔄 Connected Stores</div>
          {loading ? <div style={{color:'var(--text-muted)',fontSize:12}}>Loading…</div> : connections.length===0 ? (
            <div style={{background:'var(--bg-card)',borderRadius:8,padding:16,fontSize:12,color:'var(--text-muted)',textAlign:'center'}}>
              No vendor stores connected yet.<br/><br/>Vendors connect from their panel → Settings → Connect Shopify.
            </div>
          ) : connections.map(c=>(
            <button key={c.vendor_name} onClick={()=>loadVendorProducts(c.vendor_name)}
              style={{width:'100%',textAlign:'left',background:selected===c.vendor_name?'var(--indigo-dim)':'var(--bg-card)',border:`1px solid ${selected===c.vendor_name?'var(--indigo)':'var(--border)'}`,borderRadius:8,padding:'10px 12px',marginBottom:8,cursor:'pointer',color:'var(--text)'}}>
              <div style={{fontWeight:600,fontSize:13}}>{c.vendor_name}</div>
              <div style={{fontSize:10,color:'var(--text-muted)',marginTop:2}}>{c.shop_domain}</div>
              <div style={{fontSize:9,color:'var(--green)',marginTop:3}}>● Connected {fmtDate(c.installed_at)}</div>
            </button>
          ))}
        </div>

        {/* Right: products / mappings */}
        <div style={{flex:1,minWidth:0}}>
          {!selected ? (
            <div style={{background:'var(--bg-card)',borderRadius:10,padding:60,textAlign:'center',color:'var(--text-muted)'}}>
              <div style={{fontSize:32,marginBottom:12}}>🔄</div>
              <div style={{fontSize:14,fontWeight:600,marginBottom:6}}>Vendor Product Sync</div>
              <div style={{fontSize:12}}>Select a connected vendor on the left to browse their products and manage mappings.</div>
            </div>
          ) : (
            <>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}}>
                <div style={{fontSize:16,fontWeight:700,color:'var(--text)'}}>{selected}</div>
                <div style={{display:'flex',gap:8}}>
                  <button className={`btn btn-sm ${tab==='products'?'btn-primary':'btn-ghost'}`} onClick={()=>setTab('products')}>Products</button>
                  <button className={`btn btn-sm ${tab==='mappings'?'btn-primary':'btn-ghost'}`} onClick={()=>{ setTab('mappings'); loadMappings(); }}>Mappings ({mappings.length})</button>
                  <button className="btn btn-sm btn-ghost" onClick={syncInventory} disabled={syncing} title="Sync price & inventory from vendor store to CrosCrow for all mapped variants">
                    {syncing?'Syncing…':'↻ Sync Price & Stock'}
                  </button>
                </div>
              </div>

              {msg && <div style={{marginBottom:12,fontSize:12,padding:'8px 12px',borderRadius:6,background:msg.startsWith('✅')?'var(--green-dim)':'var(--red-bg)',color:msg.startsWith('✅')?'var(--green)':'var(--red)'}}>{msg}</div>}

              {/* PRODUCTS TAB */}
              {tab==='products' && (
                prodLoading ? <div style={{color:'var(--text-muted)',fontSize:12,padding:20}}>Loading products…</div> :
                products.length===0 ? <div style={{color:'var(--text-muted)',fontSize:12,padding:20}}>No products found in vendor store.</div> :
                <div style={{display:'flex',flexDirection:'column',gap:10}}>
                  {products.map(p=>{
                    const allMapped = p.variants.every(v=>v.mapped);
                    const someMapped = p.variants.some(v=>v.mapped);
                    const img = p.images?.[0]?.src;
                    return (
                      <div key={p.id} style={{background:'var(--bg-card)',border:'1px solid var(--border)',borderRadius:10,padding:14}}>
                        <div style={{display:'flex',gap:12,alignItems:'flex-start'}}>
                          {img && <img src={img} style={{width:56,height:56,objectFit:'cover',borderRadius:6,flexShrink:0}} alt=""/>}
                          <div style={{flex:1,minWidth:0}}>
                            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:4}}>
                              <span style={{fontWeight:700,fontSize:13,color:'var(--text)'}}>{p.title}</span>
                              {allMapped && <span style={{fontSize:10,padding:'2px 7px',borderRadius:10,background:'var(--green-dim)',color:'var(--green)'}}>All Mapped</span>}
                              {someMapped && !allMapped && <span style={{fontSize:10,padding:'2px 7px',borderRadius:10,background:'var(--yellow-bg)',color:'var(--yellow)'}}>Partial</span>}
                            </div>
                            <div style={{fontSize:11,color:'var(--text-muted)',marginBottom:8}}>{p.product_type} · {p.variants.length} variant{p.variants.length!==1?'s':''} · {p.status}</div>
                            {/* Variants */}
                            <div style={{display:'flex',flexWrap:'wrap',gap:6,marginBottom:10}}>
                              {p.variants.map(v=>(
                                <div key={v.id} style={{fontSize:11,padding:'3px 8px',borderRadius:6,background:v.mapped?'var(--green-dim)':'var(--bg-hover)',border:`1px solid ${v.mapped?'#1a4731':'var(--border)'}`,color:v.mapped?'var(--green)':'var(--text-muted)',display:'flex',alignItems:'center',gap:5}}>
                                  {v.title!=='Default Title'&&<span>{v.title}</span>}
                                  <span style={{color:'var(--text)'}}>₹{parseFloat(v.price).toFixed(0)}</span>
                                  {v.mapped ? <span>✓</span> : (
                                    <button onClick={()=>{ setMapModal({vendorProduct:p,vendorVariant:v}); setCcSearch(''); setCcProducts([]); }}
                                      style={{fontSize:9,padding:'1px 5px',borderRadius:4,border:'1px solid var(--indigo)',background:'transparent',color:'var(--indigo)',cursor:'pointer'}}>Map</button>
                                  )}
                                </div>
                              ))}
                            </div>
                          </div>
                          <button className="btn btn-sm btn-indigo" onClick={()=>importProduct(p)} disabled={importing[p.id]||allMapped}
                            style={{flexShrink:0}}>
                            {importing[p.id]?'Importing…':allMapped?'Imported':'↓ Import All'}
                          </button>
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}

              {/* MAPPINGS TAB */}
              {tab==='mappings' && (
                mappings.length===0 ? <div style={{color:'var(--text-muted)',fontSize:12,padding:20}}>No variant mappings yet. Import or map products from the Products tab.</div> :
                <div style={{background:'var(--bg-card)',borderRadius:10,overflow:'hidden'}}>
                  <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
                    <thead><tr style={{borderBottom:'1px solid var(--border)'}}>
                      <th style={{padding:'10px 14px',textAlign:'left',color:'var(--text-muted)',fontWeight:600}}>Vendor Variant ID</th>
                      <th style={{padding:'10px 14px',textAlign:'left',color:'var(--text-muted)',fontWeight:600}}>CrosCrow Product ID</th>
                      <th style={{padding:'10px 14px',textAlign:'left',color:'var(--text-muted)',fontWeight:600}}>CrosCrow Variant ID</th>
                      <th style={{padding:'10px 14px',textAlign:'center',color:'var(--text-muted)',fontWeight:600}}>Inv Sync</th>
                      <th style={{padding:'10px 14px',textAlign:'left',color:'var(--text-muted)',fontWeight:600}}>Last Synced</th>
                      <th style={{padding:'10px 14px'}}></th>
                    </tr></thead>
                    <tbody>
                      {mappings.map(m=>(
                        <tr key={m.id} style={{borderBottom:'1px solid var(--border)'}}>
                          <td style={{padding:'8px 14px',fontFamily:'monospace',color:'var(--indigo)'}}>{m.vendor_variant_id}</td>
                          <td style={{padding:'8px 14px',fontFamily:'monospace',color:'var(--text-muted)'}}>{m.croscrow_product_id}</td>
                          <td style={{padding:'8px 14px',fontFamily:'monospace',color:'var(--text-muted)'}}>{m.croscrow_variant_id}</td>
                          <td style={{padding:'8px 14px',textAlign:'center'}}>{m.sync_inventory?<span style={{color:'var(--green)'}}>✓</span>:<span style={{color:'var(--red)'}}>✕</span>}</td>
                          <td style={{padding:'8px 14px',color:'var(--text-muted)'}}>{m.last_synced_at?fmtDate(m.last_synced_at):'Never'}</td>
                          <td style={{padding:'8px 14px'}}><button className="btn btn-danger btn-sm" onClick={()=>unmapVariant(m.id)}>Unmap</button></td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              )}
            </>
          )}
        </div>

        {/* Map Modal */}
        {mapModal && (
          <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.7)',zIndex:2000,display:'flex',alignItems:'center',justifyContent:'center'}}>
            <div style={{background:'var(--bg-card)',borderRadius:14,padding:28,width:500,maxWidth:'90vw',maxHeight:'80vh',overflowY:'auto'}}>
              <h3 style={{margin:'0 0 4px',color:'var(--text)',fontSize:15}}>Map Variant to CrosCrow Product</h3>
              <div style={{fontSize:12,color:'var(--text-muted)',marginBottom:16}}>
                Vendor: <strong>{mapModal.vendorProduct.title}</strong> — {mapModal.vendorVariant.title} (₹{mapModal.vendorVariant.price})
              </div>
              <div style={{display:'flex',gap:8,marginBottom:12}}>
                <input className="form-input" placeholder="Search CrosCrow products…" value={ccSearch}
                  onChange={e=>setCcSearch(e.target.value)}
                  onKeyDown={e=>{ if(e.key==='Enter' && ccSearch.trim().length>1) searchCcProducts(ccSearch.trim()); }}
                  style={{flex:1,boxSizing:'border-box'}}/>
                <button className="btn btn-sm btn-primary" onClick={()=>{ if(ccSearch.trim().length>1) searchCcProducts(ccSearch.trim()); }} disabled={ccSearching}>
                  {ccSearching?'…':'Search'}
                </button>
              </div>
              {ccSearching && <div style={{color:'var(--text-muted)',fontSize:12,marginBottom:8}}>Searching…</div>}
              <div style={{display:'flex',flexDirection:'column',gap:8}}>
                {ccProducts.map(cp=>(
                  <div key={cp.id} style={{background:'var(--bg-hover)',borderRadius:8,padding:12}}>
                    <div style={{fontWeight:600,fontSize:13,marginBottom:6}}>{cp.title}</div>
                    <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
                      {(cp.variants||[]).map(cv=>(
                        <button key={cv.id} onClick={()=>saveMapping(cp,cv)} disabled={mapSaving}
                          style={{fontSize:11,padding:'4px 10px',borderRadius:6,border:'1px solid var(--indigo)',background:'var(--indigo-dim)',color:'var(--indigo)',cursor:'pointer',fontWeight:600}}>
                          {cv.title!=='Default Title'?cv.title:'Default'} — ₹{parseFloat(cv.price).toFixed(0)}
                        </button>
                      ))}
                    </div>
                  </div>
                ))}
                {ccProducts.length===0 && !ccSearching && <div style={{fontSize:12,color:'var(--text-muted)'}}>
                  {ccSearch.length>1 ? 'No products found. Try a different keyword.' : 'Showing top 20 products. Type to search.'}
                </div>}
              </div>
              <div style={{marginTop:16,textAlign:'right'}}><button className="btn btn-ghost" onClick={()=>setMapModal(null)}>Cancel</button></div>
            </div>
          </div>
        )}
      </div>
    );
  }

  /* ══════════════════════════════════
     PENALTY MANAGER
  ══════════════════════════════════ */
  function PenaltyManager({ token }) {
    const [penalties, setPenalties] = useState([]);
    const [loading, setLoading]     = useState(true);
    const [filter, setFilter]       = useState('pending');
    const [modal, setModal]         = useState(null); // {penalty, action}
    const [amount, setAmount]       = useState('');
    const [note, setNote]           = useState('');
    const [saving, setSaving]       = useState(false);
    const [testForm, setTestForm]   = useState({ shopify_id:'', vendor_name:'', order_name:'' });
    const [testMsg, setTestMsg]     = useState('');

    const load = () => {
      setLoading(true);
      fetch(`/admin/penalties?status=${filter}`, { headers:{ Authorization:'Bearer '+token } })
        .then(r=>r.json()).then(d=>{ setPenalties(d.penalties||[]); setLoading(false); });
    };
    useEffect(load, [filter]);

    const openModal = (p, action) => {
      setModal({p, action});
      setAmount(action==='confirm'?'100':'');
      setNote(action==='confirm'?'Fulfilment not done within 48 hours. Delay was not reported to CrosCrow team or on panel.':'');
    };

    const deletePenalty = async (p) => {
      if (!window.confirm(`Delete this ${p.status} penalty for ${p.order_name} (${p.vendor_name})? This cannot be undone.`)) return;
      await fetch(`/admin/penalties/${p.id}`, { method:'DELETE', headers:{ Authorization:'Bearer '+token } });
      load();
    };

    const submit = async () => {
      setSaving(true);
      await fetch(`/admin/penalties/${modal.p.id}`, {
        method:'PUT', headers:{'Content-Type':'application/json', Authorization:'Bearer '+token},
        body: JSON.stringify({ action: modal.action, penalty_amount: amount, admin_note: note })
      });
      setSaving(false);
      setModal(null);
      load();
    };

    const triggerTest = async () => {
      if (!testForm.shopify_id || !testForm.vendor_name) { setTestMsg('Fill shopify_id and vendor_name.'); return; }
      const r = await fetch('/admin/penalties/test-trigger', { method:'POST', headers:{'Content-Type':'application/json',Authorization:'Bearer '+token}, body: JSON.stringify(testForm) });
      const d = await r.json();
      setTestMsg(d.message || d.error);
      if (d.success) { setTestForm({ shopify_id:'', vendor_name:'', order_name:'' }); load(); }
    };
    const runCron = async () => {
      const r = await fetch('/admin/penalties/run-cron', { method:'POST', headers:{Authorization:'Bearer '+token} });
      const d = await r.json();
      setTestMsg('Cron ran — check for new penalties.');
      load();
    };

    const statusColor = s => s==='pending'?'#f59e0b':s==='confirmed'?'#ef4444':'#6b7280';
    const ago = ts => { const h=Math.floor((Date.now()-ts)/3600000); return h<24?`${h}h ago`:`${Math.floor(h/24)}d ago`; };

    return (
      <div style={{padding:'24px',maxWidth:900}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:20}}>
          <h2 style={{margin:0,fontSize:20,color:'var(--text)'}}>⚠️ Vendor Penalties</h2>
          <div style={{display:'flex',gap:8}}>
            {['pending','confirmed','cancelled'].map(s=>(
              <button key={s} onClick={()=>setFilter(s)} className={`btn btn-sm ${filter===s?'btn-primary':'btn-ghost'}`}
                style={{textTransform:'capitalize'}}>{s}</button>
            ))}
            <button className="btn btn-sm btn-ghost" onClick={runCron} title="Force-run the 24hr/48hr check now">↻ Run Cron</button>
          </div>
        </div>

        {/* Test trigger panel */}
        <div style={{background:'var(--bg-card)',border:'1px dashed #334155',borderRadius:10,padding:16,marginBottom:20}}>
          <div style={{fontSize:12,fontWeight:700,color:'var(--text-muted)',marginBottom:10,textTransform:'uppercase',letterSpacing:1}}>🧪 Test — Manually Trigger a Penalty</div>
          <div style={{display:'flex',gap:10,flexWrap:'wrap',alignItems:'flex-end'}}>
            <div>
              <label style={{fontSize:11,color:'var(--text-muted)',display:'block',marginBottom:4}}>Shopify Order ID</label>
              <input className="input" style={{width:140}} placeholder="e.g. 6781234567890" value={testForm.shopify_id} onChange={e=>setTestForm(f=>({...f,shopify_id:e.target.value}))}/>
            </div>
            <div>
              <label style={{fontSize:11,color:'var(--text-muted)',display:'block',marginBottom:4}}>Vendor Name</label>
              <input className="input" style={{width:160}} placeholder="e.g. My Vendor" value={testForm.vendor_name} onChange={e=>setTestForm(f=>({...f,vendor_name:e.target.value}))}/>
            </div>
            <div>
              <label style={{fontSize:11,color:'var(--text-muted)',display:'block',marginBottom:4}}>Order Name (optional)</label>
              <input className="input" style={{width:120}} placeholder="e.g. #1001" value={testForm.order_name} onChange={e=>setTestForm(f=>({...f,order_name:e.target.value}))}/>
            </div>
            <button className="btn" style={{background:'#ef4444',color:'#fff'}} onClick={triggerTest}>Trigger Test Penalty</button>
            <button className="btn btn-ghost" onClick={async()=>{
              if (!testForm.shopify_id || !testForm.vendor_name) { setTestMsg('Fill shopify_id and vendor_name.'); return; }
              const r = await fetch('/admin/penalties/test-warning', { method:'POST', headers:{'Content-Type':'application/json',Authorization:'Bearer '+token}, body:JSON.stringify(testForm) });
              const d = await r.json();
              setTestMsg(d.message || d.error);
            }}>📧 Send Test Warning Email</button>
          </div>
          {testMsg && <div style={{marginTop:10,fontSize:12,color:'#f59e0b'}}>{testMsg}</div>}
        </div>

        {loading ? <div style={{color:'var(--text-muted)'}}>Loading...</div> : penalties.length===0 ? (
          <div style={{background:'var(--bg-card)',borderRadius:10,padding:40,textAlign:'center',color:'var(--text-muted)'}}>
            No {filter} penalties.
          </div>
        ) : (
          <div style={{display:'flex',flexDirection:'column',gap:12}}>
            {penalties.map(p=>(
              <div key={p.id} style={{background:'var(--bg-card)',border:'1px solid var(--border)',borderRadius:10,padding:18}}>
                <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:12}}>
                  <div style={{flex:1}}>
                    <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:6}}>
                      <span style={{fontWeight:700,color:'var(--text)',fontSize:15}}>{p.order_name||p.shopify_id}</span>
                      <span style={{fontSize:11,padding:'2px 8px',borderRadius:20,background:statusColor(p.status)+'22',color:statusColor(p.status),fontWeight:600}}>
                        {p.status.toUpperCase()}
                      </span>
                    </div>
                    <div style={{fontSize:13,color:'var(--text-muted)',marginBottom:4}}>
                      Vendor: <strong style={{color:'var(--text)'}}>{p.vendor_name}</strong>
                    </div>
                    <div style={{fontSize:12,color:'var(--text-muted)'}}>
                      Triggered: {ago(p.triggered_at)} · Reason: <span style={{color:'#f59e0b'}}>{p.trigger_reason==='48hr_breach'?'48hr fulfilment breach':p.trigger_reason==='eta_breach'?'ETA date missed':p.trigger_reason}</span>
                    </div>
                    {p.penalty_amount>0 && <div style={{fontSize:13,color:'#ef4444',fontWeight:700,marginTop:4}}>Penalty: ₹{p.penalty_amount.toFixed(2)}</div>}
                    {p.admin_note && <div style={{fontSize:12,color:'var(--text-muted)',marginTop:4}}>Note: {p.admin_note}</div>}
                    {p.vendor_review_request && (
                      <div style={{marginTop:10,padding:'10px 12px',borderRadius:8,background:'rgba(99,102,241,0.08)',border:'1px solid rgba(99,102,241,0.3)'}}>
                        <div style={{fontSize:10,fontWeight:700,color:'var(--indigo)',marginBottom:4,letterSpacing:'0.05em',textTransform:'uppercase'}}>
                          📨 Vendor Review Request
                        </div>
                        <div style={{fontSize:12,color:'var(--text)',lineHeight:1.5}}>{p.vendor_review_request}</div>
                        <div style={{fontSize:10,color:'var(--text-muted)',marginTop:4}}>{p.vendor_review_at ? new Date(p.vendor_review_at).toLocaleString('en-IN') : ''}</div>
                      </div>
                    )}
                  </div>
                  <div style={{display:'flex',gap:8,flexShrink:0,flexWrap:'wrap',justifyContent:'flex-end'}}>
                    {p.status==='pending' && <>
                      <button className="btn btn-sm" style={{background:'#ef4444',color:'#fff'}} onClick={()=>openModal(p,'confirm')}>Confirm Penalty</button>
                      <button className="btn btn-sm btn-ghost" onClick={()=>openModal(p,'cancel')}>Cancel</button>
                    </>}
                    <button className="btn btn-sm" style={{background:'transparent',color:'#6b7280',border:'1px solid #374151'}} onClick={()=>deletePenalty(p)} title="Permanently delete this penalty">🗑 Delete</button>
                  </div>
                </div>
              </div>
            ))}
          </div>
        )}

        {modal && (
          <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.6)',zIndex:1000,display:'flex',alignItems:'center',justifyContent:'center'}}>
            <div style={{background:'var(--bg-card)',borderRadius:12,padding:28,width:400,maxWidth:'90vw'}}>
              <h3 style={{margin:'0 0 16px',color:'var(--text)',fontSize:16}}>
                {modal.action==='confirm'?'⚠️ Confirm Penalty':'✕ Cancel Penalty'} — {modal.p.order_name}
              </h3>
              {modal.action==='confirm' && (
                <div style={{marginBottom:14}}>
                  <label style={{fontSize:12,color:'var(--text-muted)',display:'block',marginBottom:6}}>Penalty Amount (₹)</label>
                  <input className="input" type="number" min="0" value={amount} onChange={e=>setAmount(e.target.value)}
                    placeholder="e.g. 500" style={{width:'100%',boxSizing:'border-box'}}/>
                  <div style={{fontSize:11,color:'var(--text-muted)',marginTop:4}}>This will be added to the vendor's next settlement invoice.</div>
                </div>
              )}
              <div style={{marginBottom:18}}>
                <label style={{fontSize:12,color:'var(--text-muted)',display:'block',marginBottom:6}}>Admin Note (optional)</label>
                <textarea className="input" rows={3} value={note} onChange={e=>setNote(e.target.value)}
                  placeholder="Reason for decision..." style={{width:'100%',boxSizing:'border-box',resize:'vertical'}}/>
              </div>
              <div style={{display:'flex',gap:10,justifyContent:'flex-end'}}>
                <button className="btn btn-ghost" onClick={()=>setModal(null)}>Cancel</button>
                <button className="btn" style={{background:modal.action==='confirm'?'#ef4444':'#6b7280',color:'#fff'}}
                  onClick={submit} disabled={saving}>{saving?'Saving...':modal.action==='confirm'?'Confirm & Apply':'Cancel Penalty'}</button>
              </div>
            </div>
          </div>
        )}
      </div>
    );
  }

  /* ══════════════════════════════════
     TAG MAPPINGS VIEW
  ══════════════════════════════════ */
  const ALL_STAGES = [
    { value:'new',       label:'New' },
    { value:'confirmed', label:'Confirmed' },
    { value:'partial',   label:'Partial/Advance' },
    { value:'ready',     label:'Ready to Ship' },
    { value:'pickup',    label:'Pickup Pending' },
    { value:'transit',   label:'In Transit' },
    { value:'delivered', label:'Delivered' },
    { value:'rto',       label:'RTO' },
    { value:'penalty',   label:'Penalty' },
    { value:'hold',      label:'On Hold' },
    { value:'cancelled', label:'Cancelled' },
  ];

  function TagMappings({ token }) {
    const [mappings,    setMappings]    = useState([]);
    const [loading,     setLoading]     = useState(true);
    const [shopifyTags, setShopifyTags] = useState([]);
    const [tagsLoading, setTagsLoading] = useState(false);
    const [newTag,      setNewTag]      = useState('');
    const [tagInput,    setTagInput]    = useState('');
    const [showDrop,    setShowDrop]    = useState(false);
    const [newStage,    setNewStage]    = useState('confirmed');
    const [newPriority, setNewPriority] = useState('');
    const [newSuperHoldPower, setNewSuperHoldPower] = useState(false);
    const [adding,      setAdding]      = useState(false);
    const [syncing,     setSyncing]     = useState(false);
    const [editingPri,  setEditingPri]  = useState({}); // id → value
    const [msg,         setMsg]         = useState(null);
    const [syncResult,  setSyncResult]  = useState(null);

    const load = () => {
      setLoading(true);
      fetch(`${API}/admin/tag-mappings`,{headers:{Authorization:`Bearer ${token}`}})
        .then(r=>r.json()).then(d=>setMappings(d.mappings||[])).catch(()=>{}).finally(()=>setLoading(false));
    };

    const loadTags = () => {
      if (shopifyTags.length) return;
      setTagsLoading(true);
      fetch(`${API}/admin/order-tags`,{headers:{Authorization:`Bearer ${token}`}})
        .then(r=>r.json()).then(d=>setShopifyTags(d.tags||[])).catch(()=>{}).finally(()=>setTagsLoading(false));
    };

    useEffect(()=>{ load(); loadTags(); },[token]);

    const addMapping = async () => {
      if (!newTag.trim()) { setMsg({type:'error',text:'Tag name required.'}); return; }
      setAdding(true); setMsg(null);
      // Auto-assign next priority if not set
      const pri = newPriority !== '' ? parseInt(newPriority) : (mappings.length > 0 ? Math.max(...mappings.map(m=>m.priority||99)) + 1 : 1);
      try {
        const r = await fetch(`${API}/admin/tag-mappings`,{
          method:'POST', headers:{'Content-Type':'application/json','Authorization':`Bearer ${token}`},
          body: JSON.stringify({ shopify_tag: newTag.trim(), stage: newStage, priority: pri, super_hold_power: newSuperHoldPower }),
        });
        const d = await r.json();
        if (!r.ok) throw new Error(d.error);
        setMsg({type:'success',text:`Added: "${newTag}" → ${newStage} (priority ${pri})${newSuperHoldPower?' · 🔒 Super Hold Power':''}`});
        setNewTag(''); setTagInput(''); setNewPriority(''); setNewSuperHoldPower(false); load();
      } catch(e) { setMsg({type:'error',text:e.message}); }
      setAdding(false);
    };

    const deleteMapping = async id => {
      await fetch(`${API}/admin/tag-mappings/${id}`,{method:'DELETE',headers:{Authorization:`Bearer ${token}`}});
      load();
    };

    const savePriority = async (id, val) => {
      const num = parseInt(val);
      if (isNaN(num)) return;
      await fetch(`${API}/admin/tag-mappings/${id}/priority`,{
        method:'PUT', headers:{'Content-Type':'application/json','Authorization':`Bearer ${token}`},
        body: JSON.stringify({ priority: num }),
      });
      setEditingPri(p=>({...p,[id]:undefined}));
      load();
    };

    const toggleSuperHoldPower = async (id, current) => {
      await fetch(`${API}/admin/tag-mappings/${id}/super-hold-power`, {
        method:'PUT', headers:{'Content-Type':'application/json','Authorization':`Bearer ${token}`},
        body: JSON.stringify({ enabled: !current }),
      });
      load();
    };

    const syncNow = async () => {
      setSyncing(true); setSyncResult(null); setMsg(null);
      try {
        const r = await fetch(`${API}/admin/tag-mappings/sync`,{method:'POST',headers:{Authorization:`Bearer ${token}`}});
        const d = await r.json();
        if (!r.ok) throw new Error(d.error);
        setSyncResult(d);
      } catch(e) { setMsg({type:'error',text:e.message}); }
      setSyncing(false);
    };

    const stageLabel = v => ALL_STAGES.find(s=>s.value===v)?.label || v;

    return (
      <div className="page">
        {/* How it works banner */}
        <div style={{background:'var(--indigo-dim)',border:'1px solid var(--indigo)',borderRadius:10,padding:'12px 16px',marginBottom:20,fontSize:12,color:'var(--text)'}}>
          <div style={{fontWeight:700,color:'var(--indigo)',marginBottom:6}}>🏷 Priority-Based Tag Mappings</div>
          <div style={{lineHeight:1.8,color:'var(--text-muted)'}}>
            Each tag has a <strong>priority number</strong> — lower number wins. If an order has multiple mapped tags (e.g. <code style={{background:'var(--bg-card)',padding:'1px 5px',borderRadius:4}}>Confirmed</code> + <code style={{background:'var(--bg-card)',padding:'1px 5px',borderRadius:4}}>Delivered</code>), the tag with the <strong>lowest priority number</strong> sets the stage — no matter the tag order in Shopify.
            <br/>Example: Delivered=1, In Transit=2, Confirmed=3 → an order with all three tags always goes to <strong>Delivered</strong>.
          </div>
        </div>

        {/* Add mapping */}
        <div className="card" style={{marginBottom:16,overflow:'visible'}}>
          <div className="card-header"><span className="card-title">Add Tag Mapping</span></div>
          <div style={{padding:16}}>
            {msg && <div className={`alert alert-${msg.type}`}>{msg.type==='success'?'✓':'⚠'} {msg.text}</div>}
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 80px auto',gap:12,alignItems:'end',overflow:'visible'}}>
              <div style={{position:'relative',overflow:'visible'}}>
                <label className="form-label">
                  Shopify Tag
                  {tagsLoading && <span style={{marginLeft:8,color:'var(--text-muted)',fontWeight:400}}>⟳ loading…</span>}
                  {!tagsLoading && shopifyTags.length>0 && <span style={{marginLeft:8,color:'var(--text-muted)',fontWeight:400}}>({shopifyTags.length} found)</span>}
                </label>
                <input className="form-input" placeholder="Search or type a tag…"
                  value={tagInput}
                  onChange={e=>{ setTagInput(e.target.value); setNewTag(e.target.value); setShowDrop(true); }}
                  onFocus={()=>setShowDrop(true)}
                  onBlur={()=>setTimeout(()=>setShowDrop(false),150)}
                  onKeyDown={e=>e.key==='Enter'&&addMapping()}/>
                {showDrop && shopifyTags.length>0 && (()=>{
                  const filtered = shopifyTags.filter(t=>t.toLowerCase().includes(tagInput.toLowerCase()) && !mappings.find(m=>m.shopify_tag.toLowerCase()===t.toLowerCase()));
                  if (!filtered.length) return null;
                  return (
                    <div style={{position:'absolute',top:'calc(100% + 4px)',left:0,right:0,background:'#0d1f2d',border:'1px solid var(--indigo)',borderRadius:8,zIndex:9999,maxHeight:260,overflowY:'auto',boxShadow:'0 12px 40px #000000aa'}}>
                      {filtered.map(t=>(
                        <div key={t} onMouseDown={()=>{ setNewTag(t); setTagInput(t); setShowDrop(false); }}
                          style={{padding:'10px 14px',cursor:'pointer',fontSize:13,color:'#e2e8f0',borderBottom:'1px solid #1a3040',transition:'background 0.1s'}}
                          onMouseEnter={e=>e.currentTarget.style.background='#1a3a50'}
                          onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                          🏷 {t}
                        </div>
                      ))}
                    </div>
                  );
                })()}
              </div>
              <div>
                <label className="form-label">Maps to Stage</label>
                <select className="form-select" value={newStage} onChange={e=>setNewStage(e.target.value)}>
                  {ALL_STAGES.map(s=><option key={s.value} value={s.value}>{s.label}</option>)}
                </select>
              </div>
              <div>
                <label className="form-label">Priority</label>
                <input className="form-input" type="number" min="1" placeholder="auto"
                  value={newPriority} onChange={e=>setNewPriority(e.target.value)}/>
              </div>
              <button className="btn btn-indigo" onClick={addMapping} disabled={adding||!newTag.trim()}>
                {adding?<><span className="spin">↻</span> Adding…</>:'+ Add'}
              </button>
            </div>
            <div style={{marginTop:10,display:'flex',alignItems:'center',gap:8}}>
              <label style={{display:'flex',alignItems:'center',gap:6,cursor:'pointer',fontSize:12,color: newSuperHoldPower ? '#ef4444' : 'var(--text-muted)'}}>
                <input type="checkbox" checked={newSuperHoldPower} onChange={e=>setNewSuperHoldPower(e.target.checked)}
                  style={{accentColor:'#ef4444',width:14,height:14}}/>
                🔒 Super Hold Power — when this tag fires, it locks the order against all tag mapping overrides
              </label>
            </div>
          </div>
        </div>

        {/* Current mappings */}
        <div className="card" style={{marginBottom:16}}>
          <div className="card-header">
            <span className="card-title">Current Mappings</span>
            <span className="card-sub">sorted by priority · lowest wins</span>
          </div>
          <div className="tbl-wrap">
            <table>
              <thead><tr>
                <th style={{width:90}}>Priority</th>
                <th>Shopify Tag</th>
                <th>→</th>
                <th>Stage</th>
                <th>Super Hold</th>
                <th>Added</th>
                <th>Action</th>
              </tr></thead>
              <tbody>
                {loading ? Array.from({length:3}).map((_,i)=><SkelRow key={i} cols={6}/>) :
                 mappings.length===0 ? (
                   <tr><td colSpan={6}><div className="empty"><div className="empty-icon">🏷</div><div className="empty-title">No mappings yet</div><div className="empty-sub">Add your first tag mapping above.</div></div></td></tr>
                 ) :
                 mappings.map((m,i)=>(
                   <tr key={m.id} style={{background: m.super_hold_power ? 'rgba(239,68,68,0.06)' : i===0 ? '#0d1f10' : 'transparent'}}>
                     <td>
                       <div style={{display:'flex',alignItems:'center',gap:6}}>
                         <div style={{width:24,height:24,borderRadius:'50%',background: i===0?'#10b981':i===1?'#fbbf24':'var(--bg-card2)',
                           display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:700,
                           color: i===0?'#000':i===1?'#000':'var(--text-muted)',flexShrink:0}}>
                           {m.priority??99}
                         </div>
                         {editingPri[m.id] !== undefined ? (
                           <input type="number" min="1" style={{width:46,background:'var(--bg-card)',border:'1px solid var(--indigo)',borderRadius:4,color:'var(--text)',padding:'2px 4px',fontSize:11}}
                             value={editingPri[m.id]}
                             onChange={e=>setEditingPri(p=>({...p,[m.id]:e.target.value}))}
                             onBlur={()=>savePriority(m.id, editingPri[m.id])}
                             onKeyDown={e=>e.key==='Enter'&&savePriority(m.id, editingPri[m.id])}
                             autoFocus/>
                         ) : (
                           <span style={{fontSize:10,color:'var(--text-muted)',cursor:'pointer',textDecoration:'underline dotted'}}
                             onClick={()=>setEditingPri(p=>({...p,[m.id]:String(m.priority??99)}))}>
                             edit
                           </span>
                         )}
                       </div>
                     </td>
                     <td>
                       <span style={{background:'var(--bg-hover)',border:'1px solid var(--border-hi)',borderRadius:5,padding:'3px 9px',fontFamily:'monospace',fontSize:12,color:'var(--text)'}}>
                         {m.shopify_tag}
                       </span>
                     </td>
                     <td style={{color:'var(--text-muted)',fontSize:18}}>→</td>
                     <td>
                       <span style={{background:'var(--indigo-dim)',color:'var(--indigo)',borderRadius:5,padding:'3px 9px',fontSize:11,fontWeight:600}}>
                         {stageLabel(m.stage)}
                       </span>
                     </td>
                     <td>
                       <button onClick={()=>toggleSuperHoldPower(m.id, m.super_hold_power)}
                         title={m.super_hold_power ? 'Super Hold Power ON — click to disable' : 'Enable Super Hold Power'}
                         style={{fontSize:11,padding:'3px 9px',borderRadius:5,border:'none',cursor:'pointer',fontWeight:600,
                           background: m.super_hold_power ? 'rgba(239,68,68,0.2)' : 'var(--bg-card2)',
                           color: m.super_hold_power ? '#ef4444' : 'var(--text-muted)'}}>
                         {m.super_hold_power ? '🔒 ON' : '—'}
                       </button>
                     </td>
                     <td className="td-mut">{m.created_at?fmtDate(m.created_at):'—'}</td>
                     <td>
                       <button className="btn btn-danger btn-sm" onClick={()=>deleteMapping(m.id)}>✕</button>
                     </td>
                   </tr>
                 ))}
              </tbody>
            </table>
          </div>
        </div>

        {/* Sync */}
        <div className="card">
          <div className="card-header">
            <span className="card-title">Sync Orders from Tags</span>
            <span className="card-sub">Scans all Shopify orders and applies priority mappings</span>
          </div>
          <div style={{padding:16}}>
            {syncResult && (
              <div className="alert alert-success" style={{marginBottom:12}}>
                ✓ Sync complete — scanned <strong>{syncResult.total}</strong> orders, updated <strong>{syncResult.updated}</strong> order stages.
              </div>
            )}
            <div style={{display:'flex',gap:12,alignItems:'center'}}>
              <button className="btn btn-indigo" onClick={syncNow} disabled={syncing||mappings.length===0}>
                {syncing?<><span className="spin">↻</span> Syncing all orders…</>:'⟳ Sync Now'}
              </button>
              <span style={{fontSize:11,color:'var(--text-muted)'}}>
                {mappings.length===0?'Add at least one mapping first.':'Lowest priority number wins — order with multiple tags always moves to the highest-priority stage.'}
              </span>
            </div>
          </div>
        </div>
      </div>
    );
  }

  /* ══════════════════════════════════
     REPORTS
  ══════════════════════════════════ */
  function Reports({ token }) {
    const today = new Date().toISOString().split('T')[0];
    const weekAgo = new Date(Date.now() - 7*24*3600*1000).toISOString().split('T')[0];
    const [from, setFrom] = useState(weekAgo);
    const [to, setTo]     = useState(today);
    const [preview, setPreview]   = useState(null);
    const [loading, setLoading]   = useState(false);
    const [sending, setSending]   = useState(false);
    const [msg, setMsg]           = useState('');
    const [settings, setSettings] = useState({ auto_send: false, staff_emails: '', send_to_vendors: false });
    const [savingSettings, setSavingSettings] = useState(false);

    useEffect(() => {
      fetch(`${API}/admin/reports/settings`, { headers: { Authorization: 'Bearer '+token } })
        .then(r => r.json()).then(d => setSettings(s => ({ ...s, ...d }))).catch(()=>{});
    }, []);

    const loadPreview = async () => {
      setLoading(true); setMsg(''); setPreview(null);
      const r = await fetch(`${API}/admin/reports/preview?from=${from}&to=${to}`, { headers: { Authorization: 'Bearer '+token } });
      const d = await r.json();
      setLoading(false);
      if (d.error) setMsg('❌ ' + d.error);
      else setPreview(d);
    };

    const sendReport = async () => {
      setSending(true); setMsg('');
      const r = await fetch(`${API}/admin/reports/send`, { method: 'POST', headers: { 'Content-Type':'application/json', Authorization: 'Bearer '+token }, body: JSON.stringify({ from, to }) });
      const d = await r.json();
      setSending(false);
      setMsg(d.success ? `✅ Report sent to ${d.sent} recipient${d.sent!==1?'s':''}${d.errors?.length?' | Errors: '+d.errors.join(', '):''}` : '❌ ' + d.error);
    };

    const saveSettings = async () => {
      setSavingSettings(true);
      await fetch(`${API}/admin/reports/settings`, { method: 'PUT', headers: { 'Content-Type':'application/json', Authorization: 'Bearer '+token }, body: JSON.stringify(settings) });
      setSavingSettings(false); setMsg('✅ Settings saved');
    };

    const pct = (a, b) => b > 0 ? Math.round((a/b)*100) : 0;
    const rateColor = r => r >= 80 ? '#10b981' : r >= 50 ? '#f59e0b' : '#ef4444';

    return (
      <div>
        <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:24}}>
          <span style={{fontSize:24}}>📊</span>
          <div>
            <h2 style={{margin:0,color:'var(--text)',fontSize:18}}>Order Reports</h2>
            <div style={{fontSize:12,color:'var(--text-muted)'}}>Generate & send order performance reports to admin, staff and vendors</div>
          </div>
        </div>

        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:20}}>
          {/* Manual report */}
          <div style={{background:'var(--bg-card)',borderRadius:12,padding:20,border:'1px solid var(--border)'}}>
            <div style={{fontWeight:700,color:'var(--text)',marginBottom:14,fontSize:14}}>📅 Generate Report</div>
            <div style={{display:'flex',gap:10,marginBottom:12,flexWrap:'wrap'}}>
              <div style={{flex:1,minWidth:120}}>
                <label style={{fontSize:11,color:'var(--text-muted)',fontWeight:600,display:'block',marginBottom:4}}>FROM</label>
                <input type="date" className="form-input" value={from} onChange={e=>setFrom(e.target.value)} style={{width:'100%',boxSizing:'border-box'}}/>
              </div>
              <div style={{flex:1,minWidth:120}}>
                <label style={{fontSize:11,color:'var(--text-muted)',fontWeight:600,display:'block',marginBottom:4}}>TO</label>
                <input type="date" className="form-input" value={to} onChange={e=>setTo(e.target.value)} style={{width:'100%',boxSizing:'border-box'}}/>
              </div>
            </div>
            <div style={{display:'flex',gap:8}}>
              {['7d','14d','30d'].map(p => {
                const days = parseInt(p); const label = p;
                return <button key={p} className="btn btn-sm btn-ghost" onClick={()=>{ setFrom(new Date(Date.now()-days*24*3600*1000).toISOString().split('T')[0]); setTo(today); }}>{label}</button>;
              })}
            </div>
            <div style={{display:'flex',gap:8,marginTop:14}}>

  function JarvisChat({ token }) {
    const [messages, setMessages] = useState([
      { role:'bot', text:"⚡ JARVIS online — powered by Claude AI with live store data.\n\nAsk me anything: 'Why are my RTOs up?', 'Which vendor has the worst fulfillment?', 'Am I on track for this month?'\n\nOr click a quick report below." }
    ]);
    const [input,   setInput]   = useState('');
    const [loading, setLoading] = useState(false);
    const endRef = useRef(null);
    useEffect(() => { endRef.current?.scrollIntoView({ behavior:'smooth' }); }, [messages, loading]);

    const send = async (query) => {
      const q = (query || input).trim();
      if (!q || loading) return;
      setInput('');
      const nextMessages = [...messages, { role:'user', text: q }];
      setMessages(nextMessages);
      setLoading(true);
      try {
        const r = await fetch(`${API}/jarvis`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
          body: JSON.stringify({ query: q, history: nextMessages.slice(1) }), // skip opening bot message
        });
        const d = await r.json();
        setMessages(m => [...m, { role:'bot', text: d.reply || d.error || 'No data.' }]);
      } catch {
        setMessages(m => [...m, { role:'bot', text: "Couldn't reach JARVIS. Check the server." }]);
      }
      setLoading(false);
    };

    const onKey = e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } };

    return (
      <div className="chat-wrap">
        <div className="chat-panel">
          <div className="chat-header">
            <div className="chat-logo">J</div>
            <div><div className="chat-title">JARVIS</div></div>
            <span className="chat-sub">Powered by Claude AI · Live store data</span>
          </div>

          {/* Quick report buttons — grouped by category */}
          <div style={{padding:'10px 16px',borderBottom:'1px solid var(--border)',maxHeight:160,overflowY:'auto'}}>
            {JARVIS_PRESETS.map(cat => (
              <div key={cat.category} style={{marginBottom:8}}>
                <div style={{fontSize:9,fontWeight:700,color:'var(--text-muted)',letterSpacing:'0.08em',textTransform:'uppercase',marginBottom:4}}>{cat.category}</div>
                <div style={{display:'flex',flexWrap:'wrap',gap:4}}>
                  {cat.items.map(p => (
                    <button key={p.query} className="suggestion" style={{fontSize:10}} onClick={() => send(p.query)} disabled={loading}>
                      {p.icon} {p.label}
                    </button>
                  ))}
                </div>
              </div>
            ))}
          </div>

          <div className="chat-messages">
            {messages.map((m, i) => (
              <div key={i} className={`cmsg ${m.role}`}>
                <div className="cmsg-av">{m.role==='bot' ? 'J' : 'A'}</div>
                <div className="cmsg-bubble" style={{whiteSpace:'pre-wrap'}}>{m.text}</div>
              </div>
            ))}
            {loading && (
              <div className="cmsg bot">
                <div className="cmsg-av">J</div>
                <div className="cmsg-bubble"><span className="typing-dot"/><span className="typing-dot"/><span className="typing-dot"/></div>
              </div>
            )}
            <div ref={endRef}/>
          </div>

          <div className="chat-input-row">
            <textarea
              className="chat-textarea" rows={1}
              placeholder="Type a question: 'pending orders this week', 'revenue today', 'top products'…"
              value={input}
              onChange={e => setInput(e.target.value)}
              onKeyDown={onKey}
            />
            <button className="chat-send" onClick={() => send()} disabled={!input.trim() || loading}>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
              </svg>
            </button>
          </div>
        </div>
      </div>
    );
  }
