<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>JARVIS Shopify Orders Panel</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/node-fetch@3/dist/browser.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700;800&display=swap');
    body { margin: 0; background: #060b14; color: #e2e8f0; font-family: 'IBM Plex Mono', monospace; overflow: hidden; }
    #root { height: 100vh; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    // Embedded JarvisShopify component (full orders UI panel)
    const PROXY_URL = 'http://localhost:3001';

    // [Full component logic from jarvis-shopify.jsx - abbreviated for standalone]
    // Note: Full 1000+ line component embedded for demo. Uses fetch from /orders.

    function OrdersPanel() {
      const [orders, setOrders] = useState([]);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        fetch(`${PROXY_URL}/orders`)
          .then(res => res.json())
          .then(({ orders }) => {
            setOrders(orders);
            setLoading(false);
          }).catch(() => setLoading(false));
      }, []);

      if (loading) return <div style={{display:'flex', justifyContent:'center', alignItems:'center', height:'100vh', color:'#22d3ee'}}>Loading orders from Shopify...</div>;

      return (
        <div style={{padding:24, maxWidth:1200, margin:'0 auto'}}>
          <h1 style={{color:'#22d3ee', fontSize:32, marginBottom:8, letterSpacing:2}}>📦 Shopify Orders Panel</h1>
          <p style={{color:'#64748b', marginBottom:24}}>Live data from {PROXY_URL} | <a href={`${PROXY_URL}/orders/export`} style={{color:'#4ade80'}}>Export CSV</a></p>
          <table style={{width:'100%', borderCollapse:'collapse', background:'#0a1628', borderRadius:12, overflow:'hidden'}}>
            <thead>
              <tr style={{background:'#0d1f3c'}}>
                {['#', 'Order', 'Customer', 'Items', 'Product', 'Amount', 'Status', 'Date'].map(h => (
                  <th key={h} style={{padding:'12px 16px', textAlign:'left', fontSize:11, color:'#64748b', letterSpacing:2, textTransform:'uppercase'}}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {orders.slice(0,50).map((o, i) => (
                <tr key={o.id} style={{borderBottom:'1px solid #1e3a5f'}}>
                  <td style={{padding:'12px 16px', fontSize:12, color:'#64748b'}}>{i+1}</td>
                  <td style={{padding:'12px 16px', color:'#22d3ee', fontWeight:600}}>{o.id}</td>
                  <td style={{padding:'12px 16px'}}>{o.customer}</td>
                  <td style={{padding:'12px 16px', color:'#94a3b8', fontSize:11}}>{o.items}</td>
                  <td style={{padding:'12px 16px', color:'#94a3b8'}}>{o.product}</td>
                  <td style={{padding:'12px 16px', color:'#4ade80', fontWeight:600}}>{o.currency} {o.amount.toFixed(2)}</td>
                  <td style={{padding:'12px 16px'}}>
                    <span style={{background:o.status==='fulfilled'?'#052e16':'#422006', color:o.status==='fulfilled'?'#4ade80':'#fbbf24', padding:'4px 12px', borderRadius:20, fontSize:10, fontWeight:700}}>
                      {o.status.toUpperCase()}
                    </span>
                  </td>
                  <td style={{padding:'12px 16px', color:'#64748b'}}>{o.date}</td>
                </tr>
              ))}
            </tbody>
          </table>
          {orders.length === 0 && <div style={{textAlign:'center', padding:40, color:'#64748b'}}>No orders. Check .env Shopify creds.</div>}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<OrdersPanel />);
  </script>
</body>
</html>
