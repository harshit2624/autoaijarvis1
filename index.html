<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CrosCrow — Portal</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600;700&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #060b10;
      --card:     #0a1520;
      --border:   #1a3040;
      --green:    #10b981;
      --indigo:   #6366f1;
      --text:     #e2e8f0;
      --muted:    #4b7a8e;
      --dim:      #7db8ae;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'IBM Plex Mono', monospace;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .wrap {
      width: 100%;
      max-width: 820px;
      padding: 40px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 48px;
    }

    /* ── Header ── */
    .brand {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }
    .brand-logo {
      width: 60px; height: 60px; border-radius: 14px;
      background: linear-gradient(135deg, #10b981, #059669);
      display: flex; align-items: center; justify-content: center;
      font-size: 24px; font-weight: 800; color: #000;
      box-shadow: 0 0 40px #10b98130;
    }
    .brand-name {
      font-size: 22px; font-weight: 700; letter-spacing: 4px; color: var(--text);
    }
    .brand-sub {
      font-size: 10px; letter-spacing: 3px; color: var(--muted); text-transform: uppercase;
    }

    /* ── Cards ── */
    .cards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      width: 100%;
    }
    @media (max-width: 560px) { .cards { grid-template-columns: 1fr; } }

    .portal-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 36px 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.2s, box-shadow 0.2s, transform 0.15s;
      cursor: pointer;
    }
    .portal-card:hover {
      transform: translateY(-3px);
    }
    .portal-card.vendor {
      border-color: #1a3d35;
    }
    .portal-card.vendor:hover {
      border-color: var(--green);
      box-shadow: 0 0 40px #10b98118;
    }
    .portal-card.admin {
      border-color: #1e2440;
    }
    .portal-card.admin:hover {
      border-color: var(--indigo);
      box-shadow: 0 0 40px #6366f118;
    }

    .card-icon {
      width: 56px; height: 56px; border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
    }
    .vendor .card-icon { background: #0d2e26; }
    .admin  .card-icon { background: #1a1b3a; }

    .card-title {
      font-size: 15px; font-weight: 700; letter-spacing: 2px;
    }
    .vendor .card-title { color: var(--green); }
    .admin  .card-title { color: var(--indigo); }

    .card-desc {
      font-size: 11px; color: var(--muted); text-align: center; line-height: 1.7; letter-spacing: 0.5px;
    }

    .card-btn {
      padding: 11px 28px; border-radius: 8px; border: none;
      font-family: 'IBM Plex Mono', monospace; font-size: 11px;
      font-weight: 700; letter-spacing: 2px; cursor: pointer;
      transition: opacity 0.15s;
      width: 100%;
    }
    .card-btn:hover { opacity: 0.85; }
    .vendor .card-btn { background: var(--green); color: #000; }
    .admin  .card-btn { background: var(--indigo); color: #fff; }

    /* ── Footer ── */
    .footer {
      font-size: 10px; color: var(--muted); letter-spacing: 1px;
    }

    /* ── Ambient glow ── */
    body::before {
      content: '';
      position: fixed; inset: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 600px 400px at 20% 50%, #10b98106 0%, transparent 70%),
        radial-gradient(ellipse 600px 400px at 80% 50%, #6366f106 0%, transparent 70%);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="brand">
      <div class="brand-logo">C</div>
      <div class="brand-name">CROSCROW</div>
      <div class="brand-sub">Operations Portal</div>
    </div>

    <div class="cards">
      <a class="portal-card vendor" href="vendor.html">
        <div class="card-icon">🏪</div>
        <div class="card-title">VENDOR PORTAL</div>
        <div class="card-desc">
          Manage your orders, track fulfillments,<br>view settlements and revenue.
        </div>
        <button class="card-btn">LOGIN AS VENDOR →</button>
      </a>

      <a class="portal-card admin" href="admin.html">
        <div class="card-icon">⚡</div>
        <div class="card-title">ADMIN PORTAL</div>
        <div class="card-desc">
          Full store control — orders, settlements,<br>JARVIS AI, vendor management.
        </div>
        <button class="card-btn">LOGIN AS ADMIN →</button>
      </a>
    </div>

    <div class="footer">© CrosCrow · Powered by JARVIS</div>
  </div>
</body>
</html>
