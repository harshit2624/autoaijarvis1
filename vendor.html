      ],
    },
  ];

  function PickupLocationsManager({ token, partner }) {
    const [locs,   setLocs]   = useState([]);
    const [open,   setOpen]   = useState(false);
    const [saving, setSaving] = useState(false);
    const [msg,    setMsg]    = useState(null);
    const EMPTY = { name:'', address:'', city:'', state:'', pincode:'' };

    const load = () => {
      fetch(`${API}/vendor/shipping/partners/${partner}/locations`, { headers:{ Authorization:`Bearer ${token}` } })
        .then(r=>r.json()).then(d=>setLocs(d.locations||[])).catch(()=>{});
    };
    useEffect(()=>{ if(open) load(); },[open]);

    const upd = (i,k,v) => setLocs(ls=>ls.map((l,j)=>j===i?{...l,[k]:v}:l));
    const add  = () => setLocs(ls=>[...ls, {...EMPTY}]);
    const del  = (i) => setLocs(ls=>ls.filter((_,j)=>j!==i));

    const save = async () => {
      setSaving(true); setMsg(null);
      try {
        const r = await fetch(`${API}/vendor/shipping/partners/${partner}/locations`, {
          method:'PUT', headers:{'Content-Type':'application/json','Authorization':`Bearer ${token}`},
          body: JSON.stringify({ locations: locs.filter(l=>l.name.trim()) }),
        });
        if (!r.ok) throw new Error('Save failed');
        setMsg({type:'success',text:'Locations saved.'});
        load();
      } catch(e) { setMsg({type:'error',text:e.message}); }
      setSaving(false);
    };

    return (
      <div style={{marginTop:10,paddingTop:10,borderTop:'1px solid var(--border)'}}>
        <button onClick={()=>setOpen(o=>!o)} style={{background:'none',border:'none',color:'var(--green)',cursor:'pointer',fontSize:11,fontFamily:'var(--font-family)',padding:0}}>
          {open?'▼':'▶'} 📍 Pickup / Warehouse Locations ({locs.length})
        </button>
        {open && (
          <div style={{marginTop:10}}>
            {msg && <div className={`alert alert-${msg.type}`} style={{marginBottom:8,fontSize:11}}>{msg.type==='success'?'✓':'⚠'} {msg.text}</div>}
            <div style={{fontSize:10,color:'var(--text-muted)',marginBottom:8,lineHeight:1.6}}>
              {partner==='delhivery'
                ? <>Enter the <strong style={{color:'var(--text)'}}>exact warehouse name</strong> as registered in your Delhivery account. Delhivery looks up your warehouse by name — no address needed.</>
                : 'These appear as dropdown options when creating return/exchange shipments.'}
            </div>
            {locs.map((l,i)=>(
              <div key={i} style={{display:'grid',gridTemplateColumns: partner==='delhivery' ? '1fr auto' : '1fr 1fr 1fr 1fr auto',gap:6,marginBottom:6,alignItems:'center'}}>
                <input className="field-input" style={{fontSize:11}} placeholder="Warehouse name (must match exactly)" value={l.name} onChange={e=>upd(i,'name',e.target.value)} />
                {partner!=='delhivery' && <>
                  <input className="field-input" style={{fontSize:11}} placeholder="Address" value={l.address||''} onChange={e=>upd(i,'address',e.target.value)} />
                  <input className="field-input" style={{fontSize:11}} placeholder="City" value={l.city||''} onChange={e=>upd(i,'city',e.target.value)} />
                  <input className="field-input" style={{fontSize:11}} placeholder="Pincode" value={l.pincode||''} onChange={e=>upd(i,'pincode',e.target.value)} />
                </>}
                <button onClick={()=>del(i)} style={{background:'none',border:'none',color:'var(--red)',cursor:'pointer',fontSize:14}}>✕</button>
              </div>
            ))}
            <div style={{display:'flex',gap:8,marginTop:6}}>
              <button className="btn btn-sm" style={{fontSize:11,background:'var(--bg-card2)',border:'1px solid var(--border)',color:'var(--text)',borderRadius:6,padding:'5px 12px',cursor:'pointer'}} onClick={add}>+ Add Location</button>
              <button className="btn btn-sm" style={{fontSize:11,background:'var(--green-dim)',border:'1px solid var(--green)',color:'var(--green)',borderRadius:6,padding:'5px 12px',cursor:'pointer'}} onClick={save} disabled={saving}>{saving?'Saving…':'Save Locations'}</button>
            </div>
          </div>
        )}
      </div>
    );
  }

  function ShippingPartners({ token }) {
    const [connected, setConnected] = useState({});
    const [forms,     setForms]     = useState({});
    const [saving,    setSaving]    = useState({});
    const [msg,       setMsg]       = useState(null);
    // Box presets
    const [presets,   setPresets]   = useState([]);
    const [newPreset, setNewPreset] = useState({ name:'', length:'', breadth:'', height:'' });
    const [savingP,   setSavingP]   = useState(false);
    const [presetMsg, setPresetMsg] = useState(null);

    useEffect(() => {
      fetch(`${API}/vendor/shipping/partners`, { headers: { Authorization: `Bearer ${token}` } })
        .then(r => r.json())
        .then(d => {
          const m = {};
          (d.partners || []).forEach(p => { if (p.active) m[p.partner] = true; });
          setConnected(m);
        });
      fetch(`${API}/vendor/box-presets`, { headers: { Authorization: `Bearer ${token}` } })
        .then(r => r.json()).then(d => setPresets(d.presets || [])).catch(()=>{});
    }, [token]);

    const savePresets = async (updated) => {
      setSavingP(true); setPresetMsg(null);
      try {
        const r = await fetch(`${API}/vendor/box-presets`, {
          method: 'PUT', headers: { 'Content-Type':'application/json', Authorization:`Bearer ${token}` },
          body: JSON.stringify({ presets: updated }),
        });
        const d = await r.json();
        if (!r.ok) throw new Error(d.error);
        setPresets(d.presets); setPresetMsg({ type:'success', text:'Box presets saved!' });
      } catch(e) { setPresetMsg({ type:'error', text: e.message }); }
      setSavingP(false);
    };

    const addPreset = () => {
      const { name, length, breadth, height } = newPreset;
      if (!name.trim() || !length || !breadth || !height) { setPresetMsg({ type:'error', text:'All fields required.' }); return; }
      const updated = [...presets, { name: name.trim(), length: parseFloat(length), breadth: parseFloat(breadth), height: parseFloat(height) }];
      setNewPreset({ name:'', length:'', breadth:'', height:'' });
      savePresets(updated);
    };

    const removePreset = idx => savePresets(presets.filter((_,i) => i !== idx));

    const setField = (partnerId, key, val) =>
      setForms(f => ({ ...f, [partnerId]: { ...(f[partnerId] || {}), [key]: val } }));

    const connect = async (partnerId) => {
      const creds = forms[partnerId] || {};
      const partner = PARTNERS.find(p => p.id === partnerId);
      const missing = partner.fields.filter(f => !creds[f.key]?.trim());
      if (missing.length) { setMsg({ type:'error', text: `Fill in: ${missing.map(f=>f.label).join(', ')}` }); return; }
      setSaving(s => ({ ...s, [partnerId]: true }));
      setMsg(null);
      try {
        const r = await fetch(`${API}/vendor/shipping/partners`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
          body: JSON.stringify({ partner: partnerId, credentials: creds }),
        });
        const d = await r.json();
        if (!r.ok) throw new Error(d.error);
        setConnected(c => ({ ...c, [partnerId]: true }));
        setForms(f => ({ ...f, [partnerId]: {} }));
        setMsg({ type: 'success', text: `${PARTNERS.find(p=>p.id===partnerId).name} connected successfully!` });
      } catch (e) { setMsg({ type: 'error', text: e.message }); }
      setSaving(s => ({ ...s, [partnerId]: false }));
    };

    const disconnect = async (partnerId) => {
      if (!confirm(`Disconnect ${PARTNERS.find(p=>p.id===partnerId).name}?`)) return;
      await fetch(`${API}/vendor/shipping/partners/${partnerId}`, {
        method: 'DELETE', headers: { Authorization: `Bearer ${token}` },
      });
      setConnected(c => { const n = {...c}; delete n[partnerId]; return n; });
      setMsg({ type: 'success', text: 'Partner disconnected.' });
    };

    return (
      <div style={{padding:'0 2px'}}>
        {msg && <div className={`alert alert-${msg.type}`} style={{marginBottom:16}}>{msg.type==='success'?'✓':'⚠'} {msg.text}</div>}

        <div className="sp-intro">
          <div className="sp-intro-title">⚡ How to Connect a Shipping Partner</div>
          <ol className="sp-intro-steps">
            <li>Create an account on Shiprocket (shiprocket.in) or Delhivery (delhivery.com) if you don't have one.</li>
            <li>For Delhivery: go to your Delhivery dashboard → Settings → Pickup Locations and note the exact Pickup Location name. For Shiprocket: use your login email and password.</li>
            <li>Enter your credentials below — stored securely and only used to create shipments.</li>
            <li>Click <strong>Connect</strong>. Once connected, a <em>Create Shipment</em> button appears directly on every order.</li>
            <li>When you click Create Shipment on an order, it auto-fills customer address, items, and COD amount — you just confirm.</li>
          </ol>
        </div>

        {/* ── Box Dimension Presets ── */}
        <div className="card" style={{marginBottom:20}}>
          <div className="card-header">
            <span className="card-title">📦 Box Dimension Presets</span>
            <span className="card-sub">Save your standard box sizes — select when creating shipments</span>
          </div>
          <div style={{padding:16}}>
            {presetMsg && <div className={`alert alert-${presetMsg.type}`} style={{marginBottom:12}}>{presetMsg.type==='success'?'✓':'⚠'} {presetMsg.text}</div>}

            {/* Existing presets */}
            {presets.length > 0 && (
              <div style={{marginBottom:14,display:'flex',flexDirection:'column',gap:8}}>
                {presets.map((p,i)=>(
                  <div key={i} style={{display:'flex',alignItems:'center',gap:10,background:'var(--bg-card2)',border:'1px solid var(--border)',borderRadius:8,padding:'10px 14px'}}>
                    <span style={{fontSize:13,fontWeight:700,color:'var(--text)',flex:1}}>{p.name}</span>
                    <span style={{fontSize:11,color:'var(--text-muted)',fontFamily:'monospace',background:'var(--bg-card)',padding:'3px 8px',borderRadius:4,border:'1px solid var(--border)'}}>
                      {p.length} × {p.breadth} × {p.height} cm
                    </span>
                    <button onClick={()=>removePreset(i)} style={{background:'none',border:'none',cursor:'pointer',color:'var(--red)',fontSize:14,padding:'0 4px',lineHeight:1}} title="Remove">✕</button>
                  </div>
                ))}
              </div>
            )}

            {/* Add new preset */}
            <div style={{background:'var(--bg-card2)',border:'1px solid var(--border)',borderRadius:8,padding:14}}>
              <div style={{fontSize:11,fontWeight:600,color:'var(--text-muted)',marginBottom:10,letterSpacing:1,textTransform:'uppercase'}}>Add New Box Size</div>
              <div style={{display:'grid',gridTemplateColumns:'2fr 1fr 1fr 1fr auto',gap:8,alignItems:'end'}}>
                <div>
                  <label className="form-label">Preset Name</label>
                  <input className="form-input" placeholder="e.g. Small Box" value={newPreset.name} onChange={e=>setNewPreset(p=>({...p,name:e.target.value}))}/>
                </div>
                <div>
                  <label className="form-label">Length (cm)</label>
                  <input className="form-input" type="number" min="1" step="0.5" placeholder="20" value={newPreset.length} onChange={e=>setNewPreset(p=>({...p,length:e.target.value}))}/>
                </div>
                <div>
                  <label className="form-label">Breadth (cm)</label>
                  <input className="form-input" type="number" min="1" step="0.5" placeholder="15" value={newPreset.breadth} onChange={e=>setNewPreset(p=>({...p,breadth:e.target.value}))}/>
                </div>
                <div>
                  <label className="form-label">Height (cm)</label>
                  <input className="form-input" type="number" min="1" step="0.5" placeholder="7" value={newPreset.height} onChange={e=>setNewPreset(p=>({...p,height:e.target.value}))} onKeyDown={e=>e.key==='Enter'&&addPreset()}/>
                </div>
                <button className="btn btn-green btn-sm" onClick={addPreset} disabled={savingP} style={{marginBottom:1}}>
                  {savingP?<span className="spin">↻</span>:'+ Add'}
                </button>
              </div>
            </div>
          </div>
        </div>

        <div className="sp-grid">
          {PARTNERS.map(partner => {
            const isConnected = !!connected[partner.id];
            const form = forms[partner.id] || {};
            const isSaving = !!saving[partner.id];
            return (
              <div key={partner.id} className={`sp-card ${isConnected ? 'connected' : ''}`}>
                <div className="sp-card-head">
                  <div className={`sp-logo ${partner.id}`}>{partner.emoji}</div>
                  <div>
                    <div className="sp-name">{partner.name}</div>
                    <span className={`sp-tag ${isConnected ? 'connected' : 'disconnected'}`}>
                      {isConnected ? '● Connected' : '○ Not connected'}
                    </span>
                  </div>
                </div>
                <div className="sp-note">{partner.desc}</div>

                {!isConnected && (
                  <div className="sp-fields">
                    {partner.fields.map(f => (
                      <div key={f.key}>
                        <div className="sp-field-label">{f.label}</div>
                        <input
                          className="sp-field-input"
                          type={f.type}
                          placeholder={f.placeholder}
                          value={form[f.key] || ''}
                          onChange={e => setField(partner.id, f.key, e.target.value)}
                        />
                      </div>
                    ))}
                  </div>
                )}

                <div className="sp-card-actions">
                  {isConnected ? (
                    <div>
                      <button className="btn btn-ghost btn-sm" style={{color:'var(--red)',borderColor:'var(--red)'}} onClick={() => disconnect(partner.id)}>
                        Disconnect
                      </button>
                      <PickupLocationsManager token={token} partner={partner.id} />
                    </div>
                  ) : (
                    <button className="btn btn-green btn-sm" onClick={() => connect(partner.id)} disabled={isSaving}>
                      {isSaving ? <><span className="spin">↻</span> Connecting…</> : `Connect ${partner.name}`}
                    </button>
                  )}
                </div>
              </div>
            );
          })}
        </div>
      </div>
    );
  }

  /* ══════════════════════════════════
     MAIN APP
  ══════════════════════════════════ */
  /* ══════════════════════════════════
     SHOPIFY SYNC (vendor side)
  ══════════════════════════════════ */
  function ShopifySync({ token: authToken, vendorName }) {
    const [status,    setStatus]    = useState(null);
    const [shop,      setShop]      = useState('');
    const [clientId,  setClientId]  = useState('');
    const [secret,    setSecret]    = useState('');
    const [connecting,setConnecting]= useState(false);
    const [products,  setProducts]  = useState([]);
    const [prodLoad,  setProdLoad]  = useState(false);
    const [msg,       setMsg]       = useState('');

    const [requesting, setRequesting] = useState({});
    const [reqMsg, setReqMsg] = useState({});
    const [expanded, setExpanded] = useState({});
    const [noteModal, setNoteModal] = useState(null); // {product, type:'upload'|'mapping'}
    const [noteText, setNoteText] = useState('');

    const loadProducts = () => {
      setProdLoad(true);
      fetch(`${API}/vendor/shopify/products`, { headers:{ Authorization:`Bearer ${authToken}` } })
        .then(r=>r.json()).then(d=>{
          if (d.error) setMsg('❌ '+d.error);
          setProducts(d.products||[]);
          setProdLoad(false);
        }).catch(e=>{ setMsg('❌ '+e.message); setProdLoad(false); });
    };

    const sendRequest = async (p, request_type, note='') => {
      setRequesting(r=>({...r,[p.id]:true}));
      try {
        const r = await fetch(`${API}/vendor/shopify/request-upload`, {
          method:'POST', headers:{'Content-Type':'application/json', Authorization:`Bearer ${authToken}`},
          body: JSON.stringify({ product_id: String(p.id), product_title: p.title, product_image: p.images?.[0]?.src||'', variants_count: p.variants?.length||0, request_type, note }),
        });
        const d = await r.json();
        if (d.success) { setReqMsg(m=>({...m,[p.id]:{type:request_type,msg:'✅ Request sent!'}})); loadProducts(); }
        else setReqMsg(m=>({...m,[p.id]:{type:request_type,msg:'❌ '+(d.error||'Failed')}}));
      } catch(e) { setReqMsg(m=>({...m,[p.id]:{type:request_type,msg:'❌ '+e.message}})); }
      setRequesting(r=>({...r,[p.id]:false}));
    };

    const loadStatus = () => {
      fetch(`${API}/vendor/shopify/status`, { headers:{ Authorization:`Bearer ${authToken}` } })
        .then(r=>r.json()).then(d=>{ setStatus(d); if(d.connected) loadProducts(); });
    };
    useEffect(loadStatus, []);

    // Handle ?shopifyConnected=1 redirect from OAuth callback
    useEffect(()=>{
      const params = new URLSearchParams(window.location.search);
      if (params.get('shopifyConnected')==='1') {
        setMsg('✅ Shopify store connected successfully!');
        window.history.replaceState({}, '', window.location.pathname);
        loadStatus(); // will auto-load products since connected=true
      }
    }, []);

    const connect = async () => {
      if (!shop.trim() || !clientId.trim() || !secret.trim()) { setMsg('Fill in all three fields.'); return; }
      setConnecting(true); setMsg('');
      try {
        const r = await fetch(`${API}/vendor/shopify/manual-install`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ shop: shop.trim(), client_id: clientId.trim(), client_secret: secret.trim(), vendor_token: authToken })
        });
        const d = await r.json();
        if (d.redirect_url) {
          window.location.href = d.redirect_url;
        } else {
          setMsg(d.error || 'Connection failed.');
          setConnecting(false);
        }
      } catch(e) { setMsg(e.message); setConnecting(false); }
    };

    const disconnect = async () => {
      if (!confirm('Disconnect your Shopify store? All product mappings will remain but inventory sync will stop.')) return;
      await fetch(`${API}/vendor/shopify/disconnect`, { method:'DELETE', headers:{ Authorization:`Bearer ${authToken}` } });
      setStatus({ connected: false, connection: null }); setProducts([]);
    };

    if (!status) return <div style={{padding:40,color:'var(--text-muted)',fontSize:13}}>Loading…</div>;

    return (
      <div style={{padding:'24px',maxWidth:700}}>
        <h2 style={{margin:'0 0 4px',fontSize:20,color:'var(--text)'}}>🔄 Shopify Store Sync</h2>
        <p style={{fontSize:13,color:'var(--text-muted)',marginTop:4,marginBottom:24}}>Connect your own Shopify store so CrosCrow admin can sync your products and inventory to the main store.</p>

        {msg && <div style={{marginBottom:16,padding:'10px 14px',borderRadius:8,background:msg.startsWith('✅')?'var(--green-dim)':'var(--red-bg)',color:msg.startsWith('✅')?'var(--green)':'var(--red)',fontSize:13}}>{msg}</div>}

        {status.connected ? (
          <>
            <div style={{background:'var(--green-dim)',border:'1px solid #1a4731',borderRadius:10,padding:18,marginBottom:20,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
              <div>
                <div style={{fontWeight:700,color:'var(--green)',fontSize:14}}>✅ Connected</div>
                <div style={{fontSize:12,color:'var(--text-muted)',marginTop:4}}>{status.connection.shop_domain}</div>
                <div style={{fontSize:11,color:'var(--text-muted)',marginTop:2}}>Scopes: {status.connection.scope}</div>
              </div>
              <button className="btn btn-danger btn-sm" onClick={disconnect}>Disconnect</button>
            </div>

            <div style={{marginBottom:16,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
              <div>
                <div style={{fontSize:14,fontWeight:700,color:'var(--text)'}}>Your Products</div>
                <div style={{fontSize:11,color:'var(--text-muted)',marginTop:2}}>
                  {products.length > 0 && `${products.filter(p=>p.mapped).length} mapped · ${products.filter(p=>p.request?.status==='pending').length} pending · ${products.filter(p=>!p.mapped&&!p.request).length} unmapped`}
                </div>
              </div>
              <button className="btn btn-ghost btn-sm" onClick={loadProducts}>{prodLoad?'Loading…':'↻ Refresh'}</button>
            </div>

            {products.length > 0 && (
              <div style={{display:'flex',flexDirection:'column',gap:8}}>
                {products.map(p=>{
                  const img = p.images?.[0]?.src;
                  const isExpanded = !!expanded[p.id];
                  const req = p.request;
                  const mapping = p.mapping;
                  const lastSync = mapping?.variants?.reduce((latest,v)=>v.last_synced_at>latest?v.last_synced_at:latest,'');
                  const localMsg = reqMsg[p.id];

                  // Status pill
                  let statusPill;
                  if (p.mapped) statusPill = <span style={{fontSize:10,padding:'2px 8px',borderRadius:10,background:'var(--green-dim)',color:'var(--green)',border:'1px solid var(--green)',whiteSpace:'nowrap',flexShrink:0}}>✓ Mapped</span>;
                  else if (req?.status==='pending') statusPill = <span style={{fontSize:10,padding:'2px 8px',borderRadius:10,background:'var(--yellow-bg)',color:'var(--yellow)',border:'1px solid var(--yellow)',whiteSpace:'nowrap',flexShrink:0}}>⏳ {req.request_type==='mapping'?'Mapping Req':'Upload Req'}</span>;
                  else if (req?.status==='rejected') statusPill = <span style={{fontSize:10,padding:'2px 8px',borderRadius:10,background:'var(--red-bg)',color:'var(--red)',border:'1px solid var(--red)',whiteSpace:'nowrap',flexShrink:0}}>✗ Rejected</span>;
                  else statusPill = null;

                  return (
                    <div key={p.id} style={{background:'var(--bg-card)',border:`1px solid ${p.mapped?'rgba(74,222,128,0.2)':req?.status==='pending'?'rgba(251,191,36,0.2)':'var(--border)'}`,borderRadius:10,overflow:'hidden'}}>
                      {/* Header row */}
                      <div style={{display:'flex',gap:12,alignItems:'center',padding:12,cursor:p.mapped?'pointer':'default'}}
                        onClick={()=>p.mapped&&setExpanded(e=>({...e,[p.id]:!e[p.id]}))}>
                        {img
                          ? <img src={img} style={{width:44,height:44,objectFit:'cover',borderRadius:6,flexShrink:0,border:'1px solid var(--border)'}} alt=""/>
                          : <div style={{width:44,height:44,borderRadius:6,background:'var(--bg-card2)',flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center',fontSize:18}}>🛍</div>
                        }
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{fontSize:13,fontWeight:600,color:'var(--text)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{p.title}</div>
                          <div style={{fontSize:11,color:'var(--text-muted)',marginTop:2,display:'flex',gap:10,flexWrap:'wrap'}}>
                            <span>{p.variants?.length} variant{p.variants?.length!==1?'s':''}</span>
                            {p.mapped && mapping?.cc_product_title && <span style={{color:'#a5b4fc'}}>→ {mapping.cc_product_title}</span>}
                            {p.mapped && lastSync && <span>Synced {new Date(lastSync).toLocaleDateString('en-IN',{day:'numeric',month:'short'})}</span>}
                          </div>
                          {localMsg && <div style={{fontSize:10,marginTop:3,color:localMsg.msg?.startsWith('✅')?'var(--green)':'var(--red)'}}>{localMsg.msg}</div>}
                        </div>
                        <div style={{display:'flex',alignItems:'center',gap:8,flexShrink:0}}>
                          {statusPill}
                          {p.mapped && <span style={{fontSize:12,color:'var(--text-muted)'}}>{isExpanded?'▲':'▼'}</span>}
                        </div>
                      </div>

                      {/* Expanded mapping details */}
                      {p.mapped && isExpanded && mapping && (
                        <div style={{borderTop:'1px solid var(--border)',padding:'12px 14px',background:'var(--bg-hover)'}}>
                          <div style={{fontSize:10,color:'var(--text-muted)',fontWeight:700,letterSpacing:1,marginBottom:8}}>VARIANT MAPPING ON CROSCROW</div>
                          {mapping.cc_image && <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:10}}>
                            <img src={mapping.cc_image} style={{width:36,height:36,objectFit:'cover',borderRadius:5,border:'1px solid var(--border)'}} alt=""/>
                            <span style={{fontSize:12,fontWeight:600,color:'var(--text)'}}>{mapping.cc_product_title}</span>
                          </div>}
                          <div style={{display:'flex',flexDirection:'column',gap:4}}>
                            {mapping.variants.map((v,i)=>(
                              <div key={i} style={{display:'flex',alignItems:'center',gap:8,fontSize:11,padding:'5px 8px',borderRadius:6,background:'var(--bg-card2)',border:'1px solid var(--border)'}}>
                                <span style={{fontWeight:600,color:'var(--text)',minWidth:60}}>{v.vendor_title}</span>
                                <span style={{color:'var(--text-muted)'}}>→</span>
                                <span style={{color:'#a5b4fc',fontWeight:600,flex:1}}>{v.cc_title}</span>
                                <span style={{fontSize:9,padding:'1px 5px',borderRadius:4,background:v.sync_inventory?'var(--green-dim)':'var(--bg-card)',color:v.sync_inventory?'var(--green)':'var(--text-muted)',border:`1px solid ${v.sync_inventory?'var(--green)':'var(--border)'}`}}>
                                  {v.sync_inventory?'↻ Auto-sync':'No sync'}
                                </span>
                                {v.last_synced_at && <span style={{fontSize:9,color:'var(--text-muted)'}}>{new Date(v.last_synced_at).toLocaleDateString('en-IN',{day:'numeric',month:'short'})}</span>}
                              </div>
                            ))}
                          </div>
                        </div>
                      )}

                      {/* Action buttons for unmapped */}
                      {!p.mapped && !req && (
                        <div style={{borderTop:'1px solid var(--border)',padding:'10px 12px',background:'var(--bg-hover)',display:'flex',gap:8,flexWrap:'wrap'}}>
                          <button onClick={()=>{ setNoteModal({product:p,type:'upload'}); setNoteText(''); }}
                            disabled={requesting[p.id]}
                            style={{fontSize:11,padding:'5px 12px',borderRadius:6,border:'1px solid var(--indigo)',background:'var(--indigo-dim)',color:'var(--indigo)',cursor:'pointer',fontFamily:'var(--font-family)',fontWeight:600}}>
                            📤 Request Upload
                          </button>
                          <button onClick={()=>{ setNoteModal({product:p,type:'mapping'}); setNoteText(''); }}
                            disabled={requesting[p.id]}
                            style={{fontSize:11,padding:'5px 12px',borderRadius:6,border:'1px solid var(--green)',background:'var(--green-dim)',color:'var(--green)',cursor:'pointer',fontFamily:'var(--font-family)',fontWeight:600}}>
                            🔗 Request Mapping
                          </button>
                          <span style={{fontSize:10,color:'var(--text-muted)',alignSelf:'center'}}>Upload = add as new · Mapping = link to existing CC product</span>
                        </div>
                      )}
                      {!p.mapped && req?.status==='rejected' && (
                        <div style={{borderTop:'1px solid var(--border)',padding:'10px 12px',background:'var(--bg-hover)',display:'flex',gap:8}}>
                          <button onClick={()=>{ setNoteModal({product:p,type:'upload'}); setNoteText(''); }}
                            style={{fontSize:11,padding:'5px 12px',borderRadius:6,border:'1px solid var(--indigo)',background:'var(--indigo-dim)',color:'var(--indigo)',cursor:'pointer',fontFamily:'var(--font-family)',fontWeight:600}}>
                            📤 Re-request Upload
                          </button>
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            )}
            {!prodLoad && products.length===0 && <div style={{fontSize:12,color:'var(--text-muted)'}}>No products found in your Shopify store.</div>}

            {/* Note modal for upload/mapping request */}
            {noteModal && (
              <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.7)',zIndex:2000,display:'flex',alignItems:'center',justifyContent:'center'}}>
                <div style={{background:'var(--bg-card)',borderRadius:14,padding:24,width:420,maxWidth:'90vw'}}>
                  <h3 style={{margin:'0 0 4px',fontSize:14,color:'var(--text)'}}>
                    {noteModal.type==='upload'?'📤 Request Upload':'🔗 Request Mapping'}
                  </h3>
                  <div style={{fontSize:11,color:'var(--text-muted)',marginBottom:14}}>
                    {noteModal.type==='upload'
                      ? 'Ask admin to import this product as a new listing on CrosCrow store.'
                      : 'Ask admin to map this product to an existing CrosCrow product. Add a note to help admin identify the right product.'}
                  </div>
                  <div style={{fontSize:12,fontWeight:600,color:'var(--text)',marginBottom:10}}>{noteModal.product.title}</div>
                  <textarea
                    placeholder={noteModal.type==='mapping'?'e.g. This is the same as "NYC Black Oversized Tee" on CrosCrow store, please map to that product.':'Optional note to admin…'}
                    value={noteText} onChange={e=>setNoteText(e.target.value)}
                    style={{width:'100%',boxSizing:'border-box',height:80,background:'var(--bg-card2)',border:'1px solid var(--border)',borderRadius:6,padding:'8px 10px',color:'var(--text)',fontSize:12,fontFamily:'inherit',resize:'vertical'}}
                  />
                  <div style={{display:'flex',gap:8,marginTop:12,justifyContent:'flex-end'}}>
                    <button className="btn btn-ghost" onClick={()=>setNoteModal(null)}>Cancel</button>
                    <button className="btn btn-primary" disabled={requesting[noteModal.product.id]}
                      onClick={async()=>{ await sendRequest(noteModal.product, noteModal.type, noteText); setNoteModal(null); }}>
                      {requesting[noteModal.product.id]?'Sending…':'Send Request'}
                    </button>
                  </div>
                </div>
              </div>
            )}
          </>
        ) : (
          <div style={{background:'var(--bg-card)',border:'1px solid var(--border)',borderRadius:10,padding:24}}>
            <div style={{fontSize:14,fontWeight:700,color:'var(--text)',marginBottom:8}}>Connect Your Shopify Store</div>

            {/* One-click OAuth install */}
            <div style={{background:'rgba(99,102,241,0.08)',border:'1px solid rgba(99,102,241,0.25)',borderRadius:10,padding:20,marginBottom:20}}>
              <div style={{fontSize:13,fontWeight:700,color:'var(--indigo)',marginBottom:6}}>⚡ Quick Install <span style={{color:'#f59e0b',fontWeight:700}}>(Coming Soon)</span></div>
              <div style={{fontSize:12,color:'var(--text-muted)',marginBottom:14,lineHeight:1.6}}>Enter your store URL and click Install — you'll be redirected to Shopify to approve in one click. No credentials needed.</div>
              <div style={{display:'flex',gap:8,alignItems:'flex-end',flexWrap:'wrap'}}>
                <div style={{flex:1,minWidth:200}}>
                  <label style={{fontSize:11,color:'var(--text-muted)',display:'block',marginBottom:4}}>Your Shopify Store URL</label>
                  <input className="form-input" placeholder="yourstore.myshopify.com" value={shop} onChange={e=>setShop(e.target.value)}
                    onKeyDown={e=>{ if(e.key==='Enter' && shop.trim()) window.location.href=`${API}/vendor/shopify/install?shop=${encodeURIComponent(shop.trim().replace(/https?:\/\//,'').replace(/\/$/,''))}&vendor=${encodeURIComponent(vendorName||'')}`; }}
                    style={{width:'100%',boxSizing:'border-box'}}/>
                </div>
                <button className="btn btn-indigo" style={{padding:'9px 20px',fontWeight:700,flexShrink:0}}
                  onClick={()=>{
                    const s = shop.trim().replace(/https?:\/\//,'').replace(/\/$/,'');
                    if (!s) { setMsg('Enter your store URL first.'); return; }
                    window.location.href = `${API}/vendor/shopify/install?shop=${encodeURIComponent(s)}&vendor=${encodeURIComponent(vendorName||'')}`;
                  }}>
                  🛍 Install App →
                </button>
              </div>
            </div>

            <div style={{marginTop:4,borderTop:'1px solid var(--border)',paddingTop:18}}>
              <div style={{fontSize:13,fontWeight:700,color:'var(--text)',marginBottom:2}}>Manual Integration <span style={{fontSize:15,fontWeight:800,color:'var(--green)',marginLeft:6}}>⚡ Just 2–3 min</span></div>
              <div style={{fontSize:11,color:'var(--text-muted)',marginBottom:16}}>Create a custom app on your Shopify store and paste the credentials below.</div>

              {[
                { n:1, label:'Create a custom app', body: <span>Shopify Admin → <strong>Settings</strong> → <strong>Apps and sales channels</strong> → <strong>Develop apps</strong> → <strong>Create an app</strong></span> },
                { n:2, label:'Enable scopes', body: (
                  <span>
                    Open the app → <strong>Configuration</strong> → <strong>Scopes</strong><br/>
                    <span style={{display:'inline-block',marginTop:6,background:'rgba(16,185,129,0.08)',border:'1px solid rgba(16,185,129,0.2)',borderRadius:6,padding:'6px 10px',lineHeight:2}}>
                      <span style={{fontSize:10,color:'var(--green)',fontWeight:700}}>💡 Use the search box — search each word &amp; select all:</span><br/>
                      {['product','inventory','location','file'].map(k=>(
                        <span key={k} style={{marginRight:10}}>
                          <code style={{background:'rgba(0,0,0,0.25)',padding:'1px 6px',borderRadius:4,fontSize:10,color:'#a5f3fc'}}>{k}</code>
                          <span style={{fontSize:10,color:'var(--text-muted)'}}> → select all</span>
                        </span>
                      ))}
                    </span>
                    <details style={{marginTop:8}}>
                      <summary style={{fontSize:10,color:'var(--text-muted)',cursor:'pointer',userSelect:'none',listStyle:'none',display:'flex',alignItems:'center',gap:4}}>
                        <span style={{fontSize:10}}>▸</span> View all required scopes
                      </summary>
                      <div style={{marginTop:8,display:'grid',gridTemplateColumns:'1fr 1fr',gap:'6px 12px'}}>
                        {[
                          {label:'Products',color:'var(--indigo)',scopes:['read_products','write_products','read_product_listings','write_product_listings','read_product_feeds','write_product_feeds','unauthenticated_read_product_listings','unauthenticated_read_product_tags']},
                          {label:'Inventory',color:'var(--green)',scopes:['read_inventory','write_inventory','read_inventory_shipments','write_inventory_shipments','write_inventory_shipments_received_items','read_inventory_shipments_received_items','read_inventory_transfers','write_inventory_transfers','unauthenticated_read_product_inventory','unauthenticated_read_product_pickup_locations']},
                          {label:'Files',color:'#f59e0b',scopes:['read_files','write_files']},
                          {label:'Locations',color:'#8b5cf6',scopes:['read_locations','write_locations']},
                        ].map(({label,color,scopes})=>(
                          <div key={label} style={{background:'rgba(255,255,255,0.03)',border:'1px solid var(--border)',borderRadius:6,padding:'8px 10px'}}>
                            <div style={{fontSize:10,fontWeight:700,color,marginBottom:4}}>{label}</div>
                            {scopes.map(s=><div key={s} style={{fontFamily:'monospace',fontSize:9,color:'var(--text-muted)',lineHeight:1.9}}>{s}</div>)}
                          </div>
                        ))}
                      </div>
                    </details>
                  </span>
                )},
                { n:3, label:'Add Redirect URLs', body: (
                  <span>
                    Still in <strong>Configuration</strong> → <strong>Allowed redirection URL(s)</strong> → add all 4 URLs below (copy &amp; paste each one):<br/>
                    {[
                      'https://autoaijarvis1.onrender.com/vendor/shopify/callback',
                      'https://autoaijarvis1.onrender.com/vendor/shopify/manual-callback',
                      'https://dashboard.croscrow.com/vendor/shopify/callback',
                      'https://dashboard.croscrow.com/vendor/shopify/manual-callback',
                    ].map(url => (
                      <span key={url} style={{display:'flex',alignItems:'center',gap:6,marginTop:6}}>
                        <code style={{flex:1,display:'inline-block',background:'rgba(0,0,0,0.25)',border:'1px solid var(--border)',padding:'4px 10px',borderRadius:5,fontSize:10,color:'#a5f3fc',wordBreak:'break-all'}}>{url}</code>
                        <button onClick={()=>navigator.clipboard.writeText(url)}
                          style={{flexShrink:0,fontSize:10,padding:'3px 8px',borderRadius:4,border:'1px solid var(--border)',background:'rgba(99,102,241,0.15)',color:'var(--indigo)',cursor:'pointer',fontFamily:'inherit'}}>Copy</button>
                      </span>
                    ))}
                    <br/><span style={{fontSize:10,color:'var(--text-muted)'}}>Add all 4 and save before continuing.</span>
                  </span>
                )},
              ].map(({n,label,body})=>(
                <div key={n} style={{display:'flex',gap:12,marginBottom:14}}>
                  <div style={{width:22,height:22,borderRadius:'50%',background:'rgba(99,102,241,0.15)',color:'var(--indigo)',fontSize:11,fontWeight:800,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,marginTop:1}}>{n}</div>
                  <div>
                    <div style={{fontSize:12,fontWeight:700,color:'var(--text)',marginBottom:3}}>{label}</div>
                    <div style={{fontSize:12,color:'var(--text-muted)',lineHeight:1.7}}>{body}</div>
                  </div>
                </div>
              ))}

              {/* Step 4 — credentials */}
              <div style={{display:'flex',gap:12,marginBottom:14}}>
                <div style={{width:22,height:22,borderRadius:'50%',background:'rgba(99,102,241,0.15)',color:'var(--indigo)',fontSize:11,fontWeight:800,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,marginTop:1}}>4</div>
                <div style={{flex:1}}>
                  <div style={{fontSize:12,fontWeight:700,color:'var(--text)',marginBottom:8}}>Enter credentials &amp; connect</div>
                  <div style={{fontSize:11,color:'var(--text-muted)',marginBottom:10}}>Go to <strong>API credentials</strong> in your app and copy the Client ID &amp; Secret.</div>
                  <input className="form-input" placeholder="Your Shopify domain — e.g. croscrow.myshopify.com" value={shop} onChange={e=>setShop(e.target.value)}
                    style={{width:'100%',boxSizing:'border-box',marginBottom:8}}/>
                  <input className="form-input" placeholder="Client ID" value={clientId} onChange={e=>setClientId(e.target.value)}
                    style={{width:'100%',boxSizing:'border-box',marginBottom:8}}/>
                  <input className="form-input" type="password" placeholder="Client Secret" value={secret} onChange={e=>setSecret(e.target.value)}
                    style={{width:'100%',boxSizing:'border-box',marginBottom:12}}/>
                  <button className="btn btn-green" onClick={connect} disabled={connecting} style={{width:'100%',fontWeight:700}}>
                    {connecting ? '↻ Redirecting to Shopify…' : '🔗 Connect'}
                  </button>
                  <div style={{marginTop:7,fontSize:11,color:'var(--text-muted)'}}>You'll be redirected to Shopify — click <strong>Install</strong> and you're done. Use the browser where Shopify is already logged in.</div>
                </div>
              </div>
            </div>
          </div>
        )}
      </div>
    );
  }

  function AnnouncementBar({ token }) {
    const [items, setItems] = useState([]);
    const [offset, setOffset] = useState(0); // rotation offset for prev/next
    const trackRef = useRef(null);
    const [duration, setDuration] = useState(30);

    useEffect(()=>{
      if (!token) return;
      let alive = true;
      const load = () => {
        fetch(`${API}/vendor/announcements/ticker`, { headers:{ Authorization:`Bearer ${token}` } })
          .then(r=>r.json()).then(d=>{ if (alive) setItems(d.items || []); }).catch(()=>{});
      };
      load();
      const iv = setInterval(load, 60000);
      return () => { alive = false; clearInterval(iv); };
    }, [token]);

    // Recompute scroll duration from actual content width so longer messages
    // don't whiz by faster — keeps a steady reading speed (~55px/sec).
    useEffect(()=>{
      if (!trackRef.current) return;
      const fullWidth = trackRef.current.scrollWidth / 2; // duplicated content
      const PIXELS_PER_SEC = 55;
      setDuration(Math.max(20, fullWidth / PIXELS_PER_SEC));
    }, [items, offset]);

    if (!items.length) return null;

    // Rotate the list so prev/next can jump straight to a different message
    const ordered = items.map((_, i) => items[(i + offset) % items.length]);

    const next = () => setOffset(o => (o + 1) % items.length);
    const prev = () => setOffset(o => (o - 1 + items.length) % items.length);

    const renderItem = (item, key) => (
      <span className="ann-item" key={key}>
        {item.tag_type === 'vendor' && item.tag_value && <span className="ann-tag ann-tag-vendor">{item.tag_value}</span>}
        {item.tag_type === 'all_vendors' && <span className="ann-tag ann-tag-all-vendors">ALL VENDORS</span>}
        {item.text}
      </span>
    );

    return (
      <div className="ann-bar">
        <span className="ann-icon">📢</span>
        <div className="ann-track">
          <div key={offset} ref={trackRef} className="ann-track-inner" style={{animationDuration:`${duration}s`}}>
            {ordered.map((item,i)=>renderItem(item, `a${i}`))}
            {ordered.map((item,i)=>renderItem(item, `b${i}`))}
          </div>
        </div>
        {items.length > 1 && (
          <div className="ann-nav">
            <button className="ann-nav-btn" onClick={prev} title="Previous">‹</button>
            <button className="ann-nav-btn" onClick={next} title="Next">›</button>
          </div>
        )}
      </div>
    );
  }

  function App() {
    const [auth,    setAuth]    = useState(()=>{
      // Admin impersonation: ?token=XXX in URL auto-logins without credentials
      const params = new URLSearchParams(window.location.search);
      const urlToken = params.get('token');
      if (urlToken) {
        const impersonatedAuth = { token: urlToken, vendorName: '…', impersonated: true };
        ls.set('vendor_auth', impersonatedAuth);
        // Clean token from URL without reload
        window.history.replaceState({}, '', window.location.pathname);
        return impersonatedAuth;
      }
      return ls.get('vendor_auth', null);
    });
    const [view,    setView]    = useState('dashboard');
    const [orders,  setOrders]  = useState([]);
    const [stats,   setStats]   = useState(null);
    const [loading, setLoading] = useState(false);
    const [lastRef, setLastRef] = useState(null);
    const [period,  setPeriod]  = useState(PERIOD_PRESETS[3]); // Last 30 Days
    const [modal,   setModal]   = useState(null); // selected order
    const [autoDelay, setAutoDelay] = useState(false); // scroll to delay section on open
    const [loginErr,setLoginErr]= useState('');
    const [loginLoad,setLoginLoad]=useState(false);
    const [sidebarOpen,setSidebarOpen]= useState(false);
    const [theme, setTheme] = useState(()=>{
      const old = localStorage.getItem('vendor_theme'); // legacy 'light'/'dark'
      const stored = localStorage.getItem('vendor_panel_theme');
      if (stored) return stored;
      return old === 'dark' ? 'emerald' : 'minimal';
    });
    useEffect(()=>{
      document.body.setAttribute('data-theme', theme);
      document.body.classList.remove('light-theme'); // legacy class no longer used
      localStorage.setItem('vendor_panel_theme', theme);
    },[theme]);

    const [brand, setBrand] = useState({ accent_color:'', font_style:'round', icon_style:'minimal', vendor_logo_url:'' });
    useEffect(()=>{
      if (!auth) {
        fetch(`${API}/vendor/branding/public`)
          .then(r=>r.json()).then(d=>{ if(d) setBrand(b=>({...b, vendor_logo_url: d.vendor_logo_url||'' })); }).catch(()=>{});
        return;
      }
      fetch(`${API}/vendor/branding`,{headers:{Authorization:`Bearer ${auth.token}`}})
        .then(r=>r.json()).then(d=>{ if(d) setBrand(b=>({...b, ...d})); }).catch(()=>{});
    },[auth?.token]);
    useEffect(()=>{
      const root = document.body.style;
      if (brand.accent_color) {
        root.setProperty('--green', brand.accent_color);
        root.setProperty('--green-dim', brand.accent_color+'22');
        root.setProperty('--green-glow', brand.accent_color+'30');
      } else {
        root.removeProperty('--green');
        root.removeProperty('--green-dim');
        root.removeProperty('--green-glow');
      }
    },[brand.accent_color, theme]);
    useEffect(()=>{
      const f = FONT_OPTIONS.find(f=>f.id===(brand.font_style||'round')) || FONT_OPTIONS.find(f=>f.id==='round') || FONT_OPTIONS[0];
      document.documentElement.style.setProperty('--font-family', f.family);
    },[brand.font_style]);

    /* login */
    const [uname, setUname] = useState('');
    const [pass,  setPass]  = useState('');

    const login = async () => {
      setLoginLoad(true); setLoginErr('');
      try {
        const r = await fetch(`${API}/vendor/login`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:uname,password:pass})});
        const d = await r.json();
        if(!r.ok) throw new Error(d.error||'Login failed');
        ls.set('vendor_auth',d);
        setAuth(d);
        // If first login with default password, redirect to profile to change it
        if(d.mustChangePassword) setTimeout(()=>setView('profile'),300);
      } catch(e){ setLoginErr(e.message); }
      setLoginLoad(false);
    };

    const logout = useCallback(async () => {
      if(auth) await fetch(`${API}/vendor/logout`,{method:'POST',headers:{Authorization:`Bearer ${auth.token}`}}).catch(()=>{});
      ls.del('vendor_auth'); setAuth(null); setOrders([]); setStats(null);
    }, [auth]);

    // Auto-logout on 401 globally (stale token after server restart)
    useEffect(()=>{
      if(!auth) return;
      const orig = window._origFetchV || window.fetch;
      window._origFetchV = orig;
      window.fetch = async (...args) => {
        const r = await orig(...args);
        if (r.status === 401) {
          const url = typeof args[0]==='string' ? args[0] : args[0]?.url || '';
          if (url.includes(API) && !url.includes('/login')) {
            ls.del('vendor_auth'); setAuth(null); setOrders([]); setStats(null);
          }
        }
        return r;
      };
      return () => { window.fetch = orig; };
    }, [auth]);

    /* fetch data */
    const fetchData = useCallback(async (p) => {
      if(!auth) return;
      const per = p || period;
      setLoading(true);
      try {
        const fromISO = per.from ? `${per.from}T00:00:00Z` : '2000-01-01T00:00:00Z';
        const toISO   = per.to   ? `${per.to}T23:59:59Z`   : null;
        const oParams = `created_at_min=${encodeURIComponent(fromISO)}${toISO?`&created_at_max=${encodeURIComponent(toISO)}`:''}`;
        const sParams = `from=${encodeURIComponent(per.from||'2000-01-01')}&to=${encodeURIComponent(per.to||isoToday())}`;
        const [oRes, sRes] = await Promise.all([
          fetch(`${API}/vendor/orders?${oParams}`,{headers:{Authorization:`Bearer ${auth.token}`}}),
          fetch(`${API}/vendor/stats?${sParams}`, {headers:{Authorization:`Bearer ${auth.token}`}}),
        ]);
        if(oRes.status===401||sRes.status===401){ logout(); return; }
        const oData = await oRes.json();
        const sData = await sRes.json();
        setOrders(oData.orders||[]);
        setStats(sData);
        setLastRef(new Date());
      } catch{}
      setLoading(false);
    },[auth, period]);

    // Resolve vendorName from profile if missing (impersonation or old session)
    useEffect(()=>{
      if (!auth) return;
      if (!auth.vendorName || auth.vendorName === '…') {
        fetch(`${API}/vendor/profile`, { headers: { Authorization: `Bearer ${auth.token}` } })
          .then(r => r.json()).then(d => {
            if (d.vendor_name) {
              const updated = { ...auth, vendorName: d.vendor_name };
              ls.set('vendor_auth', updated);
              setAuth(updated);
            }
          }).catch(() => {});
      }
    }, [auth?.token]); // eslint-disable-line

    useEffect(()=>{
      if(auth) {
        fetchData().then(()=>{
          // Auto-open order from URL param (e.g. from penalty warning email link)
          const params = new URLSearchParams(window.location.search);
          const openId = params.get('openOrder');
          const action = params.get('action');
          if (openId) {
            setOrders(prev => {
              const found = prev.find(o => String(o.shopifyId) === String(openId));
              if (found) { setModal(found); if(action==='delay') setAutoDelay(true); }
              return prev;
            });
          }
        });
      }
    },[auth]); // eslint-disable-line

    /* ── Login screen ── */
    if(!auth) return (
      <div className="login-wrap">
        <div className="login-box">
          <div className={`login-logo ${brand.vendor_logo_url?'has-img':''}`}>{brand.vendor_logo_url ? <img src={brand.vendor_logo_url} alt="logo"/> : 'C'}</div>
          {!brand.vendor_logo_url && <div className="login-title">CROSCROW</div>}
          <div className="login-sub">Vendor Portal</div>
          {loginErr && <div className="login-error">⚠ {loginErr}</div>}
          <label className="field-label">Vendor / Brand Name</label>
          <input className="field-input" placeholder="Your Brand Name" value={uname} onChange={e=>setUname(e.target.value)} onKeyDown={e=>e.key==='Enter'&&login()}/>
          <label className="field-label">Password</label>
          <input className="field-input" type="password" placeholder="••••••••••" value={pass} onChange={e=>setPass(e.target.value)} onKeyDown={e=>e.key==='Enter'&&login()}/>
          <button className="login-btn" onClick={login} disabled={loginLoad||!uname||!pass}>{loginLoad?'Signing in…':'Sign In'}</button>
          <div className="login-hint">Contact CrosCrow admin if you need access.</div>
        </div>
      </div>
    );

    const navItems = [
      { id:'dashboard',   icon:'◈', label:'Dashboard',   section:'main' },
      { id:'orders',      icon:'◎', label:'My Orders',    section:'main' },
      { id:'products',    icon:'⬡', label:'My Products',  section:'main' },
      { id:'shipping',    icon:'🚚', label:'Shipping',     section:'main' },
      { id:'settlements', icon:'₹', label:'Settlements',  section:'finance' },
      { id:'wallet',      icon:'◉', label:'Wallet',       section:'finance' },
      { id:'shopifysync', icon:'🔄', label:'Shopify Sync',  section:'finance' },
      { id:'returns',     icon:'↩', label:'Returns',      section:'main' },
      { id:'profile',     icon:'⚙', label:'My Profile',   section:'finance' },
      { id:'agreement',   icon:'📋', label:'Agreement',     section:'finance' },
      { id:'theme',       icon:'🎨', label:'Theme',        section:'finance' },
    ];
    const sections = [...new Set(navItems.map(n=>n.section))];
    const sectionLabels = { main:'Store', finance:'Finance' };

    const pageTitle = { dashboard:'Dashboard', orders:'My Orders', products:'My Products', shipping:'Shipping Partners', settlements:'Settlements', wallet:'Wallet', returns:'Returns', profile:'My Profile', agreement:'Agreement', theme:'Theme' };
    const closeSidebar = () => setSidebarOpen(false);

    // Bottom nav shows most important 5 items
    const bottomNavItems = [
      { id:'orders',    icon:'📦', label:'Orders' },
      { id:'dashboard', icon:'⚡', label:'Dashboard' },
      { id:'shipping',  icon:'🚚', label:'Ship' },
      { id:'settlements', icon:'₹', label:'Settle' },
      { id:'profile',   icon:'👤', label:'Profile' },
    ];

    return (
      <div className="app-shell">
        {/* Mobile overlay */}
        <div className={`sidebar-overlay ${sidebarOpen?'visible':''}`} onClick={closeSidebar}/>

        {/* Sidebar */}
        <aside className={`sidebar ${sidebarOpen?'mobile-open':''}`}>
          <div className={`sidebar-brand ${brand.vendor_logo_url?'has-img':''}`}>
            <div className={`sidebar-logo ${brand.vendor_logo_url?'has-img':''}`}>{brand.vendor_logo_url ? <img src={brand.vendor_logo_url} alt="logo"/> : 'C'}</div>
            <div>
              {!brand.vendor_logo_url && <div className="sidebar-name">CROSCROW</div>}
              <div className="sidebar-role">Vendor Portal</div>
            </div>
          </div>
          <div className="sidebar-vendor">
            <div style={{fontSize:11,fontWeight:700,color:'var(--text)',lineHeight:1.3}}>{auth.vendorName}</div>
            {auth.username && <div style={{fontSize:10,color:'var(--text-muted)',marginTop:2}}>@{auth.username}</div>}
          </div>
          <nav className="nav">
            {sections.map(sec=>(
              <div key={sec}>
                <div className="nav-section">{sectionLabels[sec]}</div>
                {navItems.filter(n=>n.section===sec).map(n=>(
                  <button key={n.id} className={`nav-item ${view===n.id?'active':''}`} onClick={()=>{ setView(n.id); closeSidebar(); }}>
                    <span className="nav-icon"><Icon name={n.id} mode={brand.icon_style} fallback={n.icon} size={16}/></span>{n.label}
                  </button>
                ))}
              </div>
            ))}
          </nav>
          <div className="sidebar-footer">
            <button className="logout-btn" onClick={logout}>
              <span>↩</span> Sign Out
            </button>
          </div>
        </aside>

        {/* Main */}
        <div className="content">
          <div className="topbar">
            <div style={{display:'flex',alignItems:'center',gap:4}}>
              <button className="hamburger" onClick={()=>setSidebarOpen(o=>!o)}>☰</button>
              <span className="topbar-title">{pageTitle[view]}</span>
            </div>
            <div className="topbar-right">
              <button onClick={()=>setTheme(t=>t==='minimal'?'emerald':'minimal')} title={theme==='minimal'?'Switch to Dark':'Switch to Light'} style={{background:'var(--bg-card2)',border:'1px solid var(--border)',borderRadius:20,padding:'4px 10px',cursor:'pointer',display:'flex',alignItems:'center',gap:5,color:'var(--text-muted)',fontFamily:'var(--font-family)',fontSize:11}}>
                {theme==='minimal' ? '🌙 Dark' : '☀️ Light'}
              </button>
              {lastRef && <span className="topbar-badge"><span className="pulse"/>{lastRef.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'})}</span>}
              <button className="btn btn-ghost" style={{fontSize:10,padding:'5px 10px'}} onClick={fetchData} disabled={loading}>
                {loading ? <span className="spin">↻</span> : '↻'} {loading?'Loading…':'Refresh'}
              </button>
            </div>
          </div>

          <AnnouncementBar token={auth.token}/>

          {auth.mustChangePassword && (
            <div style={{background:'#1c1208',border:'2px solid #f59e0b',borderRadius:8,padding:'12px 16px',marginBottom:12,display:'flex',alignItems:'center',justifyContent:'space-between',gap:12}}>
              <div style={{fontSize:13,color:'#fbbf24',fontWeight:600}}>⚠ You are using the default password. Please <strong>change your password</strong> to secure your account.</div>
              <button className="btn btn-sm" style={{background:'#f59e0b',color:'#000',fontWeight:700,whiteSpace:'nowrap'}} onClick={()=>setView('profile')}>Change Now →</button>
            </div>
          )}
          {view==='dashboard'   && <Dashboard        stats={stats} orders={orders} loading={loading} onOpenOrder={setModal} period={period} onPeriodChange={p=>{setPeriod(p);fetchData(p);}} vendorName={auth.vendorName}/>}
          {view==='orders'      && <Orders           orders={orders} loading={loading} onOpenOrder={setModal} token={auth.token} onRefresh={fetchData} stats={stats} period={period} onPeriodChange={p=>{setPeriod(p);fetchData(p);}}/>}
          {view==='products'    && <Products          token={auth.token} vendorName={auth.vendorName} onGoToShopifySync={()=>setView('shopifysync')}/>}
          {view==='shipping'    && <ShippingPartners  token={auth.token}/>}
          {view==='settlements' && <Settlements       token={auth.token} stats={stats}/>}
          {view==='wallet'      && <Wallet            token={auth.token}/>}
          {view==='shopifysync' && <ShopifySync token={auth.token} vendorName={auth.vendorName}/>}
          {view==='returns'     && <VendorReturns     token={auth.token}/>}
          {view==='profile'     && <Profile           token={auth.token}/>}
          {view==='agreement'   && <VendorAgreement  token={auth.token}/>}
          {view==='theme'       && <VendorThemeSettings token={auth.token} theme={theme} setTheme={setTheme} brand={brand} setBrand={setBrand}/>}
        </div>

        {/* Mobile bottom nav */}
        <nav className="mobile-bottom-nav">
          {bottomNavItems.map(n=>(
            <button key={n.id} className={`mobile-nav-btn ${view===n.id?'active':''}`} onClick={()=>setView(n.id)}>
              <span className="mn-icon"><Icon name={n.id} mode={brand.icon_style} fallback={n.icon} size={18}/></span>
              {n.label}
            </button>
          ))}
        </nav>

        {/* Order modal */}
        {modal && (
          <OrderModal
            order={modal}
            token={auth.token}
            onClose={()=>setModal(null)}
            onUpdated={()=>{ fetchData(); setModal(null); }}
          />
        )}
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
