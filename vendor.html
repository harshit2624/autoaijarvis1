                            <div className="detail-row" style={{padding:'2px 0'}}><span className="dr-label" style={{fontSize:10}}>{commPct}% commission</span><span className="dr-val" style={{fontSize:10,color:'var(--yellow)'}}>₹{defaultOrders.reduce((s,o)=>s+(o.commission||0),0).toFixed(2)}</span></div>
                            <div className="detail-row" style={{padding:'2px 0',borderTop:'1px dashed var(--border)',marginTop:3,paddingTop:4}}>
                              <span className="dr-label" style={{fontSize:10}}>GST on above</span>
                              <span className="dr-val" style={{fontSize:10,color:'var(--orange)'}}>₹{defaultOrders.reduce((s,o)=>s+(o.gst||0),0).toFixed(2)}</span>
                            </div>
                          </div>
                        )}
                        <div className="detail-row" style={{borderTop:'1px solid var(--border)',paddingTop:6,marginTop:2}}>
                          <span className="dr-label" style={{fontWeight:700}}>Total Commission + GST</span>
                          <span className="dr-val" style={{color:'var(--yellow)',fontWeight:700}}>₹{((detail.settlement.commission||0)+(detail.settlement.gst_amount||0)+(detail.settlement.total_shipping||0)).toFixed(2)}</span>
                        </div>
                      </>);
                    })()}
                    <div className="detail-row"><span className="dr-label">GST (18%)</span><span className="dr-val" style={{color:'var(--orange)'}}>₹{(detail.settlement.gst_amount||0).toFixed(2)}</span></div>
                    {(()=>{
                      const prepColl = (detail.orders||[]).filter(o=>o.payment_type==='prepaid').reduce((s,o)=>s+(o.my_revenue||0)*0.9,0);
                      return (<>
                        <div style={{borderTop:'1px solid var(--border)',marginTop:4,paddingTop:6}}>
                          {prepColl>0 && <div className="detail-row"><span className="dr-label" style={{color:'var(--green)',fontWeight:600}}>Prepaid Collected by CrosCrow (MRP−10%)</span><span className="dr-val" style={{color:'var(--green)',fontWeight:600}}>−₹{prepColl.toFixed(2)}</span></div>}
                          {(detail.settlement.advance_total||0)>0 && <div className="detail-row"><span className="dr-label">Advance Collected (COD partial)</span><span className="dr-val">−₹{(detail.settlement.advance_total||0).toFixed(2)}</span></div>}
                          {(detail.settlement.total_shipping||0)>0 && (()=>{
                            const sh = detail.settlement.total_shipping||0;
                            const shBase = parseFloat((sh*100/118).toFixed(2));
                            const shGst  = parseFloat((sh*18/118).toFixed(2));
                            return (<div style={{background:'rgba(99,102,241,0.07)',border:'1px solid rgba(99,102,241,0.2)',borderRadius:5,padding:'5px 8px',margin:'4px 0'}}>
                              <div style={{fontSize:9,fontWeight:700,color:'var(--indigo)',marginBottom:3}}>COD Shipping Recovery (₹{sh.toFixed(2)} collected, GST-incl.)</div>
                              <div className="detail-row" style={{padding:'1px 0'}}><span className="dr-label" style={{fontSize:10}}>Shipping base (excl. GST)</span><span className="dr-val" style={{fontSize:10}}>₹{shBase.toFixed(2)}</span></div>
                              <div className="detail-row" style={{padding:'1px 0'}}><span className="dr-label" style={{fontSize:10}}>GST on shipping (18%)</span><span className="dr-val" style={{fontSize:10}}>₹{shGst.toFixed(2)}</span></div>
                            </div>);
                          })()}
                          {(detail.settlement.penalty_deduction||0)>0 && <div className="detail-row"><span className="dr-label" style={{color:'var(--red)',fontWeight:600}}>⚠ Penalty Deduction</span><span className="dr-val" style={{color:'var(--red)',fontWeight:600}}>+₹{(detail.settlement.penalty_deduction||0).toFixed(2)}</span></div>}
                          {(detail.settlement.extra_discount||0)>0 && <div className="detail-row"><span className="dr-label">Extra Discount</span><span className="dr-val" style={{color:'var(--green)'}}>−₹{detail.settlement.extra_discount.toFixed(2)}</span></div>}
                          {(detail.settlement.extra_advance||0)>0 && <div className="detail-row"><span className="dr-label">Extra Advance</span><span className="dr-val" style={{color:'var(--green)'}}>−₹{detail.settlement.extra_advance.toFixed(2)}</span></div>}
                          {(detail.settlement.shipping_adjustment||0)!==0 && <div className="detail-row"><span className="dr-label">Shipping Adj.</span><span className="dr-val" style={{color:'var(--yellow)'}}>₹{detail.settlement.shipping_adjustment.toFixed(2)}</span></div>}
                        </div>
                      </>);
                    })()}
                    <div className="detail-row" style={{borderTop:'1px solid var(--border)',paddingTop:8,marginTop:4}}>
                      <span className="dr-label" style={{fontWeight:700}}>Net {detail.settlement.net_payable<0?'Receivable':'Payable'}</span>
                      <span className="dr-val" style={{color:detail.settlement.net_payable<0?'var(--green)':'var(--red)',fontWeight:700,fontSize:14}}>₹{Math.abs(detail.settlement.net_payable||0).toFixed(2)}</span>
                    </div>
                  </div>
                  <div className="detail-box">
                    <div className="detail-box-title">Status</div>
                    <div className="detail-row"><span className="dr-label">Invoice No</span><span className="dr-val" style={{fontSize:10}}>{detail.settlement.invoice_no}</span></div>
                    <div className="detail-row"><span className="dr-label">Status</span><span className="dr-val"><span className={`badge b-${detail.settlement.status}`}><span className="bdot"/>{detail.settlement.status.toUpperCase()}</span></span></div>
                    {detail.settlement.paid_at && <div className="detail-row"><span className="dr-label">Paid On</span><span className="dr-val">{fmtDate(detail.settlement.paid_at)}</span></div>}
                    <div className="detail-row"><span className="dr-label">Generated</span><span className="dr-val">{fmtDate(detail.settlement.created_at)}</span></div>
                  </div>
                </div>
                <div style={{marginBottom:6,fontSize:9,letterSpacing:2,textTransform:'uppercase',color:'var(--text-muted)'}}>Order Breakdown</div>
                <table className="items-table">
                  <thead><tr><th>Order</th><th>MRP Value</th><th>Type</th><th>Discount</th><th>Taxable Base</th><th>Comm Rule</th><th>Commission</th><th>GST</th><th>Advance</th><th>Net</th></tr></thead>
                  <tbody>
                    {(detail.orders||[]).map((o,i)=>{
                      const isPrepaid = o.payment_type==='prepaid';
                      const disc = isPrepaid?(o.my_revenue||0)*0.1:0;
                      const base = (o.my_revenue||0)-disc;
                      return (
                      <tr key={i}>
                        <td style={{color:'var(--green)',fontWeight:700}}>{o.order_name}</td>
                        <td style={{color:'var(--teal)'}}>{fmtCur(o.my_revenue)}</td>
                        <td style={{fontSize:9,textTransform:'uppercase',color:isPrepaid?'var(--orange)':'var(--text-muted)'}}>{o.payment_type}</td>
                        <td style={{color:'var(--orange)'}}>{isPrepaid?`−₹${disc.toFixed(2)}`:'—'}</td>
                        <td style={{fontWeight:600}}>₹{base.toFixed(2)}</td>
                        <td style={{fontSize:9,color:o.has_product_rule?'#a5b4fc':'var(--text-muted)',fontWeight:o.has_product_rule?700:400}}>{o.has_product_rule?(o.rule_label||'Custom'):`${o.commission_pct||20}%`}</td>
                        <td style={{color:'var(--yellow)'}}>₹{(o.commission||0).toFixed(2)}</td>
                        <td style={{color:'var(--orange)'}}>₹{(o.gst||0).toFixed(2)}</td>
                        <td>₹{(o.advance_paid||0).toFixed(2)}</td>
                        <td style={{color:o.net<0?'var(--green)':'var(--red)',fontWeight:700}}>{o.net<0?'+':'−'}₹{Math.abs(o.net||0).toFixed(2)}</td>
                      </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
              <div className="modal-footer">
                <button className="btn btn-ghost" onClick={()=>setDetail(null)}>Close</button>
              </div>
            </div>
          </div>
        )}
      </div>
    );
  }

  /* ══════════════════════════════════
     WALLET VIEW
  ══════════════════════════════════ */
  function Wallet({ token }) {
    const [data, setData] = useState(null);
    const [loading, setLoading] = useState(true);

    useEffect(()=>{
      fetch(`${API}/vendor/wallet`,{headers:{Authorization:`Bearer ${token}`}})
        .then(r=>r.json()).then(setData).catch(()=>{}).finally(()=>setLoading(false));
    },[token]);

    return (
      <div className="page">
        <div className="card">
          <div className="card-header"><span className="card-title">Wallet Balance</span></div>
          <div style={{padding:'20px 18px',borderBottom:'1px solid var(--border)'}}>
            {loading ? <div className="skel" style={{height:36,width:160}}/> : (
              <>
                <div className="wallet-bal">{fmtCur(data?.balance||0)}</div>
                <div style={{fontSize:11,color:'var(--text-muted)'}}>Net wallet balance after settlements</div>
              </>
            )}
          </div>
          <div style={{padding:16}}>
            <div style={{fontSize:9,letterSpacing:2,textTransform:'uppercase',color:'var(--text-muted)',marginBottom:12}}>Transaction History</div>
            {loading ? Array.from({length:5}).map((_,i)=><div key={i} className="skel" style={{height:44,borderRadius:6,marginBottom:8}}/>) :
             (data?.transactions||[]).length===0 ? (
               <div className="empty"><div className="empty-icon">₹</div><div className="empty-title">No transactions yet</div></div>
             ) : (data?.transactions||[]).map(t=>(
               <div key={t.id} className="tx-item">
                 <div className={t.type==='credit'?'tx-dot-cr':'tx-dot-db'}/>
                 <div className="tx-desc">
                   <div>{t.description}</div>
                   <div style={{fontSize:10,color:'var(--text-muted)',marginTop:2}}>{fmtDate(t.created_at)}</div>
                 </div>
                 <div className="tx-amt" style={{color:t.type==='credit'?'var(--green)':'var(--red)'}}>
                   {t.type==='credit'?'+':'−'}₹{(t.amount||0).toFixed(2)}
                 </div>
               </div>
             ))}
          </div>
        </div>
      </div>
    );
  }

  /* ══════════════════════════════════
     VENDOR RETURNS VIEW
  ══════════════════════════════════ */
  function RRShipmentStatus({ awb, courier, direction, requestId, trackingStatus }) {
    const [status,     setStatus]     = useState(trackingStatus || '');
    const [history,    setHistory]    = useState([]);
    const [refreshing, setRefreshing] = useState(false);
    const [msg,        setMsg]        = useState('');
    const color = direction === 'reverse' ? 'var(--blue)' : 'var(--green)';

    const doRefresh = async () => {
      setRefreshing(true); setMsg('');
      try {
        const params = new URLSearchParams({ awb, request_id: requestId||'', direction: direction||'' });
        const r = await fetch(`${API}/track/rr-shipment-status?${params}`);
        const d = await r.json();
        if (d.status) setStatus(d.status);
        if (d.history?.length) setHistory(d.history);
        if (d.message) setMsg(d.message);
      } catch { setMsg('Could not fetch.'); }
      setRefreshing(false);
    };

    useEffect(() => { if (awb) doRefresh(); }, [awb]);

    return (
      <div style={{marginTop:8,background:'var(--bg)',border:`1px solid ${color}44`,borderRadius:7,padding:'8px 12px'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:4}}>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            <span style={{fontSize:10,fontWeight:700,color,textTransform:'uppercase',letterSpacing:1}}>{direction==='reverse'?'↩ Return Tracking':'→ Forward Tracking'}</span>
            <span style={{fontSize:10,color:'var(--text-muted)',fontFamily:'monospace'}}>{awb}</span>
            {courier && <span style={{fontSize:10,color:'var(--text-muted)'}}>{courier}</span>}
          </div>
          <button onClick={doRefresh} disabled={refreshing}
            style={{background:'transparent',border:`1px solid ${color}44`,borderRadius:5,color,cursor:'pointer',fontSize:10,padding:'2px 8px'}}>
            {refreshing?'…':'↻'}
          </button>
        </div>
        {status && <div style={{fontSize:12,color,fontWeight:600,marginBottom:4}}>{status}</div>}
        {msg && <div style={{fontSize:10,color:'var(--text-muted)'}}>{msg}</div>}
        {history.length > 0 && (
          <div style={{marginTop:6,borderTop:`1px solid ${color}22`,paddingTop:6,display:'flex',flexDirection:'column',gap:3}}>
            {history.slice().reverse().slice(0,4).map((h,i)=>(
              <div key={i} style={{fontSize:10,display:'flex',gap:10}}>
                <span style={{color:'var(--text-muted)',flexShrink:0,minWidth:90}}>{h.ActionDate||''}</span>
                <span style={{color:'var(--text)'}}>{h.ActionDescription||''}</span>
              </div>
            ))}
          </div>
        )}
      </div>
    );
  }

  function RRShipmentPanel({ token, rr, onUpdated }) {
    const [partners,   setPartners]   = useState([]);
    const [partner,    setPartner]    = useState('');
    const [warehouses, setWarehouses] = useState([]);
    const [warehouse,  setWarehouse]  = useState(null);
    const [whLoading,  setWhLoading]  = useState(false);
    const [weight,  setWeight]    = useState('0.5');
    const [length,  setLength]    = useState('15');
    const [breadth, setBreadth]   = useState('12');
    const [height,  setHeight]    = useState('8');
    const [shipMode, setShipMode] = useState('Surface');
    const [rateInfo, setRateInfo] = useState(null);
    const [rateLoading, setRateLoading] = useState(false);
    const [creating, setCreating] = useState('');
    const [msg, setMsg]           = useState(null);
    const [manualDir,     setManualDir]     = useState('reverse');
    const [manualCourier, setManualCourier] = useState('');
    const [manualAwb,     setManualAwb]     = useState('');
    const [savingManual,  setSavingManual]  = useState(false);

    useEffect(()=>{
      fetch(`${API}/vendor/shipping/partners`, { headers:{ Authorization:`Bearer ${token}` } })
        .then(r=>r.json()).then(d=>{ const ps=(d.partners||[]).map(p=>p.partner||p); setPartners(ps); if(ps.length) setPartner(ps[0]); }).catch(()=>{});
    },[]);

    useEffect(()=>{
      if (!partner) return;
      setWarehouses([]); setWarehouse(null); setWhLoading(true);
      fetch(`${API}/vendor/shipping/warehouses?partner=${partner}`, { headers:{ Authorization:`Bearer ${token}` } })
        .then(r=>r.json()).then(d=>{ const wh=d.warehouses||[]; setWarehouses(wh); setWarehouse(wh[0]||null); }).catch(()=>{}).finally(()=>setWhLoading(false));
    },[partner]);

    const saveManualAwb = async () => {
      if (!manualAwb.trim()) return;
      setSavingManual(true); setMsg(null);
      try {
        const r = await fetch(`${API}/vendor/return-requests/${rr.request_id}/awb`, {
          method:'PUT', headers:{'Content-Type':'application/json', Authorization:`Bearer ${token}`},
          body: JSON.stringify({ direction: manualDir, awb: manualAwb.trim(), courier: manualCourier }),
        });
        const d = await r.json();
        if (!r.ok) throw new Error(d.error);
        setMsg({type:'success', text:`AWB saved for ${manualDir} shipment`});
        setManualAwb(''); setManualCourier('');
        onUpdated && onUpdated();
      } catch(e) { setMsg({type:'error', text:e.message}); }
      setSavingManual(false);
    };

    const checkRates = async () => {
      if (!partner) return;
      setRateLoading(true); setRateInfo(null);
      try {
        const r = await fetch(`${API}/vendor/return-requests/${rr.request_id}/rate-check`, {
          method:'POST', headers:{'Content-Type':'application/json','Authorization':`Bearer ${token}`},
          body: JSON.stringify({ partner, weight:parseFloat(weight)||0.5, length:parseFloat(length)||15, breadth:parseFloat(breadth)||12, height:parseFloat(height)||8 }),
        });
        const d = await r.json();
        setRateInfo(d);
      } catch(e) { setRateInfo({error:e.message}); }
      setRateLoading(false);
    };

    const createShipment = async (direction) => {
      if (!partner) { setMsg({type:'error',text:'Select a shipping partner first.'}); return; }
      setCreating(direction); setMsg(null);
      try {
        const r = await fetch(`${API}/vendor/return-requests/${rr.request_id}/create-shipment`, {
          method:'POST', headers:{'Content-Type':'application/json','Authorization':`Bearer ${token}`},
          body: JSON.stringify({ direction, partner, weight:parseFloat(weight)||0.5, length:parseFloat(length)||15, breadth:parseFloat(breadth)||12, height:parseFloat(height)||8, shipMode, warehouseId: warehouse?.id||'', warehouseName: warehouse?.name||'' }),
        });
        const d = await r.json();
        if (!r.ok) throw new Error(d.error);
        setMsg({type:'success',text:`${direction==='reverse'?'Reverse':'Forward'} shipment created! AWB: ${d.awb}`});
        onUpdated && onUpdated();
      } catch(e){ setMsg({type:'error',text:e.message}); }
      setCreating('');
    };

    const isExchange = rr.type === 'exchange';
    const revShip = rr.reverse_shipment;
    const fwdShip = rr.forward_shipment;

    return (
      <div style={{marginTop:14,borderTop:'1px solid var(--border)',paddingTop:14}}>
        <div style={{fontSize:11,fontWeight:700,color:'var(--text-muted)',letterSpacing:1,textTransform:'uppercase',marginBottom:10}}>📦 Shipments</div>
        {msg && <div className={`alert alert-${msg.type}`} style={{marginBottom:10,fontSize:11}}>{msg.type==='success'?'✓':'⚠'} {msg.text}</div>}

        {(revShip||fwdShip) && (
          <div style={{display:'flex',flexDirection:'column',gap:10,marginBottom:12}}>
            {[revShip&&{ship:revShip,dir:'reverse',color:'var(--blue)',label:'↩ Reverse Pickup'},
               fwdShip&&{ship:fwdShip,dir:'forward',color:'var(--green)',label:'→ Forward Dispatch'}
              ].filter(Boolean).map(({ship,dir,color,label})=>(
              <div key={dir} style={{background:'var(--bg-card2)',border:`1px solid ${color}`,borderRadius:8,padding:'10px 14px',fontSize:11}}>
                <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:3}}>
                  <div>
                    <div style={{color,fontWeight:700,marginBottom:3}}>{label}</div>
                    <div style={{color:'var(--text)',fontFamily:'var(--font-family)'}}>{ship.awb}</div>
                    <div style={{color:'var(--text-muted)',marginTop:2}}>{ship.courier} · {ship.created_at?.split('T')[0]}</div>
                  </div>
                  {(()=>{ const url = ship.tracking_url || trackingUrlFromCourier(ship.courier||'', ship.awb||''); return url ? <a href={url} target="_blank" rel="noreferrer" style={{fontSize:10,padding:'4px 10px',borderRadius:4,border:`1px solid ${color}`,color,background:'transparent',textDecoration:'none',fontFamily:'var(--font-family)',fontWeight:600,flexShrink:0}}>🔗 Track →</a> : null; })()}
                </div>
                <RRShipmentStatus awb={ship.awb} courier={ship.courier} direction={dir} requestId={rr.request_id} trackingStatus={ship.tracking_status}/>
              </div>
            ))}
          </div>
        )}

        {/* Manual AWB entry — always visible */}
        <div style={{marginBottom:12,background:'var(--bg-hover)',border:'1px solid var(--border)',borderRadius:8,padding:'10px 14px'}}>
          <div style={{fontSize:10,fontWeight:700,color:'var(--text-muted)',letterSpacing:1,textTransform:'uppercase',marginBottom:8}}>✏ Enter AWB Manually</div>
          <div style={{display:'flex',gap:6,flexWrap:'wrap',alignItems:'flex-end'}}>
            <div>
              <div style={{fontSize:10,color:'var(--text-muted)',marginBottom:3}}>Direction</div>
              <select value={manualDir} onChange={e=>setManualDir(e.target.value)}
                style={{background:'var(--bg-card2)',border:'1px solid var(--border)',borderRadius:6,padding:'5px 8px',color:'var(--text)',fontFamily:'var(--font-family)',fontSize:11,outline:'none'}}>
                <option value="reverse">↩ Reverse</option>
                {isExchange && <option value="forward">→ Forward</option>}
              </select>
            </div>
            <div style={{flex:1,minWidth:130}}>
              <div style={{fontSize:10,color:'var(--text-muted)',marginBottom:3}}>Courier</div>
              <select value={manualCourier} onChange={e=>setManualCourier(e.target.value)}
                style={{width:'100%',background:'var(--bg-card2)',border:'1px solid var(--border)',borderRadius:6,padding:'5px 8px',color:manualCourier?'var(--text)':'var(--text-muted)',fontFamily:'var(--font-family)',fontSize:11,outline:'none'}}>
                <option value="">Select courier…</option>
                <option value="Delhivery">Delhivery</option>
                <option value="BlueDart">BlueDart</option>
                <option value="XpressBees">XpressBees</option>
                <option value="Ecom Express">Ecom Express</option>
                <option value="DTDC">DTDC</option>
                <option value="Shadowfax">Shadowfax</option>
                <option value="Ekart">Ekart</option>
                <option value="FedEx">FedEx</option>
                <option value="India Post">India Post</option>
                <option value="DHL">DHL</option>
                <option value="Other">Other</option>
              </select>
            </div>
            <div style={{flex:2,minWidth:130}}>
              <div style={{fontSize:10,color:'var(--text-muted)',marginBottom:3}}>AWB / Tracking No</div>
              <input value={manualAwb} onChange={e=>setManualAwb(e.target.value)} placeholder="Enter AWB number"
                style={{width:'100%',background:'var(--bg-card2)',border:'1px solid var(--border)',borderRadius:6,padding:'5px 8px',color:'var(--text)',fontFamily:'var(--font-family)',fontSize:11,outline:'none'}}/>
            </div>
            <button onClick={saveManualAwb} disabled={savingManual||!manualAwb.trim()}
              style={{padding:'5px 12px',borderRadius:6,border:'1px solid var(--indigo)',background:'var(--indigo-dim)',color:'var(--indigo)',cursor:'pointer',fontFamily:'var(--font-family)',fontSize:11,fontWeight:700}}>
              {savingManual?'Saving…':'Save AWB'}
            </button>
          </div>
        </div>

        {partners.length === 0 ? (
          <div style={{fontSize:11,color:'var(--text-muted)'}}>No shipping partners connected. Go to Shipping Settings to auto-create shipments.</div>
        ) : (
          <>
            <div style={{display:'flex',gap:8,flexWrap:'wrap',alignItems:'flex-end',marginBottom:10}}>
              <div>
                <div style={{fontSize:10,color:'var(--text-muted)',marginBottom:3}}>Partner</div>
                <select value={partner} onChange={e=>setPartner(e.target.value)} style={{background:'var(--bg-card2)',border:'1px solid var(--border)',borderRadius:6,padding:'6px 10px',color:'var(--text)',fontFamily:'var(--font-family)',fontSize:11,outline:'none'}}>
                  {partners.map(p=><option key={p} value={p}>{p.charAt(0).toUpperCase()+p.slice(1)}</option>)}
                </select>
              </div>
              <div style={{minWidth:180}}>
                <div style={{fontSize:10,color:'var(--text-muted)',marginBottom:3}}>Deliver To (Warehouse){whLoading&&<span style={{marginLeft:6,opacity:0.5}}>↻</span>}</div>
                {warehouses.length > 0 ? (
                  <select value={warehouse?.id||''} onChange={e=>setWarehouse(warehouses.find(w=>w.id===e.target.value)||null)}
                    style={{width:'100%',background:'var(--bg-card2)',border:'1px solid var(--border)',borderRadius:6,padding:'6px 10px',color:'var(--text)',fontFamily:'var(--font-family)',fontSize:11,outline:'none'}}>
                    {warehouses.map(w=><option key={w.id} value={w.id}>{w.name}{w.address?` — ${w.address}`:''}</option>)}
                  </select>
                ) : (
                  <div style={{fontSize:10,color:'var(--text-muted)',padding:'6px 0'}}>{whLoading?'Loading…':'No warehouses found'}</div>
                )}
              </div>
              {[['Wt(kg)','weight',weight,setWeight],['L','length',length,setLength],['B','breadth',breadth,setBreadth],['H','height',height,setHeight]].map(([lbl,k,val,set])=>(
                <div key={k}>
                  <div style={{fontSize:10,color:'var(--text-muted)',marginBottom:3}}>{lbl}</div>
                  <input type="number" value={val} onChange={e=>{ set(e.target.value); setRateInfo(null); }} style={{width:58,background:'var(--bg-card2)',border:'1px solid var(--border)',borderRadius:6,padding:'6px 8px',color:'var(--text)',fontFamily:'var(--font-family)',fontSize:11,outline:'none'}} />
                </div>
              ))}
              {partner==='delhivery' && (
                <div>
                  <div style={{fontSize:10,color:'var(--text-muted)',marginBottom:3}}>Mode</div>
                  <select value={shipMode} onChange={e=>{setShipMode(e.target.value);setRateInfo(null);}}
                    style={{background:'var(--bg-card2)',border:'1px solid var(--border)',borderRadius:6,padding:'6px 8px',color:'var(--text)',fontFamily:'var(--font-family)',fontSize:11,outline:'none'}}>
                    <option value="Surface">Surface</option>
                    <option value="Express">Express</option>
                  </select>
                </div>
              )}
              {partner==='delhivery' && (
                <div style={{display:'flex',alignItems:'flex-end'}}>
                  <button onClick={checkRates} disabled={rateLoading}
                    style={{fontSize:10,padding:'6px 10px',borderRadius:6,border:'1px solid var(--yellow)',background:'transparent',color:'var(--yellow)',cursor:'pointer',fontFamily:'var(--font-family)'}}>
                    {rateLoading?'Checking…':'₹ Check Rate'}
                  </button>
                </div>
              )}
            </div>

            {rateInfo && (
              <div style={{marginBottom:10,padding:'8px 12px',borderRadius:7,background:rateInfo.error?'rgba(239,68,68,0.08)':'rgba(16,185,129,0.08)',border:`1px solid ${rateInfo.error?'rgba(239,68,68,0.3)':'rgba(16,185,129,0.3)'}`,fontSize:11}}>
                {rateInfo.error ? `❌ ${rateInfo.error}` : (
                  <div style={{display:'flex',gap:16,flexWrap:'wrap'}}>
                    {(rateInfo.rates||[]).map((r,i)=>(
                      <div key={i} style={{color:'var(--text)'}}>
                        <span style={{color:'var(--text-muted)'}}>{r.mode}: </span>
                        <strong style={{color:'var(--green)'}}>₹{r.charge}</strong>
                        {r.estimated_days&&<span style={{color:'var(--text-muted)',fontSize:10}}> · {r.estimated_days}d</span>}
                      </div>
                    ))}
                    {rateInfo.rates?.length===0 && <span style={{color:'var(--text-muted)'}}>No rates available for this pincode</span>}
                  </div>
                )}
              </div>
            )}

            {warehouse?.address && <div style={{fontSize:10,color:'var(--text-muted)',marginBottom:10}}>📍 {warehouse.address}</div>}
            <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
              <div style={{flex:1,minWidth:200,background:'var(--bg-hover)',border:'1px solid var(--border)',borderRadius:8,padding:'10px 14px'}}>
                <div style={{fontSize:11,fontWeight:700,color:'var(--blue)',marginBottom:4}}>↩ Reverse Pickup</div>
                <div style={{fontSize:10,color:'var(--text-muted)',marginBottom:8}}>Pick up return item from customer</div>
                {revShip
                  ? <div style={{fontSize:10,color:'var(--text-muted)'}}>Created: <span style={{color:'var(--blue)',fontFamily:'var(--font-family)'}}>{revShip.awb}</span></div>
                  : <button className="btn btn-sm" style={{fontSize:11,background:'var(--blue-dim)',border:'1px solid var(--blue)',color:'var(--blue)',borderRadius:6,padding:'5px 12px',cursor:'pointer'}} onClick={()=>createShipment('reverse')} disabled={!!creating}>{creating==='reverse'?<><span className="spin">↻</span> Creating…</>:'Create Reverse Pickup'}</button>
                }
              </div>
              {isExchange && (
                <div style={{flex:1,minWidth:200,background:'var(--bg-hover)',border:'1px solid var(--border)',borderRadius:8,padding:'10px 14px'}}>
                  <div style={{fontSize:11,fontWeight:700,color:'var(--green)',marginBottom:4}}>→ Forward Dispatch</div>
                  <div style={{fontSize:10,color:'var(--text-muted)',marginBottom:8}}>Send exchange item to customer</div>
                  {fwdShip
                    ? <div style={{fontSize:10,color:'var(--text-muted)'}}>Created: <span style={{color:'var(--green)',fontFamily:'var(--font-family)'}}>{fwdShip.awb}</span></div>
                    : <button className="btn btn-sm" style={{fontSize:11,background:'var(--green-dim)',border:'1px solid var(--green)',color:'var(--green)',borderRadius:6,padding:'5px 12px',cursor:'pointer'}} onClick={()=>createShipment('forward')} disabled={!!creating}>{creating==='forward'?<><span className="spin">↻</span> Creating…</>:'Create Forward Shipment'}</button>
                  }
                </div>
              )}
            </div>

          </>
        )}
      </div>
    );
  }

  function VendorReturns({ token }) {
    const [requests, setRequests] = useState([]);
    const [loading,  setLoading]  = useState(true);
    const [tab,      setTab]      = useState('all');
    const [expanded, setExpanded] = useState(null);
    const [noteVal,  setNoteVal]  = useState('');
    const [saving,   setSaving]   = useState(false);
    const [msg,      setMsg]      = useState(null);

    const load = () => {
      setLoading(true);
      const q = tab !== 'all' ? `?status=${tab}` : '';
      fetch(`${API}/vendor/return-requests${q}`, { headers:{ Authorization:`Bearer ${token}` } })
        .then(r=>r.json()).then(d=>setRequests(d.requests||[])).catch(()=>{}).finally(()=>setLoading(false));
    };
    useEffect(load, [tab]);

    const saveNote = async (id) => {
      setSaving(true); setMsg(null);
      try {
        const r = await fetch(`${API}/vendor/return-requests/${id}`, {
          method:'PUT', headers:{'Content-Type':'application/json','Authorization':`Bearer ${token}`},
          body: JSON.stringify({ vendor_note: noteVal }),
        });
        if (!r.ok) throw new Error('Save failed');
        setMsg({type:'success',text:'Note saved.'});
        load();
      } catch(e) { setMsg({type:'error',text:e.message}); }
      setSaving(false);
    };

    const TYPE_COLOR = { return:'var(--blue)', exchange:'var(--green)' };
    const STATUS_COLOR = { pending:'var(--yellow)', approved:'var(--green)', rejected:'var(--red)', completed:'var(--teal)' };
    const TABS = ['all','pending','approved','rejected','completed'];

    return (
      <div className="page">
        <div style={{display:'flex',gap:6,marginBottom:14,flexWrap:'wrap'}}>
          {TABS.map(t=>(
            <button key={t} onClick={()=>setTab(t)} style={{
              padding:'5px 14px',borderRadius:99,border:'1px solid var(--border)',cursor:'pointer',
              background:tab===t?'var(--green-dim)':'var(--bg-card2)',
              color:tab===t?'var(--green)':'var(--text-muted)',
              fontFamily:'var(--font-family)',fontSize:11,fontWeight:tab===t?700:400,
              textTransform:'capitalize',
            }}>{t}</button>
          ))}
        </div>

        {msg && <div className={`alert alert-${msg.type}`}>{msg.type==='success'?'✓':'⚠'} {msg.text}</div>}

        <div className="card">
          <div className="card-header"><span className="card-title">Return & Exchange Requests</span></div>
          {loading ? <div style={{padding:24,textAlign:'center',color:'var(--text-muted)'}}><span className="spin">↻</span> Loading…</div> : (
            <div style={{overflowX:'auto'}}>
              {requests.length === 0 ? (
                <div style={{padding:32,textAlign:'center',color:'var(--text-muted)',fontSize:13}}>No requests found.</div>
              ) : (
                <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
                  <thead>
                    <tr style={{borderBottom:'1px solid var(--border)'}}>
                      {['Request ID','Order','Customer','Type','Items','Status','Date',''].map(h=>(
                        <th key={h} style={{padding:'8px 12px',textAlign:'left',fontSize:10,letterSpacing:1,color:'var(--text-muted)',textTransform:'uppercase',whiteSpace:'nowrap'}}>{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {requests.map(rq=>{
                      const isExp = expanded===rq.request_id;
                      return (
                        <React.Fragment key={rq.request_id}>
                          <tr style={{borderBottom:'1px solid var(--border)',background:isExp?'var(--bg-hover)':'',cursor:'pointer'}} onClick={()=>{ setExpanded(isExp?null:rq.request_id); setNoteVal(rq.vendor_note||''); setMsg(null); }}>
                            <td style={{padding:'9px 12px',color:'var(--teal)',fontWeight:700,whiteSpace:'nowrap'}}>{rq.request_id}</td>
                            <td style={{padding:'9px 12px',color:'var(--text)',whiteSpace:'nowrap'}}>{rq.order_name}</td>
                            <td style={{padding:'9px 12px',color:'var(--text-dim)'}}>{rq.customer_name||rq.customer_email}</td>
                            <td style={{padding:'9px 12px'}}><span style={{background:'var(--bg-card2)',border:`1px solid ${TYPE_COLOR[rq.type]||'var(--border)'}`,color:TYPE_COLOR[rq.type]||'var(--text)',borderRadius:99,padding:'3px 10px',fontSize:10,textTransform:'capitalize',fontWeight:700}}>{rq.type}</span></td>
                            <td style={{padding:'9px 12px',color:'var(--text-dim)'}}>{(rq.items||[]).length} item{rq.items?.length!==1?'s':''}</td>
                            <td style={{padding:'9px 12px'}}><span style={{background:'var(--bg-card2)',border:`1px solid ${STATUS_COLOR[rq.status]||'var(--border)'}`,color:STATUS_COLOR[rq.status]||'var(--text)',borderRadius:99,padding:'3px 10px',fontSize:10,textTransform:'capitalize',fontWeight:700}}>{rq.status}</span></td>
                            <td style={{padding:'9px 12px',color:'var(--text-muted)',whiteSpace:'nowrap'}}>{rq.created_at?.split('T')[0]}</td>
                            <td style={{padding:'9px 12px',color:'var(--text-muted)'}}>{isExp?'▲':'▼'}</td>
                          </tr>
                          {isExp && (

                                      onClick={async()=>{ setSaving(true); await fetch(`${API}/vendor/return-requests/${rq.request_id}`,{method:'PUT',headers:{'Content-Type':'application/json','Authorization':`Bearer ${token}`},body:JSON.stringify({status:'approved'})}); load(); setSaving(false); }}>
                                      ✓ Confirm Approved
                                    </button>

                                {/* Shipment panel */}
                                <RRShipmentPanel token={token} rr={rq} onUpdated={load} />

                                <div style={{marginTop:14,marginBottom:6,fontSize:10,color:'var(--text-muted)',letterSpacing:1,textTransform:'uppercase'}}>Your Note</div>
                                <textarea
                                  style={{width:'100%',background:'var(--bg-card2)',border:'1px solid var(--border)',borderRadius:6,padding:'8px 10px',color:'var(--text)',fontFamily:'var(--font-family)',fontSize:12,minHeight:60,outline:'none',resize:'vertical'}}
                                  placeholder="Add a note for the customer/admin…"
                                  value={noteVal}
                                  onChange={e=>setNoteVal(e.target.value)}
                                />
                                <button className="btn btn-green" style={{marginTop:8,fontSize:11,padding:'7px 16px'}} onClick={()=>saveNote(rq.request_id)} disabled={saving}>
                                  {saving?<><span className="spin">↻</span> Saving…</>:'Save Note'}
                                </button>
                              </div>
                            </td></tr>
                          )}
                        </React.Fragment>
                      );
                    })}
                  </tbody>
                </table>
              )}
            </div>
          )}
        </div>
      </div>
    );
  }

  function VendorAgreement({ token }) {
    const [agreements, setAgreements] = useState([]);
    const [loading,    setLoading]    = useState(true);
    const [uploading,  setUploading]  = useState(null);
    const [msg,        setMsg]        = useState(null);
    const fileRef = useRef();
    const [uploadTarget, setUploadTarget] = useState(null);

    useEffect(()=>{
      fetch(`${API}/vendor/agreements`, { headers:{ Authorization:`Bearer ${token}` } })
        .then(r=>r.json()).then(d=>setAgreements(d.agreements||[])).catch(()=>{}).finally(()=>setLoading(false));
    },[token]);

    const uploadSigned = async (ag, file) => {
      if (!file) return;
      const ok = ['application/pdf','image/png','image/jpeg'].includes(file.type);
      if (!ok) return setMsg({ type:'error', text:'Only PDF, PNG or JPG allowed.' });
      if (file.size > 20*1024*1024) return setMsg({ type:'error', text:'File too large. Max 20MB.' });
      setUploading(ag.id); setMsg(null);
      try {
        const fd = new FormData();
        fd.append('signed_doc', file);
        const r = await fetch(`${API}/vendor/agreements/${ag.id}/upload-signed`, { method:'POST', headers:{ Authorization:`Bearer ${token}` }, body: fd });
        const d = await r.json();
        if (!r.ok) throw new Error(d.error);
        setMsg({ type:'success', text:'✓ Signed agreement uploaded! Admin will review and confirm shortly.' });
        setAgreements(prev => prev.map(a => a.id===ag.id ? {...a, status:'signed', signed_url: d.signed_url} : a));
      } catch(e) { setMsg({ type:'error', text:e.message }); }
      setUploading(null);
    };

    const STATUS_COLOR = { sent:'#f59e0b', signed:'#6366f1', approved:'#10b981', expired:'#ef4444' };
    const STATUS_LABEL = { sent:'Sent — Awaiting Signature', signed:'Signed — Pending Approval', approved:'Active', expired:'Expired' };
    const today = new Date().toISOString().slice(0,10);

    return (
      <div className="page">
        <div style={{marginBottom:18}}>
          <div style={{fontSize:14,fontWeight:700,color:'var(--text)',marginBottom:2}}>📋 My Agreement</div>
          <div style={{fontSize:11,color:'var(--text-muted)'}}>Your partnership agreement with CrosCrow. Download, sign, and upload your signed copy below.</div>
        </div>

        {msg && <div style={{padding:'10px 14px',borderRadius:8,marginBottom:14,fontSize:12,background:msg.type==='success'?'rgba(16,185,129,0.1)':'rgba(239,68,68,0.1)',border:`1px solid ${msg.type==='success'?'rgba(16,185,129,0.3)':'rgba(239,68,68,0.3)'}`,color:msg.type==='success'?'var(--green)':'var(--red)'}}>{msg.text}</div>}

        {loading ? <div style={{textAlign:'center',padding:40,color:'var(--text-muted)'}}>Loading…</div> :
         agreements.length === 0 ? (
           <div style={{textAlign:'center',padding:48,color:'var(--text-muted)'}}>
             <div style={{fontSize:32,marginBottom:12}}>📄</div>
             <div style={{fontWeight:600,marginBottom:6}}>No agreement yet</div>
             <div style={{fontSize:12}}>Your agreement will appear here once CrosCrow sends it.</div>
           </div>
         ) : (
           <div style={{display:'flex',flexDirection:'column',gap:12}}>
             {agreements.map(ag=>{
               const isExpired = ag.valid_till && ag.valid_till < today;
               const color = isExpired ? '#ef4444' : (STATUS_COLOR[ag.status]||'#888');
               return (
                 <div key={ag.id} style={{background:'var(--bg-card)',border:`1px solid var(--border)`,borderRadius:10,overflow:'hidden'}}>
                   <div style={{padding:'14px 16px'}}>
                     <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:8,marginBottom:10}}>
                       <div>
                         <div style={{fontWeight:700,fontSize:13,color:'var(--text)'}}>Vendor Partnership Agreement</div>
                         <div style={{fontSize:11,color:'var(--text-muted)',marginTop:2}}>
                           Issued {ag.created_at?.slice(0,10)}
                           {ag.valid_from && ` · Effective ${ag.valid_from}`}
                           {ag.valid_till && ` · Valid till ${ag.valid_till}`}
                         </div>
                       </div>
                       <span style={{fontSize:11,padding:'3px 10px',borderRadius:99,fontWeight:700,background:`${color}22`,color}}>{isExpired?'Expired':STATUS_LABEL[ag.status]||ag.status}</span>
                     </div>

                     {/* Progress steps */}
                     <div style={{display:'flex',gap:0,marginBottom:14,overflow:'hidden',borderRadius:6}}>
                       {[['Sent','sent'],['Download & Sign','sent'],['Upload Signed','signed'],['Approved','approved']].map(([label,activeOn],i,arr)=>{
                         const steps = ['sent','sent','signed','approved'];
                         const statusOrder = ['sent','signed','approved'];
                         const myIdx = statusOrder.indexOf(ag.status);
                         const stepIdx = [0,0,1,2][i];
                         const done = myIdx >= stepIdx;
                         return (
                           <div key={i} style={{flex:1,padding:'5px 4px',background:done?'rgba(16,185,129,0.12)':'var(--bg-hover)',borderRight:i<arr.length-1?'1px solid var(--border)':'none',textAlign:'center'}}>
                             <div style={{fontSize:9,color:done?'var(--green)':'var(--text-muted)',fontWeight:done?700:400}}>{done?'✓ ':''}{label}</div>
                           </div>
                         );
                       })}
                     </div>

                     <div style={{display:'flex',gap:8,flexWrap:'wrap',alignItems:'center'}}>
                       {/* Download */}
                       <button onClick={async()=>{
                         const r = await fetch(`${API}/vendor/agreements/${ag.id}/download`, { headers:{ Authorization:`Bearer ${token}` } });
                         const blob = await r.blob();
                         const url = URL.createObjectURL(blob); const a=document.createElement('a'); a.href=url; a.download='CrosCrow_Agreement.docx'; a.click(); URL.revokeObjectURL(url);
                       }} style={{padding:'7px 14px',borderRadius:6,border:'1px solid var(--border)',background:'var(--bg-card2)',color:'var(--text)',fontSize:11,fontWeight:600,cursor:'pointer',fontFamily:'inherit'}}>
                         📥 Download Agreement
                       </button>

                       {/* Upload signed */}
                       {(ag.status==='sent' || ag.status==='expired') && (
                         <>
                           <input ref={fileRef} type="file" accept=".pdf,.png,.jpg,.jpeg" style={{display:'none'}} onChange={e=>{ uploadSigned(ag, e.target.files[0]); e.target.value=''; }}/>
                           <button onClick={()=>fileRef.current.click()} disabled={uploading===ag.id} style={{padding:'7px 14px',borderRadius:6,border:'none',background:'var(--green)',color:'#fff',fontSize:11,fontWeight:700,cursor:'pointer',fontFamily:'inherit'}}>
                             {uploading===ag.id ? '↻ Uploading…' : '✍ Upload Signed Copy'}
                           </button>
                           <span style={{fontSize:10,color:'var(--text-muted)'}}>PDF, PNG or JPG · max 20MB</span>
                         </>
                       )}

                       {ag.status==='signed' && (
                         <span style={{fontSize:11,color:'#6366f1',fontWeight:600}}>✓ Signed copy uploaded — pending admin review</span>
                       )}
                       {ag.status==='approved' && !isExpired && (
                         <span style={{fontSize:11,color:'var(--green)',fontWeight:600}}>✓ Agreement active and approved</span>
                       )}
                       {isExpired && (
                         <span style={{fontSize:11,color:'#ef4444',fontWeight:600}}>Agreement expired — contact CrosCrow for renewal</span>
                       )}
                     </div>
                   </div>
                 </div>
               );
             })}
           </div>
         )}
      </div>
    );
  }

  function Profile({ token }) {
    const [profile,   setProfile]   = useState({});
    const [saving,    setSaving]    = useState(false);
    const [msg,       setMsg]       = useState(null);
    const [loading,   setLoading]   = useState(true);
    const [curPass,   setCurPass]   = useState('');
    const [newPass,   setNewPass]   = useState('');
    const [newPass2,  setNewPass2]  = useState('');
    const [chgMsg,    setChgMsg]    = useState(null);
    const [chgSaving, setChgSaving] = useState(false);

    useEffect(()=>{
      fetch(`${API}/vendor/profile`,{headers:{Authorization:`Bearer ${token}`}})
        .then(r=>r.json()).then(setProfile).catch(()=>{}).finally(()=>setLoading(false));
    },[token]);

    const upd = (k,v) => setProfile(p=>({...p,[k]:v}));

    const changePassword = async () => {
      if (!curPass || !newPass) { setChgMsg({type:'error',text:'All fields required.'}); return; }
      if (newPass !== newPass2) { setChgMsg({type:'error',text:'New passwords do not match.'}); return; }
      if (newPass.length < 6)  { setChgMsg({type:'error',text:'Password must be at least 6 characters.'}); return; }
      setChgSaving(true); setChgMsg(null);
      try {
        const r = await fetch(`${API}/vendor/change-password`,{
          method:'POST', headers:{'Content-Type':'application/json','Authorization':`Bearer ${token}`},
          body: JSON.stringify({ current_password: curPass, new_password: newPass }),
        });
        const d = await r.json();
        if (!r.ok) throw new Error(d.error);
        setChgMsg({type:'success',text:'Password changed successfully!'});
        setCurPass(''); setNewPass(''); setNewPass2('');
      } catch(e) { setChgMsg({type:'error',text:e.message}); }
      setChgSaving(false);
    };

    const save = async () => {
      setSaving(true); setMsg(null);
      try {
        const r = await fetch(`${API}/vendor/profile`,{method:'PUT',headers:{'Content-Type':'application/json','Authorization':`Bearer ${token}`},body:JSON.stringify(profile)});
        if (!r.ok) throw new Error('Save failed');
        setMsg({type:'success',text:'Profile saved successfully.'});
      } catch(e) { setMsg({type:'error',text:e.message}); }
      setSaving(false);
    };

    const FIELDS = [
      { key:'email',      label:'Email Address',    placeholder:'billing@brand.com' },
      { key:'phone',      label:'Phone Number',     placeholder:'+91 98765 43210' },
      { key:'address',    label:'Address',          placeholder:'Street, Area…', full:true },
      { key:'city',       label:'City' },
      { key:'state',      label:'State' },
      { key:'pincode',    label:'Pincode' },
      { key:'gst_no',     label:'GST Number',       placeholder:'27AAAAA0000A1Z5' },
      { key:'pan_no',     label:'PAN Number',       placeholder:'AAAAA0000A' },
      { key:'bank_name',  label:'Bank Name',        placeholder:'HDFC Bank' },
      { key:'account_no', label:'Account Number',   placeholder:'XXXXXXXXXXXX' },
      { key:'ifsc',       label:'IFSC Code',        placeholder:'HDFC0001234' },
    ];

    return (
      <div className="page">
        <div className="card" style={{marginBottom:14}}>
          <div className="card-header">
            <span className="card-title">My Profile</span>
            <span className="card-sub">Used in invoice generation · Commission % is set by CrosCrow admin</span>
          </div>
          <div style={{padding:16}}>
            {msg && <div className={`alert alert-${msg.type}`}>{msg.type==='success'?'✓':'⚠'} {msg.text}</div>}
            {loading ? <div className="skel" style={{height:200,borderRadius:8}}/> : (
              <>
                {/* Read-only: commission shown */}
                <div style={{background:'var(--green-dim)',border:'1px solid #1a4731',borderRadius:8,padding:12,marginBottom:16,display:'flex',gap:24,alignItems:'center'}}>
                  <div>
                    <div style={{fontSize:9,letterSpacing:2,textTransform:'uppercase',color:'var(--text-muted)',marginBottom:3}}>Your Commission Rate</div>
                    <div style={{fontSize:22,fontWeight:800,color:'var(--green)'}}>{profile.commission_pct||20}%</div>
                  </div>
                  <div style={{fontSize:11,color:'var(--text-dim)'}}>Set by CrosCrow · Contact admin to change</div>
                </div>

                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
                  {FIELDS.map(f=>(
                    <div key={f.key} className={f.full?'form-full':''} style={f.full?{gridColumn:'1/-1'}:{}}>
                      <label className="form-label">{f.label}</label>
                      <input
                        className="form-input" type="text"
                        placeholder={f.placeholder||''}
                        value={profile[f.key]||''}
                        onChange={e=>upd(f.key,e.target.value)}

                    {saving?<><span className="spin">↻</span> Saving…</>:'✓ Save Profile'}
                  </button>
                </div>
              </>
            )}
          </div>
        </div>

        {/* Change Password */}

          <div className="card-header">
            <span className="card-title">🔒 Change Password</span>
            <span className="card-sub">Update your vendor panel login password</span>
          </div>
          <div style={{padding:16,maxWidth:420}}>

            <div style={{marginBottom:12}}>

  function ReturnConfig({ token }) {

      fetch(`${API}/vendor/return-config`,{headers:{Authorization:`Bearer ${token}`}})

        .catch(()=>{}).finally(()=>setLoading(false));
    },[token]);

    const updAddr = (k,v) => setCfg(p=>({...p,return_address:{...p.return_address,[k]:v}}));

    const save = async () => {
      setSaving(true); setMsg(null);
      try {
        const r = await fetch(`${API}/vendor/return-config`,{method:'PUT',headers:{'Content-Type':'application/json','Authorization':`Bearer ${token}`},body:JSON.stringify(cfg)});

    if(loading) return <div className="card" style={{padding:20,color:'var(--text-muted)',fontSize:12}}><span className="spin">↻</span> Loading return settings…</div>;

    return (

          <span className="card-sub">Configure how customers can return or exchange items</span>

        <div style={{padding:16}}>
          {msg && <div className={`alert alert-${msg.type}`}>{msg.type==='success'?'✓':'⚠'} {msg.text}</div>}

          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'12px 0',borderBottom:'1px solid var(--border)'}}>
            <div>

              <div style={{fontSize:11,color:'var(--text-muted)',marginTop:3}}>Always enabled — customers can always request exchanges</div>
            </div>
            <div style={{display:'flex',alignItems:'center',gap:8}}>
              <span style={{fontSize:10,color:'var(--text-muted)'}}>🔒 Locked</span>
              <div style={{width:42,height:24,borderRadius:12,background:'var(--green)',border:'1px solid var(--green)',display:'flex',alignItems:'center',padding:'0 3px',cursor:'not-allowed',opacity:0.7}}>
                <div style={{width:18,height:18,borderRadius:50,background:'#000',marginLeft:'auto'}}/>
              </div>
            </div>
          </div>

          {/* Return toggle */}
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'12px 0',borderBottom:'1px solid var(--border)'}}>
            <div>
              <div style={{fontSize:13,fontWeight:600,color:'var(--text)'}}>↩ Returns</div>
              <div style={{fontSize:11,color:'var(--text-muted)',marginTop:3}}>Allow customers to request returns / refunds</div>
            </div>
            <div
              onClick={()=>setCfg(p=>({...p,return_enabled:!p.return_enabled}))}
              style={{width:42,height:24,borderRadius:12,background:cfg.return_enabled?'var(--green)':'var(--border)',border:'1px solid '+(cfg.return_enabled?'var(--green)':'var(--border)'),display:'flex',alignItems:'center',padding:'0 3px',cursor:'pointer',transition:'all 0.2s'}}
            >
              <div style={{width:18,height:18,borderRadius:50,background:'#000',marginLeft:cfg.return_enabled?'auto':'0',transition:'margin 0.2s'}}/>
            </div>
          </div>

          {/* Return window */}
          <div style={{padding:'12px 0',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'center',gap:16,flexWrap:'wrap'}}>
            <div style={{flex:1,minWidth:200}}>
              <div style={{fontSize:13,fontWeight:600,color:'var(--text)'}}>Return Window</div>
              <div style={{fontSize:11,color:'var(--text-muted)',marginTop:3}}>Days after delivery customer can raise a return</div>
            </div>
            <div style={{display:'flex',alignItems:'center',gap:8}}>
              <input
                type="number" min={1} max={90}
                style={{width:70,background:'var(--bg-card2)',border:'1px solid var(--border)',borderRadius:6,padding:'6px 10px',color:'var(--text)',fontFamily:'var(--font-family)',fontSize:13,outline:'none',textAlign:'center'}}
                value={cfg.return_window_days}
                onChange={e=>setCfg(p=>({...p,return_window_days:parseInt(e.target.value)||7}))}
              />
              <span style={{fontSize:12,color:'var(--text-muted)'}}>days</span>
            </div>
          </div>

          {/* Return/Pickup address */}
          <div style={{paddingTop:14}}>
            <div style={{fontSize:12,letterSpacing:1,textTransform:'uppercase',color:'var(--text-muted)',marginBottom:12}}>Return / Pickup Address</div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
              {[{k:'name',l:'Contact Name'},{k:'address1',l:'Address',full:true},{k:'city',l:'City'},{k:'state',l:'State'},{k:'pincode',l:'Pincode'},{k:'phone',l:'Phone'}].map(f=>(
                <div key={f.k} style={f.full?{gridColumn:'1/-1'}:{}}>
                  <label className="form-label">{f.l}</label>
                  <input className="form-input" type="text" value={cfg.return_address?.[f.k]||''} onChange={e=>updAddr(f.k,e.target.value)}/>
                </div>
              ))}
            </div>
          </div>

          <div style={{marginTop:14,display:'flex',justifyContent:'flex-end'}}>
            <button className="btn btn-green" onClick={save} disabled={saving}>
              {saving?<><span className="spin">↻</span> Saving…</>:'✓ Save Return Settings'}
            </button>
          </div>
        </div>
      </div>
    );
  }

        { key: 'pickup_location', label: 'Pickup Location Name',type: 'text',     placeholder: 'Primary' },
      ],
    },
    {
      id: 'shipmozo',
      name: 'ShipMozo',
      emoji: '🛳️',
      desc: 'Multi-courier shipping aggregator with competitive rates and pan-India coverage.',
      fields: [
        { key: 'public_key',      label: 'Public Key',          type: 'text',     placeholder: 'ShipMozo Public Key' },
        { key: 'private_key',     label: 'Private Key',         type: 'password', placeholder: 'ShipMozo Private Key' },
        { key: 'pickup_location', label: 'Pickup Location Name',type: 'text',     placeholder: 'Primary' },
        { key: 'company_name',    label: 'Company / Brand Name',type: 'text',     placeholder: 'Your Brand' },

        { key: 'return_state',    label: 'Return State',        type: 'text',     placeholder: 'Maharashtra' },

        { key: 'return_phone',    label: 'Return Phone',        type: 'text',     placeholder: '9999999999' },
      ],
    },
    {
      id: 'delhivery',
      name: 'Delhivery',
      emoji: '📦',
      desc: 'Reliable logistics network with pan-India coverage and real-time tracking.',
      fields: [
        { key: 'api_token',       label: 'API Token',              type: 'password', placeholder: 'Your Delhivery API token' },
        { key: 'pickup_location', label: 'Pickup Location Name',   type: 'text',     placeholder: 'Primary (from Delhivery dashboard)' },
        { key: 'company_name',    label: 'Company / Brand Name',   type: 'text',     placeholder: 'Your Brand' },
        { key: 'return_address',  label: 'Return Address',         type: 'text',     placeholder: '123 Warehouse St' },
        { key: 'return_city',     label: 'Return City',            type: 'text',     placeholder: 'Mumbai' },
        { key: 'return_state',    label: 'Return State',           type: 'text',     placeholder: 'Maharashtra' },
