  /* ══════════════════════════════════
     ORDERS VIEW
  ══════════════════════════════════ */
  function Orders({ orders, loading, onOpenOrder, token, onRefresh }) {
    const [search, setSearch]   = useState('');
    const [stage,  setStage]    = useState('all');
    const [sort,   setSort]     = useState('date');
    const [dir,    setDir]      = useState('desc');
    const [page,   setPage]     = useState(1);

    const filtered = useMemo(()=>{
      let l=[...orders];
      if(search.trim()){const q=search.toLowerCase();l=l.filter(o=>o.id.toLowerCase().includes(q)||o.customer.toLowerCase().includes(q)||(o.email||'').toLowerCase().includes(q)||o.myItems.some(i=>i.title.toLowerCase().includes(q)));}
      if(stage!=='all')l=l.filter(o=>(o.stage||'new')===stage);
      l.sort((a,b)=>{
        if(sort==='amount')return dir==='desc'?b.myRevenue-a.myRevenue:a.myRevenue-b.myRevenue;
        if(sort==='customer')return dir==='asc'?a.customer.localeCompare(b.customer):b.customer.localeCompare(a.customer);
        return dir==='desc'?new Date(b.date)-new Date(a.date):new Date(a.date)-new Date(b.date);
      });
      return l;
    },[orders,search,stage,sort,dir]);

    const pages = Math.max(1,Math.ceil(filtered.length/PER));
    const cur   = Math.min(page,pages);
    const rows  = filtered.slice((cur-1)*PER, cur*PER);
    const hSort = c=>{if(sort===c)setDir(d=>d==='desc'?'asc':'desc');else{setSort(c);setDir('desc');}setPage(1);};
    const arrow = c=>sort===c?(dir==='desc'?'▼':'▲'):'';

    const isMobile = window.innerWidth <= 768;

    // Group rows by date label for mobile
    const groupByDate = (list) => {
      const groups = [];
      let lastLabel = null;
      list.forEach(o => {
        const d = new Date(o.date);
        const today = new Date(); today.setHours(0,0,0,0);
        const yesterday = new Date(today); yesterday.setDate(today.getDate()-1);
        const label = d >= today ? 'Today' : d >= yesterday ? 'Yesterday' : d.toLocaleDateString('en-IN',{day:'numeric',month:'short'});
        if (label !== lastLabel) { groups.push({ label, orders:[] }); lastLabel = label; }
        groups[groups.length-1].orders.push(o);
      });
      return groups;
    };

    // Mobile list row
    const MobileOrderRow = ({ o }) => {
      const qty = o.myItems.reduce((s,x)=>s+x.quantity,0);
      const timeStr = new Date(o.date).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
      const stageColors = { new:'#6366f1',confirmed:'#3b82f6',ready:'#f59e0b',pickup:'#8b5cf6',transit:'#06b6d4',delivered:'#10b981',hold:'#f59e0b',rto:'#ef4444',cancelled:'#6b7280',partial:'#a78bfa' };
      const stageColor = stageColors[o.stage||'new'] || '#6366f1';
      return (
        <div onClick={()=>onOpenOrder(o)} style={{padding:'14px 16px',borderBottom:'1px solid var(--border)',display:'flex',justifyContent:'space-between',alignItems:'flex-start',cursor:'pointer',active:{background:'var(--bg-hover)'}}}>
          <div style={{flex:1,minWidth:0}}>
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:3}}>
              <span style={{fontSize:16,fontWeight:800,color:'var(--text)',letterSpacing:0.5}}>{o.id}</span>
            </div>
            <div style={{fontSize:12,color:'var(--text-muted)',marginBottom:6}}>
              {o.customer||'Guest'} &bull; {qty} item{qty!==1?'s':''} &bull; {timeStr}
            </div>
            <div style={{display:'flex',alignItems:'center',gap:6,flexWrap:'wrap'}}>
              <span style={{fontSize:11,fontWeight:700,padding:'2px 8px',borderRadius:20,background:`${stageColor}22`,color:stageColor,border:`1px solid ${stageColor}44`}}>
                {(o.stage||'new').charAt(0).toUpperCase()+(o.stage||'new').slice(1)}
              </span>
              <span style={{fontSize:11,fontWeight:600,padding:'2px 8px',borderRadius:20,
                background: o.paymentType==='prepaid'?'rgba(16,185,129,0.15)':'rgba(245,158,11,0.15)',
                color: o.paymentType==='prepaid'?'#10b981':'#f59e0b',
                border: `1px solid ${o.paymentType==='prepaid'?'rgba(16,185,129,0.3)':'rgba(245,158,11,0.3)'}`}}>
                {o.paymentType==='prepaid'?'Prepaid':'COD'}
              </span>
              <PenaltyTimer stageStartedAt={o.stageStartedAt} penaltyTriggered={o.penaltyTriggered} stage={o.stage}/>
            </div>
            {o.awb && <div style={{fontSize:10,color:'var(--text-muted)',marginTop:4}}>AWB: {o.awb} {o.courier?`· ${o.courier}`:''}</div>}
          </div>
          <div style={{textAlign:'right',flexShrink:0,marginLeft:12}}>
            <div style={{fontSize:15,fontWeight:700,color:'var(--text)'}}>{fmtCur(o.myRevenue,o.currency)}</div>
            {o.remainingCOD>0 && <div style={{fontSize:10,color:'var(--teal)',marginTop:2}}>COD {fmtCur(o.remainingCOD,o.currency)}</div>}
            <div style={{fontSize:11,color:'var(--text-muted)',marginTop:4}}>›</div>
          </div>
        </div>
      );
    };

    return (
      <div className="page" style={{padding: isMobile ? '0' : undefined}}>

        {/* Search — mobile style */}
        <div style={{padding: isMobile?'12px 12px 8px':'0 0 10px', background: isMobile?'var(--bg-card)':undefined, position: isMobile?'sticky':'static', top: isMobile?54:undefined, zIndex:50, borderBottom: isMobile?'1px solid var(--border)':'none'}}>
          <div className="search-wrap" style={{marginBottom: isMobile?8:0}}>
            <span className="search-ico">⌕</span>
            <input className="search-input" placeholder="Search order, customer…" value={search} onChange={e=>{setSearch(e.target.value);setPage(1);}}/>
          </div>

          {/* Stage filter tabs — horizontal scroll */}
          <div style={{display:'flex',gap:6,overflowX:'auto',paddingBottom:4,WebkitOverflowScrolling:'touch',scrollbarWidth:'none'}}>
            {STAGES.map(s=>{
              const count = s.id==='all' ? orders.length : orders.filter(o=>(o.stage||'new')===s.id).length;
              return (
                <button key={s.id} onClick={()=>{setStage(s.id);setPage(1);}} style={{
                  flexShrink:0, padding:'5px 12px', borderRadius:20, border:'none', cursor:'pointer',
                  fontSize:12, fontWeight:600, whiteSpace:'nowrap', fontFamily:'IBM Plex Mono,monospace',
                  background: stage===s.id ? 'var(--green)' : 'var(--bg-card2)',
                  color: stage===s.id ? '#000' : 'var(--text-muted)',
                  transition:'all 0.15s',
                }}>
                  {s.label} {count>0?`(${count})`:''}
                </button>
              );
            })}
          </div>
        </div>

        {/* Mobile list view */}
        {isMobile ? (
          <div style={{background:'var(--bg-card)'}}>
            {loading ? (
              Array.from({length:6}).map((_,i)=>(
                <div key={i} style={{padding:'14px 16px',borderBottom:'1px solid var(--border)'}}>
                  <div className="skel" style={{height:14,width:'40%',marginBottom:8}}/>
                  <div className="skel" style={{height:11,width:'60%',marginBottom:8}}/>
                  <div style={{display:'flex',gap:6}}><div className="skel" style={{height:20,width:70,borderRadius:20}}/><div className="skel" style={{height:20,width:50,borderRadius:20}}/></div>
                </div>
              ))
            ) : rows.length===0 ? (
              <div className="empty" style={{padding:40}}><div className="empty-icon">📦</div><div className="empty-title">{search||stage!=='all'?'No orders match.':'No orders found.'}</div></div>
            ) : (
              groupByDate(rows).map(group=>(
                <div key={group.label}>
                  <div style={{padding:'8px 16px',fontSize:11,fontWeight:700,color:'var(--text-muted)',letterSpacing:1,background:'var(--bg)',borderBottom:'1px solid var(--border)',textTransform:'uppercase'}}>
                    {group.label}
                  </div>
                  {group.orders.map(o=><MobileOrderRow key={o.id} o={o}/>)}
                </div>
              ))
            )}
            {!loading && filtered.length>PER && (
              <div style={{display:'flex',justifyContent:'space-between',padding:'14px 16px',borderTop:'1px solid var(--border)'}}>
                <button className="btn btn-ghost btn-sm" onClick={()=>setPage(p=>Math.max(1,p-1))} disabled={cur===1}>‹ Prev</button>
                <span style={{fontSize:11,color:'var(--text-muted)',alignSelf:'center'}}>{cur}/{pages}</span>
                <button className="btn btn-ghost btn-sm" onClick={()=>setPage(p=>Math.min(pages,p+1))} disabled={cur===pages}>Next ›</button>
              </div>
            )}
          </div>
        ) : (
          /* Desktop table view */
          <>
            <div className="filters">
              <select className="fselect" value={sort} onChange={e=>{setSort(e.target.value);setPage(1);}}>
                <option value="date">Sort: Date</option>
                <option value="amount">Sort: Revenue</option>
                <option value="customer">Sort: Customer</option>
              </select>
              <span className="fcount">{filtered.length} order{filtered.length!==1?'s':''}{search||stage!=='all'?' (filtered)':''}</span>
              <button className="btn btn-ghost btn-sm" style={{fontSize:10,marginLeft:'auto'}} onClick={async()=>{
                const r=await fetch(`${API}/vendor/shipping/sync-status`,{method:'POST',headers:{Authorization:`Bearer ${token}`}});
                const d=await r.json(); if(d.updated>0) onRefresh();
              }}>↻ Sync Delivery Status</button>
            </div>
            <div className="card">
              <div className="tbl-wrap">
                <table>
                  <thead><tr>
                    <th style={{width:36}}>#</th>
                    <th className={`sort ${sort==='id'?'sorted':''}`} onClick={()=>hSort('id')}>Order {arrow('id')}</th>
                    <th className={`sort ${sort==='customer'?'sorted':''}`} onClick={()=>hSort('customer')}>Customer {arrow('customer')}</th>
                    <th>Items</th><th>Products</th><th>Payment</th>
                    <th className={`sort ${sort==='amount'?'sorted':''}`} onClick={()=>hSort('amount')}>Revenue {arrow('amount')}</th>
                    <th>Shipping</th><th>Advance</th><th>Remaining COD</th>
                    <th>Stage / Tracking</th>
                    <th className={`sort ${sort==='date'?'sorted':''}`} onClick={()=>hSort('date')}>Date {arrow('date')}</th>
                    <th style={{width:28}}/>
                  </tr></thead>
                  <tbody>
                    {loading ? Array.from({length:8}).map((_,i)=><SkelRow key={i} cols={11}/>) :
                     rows.length===0 ? (
                      <tr><td colSpan={12}><div className="empty"><div className="empty-icon">📦</div><div className="empty-title">{search||stage!=='all'?'No orders match.':'No orders found.'}</div></div></td></tr>
                     ) :
                     rows.map((o,i)=>{
                       const qty=o.myItems.reduce((s,x)=>s+x.quantity,0);
                       return (
                        <tr key={o.id} onClick={()=>onOpenOrder(o)}>
                          <td className="td-muted">{(cur-1)*PER+i+1}</td>
                          <td className="td-id">{o.id}</td>
                          <td><div style={{display:'flex',alignItems:'center',gap:7}}><div style={{width:24,height:24,borderRadius:'50%',background:'var(--bg-card2)',border:'1px solid var(--border)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:9,fontWeight:700,color:'var(--green)',flexShrink:0}}>{(o.customer||'G').split(' ').map(x=>x[0]).join('').toUpperCase().slice(0,2)}</div><span style={{fontSize:12}}>{o.customer||'Guest'}</span></div></td>
                          <td><span style={{background:'var(--bg-card2)',border:'1px solid var(--border)',borderRadius:4,padding:'2px 8px',fontSize:11,color:'var(--text-dim)'}}>{qty} item{qty!==1?'s':''}</span></td>
                          <td style={{maxWidth:160,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',color:'var(--text-dim)',fontSize:11}}>{o.myItems.map(i=>i.title).join(', ')}</td>
                          <td><PayBadge type={o.paymentType}/></td>
                          <td className="td-amt">{fmtCur(o.myRevenue,o.currency)}</td>
                          <td style={{color:'var(--blue)',fontSize:11}}>{o.shippingCharge>0?fmtCur(o.shippingCharge,o.currency):'—'}</td>
                          <td style={{color:'var(--green)',fontSize:11}}>{o.advancePaid>0?`−${fmtCur(o.advancePaid,o.currency)}`:'—'}</td>
                          <td className="td-amt" style={{color:o.advancePaid>0?'var(--orange)':'var(--teal)',fontWeight:700}}>{fmtCur(o.remainingCOD,o.currency)}</td>
                          <td><div style={{display:'flex',alignItems:'center',gap:2}}><StagePill stage={o.stage} awb={o.awb} courier={o.courier} trackingUrl={o.trackingUrl}/><PenaltyTimer stageStartedAt={o.stageStartedAt} penaltyTriggered={o.penaltyTriggered} stage={o.stage}/></div></td>
                          <td className="td-muted">{fmtDate(o.date)}</td>
                          <td style={{textAlign:'center',color:'var(--text-muted)',fontSize:11}}>▶</td>
                        </tr>
                       );
                     })}
                  </tbody>
                </table>
              </div>
              {!loading && filtered.length>PER && (
                <div className="pager">
                  <span className="pager-info">Showing {(cur-1)*PER+1}–{Math.min(cur*PER,filtered.length)} of {filtered.length}</span>
                  <div className="pbtns">
                    <button className="pbtn" onClick={()=>setPage(p=>Math.max(1,p-1))} disabled={cur===1}>‹</button>
                    {Array.from({length:pages},(_,i)=>i+1).filter(p=>p===1||p===pages||Math.abs(p-cur)<=1).reduce((acc,p,i,arr)=>{if(i>0&&arr[i-1]!==p-1)acc.push('…');acc.push(p);return acc;},[]).map((p,i)=>
                      p==='…'?<span key={`d${i}`} style={{color:'var(--text-muted)',padding:'0 4px',fontSize:12}}>…</span>:<button key={p} className={`pbtn ${cur===p?'cur':''}`} onClick={()=>setPage(p)}>{p}</button>
                    )}
                    <button className="pbtn" onClick={()=>setPage(p=>Math.min(pages,p+1))} disabled={cur===pages}>›</button>
                  </div>
                </div>
              )}
            </div>
          </>
        )}
      </div>
    );
  }

  /* ══════════════════════════════════
     PRODUCTS VIEW
  ══════════════════════════════════ */
  function Products({ token, vendorName }) {
    const [products, setProducts] = useState([]);
    const [loading,  setLoading]  = useState(true);
    const [search,   setSearch]   = useState('');

    useEffect(()=>{
      fetch(`${API}/vendor/products`,{headers:{Authorization:`Bearer ${token}`}})
        .then(r=>r.json()).then(d=>setProducts(d.products||[])).catch(()=>{}).finally(()=>setLoading(false));
    },[token]);

    const visible = search ? products.filter(p=>p.title.toLowerCase().includes(search.toLowerCase())) : products;

    return (
      <div className="page">
        <div className="filters" style={{marginBottom:16}}>
          <div className="search-wrap">
            <span className="search-ico">⌕</span>
            <input className="search-input" placeholder="Search products…" value={search} onChange={e=>setSearch(e.target.value)}/>
          </div>
          <span className="fcount">{visible.length} product{visible.length!==1?'s':''}</span>
        </div>

        {loading ? (
          Array.from({length:5}).map((_,i)=>(
            <div key={i} className="product-card">
              <div className="product-img-placeholder"/>
              <div style={{flex:1}}><div className="skel" style={{height:13,width:200,marginBottom:8}}/><div className="skel" style={{height:10,width:120}}/></div>
            </div>
          ))
        ) : visible.length===0 ? (
          <div className="empty"><div className="empty-icon">🏷️</div><div className="empty-title">No products found</div><div className="empty-sub">Products for vendor "{vendorName}" will appear here.</div></div>
        ) : (
          visible.map(p=>(
            <div key={p.id} className="product-card">
              {p.image ? <img src={p.image} alt={p.title} className="product-img"/> : <div className="product-img-placeholder">🏷️</div>}
              <div className="product-info">
                <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:4}}>
                  <div className="product-title">{p.title}</div>
                  <span className={`p-status p-${p.status}`}>{p.status?.toUpperCase()}</span>
                </div>
                {p.type && <div className="product-type">{p.type}</div>}
                <div style={{display:'flex',flexDirection:'column',gap:4}}>
                  {p.variants.map(v=>(
                    <div key={v.id} className="variant-row">
                      <span style={{color:'var(--text-dim)'}}>{v.title!=='Default Title'?v.title:'Standard'}</span>
                      {v.sku && <span>SKU: {v.sku}</span>}
                      <span>₹{v.price}</span>
                      <span className={v.inventory===0?'inv-zero':v.inventory<5?'inv-low':'inv-ok'}>
                        {v.inventory===0?'Out of stock':v.inventory<5?`Low: ${v.inventory} left`:`Stock: ${v.inventory}`}
                      </span>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          ))
        )}
      </div>
    );
  }

  /* ══════════════════════════════════
     SETTLEMENTS VIEW
  ══════════════════════════════════ */
  function Settlements({ token }) {
    const [activeTab,   setActiveTab]   = useState('delivered');
    // Tab 1: real-time delivered summary
    const [delSummary,  setDelSummary]  = useState(null);
    const [delLoading,  setDelLoading]  = useState(true);
    // Tab 2: invoices
    const [settlements, setSettlements] = useState([]);
    const [invLoading,  setInvLoading]  = useState(true);
    const [detail,      setDetail]      = useState(null);

    const loadDelivered = () => {
      setDelLoading(true);
      fetch(`${API}/vendor/delivered-summary`,{headers:{Authorization:`Bearer ${token}`}})
        .then(r=>r.json()).then(setDelSummary).catch(()=>{}).finally(()=>setDelLoading(false));
    };
    const loadInvoices = () => {
      setInvLoading(true);
      fetch(`${API}/vendor/settlements`,{headers:{Authorization:`Bearer ${token}`}})
        .then(r=>r.json()).then(d=>setSettlements(d.settlements||[])).catch(()=>{}).finally(()=>setInvLoading(false));
    };

    useEffect(()=>{ loadDelivered(); loadInvoices(); },[token]);

    const viewDetail = async id => {
      const r = await fetch(`${API}/vendor/settlements/${id}`,{headers:{Authorization:`Bearer ${token}`}});
      setDetail(await r.json());
    };

    const d = delSummary || {};
    const fmt = n => `₹${Math.abs(n||0).toFixed(2)}`;
    const isPayout = (d.netPayable||0) < 0;
    const isPend   = (d.pendingSettlement||0) < 0;

    return (
      <div className="page">
        {/* Tab switcher */}
        <div style={{display:'flex',gap:0,marginBottom:20,borderBottom:'2px solid var(--border)'}}>
          {[['delivered','📦 Delivered Orders'],['invoices','🧾 Settlement Invoices']].map(([id,label])=>(
            <button key={id} onClick={()=>setActiveTab(id)}
              style={{padding:'9px 20px',fontSize:12,fontWeight:600,border:'none',background:'transparent',cursor:'pointer',
                color:activeTab===id?'var(--teal)':'var(--text-muted)',
                borderBottom:activeTab===id?'2px solid var(--teal)':'2px solid transparent',
                marginBottom:'-2px',transition:'all 0.15s'}}>
              {label}
            </button>
          ))}
        </div>

        {/* ── TAB 1: Delivered Orders ────────────────────────────────────── */}
        {activeTab==='delivered' && (
          <div>
            <div className="stats-grid" style={{gridTemplateColumns:'repeat(3,1fr)',marginBottom:16}}>
              <StatCard color="teal"   icon="₹" label="Gross Sales (Delivered)"    value={delLoading?'…':fmt(d.gross)}             sub={`${d.totalOrders||0} delivered orders`}/>
              <StatCard color="yellow" icon="%" label="Commissionable Sale"         value={delLoading?'…':fmt(d.commissionableSale)} sub={d.prepaidDiscount>0?`after ₹${(d.prepaidDiscount||0).toFixed(2)} prepaid disc`:`Comm: ${d.commissionPct||20}%`}/>
              <StatCard color="orange" icon="~" label="Commission + GST"            value={delLoading?'…':`${fmt(d.commission)} + ${fmt(d.gst)}`} sub="18% GST on commission"/>
            </div>
            <div className="stats-grid" style={{gridTemplateColumns:'repeat(3,1fr)',marginBottom:20}}>
              <StatCard color="green"  icon="−" label="Advance Adjusted"            value={delLoading?'…':fmt(d.advance)}           sub="deducted from payable"/>
              <StatCard color="green"  icon="✓" label="Total Settled"               value={delLoading?'…':fmt(d.totalSettled)}      sub="from paid invoices"/>
              <StatCard color={isPend?'green':'red'} icon="○" label="Pending Settlement"
                value={delLoading?'…':`${fmt(d.netPayable)} = ${isPend?'−':''}${fmt(d.pendingSettlement)}`}
                sub={isPend?'CrosCrow owes you':'you owe CrosCrow'}/>
            </div>
            <div className="card">
              <div className="card-header">
                <span className="card-title">Net Position</span>
                <button className="btn btn-ghost btn-sm" onClick={loadDelivered}>↻ Refresh</button>
              </div>
              <div style={{padding:'18px 20px'}}>
                {delLoading ? <div className="skel" style={{height:60}}/> : !d.totalOrders ? (
                  <div className="empty"><div className="empty-icon">📦</div><div className="empty-title">No delivered orders yet</div><div className="empty-sub">Your delivered orders will appear here automatically.</div></div>
                ) : (
                  <div style={{display:'flex',flexDirection:'column',gap:10}}>
                    {[
                      {label:'Gross Sales (MRP)',        val:`₹${(d.gross||0).toFixed(2)}`,             color:'var(--teal)'},
                      d.prepaidDiscount>0 && {label:'Prepaid Discount (10%)', val:`−₹${(d.prepaidDiscount||0).toFixed(2)}`, color:'var(--orange)'},
                      {label:'Commissionable Sale',      val:`₹${(d.commissionableSale||0).toFixed(2)}`,color:'var(--text)', bold:true},
                      {label:`Commission (${d.commissionPct||20}%)`,val:`₹${(d.commission||0).toFixed(2)}`,color:'var(--yellow)'},
                      {label:'GST (18%)',                val:`₹${(d.gst||0).toFixed(2)}`,               color:'var(--orange)'},
                      d.advance>0 && {label:'Advance Adjusted',val:`−₹${(d.advance||0).toFixed(2)}`, color:'var(--green)'},
                      {label:'Net Payable (all delivered)', val:`${isPayout?'CrosCrow pays you ':'You pay CrosCrow '}₹${Math.abs(d.netPayable||0).toFixed(2)}`, color:isPayout?'var(--green)':'var(--red)', bold:true},
                      {label:'Already Settled (paid invoices)', val:`₹${(d.totalSettled||0).toFixed(2)}`, color:'var(--green)'},
                      {label:'Still Pending',            val:`${isPend?'CC owes you ':'You owe '}₹${Math.abs(d.pendingSettlement||0).toFixed(2)}`, color:isPend?'var(--green)':'var(--red)', bold:true},
                    ].filter(Boolean).map((row,i)=>(
                      <div key={i} className="detail-row" style={row.bold?{borderTop:'1px solid var(--border)',paddingTop:8,marginTop:4}:{}}>
                        <span className="dr-label" style={row.bold?{fontWeight:700}:{}}>{row.label}</span>
                        <span className="dr-val" style={{color:row.color,fontWeight:row.bold?700:400}}>{row.val}</span>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            </div>
            <div style={{marginTop:10,fontSize:10,color:'var(--text-muted)',textAlign:'center'}}>
              Live calculation from all your delivered orders. To view formal invoices, switch to Settlement Invoices tab.
            </div>
          </div>
        )}

        {/* ── TAB 2: Settlement Invoices ─────────────────────────────────── */}
        {activeTab==='invoices' && (
          <div>
            <div className="card">
              <div className="card-header">
                <span className="card-title">Settlement Statements</span>
                <span className="card-sub">{settlements.length} total</span>
              </div>
              {invLoading ? (
                <div style={{padding:16}}>{Array.from({length:4}).map((_,i)=><div key={i} className="skel" style={{height:60,borderRadius:8,marginBottom:10}}/>)}</div>

  function Profile({ token }) {
    const [profile,   setProfile]   = useState({});
    const [saving,    setSaving]    = useState(false);
    const [msg,       setMsg]       = useState(null);
    const [loading,   setLoading]   = useState(true);
    const [curPass,   setCurPass]   = useState('');
    const [newPass,   setNewPass]   = useState('');
    const [newPass2,  setNewPass2]  = useState('');
    const [chgMsg,    setChgMsg]    = useState(null);
    const [chgSaving, setChgSaving] = useState(false);

    useEffect(()=>{
      fetch(`${API}/vendor/profile`,{headers:{Authorization:`Bearer ${token}`}})
        .then(r=>r.json()).then(setProfile).catch(()=>{}).finally(()=>setLoading(false));
    },[token]);

    const upd = (k,v) => setProfile(p=>({...p,[k]:v}));

    const changePassword = async () => {
      if (!curPass || !newPass) { setChgMsg({type:'error',text:'All fields required.'}); return; }
      if (newPass !== newPass2) { setChgMsg({type:'error',text:'New passwords do not match.'}); return; }
      if (newPass.length < 6)  { setChgMsg({type:'error',text:'Password must be at least 6 characters.'}); return; }
      setChgSaving(true); setChgMsg(null);
      try {
        const r = await fetch(`${API}/vendor/change-password`,{
          method:'POST', headers:{'Content-Type':'application/json','Authorization':`Bearer ${token}`},
          body: JSON.stringify({ current_password: curPass, new_password: newPass }),
        });
        const d = await r.json();
        if (!r.ok) throw new Error(d.error);
        setChgMsg({type:'success',text:'Password changed successfully!'});
        setCurPass(''); setNewPass(''); setNewPass2('');
      } catch(e) { setChgMsg({type:'error',text:e.message}); }
      setChgSaving(false);
    };

    const save = async () => {
      setSaving(true); setMsg(null);
      try {
        const r = await fetch(`${API}/vendor/profile`,{method:'PUT',headers:{'Content-Type':'application/json','Authorization':`Bearer ${token}`},body:JSON.stringify(profile)});
        if (!r.ok) throw new Error('Save failed');
        setMsg({type:'success',text:'Profile saved successfully.'});
      } catch(e) { setMsg({type:'error',text:e.message}); }
      setSaving(false);
    };

    const FIELDS = [
      { key:'email',      label:'Email Address',    placeholder:'billing@brand.com' },
      { key:'phone',      label:'Phone Number',     placeholder:'+91 98765 43210' },
      { key:'address',    label:'Address',          placeholder:'Street, Area…', full:true },
      { key:'city',       label:'City' },
      { key:'state',      label:'State' },
      { key:'pincode',    label:'Pincode' },
      { key:'gst_no',     label:'GST Number',       placeholder:'27AAAAA0000A1Z5' },
      { key:'pan_no',     label:'PAN Number',       placeholder:'AAAAA0000A' },
      { key:'bank_name',  label:'Bank Name',        placeholder:'HDFC Bank' },
      { key:'account_no', label:'Account Number',   placeholder:'XXXXXXXXXXXX' },
      { key:'ifsc',       label:'IFSC Code',        placeholder:'HDFC0001234' },
    ];

    return (
      <div className="page">
        <div className="card" style={{marginBottom:14}}>
          <div className="card-header">
            <span className="card-title">My Profile</span>
            <span className="card-sub">Used in invoice generation · Commission % is set by CrosCrow admin</span>
          </div>
          <div style={{padding:16}}>
            {msg && <div className={`alert alert-${msg.type}`}>{msg.type==='success'?'✓':'⚠'} {msg.text}</div>}
            {loading ? <div className="skel" style={{height:200,borderRadius:8}}/> : (
              <>
                {/* Read-only: commission shown */}
                <div style={{background:'var(--green-dim)',border:'1px solid #1a4731',borderRadius:8,padding:12,marginBottom:16,display:'flex',gap:24,alignItems:'center'}}>
                  <div>
                    <div style={{fontSize:9,letterSpacing:2,textTransform:'uppercase',color:'var(--text-muted)',marginBottom:3}}>Your Commission Rate</div>
                    <div style={{fontSize:22,fontWeight:800,color:'var(--green)'}}>{profile.commission_pct||20}%</div>
                  </div>
                  <div style={{fontSize:11,color:'var(--text-dim)'}}>Set by CrosCrow · Contact admin to change</div>
                </div>

                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
                  {FIELDS.map(f=>(
                    <div key={f.key} className={f.full?'form-full':''} style={f.full?{gridColumn:'1/-1'}:{}}>
                      <label className="form-label">{f.label}</label>
                      <input
                        className="form-input" type="text"
                        placeholder={f.placeholder||''}
                        value={profile[f.key]||''}
                        onChange={e=>upd(f.key,e.target.value)}
                      />
                    </div>
                  ))}
                </div>
                <div style={{marginTop:14,display:'flex',justifyContent:'flex-end'}}>
                  <button className="btn btn-green" onClick={save} disabled={saving}>
                    {saving?<><span className="spin">↻</span> Saving…</>:'✓ Save Profile'}
                  </button>
                </div>
              </>
            )}
          </div>
        </div>

        {/* Change Password */}
        <div className="card">
          <div className="card-header">
            <span className="card-title">🔒 Change Password</span>
            <span className="card-sub">Update your vendor panel login password</span>
          </div>
          <div style={{padding:16,maxWidth:420}}>
            {chgMsg && <div className={`alert alert-${chgMsg.type}`}>{chgMsg.type==='success'?'✓':'⚠'} {chgMsg.text}</div>}
            <div style={{marginBottom:12}}>
              <label className="form-label">Current Password</label>
              <input className="form-input" type="password" placeholder="Your current password"
                value={curPass} onChange={e=>setCurPass(e.target.value)}/>
            </div>
            <div style={{marginBottom:12}}>
              <label className="form-label">New Password</label>
              <input className="form-input" type="password" placeholder="Min 6 characters"
                value={newPass} onChange={e=>setNewPass(e.target.value)}/>
            </div>
            <div style={{marginBottom:16}}>
              <label className="form-label">Confirm New Password</label>
              <input className="form-input" type="password" placeholder="Repeat new password"
                value={newPass2} onChange={e=>setNewPass2(e.target.value)}
                onKeyDown={e=>e.key==='Enter'&&changePassword()}/>
            </div>
            <button className="btn btn-green" onClick={changePassword} disabled={chgSaving} style={{width:'100%'}}>
              {chgSaving?<><span className="spin">↻</span> Saving…</>:'🔒 Change Password'}
            </button>
          </div>
        </div>
      </div>
    );
  }

  function ShippingPartners({ token }) {
    const [connected, setConnected] = useState({});
    const [forms,     setForms]     = useState({});
    const [saving,    setSaving]    = useState({});
    const [msg,       setMsg]       = useState(null);
    // Box presets
    const [presets,   setPresets]   = useState([]);
    const [newPreset, setNewPreset] = useState({ name:'', length:'', breadth:'', height:'' });
    const [savingP,   setSavingP]   = useState(false);
    const [presetMsg, setPresetMsg] = useState(null);

    useEffect(() => {
      fetch(`${API}/vendor/shipping/partners`, { headers: { Authorization: `Bearer ${token}` } })
        .then(r => r.json())
        .then(d => {
          const m = {};
          (d.partners || []).forEach(p => { if (p.active) m[p.partner] = true; });
          setConnected(m);
        });
      fetch(`${API}/vendor/box-presets`, { headers: { Authorization: `Bearer ${token}` } })
        .then(r => r.json()).then(d => setPresets(d.presets || [])).catch(()=>{});
    }, [token]);

    const savePresets = async (updated) => {
      setSavingP(true); setPresetMsg(null);
      try {
        const r = await fetch(`${API}/vendor/box-presets`, {
          method: 'PUT', headers: { 'Content-Type':'application/json', Authorization:`Bearer ${token}` },
          body: JSON.stringify({ presets: updated }),
        });
        const d = await r.json();
        if (!r.ok) throw new Error(d.error);
        setPresets(d.presets); setPresetMsg({ type:'success', text:'Box presets saved!' });
      } catch(e) { setPresetMsg({ type:'error', text: e.message }); }
      setSavingP(false);
    };

    const addPreset = () => {
      const { name, length, breadth, height } = newPreset;
      if (!name.trim() || !length || !breadth || !height) { setPresetMsg({ type:'error', text:'All fields required.' }); return; }
      const updated = [...presets, { name: name.trim(), length: parseFloat(length), breadth: parseFloat(breadth), height: parseFloat(height) }];
      setNewPreset({ name:'', length:'', breadth:'', height:'' });
      savePresets(updated);
    };

    const removePreset = idx => savePresets(presets.filter((_,i) => i !== idx));

    const setField = (partnerId, key, val) =>
      setForms(f => ({ ...f, [partnerId]: { ...(f[partnerId] || {}), [key]: val } }));

    const connect = async (partnerId) => {
      const creds = forms[partnerId] || {};
      const partner = PARTNERS.find(p => p.id === partnerId);
      const missing = partner.fields.filter(f => !creds[f.key]?.trim());
      if (missing.length) { setMsg({ type:'error', text: `Fill in: ${missing.map(f=>f.label).join(', ')}` }); return; }
      setSaving(s => ({ ...s, [partnerId]: true }));
      setMsg(null);
      try {
        const r = await fetch(`${API}/vendor/shipping/partners`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
          body: JSON.stringify({ partner: partnerId, credentials: creds }),
        });
        const d = await r.json();
        if (!r.ok) throw new Error(d.error);
        setConnected(c => ({ ...c, [partnerId]: true }));
        setForms(f => ({ ...f, [partnerId]: {} }));
        setMsg({ type: 'success', text: `${PARTNERS.find(p=>p.id===partnerId).name} connected successfully!` });
      } catch (e) { setMsg({ type: 'error', text: e.message }); }
      setSaving(s => ({ ...s, [partnerId]: false }));
    };

    const disconnect = async (partnerId) => {
      if (!confirm(`Disconnect ${PARTNERS.find(p=>p.id===partnerId).name}?`)) return;
      await fetch(`${API}/vendor/shipping/partners/${partnerId}`, {
        method: 'DELETE', headers: { Authorization: `Bearer ${token}` },
      });
      setConnected(c => { const n = {...c}; delete n[partnerId]; return n; });
      setMsg({ type: 'success', text: 'Partner disconnected.' });
    };

    return (
      <div style={{padding:'0 2px'}}>
        {msg && <div className={`alert alert-${msg.type}`} style={{marginBottom:16}}>{msg.type==='success'?'✓':'⚠'} {msg.text}</div>}

        <div className="sp-intro">
          <div className="sp-intro-title">⚡ How to Connect a Shipping Partner</div>
          <ol className="sp-intro-steps">
            <li>Create an account on Shiprocket (shiprocket.in) or Delhivery (delhivery.com) if you don't have one.</li>
            <li>For Delhivery: go to your Delhivery dashboard → Settings → Pickup Locations and note the exact Pickup Location name. For Shiprocket: use your login email and password.</li>
            <li>Enter your credentials below — stored securely and only used to create shipments.</li>
            <li>Click <strong>Connect</strong>. Once connected, a <em>Create Shipment</em> button appears directly on every order.</li>
            <li>When you click Create Shipment on an order, it auto-fills customer address, items, and COD amount — you just confirm.</li>
          </ol>
        </div>

        {/* ── Box Dimension Presets ── */}
        <div className="card" style={{marginBottom:20}}>
          <div className="card-header">
            <span className="card-title">📦 Box Dimension Presets</span>
            <span className="card-sub">Save your standard box sizes — select when creating shipments</span>
          </div>
          <div style={{padding:16}}>
            {presetMsg && <div className={`alert alert-${presetMsg.type}`} style={{marginBottom:12}}>{presetMsg.type==='success'?'✓':'⚠'} {presetMsg.text}</div>}

            {/* Existing presets */}
            {presets.length > 0 && (
              <div style={{marginBottom:14,display:'flex',flexDirection:'column',gap:8}}>
                {presets.map((p,i)=>(
                  <div key={i} style={{display:'flex',alignItems:'center',gap:10,background:'var(--bg-card2)',border:'1px solid var(--border)',borderRadius:8,padding:'10px 14px'}}>
                    <span style={{fontSize:13,fontWeight:700,color:'var(--text)',flex:1}}>{p.name}</span>
                    <span style={{fontSize:11,color:'var(--text-muted)',fontFamily:'monospace',background:'var(--bg-card)',padding:'3px 8px',borderRadius:4,border:'1px solid var(--border)'}}>
                      {p.length} × {p.breadth} × {p.height} cm
                    </span>
                    <button onClick={()=>removePreset(i)} style={{background:'none',border:'none',cursor:'pointer',color:'var(--red)',fontSize:14,padding:'0 4px',lineHeight:1}} title="Remove">✕</button>
                  </div>
                ))}
              </div>
            )}

            {/* Add new preset */}
            <div style={{background:'var(--bg-card2)',border:'1px solid var(--border)',borderRadius:8,padding:14}}>
              <div style={{fontSize:11,fontWeight:600,color:'var(--text-muted)',marginBottom:10,letterSpacing:1,textTransform:'uppercase'}}>Add New Box Size</div>
              <div style={{display:'grid',gridTemplateColumns:'2fr 1fr 1fr 1fr auto',gap:8,alignItems:'end'}}>
                <div>
                  <label className="form-label">Preset Name</label>
                  <input className="form-input" placeholder="e.g. Small Box" value={newPreset.name} onChange={e=>setNewPreset(p=>({...p,name:e.target.value}))}/>
                </div>
                <div>
                  <label className="form-label">Length (cm)</label>
                  <input className="form-input" type="number" min="1" step="0.5" placeholder="20" value={newPreset.length} onChange={e=>setNewPreset(p=>({...p,length:e.target.value}))}/>
                </div>
                <div>
                  <label className="form-label">Breadth (cm)</label>
                  <input className="form-input" type="number" min="1" step="0.5" placeholder="15" value={newPreset.breadth} onChange={e=>setNewPreset(p=>({...p,breadth:e.target.value}))}/>
                </div>
                <div>
                  <label className="form-label">Height (cm)</label>
                  <input className="form-input" type="number" min="1" step="0.5" placeholder="7" value={newPreset.height} onChange={e=>setNewPreset(p=>({...p,height:e.target.value}))} onKeyDown={e=>e.key==='Enter'&&addPreset()}/>
                </div>
                <button className="btn btn-green btn-sm" onClick={addPreset} disabled={savingP} style={{marginBottom:1}}>
                  {savingP?<span className="spin">↻</span>:'+ Add'}
                </button>
              </div>
            </div>
          </div>
        </div>

        <div className="sp-grid">
          {PARTNERS.map(partner => {
            const isConnected = !!connected[partner.id];
            const form = forms[partner.id] || {};
            const isSaving = !!saving[partner.id];
            return (
              <div key={partner.id} className={`sp-card ${isConnected ? 'connected' : ''}`}>
                <div className="sp-card-head">
                  <div className={`sp-logo ${partner.id}`}>{partner.emoji}</div>
                  <div>
                    <div className="sp-name">{partner.name}</div>
                    <span className={`sp-tag ${isConnected ? 'connected' : 'disconnected'}`}>
                      {isConnected ? '● Connected' : '○ Not connected'}
                    </span>
                  </div>
                </div>
                <div className="sp-note">{partner.desc}</div>

                {!isConnected && (
                  <div className="sp-fields">
                    {partner.fields.map(f => (
                      <div key={f.key}>
                        <div className="sp-field-label">{f.label}</div>
                        <input
                          className="sp-field-input"
                          type={f.type}
                          placeholder={f.placeholder}
                          value={form[f.key] || ''}
                          onChange={e => setField(partner.id, f.key, e.target.value)}
                        />
                      </div>
                    ))}
                  </div>
                )}

                <div className="sp-card-actions">
                  {isConnected ? (
                    <button className="btn btn-ghost btn-sm" style={{color:'var(--red)',borderColor:'var(--red)'}} onClick={() => disconnect(partner.id)}>
                      Disconnect
                    </button>
                  ) : (
                    <button className="btn btn-green btn-sm" onClick={() => connect(partner.id)} disabled={isSaving}>
                      {isSaving ? <><span className="spin">↻</span> Connecting…</> : `Connect ${partner.name}`}
                    </button>
                  )}
                </div>
              </div>
            );
          })}
        </div>
      </div>
    );
  }

  /* ══════════════════════════════════
     MAIN APP
  ══════════════════════════════════ */
  /* ══════════════════════════════════
     SHOPIFY SYNC (vendor side)
  ══════════════════════════════════ */
  function ShopifySync({ token: authToken, vendorName }) {
    const [status,    setStatus]    = useState(null);
    const [shop,      setShop]      = useState('');
    const [clientId,  setClientId]  = useState('');
    const [secret,    setSecret]    = useState('');
    const [connecting,setConnecting]= useState(false);
    const [products,  setProducts]  = useState([]);
    const [prodLoad,  setProdLoad]  = useState(false);
    const [msg,       setMsg]       = useState('');

    const loadStatus = () => {
      fetch(`${API}/vendor/shopify/status`, { headers:{ Authorization:`Bearer ${authToken}` } })
        .then(r=>r.json()).then(setStatus);
    };
    useEffect(loadStatus, []);

    // Handle ?shopifyConnected=1 redirect from OAuth callback
    useEffect(()=>{
      const params = new URLSearchParams(window.location.search);
      if (params.get('shopifyConnected')==='1') {
        setMsg('✅ Shopify store connected successfully!');
        window.history.replaceState({}, '', window.location.pathname);
        loadStatus();
      }
    }, []);

    const connect = async () => {
      if (!shop.trim() || !clientId.trim() || !secret.trim()) { setMsg('Fill in all three fields.'); return; }
      setConnecting(true); setMsg('');
      const r = await fetch(`${API}/vendor/shopify/connect`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Authorization:`Bearer ${authToken}` },
        body: JSON.stringify({ shop: shop.trim(), client_id: clientId.trim(), client_secret: secret.trim() })
      });
      const d = await r.json();
      setConnecting(false);
      if (d.success) { setMsg('✅ Store connected!'); setShop(''); setClientId(''); setSecret(''); loadStatus(); }
      else setMsg(d.error || 'Connection failed.');
    };

    const disconnect = async () => {
      if (!confirm('Disconnect your Shopify store? All product mappings will remain but inventory sync will stop.')) return;
      await fetch(`${API}/vendor/shopify/disconnect`, { method:'DELETE', headers:{ Authorization:`Bearer ${authToken}` } });
      setStatus({ connected: false, connection: null }); setProducts([]);
    };

    const loadProducts = () => {
      setProdLoad(true);
      fetch(`${API}/vendor/shopify/products`, { headers:{ Authorization:`Bearer ${authToken}` } })
        .then(r=>r.json()).then(d=>{ setProducts(d.products||[]); setProdLoad(false); });
    };

    if (!status) return <div style={{padding:40,color:'var(--text-muted)',fontSize:13}}>Loading…</div>;

    return (
      <div style={{padding:'24px',maxWidth:700}}>
        <h2 style={{margin:'0 0 4px',fontSize:20,color:'var(--text)'}}>🔄 Shopify Store Sync</h2>
        <p style={{fontSize:13,color:'var(--text-muted)',marginTop:4,marginBottom:24}}>Connect your own Shopify store so CrosCrow admin can sync your products and inventory to the main store.</p>

        {msg && <div style={{marginBottom:16,padding:'10px 14px',borderRadius:8,background:msg.startsWith('✅')?'var(--green-dim)':'var(--red-bg)',color:msg.startsWith('✅')?'var(--green)':'var(--red)',fontSize:13}}>{msg}</div>}

        {status.connected ? (
          <>
            <div style={{background:'var(--green-dim)',border:'1px solid #1a4731',borderRadius:10,padding:18,marginBottom:20,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
              <div>
                <div style={{fontWeight:700,color:'var(--green)',fontSize:14}}>✅ Connected</div>
                <div style={{fontSize:12,color:'var(--text-muted)',marginTop:4}}>{status.connection.shop_domain}</div>
                <div style={{fontSize:11,color:'var(--text-muted)',marginTop:2}}>Scopes: {status.connection.scope}</div>
              </div>
              <button className="btn btn-danger btn-sm" onClick={disconnect}>Disconnect</button>
            </div>

            <div style={{marginBottom:16,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
              <div style={{fontSize:14,fontWeight:700,color:'var(--text)'}}>Your Products</div>
              <button className="btn btn-ghost btn-sm" onClick={loadProducts}>{prodLoad?'Loading…':'↻ Load Products'}</button>
            </div>
            {products.length > 0 && (
              <div style={{display:'flex',flexDirection:'column',gap:8}}>
                {products.map(p=>{
                  const img = p.images?.[0]?.src;
                  return (
                    <div key={p.id} style={{background:'var(--bg-card)',border:'1px solid var(--border)',borderRadius:8,padding:12,display:'flex',gap:12,alignItems:'center'}}>
                      {img && <img src={img} style={{width:44,height:44,objectFit:'cover',borderRadius:5,flexShrink:0}} alt=""/>}
                      <div style={{flex:1}}>
                        <div style={{fontSize:13,fontWeight:600,color:'var(--text)'}}>{p.title}</div>
                        <div style={{fontSize:11,color:'var(--text-muted)',marginTop:2}}>{p.variants?.length} variant{p.variants?.length!==1?'s':''} · {p.status}</div>
                      </div>
                      <span style={{fontSize:10,padding:'2px 8px',borderRadius:10,background:'var(--green-dim)',color:'var(--green)'}}>Visible to admin</span>
                    </div>
                  );
                })}
              </div>
            )}
            {!prodLoad && products.length===0 && <div style={{fontSize:12,color:'var(--text-muted)'}}>Click "Load Products" to preview what admin can sync.</div>}
          </>
        ) : (
          <div style={{background:'var(--bg-card)',border:'1px solid var(--border)',borderRadius:10,padding:24}}>
            <div style={{fontSize:14,fontWeight:700,color:'var(--text)',marginBottom:8}}>Connect Your Shopify Store</div>

            {/* Step guide */}
            <div style={{background:'var(--bg-hover)',borderRadius:8,padding:14,marginBottom:20,fontSize:12,color:'var(--text-muted)',lineHeight:2}}>
              <div style={{fontWeight:700,color:'var(--text)',marginBottom:6}}>How to get your credentials:</div>
              <div>1. Go to your Shopify Admin → <strong>Settings → Apps and sales channels</strong></div>
              <div>2. Click <strong>Develop apps</strong> → <strong>Create an app</strong> → name it "CrosCrow Sync"</div>
              <div>3. Click <strong>Configure Admin API scopes</strong> → enable: <code style={{background:'#1e293b',padding:'1px 5px',borderRadius:3}}>read_products</code>, <code style={{background:'#1e293b',padding:'1px 5px',borderRadius:3}}>read_inventory</code>, <code style={{background:'#1e293b',padding:'1px 5px',borderRadius:3}}>read_locations</code></div>
              <div>4. Click <strong>Save</strong> → <strong>Install app</strong></div>
              <div>5. Go to <strong>API credentials</strong> tab → copy <strong>Client ID</strong> and <strong>Client secret</strong></div>
            </div>

            <label style={{fontSize:11,color:'var(--text-muted)',display:'block',marginBottom:6}}>Your Shopify Store URL</label>
            <input className="form-input" placeholder="yourstore.myshopify.com" value={shop} onChange={e=>setShop(e.target.value)}
              style={{width:'100%',boxSizing:'border-box',marginBottom:12}}/>

            <label style={{fontSize:11,color:'var(--text-muted)',display:'block',marginBottom:6}}>Client ID</label>
            <input className="form-input" placeholder="bfdb172e5968adbccc1119462ce3cb57" value={clientId} onChange={e=>setClientId(e.target.value)}
              style={{width:'100%',boxSizing:'border-box',marginBottom:12}}/>

            <label style={{fontSize:11,color:'var(--text-muted)',display:'block',marginBottom:6}}>Client Secret</label>
            <input className="form-input" type="password" placeholder="shpss_xxxxxxxxxxxxxxxxxxxxxxxx" value={secret} onChange={e=>setSecret(e.target.value)}
              style={{width:'100%',boxSizing:'border-box',marginBottom:16}}/>

            <button className="btn btn-green" onClick={connect} disabled={connecting} style={{width:'100%'}}>
              {connecting ? 'Verifying & Connecting…' : '🔗 Connect Shopify Store'}
            </button>
            <div style={{marginTop:10,fontSize:11,color:'var(--text-muted)'}}>
              Read-only access only — CrosCrow cannot modify your store.
            </div>
          </div>
        )}
      </div>
    );
  }

  function App() {
    const [auth,    setAuth]    = useState(()=>ls.get('vendor_auth',null));
    const [view,    setView]    = useState('dashboard');
    const [orders,  setOrders]  = useState([]);
    const [stats,   setStats]   = useState(null);
    const [loading, setLoading] = useState(false);
    const [lastRef, setLastRef] = useState(null);
    const [modal,   setModal]   = useState(null); // selected order
    const [autoDelay, setAutoDelay] = useState(false); // scroll to delay section on open
    const [loginErr,setLoginErr]= useState('');
    const [loginLoad,setLoginLoad]=useState(false);
    const [sidebarOpen,setSidebarOpen]= useState(false);

    /* login */
    const [uname, setUname] = useState('');
    const [pass,  setPass]  = useState('');

    const login = async () => {
      setLoginLoad(true); setLoginErr('');
      try {
        const r = await fetch(`${API}/vendor/login`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:uname,password:pass})});
        const d = await r.json();
        if(!r.ok) throw new Error(d.error||'Login failed');
        ls.set('vendor_auth',d);
        setAuth(d);
        // If first login with default password, redirect to profile to change it
        if(d.mustChangePassword) setTimeout(()=>setView('profile'),300);
      } catch(e){ setLoginErr(e.message); }
      setLoginLoad(false);
    };

    const logout = async () => {
      if(auth) await fetch(`${API}/vendor/logout`,{method:'POST',headers:{Authorization:`Bearer ${auth.token}`}}).catch(()=>{});
      ls.del('vendor_auth'); setAuth(null); setOrders([]); setStats(null);
    };

    /* fetch data */
    const fetchData = useCallback(async () => {
      if(!auth) return;
      setLoading(true);
      try {
        const [oRes, sRes] = await Promise.all([
          fetch(`${API}/vendor/orders`,{headers:{Authorization:`Bearer ${auth.token}`}}),
          fetch(`${API}/vendor/stats`, {headers:{Authorization:`Bearer ${auth.token}`}}),
        ]);
        if(oRes.status===401||sRes.status===401){ logout(); return; }
        const oData = await oRes.json();
        const sData = await sRes.json();
        setOrders(oData.orders||[]);
        setStats(sData);
        setLastRef(new Date());
      } catch{}
      setLoading(false);
    },[auth]);

    useEffect(()=>{
      if(auth) {
        fetchData().then(()=>{
          // Auto-open order from URL param (e.g. from penalty warning email link)
          const params = new URLSearchParams(window.location.search);
          const openId = params.get('openOrder');
          const action = params.get('action');
          if (openId) {
            setOrders(prev => {
              const found = prev.find(o => String(o.shopifyId) === String(openId));
              if (found) { setModal(found); if(action==='delay') setAutoDelay(true); }
              return prev;
            });
          }
        });
      }
    },[auth]);

    /* ── Login screen ── */
    if(!auth) return (
      <div className="login-wrap">
        <div className="login-box">
          <div className="login-logo">C</div>
          <div className="login-title">CROSCROW</div>
          <div className="login-sub">Vendor Portal</div>
          {loginErr && <div className="login-error">⚠ {loginErr}</div>}
          <label className="field-label">Vendor / Brand Name</label>
          <input className="field-input" placeholder="Your Brand Name" value={uname} onChange={e=>setUname(e.target.value)} onKeyDown={e=>e.key==='Enter'&&login()}/>
          <label className="field-label">Password</label>
          <input className="field-input" type="password" placeholder="••••••••••" value={pass} onChange={e=>setPass(e.target.value)} onKeyDown={e=>e.key==='Enter'&&login()}/>
          <button className="login-btn" onClick={login} disabled={loginLoad||!uname||!pass}>{loginLoad?'Signing in…':'Sign In'}</button>
          <div className="login-hint">Contact CrosCrow admin if you need access.</div>
        </div>
      </div>
    );

    const navItems = [
      { id:'dashboard',   icon:'◈', label:'Dashboard',   section:'main' },
      { id:'orders',      icon:'◎', label:'My Orders',    section:'main' },
      { id:'products',    icon:'⬡', label:'My Products',  section:'main' },
      { id:'shipping',    icon:'🚚', label:'Shipping',     section:'main' },
      { id:'settlements', icon:'₹', label:'Settlements',  section:'finance' },
      { id:'wallet',      icon:'◉', label:'Wallet',       section:'finance' },
      { id:'shopifysync', icon:'🔄', label:'Shopify Sync',  section:'finance' },
      { id:'profile',     icon:'⚙', label:'My Profile',   section:'finance' },
    ];
    const sections = [...new Set(navItems.map(n=>n.section))];
    const sectionLabels = { main:'Store', finance:'Finance' };

    const pageTitle = { dashboard:'Dashboard', orders:'My Orders', products:'My Products', shipping:'Shipping Partners', settlements:'Settlements', wallet:'Wallet', profile:'My Profile' };
    const closeSidebar = () => setSidebarOpen(false);

    // Bottom nav shows most important 5 items
    const bottomNavItems = [
      { id:'orders',    icon:'📦', label:'Orders' },
      { id:'dashboard', icon:'⚡', label:'Dashboard' },
      { id:'shipping',  icon:'🚚', label:'Ship' },
      { id:'settlements', icon:'₹', label:'Settle' },
      { id:'profile',   icon:'👤', label:'Profile' },
    ];

    return (
      <div className="app-shell">
        {/* Mobile overlay */}
        <div className={`sidebar-overlay ${sidebarOpen?'visible':''}`} onClick={closeSidebar}/>

        {/* Sidebar */}
        <aside className={`sidebar ${sidebarOpen?'mobile-open':''}`}>
          <div className="sidebar-brand">
            <div className="sidebar-logo">C</div>
            <div>
              <div className="sidebar-name">CROSCROW</div>
              <div className="sidebar-role">Vendor Portal</div>
            </div>
          </div>
          <div className="sidebar-vendor">
            Logged in as<strong>{auth.vendorName}</strong>
          </div>
          <nav className="nav">
            {sections.map(sec=>(
              <div key={sec}>
                <div className="nav-section">{sectionLabels[sec]}</div>
                {navItems.filter(n=>n.section===sec).map(n=>(
                  <button key={n.id} className={`nav-item ${view===n.id?'active':''}`} onClick={()=>{ setView(n.id); closeSidebar(); }}>
                    <span className="nav-icon">{n.icon}</span>{n.label}
                  </button>
                ))}
              </div>
            ))}
          </nav>
          <div className="sidebar-footer">
            <button className="logout-btn" onClick={logout}>
              <span>↩</span> Sign Out
            </button>
          </div>
        </aside>

        {/* Main */}
        <div className="content">
          <div className="topbar">
            <div style={{display:'flex',alignItems:'center',gap:4}}>
              <button className="hamburger" onClick={()=>setSidebarOpen(o=>!o)}>☰</button>
              <span className="topbar-title">{pageTitle[view]}</span>
            </div>
            <div className="topbar-right">
              {lastRef && <span className="topbar-badge"><span className="pulse"/>{lastRef.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'})}</span>}
              <button className="btn btn-ghost" style={{fontSize:10,padding:'5px 10px'}} onClick={fetchData} disabled={loading}>
                {loading ? <span className="spin">↻</span> : '↻'} {loading?'Loading…':'Refresh'}
              </button>
            </div>
          </div>

          {auth.mustChangePassword && (
            <div style={{background:'#1c1208',border:'2px solid #f59e0b',borderRadius:8,padding:'12px 16px',marginBottom:12,display:'flex',alignItems:'center',justifyContent:'space-between',gap:12}}>
              <div style={{fontSize:13,color:'#fbbf24',fontWeight:600}}>⚠ You are using the default password. Please <strong>change your password</strong> to secure your account.</div>
              <button className="btn btn-sm" style={{background:'#f59e0b',color:'#000',fontWeight:700,whiteSpace:'nowrap'}} onClick={()=>setView('profile')}>Change Now →</button>
            </div>
          )}
          {view==='dashboard'   && <Dashboard        stats={stats} orders={orders} loading={loading} onOpenOrder={setModal}/>}
          {view==='orders'      && <Orders           orders={orders} loading={loading} onOpenOrder={setModal} token={auth.token} onRefresh={fetchData}/>}
          {view==='products'    && <Products          token={auth.token} vendorName={auth.vendorName}/>}
          {view==='shipping'    && <ShippingPartners  token={auth.token}/>}
          {view==='settlements' && <Settlements       token={auth.token} stats={stats}/>}
          {view==='wallet'      && <Wallet            token={auth.token}/>}
          {view==='shopifysync' && <ShopifySync token={auth.token} vendorName={auth.vendorName}/>}
          {view==='profile'     && <Profile           token={auth.token}/>}
        </div>

        {/* Mobile bottom nav */}
        <nav className="mobile-bottom-nav">
          {bottomNavItems.map(n=>(
            <button key={n.id} className={`mobile-nav-btn ${view===n.id?'active':''}`} onClick={()=>setView(n.id)}>
              <span className="mn-icon">{n.icon}</span>
              {n.label}
            </button>
          ))}
        </nav>

        {/* Order modal */}
        {modal && (
          <OrderModal
            order={modal}
            token={auth.token}
            onClose={()=>setModal(null)}
            onUpdated={()=>{ fetchData(); setModal(null); }}
          />
        )}
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
