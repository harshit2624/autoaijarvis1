                  <div style={{fontSize:12,fontWeight:700,color:'#f59e0b',marginBottom:10}}>Report Delay for this Order</div>
                  <div style={{marginBottom:10}}>
                    <label style={{fontSize:11,color:'var(--text-muted)',display:'block',marginBottom:4}}>Reason for delay</label>
                    <textarea className="form-input" rows={3} style={{resize:'vertical',width:'100%',boxSizing:'border-box'}}
                      placeholder="Explain why the order cannot be dispatched on time…"
                      value={delayReason} onChange={e=>setDelayReason(e.target.value)}/>
                  </div>
                  <div style={{marginBottom:12}}>
                    <label style={{fontSize:11,color:'var(--text-muted)',display:'block',marginBottom:4}}>Expected dispatch date</label>
                    <input type="date" className="form-input" min={new Date().toISOString().split('T')[0]}
                      value={delayEta} onChange={e=>setDelayEta(e.target.value)}/>
                  </div>
                  <button className="btn btn-green btn-sm" onClick={submitDelay} disabled={submittingDelay||!delayReason.trim()||!delayEta}>
                    {submittingDelay?'Submitting…':'Submit Delay Remark'}
                  </button>
                  <div style={{fontSize:11,color:'var(--text-muted)',marginTop:6}}>Customer and admin will be notified by email.</div>
                </div>
              )}

              {/* Notes thread */}
              {noteThread.map(n=>(
                <div key={n.id} style={{display:'flex',gap:8,marginBottom:8,flexDirection:n.role==='vendor'?'row-reverse':'row'}}>
                  <div style={{width:26,height:26,borderRadius:'50%',background:n.role==='vendor'?'var(--green-dim)':'var(--indigo-dim)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,flexShrink:0,color:n.role==='vendor'?'var(--green)':'var(--indigo)',fontWeight:700}}>
                    {n.role==='vendor'?'V':'A'}
                  </div>
                  <div style={{maxWidth:'75%'}}>
                    <div style={{background:n.role==='vendor'?'var(--green-dim)':'var(--bg-card)',border:'1px solid var(--border)',borderRadius:n.role==='vendor'?'12px 4px 12px 12px':'4px 12px 12px 12px',padding:'7px 11px'}}>
                      <div style={{fontSize:12,color:'var(--text)',lineHeight:1.5}}>{n.note}</div>
                    </div>
                    <div style={{fontSize:10,color:'var(--text-muted)',marginTop:3,textAlign:n.role==='vendor'?'right':'left'}}>
                      {n.author} · {new Date(n.created_at).toLocaleString('en-IN',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'})}
                    </div>
                  </div>
                </div>
              ))}
              {noteThread.length===0 && remarks.length===0 && !showDelay && (
                <div style={{fontSize:12,color:'var(--text-muted)',marginBottom:8}}>No notes yet.</div>
              )}

              {/* Add note input */}
              <div style={{display:'flex',gap:8,marginTop:6}}>
                <input className="form-input" style={{flex:1,fontSize:12}} placeholder="Add a note… (visible to admin too)"
                  value={newNote} onChange={e=>setNewNote(e.target.value)}
                  onKeyDown={e=>e.key==='Enter'&&!e.shiftKey&&postNote()}/>
                <button className="btn btn-green btn-sm" onClick={postNote} disabled={postingNote||!newNote.trim()}>
                  {postingNote?'…':'Send'}
                </button>
              </div>
            </div>
          </div>

          {!alreadyFulfilled && (
            <div className="modal-footer">
              <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
              {!alreadyDelivered && order.awb && (
                <button onClick={markDelivered} disabled={markingDelivered}
                  style={{background:'#10b981',color:'#fff',border:'none',borderRadius:8,padding:'9px 18px',fontWeight:700,cursor:'pointer',fontFamily:'inherit',fontSize:12,display:'flex',alignItems:'center',gap:6}}>
                  {markingDelivered ? <><span className="spin">↻</span> Saving…</> : '✓ DELIVERED'}
                </button>
              )}
              <button className="btn btn-green" onClick={fulfill} disabled={fulfilling||!awb.trim()||(shipFulfillItems.length>0 && totalShipQty===0)}>
                {fulfilling ? <><span className="spin">↻</span> Fulfilling…</> : '⬡ Mark as Fulfilled'}
              </button>
            </div>
          )}
          {alreadyFulfilled && (
            <div className="modal-footer">
              <button className="btn btn-ghost" onClick={onClose}>Close</button>
              {!alreadyDelivered && (
                <button onClick={markDelivered} disabled={markingDelivered}
                  style={{background:'#10b981',color:'#fff',border:'none',borderRadius:8,padding:'9px 18px',fontWeight:700,cursor:'pointer',fontFamily:'inherit',fontSize:12,display:'flex',alignItems:'center',gap:6}}>
                  {markingDelivered ? <><span className="spin">↻</span> Saving…</> : '✓ DELIVERED'}
                </button>
              )}
            </div>
          )}
        </div>
      </div>
    );
  }

  /* ── Dispatch Rate Card (reusable) ── */
  function DispatchCard({ stats, periodLabel }) {
    const [showBreakdown, setShowBreakdown] = useState(false);
    if (!stats?.dispatch) return null;
    const d = stats.dispatch;
    const rate = d.rate || 0;
    const barColor = rate >= 80 ? 'var(--green)' : rate >= 50 ? '#f59e0b' : '#ef4444';
    const urgency = rate >= 90 ? null : rate >= 70
      ? { label:'Almost there!', msg:`${d.pendingCount} order${d.pendingCount!==1?'s':''} confirmed but not yet shipped — don't let them go cold.` }
      : rate >= 40
      ? { label:'Action needed', msg:`${d.pendingCount} confirmed order${d.pendingCount!==1?'s':''} are sitting unshipped. Every day you wait, the customer gets closer to cancelling.` }
      : { label:'🚨 Urgent', msg:`${d.pendingCount} orders confirmed and waiting — your customers already paid and are expecting their product. Ship now before they lose trust.` };

    const ACTIVE_STAGES = ['confirmed','partial','ready','pickup','transit','delivered','rto'];
    const DISPATCHED_STAGES = ['ready','pickup','transit','delivered','rto'];

    return (
      <div style={{background:'linear-gradient(135deg, var(--bg-card2) 0%, var(--bg) 100%)',border:`1px solid color-mix(in srgb, ${barColor} 27%, transparent)`,borderRadius:12,padding:'20px 24px',marginBottom:16,position:'relative',overflow:'hidden'}}>
        <div style={{position:'absolute',top:-40,right:-40,width:120,height:120,borderRadius:'50%',background:`color-mix(in srgb, ${barColor} 7%, transparent)`,pointerEvents:'none'}}/>
        <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:16,flexWrap:'wrap'}}>
          <div style={{minWidth:160}}>
            <div style={{fontSize:11,fontWeight:700,color:'var(--text-muted)',letterSpacing:'0.08em',textTransform:'uppercase',marginBottom:6}}>
              Your Dispatch Rate{periodLabel?` · ${periodLabel}`:''}
            </div>
            <div style={{display:'flex',alignItems:'baseline',gap:6,marginBottom:10}}>
              <span style={{fontSize:48,fontWeight:900,color:barColor,lineHeight:1}}>{rate}%</span>
              <span style={{fontSize:12,color:'var(--text-muted)'}}>{d.dispatched}/{d.totalActive} orders</span>
            </div>
            <div style={{height:6,borderRadius:3,background:'var(--border)',overflow:'hidden',marginBottom:6}}>
              <div style={{height:'100%',width:`${rate}%`,background:barColor,borderRadius:3,transition:'width 0.6s ease'}}/>
            </div>
            <div style={{fontSize:10,color:'var(--text-muted)',marginBottom:8}}>confirmed orders dispatched{periodLabel?` · ${periodLabel}`:''}</div>
            <button onClick={()=>setShowBreakdown(b=>!b)} style={{
              background:'var(--bg-card)',border:'1px solid var(--border)',
              borderRadius:6,padding:'5px 10px',fontSize:10,color:'var(--text-muted)',
              cursor:'pointer',fontFamily:'inherit',display:'flex',alignItems:'center',gap:4,
            }}>
              {showBreakdown?'▲':'▼'} How is this calculated?
            </button>
          </div>
          <div style={{flex:1,minWidth:200}}>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
              <div style={{background:'color-mix(in srgb, var(--green) 8%, transparent)',border:'1px solid color-mix(in srgb, var(--green) 20%, transparent)',borderRadius:8,padding:'12px 14px'}}>
                <div style={{fontSize:9,fontWeight:700,color:'var(--green)',textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:4}}>✓ Revenue Dispatched</div>
                <div style={{fontSize:20,fontWeight:800,color:'var(--green)'}}>{fmtCur(d.dispatchedRev)}</div>
                <div style={{fontSize:10,color:'var(--text-muted)',marginTop:2}}>{d.dispatched} orders shipped</div>
              </div>
              <div style={{background:'rgba(239,68,68,0.08)',border:'1px solid rgba(239,68,68,0.2)',borderRadius:8,padding:'12px 14px'}}>
                <div style={{fontSize:9,fontWeight:700,color:'#ef4444',textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:4}}>⏳ Revenue Stuck</div>
                <div style={{fontSize:20,fontWeight:800,color:'#ef4444'}}>{fmtCur(d.pendingRev)}</div>
                <div style={{fontSize:10,color:'var(--text-muted)',marginTop:2}}>{d.pendingCount} orders waiting</div>
              </div>
            </div>
          </div>
          {urgency && (
            <div style={{maxWidth:240,background:'rgba(239,68,68,0.06)',border:'1px solid rgba(239,68,68,0.2)',borderRadius:8,padding:'12px 14px'}}>
              <div style={{fontSize:11,fontWeight:800,color:'#ef4444',marginBottom:6}}>{urgency.label}</div>
              <div style={{fontSize:11,color:'var(--text-muted)',lineHeight:1.6}}>{urgency.msg}</div>
              <div style={{marginTop:10,fontSize:10,color:'#f59e0b',fontStyle:'italic'}}>
                You're sitting on {fmtCur(d.pendingRev)} in potential profit — every hour it stays unshipped, you're leaving money on the table.
              </div>
            </div>
          )}
          {!urgency && (
            <div style={{maxWidth:200,background:'color-mix(in srgb, var(--green) 6%, transparent)',border:'1px solid color-mix(in srgb, var(--green) 20%, transparent)',borderRadius:8,padding:'12px 14px'}}>
              <div style={{fontSize:11,fontWeight:800,color:'var(--green)',marginBottom:6}}>🏆 Top performer!</div>
              <div style={{fontSize:11,color:'var(--text-muted)',lineHeight:1.6}}>Exceptional dispatch rate. Keep this up — fast shipping = happy customers = more orders.</div>
            </div>
          )}
        </div>

        {/* Breakdown dropdown */}
        {showBreakdown && (
          <div style={{marginTop:16,padding:16,background:'var(--bg-card)',border:'1px solid var(--border)',borderRadius:8}}>
            <div style={{fontSize:11,fontWeight:700,color:'var(--text)',marginBottom:10}}>📊 Dispatch Rate Breakdown</div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:12}}>
              <div>
                <div style={{fontSize:10,color:'var(--text-muted)',marginBottom:6,fontWeight:600}}>✅ DISPATCHED ({d.dispatched} orders)</div>
                {DISPATCHED_STAGES.map(s=>(
                  <div key={s} style={{display:'flex',justifyContent:'space-between',fontSize:10,color:'var(--green)',padding:'2px 0'}}>
                    <span style={{textTransform:'capitalize'}}>{s==='ready'?'Ready to Ship':s==='pickup'?'Pickup Pending':s==='transit'?'In Transit':s==='delivered'?'Delivered':'RTO'}</span>
                    <span style={{color:'var(--text-muted)'}}>counted ✓</span>
                  </div>
                ))}
                <div style={{fontSize:10,color:'var(--green)',padding:'2px 0',borderTop:'1px solid var(--border)',marginTop:4}}>+ Any confirmed order with AWB</div>
              </div>
              <div>
                <div style={{fontSize:10,color:'var(--text-muted)',marginBottom:6,fontWeight:600}}>⏳ PENDING ({d.pendingCount} orders)</div>
                {['confirmed','partial'].map(s=>(
                  <div key={s} style={{display:'flex',justifyContent:'space-between',fontSize:10,color:'#ef4444',padding:'2px 0'}}>
                    <span style={{textTransform:'capitalize'}}>{s==='partial'?'Partial / Advance':s}</span>
                    <span style={{color:'var(--text-muted)'}}>not yet shipped</span>
                  </div>
                ))}
              </div>
            </div>
            <div style={{fontSize:10,color:'var(--text-muted)',borderTop:'1px solid var(--border)',paddingTop:8}}>
              <strong style={{color:'var(--text)'}}>Formula:</strong> Dispatched ÷ Total Active × 100<br/>
              <strong style={{color:'var(--text)'}}>Total Active</strong> = all orders in stages: {ACTIVE_STAGES.join(', ')}<br/>
              <strong style={{color:'var(--text)'}}>Period:</strong> {periodLabel || 'All Time'}
            </div>
          </div>
        )}
      </div>
    );
  }

  /* ══════════════════════════════════
     DASHBOARD VIEW
  ══════════════════════════════════ */
  function Dashboard({ stats, orders, loading, onOpenOrder, period, onPeriodChange, vendorName }) {
    const recent = orders.slice(0,8);
    const periodSub = period ? period.label : 'All Time';
    const hour = new Date().getHours();
    const greeting = hour < 12 ? 'Good morning' : hour < 17 ? 'Good afternoon' : 'Good evening';
    return (
      <div className="page">
        <div style={{marginBottom:16}}>
          <div style={{fontSize:18,fontWeight:800,color:'var(--text)',letterSpacing:-0.3}}>{greeting}, <span style={{color:'var(--green)'}}>{vendorName}</span> 👋</div>
          <div style={{fontSize:11,color:'var(--text-muted)',marginTop:2}}>Here's your store overview</div>
        </div>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12,flexWrap:'wrap',gap:8}}>
          <div style={{fontSize:11,color:'var(--text-muted)'}}>Showing data for <strong style={{color:'var(--text)'}}>{periodSub}</strong></div>
          {onPeriodChange && <PeriodPicker period={period} onChange={onPeriodChange} align="right"/>}
        </div>
        <div className="stats-grid">
          <StatCard color="green"  icon="◈" label="Total Orders"  value={stats?.total?.toLocaleString()||'—'} sub={periodSub}/>
          <StatCard color="teal"   icon="₹" label="Your Revenue"  value={stats ? fmtCur(stats.revenue) : '—'} sub={periodSub}/>
          <StatCard color="purple" icon="~" label="Avg Order"     value={stats ? fmtCur(stats.avg) : '—'} sub="per order"/>
          <StatCard color="green"  icon="✓" label="Fulfilled"     value={stats?.fulfilled?.toLocaleString()||'—'} sub={stats?.total?`${Math.round(stats.fulfilled/stats.total*100)}%`:''}/>
          <StatCard color="yellow" icon="○" label="Pending"       value={stats?.pending?.toLocaleString()||'—'} sub={stats?.total?`${Math.round(stats.pending/stats.total*100)}%`:''}/>
        </div>

        {/* ── Dispatch Rate Card ─────────────────────────────── */}
        <DispatchCard stats={stats} periodLabel={period?.label}/>

        <div className="card">
          <div className="card-header">
            <span className="card-title">Recent Orders</span>
            <span className="card-sub">{orders.length} total</span>
          </div>
          <div className="tbl-wrap">
            <table>
              <thead><tr>
                <th>Order</th><th>Customer</th><th>Items</th><th>Payment</th><th>Revenue</th><th>Shipping</th><th>Advance</th><th>Remaining COD</th><th>Status</th><th>Date</th><th/>
              </tr></thead>
              <tbody>
                {loading ? Array.from({length:6}).map((_,i)=><SkelRow key={i} cols={10}/>) :
                 recent.length===0 ? (
                  <tr><td colSpan={11}><div className="empty"><div className="empty-icon">📦</div><div className="empty-title">No orders yet</div></div></td></tr>
                 ) :
                 recent.map(o=>(
                  <tr key={o.id} onClick={()=>onOpenOrder(o)}>
                    <td className="td-id">{o.id}</td>
                    <td>{o.customer||'Guest'}</td>
                    <td><span style={{background:'var(--bg-card2)',border:'1px solid var(--border)',borderRadius:4,padding:'2px 8px',fontSize:11,color:'var(--text-dim)'}}>{o.myItems.reduce((s,i)=>s+i.quantity,0)} item{o.myItems.reduce((s,i)=>s+i.quantity,0)!==1?'s':''}</span></td>
                    <td><PayBadge type={o.paymentType}/></td>
                    <td className="td-amt">{fmtCur(o.myRevenue,o.currency)}</td>
                    <td style={{color:'var(--blue)',fontSize:11}}>{o.shippingCharge>0?fmtCur(o.shippingCharge,o.currency):'—'}</td>
                    <td style={{color:'var(--green)',fontSize:11}}>{o.advancePaid>0?`−${fmtCur(o.advancePaid,o.currency)}`:'—'}</td>
                    <td className="td-amt" style={{color: o.advancePaid>0?'var(--orange)':'var(--teal)',fontWeight:700}}>{fmtCur(o.remainingCOD,o.currency)}</td>
                    <td>
                      <div style={{display:'flex',alignItems:'center',gap:2}}>
                        <StagePill stage={o.stage} awb={o.awb} courier={o.courier} trackingUrl={o.trackingUrl}/>
                        <PenaltyTimer stageStartedAt={o.stageStartedAt} penaltyTriggered={o.penaltyTriggered} stage={o.stage}/>
                        {o.ccStock&&<span style={{fontSize:9,padding:'2px 6px',borderRadius:4,background:'rgba(251,191,36,0.15)',border:'1px solid rgba(251,191,36,0.5)',color:'#fbbf24',fontWeight:700}}>🏬 CC Stock</span>}
                      </div>
                    </td>
                    <td className="td-muted">{fmtDate(o.date)}</td>
                    <td style={{textAlign:'center',color:'var(--text-muted)',fontSize:11}}>▶</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      </div>
    );
  }

  const STAGES = [
    { id:'all',       label:'All',                icon:'◈' },
    { id:'new',       label:'New',                icon:'◉' },
    { id:'confirmed', label:'Confirmed / Partial', icon:'✓' },
    { id:'ready',     label:'Ready to Ship',       icon:'⬡' },
    { id:'pickup',    label:'Pickup Pending',       icon:'⌛' },
    { id:'transit',   label:'In Transit',           icon:'↑' },
    { id:'delivered', label:'Delivered',            icon:'✅' },
    { id:'rto',       label:'RTO',                  icon:'↩' },
    { id:'hold',      label:'Hold',                 icon:'⏸' },
    { id:'cancelled', label:'Cancelled',            icon:'✕' },
    { id:'misc',      label:'Miscellaneous',        icon:'◌' },
  ];

  /* ══════════════════════════════════
     ORDERS VIEW
  ══════════════════════════════════ */
  function Orders({ orders, loading, onOpenOrder, token, onRefresh, stats, period, onPeriodChange }) {
    const [search, setSearch]   = useState('');
    const [stage,  setStage]    = useState('all');
    const [sort,   setSort]     = useState('date');
    const [dir,    setDir]      = useState('desc');
    const [page,   setPage]     = useState(1);

    const filtered = useMemo(()=>{
      let l=[...orders];
      if(search.trim()){const q=search.toLowerCase();l=l.filter(o=>o.id.toLowerCase().includes(q)||o.customer.toLowerCase().includes(q)||(o.email||'').toLowerCase().includes(q)||o.myItems.some(i=>i.title.toLowerCase().includes(q)));}
      if(stage!=='all'){
        if(stage==='confirmed') l=l.filter(o=>['confirmed','partial'].includes(o.stage||'new'));
        else l=l.filter(o=>(o.stage||'new')===stage);
      }
      l.sort((a,b)=>{
        if(sort==='amount')return dir==='desc'?b.myRevenue-a.myRevenue:a.myRevenue-b.myRevenue;
        if(sort==='customer')return dir==='asc'?a.customer.localeCompare(b.customer):b.customer.localeCompare(a.customer);
        return dir==='desc'?new Date(b.date)-new Date(a.date):new Date(a.date)-new Date(b.date);
      });
      return l;
    },[orders,search,stage,sort,dir]);

    const pages = Math.max(1,Math.ceil(filtered.length/PER));
    const cur   = Math.min(page,pages);
    const rows  = filtered.slice((cur-1)*PER, cur*PER);
    const hSort = c=>{if(sort===c)setDir(d=>d==='desc'?'asc':'desc');else{setSort(c);setDir('desc');}setPage(1);};
    const arrow = c=>sort===c?(dir==='desc'?'▼':'▲'):'';

    const isMobile = window.innerWidth <= 768;

    // Group rows by date label for mobile
    const groupByDate = (list) => {
      const groups = [];
      let lastLabel = null;
      list.forEach(o => {
        const d = new Date(o.date);
        const today = new Date(); today.setHours(0,0,0,0);
        const yesterday = new Date(today); yesterday.setDate(today.getDate()-1);
        const label = d >= today ? 'Today' : d >= yesterday ? 'Yesterday' : d.toLocaleDateString('en-IN',{day:'numeric',month:'short'});
        if (label !== lastLabel) { groups.push({ label, orders:[] }); lastLabel = label; }
        groups[groups.length-1].orders.push(o);
      });
      return groups;
    };

    // Mobile list row
    const MobileOrderRow = ({ o }) => {
      const qty = o.myItems.reduce((s,x)=>s+x.quantity,0);
      const timeStr = new Date(o.date).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
      const stageColors = { new:'#6366f1',confirmed:'#3b82f6',ready:'#f59e0b',pickup:'#8b5cf6',transit:'#06b6d4',delivered:'#10b981',hold:'#f59e0b',rto:'#ef4444',cancelled:'#6b7280',partial:'#a78bfa',misc:'#9ca3af' };
      const stageColor = stageColors[o.stage||'new'] || '#6366f1';
      return (
        <div onClick={()=>onOpenOrder(o)} style={{padding:'14px 16px',borderBottom:'1px solid var(--border)',display:'flex',justifyContent:'space-between',alignItems:'flex-start',cursor:'pointer',active:{background:'var(--bg-hover)'}}}>
          <div style={{flex:1,minWidth:0}}>
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:3}}>
              <span style={{fontSize:16,fontWeight:800,color:'var(--text)',letterSpacing:0.5}}>{o.id}</span>
            </div>
            <div style={{fontSize:12,color:'var(--text-muted)',marginBottom:6}}>
              {o.customer||'Guest'} &bull; {qty} item{qty!==1?'s':''} &bull; {timeStr}
            </div>
            <div style={{display:'flex',alignItems:'center',gap:6,flexWrap:'wrap'}}>
              <span style={{fontSize:11,fontWeight:700,padding:'2px 8px',borderRadius:20,background:`${stageColor}22`,color:stageColor,border:`1px solid ${stageColor}44`}}>
                {(o.stage||'new').charAt(0).toUpperCase()+(o.stage||'new').slice(1)}
              </span>
              <span style={{fontSize:11,fontWeight:600,padding:'2px 8px',borderRadius:20,
                background: o.paymentType==='prepaid'?'rgba(16,185,129,0.15)':'rgba(245,158,11,0.15)',
                color: o.paymentType==='prepaid'?'#10b981':'#f59e0b',
                border: `1px solid ${o.paymentType==='prepaid'?'rgba(16,185,129,0.3)':'rgba(245,158,11,0.3)'}`}}>
                {o.paymentType==='prepaid'?'Prepaid':'COD'}
              </span>
              {o.superHold && <SuperHoldBadge/>}
              <PenaltyTimer stageStartedAt={o.stageStartedAt} penaltyTriggered={o.penaltyTriggered} stage={o.stage}/>
              <PenaltyBadge triggered={o.penaltyTriggered>0} confirmedAmount={o.confirmedPenalty||0} shopifyId={o.shopifyId} token={token}/>
            </div>
            {o.awb && <div style={{fontSize:10,color:'var(--text-muted)',marginTop:4}}>AWB: {o.awb} {o.courier?`· ${o.courier}`:''}</div>}
          </div>
          <div style={{textAlign:'right',flexShrink:0,marginLeft:12}}>
            <div style={{fontSize:15,fontWeight:700,color:'var(--text)'}}>{fmtCur(o.myRevenue,o.currency)}</div>
            {o.remainingCOD>0 && <div style={{fontSize:10,color:'var(--teal)',marginTop:2}}>COD {fmtCur(o.remainingCOD,o.currency)}</div>}
            <div style={{fontSize:11,color:'var(--text-muted)',marginTop:4}}>›</div>
          </div>
        </div>
      );
    };

    return (
      <div className="page" style={{padding: isMobile ? '0' : undefined}}>

        {/* ── Period Picker + Dispatch Rate Card ── */}
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10,flexWrap:'wrap',gap:8,padding:isMobile?'12px 12px 0':0}}>
          <div style={{fontSize:11,color:'var(--text-muted)'}}>Orders for <strong style={{color:'var(--text)'}}>{period?.label||'All Time'}</strong></div>
          {onPeriodChange && <PeriodPicker period={period} onChange={onPeriodChange} align="right"/>}
        </div>
        <DispatchCard stats={stats} periodLabel={period?.label}/>

        {/* Search — mobile style */}
        <div style={{padding: isMobile?'12px 12px 8px':'0 0 10px', background: isMobile?'var(--bg-card)':undefined, position: isMobile?'sticky':'static', top: isMobile?54:undefined, zIndex:50, borderBottom: isMobile?'1px solid var(--border)':'none'}}>
          <div className="search-wrap" style={{marginBottom: isMobile?8:0}}>
            <span className="search-ico">⌕</span>
            <input className="search-input" placeholder="Search order, customer…" value={search} onChange={e=>{setSearch(e.target.value);setPage(1);}}/>
          </div>

          {/* Stage filter tabs — horizontal scroll */}
          <div style={{display:'flex',gap:6,overflowX:'auto',paddingBottom:4,WebkitOverflowScrolling:'touch',scrollbarWidth:'none'}}>
            {STAGES.map(s=>{
              const count = s.id==='all' ? orders.length : s.id==='confirmed' ? orders.filter(o=>['confirmed','partial'].includes(o.stage||'new')).length : orders.filter(o=>(o.stage||'new')===s.id).length;
              return (
                <button key={s.id} onClick={()=>{setStage(s.id);setPage(1);}} style={{
                  flexShrink:0, padding:'5px 12px', borderRadius:20, border:'none', cursor:'pointer',
                  fontSize:12, fontWeight:600, whiteSpace:'nowrap', fontFamily:'var(--font-family)',
                  background: stage===s.id ? 'var(--green)' : 'var(--bg-card2)',
                  color: stage===s.id ? '#000' : 'var(--text-muted)',
                  transition:'all 0.15s',
                }}>
                  {s.label} {count>0?`(${count})`:''}
                </button>
              );
            })}
          </div>
        </div>

        {/* Mobile list view */}
        {isMobile ? (
          <div style={{background:'var(--bg-card)'}}>
            {loading ? (
              Array.from({length:6}).map((_,i)=>(
                <div key={i} style={{padding:'14px 16px',borderBottom:'1px solid var(--border)'}}>
                  <div className="skel" style={{height:14,width:'40%',marginBottom:8}}/>
                  <div className="skel" style={{height:11,width:'60%',marginBottom:8}}/>
                  <div style={{display:'flex',gap:6}}><div className="skel" style={{height:20,width:70,borderRadius:20}}/><div className="skel" style={{height:20,width:50,borderRadius:20}}/></div>
                </div>
              ))
            ) : rows.length===0 ? (
              <div className="empty" style={{padding:40}}><div className="empty-icon">📦</div><div className="empty-title">{search||stage!=='all'?'No orders match.':'No orders found.'}</div></div>
            ) : (
              groupByDate(rows).map(group=>(
                <div key={group.label}>
                  <div style={{padding:'8px 16px',fontSize:11,fontWeight:700,color:'var(--text-muted)',letterSpacing:1,background:'var(--bg)',borderBottom:'1px solid var(--border)',textTransform:'uppercase'}}>
                    {group.label}
                  </div>
                  {group.orders.map(o=><MobileOrderRow key={o.id} o={o}/>)}
                </div>
              ))
            )}
            {!loading && filtered.length>PER && (
              <div style={{display:'flex',justifyContent:'space-between',padding:'14px 16px',borderTop:'1px solid var(--border)'}}>
                <button className="btn btn-ghost btn-sm" onClick={()=>setPage(p=>Math.max(1,p-1))} disabled={cur===1}>‹ Prev</button>
                <span style={{fontSize:11,color:'var(--text-muted)',alignSelf:'center'}}>{cur}/{pages}</span>
                <button className="btn btn-ghost btn-sm" onClick={()=>setPage(p=>Math.min(pages,p+1))} disabled={cur===pages}>Next ›</button>
              </div>
            )}
          </div>
        ) : (
          /* Desktop table view */
          <>
            <div className="filters">
              <select className="fselect" value={sort} onChange={e=>{setSort(e.target.value);setPage(1);}}>
                <option value="date">Sort: Date</option>
                <option value="amount">Sort: Revenue</option>
                <option value="customer">Sort: Customer</option>
              </select>
              <span className="fcount">{filtered.length} order{filtered.length!==1?'s':''}{search||stage!=='all'?' (filtered)':''}</span>
              <button className="btn btn-ghost btn-sm" style={{fontSize:10,marginLeft:'auto'}} onClick={async()=>{
                const r=await fetch(`${API}/vendor/shipping/sync-status`,{method:'POST',headers:{Authorization:`Bearer ${token}`}});
                const d=await r.json(); if(d.updated>0) onRefresh();
              }}>↻ Sync Delivery Status</button>
            </div>
            <div className="card">
              <div className="tbl-wrap">
                <table>
                  <thead><tr>
                    <th style={{width:36}}>#</th>
                    <th className={`sort ${sort==='id'?'sorted':''}`} onClick={()=>hSort('id')}>Order {arrow('id')}</th>
                    <th className={`sort ${sort==='customer'?'sorted':''}`} onClick={()=>hSort('customer')}>Customer {arrow('customer')}</th>
                    <th>Items</th><th>Products</th><th>Stage / Tracking</th><th>Delivery</th><th>Payment</th>
                    <th className={`sort ${sort==='amount'?'sorted':''}`} onClick={()=>hSort('amount')}>Revenue {arrow('amount')}</th>
                    <th>Shipping</th><th>Advance</th><th>Remaining COD</th>
                    <th className={`sort ${sort==='date'?'sorted':''}`} onClick={()=>hSort('date')}>Date {arrow('date')}</th>
                    <th style={{width:28}}/>
                  </tr></thead>
                  <tbody>
                    {loading ? Array.from({length:8}).map((_,i)=><SkelRow key={i} cols={11}/>) :
                     rows.length===0 ? (
                      <tr><td colSpan={12}><div className="empty"><div className="empty-icon">📦</div><div className="empty-title">{search||stage!=='all'?'No orders match.':'No orders found.'}</div></div></td></tr>
                     ) :
                     rows.map((o,i)=>{
                       const qty=o.myItems.reduce((s,x)=>s+x.quantity,0);
                       return (
                        <tr key={o.id} onClick={()=>onOpenOrder(o)}>
                          <td className="td-muted">{(cur-1)*PER+i+1}</td>
                          <td className="td-id">{o.id}{o.adminFulfilled && <span title="Fulfilled by CROSCROW" style={{marginLeft:6,fontSize:9,color:'#2563eb',background:'color-mix(in srgb, #2563eb 12%, var(--bg-card))',border:'1px solid color-mix(in srgb, #2563eb 35%, var(--border))',borderRadius:99,padding:'1px 6px'}}>📦 CROSCROW</span>}</td>
                          <td><div style={{display:'flex',alignItems:'center',gap:7}}><div style={{width:24,height:24,borderRadius:'50%',background:'var(--bg-card2)',border:'1px solid var(--border)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:9,fontWeight:700,color:'var(--green)',flexShrink:0}}>{(o.customer||'G').split(' ').map(x=>x[0]).join('').toUpperCase().slice(0,2)}</div><span style={{fontSize:12}}>{o.customer||'Guest'}</span></div></td>
                          <td><span style={{background:'var(--bg-card2)',border:'1px solid var(--border)',borderRadius:4,padding:'2px 8px',fontSize:11,color:'var(--text-dim)'}}>{qty} item{qty!==1?'s':''}</span></td>
                          <td style={{maxWidth:180,fontSize:11}}>
                            {o.myItems.map((item,idx)=>(
                              <div key={idx} style={{marginBottom:idx<o.myItems.length-1?4:0}}>
                                <div style={{color:'var(--text-dim)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:170}}>{item.title}</div>
                                {item.variant && item.variant !== 'Default Title' && (
                                  <div style={{fontSize:10,color:'var(--text-muted)',fontWeight:500,marginTop:1}}>{item.variant}</div>
                                )}
                              </div>
                            ))}
                          </td>
                          <td><div style={{display:'flex',alignItems:'center',gap:2,flexWrap:'wrap'}}><StagePill stage={o.stage} awb={o.awb} courier={o.courier} trackingUrl={o.trackingUrl}/>{o.superHold&&<SuperHoldBadge/>}<PenaltyTimer stageStartedAt={o.stageStartedAt} penaltyTriggered={o.penaltyTriggered} stage={o.stage}/><PenaltyBadge triggered={o.penaltyTriggered>0} confirmedAmount={o.confirmedPenalty||0} shopifyId={o.shopifyId} token={token}/></div></td>
                          <td>{(()=>{
                            const ds = o.deliveryStatus;
                            const allFulfilled = o.myItems.length > 0 && o.myItems.every(i=>i.fulfilled);
                            if (!ds && !allFulfilled) return <span style={{fontSize:10,color:'var(--text-muted)'}}>—</span>;
                            const label = ds==='delivered'?'Delivered':ds==='in_transit'||ds==='out_for_delivery'?'In Transit':ds==='attempted_delivery'?'Attempted':ds==='failure'?'RTO':ds==='ready_for_pickup'?'Ready Pickup':allFulfilled&&!ds?'Fulfilled':ds||'Fulfilled';
                            const color = ds==='delivered'?'#10b981':ds==='in_transit'||ds==='out_for_delivery'?'#06b6d4':ds==='failure'?'#ef4444':ds==='attempted_delivery'?'#f59e0b':'#6366f1';
                            return <span style={{fontSize:10,fontWeight:600,padding:'2px 7px',borderRadius:4,background:`${color}18`,color,border:`1px solid ${color}33`,whiteSpace:'nowrap'}}>{label}</span>;
                          })()}</td>
                          <td><PayBadge type={o.paymentType}/></td>
                          <td className="td-amt">{fmtCur(o.myRevenue,o.currency)}</td>
                          <td style={{color:'var(--blue)',fontSize:11}}>{o.shippingCharge>0?fmtCur(o.shippingCharge,o.currency):'—'}</td>
                          <td style={{color:'var(--green)',fontSize:11}}>{o.advancePaid>0?`−${fmtCur(o.advancePaid,o.currency)}`:'—'}</td>
                          <td className="td-amt" style={{color:o.advancePaid>0?'var(--orange)':'var(--teal)',fontWeight:700}}>{fmtCur(o.remainingCOD,o.currency)}</td>
                          <td className="td-muted">{fmtDate(o.date)}</td>
                          <td style={{textAlign:'center',color:'var(--text-muted)',fontSize:11}}>▶</td>
                        </tr>
                       );
                     })}
                  </tbody>
                </table>
              </div>
              {!loading && filtered.length>PER && (
                <div className="pager">
                  <span className="pager-info">Showing {(cur-1)*PER+1}–{Math.min(cur*PER,filtered.length)} of {filtered.length}</span>
                  <div className="pbtns">
                    <button className="pbtn" onClick={()=>setPage(p=>Math.max(1,p-1))} disabled={cur===1}>‹</button>
                    {Array.from({length:pages},(_,i)=>i+1).filter(p=>p===1||p===pages||Math.abs(p-cur)<=1).reduce((acc,p,i,arr)=>{if(i>0&&arr[i-1]!==p-1)acc.push('…');acc.push(p);return acc;},[]).map((p,i)=>
                      p==='…'?<span key={`d${i}`} style={{color:'var(--text-muted)',padding:'0 4px',fontSize:12}}>…</span>:<button key={p} className={`pbtn ${cur===p?'cur':''}`} onClick={()=>setPage(p)}>{p}</button>
                    )}
                    <button className="pbtn" onClick={()=>setPage(p=>Math.min(pages,p+1))} disabled={cur===pages}>›</button>
                  </div>
                </div>
              )}
            </div>
          </>
        )}
      </div>
    );
  }

  /* ══════════════════════════════════
     PRODUCTS VIEW
  ══════════════════════════════════ */
  function Products({ token, vendorName, onGoToShopifySync }) {
    const [products, setProducts] = useState([]);
    const [loading,  setLoading]  = useState(true);
    const [search,   setSearch]   = useState('');
    // editing: { productId_variantId: { qty, saving, trackSaving } }
    const [editing,  setEditing]  = useState({});
    const [msg,      setMsg]      = useState(null);

    const load = () => {
      setLoading(true);
      fetch(`${API}/vendor/products`,{headers:{Authorization:`Bearer ${token}`}})
        .then(r=>r.json()).then(d=>setProducts(d.products||[])).catch(()=>{}).finally(()=>setLoading(false));
    };
    useEffect(load,[token]);
    useEffect(()=>{ loadShopifyProducts(); },[token]);

    const loadShopifyProducts = () => {
      setShopifyLoad(true);
      fetch(`${API}/vendor/shopify/status`,{headers:{Authorization:`Bearer ${token}`}})
        .then(r=>r.json()).then(d=>{
          setShopifyConnected(!!d.connected);
          if (!d.connected) { setShopifyLoad(false); setShopifyLoaded(true); return; }
          return fetch(`${API}/vendor/shopify/products`,{headers:{Authorization:`Bearer ${token}`}})
            .then(r=>r.json()).then(d2=>{ setShopifyProducts(d2.products||[]); setShopifyLoaded(true); setShopifyLoad(false); });
        }).catch(()=>setShopifyLoad(false));
    };

    const visible = search ? products.filter(p=>p.title.toLowerCase().includes(search.toLowerCase())) : products;

    // product-level bulk actions: { productId: { bulkTracking, bulkOos } }
    const [bulkLoading, setBulkLoading] = useState({});
    const [reqMapping, setReqMapping] = useState({}); // productId → 'loading'|'done'|'error'
    const [reqRemoval, setReqRemoval] = useState({}); // productId → 'loading'|'done'|'error'
    const [sizeChart, setSizeChart] = useState({}); // productId → { loading, data, expanded, uploading, error }
    const scFileRefs = useRef({});
    const [shopifyProducts, setShopifyProducts] = useState([]);
    const [shopifyLoad, setShopifyLoad] = useState(false);
    const [shopifyLoaded, setShopifyLoaded] = useState(false);
    const [shopifyConnected, setShopifyConnected] = useState(false);

    const bulkTracking = async (pid, tracked) => {
      setBulkLoading(b=>({...b,[`${pid}_track`]:true}));
      try {
        const r = await fetch(`${API}/vendor/products/${pid}/bulk-tracking`,{
          method:'PUT', headers:{'Content-Type':'application/json',Authorization:`Bearer ${token}`},
          body: JSON.stringify({ tracked }),
        });
        const d = await r.json();
        if (!r.ok) throw new Error(d.error);
        setMsg({ type:'success', text:`Tracking ${tracked?'enabled':'disabled'} for all variants (${d.updated} updated)` });
        load();
      } catch(e){ setMsg({ type:'error', text: e.message }); }
      setBulkLoading(b=>({...b,[`${pid}_track`]:false}));
    };

    const markAllOos = async (pid, title) => {
      if (!window.confirm(`Mark ALL variants of "${title}" as out of stock (qty = 0)?`)) return;
      setBulkLoading(b=>({...b,[`${pid}_oos`]:true}));
      try {
        const r = await fetch(`${API}/vendor/products/${pid}/mark-all-out-of-stock`,{
          method:'PUT', headers:{Authorization:`Bearer ${token}`},
        });
        const d = await r.json();
        if (!r.ok) throw new Error(d.error);
        setMsg({ type:'success', text:`All ${d.updated} tracked variants set to out of stock. Admin notified.` });
        load();
      } catch(e){ setMsg({ type:'error', text: e.message }); }
      setBulkLoading(b=>({...b,[`${pid}_oos`]:false}));
    };

    const startEdit = (pid, vid, currentQty) => {
      setEditing(e=>({...e,[`${pid}_${vid}`]:{ qty: String(currentQty), saving:false, trackSaving:false }}));
    };
    const cancelEdit = (pid, vid) => {
      setEditing(e=>{ const n={...e}; delete n[`${pid}_${vid}`]; return n; });
    };

    const saveQty = async (pid, vid) => {
      const key = `${pid}_${vid}`;
      const qty = parseInt(editing[key]?.qty);
      if (isNaN(qty) || qty < 0) return;
      setEditing(e=>({...e,[key]:{...e[key],saving:true}}));
      try {
        const r = await fetch(`${API}/vendor/products/${pid}/variants/${vid}/inventory`,{
          method:'PUT', headers:{'Content-Type':'application/json',Authorization:`Bearer ${token}`},
          body: JSON.stringify({ quantity: qty }),
        });
        const d = await r.json();
        if (!r.ok) throw new Error(d.error);
        setMsg({ type:'success', text:`Stock updated to ${qty}` });
        cancelEdit(pid, vid);
        load();
      } catch(e){ setMsg({ type:'error', text: e.message }); setEditing(ex=>({...ex,[key]:{...ex[key],saving:false}})); }
    };

    const toggleTracking = async (pid, vid, currentTracked) => {
      const key = `${pid}_${vid}`;
      setEditing(e=>({...e,[key]:{...(e[key]||{}),trackSaving:true}}));
      try {
        const r = await fetch(`${API}/vendor/products/${pid}/variants/${vid}/tracking`,{
          method:'PUT', headers:{'Content-Type':'application/json',Authorization:`Bearer ${token}`},
          body: JSON.stringify({ tracked: !currentTracked }),
        });
        const d = await r.json();
        if (!r.ok) throw new Error(d.error);
        setMsg({ type:'success', text:`Inventory tracking ${!currentTracked?'enabled':'disabled'}` });
        load();
      } catch(e){ setMsg({ type:'error', text: e.message }); }
      setEditing(e=>{ const n={...e}; if(n[key]) delete n[key].trackSaving; return n; });
    };

    const loadSizeChart = async (pid) => {
      setSizeChart(s=>({...s,[pid]:{...(s[pid]||{}),loading:true,expanded:true,error:null}}));
      try {
        const r = await fetch(`${API}/vendor/products/${pid}/size-chart`,{headers:{Authorization:`Bearer ${token}`}});
        const d = await r.json();
        if (!r.ok) throw new Error(d.error||'Failed');
        setSizeChart(s=>({...s,[pid]:{...(s[pid]||{}),loading:false,data:d.metafield}}));
      } catch(e) { setSizeChart(s=>({...s,[pid]:{...(s[pid]||{}),loading:false,error:e.message}})); }
    };

    const uploadSizeChart = async (pid, file) => {
      if (!file) return;
      setSizeChart(s=>({...s,[pid]:{...(s[pid]||{}),uploading:true,error:null}}));
      try {
        const fd = new FormData();
        fd.append('image', file);
        const r = await fetch(`${API}/vendor/products/${pid}/size-chart`,{
          method:'POST', headers:{Authorization:`Bearer ${token}`}, body:fd,
        });
        const d = await r.json();
        if (!r.ok) throw new Error(d.error||'Upload failed');
        setSizeChart(s=>({...s,[pid]:{...(s[pid]||{}),uploading:false,data:{...( s[pid]?.data||{}), image_url: d.image_url}}}));
        setMsg({type:'success',text:'Size chart uploaded successfully!'});
      } catch(e) {
        setSizeChart(s=>({...s,[pid]:{...(s[pid]||{}),uploading:false,error:e.message}}));
      }
    };

    return (
      <div className="page">
        {msg && <div style={{marginBottom:12,padding:'10px 14px',borderRadius:7,fontSize:12,
          background: msg.type==='success'?'rgba(16,185,129,0.1)':'rgba(239,68,68,0.1)',
          color: msg.type==='success'?'#10b981':'#ef4444',
          border:`1px solid ${msg.type==='success'?'rgba(16,185,129,0.3)':'rgba(239,68,68,0.3)'}`}}>
          {msg.text} <span style={{float:'right',cursor:'pointer',opacity:0.6}} onClick={()=>setMsg(null)}>✕</span>
        </div>}

        <div className="filters" style={{marginBottom:16}}>
          <div className="search-wrap">
            <span className="search-ico">⌕</span>
            <input className="search-input" placeholder="Search products…" value={search} onChange={e=>setSearch(e.target.value)}/>
          </div>
          <span className="fcount">{visible.length} product{visible.length!==1?'s':''}</span>
        </div>

        {loading ? (
          Array.from({length:5}).map((_,i)=>(
            <div key={i} className="product-card">
              <div className="product-img-placeholder"/>
              <div style={{flex:1}}><div className="skel" style={{height:13,width:200,marginBottom:8}}/><div className="skel" style={{height:10,width:120}}/></div>
            </div>
          ))
        ) : visible.length===0 ? (
          <div className="empty"><div className="empty-icon">🏷️</div><div className="empty-title">No products found</div><div className="empty-sub">Products for vendor "{vendorName}" will appear here.</div></div>
        ) : (
          visible.map(p=>(
            <div key={p.id} className="product-card" style={{alignItems:'flex-start'}}>
              {p.image ? <img src={p.image} alt={p.title} className="product-img"/> : <div className="product-img-placeholder">🏷️</div>}
              <div className="product-info" style={{flex:1}}>
                <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:4,flexWrap:'wrap'}}>
                  <div className="product-title">{p.title}</div>
                  <span className={`p-status p-${p.status}`}>{p.status?.toUpperCase()}</span>
                  {p.mapped
                    ? <span style={{fontSize:9,padding:'2px 7px',borderRadius:99,background:'rgba(74,222,128,0.1)',color:'var(--green)',border:'1px solid var(--green)',fontWeight:700}}>✓ MAPPED</span>
                    : p.pending_mapping_request || reqMapping[p.id]==='done'
                      ? <span style={{fontSize:9,padding:'2px 7px',borderRadius:99,background:'rgba(251,191,36,0.1)',color:'var(--yellow)',border:'1px solid var(--yellow)',fontWeight:700}}>⏳ MAPPING REQUESTED</span>
                      : <button onClick={async()=>{
                          setReqMapping(r=>({...r,[p.id]:'loading'}));
                          try {
                            const res = await fetch(`${API}/vendor/products/${p.id}/request-mapping`,{
                              method:'POST', headers:{'Content-Type':'application/json',Authorization:`Bearer ${token}`},
                              body: JSON.stringify({ cc_product_title: p.title, cc_product_image: p.image||'' }),
                            });
                            const d = await res.json();
                            setReqMapping(r=>({...r,[p.id]: d.success?'done':'error'}));
                          } catch { setReqMapping(r=>({...r,[p.id]:'error'})); }
                        }} disabled={reqMapping[p.id]==='loading'}
                        style={{fontSize:9,padding:'2px 8px',borderRadius:99,border:'1px solid rgba(99,102,241,0.5)',background:'rgba(99,102,241,0.08)',color:'var(--indigo)',cursor:'pointer',fontWeight:700}}>
                        {reqMapping[p.id]==='loading'?'…':'🔗 Request Mapping'}
                      </button>
                  }
                  {/* Removal request */}
                  {p.pending_removal_request || reqRemoval[p.id]==='done'
                    ? <span style={{fontSize:9,padding:'2px 7px',borderRadius:99,background:'rgba(239,68,68,0.1)',color:'var(--red)',border:'1px solid var(--red)',fontWeight:700}}>⏳ REMOVAL REQUESTED</span>
                    : <button onClick={async()=>{
                        if (!window.confirm(`Request removal of "${p.title}" from CrosCrow store? Admin will review before deleting.`)) return;
                        setReqRemoval(r=>({...r,[p.id]:'loading'}));
                        try {
                          const res = await fetch(`${API}/vendor/products/${p.id}/request-removal`,{
                            method:'POST', headers:{'Content-Type':'application/json',Authorization:`Bearer ${token}`},
                            body: JSON.stringify({ cc_product_title: p.title, cc_product_image: p.image||'' }),
                          });
                          const d = await res.json();
                          setReqRemoval(r=>({...r,[p.id]: d.success?'done':'error'}));
                          if (d.error) setMsg({type:'error',text:d.error});
                        } catch { setReqRemoval(r=>({...r,[p.id]:'error'})); }
                      }} disabled={reqRemoval[p.id]==='loading'}
                      style={{fontSize:9,padding:'2px 8px',borderRadius:99,border:'1px solid rgba(239,68,68,0.4)',background:'rgba(239,68,68,0.06)',color:'var(--red)',cursor:'pointer',fontWeight:700}}>
                      {reqRemoval[p.id]==='loading'?'…':'🗑 Request Removal'}
                    </button>
                  }
                </div>
                {p.type && <div className="product-type">{p.type}</div>}

                {/* Product-level bulk actions */}
                <div style={{display:'flex',gap:6,flexWrap:'wrap',marginTop:8,marginBottom:4}}>
                  {(()=>{
                    const allTracked = p.variants.every(v=>v.tracked);
                    const noneTracked = p.variants.every(v=>!v.tracked);
                    return (<>
                      <button onClick={()=>bulkTracking(p.id, !allTracked)}
                        disabled={!!bulkLoading[`${p.id}_track`]}
                        style={{fontSize:10,padding:'3px 9px',borderRadius:4,border:'1px solid var(--indigo)',background:'rgba(99,102,241,0.1)',color:'var(--indigo)',cursor:'pointer',fontWeight:600}}>
                        {bulkLoading[`${p.id}_track`] ? '…' : allTracked ? '○ Disable Tracking All' : noneTracked ? '📦 Enable Tracking All' : '📦 Toggle Tracking All'}
                      </button>
                      {p.variants.some(v=>v.tracked) && (
                        <button onClick={()=>markAllOos(p.id, p.title)}
                          disabled={!!bulkLoading[`${p.id}_oos`]}
                          style={{fontSize:10,padding:'3px 9px',borderRadius:4,border:'1px solid var(--red)',background:'rgba(239,68,68,0.08)',color:'var(--red)',cursor:'pointer',fontWeight:600}}>
                          {bulkLoading[`${p.id}_oos`] ? '…' : '✕ Mark All Out of Stock'}
                        </button>
                      )}
                    </>);
                  })()}
                </div>

                {/* ── Size Chart ─────────────────────────────────── */}
                {(()=>{
                  const sc = sizeChart[p.id];
                  return (
                    <div style={{marginTop:8,marginBottom:4}}>
                      {!sc?.expanded ? (
                        <button onClick={()=>loadSizeChart(p.id)}
                          style={{fontSize:10,padding:'3px 9px',borderRadius:4,border:'1px solid var(--border)',background:'transparent',color:'var(--text-muted)',cursor:'pointer',fontWeight:600}}>
                          📏 Size Chart
                        </button>
                      ) : (
                        <div style={{background:'var(--bg-card2)',border:'1px solid var(--border)',borderRadius:8,padding:'10px 12px'}}>
                          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8}}>
                            <span style={{fontSize:11,fontWeight:700,color:'var(--text)'}}>📏 Size Chart</span>
                            <button onClick={()=>setSizeChart(s=>({...s,[p.id]:{...s[p.id],expanded:false}}))}
                              style={{background:'none',border:'none',cursor:'pointer',color:'var(--text-muted)',fontSize:13}}>✕</button>
                          </div>
                          {sc.loading && <div style={{fontSize:11,color:'var(--text-muted)'}}>Loading…</div>}
                          {sc.error && <div style={{fontSize:11,color:'var(--red)'}}>{sc.error}</div>}
                          {!sc.loading && !sc.error && sc.data?.image_url && (
                            <div style={{marginBottom:8}}>
                              <img src={sc.data.image_url} alt="Size Chart"
                                style={{maxWidth:'100%',maxHeight:220,borderRadius:6,border:'1px solid var(--border)',objectFit:'contain'}}/>
                            </div>
                          )}
                          {!sc.loading && !sc.error && !sc.data && (
                            <div style={{fontSize:11,color:'var(--text-muted)',marginBottom:8}}>No size chart set yet.</div>
                          )}
                          <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
                            <button onClick={()=>{ if (!scFileRefs.current[p.id]) return; scFileRefs.current[p.id].value=''; scFileRefs.current[p.id].click(); }}
                              disabled={sc.uploading}
                              style={{fontSize:10,padding:'4px 11px',borderRadius:4,border:'1px solid var(--accent)',background:'var(--accent)',color:'#fff',cursor:'pointer',fontWeight:600}}>
                              {sc.uploading ? '↻ Uploading…' : sc.data?.image_url ? '↑ Replace Image' : '↑ Upload Image'}
                            </button>
                            <span style={{fontSize:10,color:'var(--text-muted)'}}>PNG, JPG, WEBP · max 10MB</span>
                            <input ref={el=>scFileRefs.current[p.id]=el} type="file" accept=".png,.jpg,.jpeg,.webp,.gif"
                              style={{display:'none'}} onChange={e=>uploadSizeChart(p.id, e.target.files[0])}/>
                          </div>
                        </div>
                      )}
                    </div>
                  );
                })()}

                <div style={{display:'flex',flexDirection:'column',gap:6,marginTop:6}}>
                  {p.variants.map(v=>{
                    const key = `${p.id}_${v.id}`;
                    const ed  = editing[key];
                    return (
                      <div key={v.id} style={{background:'var(--bg-card2)',borderRadius:7,padding:'8px 12px',border:'1px solid var(--border)'}}>
                        <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
                          <span style={{color:'var(--text)',fontWeight:600,minWidth:80}}>{v.title!=='Default Title'?v.title:'Standard'}</span>
                          {v.sku && <span style={{fontSize:10,color:'var(--text-muted)'}}>SKU: {v.sku}</span>}
                          <span style={{fontSize:11,color:'var(--text-muted)'}}>₹{v.price}</span>

                          {/* Tracking toggle */}
                          <button onClick={()=>toggleTracking(p.id, v.id, v.tracked)}
                            disabled={editing[key]?.trackSaving}
                            style={{fontSize:10,padding:'2px 8px',borderRadius:4,border:'none',cursor:'pointer',fontWeight:600,
                              background: v.tracked ? 'rgba(99,102,241,0.15)' : 'var(--bg-card)',
                              color: v.tracked ? 'var(--indigo)' : 'var(--text-muted)'}}>
                            {editing[key]?.trackSaving ? '…' : v.tracked ? '📦 Tracked' : '○ Not Tracked'}
                          </button>

                          {/* Stock display + edit */}
                          {v.tracked ? (
                            ed ? (
                              <div style={{display:'flex',alignItems:'center',gap:4}}>
                                <input type="number" min="0" value={ed.qty}
                                  onChange={e=>setEditing(ex=>({...ex,[key]:{...ex[key],qty:e.target.value}}))}
                                  onKeyDown={e=>e.key==='Enter'&&saveQty(p.id,v.id)}
                                  style={{width:60,background:'var(--bg-card)',border:'1px solid var(--indigo)',borderRadius:4,color:'var(--text)',padding:'3px 6px',fontSize:12,outline:'none'}}
                                  autoFocus/>
                                <button onClick={()=>saveQty(p.id,v.id)} disabled={ed.saving}
                                  style={{padding:'3px 8px',borderRadius:4,border:'none',background:'var(--indigo)',color:'#fff',cursor:'pointer',fontSize:11}}>
                                  {ed.saving?'…':'✓'}
                                </button>
                                <button onClick={()=>cancelEdit(p.id,v.id)}
                                  style={{padding:'3px 7px',borderRadius:4,border:'1px solid var(--border)',background:'transparent',color:'var(--text-muted)',cursor:'pointer',fontSize:11}}>
                                  ✕
                                </button>
                              </div>
                            ) : (
                              <div style={{display:'flex',alignItems:'center',gap:6}}>
                                <span className={v.inventory===0?'inv-zero':v.inventory<5?'inv-low':'inv-ok'}>
                                  {v.inventory===0?'Out of stock':v.inventory<5?`Low: ${v.inventory}`:v.inventory}
                                </span>
                                <button onClick={()=>startEdit(p.id,v.id,v.inventory)}
                                  style={{fontSize:10,padding:'2px 7px',borderRadius:4,border:'1px solid var(--border)',background:'transparent',color:'var(--text-muted)',cursor:'pointer'}}>
                                  ✎ Edit
                                </button>
                              </div>
                            )
                          ) : (
                            <span style={{fontSize:11,color:'var(--text-muted)',fontStyle:'italic'}}>Tracking off — always available</span>
                          )}
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            </div>
          ))
        )}

        {/* ── My Shopify Store Products ─────────────────────────── */}
        <div style={{marginTop:32,borderTop:'1px solid var(--border)',paddingTop:24}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}}>
            <div>
              <div style={{fontSize:15,fontWeight:700,color:'var(--text)'}}>🛍 My Shopify Store Products</div>
              <div style={{fontSize:11,color:'var(--text-muted)',marginTop:2}}>Products from your connected Shopify store and their mapping status on CrosCrow.</div>
            </div>
            {!shopifyLoaded
              ? <button className="btn btn-ghost btn-sm" onClick={loadShopifyProducts} disabled={shopifyLoad}>
                  {shopifyLoad ? '↻ Loading…' : '↻ Load'}
                </button>
              : <button className="btn btn-ghost btn-sm" onClick={loadShopifyProducts} disabled={shopifyLoad}>
                  {shopifyLoad ? '↻ Loading…' : '↻ Refresh'}
                </button>
            }
          </div>

          {!shopifyLoaded && !shopifyLoad && (
            <div style={{textAlign:'center',padding:'20px 0',color:'var(--text-muted)',fontSize:12}}>
              Click Load to fetch your Shopify store products.
            </div>
          )}

          {shopifyLoad && (
            <div style={{color:'var(--text-muted)',fontSize:12,padding:'12px 0'}}>Loading your Shopify products…</div>
          )}

          {shopifyLoaded && !shopifyConnected && (
            <div style={{background:'rgba(239,68,68,0.06)',border:'1px solid rgba(239,68,68,0.3)',borderRadius:10,padding:'16px 18px'}}>
              <div style={{display:'flex',gap:12,alignItems:'flex-start',marginBottom:12}}>
                <span style={{fontSize:24,flexShrink:0}}>⚠️</span>
                <div>
                  <div style={{fontWeight:700,color:'#f87171',fontSize:13,marginBottom:6}}>Your Shopify store is not connected</div>
                  <div style={{fontSize:12,color:'#fca5a5',lineHeight:1.7}}>
                    Without live inventory sync, CrosCrow has no way of knowing when your products go out of stock.
                    This means <strong style={{color:'#f87171'}}>orders can be placed for items you can't fulfil</strong> — leading to cancellations,
                    customer complaints, and damage to your brand's reputation on our platform.
                  </div>
                  <div style={{fontSize:12,color:'#fca5a5',marginTop:8,lineHeight:1.7}}>
                    Connecting your store takes under 2 minutes and gives you real-time inventory sync,
                    automatic stock updates, and peace of mind that you'll never oversell again.
                  </div>
                </div>
              </div>
              <button onClick={onGoToShopifySync}
                style={{fontSize:12,padding:'8px 18px',borderRadius:7,border:'none',background:'#ef4444',color:'#fff',cursor:'pointer',fontWeight:700,fontFamily:'inherit'}}>
                🔄 Connect Shopify Store Now →
              </button>
            </div>
          )}

          {shopifyLoaded && shopifyConnected && shopifyProducts.length === 0 && (
            <div style={{color:'var(--text-muted)',fontSize:12}}>No products found in your Shopify store.</div>
          )}

          {shopifyLoaded && shopifyConnected && shopifyProducts.length > 0 && (
            <div style={{display:'flex',flexDirection:'column',gap:8}}>
              {shopifyProducts.map(p=>{
                const img = p.images?.[0]?.src;
                return (
                  <div key={p.id} style={{background:'var(--bg-card)',border:`1px solid ${p.mapped?'rgba(74,222,128,0.2)':p.request?.status==='pending'?'rgba(251,191,36,0.2)':'var(--border)'}`,borderRadius:8,padding:'10px 12px',display:'flex',gap:10,alignItems:'center'}}>
                    {img
                      ? <img src={img} style={{width:44,height:44,objectFit:'cover',borderRadius:6,flexShrink:0,border:'1px solid var(--border)'}} alt=""/>
                      : <div style={{width:44,height:44,borderRadius:6,background:'var(--bg-card2)',flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center',fontSize:18}}>🛍</div>
                    }
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:13,fontWeight:600,color:'var(--text)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{p.title}</div>
                      <div style={{fontSize:11,color:'var(--text-muted)',marginTop:2}}>{p.variants?.length} variant{p.variants?.length!==1?'s':''}</div>
                      {p.mapping?.cc_product_title && <div style={{fontSize:10,color:'#a5b4fc',marginTop:2}}>→ {p.mapping.cc_product_title}</div>}
                    </div>
                    <div style={{flexShrink:0}}>
                      {p.mapped
                        ? <span style={{fontSize:10,padding:'2px 8px',borderRadius:10,background:'var(--green-dim)',color:'var(--green)',border:'1px solid var(--green)',whiteSpace:'nowrap'}}>✓ Mapped</span>
                        : p.request?.status==='pending'
                          ? <span style={{fontSize:10,padding:'2px 8px',borderRadius:10,background:'var(--yellow-bg)',color:'var(--yellow)',border:'1px solid var(--yellow)',whiteSpace:'nowrap'}}>⏳ {p.request.request_type==='mapping'?'Mapping Req':'Upload Req'}</span>
                          : p.request?.status==='rejected'
                            ? <span style={{fontSize:10,padding:'2px 8px',borderRadius:10,background:'var(--red-bg)',color:'var(--red)',border:'1px solid var(--red)',whiteSpace:'nowrap'}}>✗ Rejected</span>
                            : <div style={{display:'flex',gap:6}}>
                                <button onClick={async()=>{
                                  const r = await fetch(`${API}/vendor/shopify/request-upload`,{
                                    method:'POST',headers:{'Content-Type':'application/json',Authorization:`Bearer ${token}`},
                                    body:JSON.stringify({product_id:String(p.id),product_title:p.title,product_image:img||'',variants_count:p.variants?.length||0,request_type:'upload'})
                                  });
                                  const d = await r.json();
                                  if(d.success||d.error) loadShopifyProducts();
                                }} style={{fontSize:10,padding:'3px 8px',borderRadius:6,border:'1px solid var(--indigo)',background:'var(--indigo-dim)',color:'var(--indigo)',cursor:'pointer',whiteSpace:'nowrap'}}>
                                  📤 Upload
                                </button>
                                <button onClick={async()=>{
                                  const r = await fetch(`${API}/vendor/shopify/request-upload`,{
                                    method:'POST',headers:{'Content-Type':'application/json',Authorization:`Bearer ${token}`},
                                    body:JSON.stringify({product_id:String(p.id),product_title:p.title,product_image:img||'',variants_count:p.variants?.length||0,request_type:'mapping'})
                                  });
                                  const d = await r.json();
                                  if(d.success||d.error) loadShopifyProducts();
                                }} style={{fontSize:10,padding:'3px 8px',borderRadius:6,border:'1px solid var(--green)',background:'var(--green-dim)',color:'var(--green)',cursor:'pointer',whiteSpace:'nowrap'}}>
                                  🔗 Map
                                </button>
                              </div>
                      }
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      </div>
    );
  }

  /* ══════════════════════════════════
     SETTLEMENTS VIEW
  ══════════════════════════════════ */
  function Settlements({ token }) {
    const [activeTab,   setActiveTab]   = useState('delivered');
    // Tab 1: real-time delivered summary
    const [delSummary,  setDelSummary]  = useState(null);
    const [delLoading,  setDelLoading]  = useState(true);
    // Tab 2: invoices
    const [settlements, setSettlements] = useState([]);
    const [invLoading,  setInvLoading]  = useState(true);
    const [detail,      setDetail]      = useState(null);

    const loadDelivered = () => {
      setDelLoading(true);
      fetch(`${API}/vendor/delivered-summary`,{headers:{Authorization:`Bearer ${token}`}})
        .then(r=>r.json()).then(setDelSummary).catch(()=>{}).finally(()=>setDelLoading(false));
    };
    const loadInvoices = () => {
      setInvLoading(true);
      fetch(`${API}/vendor/settlements`,{headers:{Authorization:`Bearer ${token}`}})
        .then(r=>r.json()).then(d=>setSettlements(d.settlements||[])).catch(()=>{}).finally(()=>setInvLoading(false));
    };

    useEffect(()=>{ loadDelivered(); loadInvoices(); },[token]);

    const viewDetail = async id => {
      const r = await fetch(`${API}/vendor/settlements/${id}`,{headers:{Authorization:`Bearer ${token}`}});
      setDetail(await r.json());
    };

    const d = delSummary || {};
    const fmt = n => `₹${Math.abs(n||0).toFixed(2)}`;
    const isPayout = (d.netPayable||0) < 0;
    const isPend   = (d.pendingSettlement||0) < 0;

    return (
      <div className="page">
        {/* Tab switcher */}
        <div style={{display:'flex',gap:0,marginBottom:20,borderBottom:'2px solid var(--border)'}}>
          {[['delivered','📦 Delivered Orders'],['invoices','🧾 Settlement Invoices']].map(([id,label])=>(
            <button key={id} onClick={()=>setActiveTab(id)}
              style={{padding:'9px 20px',fontSize:12,fontWeight:600,border:'none',background:'transparent',cursor:'pointer',
                color:activeTab===id?'var(--teal)':'var(--text-muted)',
                borderBottom:activeTab===id?'2px solid var(--teal)':'2px solid transparent',
                marginBottom:'-2px',transition:'all 0.15s'}}>
              {label}
            </button>
          ))}
        </div>

        {/* ── TAB 1: Delivered Orders ────────────────────────────────────── */}
        {activeTab==='delivered' && (
          <div>
            <div className="stats-grid" style={{gridTemplateColumns:'repeat(3,1fr)',marginBottom:16}}>
              <StatCard color="teal"   icon="₹" label="Gross Sales (Delivered)"    value={delLoading?'…':fmt(d.gross)}             sub={`${d.totalOrders||0} delivered orders`}/>
              <StatCard color="yellow" icon="%" label="Commissionable Sale"         value={delLoading?'…':fmt(d.commissionableSale)} sub={d.prepaidDiscount>0?`after ₹${(d.prepaidDiscount||0).toFixed(2)} prepaid disc`:`Comm: ${d.commissionPct||20}%`}/>
              <StatCard color="orange" icon="~" label="Commission + GST"            value={delLoading?'…':`${fmt(d.commission)} + ${fmt(d.gst)}`} sub="18% GST on commission"/>
            </div>
            <div className="stats-grid" style={{gridTemplateColumns:'repeat(3,1fr)',marginBottom:20}}>
              <StatCard color="green"  icon="−" label="Advance Adjusted"            value={delLoading?'…':fmt(d.advance)}           sub="deducted from payable"/>
              <StatCard color="green"  icon="✓" label="Total Settled"               value={delLoading?'…':fmt(d.totalSettled)}      sub="from paid invoices"/>
              <StatCard color={isPend?'green':'red'} icon="○" label="Pending Settlement"
                value={delLoading?'…':`${fmt(d.netPayable)} = ${isPend?'−':''}${fmt(d.pendingSettlement)}`}
                sub={isPend?'CrosCrow owes you':'you owe CrosCrow'}/>
            </div>
            <div className="card">
              <div className="card-header">
                <span className="card-title">Net Position</span>
                <button className="btn btn-ghost btn-sm" onClick={loadDelivered}>↻ Refresh</button>
              </div>
              <div style={{padding:'18px 20px'}}>
                {delLoading ? <div className="skel" style={{height:60}}/> : !d.totalOrders ? (
                  <div className="empty"><div className="empty-icon">📦</div><div className="empty-title">No delivered orders yet</div><div className="empty-sub">Your delivered orders will appear here automatically.</div></div>
                ) : (
                  <div style={{display:'flex',flexDirection:'column',gap:10}}>
                    {[
                      {label:'Gross Sales (MRP)',        val:`₹${(d.gross||0).toFixed(2)}`,             color:'var(--teal)'},
                      d.prepaidDiscount>0 && {label:'Prepaid Discount (10%)', val:`−₹${(d.prepaidDiscount||0).toFixed(2)}`, color:'var(--orange)'},
                      {label:'Commissionable Sale',      val:`₹${(d.commissionableSale||0).toFixed(2)}`,color:'var(--text)', bold:true},
                      {label:`Commission (${d.commissionPct||20}%)`,val:`₹${(d.commission||0).toFixed(2)}`,color:'var(--yellow)'},
                      {label:'GST (18%)',                val:`₹${(d.gst||0).toFixed(2)}`,               color:'var(--orange)'},
                      d.advance>0 && {label:'Advance Adjusted',val:`−₹${(d.advance||0).toFixed(2)}`, color:'var(--green)'},
                      {label:'Net Payable (all delivered)', val:`${isPayout?'CrosCrow pays you ':'You pay CrosCrow '}₹${Math.abs(d.netPayable||0).toFixed(2)}`, color:isPayout?'var(--green)':'var(--red)', bold:true},
                      {label:'Already Settled (paid invoices)', val:`₹${(d.totalSettled||0).toFixed(2)}`, color:'var(--green)'},
                      {label:'Still Pending',            val:`${isPend?'CC owes you ':'You owe '}₹${Math.abs(d.pendingSettlement||0).toFixed(2)}`, color:isPend?'var(--green)':'var(--red)', bold:true},
                    ].filter(Boolean).map((row,i)=>(
                      <div key={i} className="detail-row" style={row.bold?{borderTop:'1px solid var(--border)',paddingTop:8,marginTop:4}:{}}>
                        <span className="dr-label" style={row.bold?{fontWeight:700}:{}}>{row.label}</span>
                        <span className="dr-val" style={{color:row.color,fontWeight:row.bold?700:400}}>{row.val}</span>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            </div>
            <div style={{marginTop:10,fontSize:10,color:'var(--text-muted)',textAlign:'center'}}>
              Live calculation from all your delivered orders. To view formal invoices, switch to Settlement Invoices tab.
            </div>
          </div>
        )}

        {/* ── TAB 2: Settlement Invoices ─────────────────────────────────── */}
        {activeTab==='invoices' && (
          <div>
            <div className="card">
              <div className="card-header">
                <span className="card-title">Settlement Statements</span>
                <span className="card-sub">{settlements.length} total</span>
              </div>
              {invLoading ? (
                <div style={{padding:16}}>{Array.from({length:4}).map((_,i)=><div key={i} className="skel" style={{height:60,borderRadius:8,marginBottom:10}}/>)}</div>
              ) : settlements.length===0 ? (
                <div className="empty"><div className="empty-icon">🧾</div><div className="empty-title">No invoices yet</div><div className="empty-sub">Invoices are generated by CrosCrow after order delivery.</div></div>
              ) : settlements.map(s=>{
                const isCredit = s.net_payable < 0;
                return (
                  <div key={s.id} className="settle-card" onClick={()=>viewDetail(s.id)} style={{cursor:'pointer'}}>
                    <div className="settle-row">
                      <div style={{fontWeight:700,color:'var(--text)',fontSize:12}}>{s.invoice_no}</div>
                      <span className={`badge b-${s.status}`}><span className="bdot"/>{s.status.toUpperCase()}</span>
                    </div>
                    <div className="settle-row">
                      <span style={{fontSize:11,color:'var(--text-muted)'}}>{fmtDate(s.period_start)} – {fmtDate(s.period_end)} · {s.total_orders} orders</span>
                      <span style={{fontWeight:700,color:isCredit?'var(--green)':'var(--red)',fontSize:13}}>
                        {isCredit?'+ ':'− '}₹{Math.abs(s.net_payable||0).toFixed(2)}
                        <span style={{fontSize:9,color:'var(--text-muted)',marginLeft:5}}>{isCredit?'receivable':'payable'}</span>
                      </span>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {/* Invoice detail modal */}
        {detail && (
          <div className="overlay" onClick={e=>e.target===e.currentTarget&&setDetail(null)}>
            <div className="modal">
              <div className="modal-header">
                <div><div className="modal-title">{detail.settlement.invoice_no}</div><div style={{fontSize:10,color:'var(--text-muted)',marginTop:3}}>{fmtDate(detail.settlement.period_start)} – {fmtDate(detail.settlement.period_end)}</div></div>
                <button className="modal-close" onClick={()=>setDetail(null)}>✕</button>
              </div>
              <div className="modal-body">
                <div className="detail-grid">
                  <div className="detail-box">
                    <div className="detail-box-title">Summary</div>
                    <div className="detail-row"><span className="dr-label">Total Orders</span><span className="dr-val">{detail.settlement.total_orders}</span></div>
                    <div className="detail-row"><span className="dr-label">Gross Revenue (MRP)</span><span className="dr-val" style={{color:'var(--teal)'}}>{fmtCur(detail.settlement.gross_revenue)}</span></div>
                    {(()=>{
                      const prepDisc = (detail.orders||[]).reduce((s,o)=>o.payment_type==='prepaid'?s+(o.my_revenue||0)*0.1:s, 0);
                      const taxable  = (detail.settlement.gross_revenue||0) - prepDisc;
                      return prepDisc > 0 ? (<>
                        <div className="detail-row"><span className="dr-label" style={{color:'var(--orange)'}}>Prepaid Discount (10%)</span><span className="dr-val" style={{color:'var(--orange)'}}>−₹{prepDisc.toFixed(2)}</span></div>
                        <div className="detail-row" style={{borderTop:'1px solid var(--border)',paddingTop:6,marginTop:2}}><span className="dr-label" style={{fontWeight:700}}>Taxable Base</span><span className="dr-val" style={{fontWeight:700}}>{fmtCur(taxable)}</span></div>
                      </>) : null;
                    })()}
                    {(()=>{
                      const flatOrders    = (detail.orders||[]).filter(o=>o.has_product_rule);
                      const defaultOrders = (detail.orders||[]).filter(o=>!o.has_product_rule);
                      const commPct = detail.settlement.custom_commission_pct||20;
                      const ruleSet = [...new Set(flatOrders.map(o=>o.rule_label||'Custom').filter(Boolean))];
                      return (<>
                        {flatOrders.length>0 && (
                          <div style={{background:'rgba(99,102,241,0.07)',border:'1px solid rgba(99,102,241,0.2)',borderRadius:6,padding:'7px 10px',margin:'6px 0'}}>
                            <div style={{fontSize:9,fontWeight:700,color:'var(--indigo)',letterSpacing:0.5,marginBottom:5,textTransform:'uppercase'}}>★ Custom Rate Orders ({flatOrders.length})</div>
                            <div className="detail-row" style={{padding:'2px 0'}}><span className="dr-label" style={{fontSize:10}}>Revenue (MRP)</span><span className="dr-val" style={{fontSize:10}}>₹{flatOrders.reduce((s,o)=>s+(o.my_revenue||0),0).toFixed(2)}</span></div>
                            {ruleSet.map(label=>{
                              const these = flatOrders.filter(o=>o.rule_label===label);
                              return <div key={label} className="detail-row" style={{padding:'2px 0'}}>
                                <span className="dr-label" style={{fontSize:10,color:'var(--indigo)'}}>{label}</span>
                                <span className="dr-val" style={{fontSize:10,color:'var(--yellow)'}}>₹{these.reduce((s,o)=>s+(o.commission||0),0).toFixed(2)}</span>
                              </div>;
                            })}
                            <div className="detail-row" style={{padding:'2px 0',borderTop:'1px dashed var(--border)',marginTop:3,paddingTop:4}}>
                              <span className="dr-label" style={{fontSize:10}}>GST on above</span>
                              <span className="dr-val" style={{fontSize:10,color:'var(--orange)'}}>₹{flatOrders.reduce((s,o)=>s+(o.gst||0),0).toFixed(2)}</span>
                            </div>
                          </div>
                        )}
                        {defaultOrders.length>0 && (
                          <div style={{background:'var(--bg-card2)',border:'1px solid var(--border)',borderRadius:6,padding:'7px 10px',margin:'6px 0'}}>
                            <div style={{fontSize:9,fontWeight:700,color:'var(--text-muted)',letterSpacing:0.5,marginBottom:5,textTransform:'uppercase'}}>Standard {commPct}% Orders ({defaultOrders.length})</div>
                            <div className="detail-row" style={{padding:'2px 0'}}><span className="dr-label" style={{fontSize:10}}>Revenue (MRP)</span><span className="dr-val" style={{fontSize:10}}>₹{defaultOrders.reduce((s,o)=>s+(o.my_revenue||0),0).toFixed(2)}</span></div>
